<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klempířství & Pokrývačství Brno | Opravy a rekonstrukce střech</title>
  <meta name="description" content="Profesionální klempíř a pokrývač v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte 603 506 205.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #145aa0;
      --primary-light: #2e85e0;
      --accent: #e87c1e;
      --accent-dark: #c96a10;
      --dark: #0f1923;
      --dark-2: #1a2635;
      --dark-3: #243447;
      --text: #1e2d3d;
      --text-light: #4a6070;
      --text-muted: #7a9bb0;
      --white: #ffffff;
      --light-bg: #f0f5fa;
      --border: #d0e0ef;
      --card-bg: #ffffff;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(15,25,35,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-call-header {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
      text-decoration: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(232,124,30,0.35);
    }

    .btn-call-header:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(232,124,30,0.45);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(160deg, #0a1520 0%, #0f2035 40%, #1a3a5c 75%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(26,111,196,0.30) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(232,124,30,0.12) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.45);
      color: #7eb8f5;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-content h1 span {
      background: linear-gradient(90deg, #4aa3f0, #7ec8f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.65;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #d06810);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(232,124,30,0.40);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,124,30,0.52);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.30);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .hero-divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    @media (max-width: 480px) {
      .hero-divider { display: none; }
    }

    /* ── WAVE ── */
    .wave-divider {
      display: block;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin-top: -2px;
    }

    .wave-divider svg {
      display: block;
      width: 100%;
    }

    /* ── SECTIONS COMMON ── */
    section {
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 56px;
    }

    .section-label {
      display: inline-block;
      background: rgba(26,111,196,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,196,0.20);
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 17px;
      line-height: 1.65;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--light-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 580px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(26,111,196,0.15);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card .service-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 8px;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--light-bg);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 20px rgba(26,111,196,0.28);
    }

    .benefit-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── REFERENCES ── */
    #reference {
      background: linear-gradient(170deg, var(--dark) 0%, var(--dark-2) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(26,111,196,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(26,111,196,0.20);
      border-color: rgba(26,111,196,0.35);
      color: #7eb8f5;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.55);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: background 0.25s, transform 0.25s;
      backdrop-filter: blur(6px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-4px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .review-stars span {
      font-size: 16px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.80);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--light-bg);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 36px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 900px) {
      .contact-layout {
        grid-template-columns: 1fr 1.3fr;
        align-items: start;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 18px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-card:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow-hover);
