<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klempířství Jaša – Profesionální klempíř v Brně</title>
  <meta name="description" content="Klempířství Jaša Brno – oplechování střech, okapy, vikýře, střešní okna a opravy plechových střech. Volejte +420 777 087 158.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6db5;
      --primary-dark: #0f4f8a;
      --primary-light: #3a8fd4;
      --accent: #e8a020;
      --accent-dark: #c7891a;
      --dark: #0d1b2e;
      --dark2: #112240;
      --dark3: #1a3357;
      --text: #2c3e50;
      --text-light: #5a6a7e;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-card: #ffffff;
      --border: #d6e4f0;
      --shadow: 0 4px 24px rgba(26,109,181,0.10);
      --shadow-hover: 0 8px 36px rgba(26,109,181,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: #7a99bb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .navbar-nav a {
      color: #9ab5ce;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .navbar-nav a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .btn-cta-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px !important;
      border-radius: 10px !important;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 2px 12px rgba(26,109,181,0.35);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-cta-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(26,109,181,0.5) !important;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
    }

    @media (max-width: 768px) {
      .navbar-nav {
        display: none;
      }
      .btn-cta-nav {
        display: flex !important;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #061525 0%, #0d2240 40%, #0f3560 70%, #1a4a7a 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      min-height: 600px;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(26,109,181,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 10% 80%, rgba(232,160,32,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-shapes {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,109,181,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-shapes-2 {
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,109,181,0.2);
      border: 1px solid rgba(26,109,181,0.4);
      color: #7ec8f5;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      font-size: 16px;
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 22px;
      max-width: 780px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #93b8d8;
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--dark);
      font-size: 16px;
      font-weight: 800;
      padding: 16px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,160,32,0.4);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,160,32,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      padding: 16px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: #7a99bb;
      font-weight: 500;
      margin-top: 2px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    @media (max-width: 480px) {
      .hero-stat-divider { display: none; }
    }

    /* ===== SEKCE OBECNÉ ===== */
    .section-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,109,181,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid rgba(26,109,181,0.18);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-title em {
      font-style: normal;
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,109,181,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(26,109,181,0.10), rgba(26,109,181,0.18));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card-tag {
      display: inline-block;
      margin-top: 18px;
      background: rgba(26,109,181,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(26,109,181,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #proc-my .section-label {
      background: rgba(26,109,181,0.18);
      border-color: rgba(26,109,181,0.3);
      color: #7ec8f5;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #7a99bb;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      position: relative;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(26,109,181,0.35);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 56px;
      font-weight: 900;
      color: rgba(26,109,181,0.25);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
      box-shadow: 0 4px 16px rgba(26,109,181,0.35);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #7a99bb;
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 40px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .review-stars span {
      font-size: 18px;
      color: var(--accent);
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #1a6db5, #3a8fd4); }
    .review-avatar.a2 { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .review-avatar.a3 { background: linear-gradient(135deg, #9333ea, #a855f7); }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info-card {
      background: var(--dark);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      color: var(--white);
    }

    .contact-info-card h3 {
      font-size: 24px;
      font-weight: 800;
