<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBG Pražské malty, s.r.o. – Profesionální betonář Praha</title>
<meta name="description" content="TBG Pražské malty, s.r.o. – profesionální betonářské práce v Praze a okolí. Kvalita, rychlost, přijatelná cena. Volejte +420606672599.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E87E04;
  --primary-dark: #c46900;
  --primary-light: #FFA733;
  --dark: #1A1A1A;
  --dark2: #242424;
  --dark3: #2E2E2E;
  --gray: #6B7280;
  --gray-light: #F3F4F6;
  --white: #FFFFFF;
  --text: #1F2937;
  --text-light: #6B7280;
  --border: #E5E7EB;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,126,4,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
  opacity: 0.9;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,26,26,0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 20px;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(232,126,4,0.35);
}

.header-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(232,126,4,0.50);
}

/* ─── HERO ─── */
#hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0f0f0f 0%, #1a1200 40%, #2a1800 70%, #1a0f00 100%);
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.5) 40px, rgba(255,255,255,0.5) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.5) 40px, rgba(255,255,255,0.5) 41px);
}

.hero-glow {
  position: absolute;
  top: -200px;
  right: -200px;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(232,126,4,0.18) 0%, transparent 65%);
  pointer-events: none;
}

.hero-glow2 {
  position: absolute;
  bottom: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(232,126,4,0.10) 0%, transparent 65%);
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 80px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,126,4,0.15);
  border: 1px solid rgba(232,126,4,0.35);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  background: var(--primary-light);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.2); }
}

#hero h1 {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 24px;
  max-width: 780px;
}

#hero h1 span {
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  color: rgba(255,255,255,0.70);
  max-width: 560px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-ctas {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(232,126,4,0.45);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(232,126,4,0.60);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  border: 2px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  background: rgba(232,126,4,0.10);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1;
}

.hero-stat-num span {
  color: var(--primary-light);
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.50);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ─── SECTION COMMON ─── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-block;
  background: rgba(232,126,4,0.10);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(232,126,4,0.20);
}

.section-title {
  font-size: clamp(1.6rem, 4vw, 2.5rem);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-sub {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 52px;
}

/* ─── SERVICES ─── */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,126,4,0.25);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(232,126,4,0.12), rgba(255,167,51,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: background 0.25s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(232,126,4,0.20), rgba(255,167,51,0.14));
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ─── PROC MY ─── */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

.proc-my-glow {
  position: absolute;
  top: -150px;
  right: -150px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(232,126,4,0.12) 0%, transparent 65%);
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-sub {
  color: rgba(255,255,255,0.55);
}

#proc-my .section-tag {
  background: rgba(232,126,4,0.18);
  border-color: rgba(232,126,4,0.30);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.benefit-card:hover {
  background: rgba(232,126,4,0.07);
  border-color: rgba(232,126,4,0.25);
  transform: translateY(-4px);
}

.benefit-num {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.benefit-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 8px 24px rgba(232,126,4,0.35);
}

.benefit-card h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 0.94rem;
  color: rgba(255,255,255,0.60);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

.review-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,126,4,0.22);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  font-family: Georgia, serif;
  opacity: 0.5;
}

.review-stars {
  color: var(--primary);
  font-size: 17px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.review-text {
  font-size: 0.97rem;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 16px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--dark);
  line-height: 1.3;
}

.review-location {
  font-size: 0.82rem;
  color: var(--text-light);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--gray-light);
}

.contact-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

.contact-box {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.contact-box h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 26px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.contact-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.contact-item-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, rgba(232,126,4,0.12), rgba(255,167,51,0.08));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
  margin-top: 1px;
}

.contact-item-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.contact-item-value {
  font-size: 1rem;
  font-weight: 600;
  color: var(--dark);
}

.contact-item-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.map-visual {
  height: 220px;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex;
  align-items: center
