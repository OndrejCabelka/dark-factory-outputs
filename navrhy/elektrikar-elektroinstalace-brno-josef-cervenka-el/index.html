<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrikář Brno | Josef Červenka – Elektroinstalace, Revize, Fotovoltaika</title>
<meta name="description" content="Profesionální elektrikář v Brně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte: +420 776 842 033">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #D4A800;
  --primary-light: #FFF3B0;
  --dark: #0D0D0D;
  --dark2: #1A1A2E;
  --dark3: #16213E;
  --text: #1a1a1a;
  --text-light: #555;
  --white: #ffffff;
  --gray-bg: #F8F9FA;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.08);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  line-height: 1.6;
  background: var(--white);
}

/* BANNER */
#proposal-banner {
  background: linear-gradient(135deg, #FF4D00, #ff7c47);
  color: white;
  text-align: center;
  padding: 12px 20px;
  font-size: 13px;
  font-family: system-ui;
}

/* NAVBAR */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  white-space: nowrap;
}

.nav-cta {
  background: var(--primary);
  color: var(--dark);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 14px;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-cta:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* HERO */
#hero {
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1A2E 40%, #0f2027 70%, #1a1a0a 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 100px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 60% 40%, rgba(245,197,24,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(245,197,24,0.06) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '⚡';
  position: absolute;
  font-size: 400px;
  opacity: 0.03;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  line-height: 1;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,197,24,0.15);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 60px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 40px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  background: var(--primary);
  color: var(--dark);
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(245,197,24,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,197,24,0.45);
}

.btn-secondary {
  background: transparent;
  color: var(--white);
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* SECTIONS COMMON */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  max-width: 640px;
  margin: 0 auto 56px;
}

.section-label {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary-dark);
  padding: 4px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  line-height: 1.7;
}

/* SERVICES */
#sluzby {
  background: var(--gray-bg);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: var(--card-shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.13);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary-light), #FFE88A);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* WHY US */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top right, rgba(245,197,24,0.08) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(245,197,24,0.15);
  color: var(--primary);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(245,197,24,0.07);
  border-color: rgba(245,197,24,0.25);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 1.5px;
  margin-bottom: 16px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-text {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 18px;
  display: block;
}

/* REFERENCES */
#reference {
  background: var(--white);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--gray-bg);
  border-radius: var(--radius);
  padding: 32px 28px;
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-shadow);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
}

.review-stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--dark);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

.review-location {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* CONTACT */
#kontakt {
  background: var(--gray-bg);
}

.kontakt-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 22px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--card-shadow);
  border: 1px solid rgba(0,0,0,0.05);
  transition: transform 0.2s;
}

.kontakt-item:hover {
  transform: translateY(-2px);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary-light), #FFE88A);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-item-label {
  font-size: 12px;
  color: var(--text-light);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
}

.kontakt-item-value:hover {
  color: var(--primary-dark);
}

.kontakt-item-sub {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 3px;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--card-shadow);
  border: 1px solid rgba(0,0,0,0.05);
  height: 100%;
  min-height: 340px;
  display: flex;
  flex-direction: column;
}

.map-visual {
  flex: 1;
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0f2027 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.map-visual::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 50%, rgba(245,197,24,0.1) 0%, transparent 40%),
    radial-gradient(circle at 70% 50%, rgba(245,197,24,0.05) 0%, transparent 40%);
}

.map-visual-inner {
  position: relative;
  z-index: 1;
}

.map-pin {
  font-size: 56px;
  display: block;
  margin-bottom: 14px;
  filter: drop-shadow(0 0 20px rgba(245,197,24,0.5));
}

.map-city {
  font-size: 26px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
}

.map-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.55);
}

.map-footer {
  padding: 16px 20px;
  background: var(--white);
  border-top: 1px solid rgba(0,0,0,0.06);
  font-size: 13px;
  color: var(--text-light);
  text-align: center;
}

/* FOOTER */
footer {
  background: var(--dark);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.footer-logo-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}

.footer-links {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

.footer-links a {
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.2s;
}

.footer-links a:hover {
  color: var(--primary);
}

.footer-divider {
  width: 100%;
  max-width: 600px;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

.footer-bottom {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}

.footer-copy {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
}

.footer-ico {
  font-size: 13px;
  color: rgba(255,255,255,0.3);
}

/* RESPONSIVE */
@media (max-
