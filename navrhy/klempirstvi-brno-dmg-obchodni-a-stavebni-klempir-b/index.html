<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klempířství Brno | DMG obchodní a stavební</title>
<meta name="description" content="Profesionální klempíř v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna a opravy plechových střech.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fb5;
  --primary-dark: #0f4f87;
  --primary-light: #2d8fe0;
  --accent: #e8a020;
  --accent-dark: #c4841a;
  --dark: #0d1b2a;
  --dark2: #152534;
  --dark3: #1e3448;
  --text: #1a2633;
  --text-light: #4a6278;
  --text-muted: #7a95aa;
  --white: #ffffff;
  --bg: #f4f8fb;
  --bg2: #eaf2f9;
  --border: #d0e3f0;
  --shadow: 0 4px 24px rgba(26,111,181,0.10);
  --shadow-lg: 0 8px 40px rgba(26,111,181,0.16);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
  opacity: 0.9;
}

/* ─── NAVBAR ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13, 27, 42, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 20px;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.nav-logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.2px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}

.nav-links a:hover {
  color: var(--white);
  background: rgba(255,255,255,0.07);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px !important;
  border-radius: 10px !important;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s !important;
  box-shadow: 0 4px 16px rgba(26,111,181,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(26,111,181,0.45) !important;
  opacity: 1 !important;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
}

/* ─── HERO ─── */
#hero {
  position: relative;
  min-height: 100vh;
  background: linear-gradient(160deg, #0a1520 0%, #0d2a45 40%, #0f3d63 70%, #0a2238 100%);
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 100px 20px 80px;
}

.hero-bg-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.07;
}

.hero-shape-1 {
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, var(--primary-light), transparent);
  top: -200px;
  right: -150px;
}

.hero-shape-2 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--accent), transparent);
  bottom: -100px;
  left: -100px;
  opacity: 0.05;
}

.hero-shape-3 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, var(--primary), transparent);
  top: 30%;
  left: 50%;
  opacity: 0.04;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,111,181,0.18);
  border: 1px solid rgba(26,111,181,0.35);
  color: #7ec8f0;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  background: #4fc8f0;
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hero-content h1 {
  font-size: clamp(32px, 4.5vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, #5db8f5, #2d8fe0, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: rgba(255,255,255,0.70);
  margin-bottom: 36px;
  font-weight: 400;
  line-height: 1.65;
  max-width: 500px;
}

.hero-cta-group {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 30px;
  border-radius: var(--radius);
  box-shadow: 0 6px 28px rgba(26,111,181,0.40);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(26,111,181,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 15px 30px;
  border-radius: var(--radius);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 36px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.50);
  font-weight: 500;
  margin-top: 3px;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-card-stack {
  position: relative;
  width: 100%;
  max-width: 420px;
}

.hero-main-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-lg);
  padding: 36px;
  position: relative;
  z-index: 2;
}

.hero-card-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.50);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 20px;
}

.hero-service-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.hero-service-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  transition: background 0.2s;
}

.hero-service-item:hover {
  background: rgba(255,255,255,0.09);
}

.service-icon-sm {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.service-name-sm {
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
}

.hero-float-card {
  position: absolute;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius);
  padding: 14px 18px;
  z-index: 3;
  bottom: -20px;
  right: -20px;
  box-shadow: 0 8px 30px rgba(232,160,32,0.35);
}

.float-card-top {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.80);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.float-card-main {
  font-size: 20px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.3px;
}

/* ─── SECTION STYLES ─── */
section {
  padding: 90px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ─── SLUZBY ─── */
#sluzby {
  background: var(--bg);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary-light);
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, #e8f4fd, #d0e9f8);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.service-card h3 {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
  flex: 1;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  margin-top: 4px;
}

.service-link:hover {
  gap: 10px;
}

/* ─── PROC MY ─── */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
  margin-top: 0;
}

.benefit-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 3px 3px 0 0;
  opacity: 0;
  transition: opacity 0.25s;
}

.benefit-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
}

.benefit-card:hover::after {
  opacity: 1;
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 24px;
  box-shadow: 0 8px 24px rgba(26,111,181,0.25);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.55);
}

#reference .section-tag {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.12);
  color: #7ec8f0;
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  transition: transform 0.25s, background 0.25s;
  position: relative;
}

.review-card:hover {
