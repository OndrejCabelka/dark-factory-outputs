<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(37,99,235,0.10);
      --shadow-hover: 0 8px 40px rgba(37,99,235,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));

      box-shadow: 0 8px 24px rgba(37,99,235,0.45);
    }

    .nav-cta span.icon {
      font-size: 16px;
    }

      overflow: hidden;
      padding: 100px 24px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:

      z-index: 1;

    .hero-buttons {

      position: relative;
      z-index: 1;
    }

    .btn-primary {

      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;

      background: rgba(255,255,255,0.10);

      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;

    .btn-secondary:hover {

      transform: translateY(-2px);
    }

    .hero-stats {

      flex-wrap: wrap;

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;

    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
      font-weight: 500;

    .container {
      max-width: 1200px;

    .section-tag {

    .section-title {

      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: #bfdbfe;
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(59,130,246,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--white);

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

    .benefit-item {

      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.3s;
      background: var(--white);
    }

    .benefit-item:hover {
      border-color: #bfdbfe;
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .benefit-num {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;

      justify-content: center;
      font-size: 20px;

      color: var(--white);

    .benefit-content h3 {

    }

    /* ── REVIEWS ── */
    #reference {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(37,99,235,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(59,130,246,0.18);
      color: #93c5fd;

    #reference .section-title {

    #reference .section-desc {
      color: #94a3b8;

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;

    .review-card {
      background: rgba(255,255,255,0.06);

      padding: 32px;

      transition: all 0.3s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(59,130,246,0.40);
      transform: translateY(-4px);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(37,99,235,0.4);
      font-style: normal;
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
    }

    .reviewer {
      display: flex;

    }

    .reviewer-avatar {

      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-name {
      font-size: 15px;

      color: var(--white);
    }

    .reviewer-city {

      font-weight: 800;
      color: var(--dark);
      margin-bottom: 28px;
      letter-spacing: -0.4px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .contact-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(59,130,246,0.18));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;

    }

    .contact-label {
      font-size: 12px;

    .map-placeholder h4 {

    .map-badge {

      color: #93c5fd;
      padding: 6px 14px;

      font-size: 13px;
      font-weight: 600;
    }
