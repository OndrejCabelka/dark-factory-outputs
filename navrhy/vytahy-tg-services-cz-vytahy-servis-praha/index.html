<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výtahy - TG Services | Servis a opravy výtahů Praha</title>
  <meta name="description" content="Profesionální servis výtahů v Praze a okolí. Rychlý zásah, kvalita garantována, přijatelné ceny. Volejte +420296220609">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f91;
      --primary-light: #3a8fd4;
      --accent: #f0a500;
      --dark: #0d1b2e;
      --dark-2: #142235;
      --dark-3: #1c2e44;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --light-bg: #f1f6fd;
      --border: #e2ecf7;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-lg: 0 8px 40px rgba(26,111,196,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-links {
      display: none;
      gap: 28px;
    }

    .nav-links a {
      color: #b0c4db;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-phone {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(26,111,196,0.4);
    }

    .btn-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(26,111,196,0.5);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0d1b2e 0%, #0f3460 40%, #1a5f8a 70%, #0d2d4a 100%);
      padding: 80px 20px 90px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -60px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,111,196,0.2);
      border: 1px solid rgba(26,111,196,0.4);
      color: #7ec8f5;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(26px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 1;
    }

    #hero h1 span {
      background: linear-gradient(90deg, #f0a500, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94b8d8;
      max-width: 620px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,111,196,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26,111,196,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, background 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 56px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 13px;
      color: #7da8c8;
      font-weight: 500;
      margin-top: 4px;
      display: block;
    }

    .hero-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
      min-height: 40px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      width: 20px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--light-bg);
    }

    .services-header {
      margin-bottom: 48px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(26,111,196,0.12);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-label {
      color: var(--accent);
    }

    #proc-my .section-label::before {
      background: var(--accent);
    }

    #proc-my .section-desc {
      color: #7da8c8;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 48px;
    }

    .benefit-card {
      background: var(--dark-3);
      border-radius: var(--radius);
      padding: 36px 28px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.25s, border-color 0.25s;
      position: relative;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      border-color: rgba(26,111,196,0.4);
    }

    .benefit-number {
      font-size: 52px;
      font-weight: 800;
      color: rgba(26,111,196,0.18);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      color: #7da8c8;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 48px;
    }

    .review-card {
      background: var(--light-bg);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .review-quote {
      font-size: 48px;
      line-height: 1;
      color: var(--primary);
      opacity: 0.3;
      margin-bottom: -8px;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-stars {
      color: var(--accent);
      font-size: 16px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #1a6fc4, #3a8fd4); }
    .avatar-2 { background: linear-gradient(135deg, #0f4f91, #1a6fc4); }
    .avatar-3 { background: linear-gradient(135deg, #f0a500, #ffd166); }

    .review-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--light-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      margin-top: 48px;
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 22px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text p {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: var(--dark-3);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .map-placeholder-inner {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .map-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,111,196,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,196,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-pin {
      font-size: 48px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 12px rgba(26,111,196,0.5));
    }

    .map-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }

    .map-sublabel {
      font-size: 13px;
      color: #7da8c8;
      margin-top: 4px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      padding: 40px 20px 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-top {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-bottom: 32px;
    }

    .footer-logo .logo-name {
      font-size: 18px;
    }

    .footer-tagline {
      font-size: 14px;
      color: #5a7a9a;
      margin-top: 8px;
    }
