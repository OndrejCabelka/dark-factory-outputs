<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesařství Paždík a Krakorec | Dřevostavby a rekonstrukce – Praha</title>
  <meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Volejte +420735051957.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E0A;
      --accent: #D47C2E;
      --accent-light: #E8A456;
      --dark: #1A0F08;
      --dark-mid: #2C1A0E;
      --text: #2C1A0E;
      --text-light: #6B4C35;
      --bg: #FAF6F2;
      --bg-section: #F5EDE4;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139,69,19,0.12);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(212,124,46,0.35);
    }

    .nav-cta:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212,124,46,0.5);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }

      .logo-name {
        font-size: 17px;
      }
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(
          155deg,
          rgba(26,15,8,0.93) 0%,
          rgba(44,26,14,0.88) 40%,
          rgba(92,46,10,0.82) 100%
        ),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(139,69,19,0.06) 40px,
          rgba(139,69,19,0.06) 80px
        );
      background-color: var(--dark);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(212,124,46,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139,69,19,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,124,46,0.18);
      border: 1px solid rgba(212,124,46,0.4);
      color: var(--accent-light);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 34px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(212,124,46,0.45);
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(212,124,46,0.6);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 34px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-outline:hover {
      border-color: var(--accent-light);
      background: rgba(212,124,46,0.12);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
      display: block;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    @media (min-width: 600px) {
      .hero-ctas {
        flex-direction: row;
      }
    }

    /* ─── SECTIONS ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 50px;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 500px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(139,69,19,0.08);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
      line-height: 1;
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(139,69,19,0.04) 60px,
        rgba(139,69,19,0.04) 120px
      );
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(212,124,46,0.2);
      color: var(--accent-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,124,46,0.2);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      text-align: center;
    }

    .benefit-card:hover {
      background: rgba(212,124,46,0.1);
      border-color: rgba(212,124,46,0.45);
      transform: translateY(-4px);
    }

    .benefit-icon {
      font-size: 50px;
      display: block;
      margin-bottom: 20px;
      line-height: 1;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 0.93rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.65;
    }

    /* ─── RECENZE ─── */
    #reference {
      background: var(--bg);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.08);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--accent);
      line-height: 0.8;
      font-family: Georgia, serif;
      margin-bottom: 16px;
      display: block;
      opacity: 0.7;
    }

    .review-stars {
      color: var(--accent);
      font-size: 16px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 22px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
    }

    .review-location {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--bg-section);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .contact-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 18px;
      border: 1px solid rgba(139,69,19,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      font-size: 28px;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(212,124,46,0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-item-body h4 {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-body a,
    .contact-item-body p {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--accent);
    }

    .contact-item-body p {
      color: var(--text);
      font-weight: 500;
      font-size: 0.97rem;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark-mid), var(--dark));
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.15);
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,124,46,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,124,46,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .map-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .map-pin {
      font-size: 56px;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 4px 12px rgba(212,124,46,0.5));
    }
