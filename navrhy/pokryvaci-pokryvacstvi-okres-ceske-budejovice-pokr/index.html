<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokrývači České Budějovice | Profesionální pokrývačství</title>
  <meta name="description" content="Profesionální pokrývač v Českých Budějovicích a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte +420388903101.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #C0392B;
      --primary-dark: #962d22;
      --primary-light: #e74c3c;
      --accent: #E67E22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3a3a3a;
      --light: #f8f6f3;
      --white: #ffffff;
      --gray: #6b7280;
      --gray-light: #e5e7eb;
      --text: #1f2937;
      --text-light: #4b5563;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: #d1d5db;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-tel {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(192,57,43,0.4);
    }

    .btn-tel:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(192,57,43,0.5);
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(160deg, rgba(20,10,8,0.92) 0%, rgba(90,25,15,0.88) 50%, rgba(30,20,10,0.93) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.015) 40px,
          rgba(255,255,255,0.015) 80px
        );
      background-color: #2a0e08;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 70% 50% at 80% 20%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 10% 80%, rgba(230,126,34,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .roof-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 50%, var(--primary) 100%);
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.5);
      color: #fca5a5;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      max-width: 800px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #d1d5db;
      max-width: 560px;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .stat-num span {
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 13px;
      color: #9ca3af;
      font-weight: 500;
      margin-top: 3px;
    }

    .hero-visual {
      display: none;
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
    }

    /* ===== SECTIONS SHARED ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.7rem, 3.5vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: all 0.3s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(230,126,34,0.22));
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px 24px;
      background: var(--light);
      border-radius: var(--radius);
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: linear-gradient(135deg, rgba(192,57,43,0.05), rgba(230,126,34,0.05));
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(192,57,43,0.3);
    }

    .benefit-content h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-content p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.1);
      color: #fca5a5;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #9ca3af;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .review-card {
      background: var(--dark2);
      border-radius: var(--radius);
      padding: 30px 26px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      border-color: rgba(192,57,43,0.4);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .review-quote {
      font-size: 40px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .review-text {
      color: #d1d5db;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .review-stars {
      color: #fbbf24;
      font-size: 16px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-info strong {
      display: block;
      color: var(--white);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .review-info span {
      color: #6b7280;
      font-size: 0.82rem;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 20px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: all 0.3s;
    }

    .contact-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-info {
      flex: 1;
    }

    .contact-item-info strong {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-info a,
    .contact-item-info span {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-info a:hover {
      color: var(--primary);
    }

    .contact-map {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    .map-placeholder {
      flex: 1;
      background: linear-gradient(135deg, #e8e4e0 0%, #d6cfc8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      min-height: 280px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.04) 40px, rgba(0,0,0,0.04) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.04) 40px, rgba(0,0,0,0.04) 41px);
    }

    .map-pin {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow: 0 4px 16px rgba(192,57,43,0.4);
      position: relative;
      z-index: 2;
    }

    .map-pin::after {
      content: '';
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .map-label {
      position: relative;
      z-index: 2;
      font-weight: 700;
