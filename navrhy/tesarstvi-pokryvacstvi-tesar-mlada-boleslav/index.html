<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařství - Pokrývačství | Mladá Boleslav</title>
<meta name="description" content="Profesionální tesař v Mladé Boleslavi a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Zavolejte +420605925135.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c47a2b;
  --primary-dark: #a0611a;
  --primary-light: #e8a84a;
  --accent: #8B4513;
  --dark: #1a1208;
  --dark2: #2c1f0e;
  --dark3: #3d2b14;
  --text: #1a1208;
  --text-light: #5a4a35;
  --text-muted: #8a7560;
  --white: #ffffff;
  --bg-light: #fdf8f2;
  --bg-card: #fff9f0;
  --border: #e8d5b8;
  --shadow: 0 4px 24px rgba(196,122,43,0.12);
  --shadow-hover: 0 8px 40px rgba(196,122,43,0.22);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(196,122,43,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 2px 12px rgba(196,122,43,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(196,122,43,0.5);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background: 
    linear-gradient(160deg, 
      rgba(26,18,8,0.97) 0%, 
      rgba(44,31,14,0.95) 40%, 
      rgba(61,43,20,0.92) 70%,
      rgba(139,69,19,0.88) 100%
    );
  overflow: hidden;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(196,122,43,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(232,168,74,0.1) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(139,69,19,0.2) 0%, transparent 40%);
  pointer-events: none;
}

.hero-wood-lines {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    95deg,
    transparent,
    transparent 60px,
    rgba(196,122,43,0.03) 60px,
    rgba(196,122,43,0.03) 61px
  );
  pointer-events: none;
}

.hero-content {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 80px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,122,43,0.2);
  border: 1px solid rgba(196,122,43,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(32px, 5.5vw, 62px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.12;
  letter-spacing: -1.5px;
  margin-bottom: 24px;
  max-width: 760px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.2vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 580px;
  margin-bottom: 44px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 24px rgba(196,122,43,0.45);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(196,122,43,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.2);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  letter-spacing: -1px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* ===== SECTION COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(196,122,43,0.1);
  color: var(--primary);
  border: 1px solid rgba(196,122,43,0.25);
  padding: 5px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.65;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 100px 20px;
  background: var(--bg-light);
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(196,122,43,0.3);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(196,122,43,0.15), rgba(232,168,74,0.1));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  border: 1px solid rgba(196,122,43,0.2);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s ease;
}

.service-link:hover {
  gap: 10px;
  color: var(--primary-dark);
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 100px 20px;
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.benefit-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 32px;
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.benefit-item:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: rgba(196,122,43,0.3);
}

.benefit-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(196,122,43,0.35);
}

.benefit-text h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.benefit-text p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 100px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 10% 50%, rgba(196,122,43,0.12) 0%, transparent 50%),
    radial-gradient(circle at 90% 30%, rgba(232,168,74,0.08) 0%, transparent 40%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-header p {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(196,122,43,0.2);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(196,122,43,0.4);
  transform: translateY(-4px);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
  opacity: 0.7;
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.star {
  color: var(--primary-light);
  font-size: 16px;
}

.review-text {
  font-size: 16px;
  color: rgba(255,255,255,0.8);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  color: var(--white);
  font-size: 15px;
  font-weight: 700;
}

.author-info span {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 100px 20px;
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 26px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.kontakt-item:hover {
  border-color: rgba(196,122,43,0.35);
  box-shadow: var(--shadow);
  transform: translateX(4px);
}

.kontakt-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-detail strong {
  display: block;
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-detail a {
  color: var(--primary);
  text-decoration: none;
  font-size: 18px;
  font-weight: 700;
  transition: color 0.2s;
}

.kontakt-detail a:hover {
  color: var(--primary-dark);
}

.kontakt-detail span {
  font-size: 16px;
  color: var(--text);
  font-weight: 500;
}

.mapa-placeholder {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden;
  height: 100%;
  min-height: 360px;
  display: flex;
  flex-direction: column;
}

.mapa-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--white);
  font-weight: 700;
  font-size: 15px;
}

.mapa-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 40px 24px;
  background: 
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(196,122,43,0.08) 39px,
      rgba(196,122,43,0.08) 40px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 39px,
      rgba(196,122,43,0.08) 39px,
      rgba(196,122,43,0.08) 40px
    );
}

.map-pin {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
