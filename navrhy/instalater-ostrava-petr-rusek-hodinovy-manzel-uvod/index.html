<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér & Topenář Ostrava – Petr Rusek | Hodinový manžel</title>
  <meta name="description" content="Profesionální instalatér a topenář v Ostravě a okolí. Petr Rusek – rychlý servis, kvalita garantována, přijatelná cena. Volejte 777 176 076.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1565C0;
      --primary-dark: #0D47A1;
      --primary-light: #1976D2;
      --accent: #FF6F00;
      --accent-light: #FFA726;
      --dark: #0A1628;
      --dark2: #0F2040;
      --dark3: #1a2d4a;
      --text: #1a1a2e;
      --text-muted: #5a6a7e;
      --white: #ffffff;
      --light-bg: #f0f4f8;
      --light-bg2: #e8f0fe;
      --border: #d0dbe8;
      --shadow: 0 4px 24px rgba(21,101,192,0.13);
      --shadow-hover: 0 8px 40px rgba(21,101,192,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(21,101,192,0.08);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
      background: var(--light-bg2);
    }

    .btn-call-nav {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(255,111,0,0.3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-call-nav:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,111,0,0.4);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 40%, var(--dark3) 70%, #1a3a6b 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(21,101,192,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,111,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,111,0,0.15);
      border: 1px solid rgba(255,111,0,0.35);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    #hero h1 {
      font-size: clamp(26px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--accent-light);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.78);
      max-width: 580px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-cta-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(255,111,0,0.38);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(255,111,0,0.48);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.3);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent-light);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      align-self: center;
    }

    /* ─── SECTION ОБЩИЕ ─── */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      margin-bottom: 10px;
      display: block;
    }

    .section-title {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 48px;
    }

    .section-head.center {
      text-align: center;
    }

    .section-head.center .section-desc {
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--light-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: var(--light-bg2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: background 0.25s, transform 0.25s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.08);
    }

    .service-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      box-shadow: 0 6px 28px rgba(10,22,40,0.18);
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      background: rgba(21,101,192,0.15);
      border-radius: 50%;
      pointer-events: none;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(10,22,40,0.28);
    }

    .benefit-num {
      font-size: 44px;
      font-weight: 800;
      color: rgba(255,255,255,0.08);
      line-height: 1;
      margin-bottom: -10px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      line-height: 1.7;
    }

    .benefit-accent {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-light);
      background: rgba(255,111,0,0.15);
      border: 1px solid rgba(255,111,0,0.3);
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--light-bg);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 48px;
      color: var(--light-bg2);
      line-height: 1;
      font-family: Georgia, serif;
    }

    .review-stars {
      font-size: 18px;
      color: #F9A825;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--light-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .contact-item:hover {
      background: var(--light-bg2);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .contact-item-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .contact-cta {
      background: linear-gradient(135deg, var(--dark), var(--dark2));
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      color: var(--white);
    }

    .contact-cta h3 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .contact-cta p {
      font-size: 15px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .contact-cta .btn-primary {
      width: 100%;
      justify-content: center;
      font-size: 17px;
      padding: 16px;
    }

    .contact-cta .btn-secondary {
      width: 100%;
      justify-content: center;
      margin-top: 10px;
      font-size: 15px;
    }

    .map-placeholder {
      background: var(--light-bg);
      border-radius: var(--radius-lg);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px dashed var(--border);
      margin-top: 16px;
    }

    .map-placeholder .map-icon {
      font-size: 36px;
    }

    .map-placeholder p {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ─── FOOTER ─── */
    footer {
      background:
