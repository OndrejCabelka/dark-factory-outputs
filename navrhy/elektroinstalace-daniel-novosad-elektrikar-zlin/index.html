<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektroinstalace – Daniel Novosad | Elektrikář Zlín</title>
  <meta name="description" content="Profesionální elektrikář ve Zlíně. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420 777 288 844.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5A800;
      --primary-dark: #D4900A;
      --primary-light: #FFD166;
      --dark: #0D0F14;
      --dark-2: #161921;
      --dark-3: #1E2230;
      --dark-4: #252A3A;
      --text-light: #E8EAED;
      --text-muted: #9AA0B0;
      --white: #FFFFFF;
      --card-bg: #1A1D28;
      --border: rgba(245,168,0,0.15);
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text-light);
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 100;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: rgba(13,15,20,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(245,168,0,0.3);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,168,0,0.45);
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(145deg, #08090D 0%, #111420 40%, #1A1500 100%);
    }

    .hero-bg-glow {
      position: absolute;
      top: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,168,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-bg-glow-2 {
      position: absolute;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,168,0,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1140px;
      margin: 0 auto;
      padding: 80px 20px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.03em;
    }

    #hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.12;
      color: var(--white);
      margin-bottom: 22px;
      max-width: 760px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: var(--text-muted);
      max-width: 580px;
      margin-bottom: 42px;
      font-weight: 400;
    }

    .hero-sub strong {
      color: var(--text-light);
      font-weight: 600;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      box-shadow: 0 6px 24px rgba(245,168,0,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245,168,0,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 14px 30px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,168,0,0.08);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ── SECTIONS COMMON ── */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1140px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 56px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--dark-2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      border-color: rgba(245,168,0,0.35);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,168,0,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,168,0,0.18);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-card .service-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 18px;
      text-decoration: none;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow);
    }

    .benefit-number {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 3.5rem;
      font-weight: 900;
      color: rgba(245,168,0,0.06);
      line-height: 1;
      pointer-events: none;
    }

    .benefit-icon {
      font-size: 2.2rem;
      margin-bottom: 18px;
    }

    .benefit-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── REVIEWS ── */
    #reference {
      background: var(--dark-2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--dark-4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 2rem;
      color: var(--primary);
      line-height: 0;
      vertical-align: -0.5rem;
      margin-right: 4px;
      font-style: normal;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--dark);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 32px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: border-color 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(245,168,0,0.4);
    }

    .contact-item-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,168,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
    }

    .contact-item-value:hover {
      color: var(--primary);
    }

    a.contact-item-value {
      transition: color 0.2s;
    }

    .map-placeholder {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .map-placeholder-header {
      background: var(--dark-4);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .map-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .map-dot-red { background: #FF6058; }
    .map-dot-yellow { background: #FFBD2E; }
    .map-dot-green { background: #28C940; }

    .map-placeholder-header span {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 6px;
    }

    .map-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 45%, rgba(245,168,0,0.06) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,168,0,0.04) 39px, rgba(245,168,0,0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,168,0,0.04) 39px, rgba(245,168,0,0.04) 40px);
    }

    .map-pin {
      font-size: 3rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px rgba(245,168,0,0.4));
    }

    .map-address {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
    }

    .map-city {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(245,168,0,0.3);
      padding: 8px 18px;
      border-radius: 50px;
      transition: background 0.2s, border-color 0.2s;
    }
