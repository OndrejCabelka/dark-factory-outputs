<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARPET – Topenář Ostrava | Rückauf Marek</title>
  <meta name="description" content="Profesionální topenář v Ostravě a okolí. Instalace, servis a opravy topení. Rychlý servis, kvalita garantována, přijatelná cena.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e85d04;
      --primary-dark: #c44a00;
      --primary-light: #f48c42;
      --secondary: #1a1a2e;
      --dark: #0f0f1a;
      --dark2: #16213e;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --bg-section: #f2f4f7;
      --border: #e0e4ea;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,93,4,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-main {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .logo-main span {
      color: var(--primary);
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta .icon {
      font-size: 17px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #2c1810 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -150px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,93,4,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,93,4,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,93,4,0.15);
      border: 1px solid rgba(232,93,4,0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -1.5px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #b0b8cc;
      max-width: 560px;
      margin-bottom: 44px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,93,4,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,93,4,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(232,93,4,0.10);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* ===== SECTIONS COMMON ===== */
    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,93,4,0.12);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      padding: 100px 20px;
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-card:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,93,4,0.15), rgba(232,93,4,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
    }

    .sluzba-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 100px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(232,93,4,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-subtitle {
      color: #aaa;
    }

    #proc-my .section-tag {
      background: rgba(232,93,4,0.2);
      color: var(--primary-light);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 40px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card:hover {
      background: rgba(232,93,4,0.08);
      border-color: rgba(232,93,4,0.3);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 56px;
      font-weight: 900;
      color: rgba(232,93,4,0.15);
      position: absolute;
      top: 16px;
      right: 24px;
      line-height: 1;
      pointer-events: none;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 18px;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.4px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #999;
      line-height: 1.75;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 100px 20px;
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.7;
      margin-bottom: 18px;
      font-family: Georgia, serif;
      opacity: 0.6;
    }

    .review-stars {
      color: #f5a623;
      font-size: 17px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-city {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 100px 20px;
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 24px 22px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.2s;
    }

    .kontakt-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .kontakt-icon-wrap {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value:hover {
      color: var(--primary);
    }

    .kontakt-item-note {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: var(--radius);
      height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 40px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 40px
      );
    }

    .map-pin {
      font-size: 52px;
      position: relative;
      z-index: 1;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .map-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      position: relative;
      z-index: 1;
    }

    .map-sub {
      font-size: 14px;
      color: #888;
      position: relative;
      z-index: 1;
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      transition: background 0.2s;
    }

    .map-btn:hover {
      background: var(--primary-dark);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      padding: 48px 20px 32px;
      color: #888;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }

    .footer-logo .logo-main {
      font-size: 22px;
    }

    .footer-logo .logo-sub {
      color: #666;
    }

    .footer-tagline {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      max-width: 260px;
    }

    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-links h4 {
      font
