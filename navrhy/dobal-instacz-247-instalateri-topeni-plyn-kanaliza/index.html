<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální instalatér v Hradci Králové – oprava vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení.">
<title>dobal-insta.cz – Instalatér Hradec Králové | 24/7 Havárie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #1358a0;
  --primary-light: #2d8de8;
  --accent: #f59e0b;
  --dark: #0d1b2e;
  --dark2: #112340;
  --dark3: #1a3354;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f0f6ff;
  --bg-card: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(26,111,196,0.10);
  --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── HEADER / NAVBAR ─── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: #7fa8d4;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-links {
  display: none;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: #a8c4e0;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.btn-emergency {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: var(--white);
  padding: 9px 18px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2px;
  white-space: nowrap;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(220,38,38,0.3);
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-emergency:hover {
  background: linear-gradient(135deg, #b91c1c, #dc2626);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(220,38,38,0.4);
}

.btn-emergency .pulse {
  width: 8px;
  height: 8px;
  background: #fca5a5;
  border-radius: 50%;
  display: inline-block;
  animation: pulse-ring 1.5s ease-in-out infinite;
}

@keyframes pulse-ring {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 40%, #0c2d5a 70%, #0e3872 100%);
  padding: 80px 20px 90px;
  position: relative;
  overflow: hidden;
  min-height: 92vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 80% 20%, rgba(26,111,196,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 10% 80%, rgba(13,87,160,0.20) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(45,141,232,0.08) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, rgba(240,246,255,0.05));
  pointer-events: none;
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,111,196,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,111,196,0.06) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.35);
  color: var(--accent);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  width: fit-content;
  letter-spacing: 0.3px;
}

.hero-content {
  max-width: 680px;
}

.hero-content h1 {
  font-size: clamp(28px, 5vw, 56px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, #60a5fa, #93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(15px, 2.5vw, 20px);
  color: #a8c4e0;
  margin-bottom: 36px;
  line-height: 1.6;
  max-width: 540px;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  padding: 16px 30px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s;
  box-shadow: 0 4px 24px rgba(26,111,196,0.35);
  white-space: nowrap;
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(26,111,196,0.45);
}

.btn-secondary-hero {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: var(--white);
  padding: 16px 30px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.25s;
  white-space: nowrap;
}

.btn-secondary-hero:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  padding-top: 12px;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
  letter-spacing: -0.5px;
}

.stat-number span {
  color: var(--accent);
}

.stat-label {
  font-size: 12px;
  color: #7fa8d4;
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.hero-visual {
  display: none;
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
}

.hero-card-float {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.hero-card-title {
  color: var(--white);
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-card-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: rgba(26,111,196,0.15);
  border-radius: var(--radius-sm);
  color: #c8ddf0;
  font-size: 14px;
  font-weight: 500;
}

.hero-card-item .icon {
  font-size: 18px;
  flex-shrink: 0;
}

/* ─── SECTION COMMONS ─── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-light);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(26,111,196,0.15);
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.5px;
  margin-bottom: 14px;
  line-height: 1.2;
}

.section-header p {
  font-size: 16px;
  color: var(--text-light);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ─── SLUZBY ─── */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  border: 1.5px solid transparent;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(26,111,196,0.15);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(45,141,232,0.15));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  transition: all 0.3s;
}

.sluzba-card:hover .sluzba-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  transform: scale(1.05);
}

.sluzba-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.sluzba-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
  margin-bottom: 16px;
}

.sluzba-features {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sluzba-features li {
  font-size: 13px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 7px;
}

.sluzba-features li::before {
  content: '✓';
  color: var(--primary);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}

.card-urgent {
  border-color: rgba(220,38,38,0.2);
  background: linear-gradient(135deg, #fff5f5, #ffffff);
}

.card-urgent::before {
  background: linear-gradient(90deg, #dc2626, #ef4444) !important;
}

.card-urgent .sluzba-icon {
  background: linear-gradient(135deg, rgba(220,38,38,0.1), rgba(239,68,68,0.15));
}

.card-urgent:hover .sluzba-icon {
  background: linear-gradient(135deg, #dc2626, #ef4444);
}

.urgent-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(220,38,38,0.1);
  color: #dc2626;
  padding: 3px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  text-transform: uppercase;
}

/* ─── PROC MY ─── */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(26,111,196,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(45,141,232,0.08) 0%, transparent 50%);
  pointer-events: none;
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-header p {
  color: #7fa8d4;
}

#proc-my .section-tag {
  background: rgba(26,111,196,0.2);
  border-color: rgba(26,111,196,0.3);
  color: #60a5fa;
}

.benefity-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s;
  text-align: center;
}

.benefit-card:hover {
  background: rgba(26,111,196,0.12);
  border-color: rgba(26,111,196,0.3);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(26,111,196,0.3);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: #a8c4e0;
  line-height: 1.7;
}

.benefit-highlight {
  display: inline-block;
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.3);
  color: var(--accent);
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 14px;
  letter-spacing: 0.3px;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--bg-light);
}

.recenze-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

.recenze-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  border: 1.5px solid transparent;
  position: relative;
}

.recenze-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 22px;
  font-size: 80px;
  color: rgba(26,111,196,0.08);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}

.recenze-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
  border-color: rgba(26,111,196,0.12);
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
}

.star {
  color: #f59e0b;
  font-size
