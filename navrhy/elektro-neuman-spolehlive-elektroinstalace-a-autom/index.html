<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elektro Neuman – Elektroinstalace a automatizace Liberec</title>
  <meta name="description" content="Profesionální elektrikář v Liberci a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420607525459" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C200;
      --primary-dark: #d4a800;
      --primary-light: #fff8d6;
      --dark: #0f1117;
      --dark2: #1a1d27;
      --dark3: #23273a;
      --text: #f0f0f0;
      --text-muted: #9aa0b8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --section-bg: #f7f8fc;
      --border: #e8eaf2;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(245,194,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: #1a1d27;
      line-height: 1.65;
    }

    /* ── PROPOSAL BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 2px solid var(--primary);
    }

    .navbar {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-tagline {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 40%, #0e1520 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(245,194,0,0.13) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(245,194,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,194,0,0.15);
      border: 1px solid rgba(245,194,0,0.35);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(15px, 2.2vw, 19px);
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 700;
      font-size: 16px;
      padding: 14px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,194,0,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,194,0,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      font-weight: 600;
      font-size: 16px;
      padding: 13px 26px;
      border-radius: var(--radius);
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,194,0,0.08);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 56px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── SECTIONS COMMON ── */
    .section-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark2);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-header p {
      font-size: 16px;
      color: #6b7280;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── SERVICES ── */
    #sluzby {
      padding: 80px 0;
      background: var(--section-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: transform 0.22s, box-shadow 0.22s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.25s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark2);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    /* ── PROC MY ── */
    #proc-my {
      padding: 80px 0;
      background: var(--dark2);
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: var(--text-muted);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--dark3);
      border-radius: var(--radius);
      padding: 36px 28px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: border-color 0.2s, transform 0.2s;
      text-align: center;
    }

    .benefit-card:hover {
      border-color: rgba(245,194,0,0.4);
      transform: translateY(-4px);
    }

    .benefit-icon {
      width: 64px;
      height: 64px;
      background: rgba(245,194,0,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      padding: 80px 0;
      background: var(--section-bg);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #374151;
      line-height: 1.7;
      margin-bottom: 18px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark2);
    }

    .review-info span {
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── KONTAKT ── */
    #kontakt {
      padding: 80px 0;
      background: var(--white);
    }

    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark2);
      margin-bottom: 24px;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px;
      background: var(--section-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .contact-item:hover {
      border-color: var(--primary);
    }

    .contact-item-icon {
      width: 42px;
      height: 42px;
      background: var(--primary-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .contact-item-body a,
    .contact-item-body p {
      font-size: 16px;
      color: var(--dark2);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary-dark);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1d27, #23273a);
      border-radius: var(--radius);
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(245,194,0,0.3);
      text-align: center;
      padding: 30px;
    }

    .map-placeholder .map-icon {
      font-size: 48px;
    }

    .map-placeholder h4 {
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
    }

    .map-placeholder p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .map-placeholder .map-tag {
      background: rgba(245,194,0,0.15);
      border: 1px solid rgba(245,194,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-top: 6px;
    }

    /* ── CTA STRIP ── */
    .cta-strip {
      background: linear-gradient(135deg, #F5C200 0%, #d4a800 100%);
      padding: 56px 20px;
      text-align: center;
    }

    .cta-strip h2 {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .cta-strip p {
      font-size: 16px;
      color: rgba(15,17,23,0.7);
      margin-bottom: 28px;
    }

    .cta-strip a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--dark);
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .cta-strip a:hover {
      background: #0f1117;
      transform: translateY(-2px);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      padding: 36px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .footer-inner {
      max-width: 1140px;
      margin: 0 auto;
    }

    .footer-logo {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
    }

    .footer-logo span {
      color: var(--primary);
    }

    .footer-tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .footer-links a {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--primary);
    }

    .footer-copy {
      font-size: 12px;
      color: rgba(154,160,184,0.55);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .contact-wrap {
        grid-template-columns: 1fr;
      }

      .map-placeholder {
        min-height: 220px;
      }

      .hero-stats {
        gap: 24px;
      }

      .logo-tagline {
        display: none;
      }
    }

    @media (max-width: 480px) {
      #hero {
        padding: 60px 16px 60px;
      }

      .navbar {
        height: 58px;
      }

      .nav-cta {
        font-size: 13px;
        padding: 8px 14px;
      }

      .hero-btns {
        flex-direction: column
