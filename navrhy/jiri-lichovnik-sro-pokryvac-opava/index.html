<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiří Lichovník s.r.o. – Profesionální pokrývač Opava</title>
  <meta name="description" content="Profesionální pokrývač v Opavě a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, střechy na klíč, vikýře.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2c2c2c;
      --text-light: #666;
      --bg-light: #f8f9fa;
      --bg-section: #f0f2f5;
      --white: #ffffff;
      --border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 12px;
      --transition: 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: color var(--transition);
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px !important;
      font-weight: 700 !important;
      text-decoration: none;
      transition: all var(--transition);
      box-shadow: 0 3px 12px rgba(192,57,43,0.3);
      white-space: nowrap;
    }

    .btn-nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.4);
    }

    .nav-mobile-hide {
      display: none;
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(
          135deg,
          rgba(15,20,40,0.93) 0%,
          rgba(96,28,18,0.88) 50%,
          rgba(15,20,40,0.95) 100%
        ),
        repeating-linear-gradient(
          45deg,
          rgba(192,57,43,0.04) 0px,
          rgba(192,57,43,0.04) 2px,
          transparent 2px,
          transparent 20px
        );
      background-color: #1a0a08;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(230,126,34,0.10) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ff8a7a;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.78);
      margin-bottom: 44px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.65;
    }

    .hero-cta-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      transition: all var(--transition);
      box-shadow: 0 6px 24px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      transition: all var(--transition);
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.2);
      align-self: stretch;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(192,57,43,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform var(--transition);
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: all var(--transition);
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      transform: scale(1.08);
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--bg-light), var(--white));
      border-radius: var(--radius);
      padding: 36px 30px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: all var(--transition);
      position: relative;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      border-color: rgba(192,57,43,0.2);
    }

    .benefit-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 52px;
      font-weight: 900;
      color: rgba(192,57,43,0.06);
      line-height: 1;
      pointer-events: none;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(192,57,43,0.3);
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
    }

    .benefit-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at top left, rgba(192,57,43,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(230,126,34,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(192,57,43,0.25);
      color: #ff8a7a;
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 30px 26px;
      backdrop-filter: blur(8px);
      transition: all var(--transition);
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(192,57,43,0.35);
      transform: translateY(-4px);
    }

    .review-quote {
      font-size: 44px;
      line-height: 0.8;
      color: var(--primary);
      margin-bottom: 16px;
      opacity: 0.7;
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.80);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 2px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-section);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all var(--transition);
    }

    .kontakt-item:hover {
      transform: translateX(4px);
      border-color: rgba(192,57,43,0.25);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(192,57,43,0.3);
    }

    .kontakt-item-content {
      flex: 1;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      transition: color var(--transition);
      line-height: 1.4;
    }

    .kontakt-item-value:hover {
      color: var(--primary);
    }

    .kontakt-item-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background:
