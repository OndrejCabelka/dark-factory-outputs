<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Liberec | Nedvěd | Podlahy, Schody, Kuchyně na míru</title>
  <meta name="description" content="Profesionální truhlářství v Liberci. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Zavolejte +420 608 818 109.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4328;
      --primary-light: #C4956A;
      --accent: #D4A574;
      --accent-light: #F0D5B8;
      --dark: #1A1208;
      --dark-2: #2C1F0E;
      --dark-3: #3D2B14;
      --text-dark: #1A1208;
      --text-muted: #6B5B4A;
      --text-light: #F5EDE3;
      --white: #FFFFFF;
      --bg-light: #FAF6F1;
      --bg-card: #FFFFFF;
      --shadow: 0 4px 24px rgba(139, 94, 60, 0.12);
      --shadow-hover: 0 8px 40px rgba(139, 94, 60, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 18, 8, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(196, 149, 106, 0.2);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: all 0.2s !important;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(139, 94, 60, 0.4);
    }

    .btn-nav:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139, 94, 60, 0.5) !important;
      color: var(--white) !important;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #0F0804 0%, #1A0F06 30%, #2C1810 60%, #1A0F06 100%);
      overflow: hidden;
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139, 94, 60, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 165, 116, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(107, 67, 40, 0.15) 0%, transparent 50%);
    }

    .hero-wood-lines {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(212, 165, 116, 1) 60px,
        rgba(212, 165, 116, 1) 62px
      );
    }

    .hero-decoration {
      position: absolute;
      right: -100px;
      top: 50%;
      transform: translateY(-50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(139, 94, 60, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 165, 116, 0.15);
      border: 1px solid rgba(212, 165, 116, 0.3);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      max-width: 800px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(245, 237, 227, 0.75);
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(139, 94, 60, 0.45);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139, 94, 60, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(245, 237, 227, 0.6);
      margin-top: 4px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 48px;
      background: rgba(212, 165, 116, 0.25);
      align-self: center;
    }

    /* ===== SECTION GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--accent-light);
      color: var(--primary-dark);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      border: 1px solid rgba(139, 94, 60, 0.06);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-6px);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-light), #F8ECD8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08) rotate(3deg);
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
      color: var(--primary-dark);
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      margin-top: 48px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-icon-wrap {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(139, 94, 60, 0.3);
    }

    .benefit-content h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .benefit-content p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .why-cta-wrap {
      text-align: center;
      margin-top: 52px;
      padding-top: 48px;
      border-top: 1px solid rgba(139, 94, 60, 0.1);
    }

    .why-cta-wrap p {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 20px;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, #1A0F06 0%, #2C1810 50%, #1A0F06 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(ellipse at 30% 50%, rgba(212, 165, 116, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(212, 165, 116, 0.2);
      color: var(--accent);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-subtitle {
      color: rgba(245, 237, 227, 0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 165, 116, 0.15);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(212, 165, 116, 0.3);
      transform: translateY(-4px);
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(245, 237, 227, 0.85);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-quote {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 60px;
      color: rgba(212, 165, 116, 0.12);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #8B5E3C, #C4956A); }
    .review-avatar.a2 { background: linear-gradient(135deg, #5C7A3E, #8BA86A); }
    .review-avatar.a3 { background: linear-gradient(135deg, #3E5C8B, #6A8AB8); }

    .review-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .review-info span {
      font-size: 12px;
      color: rgba(212, 165, 116, 0.7);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.25s;
    }

    .contact-item:hover {
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-light), #F8ECD8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-content span {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .contact-item-content a,
    .contact-
