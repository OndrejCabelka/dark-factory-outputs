<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zedníci Olomouc – Profesionální zednické práce</title>
  <meta name="description" content="Profesionální zednické práce v Olomouci a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte +420388903101.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8762a;
      --primary-dark: #a85e1a;
      --primary-light: #e8923a;
      --dark: #1a1410;
      --dark-2: #2a1f14;
      --dark-3: #3a2a1a;
      --text: #f5f0eb;
      --text-muted: #b8a898;
      --white: #ffffff;
      --card-bg: #ffffff;
      --section-bg: #f8f5f0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(200,118,42,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #333;
      background: #fff;
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1410 0%, #2e1e0e 40%, #3d2510 70%, #1a1410 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(200,118,42,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(200,118,42,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🧱';
      position: absolute;
      right: -30px;
      bottom: -30px;
      font-size: 260px;
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    .hero-inner {
      max-width: 740px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,118,42,0.20);
      border: 1px solid rgba(200,118,42,0.40);
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    #hero h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 19px);
      color: #c8b8a4;
      margin-bottom: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,118,42,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,118,42,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.30);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200,118,42,0.12);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: #998878;
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
      min-height: 40px;
    }

    /* ===== SECTIONS COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(200,118,42,0.12);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 800;
      color: #1a1410;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-header p {
      color: #666;
      font-size: 17px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      padding: 80px 20px;
      background: var(--section-bg);
    }

    .sluzby-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(200,118,42,0.08);
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,118,42,0.12), rgba(200,118,42,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.2s;
    }

    .sluzba-card:hover .sluzba-icon {
      transform: scale(1.08);
    }

    .sluzba-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: #1a1410;
      margin-bottom: 10px;
    }

    .sluzba-card p {
      color: #666;
      font-size: 15px;
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 80px 20px;
      background: #fff;
    }

    .proc-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .proc-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .proc-num {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .proc-content h3 {
      font-size: 19px;
      font-weight: 700;
      color: #1a1410;
      margin-bottom: 8px;
    }

    .proc-content p {
      color: #666;
      font-size: 15px;
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 80px 20px;
      background: linear-gradient(135deg, #1a1410 0%, #2a1e12 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '❝';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 200px;
      color: rgba(200,118,42,0.07);
      pointer-events: none;
      line-height: 1;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(200,118,42,0.20);
      color: var(--primary-light);
    }

    #reference .section-header p {
      color: #998878;
    }

    .ref-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .ref-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,118,42,0.20);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: background 0.25s, transform 0.25s;
      backdrop-filter: blur(4px);
    }

    .ref-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-4px);
    }

    .ref-stars {
      color: var(--primary-light);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .ref-text {
      color: #c8b8a4;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .ref-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .ref-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .ref-city {
      font-size: 13px;
      color: #887060;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 80px 20px;
      background: var(--section-bg);
    }

    .kontakt-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-info h2 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      color: #1a1410;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .kontakt-info .sub {
      color: #666;
      font-size: 16px;
      margin-bottom: 8px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: white;
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid rgba(200,118,42,0.10);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .kontakt-item:hover {
      box-shadow: 0 4px 20px rgba(200,118,42,0.12);
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, rgba(200,118,42,0.15), rgba(200,118,42,0.07));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-body strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .kontakt-item-body a,
    .kontakt-item-body span {
      font-size: 16px;
      font-weight: 600;
      color: #1a1410;
      text-decoration: none;
    }

    .kontakt-item-body a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(200,118,42,0.10);
      height: 100%;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .mapa-top {
      background: linear-gradient(135deg, var(--dark), var(--dark-2));
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px 24px;
      text-align: center;
    }

    .mapa-pin {
      font-size: 52px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .mapa-top h3 {
      color: var(--white);
      font-size: 20px;
      font-weight: 700;
    }

    .mapa-top p {
      color: #998878;
      font-size: 14px;
    }

    .mapa-bottom {
      background: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .mapa-bottom span {
      font-size: 14px;
      color: #666;
    }

    .mapa-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .mapa-btn:hover {
      background: var(--primary-light);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: #887060;
      padding: 32px 20px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-logo-icon {
      font-size: 22px;
    }

    .footer-info {
      display: flex;
      flex-direction: column;
      gap:
