<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt - Výroba výtahů, revize a servis výtahů Praha</title>
  <meta name="description" content="Profesionální výroba, montáž, revize a servis výtahů v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a56db;
      --primary-dark: #1240a8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark2: #1e293b;
      --dark3: #334155;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --white: #ffffff;
      --bg-light: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26, 86, 219, 0.10);
      --shadow-lg: 0 8px 40px rgba(15, 23, 42, 0.15);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER / NAVBAR */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26, 86, 219, 0.4);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26, 86, 219, 0.5);
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* HERO */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0f2952 40%, #1a3a6e 70%, #0d1f45 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(26, 86, 219, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(26, 86, 219, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(26, 86, 219, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .hero-content {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 86, 219, 0.25);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #93c5fd;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 .highlight {
      background: linear-gradient(135deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #94a3b8;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-sub strong {
      color: #cbd5e1;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(26, 86, 219, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(26, 86, 219, 0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      align-self: center;
    }

    /* SECTIONS COMMON */
    .section-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(26, 86, 219, 0.1), rgba(59, 130, 246, 0.1));
      color: var(--primary);
      border: 1px solid rgba(26, 86, 219, 0.2);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* SLUZBY */
    #sluzby {
      padding: 100px 0;
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(26, 86, 219, 0.15);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26, 86, 219, 0.12), rgba(59, 130, 246, 0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(5deg);
    }

    .service-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-desc {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 18px;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 10px;
    }

    /* PROC MY */
    #proc-my {
      padding: 100px 0;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      padding: 32px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(26, 86, 219, 0.3);
    }

    .benefit-body {}

    .benefit-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .benefit-desc {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* CTA BANNER */
    .cta-banner {
      background: linear-gradient(135deg, #0f2952, #1a3a6e, #0d1f45);
      padding: 72px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(26,86,219,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-banner-content {
      position: relative;
      z-index: 2;
      max-width: 640px;
      margin: 0 auto;
    }

    .cta-banner h2 {
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .cta-banner p {
      color: #94a3b8;
      font-size: 1.05rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* REFERENCE */
    #reference {
      padding: 100px 0;
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .review-quote {
      font-size: 3rem;
      line-height: 1;
      color: var(--primary-light);
      opacity: 0.3;
      margin-bottom: 8px;
      font-family: Georgia, serif;
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: var(--accent);
      font-size: 16px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info {}

    .reviewer-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
    }

    .reviewer-role {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* KONTAKT */
    #kontakt {
      padding: 100px 0;
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {}

    .contact-title {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .contact-subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(26, 86, 219, 0.25);
      box-shadow: var(--shadow);
    }

    .contact-
