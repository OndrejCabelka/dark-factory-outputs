<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zemní práce Heinz Jaroslav – Výkopové práce Brno</title>
  <meta name="description" content="Profesionální zemní a výkopové práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420 603 264 719.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E87C00;
      --primary-dark: #C46500;
      --primary-light: #FFA940;
      --dark: #1A1A1A;
      --dark2: #2C2C2C;
      --dark3: #3D3D3D;
      --text: #F0F0F0;
      --text-muted: #A0A0A0;
      --white: #FFFFFF;
      --section-bg: #F8F5F0;
      --card-bg: #FFFFFF;
      --border: #E8E0D4;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: var(--dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 3px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(232,124,0,0.4);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,124,0,0.5);
    }

    .nav-phone-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1A1208 0%, #2D1F0A 30%, #1A1208 60%, #0D0D0D 100%);
      position: relative;
      padding: 80px 20px 90px;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(232,124,0,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,169,64,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), var(--primary), transparent);
    }

    .hero-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        45deg,
        var(--primary) 0px,
        var(--primary) 2px,
        transparent 2px,
        transparent 30px
      );
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,124,0,0.15);
      border: 1px solid rgba(232,124,0,0.4);
      color: var(--primary-light);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-subtitle {
      font-size: clamp(15px, 2vw, 18px);
      color: #B8B0A0;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 600px;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 25px rgba(232,124,0,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(232,124,0,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      align-self: center;
    }

    .hero-visual {
      display: none;
    }

    @media (min-width: 900px) {
      .hero-inner {
        grid-template-columns: 1.2fr 0.8fr;
      }
      .hero-visual {
        display: flex;
        justify-content: center;
        align-items: center;
      }
    }

    .hero-visual-box {
      background: linear-gradient(145deg, #2D2010, #1A1208);
      border: 1px solid rgba(232,124,0,0.2);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .visual-icon {
      font-size: 80px;
      margin-bottom: 16px;
      display: block;
    }

    .visual-title {
      color: var(--white);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .visual-desc {
      color: #888;
      font-size: 14px;
    }

    .visual-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .visual-tag {
      background: rgba(232,124,0,0.15);
      color: var(--primary-light);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ===== SECTION COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-label {
      display: inline-block;
      background: rgba(232,124,0,0.1);
      color: var(--primary);
      border: 1px solid rgba(232,124,0,0.3);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 16px;
      color: #666;
      max-width: 550px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      padding: 80px 20px;
      background: var(--section-bg);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 520px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .service-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 45px rgba(232,124,0,0.15);
      border-color: rgba(232,124,0,0.4);
    }

    .service-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(232,124,0,0.12), rgba(232,124,0,0.05));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 18px;
      border: 1px solid rgba(232,124,0,0.2);
      transition: background 0.25s;
    }

    .service-card:hover .service-icon-wrap {
      background: linear-gradient(135deg, rgba(232,124,0,0.25), rgba(232,124,0,0.1));
    }

    .service-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      text-decoration: none;
    }

    .service-link:hover {
      text-decoration: underline;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 80px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(232,124,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    .benefits-grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(232,124,0,0.08);
      border-color: rgba(232,124,0,0.3);
      transform: translateY(-4px);
    }

    .benefit-icon {
      font-size: 42px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-desc {
      font-size: 14px;
      color: #999;
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 80px 20px;
      background: var(--section-bg);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.1);
    }

    .review-quote {
      font-size: 36px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--primary);
      font-size: 17px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: #444;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }

    .review-verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(52,199,89,0.1);
      color: #1a8a3a;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      margin-top: 4px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 80px 20px;
      background: var(--white);
    }

    .kontakt-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 800px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .kontakt-subtitle {
      font-size: 15px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px;
      background: var(--section-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    a.contact-item:hover {
      border-color: rgba(232,124,0,0.4);
      box
