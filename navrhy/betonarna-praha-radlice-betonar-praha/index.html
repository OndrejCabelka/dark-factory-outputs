<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betonárna Praha - Radlice | Profesionální betonář Praha</title>
<meta name="description" content="Profesionální betonářské práce v Praze a okolí. Rychlý servis, garantovaná kvalita, přijatelná cena. Volejte 602 664 055.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E65C00;
  --primary-dark: #bf4d00;
  --primary-light: #ff7a2f;
  --secondary: #1a1a2e;
  --dark: #0f0f1a;
  --gray-dark: #2d2d3a;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --white: #ffffff;
  --accent: #f59e0b;
  --text: #1f2937;
  --text-light: #6b7280;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* BANNER */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* HEADER / NAVBAR */
header {
  background: var(--dark);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 2px solid var(--primary);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(230,92,0,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(230,92,0,0.5);
}

/* HERO */
#hero {
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 30%, #2d1a0e 70%, #1a0a00 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 80px;
  min-height: 85vh;
  display: flex;
  align-items: center;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(ellipse at 20% 50%, rgba(230,92,0,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 60% 80%, rgba(230,92,0,0.1) 0%, transparent 40%);
  pointer-events: none;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(230,92,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,92,0,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-content {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,92,0,0.15);
  border: 1px solid rgba(230,92,0,0.3);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(32px, 5.5vw, 64px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 8px 30px rgba(230,92,0,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(230,92,0,0.55);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.2);
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
}

.hero-stat {
  text-align: center;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
}

.hero-stat-number span {
  color: var(--primary-light);
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 4px;
}

.hero-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* SECTIONS COMMON */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-block;
  background: linear-gradient(135deg, rgba(230,92,0,0.1), rgba(245,158,11,0.1));
  border: 1px solid rgba(230,92,0,0.2);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* SERVICES */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--white);
  border-radius: 16px;
  padding: 36px 28px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.05);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(230,92,0,0.1), rgba(245,158,11,0.1));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(230,92,0,0.2), rgba(245,158,11,0.2));
  transform: scale(1.1);
}

.service-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* PROC MY */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(230,92,0,0.1) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

#proc-my .section-label {
  background: rgba(230,92,0,0.15);
  border-color: rgba(230,92,0,0.3);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  max-width: 1200px;
  margin: 0 auto;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(230,92,0,0.05), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: 16px;
}

.benefit-card:hover {
  border-color: rgba(230,92,0,0.3);
  transform: translateY(-4px);
  background: rgba(255,255,255,0.06);
}

.benefit-card:hover::after {
  opacity: 1;
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 20px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-desc {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

.benefit-number {
  font-size: 56px;
  font-weight: 900;
  color: rgba(230,92,0,0.15);
  position: absolute;
  top: 16px;
  right: 20px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

/* REFERENCE */
#reference {
  background: var(--white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
}

.review-card {
  background: var(--white);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.1);
}

.review-quote {
  font-size: 40px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  font-family: Georgia, serif;
}

.review-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-stars {
  color: var(--accent);
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--text);
  font-size: 15px;
}

.review-role {
  font-size: 12px;
  color: var(--text-light);
}

/* KONTAKT */
#kontakt {
  background: var(--gray-light);
}

.contact-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  background: var(--white);
  border-radius: 16px;
  padding: 24px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.05);
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
}

.contact-item:hover {
  transform: translateX(6px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  border-color: rgba(230,92,0,0.2);
}

.contact-item-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  color: var(--white);
}

.contact-item-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.contact-item-value a {
  color: var(--primary);
  text-decoration: none;
}

.contact-item-value a:hover {
  text-decoration: underline;
}

.map-placeholder {
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  border: 1px solid rgba(0,0,0,0.05);
  height: 100%;
  min-height: 350px;
  display: flex;
  flex-direction: column;
}

.map-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 20px 24px;
  color: var(--white);
}

.map-header-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.map-header-sub {
  font-size: 13px;
  opacity: 0.8;
}

.map-visual {
  flex: 1;
  background: 
    linear-gradient(rgba(230,92,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,92,0,0.03) 1px, transparent 1px),
    linear-gradient(135deg, #f0f0f0, #e8e8e8);
  background-size: 30px 30px, 30px 30px, 100% 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.map-pin {
  text-align: center;
}

.map-pin-icon {
  font-size: 48px;
  display: block;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  animation: bounce 2s ease
