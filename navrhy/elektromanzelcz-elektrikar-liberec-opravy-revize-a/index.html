<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální elektrikář v Liberci – elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420776022601">
<title>Elektromanžel.cz – Elektrikář Liberec | Instalace, Revize, Opravy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C400;
  --primary-dark: #D4A800;
  --primary-light: #FFF3B0;
  --dark: #0D0D0D;
  --dark-2: #1A1A1A;
  --dark-3: #242424;
  --dark-4: #2E2E2E;
  --text-light: #F0F0F0;
  --text-muted: #A0A0A0;
  --white: #FFFFFF;
  --accent-blue: #1A3A5C;
  --shadow: 0 4px 24px rgba(0,0,0,0.18);
  --shadow-card: 0 2px 16px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--white);
  color: var(--dark);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  border-bottom: 2px solid var(--primary);
  position: sticky;
  top: 0;
  z-index: 1000;
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: var(--text-light);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-call-nav {
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.btn-call-nav:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0D0D0D 0%, #1a1a0a 40%, #1A1A00 70%, #2a2200 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 88vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 520px;
  height: 520px;
  background: radial-gradient(circle, rgba(245,196,0,0.18) 0%, transparent 65%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -60px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,196,0,0.10) 0%, transparent 65%);
  pointer-events: none;
}

.hero-grid {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,196,0,0.12);
  border: 1px solid rgba(245,196,0,0.35);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-grid h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
  max-width: 780px;
}

.hero-grid h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(240,240,240,0.75);
  max-width: 580px;
  margin-bottom: 36px;
  line-height: 1.5;
  font-weight: 400;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: var(--radius);
  font-weight: 800;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(245,196,0,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,196,0,0.45);
}

.btn-secondary {
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(245,196,0,0.06);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 3px;
}

/* ===== SEKCE OBECNĚ ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-light);
  color: #8a6e00;
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  margin-bottom: 12px;
  line-height: 1.2;
}

.section-desc {
  font-size: 16px;
  color: #555;
  max-width: 560px;
  line-height: 1.6;
}

.section-header {
  margin-bottom: 48px;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: #F8F8F6;
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow-card);
  border: 1.5px solid #EFEFEF;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--primary);
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.13);
  border-color: var(--primary);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, #FFF8D0, #FFE860);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: transform 0.2s;
}

.service-card:hover .service-icon {
  transform: scale(1.08);
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 16px;
  color: #A07800;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 9px;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '⚡';
  position: absolute;
  font-size: 400px;
  opacity: 0.03;
  top: -60px;
  right: -40px;
  line-height: 1;
  pointer-events: none;
  user-select: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: var(--text-muted);
}

#proc-my .section-label {
  background: rgba(245,196,0,0.12);
  color: var(--primary);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
}

.benefit-card {
  background: var(--dark-3);
  border-radius: var(--radius);
  padding: 32px 28px;
  border: 1.5px solid var(--dark-4);
  transition: border-color 0.25s, transform 0.25s;
  position: relative;
}

.benefit-card:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(245,196,0,0.15);
  line-height: 1;
  margin-bottom: -10px;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 32px;
  margin-bottom: 14px;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.benefit-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

.benefit-highlight {
  display: inline-block;
  margin-top: 14px;
  background: rgba(245,196,0,0.1);
  border: 1px solid rgba(245,196,0,0.2);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 50px;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.review-card {
  background: #FAFAFA;
  border-radius: var(--radius);
  padding: 28px;
  border: 1.5px solid #EFEFEF;
  box-shadow: var(--shadow-card);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.10);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 72px;
  color: var(--primary);
  opacity: 0.25;
  line-height: 1;
  font-family: Georgia, serif;
}

.review-stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: #333;
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--dark);
  font-size: 16px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.review-location {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.review-verified {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: #2e7d32;
  font-weight: 600;
  margin-top: 4px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: linear-gradient(135deg, #111111 0%, #1c1c00 100%);
}

#kontakt .section-title {
  color: var(--white);
}

#kontakt .section-desc {
  color: var(--text-muted);
}

#kontakt .section-label {
  background: rgba(245,196,0,0.12);
  color: var(--primary);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--dark-3);
  border-radius: var(--radius);
  padding: 20px;
  border: 1.5px solid var(--dark-4);
  text-decoration: none;
  transition: border-color 0.2s, transform 0.2s;
}

.contact-item:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

.contact-icon-wrap {
  width: 48px;
  height: 48px;
  background: rgba(245,196,0,0.12);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 3px;
}

.contact-item-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
}

.contact-item-value small {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
  display: block;
  margin-top: 2px;
}

.map-placeholder {
  background: var(--dark-3);
  border-radius: var(--radius);
  border: 1.5px solid var(--dark-4);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 15px;
  text-align: center;
  padding: 28px;
}

.map-placeholder .map-icon {
  font-size: 48px;
  opacity: 0.6;
}

.map-placeholder strong {
  color: var(--white);
  font-size: 16px;
}

.map-placeholder span {
  font-size: 13px;
}

.work-hours {
  background: var(--dark-3);
  border-radius: var(--radius);
  padding: 22px;
  border: 1.5px solid var(--dark-4);
}

.work-hours-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hours-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}

.hours-row:last-child {
  border-bottom: none;
}

.hours-day {
  color: var(--text-muted);
}

.hours-time {
  color: var(--white);
  font-weight: 600;
}

.hours-available {
  color: #4caf50;
  font-size: 11px;
  font-weight: 600;
}

.contact-cta-big {
  text-
