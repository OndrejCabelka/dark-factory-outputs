<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakty – Specializované Stavebniny | Sádrokarton Praha</title>
<meta name="description" content="Profesionální sádrokartonové práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte 602 645 380.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e07b1f;
  --primary-dark: #b85e0a;
  --primary-light: #f5a04a;
  --dark: #1a1208;
  --dark2: #2d1f0a;
  --text: #2c2c2c;
  --text-light: #6b6b6b;
  --bg-light: #fdf8f2;
  --bg-card: #ffffff;
  --border: #e8d5b7;
  --white: #ffffff;
  --hero-gradient: linear-gradient(135deg, #1a1208 0%, #2d1f0a 40%, #4a2d0e 70%, #6b3d12 100%);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg-light);
  line-height: 1.6;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
  opacity: 0.9;
}

/* ─── HEADER ─── */
header {
  background: #1a1208;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid var(--primary);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 64px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  transition: background 0.2s, transform 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(224,123,31,0.4);
}

.header-cta:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* ─── HERO ─── */
#hero {
  background: var(--hero-gradient);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(224,123,31,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(245,160,74,0.1) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '🔨';
  position: absolute;
  right: -20px;
  bottom: -30px;
  font-size: 280px;
  opacity: 0.04;
  line-height: 1;
  pointer-events: none;
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(224,123,31,0.2);
  border: 1px solid rgba(224,123,31,0.4);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(15px, 2vw, 19px);
  color: rgba(255,255,255,0.75);
  max-width: 560px;
  margin: 0 auto 36px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(224,123,31,0.5);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(224,123,31,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.35);
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 52px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  display: block;
  font-size: 32px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}

/* ─── SEKCE OBECNĚ ─── */
section {
  padding: 72px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(224,123,31,0.12);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(24px, 3.5vw, 36px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 48px;
}

/* ─── SLUŽBY ─── */
#sluzby {
  background: var(--bg-light);
}

#sluzby .section-header {
  text-align: center;
  margin-bottom: 0;
}

#sluzby .section-desc {
  margin: 0 auto 48px;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 32px 28px;
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.sluzba-karta:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.12);
  border-color: var(--primary-light);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  font-size: 40px;
  margin-bottom: 16px;
  display: block;
  line-height: 1;
}

.sluzba-karta h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.sluzba-karta p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ─── PROČ MY ─── */
#proc-my {
  background: linear-gradient(135deg, #1a1208 0%, #2d1f0a 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(224,123,31,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(224,123,31,0.2);
  color: var(--primary-light);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  margin-top: 0;
}

.benefit-karta {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 36px 28px;
  transition: all 0.3s;
  position: relative;
}

.benefit-karta:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(224,123,31,0.4);
  transform: translateY(-4px);
}

.benefit-num {
  font-size: 48px;
  font-weight: 900;
  color: var(--primary);
  opacity: 0.3;
  line-height: 1;
  margin-bottom: 8px;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}

.benefit-karta h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-karta p {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--bg-light);
}

#reference .section-header {
  text-align: center;
}

#reference .section-desc {
  margin: 0 auto 48px;
}

.recenze-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 32px 28px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: all 0.3s;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.1);
}

.recenze-karta::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 80px;
  color: var(--primary);
  opacity: 0.12;
  font-family: Georgia, serif;
  line-height: 1;
}

.hvezdicky {
  color: #f5a623;
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.recenze-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.autor-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.autor-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
}

.autor-info span {
  font-size: 12px;
  color: var(--text-light);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: #fff;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
    gap: 32px;
  }
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-polozka {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px;
  background: var(--bg-light);
  border-radius: 12px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.kontakt-polozka:hover {
  border-color: var(--primary-light);
  box-shadow: 0 4px 16px rgba(224,123,31,0.1);
}

.kontakt-polozka-icon {
  font-size: 24px;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.kontakt-polozka-info strong {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-polozka-info a,
.kontakt-polozka-info span {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  text-decoration: none;
  display: block;
}

.kontakt-polozka-info a:hover {
  color: var(--primary);
}

.kontakt-polozka-info .sub {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 400;
  margin-top: 2px;
}

.mapa-placeholder {
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid var(--border);
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, #2d1f0a 0%, #4a2d0e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
}

.mapa-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
}

.mapa-pin {
  font-size: 52px;
  position: relative;
  z-index: 1;
}

.mapa-text {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  position: relative;
  z-index: 1;
}

.mapa-text span {
  display: block;
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 4px;
}

/* ─── CALL TO ACTION STRIP ─── */
.cta-strip {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  padding: 48px 20px;
  text-align: center;
}

.cta-strip h2 {
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.cta-strip p {
  color: rgba(255,255,255,0.8);
  font-size: 16px;
  margin-bottom: 28px;
}

.btn-white {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  color: var(--primary-dark);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 16px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.25);
}

/* ─── FOOTER ─── */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.6);
  padding: 32px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.
