<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář Praha – Černý Most | Elektroinstalace, Revize, Fotovoltaika</title>
  <meta name="description" content="Profesionální elektrikář v Praze a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 777 889 581.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #f5a800;
      --primary-dark: #d48c00;
      --primary-light: #ffd04d;
      --dark: #0d0f14;
      --dark2: #161a24;
      --dark3: #1e2433;
      --card-bg: #1a1f2e;
      --text: #e8eaf0;
      --text-muted: #8b92a8;
      --white: #ffffff;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-hover: 0 8px 40px rgba(245,168,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(13, 15, 20, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,168,0,0.15);
      padding: 0 20px;
    }

    nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,168,0,0.4);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background:
        radial-gradient(ellipse at 70% 50%, rgba(245,168,0,0.12) 0%, transparent 65%),
        radial-gradient(ellipse at 10% 80%, rgba(245,168,0,0.07) 0%, transparent 50%),
        linear-gradient(160deg, #0a0c10 0%, #111420 40%, #0d1020 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      top: 10%;
      right: -5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,168,0,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.25);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    #hero h1 {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 20px;
      max-width: 750px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 36px;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: var(--radius);
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,168,0,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(245,168,0,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--white);
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: var(--radius);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(245,168,0,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,168,0,0.1);
      border: 1px solid rgba(245,168,0,0.2);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 540px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      border-color: rgba(245,168,0,0.25);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 52px;
      height: 52px;
      background: rgba(245,168,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 18px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,168,0,0.18);
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-card .service-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 8px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,168,0,0.2);
    }

    .benefit-icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(245,168,0,0.15), rgba(245,168,0,0.05));
      border: 1px solid rgba(245,168,0,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }

    .benefit-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,168,0,0.18);
    }

    .review-quote {
      font-size: 40px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0.6;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--primary);
      font-size: 15px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 18px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--dark);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 48px;
        align-items: start;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(245,168,0,0.25);
      box-shadow: 0 4px 20px rgba(245,168,0,0.08);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: rgba(245,168,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-content {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .contact-value a {
      color: var(--primary);
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-light);
    }

    .contact-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .map-placeholder {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(245,168,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-icon {
      font-size: 48px;
      opacity: 0.5;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      text-align: center
