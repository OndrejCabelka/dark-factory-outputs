<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michal Rosenkranz – Obkladačské práce Brno</title>
  <meta name="description" content="Profesionální obkladač v Brně a okolí. Pokládka obkladů, dlažby, koupelny na klíč, terasy, epoxidové spárování a hydroizolace.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a06a06;
      --primary-light: #f0a830;
      --accent: #e8a020;
      --dark: #1a1208;
      --dark-2: #2a1f0e;
      --dark-3: #3a2d18;
      --text: #1a1208;
      --text-muted: #6b5c3e;
      --text-light: #9b8a6a;
      --bg-light: #fdf8f0;
      --bg-section: #faf5eb;
      --white: #ffffff;
      --border: #e8d9b8;
      --shadow: 0 4px 24px rgba(200, 134, 10, 0.12);
      --shadow-hover: 0 8px 40px rgba(200, 134, 10, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 18, 8, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200, 134, 10, 0.25);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-decoration: none;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(200, 134, 10, 0.35);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(200, 134, 10, 0.45);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 18px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      background: linear-gradient(160deg, #1a1208 0%, #2e1d08 35%, #3d2710 60%, #1a1208 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 30%, rgba(200, 134, 10, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(200, 134, 10, 0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(200, 134, 10, 0.04) 60px,
          rgba(200, 134, 10, 0.04) 61px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(200, 134, 10, 0.04) 60px,
          rgba(200, 134, 10, 0.04) 61px
        );
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200, 134, 10, 0.18);
      border: 1px solid rgba(200, 134, 10, 0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-inner h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
      max-width: 780px;
    }

    .hero-inner h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 42px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(200, 134, 10, 0.4);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(200, 134, 10, 0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.28);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-number span {
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 540px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200, 134, 10, 0.35);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(200, 134, 10, 0.12), rgba(200, 134, 10, 0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(200, 134, 10, 0.2);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: linear-gradient(160deg, #1a1208 0%, #2e1d08 50%, #1a1208 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(200, 134, 10, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-label {
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(200, 134, 10, 0.2);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(200, 134, 10, 0.45);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      color: rgba(200, 134, 10, 0.25);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 48px;
      color: rgba(200, 134, 10, 0.15);
      font-family: Georgia, serif;
      line-height: 0;
      vertical-align: -16px;
      margin-right: 4px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .review-author-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 900px) {
      .contact-layout {
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: start;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 22px 24px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      transition: all 0.25s;
    }

    .contact-item:hover {
      border-color: rgba(200, 134, 10, 0.4);
      box-shadow: var(--shadow);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .contact-item-text .sub-text {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--bg-section), var(--bg-light));
      border-radius: var(--radius-lg);
      border: 2px dashed var(--border);
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px;
      text-align: center;
    }

    .map-placeholder-icon {
      font-size: 52px;
      opacity: 0.6;
    }

    .map-placeholder
