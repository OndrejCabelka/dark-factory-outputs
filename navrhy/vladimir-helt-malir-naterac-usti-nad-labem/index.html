<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vladimír Helt – Malíř natěrač Ústí nad Labem</title>
  <meta name="description" content="Profesionální malíř natěrač Vladimír Helt v Ústí nad Labem. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Volejte +420603877958.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8630a;
      --primary-dark: #c4510a;
      --primary-light: #f4853a;
      --accent: #f5a623;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #f8f6f3;
      --bg-card: #ffffff;
      --border: #e8e0d6;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,99,10,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 3px 12px rgba(232,99,10,0.35);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,99,10,0.45);
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: 0.3s;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #1a1204 0%, #2d1f08 30%, #3d2a0a 60%, #1e1608 100%);
      overflow: hidden;
      padding: 90px 20px 100px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,99,10,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,166,35,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 90%, rgba(232,99,10,0.10) 0%, transparent 60%);
    }

    .hero-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,99,10,0.2);
      border: 1px solid rgba(232,99,10,0.4);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      position: relative;
    }

    .hero-content {
      position: relative;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(232,99,10,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(232,99,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      display: block;
    }

    .hero-stat-num span {
      color: var(--primary-light);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===== SECTION GLOBALS ===== */
    section {
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 56px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(232,99,10,0.1), rgba(245,166,35,0.1));
      color: var(--primary);
      border: 1px solid rgba(232,99,10,0.2);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 16px;
      line-height: 1.7;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,99,10,0.25);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,99,10,0.12), rgba(245,166,35,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .service-card .service-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      margin-top: 16px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 9px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 28px 24px;
      border: 1.5px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(232,99,10,0.3);
    }

    .benefit-body h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 7px;
      letter-spacing: -0.2px;
    }

    .benefit-body p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, #1a1204 0%, #2d1f08 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(232,99,10,0.15) 0%, transparent 70%);
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.6);
    }

    #reference .section-tag {
      background: rgba(232,99,10,0.2);
      border-color: rgba(232,99,10,0.4);
      color: var(--accent);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 22px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 30px 26px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, background 0.3s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.1);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.av1 { background: linear-gradient(135deg, #e8630a, #c4510a); }
    .review-avatar.av2 { background: linear-gradient(135deg, #0f3460, #16213e); }
    .review-avatar.av3 { background: linear-gradient(135deg, #6a3d9a, #4a2b7a); }

    .review-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .review-info span {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    .review-quote {
      font-size: 56px;
      line-height: 1;
      color: rgba(232,99,10,0.3);
      font-family: Georgia, serif;
      margin-bottom: -10px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .kontakt-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .kontakt-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-card-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(232,99,10,0.3);
    }

    .kontakt-card-body strong {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--primary);
      font-weight: 600
