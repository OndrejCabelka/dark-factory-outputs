<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kherlengiin HOOD – Truhlář Chomutov</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c17f3a;
  --primary-dark: #9e6429;
  --primary-light: #e8a55a;
  --dark: #1a1208;
  --dark2: #2a1e0e;
  --dark3: #3d2e18;
  --text: #1a1208;
  --text-muted: #6b5a3e;
  --bg-light: #fdf8f2;
  --bg-cream: #f5ede0;
  --white: #ffffff;
  --shadow: 0 4px 24px rgba(193,127,58,0.12);
  --shadow-hover: 0 8px 40px rgba(193,127,58,0.22);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.3px;
}

.logo-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--primary-light);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.nav-cta:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1208 0%, #2e1e09 35%, #4a2e10 65%, #3d2415 100%);
  position: relative;
  padding: 80px 20px 90px;
  overflow: hidden;
  min-height: 80vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 40%, rgba(193,127,58,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 70%, rgba(193,127,58,0.10) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '🪵';
  position: absolute;
  font-size: 340px;
  right: -40px;
  bottom: -40px;
  opacity: 0.05;
  pointer-events: none;
  line-height: 1;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(193,127,58,0.2);
  border: 1px solid rgba(193,127,58,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 56px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  max-width: 700px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: rgba(255,255,255,0.75);
  max-width: 560px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(193,127,58,0.4);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(193,127,58,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  border: 2px solid rgba(255,255,255,0.35);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary-light);
  background: rgba(193,127,58,0.12);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 56px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 30px;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.3px;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 90px 20px;
  background: var(--bg-light);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 540px) {
  .services-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 1100px) {
  .services-grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 34px 26px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  border: 2px solid transparent;
  cursor: default;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary);
}

.service-icon {
  font-size: 42px;
  line-height: 1;
}

.service-card h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.service-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

.service-card-link {
  margin-top: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-card-link {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 90px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(193,127,58,0.07) 0%, transparent 70%);
  pointer-events: none;
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-label {
  color: var(--primary-light);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.55);
}

.benefits-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
  position: relative;
  z-index: 1;
}

@media (min-width: 768px) {
  .benefits-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(193,127,58,0.2);
  border-radius: var(--radius);
  padding: 40px 30px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(193,127,58,0.09);
  border-color: rgba(193,127,58,0.45);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
  box-shadow: 0 4px 16px rgba(193,127,58,0.35);
}

.benefit-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.62);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 90px 20px;
  background: var(--bg-cream);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 768px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 34px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-stars {
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--primary);
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  font-style: italic;
  flex: 1;
}

.review-text::before {
  content: '"';
  font-size: 48px;
  color: var(--primary);
  line-height: 0;
  vertical-align: -18px;
  margin-right: 2px;
  font-style: normal;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid rgba(193,127,58,0.15);
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--white);
  font-weight: 700;
  flex-shrink: 0;
}

.review-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.review-location {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 90px 20px;
  background: var(--bg-light);
}

.contact-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
}

@media (min-width: 860px) {
  .contact-inner {
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-info h2 {
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.contact-info h2 span {
  color: var(--primary);
}

.contact-info > p {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.65;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-body {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
}

a.contact-item-value:hover {
  color: var(--primary);
}

.map-placeholder {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 4/3;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  border: 2px solid rgba(193,127,58,0.2);
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, rgba(193,127,58,0.04) 0px, rgba(193,127,58,0.04) 1px, transparent 1px, transparent 40px),
    repeating-linear-gradient(90deg, rgba(193,127,58,0.04) 0px, rgba(193,127,58,0.04) 1px, transparent 1px, transparent 40px);
}

.map-pin {
  font-size: 52px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 16px rgba(193,127,58,0.5));
}

.map-text {
  position: relative;
  z-index: 1;
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  font-weight: 500;
  text-align: center;
}

.map-subtext {
  position: relative;
  z-index: 1;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  text-align: center;
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  padding: 40px 20px 30px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.footer-top {
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: flex-start;
}

@media (min-width: 640px) {
