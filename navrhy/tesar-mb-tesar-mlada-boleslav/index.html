<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesař MB – Profesionální tesařské práce v Mladé Boleslavi</title>
  <meta name="description" content="Profesionální tesař v Mladé Boleslavi a okolí. Krovové konstrukce, altány, pergoly, dřevostavby. Volejte 605 925 135.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c47a2b;
      --primary-dark: #a0601a;
      --primary-light: #e8a44a;
      --wood-dark: #2c1a0e;
      --wood-mid: #4a2f1a;
      --wood-brown: #6b3f1f;
      --bg-dark: #1a1008;
      --bg-section: #f7f3ee;
      --bg-white: #ffffff;
      --text-dark: #1e1208;
      --text-mid: #4a3728;
      --text-light: #8a6e5a;
      --border: #e0d0c0;
      --shadow: rgba(44, 26, 14, 0.12);
      --shadow-hover: rgba(44, 26, 14, 0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--bg-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 16, 8, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(196, 122, 43, 0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-light);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(196,122,43,0.4);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(196,122,43,0.55);
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(160deg, rgba(26,16,8,0.93) 0%, rgba(74,47,26,0.88) 50%, rgba(26,16,8,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(196,122,43,0.04) 40px,
          rgba(196,122,43,0.04) 80px
        );
      background-color: var(--bg-dark);
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 60px,
          rgba(139,90,43,0.06) 60px,
          rgba(139,90,43,0.06) 62px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 120px,
          rgba(196,122,43,0.04) 120px,
          rgba(196,122,43,0.04) 122px
        );
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,122,43,0.18) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(196,122,43,0.15);
      border: 1px solid rgba(196,122,43,0.4);
      color: var(--primary-light);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .hero-content h1 {
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 900;
      color: white;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .hero-content h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 24px rgba(196,122,43,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(196,122,43,0.65);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 40px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(196,122,43,0.12);
      color: var(--primary);
      border: 1px solid rgba(196,122,43,0.25);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-white);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--bg-white);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px var(--shadow-hover);
      border-color: var(--primary);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(196,122,43,0.12), rgba(196,122,43,0.06));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(196,122,43,0.2);
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, rgba(196,122,43,0.22), rgba(196,122,43,0.12));
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: linear-gradient(160deg, var(--wood-dark) 0%, var(--wood-mid) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 60px,
        rgba(196,122,43,0.04) 60px,
        rgba(196,122,43,0.04) 62px
      );
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: white;
    }

    #proc-my .section-tag {
      background: rgba(196,122,43,0.2);
      color: var(--primary-light);
      border-color: rgba(196,122,43,0.35);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px 30px;
      text-align: center;
      transition: background 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(196,122,43,0.4);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: var(--bg-white);
      border-radius: 16px;
      padding: 30px 26px;
      box-shadow: 0 4px 24px var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 0.8;
      margin-bottom: 12px;
      font-family: Georgia, serif;
      opacity: 0.5;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-stars {
      color: var(--primary-light);
      font-size: 16px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .review-author-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-info h3 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .contact-info > p {
      color: var(--text-light);
      font-size: 16px;
      line-height: 1.7;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--bg-section);
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder
