<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profi sádrokartony a montáže – Praha | +420 602 443 413</title>
<meta name="description" content="Profesionální montáž sádrokartonů v Praze a okolí. Příčky, podhledy, zateplení. Rychlý servis, kvalita garantována, přijatelná cena.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #e07b2a;
  --primary-dark: #c4661a;
  --primary-light: #f5a05a;
  --dark: #1a1a1a;
  --dark2: #2a2a2a;
  --dark3: #3a3a3a;
  --text: #222222;
  --text-light: #666666;
  --white: #ffffff;
  --bg-light: #f9f6f2;
  --bg-section: #f4f0ea;
  --border: #e0d8ce;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 36px rgba(0,0,0,0.16);
  --radius: 14px;
  --radius-sm: 8px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ─── BANNER ─── */
#proposal-banner a:hover { text-decoration: underline; }

/* ─── NAVBAR ─── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid var(--primary);
}

.navbar {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 400;
  line-height: 1.2;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}

.nav-cta:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, #1a1005 0%, #2c1f0a 30%, #3d2a0d 60%, #1f1508 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(224,123,42,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(224,123,42,0.12) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), var(--primary), transparent);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(224,123,42,0.2);
  border: 1px solid rgba(224,123,42,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  position: relative;
}

.hero-inner {
  position: relative;
  max-width: 780px;
  margin: 0 auto;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.78);
  margin-bottom: 40px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.5;
}

.hero-ctas {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(224,123,42,0.4);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(224,123,42,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.35);
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── SEKCE – obecné ─── */
.section {
  padding: 72px 20px;
}

.section-alt {
  background: var(--bg-section);
}

.section-dark {
  background: var(--dark);
  color: var(--white);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--primary);
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  margin-bottom: 14px;
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.6;
}

.section-dark .section-desc {
  color: rgba(255,255,255,0.6);
}

.section-header {
  margin-bottom: 48px;
}

/* ─── SLUŽBY ─── */
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 22px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 30px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 54px;
  height: 54px;
  background: linear-gradient(135deg, rgba(224,123,42,0.12), rgba(224,123,42,0.06));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  border: 1px solid rgba(224,123,42,0.15);
}

.service-card h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--dark);
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─── PROČ MY ─── */
.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.benefit-icon-wrap {
  width: 52px;
  height: 52px;
  background: var(--primary);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(224,123,42,0.35);
}

.benefit-text h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 7px;
}

.benefit-text p {
  font-size: 14px;
  color: rgba(255,255,255,0.62);
  line-height: 1.6;
}

/* ─── REFERENCE ─── */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 42px;
  line-height: 1;
  color: var(--primary);
  font-family: Georgia, serif;
  margin-bottom: 10px;
  opacity: 0.7;
}

.review-stars {
  color: #f5a623;
  font-size: 16px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.65;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--dark);
  line-height: 1.2;
}

.review-place {
  font-size: 12px;
  color: var(--text-light);
}

/* ─── KONTAKT ─── */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.contact-info-box h3 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 24px;
  color: var(--dark);
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 22px;
}

.contact-item:last-child { margin-bottom: 0; }

.contact-item-icon {
  width: 44px;
  height: 44px;
  background: rgba(224,123,42,0.1);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid rgba(224,123,42,0.15);
}

.contact-item-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 3px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
}

a.contact-item-value:hover {
  color: var(--primary);
}

.map-placeholder {
  background: var(--bg-section);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  height: 100%;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-light);
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.04) 40px);
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 20px;
}

.map-sub {
  font-size: 13px;
  color: var(--text-light);
  position: relative;
  z-index: 1;
}

/* ─── FOOTER ─── */
footer {
  background: #111111;
  color: rgba(255,255,255,0.5);
  padding: 32px 20px;
  text-align: center;
  font-size: 13px;
  line-height: 1.8;
}

footer strong {
  color: rgba(255,255,255,0.8);
}

footer a {
  color: var(--primary-light);
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.footer-divider {
  width: 40px;
  height: 2px;
  background: var(--primary);
  margin: 16px auto;
}

/* ─── RIBBON / BADGE ─── */
.quality-ribbon {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.75);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 12px;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }

  .map-placeholder {
    min-height: 220px;
  }

  .hero-stats {
    gap: 24px;
  }

  .navbar {
    gap: 10px;
  }

  .logo-sub {
    display: none;
  }

  .logo-name {
    font-size: 13px;
  }

  .nav-cta {
    padding: 9px 14px;
    font-size: 13px;
  }
}

@media (max-width: 480px) {
  .section { padding: 52px 16px; }

  .hero-ctas {
    flex-direction: column;
    align-items: center;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }

  .hero-stats {
    gap: 20px;
  }

  .hero-stat-num {
    font-size: 22px;
  }

  .benefits-grid {
    grid-template-columns: 1fr;
  }

  .contact-info-box {
    padding: 24px 18px;
  }
}
</style>
</head>
