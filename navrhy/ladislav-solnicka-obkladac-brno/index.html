<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ladislav Solnička – Profesionální obkladač Brno</title>
<meta name="description" content="Profesionální pokládka obkladů a dlažby v Brně a okolí. Koupelny na klíč, terasy, epoxidové spárování, hydroizolace. Zavolejte ještě dnes!">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c87941;
  --primary-dark: #a8612e;
  --primary-light: #e8a870;
  --accent: #d4956a;
  --dark: #1a1209;
  --dark2: #2a1f10;
  --dark3: #3d2e1a;
  --text: #1e150a;
  --text-light: #6b5744;
  --text-muted: #9c8070;
  --white: #ffffff;
  --off-white: #faf7f4;
  --light-bg: #f5ede4;
  --card-bg: #ffffff;
  --border: #e8d5c4;
  --shadow: 0 4px 24px rgba(139,90,43,0.10);
  --shadow-hover: 0 8px 40px rgba(139,90,43,0.18);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--off-white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── NAVBAR ─── */
header {
  background: rgba(26, 18, 9, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid rgba(200,121,65,0.2);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 0.88rem;
  font-weight: 600;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(200,121,65,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(200,121,65,0.45);
}

.nav-cta .icon {
  font-size: 1rem;
}

/* ─── HERO ─── */
#hero {
  position: relative;
  background: linear-gradient(145deg, #1a1209 0%, #2d1d0d 35%, #3d2e1a 65%, #1a1209 100%);
  min-height: 100svh;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 80px 20px;
}

.hero-pattern {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(200,121,65,0.04) 40px,
      rgba(200,121,65,0.04) 41px
    ),
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(200,121,65,0.03) 40px,
      rgba(200,121,65,0.03) 41px
    );
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,121,65,0.15) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(212,149,106,0.1) 0%, transparent 70%);
  bottom: 10%;
  right: 10%;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  max-width: 820px;
  margin: 0 auto;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,121,65,0.15);
  border: 1px solid rgba(200,121,65,0.3);
  color: var(--primary-light);
  padding: 7px 18px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
}

.hero h1 {
  font-size: clamp(2rem, 6vw, 3.8rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 22px;
}

.hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.7);
  margin-bottom: 42px;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 700;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(200,121,65,0.45);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(200,121,65,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 600;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  margin-top: 60px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.hero-stat-num span {
  color: var(--primary-light);
}

.hero-stat-label {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.12);
  align-self: center;
}

/* ─── SECTIONS COMMON ─── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-label::before {
  content: '';
  display: block;
  width: 24px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-head {
  margin-bottom: 52px;
}

/* ─── SLUŽBY ─── */
#sluzby {
  background: var(--off-white);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 540px) {
  .services-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 900px) {
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--primary), var(--primary-light));
  border-radius: 4px 0 0 4px;
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,121,65,0.3);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--light-bg), #edd5bf);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7rem;
  margin-bottom: 20px;
}

.service-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.65;
}

.service-card-featured {
  background: linear-gradient(145deg, var(--dark2), var(--dark3));
  border-color: rgba(200,121,65,0.25);
  color: var(--white);
}

.service-card-featured::before {
  background: linear-gradient(180deg, var(--primary-light), var(--primary));
}

.service-card-featured .service-icon {
  background: rgba(200,121,65,0.2);
}

.service-card-featured .service-title {
  color: var(--white);
}

.service-card-featured .service-desc {
  color: rgba(255,255,255,0.68);
}

/* ─── PROČ MY ─── */
#proc-my {
  background: linear-gradient(145deg, var(--dark), var(--dark2));
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 60px,
    rgba(200,121,65,0.03) 60px,
    rgba(200,121,65,0.03) 61px
  );
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-label {
  color: var(--primary-light);
}

#proc-my .section-label::before {
  background: var(--primary-light);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  position: relative;
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 700px) {
  .benefits-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  text-align: center;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(200,121,65,0.1);
  border-color: rgba(200,121,65,0.25);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, rgba(200,121,65,0.25), rgba(200,121,65,0.1));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin: 0 auto 20px;
  border: 1px solid rgba(200,121,65,0.2);
}

.benefit-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-text {
  font-size: 0.92rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--light-bg);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 700px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 2.5rem;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  font-family: Georgia, serif;
}

.review-stars {
  color: #f5a623;
  font-size: 1rem;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.75;
  margin-bottom: 22px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}

.reviewer-loc {
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--off-white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

@media (min-width: 800px) {
  .contact-grid {
    grid-template-columns: 1fr 1.2fr;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, transform 0.2s;
}

.contact-item:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.contact-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--light-bg), #e8c9ab);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.contact-item-value a {
  color: var(--primary-dark);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary);
  text-decoration: underline;
}

.map-placeholder {
  background: linear-gradient(145deg, #e8d8cc, #d5bfad);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(139,90
