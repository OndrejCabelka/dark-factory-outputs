<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Střechy Horák – Klempíř Karlovy Vary</title>
  <meta name="description" content="Profesionální klempíř v Karlových Varech a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte +420 776 597 442">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --bg-card: #ffffff;
      --border: #e0e0e0;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: rgba(26, 26, 46, 0.98);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 10px;
      color: #aab0bb;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #c8cdd5;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s !important;
      white-space: nowrap;
      box-shadow: 0 3px 12px rgba(192,57,43,0.35);
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.45) !important;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f2744 70%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 70% 30%, rgba(192,57,43,0.15) 0%, transparent 55%),
                  radial-gradient(ellipse at 20% 80%, rgba(230,126,34,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }

    /* Decorative roof shape */
    .hero-roof-deco {
      position: absolute;
      top: 0;
      right: 0;
      width: 400px;
      height: 300px;
      opacity: 0.04;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ff9a8b;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #e74c3c, #e67e22);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #9db4c9;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 24px rgba(192,57,43,0.40);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .hero-stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 22px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .hero-stat-num {
      font-size: 26px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: #8a9ab0;
      font-weight: 500;
    }

    /* ===== SECTIONS COMMON ===== */
    .section-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      border: 1px solid rgba(192,57,43,0.2);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 80px 0;
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.3);
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(192,57,43,0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card .service-tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: rgba(192,57,43,0.08);
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 80px 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(192,57,43,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #8a9ab0;
    }

    #proc-my .section-label {
      background: rgba(192,57,43,0.2);
      border-color: rgba(192,57,43,0.35);
      color: #ff9a8b;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      backdrop-filter: blur(4px);
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(192,57,43,0.3);
      transform: translateY(-4px);
    }

    .benefit-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      box-shadow: 0 6px 24px rgba(192,57,43,0.35);
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 14px;
      color: #8a9ab0;
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      padding: 80px 0;
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: #f39c12;
      font-size: 17px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
      position: relative;
    }

    .review-text::before {
      content: '"';
      font-size: 56px;
      color: rgba(192,57,43,0.15);
      font-family: Georgia, serif;
      position: absolute;
      top: -16px;
      left: -8px;
      line-height: 1;
      pointer-events: none;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      padding: 80px 0;
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(192,57,43,0.15);
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-text a {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text span {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .btn-call-big {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      box-
