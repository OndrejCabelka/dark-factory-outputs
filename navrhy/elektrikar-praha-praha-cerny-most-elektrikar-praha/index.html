<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrikář Praha – Černý Most | Elektroinstalace, Revize, Fotovoltaika</title>
<meta name="description" content="Profesionální elektrikář v Praze a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 777 889 581.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #d4a800;
  --primary-light: #fff3b0;
  --dark: #0d0f14;
  --dark2: #161a22;
  --dark3: #1e2330;
  --text: #e8eaf0;
  --text-muted: #9aa0b4;
  --white: #ffffff;
  --card-bg: #1a1f2e;
  --border: rgba(245, 197, 24, 0.15);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 14px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  font-size: 16px;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── NAVBAR ─── */
header {
  background: rgba(13, 15, 20, 0.97);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 900;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--dark);
  font-weight: 700;
  font-size: 15px;
  padding: 10px 20px;
  border-radius: 10px;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-cta:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

.nav-links {
  display: flex;
  gap: 24px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* ─── HERO ─── */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  padding: 80px 20px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,197,24,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245,197,24,0.08) 0%, transparent 60%),
    linear-gradient(160deg, #0d0f14 0%, #161a22 50%, #0d1117 100%);
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,197,24,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,197,24,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-glow {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,197,24,0.1);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 900;
  line-height: 1.1;
  color: var(--white);
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

#hero h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--primary);
  color: var(--dark);
  font-weight: 700;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(245,197,24,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,197,24,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── SECTIONS SHARED ─── */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.8px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 52px;
}

.section-header.center {
  text-align: center;
}

.section-header.center .section-desc {
  margin: 0 auto;
}

/* ─── SLUŽBY ─── */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  border-color: rgba(245,197,24,0.35);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,197,24,0.1);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: rgba(245,197,24,0.12);
  border: 1px solid rgba(245,197,24,0.2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: background 0.3s;
}

.service-card:hover .service-icon {
  background: rgba(245,197,24,0.2);
}

.service-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  margin-top: 16px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ─── PROČ MY ─── */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '⚡';
  position: absolute;
  font-size: 300px;
  opacity: 0.02;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  line-height: 1;
}

.benefits-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.benefits-text .section-desc {
  margin-bottom: 32px;
}

.benefits-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.benefit-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.benefit-icon-wrap {
  width: 48px;
  height: 48px;
  background: rgba(245,197,24,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.benefit-body h4 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
}

.benefit-body p {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.6;
}

.benefits-visual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.bv-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 22px;
  text-align: center;
  transition: transform 0.3s;
}

.bv-card:hover {
  transform: translateY(-4px);
}

.bv-card:nth-child(2) {
  margin-top: 24px;
}

.bv-card:nth-child(4) {
  margin-top: -24px;
}

.bv-number {
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--primary);
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}

.bv-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  line-height: 1.4;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  position: relative;
  transition: transform 0.3s, box-shadow 0.3s;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  opacity: 0.6;
  font-family: Georgia, serif;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-stars {
  color: var(--primary);
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--white);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--dark);
}

.contact-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px;
  transition: border-color 0.2s;
}

.contact-item:hover {
  border-color: rgba(245,197,24,0.35);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: rgba(245,197,24,0.1);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-body strong {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-item-body a,
.contact-item-body span {
  font-size: 1.05rem;
  color: var(--white);
  font-weight: 600;
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-body a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 340px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,197,24,0.05) 39px, rgba(245,197,24,0.05) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,197,24,0.05) 39px, rgba(245,197,24,0.05) 40px);
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 500;
  text-align: center;
  position: relative;
  z-index: 1;
}

.map-address {
  background: rgba(245,197,24,0.1);
  border: 1px solid rgba(245,197,24,0.2);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 8px;
  position: relative;
  z-index: 1;
}

/* ─── CTA BANNER ─── */
.cta-banner {
  background: linear-gradient(135deg, #F5
