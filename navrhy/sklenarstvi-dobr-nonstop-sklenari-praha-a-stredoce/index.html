<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklenářství Dobr – Nonstop sklenáři Praha a Středočeský kraj</title>
  <meta name="description" content="Profesionální sklenářské práce v Praze a Středočeském kraji. Nonstop servis, rychlý výjezd, kvalita garantována. Volejte 774 577 724.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-light: #38bdf8;
      --accent: #06b6d4;
      --dark: #0f172a;
      --dark2: #1e293b;
      --dark3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f9ff;
      --bg-gray: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(14,165,233,0.10);
      --shadow-lg: 0 8px 40px rgba(14,165,233,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ───── BANNER ───── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ───── NAVBAR ───── */
    header {
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid rgba(14,165,233,0.15);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      white-space: nowrap;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      white-space: nowrap;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(14,165,233,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(14,165,233,0.45);
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* ───── HERO ───── */
    #hero {
      background:
        linear-gradient(135deg, rgba(10,18,40,0.96) 0%, rgba(2,100,160,0.92) 50%, rgba(6,40,80,0.97) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(14,165,233,0.03) 40px,
          rgba(14,165,233,0.03) 80px
        );
      min-height: 100svh;
      display: flex;
      align-items: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,165,233,0.15);
      border: 1px solid rgba(14,165,233,0.30);
      color: var(--primary-light);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 .highlight {
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 6px 24px rgba(14,165,233,0.40);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(14,165,233,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      border: 1.5px solid rgba(255,255,255,0.20);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* ───── SECTIONS COMMON ───── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .section-sub {
      color: var(--text-light);
      font-size: 1.05rem;
      max-width: 540px;
      margin-bottom: 56px;
    }

    /* ───── SERVICES ───── */
    #sluzby {
      background: var(--bg-gray);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(14,165,233,0.20);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--bg-light), #e0f2fe);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ───── WHY US ───── */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-label {
      color: var(--primary-light);
    }

    #proc-my .section-sub {
      color: rgba(255,255,255,0.55);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(14,165,233,0.08);
      border-color: rgba(14,165,233,0.25);
      transform: translateY(-5px);
    }

    .benefit-num {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.58);
      line-height: 1.7;
    }

    /* ───── REFERENCE ───── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }

    .review-card::before {
      content: '\201C';
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 5rem;
      color: var(--primary);
      opacity: 0.12;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: #f59e0b;
      font-size: 17px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .reviewer-name {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--dark);
    }

    .reviewer-location {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ───── KONTAKT ───── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--bg-light), #e0f2fe);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text {
      display: flex;
      flex-direction: column;
    }

    .contact-item-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-item-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      border-radius: var(--radius-lg);
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 30px,
        rgba(14,165,233,0.04) 30px,
        rgba(14,165,233,0.04) 31px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 30px,
        rgba(14,165,233,0.04) 30px,
        rgba(14,165,233,0.04) 31px
      );
    }

    .map-pin {
      font-size: 3rem;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .map-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.38);
      position: relative;
      z-index: 1;
    }

    .contact-cta {
      margin-top: 32px;
    }

    .contact-cta a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background
