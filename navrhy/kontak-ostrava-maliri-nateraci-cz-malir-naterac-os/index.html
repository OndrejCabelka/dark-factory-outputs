<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak Ostrava | Malíři Natěrači CZ – Profesionální malíř natěrač Ostrava</title>
  <meta name="description" content="Profesionální malíř natěrač v Ostravě a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte: 777 156 408">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8a020;
      --primary-dark: #c4841a;
      --primary-light: #f5c060;
      --dark: #1a1a1a;
      --dark2: #242424;
      --dark3: #2f2f2f;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #fafafa;
      --bg-section: #f4f4f4;
      --border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(232,160,32,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ── NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(232,160,32,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,160,32,0.5);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1a1200 0%, #2d1f00 30%, #1c1800 60%, #0f0f0f 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,160,32,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(196,132,26,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--bg-light));
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.35);
      color: var(--primary-light);
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      margin: 0 auto 40px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 24px rgba(232,160,32,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(232,160,32,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(232,160,32,0.10);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
    }

    /* ── SECTIONS COMMON ── */
    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,160,32,0.12);
      color: var(--primary-dark);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
      padding: 90px 20px;
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(232,160,32,0.2);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card ul {
      list-style: none;
      margin-top: 14px;
    }

    .service-card ul li {
      font-size: 13px;
      color: var(--text-light);
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-card ul li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--dark);
      padding: 90px 20px;
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,160,32,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.55);
    }

    #proc-my .section-tag {
      background: rgba(232,160,32,0.15);
      color: var(--primary-light);
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 30px;
      text-align: center;
      transition: border-color 0.25s, background 0.25s;
    }

    .benefit-card:hover {
      border-color: rgba(232,160,32,0.4);
      background: rgba(232,160,32,0.05);
    }

    .benefit-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 22px;
      box-shadow: 0 4px 20px rgba(232,160,32,0.35);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    /* ── REVIEWS ── */
    #reference {
      background: var(--bg-section);
      padding: 90px 20px;
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--primary);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 48px;
      color: rgba(232,160,32,0.2);
      line-height: 0;
      vertical-align: -18px;
      margin-right: 4px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--white);
      font-size: 16px;
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .reviewer-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--white);
      padding: 90px 20px;
    }

    .contact-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .contact-item:hover {
      border-color: var(--primary);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-text a {
      color: var(--dark);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text p {
      font-size: 15px;
      color: var(--dark);
      font-weight: 600;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: var(--radius-lg);
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(232,160,32,0.08) 0%, transparent 70%);
    }

    .map-icon {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-placeholder h4 {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      position: relative;
      z-index: 1;
    }

    .map-placeholder p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
    }

    .map-btn
