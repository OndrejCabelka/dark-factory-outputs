<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství KOSTRA – Luděk Kohoutek | Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Volejte +420 604 810 962.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E0A;
      --accent: #D2691E;
      --accent-light: #E8A87C;
      --gold: #C8962E;
      --dark: #1A1008;
      --dark-2: #2C1A0E;
      --dark-3: #3D2410;
      --text-dark: #1A1008;
      --text-muted: #6B5744;
      --text-light: #A08878;
      --white: #FFFFFF;
      --off-white: #FAF7F4;
      --border: #E8DDD5;
      --shadow: 0 4px 24px rgba(90, 40, 10, 0.12);
      --shadow-hover: 0 8px 40px rgba(90, 40, 10, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 16, 8, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(139, 69, 19, 0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
      text-decoration: none;
    }

    .logo-top {
      font-size: 11px;
      font-weight: 400;
      color: var(--accent-light);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-main {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .logo-main span {
      color: var(--accent);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-nav:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(26,16,8,0.92) 0%, rgba(60,28,8,0.85) 50%, rgba(90,50,15,0.88) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(139,69,19,0.04) 0px,
          rgba(139,69,19,0.04) 1px,
          transparent 1px,
          transparent 40px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(139,69,19,0.04) 0px,
          rgba(139,69,19,0.04) 1px,
          transparent 1px,
          transparent 40px
        );
      background-color: #1A1008;
      overflow: hidden;
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200,150,46,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(90,40,10,0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-lines {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(139,69,19,0.5) 60px, rgba(139,69,19,0.5) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(139,69,19,0.3) 80px, rgba(139,69,19,0.3) 81px);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139,69,19,0.25);
      border: 1px solid rgba(200,150,46,0.35);
      color: var(--accent-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 66px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 800px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 44px;
      max-width: 560px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,69,19,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.65);
      background: rgba(255,255,255,0.07);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .hero-visual {
      display: none;
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 42%;
      height: 100%;
      align-items: center;
      justify-content: flex-end;
    }

    .wood-art {
      width: 420px;
      height: 420px;
      position: relative;
    }

    .wood-circle {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(139,69,19,0.3);
    }

    .wood-circle:nth-child(1) { inset: 0; background: rgba(139,69,19,0.08); }
    .wood-circle:nth-child(2) { inset: 30px; background: rgba(139,69,19,0.06); }
    .wood-circle:nth-child(3) { inset: 60px; background: rgba(139,69,19,0.06); }
    .wood-circle:nth-child(4) { inset: 90px; background: rgba(139,69,19,0.05); }
    .wood-center {
      position: absolute;
      inset: 120px;
      background: rgba(139,69,19,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    @media (min-width: 992px) {
      .hero-visual {
        display: flex;
      }
      .hero-content {
        max-width: 58%;
      }
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--off-white);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 560px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 1px solid var(--border);
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,69,19,0.12), rgba(200,150,46,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      position: relative;
      padding: 36px 28px;
      border-radius: var(--radius-lg);
      background: var(--off-white);
      border: 1px solid var(--border);
      transition: all 0.3s;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 72px;
      font-weight: 900;
      color: rgba(139,69,19,0.06);
      line-height: 1;
      pointer-events: none;
    }

    .benefit-icon {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(139,69,19,0.03) 0px,
        rgba(139,69,19,0.03) 1px,
        transparent 1px,
        transparent 35px
      );
      pointer-events: none;
    }

    #reference .section-label {
      color: var(--accent-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(200,150,46,0.3);
      transform: translateY(-4px);
    }

    .review-quote {
      font-size: 52px;
      line-height: 0.8;
      color: var(--gold);
      opacity: 0.4;
      font-family: Georgia, serif;
      margin-bottom: 12px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-footer {
      display: flex;
      align-items: center;
      gap: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .review-stars {
      font-size: 13px;
      color: var(--gold);
      margin-top: 3px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--off-white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 48px;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 22px;
      background: var(--white);
      border-radius: var(--radius);
