<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Liberec – Kuchyňské linky, vestavěné skříně, schody na míru</title>
  <meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Zavolejte: 603 529 604">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-dark: #6B3410;
      --primary-light: #A0522D;
      --accent: #D2691E;
      --accent-light: #F4A460;
      --warm: #FFF8F0;
      --dark: #1A0F0A;
      --dark-2: #2C1810;
      --dark-3: #3D2314;
      --text: #2d2016;
      --text-light: #6b5040;
      --white: #ffffff;
      --card-bg: #ffffff;
      --border: #e8ddd6;
      --shadow: 0 4px 24px rgba(139,69,19,0.10);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAV ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white) !important;
      padding: 9px 20px;
      border-radius: 50px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s !important;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(139,69,19,0.35);
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139,69,19,0.5) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-sub {
        display: none;
      }
      .nav-inner {
        height: 60px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(160deg, rgba(26,15,10,0.92) 0%, rgba(44,24,16,0.88) 50%, rgba(61,35,20,0.82) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(139,69,19,0.06) 0px,
          rgba(139,69,19,0.06) 2px,
          transparent 2px,
          transparent 12px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(210,105,30,0.04) 0px,
          rgba(210,105,30,0.04) 2px,
          transparent 2px,
          transparent 12px
        ),
        linear-gradient(160deg, #3D1C08 0%, #2C1810 40%, #1A0F0A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px 60px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139,69,19,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(210,105,30,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139,69,19,0.25);
      border: 1px solid rgba(210,105,30,0.4);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-title {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      line-height: 1.65;
      font-weight: 400;
      max-width: 500px;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(139,69,19,0.45);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(139,69,19,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(8px);
      transition: transform 0.3s, background 0.3s;
    }

    .hero-card:hover {
      transform: translateX(6px);
      background: rgba(255,255,255,0.09);
    }

    .hero-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .hero-card-text h4 {
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .hero-card-text p {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }
      .hero-cta {
        justify-content: center;
      }
      .hero-stats {
        justify-content: center;
      }
      .hero-sub {
        margin-left: auto;
        margin-right: auto;
      }
      .hero-badge {
        margin-left: auto;
        margin-right: auto;
      }
    }

    @media (max-width: 480px) {
      .btn-primary, .btn-secondary {
        padding: 13px 24px;
        font-size: 15px;
      }
    }

    /* ===== SECTION HEADERS ===== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid rgba(139,69,19,0.2);
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 96px 20px;
      background: var(--warm);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(210,105,30,0.15));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(139,69,19,0.15);
      transition: background 0.3s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 96px 20px;
      background: var(--white);
    }

    .why-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .why-card {
      text-align: center;
      padding: 40px 28px;
      border-radius: var(--radius);
      background: var(--warm);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .why-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .why-number {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
      color: white;
      box-shadow: 0 4px 20px rgba(139,69,19,0.35);
    }

    .why-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .why-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      padding: 96px 20px;
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(139,69,19,0.04) 0px,
        rgba(139,69,19,0.04) 1px,
        transparent 1px,
        transparent 10px
      );
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(210,105,30,0.2);
      color: var(--accent-light);
      border-color: rgba(210,105,30,0.3);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 32px 28px;
      backdrop-filter: blur(8px);
      transition: transform 0.3s, background 0.3s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.09);
    }

    .review-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 24px;
      color: var(--accent);
      line-height: 0;
      vertical-align: -8px;
      margin-right: 4px;
    }

    .review-text::after {
      content: '"';
      font-size: 24px;
      color: var(--accent);
      line-height: 0;
      vertical-align: -8px;
      margin-left: 4px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
