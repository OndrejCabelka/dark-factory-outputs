<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mojžíšek Pavel – Instalatér Znojmo</title>
<meta name="description" content="Profesionální instalatér ve Znojmě a okolí. Opravy vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 604 534 359.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6db5;
  --primary-dark: #0f4f8a;
  --primary-light: #2d8fe0;
  --accent: #f0a500;
  --dark: #0d1b2a;
  --dark2: #112233;
  --text: #1e2d3d;
  --text-light: #5a6a7a;
  --white: #ffffff;
  --light-bg: #f4f8fc;
  --card-bg: #ffffff;
  --border: #dce8f2;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(26,109,181,0.10);
  --shadow-hover: 0 8px 36px rgba(26,109,181,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ── BANNER ── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ── HEADER ── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 900;
  border-bottom: 2px solid var(--primary);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
  text-decoration: none;
}

.logo-main {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 0.72rem;
  color: var(--primary-light);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.nav-cta:hover {
  background: var(--primary-light);
  transform: scale(1.03);
}

.nav-cta-icon {
  font-size: 1.1rem;
}

/* ── HERO ── */
#hero {
  background: linear-gradient(135deg, #0a1929 0%, #0f3460 40%, #1a6db5 100%);
  color: var(--white);
  padding: 80px 20px 90px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(45,143,224,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -60px;
  width: 360px;
  height: 360px;
  background: radial-gradient(circle, rgba(240,165,0,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-block;
  background: rgba(240,165,0,0.18);
  border: 1px solid rgba(240,165,0,0.45);
  color: var(--accent);
  font-size: 0.82rem;
  font-weight: 700;
  padding: 6px 18px;
  border-radius: 50px;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
}

#hero h1 {
  font-size: clamp(1.9rem, 5vw, 3.2rem);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 20px;
  max-width: 780px;
  margin-left: auto;
  margin-right: auto;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.82);
  max-width: 560px;
  margin: 0 auto 40px;
  font-weight: 400;
}

.hero-cta-group {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #1a1200;
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 1.05rem;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(240,165,0,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(240,165,0,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.12);
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1.05rem;
  border: 2px solid rgba(255,255,255,0.3);
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 56px;
  flex-wrap: wrap;
  padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.12);
}

.stat-item {
  text-align: center;
}

.stat-num {
  display: block;
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* ── SECTION BASE ── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  margin-bottom: 48px;
}

/* ── SERVICES ── */
#sluzby {
  background: var(--light-bg);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
  margin-top: 8px;
}

.service-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 32px 26px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 18px;
  flex-shrink: 0;
}

.service-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.6;
}

.service-card.urgent {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f3460 100%);
  border-color: var(--primary);
  color: var(--white);
}

.service-card.urgent::before {
  background: linear-gradient(90deg, var(--accent), #f5c842);
  transform: scaleX(1);
}

.service-card.urgent h3 {
  color: var(--white);
}

.service-card.urgent p {
  color: rgba(255,255,255,0.72);
}

.service-card.urgent .service-icon {
  background: linear-gradient(135deg, var(--accent), #f5c842);
}

.urgent-badge {
  display: inline-block;
  background: var(--accent);
  color: #1a1200;
  font-size: 0.72rem;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 12px;
}

/* ── WHY US ── */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  margin-top: 8px;
}

.benefit-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 28px;
  border-radius: var(--radius);
  background: var(--light-bg);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}

.benefit-item:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
}

.benefit-icon {
  width: 54px;
  height: 54px;
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}

.benefit-text h3 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
}

.benefit-text p {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.6;
}

/* ── REVIEWS ── */
#reference {
  background: linear-gradient(135deg, #0a1929 0%, #0f3460 100%);
  color: var(--white);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.65);
}

#reference .section-label {
  color: var(--accent);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
  margin-top: 8px;
}

.review-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius);
  padding: 30px 26px;
  backdrop-filter: blur(6px);
  transition: background 0.2s, transform 0.2s;
}

.review-card:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-3px);
}

.review-stars {
  color: var(--accent);
  font-size: 1.1rem;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.85);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  color: white;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 0.95rem;
}

.review-location {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
}

/* ── CONTACT ── */
#kontakt {
  background: var(--light-bg);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 18px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
}

.contact-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.contact-card-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

.contact-card-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-card-value {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--dark);
}

.contact-card-sub {
  font-size: 0.82rem;
  color: var(--text-light);
}

.map-placeholder {
  background: linear-gradient(135deg, #d0e4f5, #b8d4ed);
  border-radius: var(--radius);
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 2px dashed var(--primary);
  color: var(--primary);
  font-weight: 600;
  font-size: 0.95rem;
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%231a6db5' fill-opacity='0.06'%3E%3Cpath d='M0 0h20v20H0V0zm20 20h20v20H20V20z'/%3E%3C/g%3E%3C/svg%3E");
}

.map-icon {
  font-size: 3rem;
  position: relative;
}

.map-text {
  position: relative;
  text-align: center;
  line-height: 1.5;
}

/* ── FOOTER ── */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.7);
  padding: 36px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.footer-logo {
  font-size: 1rem;
  font-weight: 800;
  color: var(--white);
}

.footer-logo span {
  color: var(--primary-light);
}

.footer-info {
  font-size: 0.82rem;
  text-align: center;
}

.footer-info a {
  color: var(--primary-light);
  text-decoration: none;
}

.footer-copy {
  font-size: 0.8rem;
  text-align: right;
  color: rgba(255,255,255,0.4);
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  section {
    padding: 60px 16px;
  }

  .nav-inner {
    padding: 0 16px;
    height: 60px;
  }

  .logo-main {
    font-size: 1rem;
  }

  .nav-cta {
    padding: 9px 16px;
    font-size: 0.88rem;
  }

  #hero {
    padding: 60px 16px 70px;
  }

  .hero-stats {
    gap: 24px;
  }

  .stat-num {
    font-size: 1.7rem;
  }

  .contact-grid {
    grid-template-columns: 1fr;
  }

  .map-placeholder {
    height: 240px;
  }

  .footer-inner {
    flex-direction: column;
    text-align: center;
  }

  .footer-copy {
    text-align: center;
  }
}

@media (max-width: 480px) {
  .hero-cta-group {
    flex-direction: column;
    align-items: center;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    justify-content: center;
    max-width: 320px;
  }

  .services-grid {
    grid-template-columns: 1fr;
  }

  .benefits-grid {
    grid-template-columns: 1fr;
  }

  .reviews-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
