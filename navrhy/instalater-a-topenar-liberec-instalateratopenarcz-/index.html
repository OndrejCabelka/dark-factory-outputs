<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální instalatér a topenář v Liberci. Oprava vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení.">
<title>Instalatér a topenář Liberec | instalateratopenar.cz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1565C0;
  --primary-light: #1E88E5;
  --primary-dark: #0D47A1;
  --accent: #FF8F00;
  --accent-light: #FFA000;
  --dark: #0A1628;
  --dark-2: #112240;
  --text: #1a2744;
  --text-light: #4a5568;
  --white: #ffffff;
  --gray-light: #f4f7fb;
  --gray-border: #e2e8f0;
  --shadow: 0 4px 24px rgba(21,101,192,0.10);
  --shadow-hover: 0 8px 40px rgba(21,101,192,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(255,143,0,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,143,0,0.5);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0A1628 0%, #0D47A1 50%, #1565C0 100%);
  position: relative;
  overflow: hidden;
  padding: 90px 20px 80px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(30,136,229,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,143,0,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  backdrop-filter: blur(10px);
}

.hero-badge span {
  color: var(--accent-light);
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  max-width: 780px;
  margin-left: auto;
  margin-right: auto;
}

#hero h1 em {
  font-style: normal;
  color: var(--accent-light);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.80);
  max-width: 600px;
  margin: 0 auto 40px;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: 50px;
  box-shadow: 0 6px 24px rgba(255,143,0,0.40);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(255,143,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.10);
  border: 2px solid rgba(255,255,255,0.30);
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  padding: 13px 30px;
  border-radius: 50px;
  backdrop-filter: blur(10px);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.stat-item {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius);
  padding: 18px 28px;
  backdrop-filter: blur(12px);
  text-align: center;
  min-width: 120px;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent-light);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== SECTIONS COMMON ===== */
.section-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-label {
  display: inline-block;
  background: rgba(21,101,192,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.2;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin-bottom: 48px;
}

.section-header {
  margin-bottom: 0;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 80px 0;
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(21,101,192,0.18);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(21,101,192,0.10), rgba(30,136,229,0.15));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-badge {
  display: inline-block;
  background: rgba(255,143,0,0.12);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 3px 10px;
  border-radius: 50px;
  margin-top: 14px;
}

/* ===== WHY US ===== */
#proc-my {
  padding: 80px 0;
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  margin-top: 48px;
}

.benefit-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 28px;
  background: var(--gray-light);
  border-radius: var(--radius);
  border: 1px solid var(--gray-border);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-item:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(21,101,192,0.25);
}

.benefit-text h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.benefit-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REVIEWS ===== */
#reference {
  padding: 80px 0;
  background: var(--dark-2);
}

#reference .section-label {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.70);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.60);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 30px;
  backdrop-filter: blur(10px);
  transition: background 0.25s, transform 0.25s;
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-4px);
}

.stars {
  color: var(--accent-light);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.author-info span {
  font-size: 13px;
  color: rgba(255,255,255,0.50);
}

/* ===== CONTACT ===== */
#kontakt {
  padding: 80px 0;
  background: var(--gray-light);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-top: 48px;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
  display: flex;
  gap: 18px;
  align-items: flex-start;
  transition: transform 0.2s, box-shadow 0.2s;
}

.contact-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

.contact-card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-card-body strong {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}

.contact-card-body a,
.contact-card-body p {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-card-body a:hover {
  color: var(--primary);
}

.contact-card-body .small {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 400;
}

.map-placeholder {
  background: linear-gradient(135deg, #1a2744, #0D47A1);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
  min-height: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 16px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 40% 40%, rgba(30,136,229,0.20) 0%, transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,143,0,0.10) 0%, transparent 50%);
}

.map-icon {
  font-size: 56px;
  position: relative;
  z-index: 1;
}

.map-placeholder h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  position: relative;
  z-index: 1;
}

.map-placeholder p {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  position: relative;
  z-index: 1;
  max-width: 220px;
}

.map-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 50px;
  position: relative;
  z-index: 1;
  transition: background 0.2s;
}

.map-link:hover {
  background: rgba(255,255,255,0.20);
}

/* ===== EMERGENCY STRIP ===== */
.emergency-strip {
  background: linear-gradient(135deg, var(--accent), #FF6D00);
  padding: 24px 20px;
  text-align: center;
}

.emergency-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.emergency-text {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
}

.emergency-text span {
  font-size: 22px;
  margin-right: 6px;
}

.emergency-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--dark);
  color: var(--
