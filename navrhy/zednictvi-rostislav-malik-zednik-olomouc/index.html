<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zednictví Rostislav Malík – Olomouc</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e07b1a;
  --primary-dark: #c0621a;
  --primary-light: #f59e3a;
  --dark: #1a1208;
  --dark2: #2c1f0e;
  --dark3: #3a2a14;
  --text: #1a1208;
  --text-light: #5a4a30;
  --white: #ffffff;
  --bg: #faf7f2;
  --bg2: #f3ede3;
  --border: #e8dfd0;
  --shadow: 0 4px 24px rgba(26,18,8,0.10);
  --shadow-lg: 0 8px 40px rgba(26,18,8,0.16);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  font-size: 16px;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(224,123,26,0.3);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(224,123,26,0.45);
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(135deg, rgba(20,12,3,0.92) 0%, rgba(44,31,14,0.85) 50%, rgba(60,40,15,0.88) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(224,123,26,0.04) 0px,
      rgba(224,123,26,0.04) 2px,
      transparent 2px,
      transparent 20px
    ),
    linear-gradient(160deg, #1a1208 0%, #2c1f0e 40%, #3d2c12 70%, #1a1208 100%);
  min-height: 88vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 60px 20px;
}

#hero::before {
  content: '';
  position: absolute;
  top: -40%;
  right: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(224,123,26,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -20%;
  left: -5%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(224,123,26,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(224,123,26,0.15);
  border: 1px solid rgba(224,123,26,0.35);
  color: var(--primary-light);
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge span {
  width: 7px;
  height: 7px;
  background: var(--primary-light);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
  max-width: 720px;
}

#hero h1 em {
  font-style: normal;
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: rgba(255,255,255,0.75);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 25px rgba(224,123,26,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 35px rgba(224,123,26,0.55);
}

.btn-secondary {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 56px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1;
}

.stat-num span {
  color: var(--primary-light);
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: rgba(224,123,26,0.1);
  color: var(--primary-dark);
  border: 1px solid rgba(224,123,26,0.25);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(1.7rem, 3.5vw, 2.6rem);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 90px 20px;
  background: var(--white);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 26px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(224,123,26,0.3);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(224,123,26,0.12), rgba(245,158,58,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(224,123,26,0.15);
}

.service-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== WHY US ===== */
#proc-my {
  padding: 90px 20px;
  background: var(--bg2);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.benefit-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 16px rgba(224,123,26,0.35);
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REVIEWS ===== */
#reference {
  padding: 90px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(224,123,26,0.06) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(224,123,26,0.2);
  color: var(--primary-light);
  border-color: rgba(224,123,26,0.35);
}

#reference .section-header p {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 1;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  backdrop-filter: blur(8px);
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(224,123,26,0.35);
  transform: translateY(-4px);
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
  font-size: 18px;
}

.review-text {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.75;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: white;
  font-size: 16px;
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  color: var(--white);
  font-size: 14px;
  font-weight: 700;
}

.author-info span {
  color: rgba(255,255,255,0.4);
  font-size: 12px;
}

/* ===== CONTACT ===== */
#kontakt {
  padding: 90px 20px;
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  border-color: rgba(224,123,26,0.3);
  box-shadow: var(--shadow);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-content label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.contact-item-content a,
.contact-item-content p {
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-content a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: var(--bg2);
  border: 2px dashed var(--border);
  border-radius: var(--radius-lg);
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text-light);
  font-size: 14px;
  text-align: center;
  padding: 40px 20px;
}

.map-placeholder .map-icon {
  font-size: 48px;
  opacity: 0.6;
}

.map-placeholder strong {
  font-size: 1rem;
  color: var(--text);
  font-weight: 700;
}

.map-placeholder span {
  font-size: 0.85rem;
  color: var(--text-light);
}

.cta-box {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  text-align: center;
  color: white;
  margin-top: 28px;
  box-shadow: 0 8px 30px rgba(224,123,26,0.35);
}

.cta-box h3 {
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.cta-box p {
  font-size: 0.9rem;
  opacity: 0.85;
  margin-bottom: 20px;
}

.btn-white {
  background: white;
  color: var(--primary-dark);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 15px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.btn-white:hover {
  transform: translateY(-2px);
