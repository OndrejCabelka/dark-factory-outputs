<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář České Budějovice | Elektroinstalace, Revize, Fotovoltaika</title>
  <meta name="description" content="Profesionální elektrikář v Českých Budějovicích a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #f5c518;
      --primary-dark: #d4a800;
      --primary-light: #fff3b0;
      --accent: #1a1a2e;
      --accent2: #16213e;
      --accent3: #0f3460;
      --text-dark: #1a1a2e;
      --text-mid: #4a4a6a;
      --text-light: #8888aa;
      --white: #ffffff;
      --bg-light: #f8f9fc;
      --bg-card: #ffffff;
      --shadow: 0 4px 24px rgba(26,26,46,0.10);
      --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--bg-light);
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--accent);
      position: sticky;
      top: 0;
      z-index: 900;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text strong {
      color: var(--white);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
    }

    .logo-text span {
      color: var(--primary);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-tel-nav {
      background: var(--primary);
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-tel-nav:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 40%, #0f3460 75%, #1a3a6e 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      min-height: 92vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(15,52,96,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(245,197,24,0.15);
      border: 1px solid rgba(245,197,24,0.35);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 22px;
      letter-spacing: 0.04em;
    }

    #hero h1 {
      color: var(--white);
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #hero h1 .highlight {
      color: var(--primary);
    }

    .hero-sub {
      color: rgba(255,255,255,0.72);
      font-size: clamp(15px, 2vw, 19px);
      margin-bottom: 36px;
      font-weight: 400;
      max-width: 500px;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      padding: 15px 30px;
      border-radius: var(--radius-sm);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(245,197,24,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,197,24,0.45);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 15px 30px;
      border-radius: var(--radius-sm);
      border: 2px solid rgba(255,255,255,0.3);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(245,197,24,0.07);
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-card-visual {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }

    .hero-stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .hero-stat {
      background: rgba(245,197,24,0.1);
      border: 1px solid rgba(245,197,24,0.2);
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
    }

    .hero-stat .num {
      color: var(--primary);
      font-size: 30px;
      font-weight: 900;
      display: block;
      line-height: 1;
      margin-bottom: 5px;
    }

    .hero-stat .lab {
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 500;
    }

    .hero-badge-list {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .hero-badge-item {
      display: flex;
      align-items: center;
      gap: 11px;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 500;
    }

    .hero-badge-item .dot {
      width: 28px;
      height: 28px;
      background: rgba(245,197,24,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ─── SHARED SECTION STYLES ─── */
    .section-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 54px;
    }

    .section-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }

    .section-header p {
      color: var(--text-mid);
      font-size: 17px;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      padding: 90px 0;
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,26,46,0.07);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,197,24,0.25);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary-light), #fff3b0);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
      border: 1px solid rgba(245,197,24,0.2);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-mid);
      font-size: 14.5px;
      line-height: 1.7;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      padding: 90px 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,197,24,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(245,197,24,0.15);
      color: var(--primary);
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.65);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 38px 32px;
      text-align: center;
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: rgba(245,197,24,0.1);
      border-color: rgba(245,197,24,0.35);
      transform: translateY(-5px);
    }

    .benefit-num {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      margin: 0 auto 22px;
    }

    .benefit-card h3 {
      color: var(--white);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .benefit-card p {
      color: rgba(255,255,255,0.65);
      font-size: 15px;
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      padding: 90px 0;
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 26px;
    }

    .review-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,26,46,0.07);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 52px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      font-weight: 900;
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      color: var(--text-mid);
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 13px;
      border-top: 1px solid rgba(26,26,46,0.08);
      padding-top: 18px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .review-author-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      padding: 90px 0;
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(245,197,24,0.25);
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
    }

    .contact-item-text a {
      color: var(--accent3);
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text .address-line {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-dark);
      display: block;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
      border-radius: var(--radius);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4
