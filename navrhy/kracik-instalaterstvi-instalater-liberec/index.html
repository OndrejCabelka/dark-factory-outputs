<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kracík instalatérství – Profesionální instalatér v Liberci</title>
  <meta name="description" content="Kracík instalatérství Liberec – oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420608977612">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #1256a0;
      --primary-light: #3d8fe0;
      --accent: #f59e0b;
      --dark: #0d1b2a;
      --dark-2: #1a2d42;
      --dark-3: #243447;
      --text: #1e293b;
      --text-muted: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f8fafc;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26, 111, 196, 0.10);
      --shadow-hover: 0 8px 36px rgba(26, 111, 196, 0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER ===================== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-links {
      display: none;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-phone {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .btn-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(26, 111, 196, 0.4);
    }

    /* ===================== HERO ===================== */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2d42 40%, #1a4a7a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26, 111, 196, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26, 111, 196, 0.2);
      border: 1px solid rgba(26, 111, 196, 0.4);
      color: #7ec8f7;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #5bb3f7, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94b8d6;
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      position: relative;
      z-index: 1;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26, 111, 196, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26, 111, 196, 0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, background 0.2s;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 30px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: #64899e;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===================== SERVICES ===================== */
    #sluzby {
      padding: 80px 20px;
      background: var(--bg-section);
    }

    .section-header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 52px;
    }

    .section-label {
      display: inline-block;
      background: rgba(26, 111, 196, 0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 16px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26, 111, 196, 0.12), rgba(61, 143, 224, 0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .service-card.highlighted {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
      border-color: rgba(26, 111, 196, 0.3);
    }

    .service-card.highlighted h3 {
      color: var(--white);
    }

    .service-card.highlighted p {
      color: #94a3b8;
    }

    .service-card.highlighted .service-icon {
      background: rgba(26, 111, 196, 0.2);
    }

    .service-card.highlighted .service-tag {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent);
    }

    /* ===================== WHY US ===================== */
    #proc-my {
      padding: 80px 20px;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px 24px;
      background: var(--bg-section);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===================== REVIEWS ===================== */
    #reference {
      padding: 80px 20px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
    }

    #reference .section-label {
      background: rgba(26, 111, 196, 0.25);
      color: #7ec8f7;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: #94a3b8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px 26px;
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.09);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .review-stars span {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      color: #c8d8e8;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #1a6fc4, #3d8fe0); }
    .review-avatar.a2 { background: linear-gradient(135deg, #059669, #10b981); }
    .review-avatar.a3 { background: linear-gradient(135deg, #7c3aed, #a78bfa); }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: #64899e;
      margin-top: 2px;
    }

    .review-verified {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #4ade80;
      font-weight: 500;
    }

    /* ===================== CONTACT ===================== */
    #kontakt {
      padding: 80px 20px;
      background: var(--bg-section);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .contact-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-card-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-card-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .contact-card-value.primary {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
      border-radius: var(--radius);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 1px solid rgba(26, 111, 196, 0.2);
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 30px;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(26, 111, 196, 0.15) 0%, transparent 65%);
    }

    .map-icon {
      font-size: 48px;
      position: relative;
      z-index: 1;
    }

    .map-placeholder h3 {
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .map-placeholder p {
      color: #94a3b8;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }
