<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malíři a natěrači Plzeň | Profesionální malířské práce</title>
<meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte +420377981369">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #e85d04;
    --primary-dark: #c44b02;
    --primary-light: #f48c42;
    --dark: #1a1a2e;
    --dark2: #16213e;
    --text: #2d2d2d;
    --text-light: #666;
    --white: #ffffff;
    --bg-light: #fdf6f0;
    --bg-section: #f9f3ee;
    --border: #e8ddd5;
    --shadow: 0 4px 24px rgba(232,93,4,0.10);
    --shadow-card: 0 2px 16px rgba(0,0,0,0.08);
    --radius: 14px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== BANNER ===== */
  #proposal-banner {
    position: relative;
    z-index: 1000;
  }

  /* ===== HEADER / NAVBAR ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 999;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  .navbar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-text strong {
    font-size: 16px;
    font-weight: 800;
    color: var(--dark);
    letter-spacing: -0.3px;
  }

  .logo-text span {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 500;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--primary); }

  .nav-cta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-call {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(232,93,4,0.35);
    white-space: nowrap;
  }

  .btn-call:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(232,93,4,0.45);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: 0.3s;
  }

  /* ===== HERO ===== */
  #hero {
    background: linear-gradient(135deg, #1a1008 0%, #2d1a05 30%, #3d2310 60%, #1e0e03 100%);
    position: relative;
    overflow: hidden;
    padding: 100px 20px 80px;
    min-height: 92vh;
    display: flex;
    align-items: center;
  }

  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 30%, rgba(232,93,4,0.20) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(244,140,66,0.12) 0%, transparent 50%);
  }

  #hero::after {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(232,93,4,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-paint-blob {
    position: absolute;
    bottom: -30px;
    left: -60px;
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(232,93,4,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-stripes {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    opacity: 0.03;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.5) 40px,
      rgba(255,255,255,0.5) 41px
    );
  }

  .hero-container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(232,93,4,0.15);
    border: 1px solid rgba(232,93,4,0.4);
    color: var(--primary-light);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  #hero h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 900;
    color: white;
    line-height: 1.15;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }

  #hero h1 .highlight {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: clamp(16px, 2vw, 19px);
    color: rgba(255,255,255,0.78);
    margin-bottom: 36px;
    font-weight: 400;
    line-height: 1.6;
    max-width: 500px;
  }

  .hero-btns {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 50px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: all 0.25s;
    box-shadow: 0 6px 28px rgba(232,93,4,0.45);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 35px rgba(232,93,4,0.55);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    color: white;
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    border: 1.5px solid rgba(255,255,255,0.22);
    transition: all 0.25s;
    backdrop-filter: blur(8px);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hero-stat strong {
    font-size: 28px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    line-height: 1;
  }

  .hero-stat span {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .hero-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-card-float {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 380px;
  }

  .hero-card-title {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .hero-service-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .hero-service-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    font-size: 15px;
    font-weight: 500;
  }

  .hero-service-check {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .hero-divider {
    width: 40px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    margin: 20px 0;
    border-radius: 2px;
  }

  .hero-phone-display {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(232,93,4,0.15);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(232,93,4,0.3);
  }

  .hero-phone-display a {
    color: var(--primary-light);
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* ===== SECTIONS GENERAL ===== */
  section { padding: 80px 20px; }

  .section-header {
    text-align: center;
    max-width: 680px;
    margin: 0 auto 56px;
  }

  .section-label {
    display: inline-block;
    background: rgba(232,93,4,0.1);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    border-radius: 50px;
    margin-bottom: 14px;
  }

  .section-header h2 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    color: var(--dark);
    line-height: 1.2;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .section-header p {
    font-size: 17px;
    color: var(--text-light);
    line-height: 1.7;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ===== SLUZBY ===== */
  #sluzby {
    background: var(--bg-section);
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .service-card {
    background: white;
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border);
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    position: relative;
    overflow: hidden;
  }

  .service-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }

  .service-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 36px rgba(232,93,4,0.15);
    border-color: rgba(232,93,4,0.25);
  }

  .service-card:hover::after {
    transform: scaleX(1);
  }

  .service-icon {
    width: 58px;
    height: 58px;
    background: linear-gradient(135deg, rgba(232,93,4,0.1), rgba(244,140,66,0.15));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 20px;
    transition: transform 0.25s;
  }

  .service-card:hover .service-icon {
    transform: scale(1.08);
  }

  .service-card h3 {
    font-size: 19px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }

  .service-card p {
    font-size: 14.5px;
    color: var(--text-light);
    line-height: 1.65;
  }

  .service-tag {
    display: inline-block;
    margin-top: 14px;
    background: rgba(232,93,4,0.08);
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 50px;
  }

  /* ===== PROC MY ===== */
  #proc-my {
    background: white;
  }

  .benefits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 32px;
  }

  .benefit-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 36px 32px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    transition: border-color 0.25s, transform 0.25s;
    position: relative;
    background: white;
  }

  .benefit-card:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(232,93,4,0.12);
  }

  .benefit-number {
    position: absolute;
    top: 24px;
    right: 24px;
    font-size: 60px;
    font-weight: 900;
    color: rgba(232,93,4,0.06);
    line-height: 1;
    letter-spacing: -3px;
  }

  .benefit-icon-wrap {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .benefit-card h3 {
    font-size: 20px;
    font-weight: 800;
    color: var(--dark);
    letter-spacing: -0.4px;
  }

  .benefit-card p {
    font-size: 15px;
    color: var(--text-light);
    line-height: 1.7;
  }

  /* ===== REFERENCE ===== */
  #reference {
    background: var(--bg-section);
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
  }

  .review-card {
    background: white;
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border);
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
  }

  .review-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 32px rgba(0,0,0,0.10);
  }

  .review-quote {
    font-size: 64px;
    color: var(--primary);
    line-height: 0.6;
    font-family: Georgia, serif;
    margin-bottom: 18px;
    opacity: 0.3;
  }

  .review-stars {
    display: flex;
    gap: 3px;
    margin-bottom: 16px;
  }

  .star { color: #f59e0b; font-size: 17px; }

  .review-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.75;
    margin-bottom: 22px;
    font-style: italic;
  }

  .reviewer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .reviewer-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 16px;
    flex-shrink: 0;
  }

  .reviewer-info strong {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
  }

  .reviewer-info span {
    font-size: 12.5px
