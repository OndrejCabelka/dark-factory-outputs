<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malíř Natěrač Brno – Profesionální natěrač fasád</title>
  <meta name="description" content="Profesionální natěrač fasád v Brně a okolí. Kvalitní práce, rychlý servis, přijatelné ceny. Zavolejte +420 737 009 797.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e85d04;
      --primary-dark: #c44d03;
      --primary-light: #f48c42;
      --accent: #faa307;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --bg-light: #fafaf8;
      --white: #ffffff;
      --card-bg: #ffffff;
      --border: #e8e8e8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,93,4,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text .brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-text .sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(232,93,4,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,93,4,0.50);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232,93,4,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(250,163,7,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-texture {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 40px
      );
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,93,4,0.15);
      border: 1px solid rgba(232,93,4,0.4);
      color: var(--primary-light);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 .highlight {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 19px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      font-weight: 400;
      max-width: 560px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(232,93,4,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,93,4,0.60);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-num span {
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.50);
      font-weight: 400;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ─── SECTION GENERAL ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 56px;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,93,4,0.12), rgba(250,163,7,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      background: rgba(232,93,4,0.08);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 50px;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,93,4,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.60);
    }

    #proc-my .section-label {
      color: var(--accent);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: background 0.3s, transform 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-light);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .benefit-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .review-quote {
      font-size: 48px;
      line-height: 1;
      color: var(--primary);
      opacity: 0.25;
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: Georgia, serif;
    }

    .stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .reviewer-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info .name {
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
    }

    .reviewer-info .location {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      padding: 22px 24px;
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }

    .contact-icon-wrap {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-body a,
    .contact-item-body .value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary);
    }

    .contact-item-body .value.small {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-light);
      line-height: 1.5;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 32px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 32px
      );
    }

    .map-pin {
      font-size: 48px;
      position: relative;
      z-index: 1;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--
