<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOSTA CZ, s.r.o. | Výkopové práce Brno</title>
  <meta name="description" content="Profesionální výkopové a zemní práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420602763901">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E8A020;
      --primary-dark: #C4820A;
      --primary-light: #F5C050;
      --dark: #1A1A1A;
      --dark-2: #2A2A2A;
      --dark-3: #333333;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --white: #FFFFFF;
      --text: #1F2937;
      --text-light: #4B5563;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(232,160,32,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 0.68rem;
      color: #9CA3AF;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #D1D5DB;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-call-header {
      background: var(--primary);
      color: var(--dark);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-call-header:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1A1108 0%, #2D1F00 30%, #3D2800 60%, #1A1108 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 80% 50%, rgba(232,160,32,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(232,160,32,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    /* decorative grid pattern */
    .hero-grid-bg {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(232,160,32,1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,160,32,1) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
    }

    .hero-content {}

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 .highlight {
      color: var(--primary);
    }

    .hero-sub {
      font-size: 1.1rem;
      color: #C9CDD5;
      margin-bottom: 36px;
      line-height: 1.7;
      max-width: 480px;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--dark);
      padding: 15px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,160,32,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,160,32,0.5);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      padding: 15px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
      background: rgba(232,160,32,0.07);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat {}

    .hero-stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      color: #9CA3AF;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,160,32,0.2);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 360px;
    }

    .hero-card-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(232,160,32,0.4);
    }

    .hero-card h3 {
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-card p {
      color: #9CA3AF;
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    .hero-card-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-card-items li {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #D1D5DB;
      font-size: 0.88rem;
    }

    .hero-card-items li::before {
      content: '✓';
      width: 20px;
      height: 20px;
      background: rgba(232,160,32,0.15);
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ─── SECTIONS COMMON ─── */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,160,32,0.12);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      border: 1px solid rgba(232,160,32,0.2);
    }

    .section-header h2 {
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 1rem;
      max-width: 540px;
      margin: 0 auto;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      padding: 96px 20px;
      background: var(--white);
    }

    .sluzby-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border: 1px solid #E5E7EB;
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.3);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
      transition: background 0.25s, transform 0.25s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(232,160,32,0.25), rgba(232,160,32,0.12));
      transform: scale(1.08);
    }

    .sluzba-karta h3 {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.65;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      padding: 96px 20px;
      background: linear-gradient(135deg, #1A1108 0%, #2D1F00 50%, #1A1108 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(232,160,32,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .proc-my-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: #9CA3AF;
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,160,32,0.15);
      border-radius: var(--radius);
      padding: 40px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      position: relative;
    }

    .benefit-karta:hover {
      background: rgba(232,160,32,0.07);
      border-color: rgba(232,160,32,0.35);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 3.5rem;
      font-weight: 900;
      color: rgba(232,160,32,0.12);
      position: absolute;
      top: 20px;
      right: 24px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 2.2rem;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-karta h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-karta p {
      color: #9CA3AF;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      padding: 96px 20px;
      background: var(--gray-light);
    }

    .reference-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid #E5E7EB;
      position: relative;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.12);
    }

    .recenze-hvezdy {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .hvezda {
      color: var(--primary);
      font-size: 1.1rem;
    }

    .recenze-text {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-text::before {
      content: '"';
      font-size: 3rem;
      color: rgba(232,160,32,0.2);
      font-family: Georgia, serif;
      display: block;
      line-height: 0.5;
      margin-bottom: 10px;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--dark);
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .autor-info {}

    .autor-jmeno {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .autor-detail {
      font-size: 0.78rem;
      color: var(--gray);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      padding: 96px 20px;
      background: var(--white);
    }

    .kontakt-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {}

    .kontakt-info h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 28px;
      color: var(--text);
    }

    .kontakt-polozky {
      display: flex;
