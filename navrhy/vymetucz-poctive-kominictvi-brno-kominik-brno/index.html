<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vymetu.cz | Poctivé kominictví Brno</title>
  <meta name="description" content="Profesionální kominík v Brně a okolí. Čištění komínů, revize, vložkování. Rychlý servis, přijatelné ceny. Volejte +420731024559">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #C0392B;
      --primary-dark: #96281B;
      --primary-light: #E74C3C;
      --accent: #F39C12;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3d3d3d;
      --text: #333333;
      --text-light: #666666;
      --text-muted: #999999;
      --white: #ffffff;
      --gray-light: #f5f5f5;
      --gray: #eeeeee;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ───────────── BANNER ───────────── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ───────────── NAVBAR ───────────── */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaaaaa;
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    /* ───────────── HERO ───────────── */
    #hero {
      background: linear-gradient(135deg, #1a0a08 0%, #2d1007 30%, #4a1510 60%, #3d0f0d 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192, 57, 43, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(243, 156, 18, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '🏠';
      position: absolute;
      font-size: 400px;
      opacity: 0.03;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      line-height: 1;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 760px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192, 57, 43, 0.25);
      border: 1px solid rgba(192, 57, 43, 0.5);
      color: #ff8a7a;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    .hero-content h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #cccccc;
      margin-bottom: 40px;
      line-height: 1.6;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
    }

    .hero-stat-label {
      font-size: 13px;
      color: #aaaaaa;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      height: 40px;
      align-self: center;
    }

    /* ───────────── SECTIONS COMMON ───────────── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(192, 57, 43, 0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ───────────── SERVICES ───────────── */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(192,57,43,0.15);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(192,57,43,0.06));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ───────────── WHY US ───────────── */
    #proc-my {
      background: var(--dark);
      color: var(--white);
    }

    #proc-my .section-label {
      background: rgba(192,57,43,0.25);
      color: #ff8a7a;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #aaaaaa;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--dark2);
      border-radius: var(--radius);
      padding: 36px 32px;
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .benefit-card:hover {
      background: var(--dark3);
      transform: translateY(-3px);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      font-size: 42px;
      font-weight: 900;
      color: var(--primary-light);
      opacity: 0.3;
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-desc {
      font-size: 15px;
      color: #aaaaaa;
      line-height: 1.7;
    }

    /* ───────────── REVIEWS ───────────── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--gray-light);
      border-radius: var(--radius);
      padding: 32px;
      transition: all 0.3s;
      border: 1px solid var(--gray);
      position: relative;
    }

    .review-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: rgba(192,57,43,0.2);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      opacity: 0.4;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-footer {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .review-location {
      font-size: 13px;
      color: var(--text-muted);
    }

    .review-stars {
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ───────────── CONTACT ───────────── */
    #kontakt {
      background: linear-gradient(135deg, #1a0a08, #2d1007);
      color: var(--white);
    }

    #kontakt .section-label {
      background: rgba(192,57,43,0.25);
      color: #ff8a7a;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: #cccccc;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: background 0.2s;
    }

    .contact-item:hover {
      background: rgba(255,255,255,0.08);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: rgba(192,57,43,0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      color: #aaaaaa;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }

    .contact-item-value a {
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary-light);
    }

    .map-placeholder {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #888888;
    }

    .map-placeholder-icon {
      font-size: 52px;
    }

    .map-placeholder-text {
      font-size: 15px;
      text-align: center;
    }

    .map-placeholder-sub {
      font-size: 13px;
      color: #666666;
    }

    .contact-cta-block {
      margin-top: 52px;
      text-align: center;
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: var(--radius);
      padding: 40px 32px;
    }

    .contact-cta-block h3 {
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 10px;
    }

    .contact-cta-block p {
      color: #cccccc;
      margin-bottom: 24px;
    }

    .contact-cta-block .btn-primary {
      font-size: 18px;
      padding: 18px 40px;
    }

    /* ───────────── FOOTER ───────────── */
    footer {
      background: #111111;
      padding: 32px 20px;
      color: #888888;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .footer-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .footer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 28px;
      justify-content: center;
      font-size: 13px;
    }

    .footer-meta span {
      color: #666666;
    }
