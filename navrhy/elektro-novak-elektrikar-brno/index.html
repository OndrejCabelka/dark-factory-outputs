<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektro Novák – Profesionální elektrikář Brno</title>
<meta name="description" content="Profesionální elektrikář v Brně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420777123456.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #F5A800;
  --primary-dark: #D48F00;
  --primary-light: #FFD060;
  --dark: #0D0E12;
  --dark2: #16181F;
  --dark3: #1E2029;
  --text: #E8E9EF;
  --text-muted: #9EA3B5;
  --white: #ffffff;
  --card-bg: #1A1C25;
  --border: #2A2D3A;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  font-size: 16px;
}

/* ========== BANNER ========== */
#proposal-banner a { text-decoration: underline; }
#proposal-banner a:hover { opacity: 0.85; }

/* ========== NAVBAR ========== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,14,18,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-text span { color: var(--primary); }

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--primary); }

.btn-nav {
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 10px 20px;
  border-radius: 8px;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-nav:hover { background: var(--primary-light); transform: translateY(-1px); }

@media (max-width: 768px) {
  .nav-links { display: none; }
  .logo-text { font-size: 1.05rem; }
}

/* ========== HERO ========== */
#hero {
  position: relative;
  min-height: 88vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px 80px;
  overflow: hidden;
  background: linear-gradient(135deg, #0a0b0f 0%, #111318 40%, #1a1400 100%);
}

.hero-bg-glow {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(245,168,0,0.15) 0%, transparent 65%);
  pointer-events: none;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 780px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,168,0,0.12);
  border: 1px solid rgba(245,168,0,0.3);
  color: var(--primary);
  font-size: 0.82rem;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.4px;
}

#hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 900;
  line-height: 1.12;
  color: var(--white);
  letter-spacing: -1px;
  margin-bottom: 22px;
}

#hero h1 span { color: var(--primary); }

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.65;
}

.hero-cta {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 800;
  font-size: 1rem;
  padding: 15px 30px;
  border-radius: 10px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 6px 30px rgba(245,168,0,0.35);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(245,168,0,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 1rem;
  padding: 14px 28px;
  border-radius: 10px;
  border: 2px solid var(--border);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  background: rgba(245,168,0,0.08);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: clamp(20px, 5vw, 60px);
  margin-top: 60px;
  flex-wrap: wrap;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  display: block;
  line-height: 1;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
}

/* ========== SECTIONS COMMON ========== */
section { padding: 90px 20px; }

.section-tag {
  display: inline-block;
  background: rgba(245,168,0,0.1);
  color: var(--primary);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid rgba(245,168,0,0.2);
}

.section-title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-title span { color: var(--primary); }

.section-sub {
  font-size: 1rem;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.65;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
}

/* ========== SLUZBY ========== */
#sluzby { background: var(--dark2); }

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 22px;
}

.sluzba-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 34px 28px;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  border-color: rgba(245,168,0,0.35);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.sluzba-card:hover::before { opacity: 1; }

.sluzba-icon {
  width: 56px;
  height: 56px;
  background: rgba(245,168,0,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: background 0.25s;
}

.sluzba-card:hover .sluzba-icon { background: rgba(245,168,0,0.18); }

.sluzba-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.sluzba-card p {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ========== PROC MY ========== */
#proc-my { background: var(--dark); }

.benefity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 28px;
  margin-bottom: 60px;
}

.benefit-card {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  transition: border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  border-color: rgba(245,168,0,0.3);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 50px;
  height: 50px;
  background: rgba(245,168,0,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.benefit-card h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.benefit-card p {
  font-size: 0.875rem;
  color: var(--text-muted);
  line-height: 1.6;
}

.cta-strip {
  background: linear-gradient(135deg, #1a1500, #1f1a00);
  border: 1px solid rgba(245,168,0,0.25);
  border-radius: 18px;
  padding: 44px 40px;
  text-align: center;
}

.cta-strip h3 {
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 10px;
}

.cta-strip p {
  color: var(--text-muted);
  margin-bottom: 28px;
  font-size: 0.95rem;
}

/* ========== REFERENCE ========== */
#reference { background: var(--dark2); }

.recenze-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 22px;
}

.recenze-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 26px;
  position: relative;
  transition: transform 0.25s, border-color 0.25s;
}

.recenze-card:hover {
  transform: translateY(-4px);
  border-color: rgba(245,168,0,0.25);
}

.stars {
  color: var(--primary);
  font-size: 1rem;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.recenze-text {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.recenze-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 0.9rem;
  color: var(--dark);
  flex-shrink: 0;
}

.author-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--white);
}

.author-location {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.quote-mark {
  position: absolute;
  top: 20px;
  right: 22px;
  font-size: 3.5rem;
  color: rgba(245,168,0,0.08);
  font-family: Georgia, serif;
  line-height: 1;
}

/* ========== KONTAKT ========== */
#kontakt { background: var(--dark); }

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid { grid-template-columns: 1fr; }
}

.kontakt-info {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 30px;
}

.kontakt-info h3 {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 28px;
}

.kontakt-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
}

.kontakt-row:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.kontakt-row-icon {
  width: 44px;
  height: 44px;
  background: rgba(245,168,0,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.kontakt-row-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-row-value {
  font-size: 1rem;
  font-weight: 600;
  color: var(--white);
}

.kontakt-row-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-row-value a:hover { color: var(--primary-light); }

.mapa-placeholder {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
}

.mapa-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,168,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.05) 1px, transparent 1px);
  background-size: 30px 30px;
}

.mapa-pin {
  position: relative;
  z-index: 2;
  font-size: 3rem;
  animation: pulse-pin 2s ease-in-out infinite;
}

@keyframes pulse-pin {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.mapa-text {
  position: relative;
  z-index: 2;
  text-align: center;
}

.mapa-text strong {
  display: block;
  color: var(--white);
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 4px;
}

.mapa-text span {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ========== FOOTER ========== */
footer {
  background: var(--dark2);
  border-top: 1px solid var(--border);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}

.footer-logo {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--white);
}

.footer-logo span { color: var(--primary); }

.footer-meta {
  text-align: center;
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.footer-links {
  display: flex;
  gap: 20px;
  list-style: none;
}

.footer-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.82rem;
  transition: color 0.2s;
}

.footer-links a:hover { color: var(--primary); }

@media (max-width: 640px) {
  .footer-inner { flex-direction: column; text-align: center; }
  .footer-links { justify-content: center; }
}

/* ========== SCROLL LINE ========== */
.divider-line {
  width: 50px;
  height: 3px;
  background: var(--primary
