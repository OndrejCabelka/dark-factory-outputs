<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Brno – Aleš Urban | Voda Plyn Topení</title>
  <meta name="description" content="Profesionální instalatér v Brně a okolí. Oprava vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení. Volejte +420732206707">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1565C0;
      --primary-light: #1976D2;
      --primary-dark: #0D47A1;
      --accent: #F59E0B;
      --accent-dark: #D97706;
      --dark: #0A1628;
      --dark-2: #0F2040;
      --dark-3: #162B55;
      --text: #1E293B;
      --text-light: #64748B;
      --text-muted: #94A3B8;
      --white: #FFFFFF;
      --bg-light: #F0F6FF;
      --bg-card: #FFFFFF;
      --border: #E2E8F0;
      --shadow: 0 4px 24px rgba(21,101,192,0.10);
      --shadow-hover: 0 8px 40px rgba(21,101,192,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ─────────────────────────────────────── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
      position: relative;
      z-index: 1000;
    }

    #proposal-banner a {
      color: white;
      font-weight: bold;
    }

    /* ── HEADER / NAVBAR ─────────────────────────────── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #CBD5E1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--dark) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    }

    /* ── HERO ────────────────────────────────────────── */
    #hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 40%, var(--dark-3) 70%, #1a3a6e 100%);
      padding: 80px 20px 90px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 70% 50%, rgba(21,101,192,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 10% 80%, rgba(13,71,161,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🔧';
      position: absolute;
      right: -20px;
      top: 50%;
      transform: translateY(-50%) rotate(-15deg);
      font-size: 280px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(21,101,192,0.3);
      border: 1px solid rgba(21,101,192,0.5);
      color: #90CAF9;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      max-width: 700px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, #64B5F6, #42A5F5, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #90CAF9;
      margin-bottom: 36px;
      max-width: 560px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #E68900);
      color: #1A1A1A;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,158,11,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      height: 44px;
      align-self: center;
    }

    /* ── URGENCY BAR ─────────────────────────────────── */
    .urgency-bar {
      background: linear-gradient(90deg, var(--primary-dark), var(--primary));
      padding: 16px 20px;
    }

    .urgency-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      text-align: center;
    }

    .urgency-text {
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .urgency-phone {
      color: var(--accent);
      font-weight: 800;
      font-size: 18px;
      text-decoration: none;
      letter-spacing: 0.3px;
    }

    .urgency-phone:hover {
      text-decoration: underline;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      background: #4ADE80;
      border-radius: 50%;
      display: inline-block;
      position: relative;
      animation: pulse-anim 2s infinite;
    }

    @keyframes pulse-anim {
      0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    /* ── SEKCE OBECNĚ ────────────────────────────────── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ── SLUŽBY ──────────────────────────────────────── */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .karta-ikona {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--bg-light), #DBEAFE);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .karta-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #FEF3C7;
      color: #92400E;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .karta-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .karta-list li {
      font-size: 13px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .karta-list li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ── PROČ MY ─────────────────────────────────────── */
    #proc-my {
      background: var(--white);
    }

    .benefity-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-box {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1px solid #E0ECFF;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-box:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .benefit-content h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── REFERENCE ───────────────────────────────────── */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(21,101,192,0.3);
      color: #90CAF9;
    }

    #reference .section-sub {
      color: var(--text-muted);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s, background 0.25s;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.09);
    }

    .hvezdicky {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .recenze-text {
      color: #CBD5E1;
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #42A5F5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .autor-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .autor-jmeno {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .autor-detail {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── KONTAKT ─────────────────────────────────────── */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-polozka {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(21,101,192,0.07);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s;
    }

    .kontakt-polozka:hover {
      box-shadow: var(--shadow);
    }

    .kontakt-ico {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-polozka-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .kontakt-label {
      font-size: 12px;
      font
