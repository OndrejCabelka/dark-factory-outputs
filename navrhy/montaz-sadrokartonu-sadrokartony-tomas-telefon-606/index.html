<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sádrokartony Tomáš – Montáž sádrokartonu Praha</title>
<meta name="description" content="Profesionální montáž sádrokartonu v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 606 317 298.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8a020;
  --primary-dark: #c4841a;
  --primary-light: #f5c26b;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #6b7280;
  --white: #ffffff;
  --bg-light: #f8f7f4;
  --bg-card: #ffffff;
  --border: #e5e7eb;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,160,32,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg-light);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,160,32,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(232,160,32,0.50);
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 40%, #1a3a5c 70%, #16213e 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(232,160,32,0.15) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -60px;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(232,160,32,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(232,160,32,0.18);
  border: 1px solid rgba(232,160,32,0.35);
  color: var(--primary-light);
  border-radius: 50px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 54px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
  max-width: 750px;
  margin-left: auto;
  margin-right: auto;
}

#hero h1 .highlight {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2.2vw, 20px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 40px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 400;
  line-height: 1.55;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 6px 28px rgba(232,160,32,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(232,160,32,0.60);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.35);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.65);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
  position: relative;
  z-index: 1;
}

.hero-stat {
  text-align: center;
}

.hero-stat-number {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.60);
  font-weight: 500;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 72px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(232,160,32,0.12);
  color: var(--primary-dark);
  border-radius: 50px;
  padding: 5px 16px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(24px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 14px;
  letter-spacing: -0.5px;
  line-height: 1.2;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 540px;
  line-height: 1.65;
  margin-bottom: 48px;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--bg-light);
}

.services-header {
  text-align: center;
}

.services-header .section-desc {
  margin-left: auto;
  margin-right: auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(232,160,32,0.20);
}

.service-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
  color: var(--white);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.65);
}

#proc-my .section-label {
  background: rgba(232,160,32,0.20);
  color: var(--primary-light);
}

.benefits-header {
  text-align: center;
}

.benefits-header .section-desc {
  margin-left: auto;
  margin-right: auto;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  text-align: center;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  backdrop-filter: blur(8px);
}

.benefit-card:hover {
  background: rgba(232,160,32,0.08);
  border-color: rgba(232,160,32,0.35);
  transform: translateY(-4px);
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-text {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg-light);
}

.reference-header {
  text-align: center;
}

.reference-header .section-desc {
  margin-left: auto;
  margin-right: auto;
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 52px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
  opacity: 0.6;
}

.review-stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.70;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.review-location {
  font-size: 13px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: white;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h2 {
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.kontakt-info .lead {
  font-size: 17px;
  color: var(--text-light);
  margin-bottom: 36px;
  line-height: 1.60;
}

.kontakt-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 32px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  background: var(--bg-light);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.kontakt-item:hover {
  border-color: var(--primary-light);
  box-shadow: 0 4px 16px rgba(232,160,32,0.12);
}

.kontakt-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-body {}

.kontakt-item-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

.kontakt-item-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  text-decoration: none;
  display: block;
}

.kontakt-item-value:hover {
  color: var(--primary-dark);
}

.kontakt-cta-box {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg);
  padding: 28px;
  text-align: center;
  color: white;
}

.kontakt-cta-box p {
  font-size: 15px;
  opacity: 0.9;
  margin-bottom: 16px;
  line-height: 1.5;
}

.kontakt-cta-box .btn-white {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: white;
  color: var(--primary-dark);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.kontakt-cta-box .btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.20);
}

/* MAP PLACEHOLDER */
.map-placeholder {
  background: linear-gradient(135deg, #e8f0fe, #d2e3fc);
  border-radius: var(--radius-lg);
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px dashed #b8d0f5;
  gap: 12px;
  text-align: center;
  padding: 24px;
}

.map-placeholder .map-icon {
  font-size: 52px;
  opacity: 0.7;
}

.map-placeholder h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark3);
  margin-bottom: 4px;
}

.map-placeholder p {
  font-size: 14px;
  color: #5a7fa8;
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.55);
  padding: 36px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 16px;
  text-decoration: none;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg,
