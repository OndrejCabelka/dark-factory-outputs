<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natěrač fasád Brno | Malíř Brno | Zedník Brno</title>
  <meta name="description" content="Profesionální natěrač fasád, malíř a zedník v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte +420730553913">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E8650A;
      --primary-dark: #C4520A;
      --primary-light: #FF8C42;
      --accent: #F5A623;
      --dark: #1A1A2E;
      --dark-2: #16213E;
      --dark-3: #0F3460;
      --text-dark: #1e1e2e;
      --text-mid: #4a4a6a;
      --text-light: #f0f0f5;
      --bg-light: #F8F6F3;
      --bg-card: #FFFFFF;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,101,10,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: #fff;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text strong {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--text-mid);
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(232,101,10,0.30);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(232,101,10,0.40);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1A1208 0%, #2D1F0A 30%, #1A1208 60%, #0D0D0D 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(232,101,10,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 30%, rgba(245,166,35,0.12) 0%, transparent 70%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,101,10,0.18);
      border: 1px solid rgba(232,101,10,0.35);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      max-width: 780px;
      margin: 0 auto 20px;
      position: relative;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(15px, 2.2vw, 19px);
      color: rgba(255,255,255,0.75);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      position: relative;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      position: relative;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff;
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 28px rgba(232,101,10,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(232,101,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      color: #fff;
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      margin-top: 56px;
      position: relative;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .hero-stat span {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,101,10,0.10);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-header p {
      font-size: 16px;
      color: var(--text-mid);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,101,10,0.12), rgba(245,166,35,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: #fff;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(232,101,10,0.25);
    }

    .benefit-content h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.65;
    }

    .proc-my-visual {
      margin-top: 60px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
      border-radius: var(--radius-lg);
      padding: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }

    .proc-my-visual-text h3 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
    }

    .proc-my-visual-text p {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
    }

    .proc-my-visual .btn-primary {
      flex-shrink: 0;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 40px;
      line-height: 1;
      color: var(--primary-light);
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-stars {
      color: var(--accent);
      font-size: 16px;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .review-author-info span {
      font-size: 12px;
      color: var(--text-mid);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: #fff;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(0,0,0,0.07);
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .contact-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(232,101,10,0.12);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(232,101,10,0.12), rgba(245,166,35,0.12));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .contact-item-text span {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .contact-item-text a {
      text-decoration: none;
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8e4df 0%, #d4cdc5 100%);
      border-radius: var(--radius-lg);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(232,101,10,0.25);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 24px,
        rgba(232,101,10,0.04) 24px,
        rgba(232,101,10,0.04) 25px
      );
    }

    .map-placeholder-icon {
      font-size: 48px;
      position: relative;
    }

    .map-placeholder span {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-mid);
      position: relative;
    }

    .map-placeholder small {
      font-size: 12px;
      color: #999;
      position: relative;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.7);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .footer-logo-text strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .footer-logo-text small {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    .footer-info {
      text-align: center;
    }

    .footer-info p {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .footer-info a {
      color: var(--primary-light);
      text-decoration: none;
    }

    .footer-right {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.40);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .navbar {
        padding: 0 14px;
      }
      .logo-text span {
        display: none;
      }
      .nav-
