<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podlahové služby Brno | Profesionální pokládka podlah</title>
  <meta name="description" content="Profesionální pokládka všech druhů podlah v Brně a okolí. Rychlý servis, garantovaná kvalita, přijatelná cena. Volejte 775 785 243.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-light: #e8a020;
      --primary-dark: #a06a08;
      --dark: #1a1410;
      --dark-2: #241c14;
      --dark-3: #2e2418;
      --text-dark: #1a1410;
      --text-muted: #7a6a5a;
      --text-light: #b8a898;
      --bg-light: #faf8f5;
      --bg-card: #ffffff;
      --border: #e8e0d4;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(26,20,16,0.08);
      --shadow-md: 0 4px 24px rgba(26,20,16,0.12);
      --shadow-lg: 0 8px 48px rgba(26,20,16,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--bg-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 20, 16, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,134,10,0.2);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-call-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(200,134,10,0.35);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(200,134,10,0.5);
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--dark);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(200,134,10,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(200,134,10,0.08) 0%, transparent 50%),
        linear-gradient(135deg, #1a1410 0%, #2a1e10 40%, #1f1508 100%);
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 40px,
          rgba(200,134,10,0.8) 40px,
          rgba(200,134,10,0.8) 41px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 40px,
          rgba(200,134,10,0.8) 40px,
          rgba(200,134,10,0.8) 41px
        );
    }

    .hero-accent {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,134,10,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-accent-2 {
      position: absolute;
      bottom: -150px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,134,10,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,134,10,0.15);
      border: 1px solid rgba(200,134,10,0.3);
      color: var(--primary-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .hero-title {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.08;
      letter-spacing: -2px;
      margin-bottom: 24px;
      max-width: 800px;
    }

    .hero-title span {
      background: linear-gradient(135deg, var(--primary-light), #f0b840);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.65);
      max-width: 560px;
      margin-bottom: 44px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 64px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(200,134,10,0.4);
      letter-spacing: -0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(200,134,10,0.55);
      background: linear-gradient(135deg, var(--primary-light), #f0c040);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      border: 1.5px solid rgba(255,255,255,0.15);
      letter-spacing: -0.3px;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1px;
    }

    .hero-stat-number span {
      color: var(--primary-light);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }

    .hero-divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 96px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(200,134,10,0.1);
      color: var(--primary);
      border: 1px solid rgba(200,134,10,0.2);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -1.2px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 64px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(200,134,10,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,134,10,0.1), rgba(232,160,32,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
      letter-spacing: -0.4px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
    }

    .service-tag {
      background: rgba(200,134,10,0.08);
      color: var(--primary-dark);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(200,134,10,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 10% 80%, rgba(200,134,10,0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(200,134,10,0.15);
      border-color: rgba(200,134,10,0.3);
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(200,134,10,0.25);
      transform: translateY(-4px);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(200,134,10,0.15);
      letter-spacing: -3px;
      margin-bottom: -8px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    .benefit-highlight {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .review-quote {
      position: absolute;
      top: 24px;
      right: 28px;
      font-size: 48px;
      color: rgba(200,134,10,0.12);
      line-height: 1;
      font-family: Georgia, serif;
    }

    .review-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--primary);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #c8860a, #e8a020); }
    .review-avatar.a2 { background: linear-gradient(135deg, #2a6496, #3d8bca); }
    .review-avatar.a3 { background: linear-gradient(135deg, #3a7a4a, #52a869); }

    .review-info {
      display: flex;
      flex-direction: column;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-dark);
    }

    .review-meta {
      font-size: 12px;
      color: var(--text-light);
