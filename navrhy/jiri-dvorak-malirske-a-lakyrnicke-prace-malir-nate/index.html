<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiří Dvořák – Malířské a lakýrnické práce | Ústí nad Labem</title>
<meta name="description" content="Profesionální malíř natěrač v Ústí nad Labem. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte +420603443687">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8840a;
  --primary-dark: #c46d07;
  --primary-light: #f4a535;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #6b7280;
  --white: #ffffff;
  --bg-light: #fafaf8;
  --bg-section: #f5f0e8;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,132,10,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ======= BANNER ======= */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ======= NAVBAR ======= */
header {
  background: rgba(26, 26, 46, 0.97);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 2px solid var(--primary);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,132,10,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(232,132,10,0.5);
}

/* ======= HERO ======= */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
  position: relative;
  overflow: hidden;
  padding: 90px 20px 80px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -150px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(232,132,10,0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(232,132,10,0.10) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(232,132,10,0.15);
  border: 1px solid rgba(232,132,10,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

.hero-content {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

#hero h1 {
  font-size: clamp(26px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 22px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 19px);
  color: rgba(255,255,255,0.78);
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 6px 28px rgba(232,132,10,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 36px rgba(232,132,10,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary-light);
  background: rgba(232,132,10,0.12);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-num {
  display: block;
  font-size: 32px;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.stat-label {
  display: block;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 4px;
}

/* ======= SECTION GLOBAL ======= */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(232,132,10,0.10);
  color: var(--primary-dark);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 12px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.text-center {
  text-align: center;
}

.text-center .section-desc {
  margin: 0 auto;
}

/* ======= SERVICES ======= */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 24px;
  margin-top: 52px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(232,132,10,0.12), rgba(244,165,53,0.08));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(232,132,10,0.15);
}

.service-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ======= PROC MY ======= */
#proc-my {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(232,132,10,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-label {
  background: rgba(232,132,10,0.2);
  color: var(--primary-light);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.65);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  margin-top: 52px;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: background 0.3s, transform 0.3s;
  backdrop-filter: blur(6px);
}

.benefit-card:hover {
  background: rgba(232,132,10,0.10);
  transform: translateY(-4px);
  border-color: rgba(232,132,10,0.3);
}

.benefit-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(232,132,10,0.35);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.75;
}

/* ======= REFERENCE ======= */
#reference {
  background: var(--bg-section);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 24px;
  margin-top: 52px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,0.05);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 48px;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 12px;
  font-family: Georgia, serif;
}

.stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.avatar-1 { background: linear-gradient(135deg, #e8840a, #f4a535); }
.avatar-2 { background: linear-gradient(135deg, #0f3460, #16213e); }
.avatar-3 { background: linear-gradient(135deg, #2d7a2d, #4caf50); }

.reviewer-info strong {
  display: block;
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.reviewer-info span {
  font-size: 13px;
  color: var(--text-light);
}

/* ======= KONTAKT ======= */
#kontakt {
  background: var(--white);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  margin-top: 52px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  background: var(--bg-light);
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.05);
  transition: box-shadow 0.2s;
}

.contact-item:hover {
  box-shadow: var(--shadow);
}

.contact-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(232,132,10,0.30);
}

.contact-item-body strong {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.contact-item-body a,
.contact-item-body span {
  font-size: 17px;
  font-weight: 600;
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-body a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: linear-gradient(135deg, #e8f4f8, #d0e8f0);
  border-radius: var(--radius);
  height: 100%;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px dashed rgba(15,52,96,0.20);
  color: var(--dark3);
}

.map-placeholder .map-icon {
  font-size: 56px;
}

.map-placeholder h3 {
  font-size: 20px;
  font-weight: 700;
}

.map-placeholder p {
  font-size: 14px;
  color: var(--text-light);
  text-align: center;
  padding: 0 20px;
}

.map-placeholder .map-pin {
  background: var(--primary);
  color: var(--white);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
}

/* ======= FOOTER ======= */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.65);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.footer-logo-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.footer-meta {
  font-size: 12px;
  text-align: center;
  line-height: 1.9;
}

.footer-meta a {
  color: var(--primary-light);
  text-decoration: none;
}

.footer-meta a:hover {
  text-decoration: underline;
}

.footer-right {
  font-size: 12px;
  text-align: right;
  line-height: 1.9;
}

/* ======= RESPONSIVE ======= */
@media (max-width: 900px) {
  .contact-wrapper {
    grid-template-columns: 1fr;
  }
  .map-placeholder {
    min-height: 240px;
  }
}

@media (max-width
