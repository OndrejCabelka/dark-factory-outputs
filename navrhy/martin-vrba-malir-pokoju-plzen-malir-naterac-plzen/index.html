<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin Vrba | Malíř pokojů Plzeň</title>
  <meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Zavolejte: +420 736 226 197">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8a020;
      --primary-dark: #c8841a;
      --primary-light: #f5c45e;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #fafaf8;
      --bg-section: #f4f1eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,160,32,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      padding: 0 20px;
    }

    nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 10px 20px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta .icon {
      font-size: 1rem;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(232,160,32,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(232,160,32,0.10) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.4);
      color: var(--primary-light);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.78);
      margin-bottom: 38px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 30px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,160,32,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,160,32,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 30px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(232,160,32,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== SEKCE obecně ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,160,32,0.12);
      color: var(--primary-dark);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      margin-bottom: 48px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(232,160,32,0.08);
      text-align: center;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.3);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 2rem;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, rgba(232,160,32,0.30), rgba(232,160,32,0.12));
    }

    .service-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.55;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      padding: 80px 20px;
    }

    #proc-my .section-tag {
      background: rgba(232,160,32,0.2);
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(232,160,32,0.1);
      border-color: rgba(232,160,32,0.4);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 14px;
      opacity: 0.85;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(232,160,32,0.1);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: default;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .stars {
      color: var(--primary);
      font-size: 1.1rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.93rem;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--white);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--dark);
    }

    .author-info span {
      font-size: 0.78rem;
      color: var(--text-light);
    }

    .review-quote {
      font-size: 3rem;
      color: var(--primary);
      opacity: 0.2;
      line-height: 0.5;
      margin-bottom: 8px;
      font-family: Georgia, serif;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info h3 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .contact-details strong {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-details a {
      color: var(--dark);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .contact-details a:hover {
      color: var(--primary);
    }

    .contact-details span {
      font-size: 1rem;
      color: var(--text);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8f0f8, #d4e4f4);
      border-radius: var(--radius);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(15,52,96,0.2);
      text-align: center;
      padding: 20px;
    }

    .map-placeholder .map-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .map-placeholder p {
      color: var(--dark3);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .map-placeholder span {
      color: var(--text-light);
      font-size: 0.82rem;
      margin-top: 6px;
      display: block;
    }

    .cta-box {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      margin-top: 32px;
    }

    .cta-box p {
      color: rgba(255,255,255,0.9);
      margin-bottom: 16px;
      font-size: 1rem;
    }

    .cta-box .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .cta-box .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.6);
      padding: 36px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 14px 0;
    }

    .footer-links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--primary);
    }

    .footer-copy {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
      margin-top: 10px;
    }

    .footer-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 16px 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      section {
        padding: 60px 16px;
      }

      .kontakt-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .hero-stats {
        gap: 24px;
      }

      .stat-num {
        font-size: 1.6rem;
      }

      nav {
        height: 62px;
      }

      .nav-cta {
        font-size: 0.82rem;
        padding: 9px 16px;
      }

      .logo-main {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }

      .hero-btns {
        flex-direction: column;
        align-items:
