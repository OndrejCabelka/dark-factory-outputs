<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kominík Brno – Kontakt kominictví | +420 603 145 305</title>
  <meta name="description" content="Profesionální kominík v Brně a okolí. Čištění komínů, revize, vložkování. Rychlý servis, garantovaná kvalita, přijatelné ceny. Volejte +420 603 145 305.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark-2: #2c2c2c;
      --dark-3: #3d3d3d;
      --light: #f8f6f3;
      --white: #ffffff;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --text: #1f2937;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER ===================== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 400;
      line-height: 1.2;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(192,57,43,0.4);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(192,57,43,0.5);
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
    }

    .nav-cta-icon {
      font-size: 16px;
    }

    /* ===================== HERO ===================== */
    #hero {
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 30%, #3d1515 60%, #2a1010 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(192,57,43,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(192,57,43,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        45deg,
        var(--white) 0px,
        var(--white) 1px,
        transparent 1px,
        transparent 40px
      ),
      repeating-linear-gradient(
        -45deg,
        var(--white) 0px,
        var(--white) 1px,
        transparent 1px,
        transparent 40px
      );
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.4);
      color: #fca5a5;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      background: #f87171;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(30px, 5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #d1d5db;
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(192,57,43,0.55);
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.45);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: clamp(20px, 5vw, 60px);
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      display: block;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      display: block;
      margin-top: 2px;
    }

    .hero-stat-accent {
      color: var(--accent);
    }

    /* ===================== SECTIONS COMMON ===================== */
    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
      color: var(--primary);
      border: 1px solid rgba(192,57,43,0.2);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===================== SERVICES ===================== */
    #sluzby {
      padding: 90px 20px;
      background: var(--light);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.35s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.15);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      transition: all 0.35s ease;
    }

    .service-card:hover .service-icon-wrap {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      transform: scale(1.08);
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--gray-light);
      color: var(--gray);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ===================== WHY US ===================== */
    #proc-my {
      padding: 90px 20px;
      background: var(--white);
    }

    .benefits-wrapper {
      max-width: 1100px;
      margin: 0 auto;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 32px;
      background: var(--light);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .benefit-item:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      background: var(--white);
    }

    .benefit-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(192,57,43,0.3);
    }

    .benefit-content {}

    .benefit-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===================== REFERENCES ===================== */
    #reference {
      padding: 90px 20px;
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 50%, #1a0a0a 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(192,57,43,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(230,126,34,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(192,57,43,0.25);
      border-color: rgba(192,57,43,0.35);
      color: #fca5a5;
    }

    #reference .section-desc {
      color: #9ca3af;
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: all 0.35s ease;
    }

    .review-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(192,57,43,0.35);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #e5e7eb;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.av1 { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .review-avatar.av2 { background: linear-gradient(135deg, #e67e22, #f39c12); }
    .review-avatar.av3 { background: linear-gradient(135deg, #922b21, #c0392b); }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 14px;
    }

    .review-city {
      font-size: 12px;
      color: #9ca3af;
    }

    /* ===================== CONTACT ===================== */
    #kontakt {
      padding: 90px 20px;
      background: var(--light);
    }

    .contact-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info {}

    .contact-info-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .contact-info-sub {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(192,57,43,0.12);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px
