<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Lejsek | Zakázkový nábytek na míru – Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E0A;
      --accent: #D2691E;
      --accent-light: #E8A87C;
      --gold: #C8860A;
      --dark: #1A0F08;
      --dark-mid: #2C1A0E;
      --dark-card: #3D2314;
      --text-dark: #1A0F08;
      --text-mid: #4A3020;
      --text-light: #8B6B55;
      --white: #FFFFFF;
      --off-white: #FAF7F4;
      --light-bg: #F5EFE8;
      --border: #E8D5C4;
      --shadow: 0 4px 24px rgba(139, 69, 19, 0.12);
      --shadow-hover: 0 8px 40px rgba(139, 69, 19, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--off-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ─── HEADER / NAV ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 14px rgba(139,69,19,0.4);
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139,69,19,0.5) !important;
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(165deg, rgba(26,15,8,0.92) 0%, rgba(44,26,14,0.88) 50%, rgba(92,46,10,0.80) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(139,69,19,0.04) 40px,
          rgba(139,69,19,0.04) 80px
        );
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139,69,19,0.20) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(210,105,30,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139,69,19,0.25);
      border: 1px solid rgba(210,105,30,0.4);
      color: var(--accent-light);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .hero-h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
    }

    .hero-h1 span {
      background: linear-gradient(135deg, var(--accent-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
      max-width: 520px;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      text-decoration: none;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(139,69,19,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(139,69,19,0.55);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.07);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-num span {
      color: var(--accent-light);
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card-big {
      background: linear-gradient(145deg, rgba(61,35,20,0.9), rgba(44,26,14,0.95));
      border: 1px solid rgba(139,69,19,0.35);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .hero-card-big-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .hero-card-big-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--white);
      margin-bottom: 8px;
    }

    .hero-card-big-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }

    .hero-mini-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hero-mini-card {
      background: linear-gradient(145deg, rgba(61,35,20,0.8), rgba(44,26,14,0.9));
      border: 1px solid rgba(139,69,19,0.25);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .hero-mini-card:hover {
      border-color: rgba(210,105,30,0.5);
    }

    .hero-mini-card-icon {
      font-size: 26px;
      flex-shrink: 0;
    }

    .hero-mini-card-text {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      line-height: 1.3;
    }

    /* ─── SECTION SHARED ─── */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139,69,19,0.1);
      border: 1px solid rgba(139,69,19,0.2);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 60px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      background: var(--white);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.25);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(139,69,19,0.12), rgba(210,105,30,0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      border: 1px solid rgba(139,69,19,0.15);
    }

    .sluzba-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
    }

    .sluzba-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .sluzba-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .sluzba-features li {
      font-size: 13px;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sluzba-features li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: linear-gradient(165deg, var(--dark) 0%, var(--dark-mid) 100%);
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(139,69,19,0.03) 60px,
        rgba(139,69,19,0.03) 120px
      );
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-sub {
      color: rgba(255,255,255,0.6);
    }

    #proc-my .section-label {
      background: rgba(139,69,19,0.3);
      border-color: rgba(210,105,30,0.4);
      color: var(--accent-light);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(139,69,19,0.15);
      border-color: rgba(210,105,30,0.35);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(139,69,19,0.4);
    }

    .benefit-title {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
    }

    .benefit-text {
      font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
    }

    .benefit-highlight {
      display: inline-block;
      margin-top: 20px;
      background: rgba(139,69,19,0.3);
      border: 1px solid rgba(210,105,30,0.3);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--light-bg);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-quote {
      font-size: 48px;
      color: var(--primary);
      opacity: 0.2;
      line-height: 1;
      font-family: Georgia, serif;
      position: absolute;
      top: 20px;
      right: 28px;
    }

    .recenze-stars {
      color: var(--gold);
      font-size: 18px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-author {
