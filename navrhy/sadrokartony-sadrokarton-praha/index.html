<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sádrokartony Praha – Profesionální sádrokartonové práce</title>
  <meta name="description" content="Profesionální sádrokartonové práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte +420606131296.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8a020;
      --primary-dark: #c4841a;
      --primary-light: #f5c060;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2d2d2d;
      --text-light: #6b7280;
      --white: #ffffff;
      --bg-light: #f8f7f4;
      --bg-card: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,160,32,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── BANNER ── */
    #proposal-banner a { text-decoration: underline; }

    /* ── NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--white);
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(232,160,32,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,160,32,0.5);
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
      color: var(--white);
      padding: 80px 20px 90px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 40%, rgba(232,160,32,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(232,160,32,0.07) 0%, transparent 55%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .hero-inner {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.80);
      margin-bottom: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,160,32,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,160,32,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.30);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.60);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ── SECTION COMMON ── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(232,160,32,0.12);
      color: var(--primary-dark);
      border: 1px solid rgba(232,160,32,0.30);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      color: var(--dark);
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 520px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 480px) {
      .services-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 860px) {
      .services-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.25);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(232,160,32,0.20);
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--dark);
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── PROC MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 640px) {
      .benefits-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
      color: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: 0 4px 24px rgba(15,52,96,0.20);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: rgba(232,160,32,0.08);
      border-radius: 50%;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(15,52,96,0.30);
    }

    .benefit-num {
      font-size: 42px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .benefit-card h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--white);
    }

    .benefit-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.70);
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 640px) {
      .reviews-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 900px) {
      .reviews-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.70;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--dark-3));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--dark);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: var(--white);
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.65);
    }

    #kontakt .section-label {
      background: rgba(232,160,32,0.18);
      color: var(--primary-light);
      border-color: rgba(232,160,32,0.35);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 720px) {
      .contact-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 1000px) {
      .contact-grid { grid-template-columns: 1fr 1fr 1fr; }
    }

    .contact-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 30px 24px;
      transition: background 0.25s, border-color 0.25s;
      backdrop-filter: blur(8px);
    }

    .contact-card:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(232,160,32,0.40);
    }

    .contact-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .contact-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .contact-card a {
      color: var(--primary-light);
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      transition: color 0.2s;
      display: block;
    }

    .contact-card a:hover {
      color: var(--white);
    }

    .contact-card p {
      color: rgba(255,255,255,0.70);
      font-size: 15px;
      line-height: 1.5;
    }

    .map-placeholder {
      margin-top: 48px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
    }

    .map-placeholder-icon {
      font-size: 36px;
      opacity: 0.5;
    }

    /* ── FOOTER ── */
    footer {
      background: #0d0d1a;
      color: rgba(255,255,255,0.45);
      text-align: center;
      padding: 28px 20px;
      font-size: 13px;
      line-height: 1.8;
    }

    footer strong {
      color: rgba(255,255,255,0.70);
    }

    footer a {
      color: var(--primary-light);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--white);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 48px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 4px;
      margin: 16px 0 0 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      section { padding: 60px 16px; }
      #hero { padding: 60px 16px 70px; }
      .hero-stats { gap: 22px; }
      .nav-logo-sub { display: none; }
    }
  </style>
</head>
<body>
