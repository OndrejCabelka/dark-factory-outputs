<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martin Tejml – CITO | Klempíř Plzeň | Střecha od A do Z</title>
  <meta name="description" content="Profesionální klempířské práce v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna a opravy. Martin Tejml – CITO." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --bg-card: #ffffff;
      --border: #e9ecef;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 12px 40px rgba(192,57,43,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner a {
      text-decoration: underline;
      margin: 0 4px;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 20px;
    }

    .nav-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      gap: 1px;
    }

    .logo-main {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-main span {
      color: var(--primary-light);
    }

    .logo-sub {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta-icon {
      font-size: 1rem;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
      padding: 90px 20px 80px;
      overflow: hidden;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 30%, rgba(230,126,34,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ff8a7a;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      max-width: 580px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
    }

    .hero-stat-label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── SECTIONS SHARED ─── */
    .section-label {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      padding: 80px 20px;
      background: var(--white);
    }

    .sluzby-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 34px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.2);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(230,126,34,0.14));
    }

    .sluzba-karta h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .proc-my-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-karta:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 22px;
    }

    .benefit-karta h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .benefit-karta p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      padding: 80px 20px;
      background: var(--white);
    }

    .reference-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-quote {
      font-size: 3.5rem;
      color: var(--primary);
      line-height: 0.6;
      margin-bottom: 18px;
      font-family: Georgia, serif;
      opacity: 0.6;
    }

    .hvezdicky {
      color: #f39c12;
      font-size: 1.1rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
    }

    .recenze-mesto {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      padding: 80px 20px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
      position: relative;
      overflow: hidden;
    }

    #kontakt::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 80% 50%, rgba(192,57,43,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #kontakt .section-label {
      background: rgba(192,57,43,0.3);
      color: #ff8a7a;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .kontakt-grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .kontakt-karta {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 32px 26px;
      text-align: center;
      transition: background 0.25s, transform 0.25s;
      backdrop-filter: blur(8px);
    }

    .kontakt-karta:hover {
      background: rgba(255,255,255,0.11);
      transform: translateY(-4px);
    }

    .kontakt-icon {
      font-size: 2.2rem;
      margin-bottom: 14px;
      display: block;
    }

    .kontakt-karta h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .kontakt-karta a {
      color: var(--white);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      transition: color 0.2s;
    }

    .kontakt-karta a:hover {
      color: #ff8a7a;
    }

    .kontakt-karta p {
      color: rgba(255,255,255,0.75);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .mapa-placeholder {
      max-width: 960px;
      margin: 36px auto 0;
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(8px);
    }

    .mapa-placeholder span:first-child {
      font-size: 2.5rem;
    }

    .mapa-placeholder p {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .mapa-placeholder strong {
      color: rgba(255,255,255,0.9);
    }

    /* ─── CTA BANNER ─── */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      padding: 60px 20px;
      text-align: center;
    }

    .cta-banner h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .cta-banner p {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      margin-bottom: 30px;
    }

    .cta-banner .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--white);
      color: var
