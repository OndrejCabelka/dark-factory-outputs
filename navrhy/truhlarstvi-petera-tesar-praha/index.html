<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství - Petera | Tesař Praha</title>
  <meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Volejte +420251810856">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c47a1e;
      --primary-dark: #a35f0e;
      --primary-light: #e8a84a;
      --dark: #1a1208;
      --dark-2: #2c1f0a;
      --dark-3: #3d2c10;
      --text: #1a1208;
      --text-light: #5c4a2a;
      --text-muted: #8a7355;
      --bg: #faf8f4;
      --bg-card: #ffffff;
      --border: #e8dcc8;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(26,18,8,0.10);
      --shadow-hover: 0 8px 40px rgba(196,122,30,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary-dark);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary-light);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
      background: rgba(196,122,30,0.1);
    }

    .nav-cta {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px !important;
      border-radius: var(--radius) !important;
      font-weight: 700 !important;
      font-size: 14px !important;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s !important;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-cta:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    @media (max-width: 700px) {
      .nav-links {
        display: none;
      }
      .nav-mobile-cta {
        display: flex !important;
      }
    }

    .nav-mobile-cta {
      display: none;
      align-items: center;
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(160deg, rgba(26,18,8,0.92) 0%, rgba(44,31,10,0.85) 50%, rgba(100,60,10,0.80) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(196,122,30,0.04) 0px,
          rgba(196,122,30,0.04) 1px,
          transparent 1px,
          transparent 40px
        );
      background-color: #1a1208;
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px 60px;
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(196,122,30,0.03) 60px,
          rgba(196,122,30,0.03) 61px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 80px,
          rgba(196,122,30,0.02) 80px,
          rgba(196,122,30,0.02) 81px
        );
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,122,30,0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    .hero-glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,122,30,0.10) 0%, transparent 70%);
      bottom: -50px;
      left: -50px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(196,122,30,0.2);
      border: 1px solid rgba(196,122,30,0.4);
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-content h1 span {
      color: var(--primary-light);
      position: relative;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #c8b89a;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(196,122,30,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(196,122,30,0.45);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(196,122,30,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: #998770;
      font-weight: 500;
    }

    /* ===== SECTIONS ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(196,122,30,0.12);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(196,122,30,0.25);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
      line-height: 1;
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 18px;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 8px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(196,122,30,0.02) 0px,
        rgba(196,122,30,0.02) 1px,
        transparent 1px,
        transparent 50px
      );
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #998870;
    }

    #proc-my .section-tag {
      background: rgba(196,122,30,0.2);
      color: var(--primary-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(196,122,30,0.2);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .benefit-card:hover {
      background: rgba(196,122,30,0.08);
      border-color: rgba(196,122,30,0.4);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 56px;
      font-weight: 900;
      color: rgba(196,122,30,0.2);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-title {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-desc {
      font-size: 15px;
      color: #998870;
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: #f5f0e8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 52px;
      color: var(--primary-light);
      line-height: 0.5;
      margin-bottom: 16px;
      display: block;
      font-family: Georgia, serif;
      opacity: 0.6;
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-role {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    }

    .kontakt-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
      border-color: rgba(196,122,30,0.2);
    }

    .kontakt-card-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(196,122,30,0.15), rgba(196,122,30,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .kontakt-card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .kontakt-card-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .kontakt-card-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-card-value a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8dcc8, #d4c4a0);
      border-radius: var(--radius-lg);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(196,122,30,0.3);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
