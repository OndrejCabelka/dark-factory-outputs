<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální nátěry fasád v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 775 442 542.">
<title>Nátěry Fasád Brno | Profesionální natěrač | 775 442 542</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E8630A;
  --primary-dark: #C4500A;
  --primary-light: #F4844A;
  --secondary: #2C3E50;
  --dark: #1A1A2E;
  --dark2: #16213E;
  --text: #2d2d2d;
  --text-light: #666;
  --white: #ffffff;
  --light-bg: #F8F6F3;
  --card-bg: #ffffff;
  --border: #e8e8e8;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,99,10,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  line-height: 1.6;
  background: var(--white);
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 900;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(232,99,10,0.3);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(232,99,10,0.4);
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1A1A2E 0%, #2C1810 40%, #3D200E 70%, #1A1A2E 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 88vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(232,99,10,0.15) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(244,132,74,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-pattern {
  position: absolute;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  opacity: 0.03;
  background-image: repeating-linear-gradient(
    45deg,
    #fff 0,
    #fff 1px,
    transparent 0,
    transparent 50%
  );
  background-size: 30px 30px;
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,99,10,0.15);
  border: 1px solid rgba(232,99,10,0.35);
  color: var(--primary-light);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 20px;
  width: fit-content;
}

.hero-content h1 {
  font-size: clamp(30px, 6vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  color: var(--primary-light);
  position: relative;
  display: inline-block;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  font-weight: 400;
  line-height: 1.6;
  max-width: 540px;
  margin-bottom: 36px;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.25s ease;
  box-shadow: 0 6px 28px rgba(232,99,10,0.40);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(232,99,10,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.25s ease;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 4px;
}

.hero-visual {
  display: none;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(232,99,10,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-light);
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--light-bg);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
}

.service-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid transparent;
  transition: all 0.30s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transition: width 0.35s ease;
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,99,10,0.12);
}

.service-card:hover::before {
  width: 100%;
}

.service-icon {
  width: 62px;
  height: 62px;
  background: linear-gradient(135deg, rgba(232,99,10,0.12), rgba(244,132,74,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.3s ease;
}

.service-card:hover .service-icon {
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
  max-width: 1000px;
  margin: 0 auto;
}

.benefit-item {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  padding: 28px;
  background: var(--light-bg);
  border-radius: var(--radius);
  transition: all 0.25s ease;
  border: 1px solid transparent;
}

.benefit-item:hover {
  background: var(--white);
  border-color: rgba(232,99,10,0.15);
  box-shadow: var(--shadow);
  transform: translateX(4px);
}

.benefit-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(232,99,10,0.25);
}

.benefit-text h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.benefit-text p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: -40%;
  left: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(232,99,10,0.08) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-header p {
  color: rgba(255,255,255,0.55);
}

#reference .section-tag {
  background: rgba(232,99,10,0.20);
  color: var(--primary-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  max-width: 1050px;
  margin: 0 auto;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 30px 28px;
  transition: all 0.30s ease;
  position: relative;
  backdrop-filter: blur(10px);
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(232,99,10,0.30);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0.7;
  font-family: Georgia, serif;
}

.review-stars {
  color: #FFB800;
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.72;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== CONTACT ===== */
#kontakt {
  background: var(--light-bg);
}

.contact-wrapper {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

.contact-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 32px;
  box-shadow: var(--shadow);
}

.contact-card h3 {
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 28px;
  padding-bottom: 18px;
  border-bottom: 2px solid var(--light-bg);
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  margin-bottom: 24px;
}

.contact-item:last-child {
  margin-bottom: 0;
}

.contact-ico {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(232,99,10,0.12), rgba(244,132,74,0.08));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-detail-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 4px;
}

.contact-detail-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
  display: block;
}

.contact-detail-value:hover {
  color: var(--primary);
}

.contact-detail-sub {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}

.map-placeholder {
  background: linear-gradient(135deg, #2C3E50, #1A252F);
  border-radius: var(--radius);
  min-height: 260px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  border: 2px dashed rgba(232,99,10,0.30);
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.015) 20px,
    rgba(255,255,255,0.015) 40px
  );
}

.map-icon {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  position: relative;
  z-index: 1;
}

.map-subtext {
  font-size: 14px;
  color: rgba(255,255,255,0.50);
  position: relative;
  z-index: 1;
}

.map-pin-pulse {
  width: 20px;
  height: 20px;
  background: var(--primary);
  border-radius: 50%;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 0 0 rgba(232,99,10,0.6);
  animation: pulse-map 2s infinite;
}

@keyframes pulse-map {
  0% { box-shadow: 0 0 0 0 rgba(232,99,10,0.6); }
  70% { box-shadow: 0 0 0 16px rgba(232,99,10,0); }
  100% { box-shadow: 0 0 0
