<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ost - Plus S.r.o. | Klempíř Teplice</title>
<meta name="description" content="Profesionální klempířské služby v Teplice a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte +420417560309.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --accent: #f59e0b;
  --dark: #0f172a;
  --dark-2: #1e293b;
  --dark-3: #334155;
  --light: #f1f5f9;
  --white: #ffffff;
  --text: #334155;
  --text-light: #64748b;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 36px rgba(37,99,235,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== BANNER ===== */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--dark);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 2px 16px rgba(0,0,0,0.18);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(37,99,235,0.35);
}

.header-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(37,99,235,0.45);
}

/* ===== NAV ===== */
nav {
  display: flex;
  gap: 4px;
}

nav a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}

nav a:hover {
  color: var(--white);
  background: rgba(255,255,255,0.08);
}

@media (max-width: 768px) {
  nav { display: none; }
  .logo-sub { display: none; }
  .logo-name { font-size: 15px; }
  .header-cta { padding: 9px 14px; font-size: 13px; }
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(135deg, rgba(15,23,42,0.96) 0%, rgba(30,58,138,0.92) 50%, rgba(15,23,42,0.97) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 80px
    );
  min-height: 88vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

.hero-decor {
  position: absolute;
  top: -120px;
  right: -120px;
  width: 520px;
  height: 520px;
  background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.hero-decor-2 {
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 360px;
  height: 360px;
  background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(37,99,235,0.15);
  border: 1px solid rgba(37,99,235,0.3);
  color: var(--primary-light);
  font-size: 12.5px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

#hero h1 {
  font-size: clamp(30px, 4.5vw, 52px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.12;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.70);
  margin-bottom: 36px;
  line-height: 1.65;
  max-width: 520px;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 44px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  box-shadow: 0 4px 20px rgba(37,99,235,0.40);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(37,99,235,0.52);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.06);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.18);
  transition: background 0.2s, border-color 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.35);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 2;
}

.hero-card-visual {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px;
  padding: 40px;
  backdrop-filter: blur(8px);
  width: 100%;
  max-width: 380px;
}

.hcv-title {
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  margin-bottom: 20px;
}

.hcv-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.hcv-item:last-child {
  border-bottom: none;
}

.hcv-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, rgba(37,99,235,0.3), rgba(37,99,235,0.1));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.hcv-text {
  color: rgba(255,255,255,0.82);
  font-size: 14px;
  font-weight: 500;
}

@media (max-width: 900px) {
  .hero-inner {
    grid-template-columns: 1fr;
    gap: 40px;
    text-align: center;
  }
  .hero-visual { display: none; }
  .hero-sub { margin-left: auto; margin-right: auto; }
  .hero-btns { justify-content: center; }
  .hero-stats { justify-content: center; }
  .hero-badge { margin-left: auto; margin-right: auto; }
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  max-width: 640px;
  margin: 0 auto 60px;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 96px 20px;
  background: var(--light);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.05);
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(37,99,235,0.10), rgba(37,99,235,0.05));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
  transition: background 0.3s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(37,99,235,0.18), rgba(37,99,235,0.09));
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14.5px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== WHY US ===== */
#proc-my {
  padding: 96px 20px;
  background: var(--white);
}

.why-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.why-card {
  background: var(--white);
  border: 2px solid var(--light);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}

.why-card:hover {
  border-color: var(--primary-light);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(37,99,235,0.12);
}

.why-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 24px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.30);
}

.why-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.why-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 20px;
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-label {
  color: var(--accent);
}

#reference .section-desc {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 34px 28px;
  transition: background 0.3s, transform 0.3s;
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-3px);
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
  font-size: 17px;
}

.review-text {
  color: rgba(255,255,255,0.80);
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: var(--primary-light);
  line-height: 0;
  position: relative;
  top: 14px;
  margin-right: 4px;
  font-style: normal;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  color: var(--white);
  font-size: 14px;
}

.reviewer-info {
  font-size: 12.5px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== CONTACT ===== */
#kontakt {
  padding: 96px 20px;
  background: var(--light);
}

.contact-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  background: var(--white);
  border-radius: var(--radius);
  padding: 44px 40px;
  box-shadow: var(--shadow);
}

.contact-info-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 8px;
}

.contact-info-sub {
  font-size: 15px;
  color: var(--text-light);
  margin-bottom: 36px;
  line-height: 1.6;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(37,99,235,0.10), rgba(37,99,235,0.05));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-light);
  font-weight: 600;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 16px;
