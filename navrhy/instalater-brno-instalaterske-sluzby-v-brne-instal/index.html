<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Brno – Profesionální instalatérské služby</title>
  <meta name="description" content="Profesionální instalatér v Brně a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 776291933.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #1155a0;
      --primary-light: #3b8fd4;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f7ff;
      --bg-gray: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-phone {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(26,111,196,0.35);
    }

    .btn-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,111,196,0.5);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0f2744 40%, #1a3a6e 70%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(26,111,196,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 100%, rgba(17,85,160,0.2) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.35);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: #94a3b8;
      margin-bottom: 36px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 25px rgba(26,111,196,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(26,111,196,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 30px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .stat-num span {
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      margin: auto 0;
    }

    /* ─── SECTIONS COMMON ─── */
    .section {
      padding: 80px 20px;
    }

    .section-alt {
      background: var(--bg-gray);
    }

    .section-blue {
      background: var(--bg-light);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,111,196,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 17px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      background: var(--bg-light);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.65;
    }

    .service-badge {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: var(--bg-light);
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ─── PROC MY ─── */
    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--white);
      padding: 28px 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon {
      width: 54px;
      height: 54px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .benefit-icon.blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
    .benefit-icon.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
    .benefit-icon.amber { background: linear-gradient(135deg, #fef3c7, #fde68a); }

    .benefit-content h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-content p {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ─── REFERENCE ─── */
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      line-height: 1;
      color: var(--primary);
      opacity: 0.2;
      position: absolute;
      top: 16px;
      right: 22px;
      font-family: Georgia, serif;
      font-weight: 900;
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 15px;
      color: var(--dark);
      font-weight: 700;
    }

    .reviewer-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--dark);
      color: var(--white);
    }

    #kontakt .section-tag {
      background: rgba(26,111,196,0.25);
      color: #60a5fa;
    }

    #kontakt .section-header h2 {
      color: var(--white);
    }

    #kontakt .section-header p {
      color: #94a3b8;
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      padding: 20px 22px;
      transition: background 0.2s;
    }

    .kontakt-item:hover {
      background: rgba(255,255,255,0.09);
    }

    .kontakt-item-icon {
      font-size: 26px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
      font-weight: 600;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
    }

    .kontakt-item-value a {
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: #60a5fa;
    }

    .map-placeholder {
      background: rgba(255,255,255,0.04);
      border: 1.5px dashed rgba(255,255,255,0.15);
      border-radius: var(--radius);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 32px;
    }

    .map-placeholder-icon {
      font-size: 48px;
      opacity: 0.6;
    }

    .map-placeholder h4 {
      font-size: 18px;
      color: #94a3b8;
      font-weight: 600;
    }

    .map-placeholder p {
      font-size: 14px;
      color: #475569;
    }

    .emergency-banner {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: var(--radius);
      padding: 32px 28px;
      text-align: center;
      margin-top: 32px;
    }

    .emergency-banner h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
    }

    .emergency-banner p {
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
      font-size: 15px;
    }

    .btn-emergency {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      color: var(--primary-dark);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius-sm);
      font-weight: 800;
      font-size: 17px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .btn-emergency:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* ─── FOOTER ─── */
    footer {
      background: #060d1c;
      color: #475569;
      text-align: center;
      padding: 32px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display
