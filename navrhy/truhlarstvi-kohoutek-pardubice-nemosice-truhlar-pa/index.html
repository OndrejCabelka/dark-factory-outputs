<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truhlářství Kohoutek – Pardubice, Nemošice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #C67C2A;
  --primary-dark: #A5611A;
  --primary-light: #E8A04A;
  --dark: #1A1208;
  --dark2: #2C1E0F;
  --text: #3D2B1A;
  --text-light: #7A6050;
  --white: #FFFFFF;
  --bg-light: #FAF6F1;
  --bg-section: #F3EDE4;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 36px rgba(198,124,42,0.18);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(26,18,8,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(198,124,42,0.2);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: 0.3px;
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.2s;
  white-space: nowrap;
}

.header-cta:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

.header-cta .cta-icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(135deg, rgba(26,18,8,0.93) 0%, rgba(60,35,10,0.88) 50%, rgba(26,18,8,0.95) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(198,124,42,0.04) 0px,
      rgba(198,124,42,0.04) 1px,
      transparent 1px,
      transparent 60px
    );
  background-color: #1A1208;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.hero-wood-accent {
  position: absolute;
  top: 0;
  right: 0;
  width: 45%;
  height: 100%;
  background: linear-gradient(135deg, transparent 30%, rgba(198,124,42,0.06) 100%);
  pointer-events: none;
}

.hero-wood-lines {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 80px,
      rgba(198,124,42,0.03) 80px,
      rgba(198,124,42,0.03) 81px
    );
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 100px 24px 80px;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(198,124,42,0.15);
  border: 1px solid rgba(198,124,42,0.35);
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.4px;
}

#hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  max-width: 750px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.75);
  max-width: 560px;
  margin-bottom: 42px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 64px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  padding: 14px 30px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(198,124,42,0.4);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(198,124,42,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  padding: 13px 28px;
  border-radius: 50px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary-light);
  background: rgba(198,124,42,0.1);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== SEKCE HEADER ===== */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: rgba(198,124,42,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid rgba(198,124,42,0.2);
}

.section-header h2 {
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.section-header p {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 96px 24px;
  background: var(--bg-light);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  font-size: 40px;
  margin-bottom: 18px;
  display: block;
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--primary);
  font-weight: 600;
  font-size: 0.88rem;
  margin-top: 16px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 9px;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 96px 24px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    rgba(198,124,42,0.03) 0px,
    rgba(198,124,42,0.03) 1px,
    transparent 1px,
    transparent 50px
  );
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-tag {
  background: rgba(198,124,42,0.2);
  border-color: rgba(198,124,42,0.3);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(198,124,42,0.18);
  border-radius: var(--radius);
  padding: 38px 32px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(198,124,42,0.08);
  border-color: rgba(198,124,42,0.4);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 58px;
  height: 58px;
  border-radius: 14px;
  background: rgba(198,124,42,0.15);
  border: 1px solid rgba(198,124,42,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.93rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 24px;
  background: var(--bg-section);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 34px 30px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-stars {
  color: #F5A623;
  font-size: 17px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 22px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  font-weight: 700;
  flex-shrink: 0;
}

.review-info strong {
  display: block;
  font-size: 0.93rem;
  font-weight: 700;
  color: var(--dark);
}

.review-info span {
  font-size: 0.82rem;
  color: var(--text-light);
}

.review-quote {
  position: absolute;
  top: 22px;
  right: 26px;
  font-size: 52px;
  color: rgba(198,124,42,0.1);
  font-family: Georgia, serif;
  line-height: 1;
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 96px 24px;
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 28px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  transition: box-shadow 0.2s, transform 0.2s;
}

.kontakt-item:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  min-width: 46px;
  border-radius: 10px;
  background: rgba(198,124,42,0.1);
  border: 1px solid rgba(198,124,42,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.kontakt-item-text strong {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-text a {
  color: var(--primary);
  text-decoration: none;
  font-size: 1.05rem;
  font-weight: 600;
  transition: color 0.2s;
}

.kontakt-item-text a:hover {
  color: var(--primary-dark);
}

.kontakt-item-text span {
  font-size: 1rem;
  color: var(--text);
  font-weight: 500;
}

.map-placeholder {
  background: linear-gradient(135deg, var(--dark2), var(--dark));
  border-radius: var(--radius);
  overflow: hidden;
  height: 100%;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 32px;
  border: 1px solid rgba(198,124,42,0.2);
  box-shadow: var(--shadow);
}

.map-pin {
  font-size: 52px;
  filter: drop-shadow(0 4px 12px rgba(198,124,42,0.4));
}

.map-placeholder h4 {
  color: var(--white);
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 6px;
}

.map-placeholder p {
  color: rgba(255,255,255,0.55);
  font-size: 0.9rem;
  line-height: 1.6;
}

.map-dots {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.map-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--primary);
  opacity: 0.5;
}

.map-dots span:nth-child(2) {
  opacity: 0.75;
}

.map-dots span:nth-child(3) {
  opacity: 1;
}

/* ===== CTA BANNER ===== */
.cta-banner {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
  padding: 72px 24px;
  text-align: center;
}

.cta-banner h2 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.cta-banner p {
  font-size: 1.05rem;
  color: rgba(255,255,255,0.85);
  margin-bottom: 36px;
}

.cta-banner-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.btn-white {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--white);
  color: var(--primary-dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  padding: 14px 30px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(0,0
