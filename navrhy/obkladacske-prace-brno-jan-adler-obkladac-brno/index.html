<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obkladačské práce Brno – Jan Adler | Profesionální obkladač</title>
  <meta name="description" content="Profesionální obkladač v Brně a okolí. Pokládka obkladů, koupelny na klíč, terasy, epoxidové spárování, hydroizolace. Volejte +420 776 025 298.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a06808;
      --primary-light: #e8a020;
      --accent: #f0b429;
      --dark: #1a1410;
      --dark2: #2a1f14;
      --dark3: #3d2e1e;
      --text: #1a1410;
      --text-light: #6b5a48;
      --text-muted: #9c8878;
      --white: #ffffff;
      --bg-light: #faf7f4;
      --bg-card: #ffffff;
      --border: #e8ddd4;
      --shadow: 0 4px 24px rgba(26,20,16,0.10);
      --shadow-hover: 0 8px 40px rgba(26,20,16,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 20, 16, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,134,10,0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      flex-direction: column;
      gap: 1px;
      text-decoration: none;
    }

    .nav-logo-main {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .nav-logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .nav-logo-icon {
      font-size: 22px;
      margin-right: 8px;
      vertical-align: middle;
    }

    .nav-logo-wrap {
      display: flex;
      align-items: center;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px !important;
      font-weight: 600 !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s !important;
      white-space: nowrap;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200,134,10,0.4) !important;
      color: var(--white) !important;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1a1410 0%, #2d1f0e 35%, #3d2b12 60%, #1a1410 100%);
      position: relative;
      overflow: hidden;
      padding: 100px 20px 90px;
      min-height: 92vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 40%, rgba(200,134,10,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(240,180,41,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,134,10,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,134,10,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,134,10,0.15);
      border: 1px solid rgba(200,134,10,0.35);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 4.5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(15px, 2vw, 18px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      line-height: 1.7;
      max-width: 480px;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,134,10,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,134,10,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(200,134,10,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200,134,10,0.2);
      border-radius: var(--radius-lg);
      padding: 24px;
      backdrop-filter: blur(8px);
    }

    .hero-card-title {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .hero-services-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-service-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      font-weight: 500;
    }

    .hero-service-item::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--primary-light);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hero-contact-card {
      background: linear-gradient(135deg, rgba(200,134,10,0.2), rgba(240,180,41,0.1));
      border: 1px solid rgba(200,134,10,0.35);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .hero-contact-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .hero-contact-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .hero-contact-phone {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .hero-contact-phone:hover {
      color: var(--accent);
    }

    /* ── SECTIONS COMMON ── */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(200,134,10,0.12);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 5px 14px;
      border-radius: 50px;
      border: 1px solid rgba(200,134,10,0.25);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.7px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200,134,10,0.3);
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(240,180,41,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(200,134,10,0.15);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      background: rgba(200,134,10,0.1);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 14px;
    }

    /* ── PROC MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(200,134,10,0.3);
    }

    .benefit-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .proc-my-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .proc-my-visual {
      background: linear-gradient(135deg, var(--dark), var(--dark2));
      border-radius: var(--radius-lg);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .proc-my-visual::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(200,134,10,0.3) 0%, transparent 70%);
    }

    .visual-number {
      font-size: 90px;
      font-weight: 900;
      color: rgba(200,134,10,0.12);
      line-height: 1;
      margin-bottom: 4px;
      position: relative;
    }

    .visual-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .visual-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
    }

    .visual-divider {
      height: 1px;
      background: rgba(200,134,10,0.2);
      margin: 24px 0;
    }

    .visual-stars {
      color: var(--accent);
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .visual-quote {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      font-style: italic;
      line-height: 1.6;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote-mark {
      font-size: 56px;
      color: rgba(200,134,10,0.15);
      line-height: 1;
      font-family: Georgia, serif;
      position: absolute;
      top: 16px;
      right: 24px;
    }

    .review-stars {
      color: var(--accent);
      font-size: 17px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
