<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Údržba zahrad Praha a Střední Čechy | Profesionální zahradník</title>
<meta name="description" content="Profesionální zahradnické služby v Praze a Středních Čechách. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy a zahradní úpravy.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2d7a2d;
  --primary-dark: #1e5c1e;
  --primary-light: #3fa83f;
  --accent: #7bc67b;
  --accent-warm: #a8d5a2;
  --dark: #0f1f0f;
  --dark-mid: #1a2e1a;
  --text-dark: #1a2e1a;
  --text-mid: #4a6741;
  --text-light: #6b8f68;
  --white: #ffffff;
  --bg-light: #f4faf4;
  --bg-section: #eef7ee;
  --shadow: 0 4px 24px rgba(45,122,45,0.10);
  --shadow-hover: 0 8px 40px rgba(45,122,45,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text-dark);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: rgba(15,31,15,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid rgba(123,198,123,0.15);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
}

.nav-logo-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  line-height: 1;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600 !important;
  font-size: 14px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s !important;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(45,122,45,0.35);
  flex-shrink: 0;
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(45,122,45,0.50) !important;
  background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(160deg, rgba(10,22,10,0.88) 0%, rgba(20,50,20,0.82) 50%, rgba(30,80,30,0.75) 100%),
    radial-gradient(ellipse at 70% 50%, rgba(60,140,60,0.3) 0%, transparent 70%),
    linear-gradient(135deg, #0a160a 0%, #1a3a1a 40%, #2d6b2d 100%);
  min-height: 92vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-bg-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.07;
  background: var(--accent);
}

.hero-shape-1 {
  width: 600px;
  height: 600px;
  top: -200px;
  right: -100px;
}

.hero-shape-2 {
  width: 300px;
  height: 300px;
  bottom: -100px;
  left: -50px;
}

.hero-shape-3 {
  width: 150px;
  height: 150px;
  top: 30%;
  right: 15%;
  opacity: 0.05;
}

.hero-leaves {
  position: absolute;
  inset: 0;
  pointer-events: none;
  font-size: 100px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8%;
  opacity: 0.06;
  user-select: none;
}

.hero-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px;
  position: relative;
  z-index: 2;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(123,198,123,0.15);
  border: 1px solid rgba(123,198,123,0.3);
  color: var(--accent);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

.hero-badge span {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(32px, 5.5vw, 68px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 24px;
  max-width: 800px;
}

#hero h1 .highlight {
  background: linear-gradient(135deg, var(--accent), #c5e8a0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.2vw, 21px);
  color: rgba(255,255,255,0.75);
  max-width: 580px;
  margin-bottom: 44px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.3s;
  box-shadow: 0 6px 30px rgba(45,122,45,0.45);
  border: 2px solid transparent;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 40px rgba(45,122,45,0.60);
  background: linear-gradient(135deg, #4dc44d, var(--primary-light));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  border: 2px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 60px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hero-stat-number {
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.02em;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* ===== SECTION COMMON ===== */
section {
  padding: 90px 20px;
}

.section-header {
  text-align: center;
  max-width: 640px;
  margin: 0 auto 60px;
}

.section-label {
  display: inline-block;
  background: var(--bg-section);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 16px;
  border: 1px solid rgba(45,122,45,0.15);
}

.section-title {
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 800;
  color: var(--text-dark);
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  line-height: 1.6;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  transition: all 0.35s ease;
  border: 1px solid rgba(45,122,45,0.06);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  opacity: 0;
  transition: opacity 0.35s;
}

.service-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(45,122,45,0.12);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--bg-section), var(--accent-warm));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 22px;
  transition: all 0.35s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  transform: scale(1.08);
}

.service-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.service-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
  max-width: 1100px;
  margin: 0 auto;
}

.benefit-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 18px;
  padding: 40px 34px;
  background: linear-gradient(145deg, var(--bg-light), var(--white));
  border-radius: var(--radius-lg);
  border: 1px solid rgba(45,122,45,0.08);
  transition: all 0.3s;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(45,122,45,0.15);
}

.benefit-number {
  position: absolute;
  top: 28px;
  right: 28px;
  font-size: 64px;
  font-weight: 900;
  color: rgba(45,122,45,0.05);
  line-height: 1;
  letter-spacing: -0.04em;
  user-select: none;
}

.benefit-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 6px 20px rgba(45,122,45,0.30);
  flex-shrink: 0;
}

.benefit-title {
  font-size: 21px;
  font-weight: 700;
  color: var(--text-dark);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.benefit-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark-mid) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(45,122,45,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(123,198,123,0.08) 0%, transparent 60%);
  pointer-events: none;
}

#reference .section-label {
  background: rgba(123,198,123,0.1);
  border-color: rgba(123,198,123,0.2);
  color: var(--accent);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.review-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: all 0.3s;
  backdrop-filter: blur(8px);
}

.review-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(123,198,123,0.2);
  transform: translateY(-6px);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  font-size: 18px;
}

.review-text {
  font-size: 16px;
  color: rgba(255,255,255,0.80);
  line-height: 1.7;
  margin-bottom: 28px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: var(--accent);
  line-height: 0;
  vertical-align: -18px;
  margin-right: 4px;
  font-style: normal;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--bg-light);
}

.contact-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-title {
  font-size: clamp(24px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--text-dark);
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 8px;
}

.contact-subtitle {
  font-size: 16px;
  color: var(--text-light);
  line-height: 1.6;
  margin-bottom: 8px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px 24px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid rgba(45,122,45
