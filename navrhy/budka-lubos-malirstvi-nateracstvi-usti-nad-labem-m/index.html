<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budka Luboš – Malířství, Natěračství | Ústí nad Labem</title>
  <meta name="description" content="Profesionální malíř natěrač v Ústí nad Labem a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Volejte +420 777 100 902.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8830a;
      --primary-dark: #c46f08;
      --primary-light: #f5a83a;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2d2d2d;
      --text-muted: #666;
      --light: #f8f9fa;
      --white: #ffffff;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── NAVBAR ─── */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--primary-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 14px rgba(232,131,10,0.35);
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta-icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #1a3a1a 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 700px 400px at 20% 50%, rgba(232,131,10,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 20%, rgba(34,100,34,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '🖌️';
      position: absolute;
      right: -20px;
      bottom: -30px;
      font-size: 220px;
      opacity: 0.05;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,131,10,0.18);
      border: 1px solid rgba(232,131,10,0.4);
      color: var(--primary-light);
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(26px, 5vw, 48px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(232,131,10,0.45);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(232,131,10,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.30);
      color: var(--white);
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .hero-stat {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 8px 20px;
      color: rgba(255,255,255,0.80);
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ─── SECTIONS GENERAL ─── */
    section {
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-label {
      display: inline-block;
      background: rgba(232,131,10,0.12);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 5px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    .section-header p {
      margin-top: 12px;
      font-size: 16px;
      color: var(--text-muted);
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--card-shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.14);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,131,10,0.12), rgba(232,131,10,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(232,131,10,0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 30px;
      border-radius: var(--radius);
      background: var(--light);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 14px rgba(232,131,10,0.35);
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '"';
      position: absolute;
      top: -20px;
      left: 10px;
      font-size: 300px;
      color: rgba(232,131,10,0.06);
      font-family: Georgia, serif;
      line-height: 1;
      pointer-events: none;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-label {
      background: rgba(232,131,10,0.20);
      color: var(--primary-light);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.60);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 32px 28px;
      backdrop-filter: blur(10px);
      transition: background 0.25s, transform 0.25s;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-4px);
    }

    .review-stars {
      color: var(--primary-light);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0,0,0,0.04);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-item-value.primary {
      color: var(--primary-dark);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0,0,0,0.06);
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .map-header {
      background: linear-gradient(135deg, var(--dark), var(--dark-2));
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    .map-body {
      flex: 1;
      background: linear-gradient(135deg, #e8f0e8, #d4e4d4);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 250px;
    }

    .map-body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(34,100,34,0.07) 30px, rgba(34,100,34,0.07) 31px),
        repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(34,100,34,0.07) 30px, rgba(34,100,34,0.07) 31px);
    }

    .map-pin {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .map-pin-icon {
      font-size: 48px;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-pin-label {
      background: var(--dark);
      color: white;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
      display: inline-block;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.75);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
    }

    .footer-logo span {
      color: var(--primary-light);
    }

    .footer-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
    }

    .footer-meta a {
      color: var(--primary-light
