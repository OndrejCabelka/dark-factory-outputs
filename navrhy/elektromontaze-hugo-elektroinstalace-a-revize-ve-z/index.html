<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Elektromontáže Hugo – profesionální elektrikář ve Zlíně. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů.">
<title>Elektromontáže Hugo – Elektrikář Zlín</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #d4a800;
  --primary-light: #fff3b0;
  --dark: #0f1117;
  --dark2: #1a1d27;
  --dark3: #23263a;
  --text: #e8eaf0;
  --text-muted: #9ca3b8;
  --white: #ffffff;
  --card-bg: #1e2135;
  --border: #2e3352;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  font-size: 16px;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 17, 23, 0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(245,197,24,0.3);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(245,197,24,0.5);
  background: linear-gradient(135deg, #ffda1a, var(--primary));
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 80px 20px;
  background:
    radial-gradient(ellipse at 70% 50%, rgba(245,197,24,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 10% 80%, rgba(245,197,24,0.06) 0%, transparent 50%),
    linear-gradient(160deg, #0f1117 0%, #141828 40%, #0d1020 100%);
}

.hero-bg-lines {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.hero-bg-lines::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  border: 1px solid rgba(245,197,24,0.08);
  animation: pulse 6s ease-in-out infinite;
}

.hero-bg-lines::after {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  border: 1px solid rgba(245,197,24,0.06);
  animation: pulse 6s ease-in-out infinite 1s;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.5; }
}

.hero-deco {
  position: absolute;
  top: 15%;
  right: 8%;
  font-size: 180px;
  opacity: 0.04;
  pointer-events: none;
  line-height: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 780px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,197,24,0.12);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge::before {
  content: '⚡';
}

.hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 900;
  line-height: 1.15;
  color: var(--white);
  letter-spacing: -1px;
  margin-bottom: 22px;
}

.hero h1 .highlight {
  background: linear-gradient(135deg, var(--primary), #ffba00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

.hero-sub strong {
  color: var(--text);
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 800;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 50px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(245,197,24,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(245,197,24,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(245,197,24,0.06);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.stat-divider {
  width: 1px;
  height: 40px;
  background: var(--border);
  align-self: center;
}

/* ===== SECTIONS GENERAL ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(1.7rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-desc {
  color: var(--text-muted);
  font-size: 1.05rem;
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 52px;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  border-color: rgba(245,197,24,0.3);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: rgba(245,197,24,0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
  border: 1px solid rgba(245,197,24,0.15);
  transition: all 0.3s ease;
}

.service-card:hover .service-icon {
  background: rgba(245,197,24,0.18);
  transform: scale(1.1);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.service-card p {
  color: var(--text-muted);
  font-size: 0.92rem;
  line-height: 1.65;
}

.service-card .service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 0.88rem;
  font-weight: 600;
  margin-top: 18px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--dark);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: linear-gradient(135deg, var(--dark3), var(--card-bg));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s ease;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  border-color: rgba(245,197,24,0.25);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  margin: 0 auto 24px;
  background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(245,197,24,0.05));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  border: 1px solid rgba(245,197,24,0.2);
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  color: var(--text-muted);
  font-size: 0.93rem;
  line-height: 1.65;
}

/* ===== REVIEWS ===== */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 28px;
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  border-color: rgba(245,197,24,0.2);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  opacity: 0.7;
  font-family: Georgia, serif;
}

.review-stars {
  color: var(--primary);
  font-size: 16px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--dark);
  font-size: 15px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 0.95rem;
}

.review-location {
  font-size: 0.82rem;
  color: var(--text-muted);
}

/* ===== CONTACT ===== */
#kontakt {
  background: var(--dark);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  transition: all 0.3s ease;
  text-decoration: none;
}

.contact-item:hover {
  border-color: rgba(245,197,24,0.3);
  transform: translateX(4px);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: rgba(245,197,24,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid rgba(245,197,24,0.15);
}

.contact-item-text {
  flex: 1;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--white);
}

.contact-item-sub {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.map-placeholder {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}

.map-icon {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
  position: relative;
  z-index: 1;
}

.map-sub {
  font-size: 0.9rem;
  color: var(--text-muted);
  position: relative;
  z-index: 1;
}

.map-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 12px 22px;
  border-radius: 50px;
  margin-top: 8px;
  position: relative;
  z-index: 1;
  transition: all 0.2s ease;
}

.map-btn:hover {
  box-shadow: 0 4px 16px rgba(245,197,24,0.4);
  transform: translateY(-1px);
}

/* ===== CTA STRIP ===== */
.cta-strip {
  background: linear-gradient(135deg, rgba(245,197,24,0.12), rgba(245,197,24,0.04));
  border: 1px solid rgba(245,197,24,0.2);
  border-radius: var(--radius);
  padding: 40px 36px;
  display: flex;
