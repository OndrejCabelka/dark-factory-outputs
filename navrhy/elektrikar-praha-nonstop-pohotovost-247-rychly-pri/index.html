<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální elektrikář Praha – nonstop pohotovost 24/7. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Rychlý příjezd!">
<title>Elektrikář Praha – Nonstop pohotovost 24/7 | Rychlý příjezd</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C400;
  --primary-dark: #d4a800;
  --primary-light: #ffe566;
  --dark: #0d0d0d;
  --dark2: #141414;
  --dark3: #1e1e1e;
  --dark4: #2a2a2a;
  --text: #f0f0f0;
  --text-muted: #aaaaaa;
  --white: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --shadow-hover: 0 8px 40px rgba(245,196,0,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* BANNER */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* NAVBAR */
header {
  background: rgba(13,13,13,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(245,196,0,0.15);
  position: sticky;
  top: 0;
  z-index: 1000;
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-call-nav {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.btn-call-nav:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(245,196,0,0.4);
}

.badge-24 {
  background: #ff3b3b;
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.5px;
}

/* HERO */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0a0a0a 0%, #111100 40%, #1a1500 70%, #0d0d00 100%);
  padding: 80px 20px 60px;
}

.hero-bg-glow {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(245,196,0,0.12) 0%, rgba(245,196,0,0.04) 40%, transparent 70%);
  pointer-events: none;
}

.hero-bg-glow2 {
  position: absolute;
  bottom: -150px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(245,196,0,0.07) 0%, transparent 60%);
  pointer-events: none;
}

.hero-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,196,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-content {
  max-width: 860px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,196,0,0.1);
  border: 1px solid rgba(245,196,0,0.3);
  color: var(--primary);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 8px;
  height: 8px;
  background: #ff3b3b;
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 68px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
  color: var(--white);
}

#hero h1 span {
  color: var(--primary);
  position: relative;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 620px;
  margin: 0 auto 38px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 50px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), #e8b800);
  color: var(--dark);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 800;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 30px rgba(245,196,0,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(245,196,0,0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.11);
  border-color: rgba(245,196,0,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  justify-content: center;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 500;
}

/* SEKCE OBECNĚ */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(245,196,0,0.1);
  border: 1px solid rgba(245,196,0,0.25);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* SLUŽBY */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,196,0,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: rgba(245,196,0,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: background 0.25s;
}

.service-card:hover .service-icon {
  background: rgba(245,196,0,0.18);
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 16px;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 8px;
}

/* PROČ MY */
#proc-my {
  background: var(--dark);
}

.benefits-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: linear-gradient(135deg, var(--dark3), var(--dark4));
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 36px 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(245,196,0,0.15);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.benefit-icon-wrap {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, rgba(245,196,0,0.2), rgba(245,196,0,0.08));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.benefit-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.benefit-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* REFERENCE */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
  max-width: 1100px;
  margin: 0 auto;
}

.review-card {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 28px 26px;
  transition: transform 0.25s, box-shadow 0.25s;
}

.review-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
}

.star {
  color: var(--primary);
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: rgba(245,196,0,0.2);
  line-height: 0;
  vertical-align: -14px;
  margin-right: 4px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, #F5C400, #d4a800); color: #000; }
.av2 { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
.av3 { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }

.review-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 12px;
  color: var(--text-muted);
}

/* KONTAKT */
#kontakt {
  background: var(--dark);
}

.contact-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 22px 20px;
  transition: border-color 0.2s;
}

.contact-item:hover {
  border-color: rgba(245,196,0,0.25);
}

.contact-item-icon {
  width: 44px;
  height: 44px;
  background: rgba(245,196,0,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}

.contact-item-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary-light);
}

.contact-item-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

.map-placeholder {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(245,196,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.03) 1px, transparent 1px);
  background-size: 30px 30px;
}

.map-icon {
  font-size: 48px;
  filter: grayscale(0.3);
}

.map-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  position: relative;
  z-index: 1;
}

.map-sub {
  font-size: 13px;
  color: rgba(170,170,170,0.6);
  position: relative;
  z-index: 1;
}

.map-badge {
  background: rgba(245,196,0,0.12);
  border: 1px solid rgba(245,196,0,0.25);
  color: var(--primary);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  position: relative;
  z-index:
