<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahradník Praha – Profesionální zahradnické služby</title>
<meta name="description" content="Profesionální zahradník v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy. Volejte 0775091409.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --green-dark: #1a3a2a;
  --green-primary: #2d6a4f;
  --green-medium: #40916c;
  --green-light: #52b788;
  --green-pale: #d8f3dc;
  --green-ultra: #f0faf2;
  --accent: #74c69d;
  --text-dark: #1a2e22;
  --text-body: #3a5a47;
  --text-light: #6b8c77;
  --white: #ffffff;
  --shadow-sm: 0 2px 8px rgba(26,58,42,0.08);
  --shadow-md: 0 4px 20px rgba(26,58,42,0.12);
  --shadow-lg: 0 8px 40px rgba(26,58,42,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text-dark);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(45,106,79,0.12);
  position: sticky;
  top: 0;
  z-index: 900;
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--green-medium), var(--green-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--green-medium);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-medium));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(45,106,79,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(45,106,79,0.45);
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(160deg, rgba(10,30,18,0.88) 0%, rgba(26,70,44,0.80) 50%, rgba(45,106,79,0.70) 100%),
    radial-gradient(ellipse at top left, #0d3320 0%, #1a5c38 40%, #2d7a50 70%, #4aab72 100%);
  min-height: 90vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

.hero-bg-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.hero-shape {
  position: absolute;
  border-radius: 50%;
  background: rgba(116,198,157,0.08);
}

.hero-shape-1 {
  width: 600px;
  height: 600px;
  top: -200px;
  right: -150px;
}

.hero-shape-2 {
  width: 300px;
  height: 300px;
  bottom: -80px;
  left: -60px;
  background: rgba(82,183,136,0.10);
}

.hero-shape-3 {
  width: 150px;
  height: 150px;
  top: 30%;
  right: 20%;
  background: rgba(116,198,157,0.06);
}

.hero-decor {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom right, transparent 49.5%, var(--white) 50%);
}

.hero-content {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(116,198,157,0.2);
  border: 1px solid rgba(116,198,157,0.35);
  color: var(--accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(2.2rem, 5.5vw, 4rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 22px;
  max-width: 750px;
}

#hero h1 span {
  background: linear-gradient(135deg, #74c69d, #b7e4c7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  color: rgba(255,255,255,0.82);
  margin-bottom: 42px;
  max-width: 580px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--green-light), var(--accent));
  color: var(--green-dark);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 6px 25px rgba(82,183,136,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 35px rgba(82,183,136,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.35);
  color: var(--white);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  backdrop-filter: blur(8px);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.20);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 36px;
  margin-top: 56px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
}

/* ===== SECTION COMMONS ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-block;
  background: var(--green-pale);
  color: var(--green-primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(1.7rem, 3.5vw, 2.6rem);
  font-weight: 800;
  color: var(--text-dark);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

section {
  padding: 90px 20px;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--white);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--white);
  border: 1.5px solid rgba(45,106,79,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--green-primary), var(--green-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(45,106,79,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--green-pale), #b7e4c7);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  margin: 0 auto 22px;
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.08) rotate(-3deg);
}

.service-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  background: linear-gradient(160deg, var(--green-dark) 0%, #1e4a30 50%, #2d6a4f 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: rgba(116,198,157,0.07);
  top: -150px;
  right: -100px;
  pointer-events: none;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  max-width: 1200px;
  margin: 0 auto;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-lg);
  padding: 38px 32px;
  backdrop-filter: blur(8px);
  transition: background 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateY(-4px);
}

.benefit-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--green-medium), var(--green-light));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 22px;
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.93rem;
  color: rgba(255,255,255,0.68);
  line-height: 1.7;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.65);
}

#proc-my .section-label {
  background: rgba(116,198,157,0.2);
  color: var(--accent);
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--green-ultra);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(45,106,79,0.07);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.review-quote {
  position: absolute;
  top: 22px;
  right: 26px;
  font-size: 56px;
  color: var(--green-pale);
  line-height: 1;
  font-family: Georgia, serif;
  pointer-events: none;
}

.review-stars {
  font-size: 20px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.97rem;
  color: var(--text-body);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  font-weight: 700;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-dark);
}

.review-location {
  font-size: 0.82rem;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.contact-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 26px 28px;
  background: var(--green-ultra);
  border: 1px solid rgba(45,106,79,0.1);
  border-radius: var(--radius);
  transition: box-shadow 0.25s, transform 0.25s;
}

.contact-item:hover {
  box-shadow: var(--shadow-md);
  transform: translateX(4px);
}

.contact-item-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-medium));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.contact-item-body h4 {
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 5px;
}

.contact-item-body a,
.contact-item-body p {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-dark);
  text-decoration: none;
  line-height: 1.4;
}

.contact-item-body a {
  color: var(--green-primary);
  transition: color 0.2s;
}

.contact-item-body a:hover {
  color: var(--green-medium);
}

.map-placeholder {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1.5px solid rgba(45,106,79,0.15);
  box-shadow: var(--shadow-md);
  height: 100%;
  min-height: 340px;
  background: linear-gradient(160deg, var(--green-pale) 0%, #b7e4c7 50%, #95d5b2 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(45,106,79,0.1) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(45,106,79,0.1) 40px);
}

.map-pin {
  font-size: 52px;
  position: relative;
  z-index: 1;
  animation: bounce-pin 2s ease-in-out infinite;
}

@keyframes bounce-pin {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.map-label {
  background: var(--white);
  color: var(--green-primary);
  font-weight: 700;
  font-size: 1rem;
  padding: 10px 22px;
  border-radius: 50px;
  box-
