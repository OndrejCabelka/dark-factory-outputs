<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Výměna oken Praha | Profesionální montáž a rekonstrukce bytů</title>
  <meta name="description" content="Profesionální výměna oken v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420776283955." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #145aa0;
      --primary-light: #2d84e0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark-2: #112236;
      --dark-3: #1a2f45;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-card: #ffffff;
      --border: #e2ecf5;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-text .brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-text .sub {
      font-size: 11px;
      font-weight: 400;
      color: #7fa8cc;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-phone-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.25s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .btn-phone-nav:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,111,196,0.45);
    }

    .btn-phone-nav .phone-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #112a45 40%, #1a3a5c 70%, #1a4a7a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,196,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(45,132,224,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,111,196,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,196,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(45,132,224,0.4);
      color: #7ec8f7;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.18;
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #a8c8e8;
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(26,111,196,0.55);
      background: linear-gradient(135deg, var(--primary-light), #3d94f0);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      display: block;
      line-height: 1;
    }

    .stat-num span {
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: #7fa8cc;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ===== SECTION TITLES ===== */
    .section-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-label {
      display: inline-block;
      background: rgba(26,111,196,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 90px 20px;
      background: var(--bg-light);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(45,132,224,0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.05);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      background: rgba(26,111,196,0.08);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 14px;
      letter-spacing: 0.3px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 90px 20px;
      background: var(--white);
    }

    .benefits-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      text-align: center;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      background: var(--white);
    }

    .benefit-number {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      margin: 0 auto 18px;
    }

    .benefit-icon-big {
      font-size: 38px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 90px 20px;
      background: linear-gradient(135deg, #0d1b2a 0%, #112a45 50%, #0f2035 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(26,111,196,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(26,111,196,0.25);
      color: #7ec8f7;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #a8c8e8;
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
      border-color: rgba(26,111,196,0.4);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      color: #c8dff0;
      font-size: 15px;
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 22px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }

    .author-info .loc {
      font-size: 12px;
      color: #7fa8cc;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 90px 20px;
      background: var(--bg-light);
    }

    .contact-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .contact-info-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-info-box h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(45,132,224,0.06));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-text .label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .contact-item-text a {
      color: var(--primary);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      display: block;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text span {
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
    }

    .map-placeholder {
      background: var(--dark-3);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,111,196,0.2);
      height: 100%;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

      position: absolute;
      inset: 0;
      background-image:
