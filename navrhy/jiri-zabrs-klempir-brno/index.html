<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiří Zábrš – Profesionální klempíř Brno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --accent: #64748b;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --light: #f1f5f9;
  --white: #ffffff;
  --text: #334155;
  --text-light: #64748b;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 36px rgba(37,99,235,0.18);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* BANNER */
#proposal-banner a { text-decoration: underline; }

/* NAVBAR */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,23,42,0.97);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  color: var(--white);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
}

.logo-sub {
  color: var(--primary-light);
  font-size: 12px;
  font-weight: 500;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(37,99,235,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(37,99,235,0.45);
}

/* HERO */
#hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%, rgba(37,99,235,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 40%, rgba(59,130,246,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(to bottom right, transparent 49%, var(--white) 50%);
}

.hero-inner {
  position: relative;
  max-width: 760px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(37,99,235,0.20);
  border: 1px solid rgba(59,130,246,0.35);
  color: #93c5fd;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

#hero h1 {
  color: var(--white);
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(135deg, #60a5fa, #93c5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  color: #94a3b8;
  font-size: clamp(16px, 2.5vw, 20px);
  margin-bottom: 36px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 6px 24px rgba(37,99,235,0.40);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(37,99,235,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
}

.stat {
  text-align: center;
}

.stat-num {
  display: block;
  color: var(--white);
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.stat-label {
  color: #64748b;
  font-size: 13px;
  font-weight: 500;
}

/* SEKCE OBECNĚ */
section {
  padding: 80px 20px;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  color: var(--text-light);
  font-size: 17px;
  max-width: 560px;
}

.section-header {
  max-width: 1200px;
  margin: 0 auto 52px;
}

.section-header.center {
  text-align: center;
  margin-left: auto;
  margin-right: auto;
}

.section-header.center .section-desc {
  margin: 0 auto;
}

/* SLUŽBY */
#sluzby {
  background: var(--light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(59,130,246,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 18px;
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  color: var(--text-light);
  font-size: 14.5px;
  line-height: 1.65;
}

/* PROC MY */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
  max-width: 1200px;
  margin: 0 auto;
}

.benefit-card {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 36px 32px;
  background: var(--light);
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.05);
  transition: transform 0.2s, box-shadow 0.2s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 6px 20px rgba(37,99,235,0.28);
  flex-shrink: 0;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
}

.benefit-card p {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.7;
}

/* REFERENCE */
#reference {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(37,99,235,0.10) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-label {
  color: #60a5fa;
}

#reference .section-desc {
  color: #94a3b8;
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: background 0.25s, transform 0.25s;
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-4px);
}

.review-stars {
  color: #fbbf24;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  color: #cbd5e1;
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, #2563eb, #3b82f6); }
.av2 { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
.av3 { background: linear-gradient(135deg, #059669, #34d399); }

.review-info strong {
  display: block;
  color: var(--white);
  font-size: 15px;
  font-weight: 600;
}

.review-info span {
  color: #64748b;
  font-size: 13px;
}

/* KONTAKT */
#kontakt {
  background: var(--light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 22px;
  box-shadow: var(--shadow);
  transition: transform 0.2s;
  border: 1px solid rgba(0,0,0,0.05);
}

.kontakt-item:hover {
  transform: translateY(-2px);
}

.kontakt-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(37,99,235,0.28);
}

.kontakt-item-body strong {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-body a,
.kontakt-item-body p {
  color: var(--dark);
  font-size: 17px;
  font-weight: 600;
  text-decoration: none;
  line-height: 1.4;
}

.kontakt-item-body a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border-radius: var(--radius);
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: #94a3b8;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,255,255,0.06);
  text-align: center;
  padding: 30px;
}

.map-placeholder .map-icon {
  font-size: 52px;
  margin-bottom: 6px;
}

.map-placeholder h4 {
  color: var(--white);
  font-size: 18px;
  font-weight: 700;
}

.map-placeholder p {
  font-size: 14px;
  line-height: 1.6;
  max-width: 240px;
}

.map-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 22px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(37,99,235,0.35);
}

.map-link:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37,99,235,0.45);
}

/* FOOTER */
footer {
  background: var(--dark);
  color: #64748b;
  padding: 36px 20px;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}

.footer-logo-name {
  color: var(--white);
  font-weight: 700;
  font-size: 15px;
}

.footer-copy {
  font-size: 13.5px;
  line-height: 1.7;
}

.footer-copy a {
  color: var(--primary-light);
  text-decoration: none;
}

.footer-copy a:hover {
  text-decoration: underline;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
  }

  .hero-stats {
    gap: 22px;
  }

  section {
    padding: 60px 16px;
  }

  .services-grid {
    grid-template-columns: 1fr;
  }

  .reviews-grid {
    grid-template-columns: 1fr;
  }

  .benefits-grid {
    grid-template-columns: 1fr;
  }

  .footer-inner {
    flex-direction: column;
    text-align: center;
  }
}

@media (max-width: 480px) {
  .hero-btns {
    flex-direction: column;
    align-items: center;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    justify-content: center;
  }

  .nav-cta
