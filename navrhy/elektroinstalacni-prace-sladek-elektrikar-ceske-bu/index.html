<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5A800;
  --primary-dark: #D48C00;
  --primary-light: #FFD166;
  --dark: #0D0F14;
  --dark2: #161A22;
  --dark3: #1E232D;
  --dark4: #252B38;
  --text: #E8EAF0;
  --text-muted: #9DA5B4;
  --white: #FFFFFF;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.25);
  --shadow-hover: 0 8px 40px rgba(245,168,0,0.2);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13, 15, 20, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(245,168,0,0.15);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  white-space: nowrap;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(245,168,0,0.4);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  overflow: hidden;
  background: linear-gradient(160deg, #0D0F14 0%, #1A1200 40%, #0D0F14 100%);
}

.hero-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(245,168,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-bolt-bg {
  position: absolute;
  font-size: 340px;
  opacity: 0.035;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,168,0,0.1);
  border: 1px solid rgba(245,168,0,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 58px);
  font-weight: 900;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 19px);
  color: var(--text-muted);
  max-width: 580px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

.hero-sub strong {
  color: var(--primary-light);
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 800;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 50px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(245,168,0,0.3);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 40px rgba(245,168,0,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: 50px;
  text-decoration: none;
  border: 2px solid rgba(255,255,255,0.2);
  transition: transform 0.2s, border-color 0.2s, background 0.2s;
}

.btn-secondary:hover {
  transform: translateY(-3px);
  border-color: var(--primary);
  background: rgba(245,168,0,0.07);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  margin-top: 60px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== SEKCE OBECNĚ ===== */
section {
  padding: 80px 20px;
}

.section-container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,168,0,0.1);
  border: 1px solid rgba(245,168,0,0.25);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}

.section-title {
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--dark2);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-karta:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,168,0,0.2);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(245,168,0,0.15), rgba(245,168,0,0.05));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(245,168,0,0.15);
}

.sluzba-name {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.sluzba-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--dark);
}

.proc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.proc-karta {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 36px 28px;
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}

.proc-karta:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,168,0,0.2);
}

.proc-number {
  font-size: 48px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 6px;
  opacity: 0.3;
}

.proc-icon {
  font-size: 42px;
  margin-bottom: 16px;
}

.proc-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.proc-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--dark2);
}

.reference-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 30px 28px;
  transition: transform 0.25s, box-shadow 0.25s;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.recenze-hvezdy {
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.recenze-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.75;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-text::before {
  content: '"';
  font-size: 28px;
  color: var(--primary);
  font-style: normal;
  line-height: 0;
  vertical-align: -8px;
  margin-right: 2px;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.recenze-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: var(--dark);
  flex-shrink: 0;
}

.recenze-jmeno {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.recenze-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--dark);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-polozka {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 22px 24px;
  transition: border-color 0.2s;
}

.kontakt-polozka:hover {
  border-color: rgba(245,168,0,0.2);
}

.kontakt-polozka-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(245,168,0,0.15), rgba(245,168,0,0.05));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid rgba(245,168,0,0.12);
}

.kontakt-polozka-obsah {

}

.kontakt-polozka-label {
  font-size: 11px;

}

.kontakt-polozka-hodnota {

  font-weight: 700;

}

.kontakt-polozka-hodnota a {
  color: var(--primary);

}

.kontakt-polozka-hodnota a:hover {

}

.mapa-placeholder {
  background: var(--dark3);

  border-radius: var(--radius);

  display: flex;
  flex-direction: column;
  align-items: center;

}

.mapa-grid-bg {

}

.mapa-obsah {

}

.mapa-pin {

}

.mapa-btn {

  background: linear-gradient(135deg, var(--primary), var(--primary-dark));

}

/* ===== CTA BANNER ===== */
.cta-banner {
  background: linear-gradient(135deg, #1A1200 0%, #261A00 50%, #1A1200 100%);

.cta-banner-inner {

.cta-banner h2 {

.cta-banner p {

}

.cta-banner-buttons {

}

/* ===== FOOTER ===== */
footer {
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 40px 20px;
}

.footer-inner {
