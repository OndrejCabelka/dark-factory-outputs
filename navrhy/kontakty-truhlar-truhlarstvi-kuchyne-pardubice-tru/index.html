<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlář Pardubice – Kuchyně, skříně, podlahy na míru</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Volejte +420604554056">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C4845A;
      --accent: #D4A96A;
      --accent-light: #F0C88A;
      --dark: #1A1208;
      --dark-mid: #2C1F0E;
      --dark-card: #221A0F;
      --text-dark: #1A1208;
      --text-mid: #4A3728;
      --text-light: #8A7060;
      --white: #FFFFFF;
      --off-white: #FAF7F2;
      --light-bg: #F5EFE6;
      --border: #E8DDD0;
      --shadow: rgba(139, 94, 60, 0.15);
      --shadow-strong: rgba(26, 18, 8, 0.25);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: rgba(26, 18, 8, 0.97);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid rgba(212, 169, 106, 0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 26px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-main {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1A1208 0%, #2C1F0E 40%, #3D2910 70%, #1A1208 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 100px;
      min-height: 85vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 50%, rgba(139, 94, 60, 0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(212, 169, 106, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 300px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 40px,
        rgba(212, 169, 106, 0.5) 40px,
        rgba(212, 169, 106, 0.5) 41px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(212, 169, 106, 0.5) 40px,
        rgba(212, 169, 106, 0.5) 41px
      );
      pointer-events: none;
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 169, 106, 0.15);
      border: 1px solid rgba(212, 169, 106, 0.35);
      color: var(--accent-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -1.5px;
    }

    #hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.7);
      max-width: 580px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(139, 94, 60, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(139, 94, 60, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat strong {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ===== SECTION STYLES ===== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(139,94,60,0.1), rgba(212,169,106,0.1));
      border: 1px solid rgba(139,94,60,0.2);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--off-white);
      padding: 100px 20px;
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: 20px;
      padding: 36px 30px;
      box-shadow: 0 4px 24px var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.35s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px var(--shadow-strong);
      border-color: var(--primary-light);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(139,94,60,0.12), rgba(212,169,106,0.12));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.1) rotate(-5deg);
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--light-bg);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-mid) 100%);
      padding: 100px 20px;
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(139,94,60,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.55);
    }

    #proc-my .section-tag {
      background: rgba(212,169,106,0.15);
      border-color: rgba(212,169,106,0.3);
      color: var(--accent-light);
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139,94,60,0.08), rgba(212,169,106,0.08));
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .benefit-card:hover {
      border-color: rgba(212,169,106,0.3);
      transform: translateY(-6px);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }

    .benefit-icon {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--light-bg);
      padding: 100px 20px;
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 4px 24px var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.35s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px var(--shadow-strong);
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 80px;
      color: var(--accent-light);
      opacity: 0.4;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .stars {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .reviewer-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .reviewer-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
      padding: 100px 20px;
    }

    .kontakt-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 900px) {
      .kontakt-wrapper {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 24px;
      background: var(--off-white);
      border-radius: 16px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .kontakt-item:hover {
      border-color: var(--primary-light);
      box-shadow: 0 8px 30px
