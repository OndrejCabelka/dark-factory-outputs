<!DOCTYPE html>
<html lang="cs">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální instalatér Ondřej Krnáč - Liberec. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení.">
<title>Instalatér Ondřej Krnáč – Liberec | Voda, Topení, Plyn</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fb5;
  --primary-dark: #0f4f8a;
  --primary-light: #2d8fd4;
  --accent: #f59e0b;
  --accent-dark: #d97706;
  --dark: #0d1b2a;
  --dark2: #1a2b3c;
  --dark3: #243447;
  --text: #1e293b;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --white: #ffffff;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-hover: 0 8px 32px rgba(0,0,0,0.15);
  --transition: 0.3s ease;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─────────────── BANNER ─────────────── */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ─────────────── HEADER / NAVBAR ─────────────── */
header {
  background: rgba(13, 27, 42, 0.98);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  color: var(--white);
  font-weight: 800;
  font-size: 17px;
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.logo-sub {
  color: var(--text-light);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.nav-cta {

}

.nav-links a:hover {
  color: var(--white);
}

.btn-call {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;

  box-shadow: 0 4px 14px rgba(26,111,181,0.4);
}

.btn-call:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(26,111,181,0.5);
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
}

  align-items: center;

  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -150px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(26,111,181,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -150px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(45,143,212,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {

  grid-template-columns: 1fr;
  gap: 48px;

  }
}

}

@keyframes pulse-green {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

.hero-h1 {
  color: var(--white);
  font-size: clamp(30px, 5vw, 54px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.hero-h1 span {
  background: linear-gradient(90deg, #4db8ff, #1a9fff);

  background-clip: text;
}

.hero-sub {
  color: var(--text-light);

}

}

.btn-primary {

  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);

.hero-stats {

.hero-stat {

}

  margin-top: 4px;
}

.hero-visual {
  display: flex;

}

.hero-card-wrap {
  position: relative;

}

}

.hero-icon-big {
  font-size: 72px;

.hero-card-title {

}

}

.hero-services-list {

}

.hero-services-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-light);
  font-size: 14px;
}

.hero-services-list li::before {
  content: '✓';

  height: 22px;
  background: rgba(26,111,181,0.3);
  color: #4db8ff;
  border-radius: 50%;

  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.hero-badge-floating {
  position: absolute;
  top: -20px;
  right: -20px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: var(--radius);
  padding: 14px 18px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(245,158,11,0.4);
}

.badge-float-text {
  color: var(--dark);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;

}

.badge-float-big {
  color: var(--dark);
  font-size: 22px;
  font-weight: 900;

/* ─────────────── SECTION COMMON ─────────────── */
.section-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 24px;
}

.section-tag {
  display: inline-block;
  background: rgba(26,111,181,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 5px 14px;

}

.section-title {
  font-size: clamp(26px, 4vw, 42px);

}

.section-desc {
  color: var(--text-muted);

  max-width: 560px;

}

.section-head {
  margin-bottom: 52px;
}

/* ─────────────── SLUZBY ─────────────── */
#sluzby {
  background: var(--gray-50);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 600px) {
  .sluzby-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .sluzby-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  border: 1px solid var(--gray-200);
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform var(--transition);
}

.sluzba-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(26,111,181,0.2);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(26,111,181,0.1), rgba(45,143,212,0.15));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all var(--transition);
}

.sluzba-card:hover .sluzba-icon {
  background: linear-gradient(135deg, rgba(26,111,181,0.2), rgba(45,143,212,0.25));
  transform: scale(1.08);
}

.sluzba-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.sluzba-desc {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.65;
}

.sluzba-card.emergency {
  background: linear-gradient(135deg, var(--dark), var(--dark2));
  border-color: rgba(26,111,181,0.3);
}

.sluzba-card.emergency .sluzba-title {
  color: var(--white);
}

.sluzba-card.emergency .sluzba-desc {

}

.sluzba-card.emergency .sluzba-icon {
  background: rgba(245,158,11,0.15);
}

.sluzba-card.emergency::before {
  background: linear-gradient(90deg, var(--accent), var(--accent-dark));
}

  display: inline-flex;

  padding: 4px 10px;

  margin-top: 14px;
}

.emergency-badge-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-green 1.5s infinite;
}
