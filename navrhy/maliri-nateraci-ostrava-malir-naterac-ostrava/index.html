<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malíři natěrači Ostrava | Profesionální malování a natírání</title>
  <meta name="description" content="Profesionální malíř natěrač v Ostravě a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte +420720736490">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8630a;
      --primary-dark: #c4520a;
      --primary-light: #f7874a;
      --accent: #f0a500;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2d2d2d;
      --text-light: #6b7280;
      --white: #ffffff;
      --bg-light: #f9f7f4;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,99,10,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 4px 16px rgba(232,99,10,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,99,10,0.45) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-logo-sub {
        display: none;
      }
      .nav-logo-name {
        font-size: 14px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 35%, #1e3a5f 65%, #0f3460 100%);
      overflow: hidden;
      padding: 80px 20px 60px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 50%, rgba(232,99,10,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(240,165,0,0.12) 0%, transparent 55%);
      pointer-events: none;
    }

    .hero-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.12;
    }

    .hero-shape-1 {
      width: 500px;
      height: 500px;
      background: var(--primary);
      top: -100px;
      right: -100px;
    }

    .hero-shape-2 {
      width: 350px;
      height: 350px;
      background: var(--accent);
      bottom: -80px;
      left: -80px;
    }

    .hero-shape-3 {
      width: 200px;
      height: 200px;
      background: var(--primary-light);
      top: 40%;
      left: 40%;
      opacity: 0.08;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,99,10,0.15);
      border: 1px solid rgba(232,99,10,0.35);
      color: var(--primary-light);
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.22rem);
      color: rgba(255,255,255,0.72);
      margin-bottom: 42px;
      font-weight: 400;
      line-height: 1.65;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.22s, box-shadow 0.22s;
      box-shadow: 0 6px 28px rgba(232,99,10,0.45);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(232,99,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.22s, border-color 0.22s, transform 0.22s;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--primary-light);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    @media (max-width: 480px) {
      .hero-stat-divider { display: none; }
      .hero-stats { gap: 20px; }
    }

    /* ===== SECTION BASE ===== */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 2.5px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(1.7rem, 3.5vw, 2.5rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 54px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,99,10,0.15);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,99,10,0.1), rgba(240,165,0,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card-more {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 18px;
      color: var(--primary);
      font-size: 13.5px;
      font-weight: 600;
      text-decoration: none;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 90% 50%, rgba(232,99,10,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    #proc-my .section-label {
      color: var(--primary-light);
    }

    #proc-my .section-label::before {
      background: var(--primary-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 38px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      backdrop-filter: blur(8px);
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(232,99,10,0.3);
      transform: translateY(-4px);
    }

    .benefit-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 24px;
      box-shadow: 0 6px 20px rgba(232,99,10,0.35);
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .benefit-card p {
      font-size: 14.5px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 34px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 40px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.6;
      font-family: Georgia, serif;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
      font-size: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #e8630a, #c4520a); }
    .avatar-2 { background: linear-gradient(135deg, #0f3460, #1e3a5f); }
    .avatar-3 { background: linear-gradient(135deg, #f0a500, #e8630a); }

    .review-author-info strong {
      display: block;
      font-size: 14.5px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-author-info span {
      font-size: 12.5px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 36px;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition:
