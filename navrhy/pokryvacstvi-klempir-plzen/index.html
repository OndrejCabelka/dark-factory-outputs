<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokrývačství – Klempíř Plzeň | +420 605 335 880</title>
  <meta name="description" content="Profesionální klempíř v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte +420 605 335 880.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(37,99,235,0.18);
      --transition: 0.25s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-light);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img { max-width: 100%; }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav a.nav-link {
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
    }

    nav a.nav-link:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }

    .btn-header {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 50px;
      white-space: nowrap;
      transition: opacity var(--transition), transform var(--transition);
      box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    }

    .btn-header:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    #hero {
      background:
        linear-gradient(160deg, rgba(10,18,40,0.92) 0%, rgba(15,35,80,0.88) 50%, rgba(8,12,30,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(37,99,235,0.04) 40px,
          rgba(37,99,235,0.04) 80px
        );
      background-color: #0a1228;
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.4);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 26px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #94a3b8;
      max-width: 560px;
      margin: 0 auto 38px;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 50px;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 6px 24px rgba(37,99,235,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(37,99,235,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ── SHARED ── */
    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.3rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-head .section-desc {
      margin: 0 auto;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    section {
      padding: 80px 20px;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: transparent;
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(59,130,246,0.15));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── PROC MY ── */
    #proc-my {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 50px,
        rgba(255,255,255,0.015) 50px,
        rgba(255,255,255,0.015) 100px
      );
      pointer-events: none;
    }

    #proc-my .section-title { color: var(--white); }
    #proc-my .section-label { color: #93c5fd; }
    #proc-my .section-desc { color: #94a3b8; }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(37,99,235,0.4);
      transform: translateY(-3px);
    }

    .benefit-num {
      font-size: 3rem;
      font-weight: 800;
      color: rgba(37,99,235,0.25);
      line-height: 1;
      margin-bottom: 14px;
      letter-spacing: -2px;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 0.93rem;
      color: #94a3b8;
      line-height: 1.65;
    }

    .benefit-icon {
      font-size: 2.2rem;
      margin-bottom: 16px;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .review-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    }

    .review-quote {
      font-size: 3.5rem;
      line-height: 0.6;
      color: var(--primary-light);
      opacity: 0.3;
      font-family: Georgia, serif;
      margin-bottom: 12px;
    }

    .review-stars {
      color: var(--accent);
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .review-location {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .contact-item:hover {
      border-color: var(--primary-light);
      box-shadow: 0 4px 20px rgba(37,99,235,0.1);
    }

    .contact-item a {
      text-decoration: none;
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-detail h4 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-detail a,
    .contact-detail span {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      transition: color var(--transition);
    }

    .contact-detail a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(160deg, #e2e8f0, #cbd5e1);
      border-radius: var(--radius);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-light);
      border: 2px dashed #94a3b8;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 30px,
        rgba(148,163,184,0.2) 30px,
        rgba(148,163,184,0.2) 31px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 30px,
        rgba(148,163,184,0.2) 30px,
        rgba(148,163,184,0.2) 31px
      );
    }

    .map-icon {
      font-size: 3rem;
      position: relative;
      z-index: 1;
    }

    .map-label {
      font-size: 1rem;
      font-weight
