<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jan Šeliga – INSTALA | Instalatér Liberec</title>
  <meta name="description" content="Profesionální instalatér v Liberci a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420 485 152 210.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fd4;
      --primary-dark: #1558b0;
      --primary-light: #3b8fe8;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #132236;
      --dark3: #1a2f47;
      --text: #2c3e50;
      --text-light: #5a7184;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-card: #ffffff;
      --border: #e2ecf7;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26,111,212,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,212,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── NAVBAR ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,111,212,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26,111,212,0.50);
    }

    .nav-cta .icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0f2744 40%, #1a3d6e 70%, #1a5fa0 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,212,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(240,165,0,0.15);
      border: 1px solid rgba(240,165,0,0.4);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.80);
      max-width: 560px;
      margin: 0 auto 40px;
      position: relative;
      z-index: 1;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 24px rgba(26,111,212,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(26,111,212,0.60);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.35);
      color: var(--white);
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.60);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.60);
      font-weight: 500;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ─── SEKCE OBECNĚ ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,212,0.09);
      color: var(--primary);
      border: 1px solid rgba(26,111,212,0.2);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
    }

    .section-header {
      margin-bottom: 50px;
    }

    /* ─── HAVÁRIE STRIP ─── */
    .havarie-strip {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      padding: 20px;
      text-align: center;
    }

    .havarie-strip-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .havarie-strip-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .havarie-strip-text span {
      font-weight: 400;
      opacity: 0.9;
    }

    .btn-havarie {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: #c0392b;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 15px;
      transition: transform 0.2s;
    }

    .btn-havarie:hover {
      transform: scale(1.04);
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,212,0.25);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card.highlight {
      background: linear-gradient(135deg, #fff8f8, #fff0f0);
      border-color: rgba(231,76,60,0.25);
    }

    .service-card.highlight::before {
      background: linear-gradient(90deg, #c0392b, #e74c3c);
    }

    .service-icon-wrap {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26,111,212,0.10), rgba(59,143,232,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card.highlight .service-icon-wrap {
      background: linear-gradient(135deg, rgba(192,57,43,0.10), rgba(231,76,60,0.15));
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e74c3c;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 14px;
      letter-spacing: 0.5px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,212,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-tag {
      background: rgba(26,111,212,0.20);
      color: var(--primary-light);
      border-color: rgba(26,111,212,0.35);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.60);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 30px;
      position: relative;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(26,111,212,0.40);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      color: rgba(26,111,212,0.25);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.60);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .kontakt-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(26,111,212,0.10), rgba(59,143,232,0.15));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
    }

    .kontakt-item-value a {
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary);
    }

    .kontakt-item-note {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 3px;
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e8f0fe, #d6e6f7);
      border-radius: var(--radius);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2
