<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakty – Malíř natěrač Ostrava | Profesionální malování a nátěry</title>
<meta name="description" content="Profesionální malíř natěrač v Ostravě. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte 702 007 250.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8a020;
  --primary-dark: #c7861a;
  --primary-light: #f5c35a;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --white: #ffffff;
  --bg-light: #fafaf8;
  --bg-section: #f5f3ee;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,160,32,0.18);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 26, 46, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--primary);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  color: var(--white);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.3px;
}

.logo-sub {
  color: var(--primary);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,160,32,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(232,160,32,0.5);
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
  position: relative;
  padding: 80px 20px 90px;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 50%, rgba(232,160,32,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(232,160,32,0.10) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(15,52,96,0.8) 0%, transparent 50%);
  pointer-events: none;
}

.hero-paint-1 {
  position: absolute;
  top: -30px;
  right: -30px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-paint-2 {
  position: absolute;
  bottom: -50px;
  left: -50px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(232,160,32,0.07) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,160,32,0.15);
  border: 1px solid rgba(232,160,32,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

#hero h1 {
  color: var(--white);
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  color: rgba(255,255,255,0.75);
  font-size: clamp(16px, 2.5vw, 20px);
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}

.hero-sub strong {
  color: var(--primary-light);
}

.hero-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(232,160,32,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(232,160,32,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-num {
  display: block;
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-tag {
  display: inline-block;
  background: rgba(232,160,32,0.12);
  color: var(--primary-dark);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 12px;
}

.section-header p {
  color: var(--text-light);
  font-size: 17px;
  max-width: 560px;
  margin: 0 auto;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 80px 20px;
  background: var(--bg-light);
}

.sluzby-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border-bottom: 3px solid transparent;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  transition: background 0.3s;
}

.sluzba-card:hover .sluzba-icon {
  background: linear-gradient(135deg, rgba(232,160,32,0.25), rgba(232,160,32,0.12));
}

.sluzba-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.sluzba-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.sluzba-card .sluzba-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 14px;
  transition: gap 0.2s;
}

.sluzba-card:hover .sluzba-link {
  gap: 8px;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 80px 20px;
  background: var(--white);
}

.proc-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.proc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.proc-card {
  background: linear-gradient(135deg, #fafaf8, #f5f3ee);
  border-radius: var(--radius);
  padding: 36px 28px;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, box-shadow 0.25s;
}

.proc-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.10);
}

.proc-card::after {
  content: '';
  position: absolute;
  bottom: -20px;
  right: -20px;
  width: 80px;
  height: 80px;
  background: rgba(232,160,32,0.08);
  border-radius: 50%;
}

.proc-num {
  font-size: 48px;
  font-weight: 900;
  color: rgba(232,160,32,0.2);
  line-height: 1;
  margin-bottom: 12px;
  letter-spacing: -2px;
}

.proc-icon {
  font-size: 32px;
  margin-bottom: 16px;
}

.proc-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.proc-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 80px 20px;
  background: var(--bg-section);
}

.ref-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.ref-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.ref-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  position: relative;
  transition: transform 0.25s, box-shadow 0.25s;
}

.ref-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.12);
}

.ref-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 12px;
  font-weight: 900;
  opacity: 0.4;
}

.ref-stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.ref-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 20px;
  font-style: italic;
}

.ref-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ref-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.ref-avatar.a1 { background: linear-gradient(135deg, #e8a020, #c7861a); }
.ref-avatar.a2 { background: linear-gradient(135deg, #0f3460, #16213e); }
.ref-avatar.a3 { background: linear-gradient(135deg, #2d8a4e, #1a5c32); }

.ref-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.ref-location {
  font-size: 12px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 80px 20px;
  background: var(--white);
}

.kontakt-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 24px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 28px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--bg-light);
  border-radius: var(--radius);
  transition: transform 0.2s;
}

.kontakt-item:hover {
  transform: translateX(4px);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-item-text strong {
  display: block;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 4px;
  font-weight: 600;
}

.kontakt-item-text a,
.kontakt-item-text span {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-item-text a:hover {
  color: var(--primary-dark);
}

.mapa-box {
  background: linear-gradient(135deg, var(--dark), var(--dark2));
  border-radius: var(--radius);
  height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: rgba(255,255,255,0.8);
  position: relative;
  overflow: hidden;
}

.mapa-box::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 30% 40%, rgba(232,160,32,0.12) 0%, transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(15,52,96,0.5) 0%, transparent 50%);
}

.mapa-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.mapa-pin {
  font-size: 52px;
  display: block;
  margin-bottom: 12px;
  animation: pulse-pin 2s ease-in-out infinite;
}

@keyframes pulse-pin {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.mapa-box h4 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.mapa-box p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
}

.mapa-btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-
