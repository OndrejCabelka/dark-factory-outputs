<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Výkopové práce Lukáš – Brno a okolí</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e67e00;
  --primary-dark: #c96e00;
  --primary-light: #ff9a2e;
  --dark: #1a1a1a;
  --dark2: #242424;
  --dark3: #2e2e2e;
  --text: #f0f0f0;
  --text-muted: #a0a0a0;
  --white: #ffffff;
  --card-bg: #2a2a2a;
  --border: #3a3a3a;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========================
   NAVBAR
======================== */
header {
  position: fixed;
  top: 44px;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(20,20,20,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(230,126,0,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(230,126,0,0.5);
}

/* ========================
   HERO
======================== */
#hero {
  min-height: 100vh;
  background:
    linear-gradient(160deg, rgba(10,10,10,0.88) 0%, rgba(20,15,5,0.85) 50%, rgba(10,10,10,0.92) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(230,126,0,0.03) 40px,
      rgba(230,126,0,0.03) 80px
    ),
    linear-gradient(135deg, #1a0f00 0%, #0d0d0d 40%, #1a0800 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 140px 20px 80px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(230,126,0,0.12) 0%, transparent 65%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--dark));
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 800px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,126,0,0.15);
  border: 1px solid rgba(230,126,0,0.3);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge span {
  font-size: 16px;
}

#hero h1 {
  font-size: clamp(28px, 5.5vw, 58px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
  color: var(--white);
}

#hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(15px, 2.2vw, 19px);
  color: #c0c0c0;
  max-width: 580px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 8px 25px rgba(230,126,0,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(230,126,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.15);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-3px);
}

.hero-stats {
  margin-top: 60px;
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: center;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}

/* ========================
   SECTIONS COMMON
======================== */
section {
  padding: 90px 20px;
}

.section-header {
  text-align: center;
  max-width: 620px;
  margin: 0 auto 60px;
}

.section-tag {
  display: inline-block;
  background: rgba(230,126,0,0.15);
  color: var(--primary-light);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ========================
   SERVICES
======================== */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  border-color: rgba(230,126,0,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(230,126,0,0.1);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(230,126,0,0.15), rgba(230,126,0,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(230,126,0,0.2);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ========================
   PROC MY
======================== */
#proc-my {
  background: var(--dark);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-item {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 30px;
  text-align: center;
  transition: transform 0.3s, border-color 0.3s;
}

.benefit-item:hover {
  transform: translateY(-4px);
  border-color: rgba(230,126,0,0.25);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 22px;
  box-shadow: 0 8px 20px rgba(230,126,0,0.3);
}

.benefit-item h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-item p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ========================
   REFERENCE
======================== */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  transition: transform 0.3s, border-color 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  border-color: rgba(230,126,0,0.2);
}

.review-quote {
  font-size: 40px;
  line-height: 1;
  color: var(--primary);
  margin-bottom: 14px;
  opacity: 0.7;
  font-family: Georgia, serif;
}

.stars {
  color: var(--primary-light);
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.review-text {
  font-size: 14px;
  color: #c8c8c8;
  line-height: 1.75;
  margin-bottom: 20px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, #e67e00, #ff9a2e); }
.av2 { background: linear-gradient(135deg, #2980b9, #3498db); }
.av3 { background: linear-gradient(135deg, #27ae60, #2ecc71); }

.reviewer-info {
  display: flex;
  flex-direction: column;
}

.reviewer-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.reviewer-loc {
  font-size: 12px;
  color: var(--text-muted);
}

/* ========================
   KONTAKT
======================== */
#kontakt {
  background: var(--dark);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  max-width: 1000px;
  margin: 0 auto;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.contact-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  transition: border-color 0.3s, transform 0.2s;
}

.contact-card:hover {
  border-color: rgba(230,126,0,0.35);
  transform: translateX(4px);
}

.contact-card-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(230,126,0,0.2), rgba(230,126,0,0.08));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(230,126,0,0.2);
}

.contact-card-body {
  display: flex;
  flex-direction: column;
}

.contact-card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 3px;
}

.contact-card-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}

.contact-card-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.contact-tel .contact-card-value {
  color: var(--primary-light);
  font-size: 20px;
}

.map-placeholder {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}

.map-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(230,126,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(230,126,0,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-pin {
  font-size: 48px;
  margin-bottom: 10px;
  display: block;
}

.map-city {
  font-size: 22px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
}

.map-area {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.map-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  transition: transform 0.2s;
}

.map-link:hover {
  transform: translateY(-2px);
}

/* ========================
   FOOTER
======================== */
footer {
  background: var(--dark2);
  border-top: 1px solid var(--border);
  padding: 40px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.footer-logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
}

.footer-divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
}

.footer-meta {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.8;
