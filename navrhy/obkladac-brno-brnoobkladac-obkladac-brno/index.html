<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obkladač Brno | Profesionální pokládka obkladů a dlažby</title>
<meta name="description" content="Profesionální obkladač v Brně a okolí. Pokládka obkladů, dlažby, koupelny na klíč, terasy, epoxidové spárování a hydroizolace.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8a45a;
  --primary-dark: #a8843a;
  --primary-light: #e8c47a;
  --dark: #1a1a1a;
  --dark2: #242424;
  --dark3: #2e2e2e;
  --text: #e8e8e8;
  --text-muted: #999;
  --white: #ffffff;
  --card-bg: #252525;
  --border: #3a3a3a;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-hover: 0 8px 40px rgba(200,164,90,0.2);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: rgba(20, 20, 20, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 999;
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  padding: 11px 20px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(200,164,90,0.3);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(200,164,90,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0f0f0f 0%, #1c1a14 40%, #2a2210 70%, #1a1508 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,164,90,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(200,164,90,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(200,164,90,0.15);
  border: 1px solid rgba(200,164,90,0.3);
  color: var(--primary);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 800;
  line-height: 1.15;
  color: var(--white);
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: #b0b0b0;
  max-width: 560px;
  margin: 0 auto 36px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-cta {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(200,164,90,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(200,164,90,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid var(--border);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  background: rgba(200,164,90,0.05);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 60px;
  padding-top: 40px;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(200,164,90,0.1);
  border: 1px solid rgba(200,164,90,0.25);
  color: var(--primary);
  padding: 5px 12px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  line-height: 1.2;
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 48px;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.service-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,164,90,0.3);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(200,164,90,0.15), rgba(200,164,90,0.05));
  border: 1px solid rgba(200,164,90,0.2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
}

.service-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--dark);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.benefit-card {
  background: linear-gradient(135deg, var(--card-bg), var(--dark3));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,164,90,0.3);
}

.benefit-number {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 48px;
  font-weight: 800;
  color: rgba(200,164,90,0.08);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 40px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px 28px;
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,164,90,0.25);
}

.review-quote {
  font-size: 40px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0.6;
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
}

.star {
  color: var(--primary);
  font-size: 16px;
}

.review-text {
  font-size: 15px;
  color: #c0c0c0;
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
}

.review-date {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--dark);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
  }
}

.kontakt-info {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 32px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.kontakt-item:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.kontakt-icon {
  width: 48px;
  height: 48px;
  background: rgba(200,164,90,0.1);
  border: 1px solid rgba(200,164,90,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.kontakt-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
}

.kontakt-value a {
  color: var(--white);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-value a:hover {
  color: var(--primary);
}

.kontakt-value-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.mapa-placeholder {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  height: 100%;
  min-height: 320px;
  display: flex;
  flex-direction: column;
}

.mapa-inner {
  flex: 1;
  background: linear-gradient(135deg, #1e1e1e, #252525);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.mapa-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,164,90,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,164,90,0.04) 1px, transparent 1px);
  background-size: 30px 30px;
}

.mapa-pin {
  font-size: 56px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}

.mapa-text {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  position: relative;
  z-index: 1;
  margin-bottom: 6px;
}

.mapa-sub {
  font-size: 13px;
  color: var(--text-muted);
  position: relative;
  z-index: 1;
}

.mapa-cta {
  padding: 16px 24px;
  background: var(--dark3);
  border-top: 1px solid var(--border);
  text-align: center;
}

.mapa-cta a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;
  transition: opacity 0.2s;
}

.mapa-cta a:hover {
  opacity: 0.8;
}

/* ===== CTA STRIP ===== */
.cta-strip {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  padding: 56px 20px;
  text-align: center;
}

.cta-strip h2 {
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.cta-strip p {
  font-size: 16px;
  color: rgba(0,0,0,0.6);
  margin-bottom: 28px;
}

.cta-strip .btn-dark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--dark);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.cta-strip .btn-dark:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  background: #0
