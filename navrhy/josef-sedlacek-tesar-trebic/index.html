<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josef Sedláček – Tesař Třebíč</title>
<meta name="description" content="Profesionální tesař v Třebíči a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8650a;
  --primary-dark: #a04f06;
  --primary-light: #e8892e;
  --dark: #1a1208;
  --dark2: #2c1f0e;
  --text: #2d1f0a;
  --text-light: #6b5340;
  --white: #ffffff;
  --bg-light: #fdf8f2;
  --bg-section: #f5ede0;
  --card-bg: #ffffff;
  --border: #e8d5bc;
  --shadow: 0 4px 24px rgba(200, 101, 10, 0.10);
  --shadow-hover: 0 8px 40px rgba(200, 101, 10, 0.22);
  --radius: 14px;
  --font: 'Inter', system-ui, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ─── HEADER / NAV ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(200,101,10,0.25);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 26px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.2px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: rgba(255,255,255,0.80);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.btn-cta-nav {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--primary);
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(200,101,10,0.35);
}

.btn-cta-nav:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(200,101,10,0.5);
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
}

/* ─── HERO ─── */
#hero {
  background:
    linear-gradient(160deg, rgba(26,18,8,0.92) 0%, rgba(44,31,14,0.85) 50%, rgba(200,101,10,0.35) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 30px,
      rgba(200,101,10,0.04) 30px,
      rgba(200,101,10,0.04) 60px
    ),
    linear-gradient(135deg, #3d2008 0%, #1a1208 40%, #2c1a06 100%);
  min-height: 92vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-wood-pattern {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 80px,
      rgba(200,101,10,0.04) 80px,
      rgba(200,101,10,0.04) 82px
    ),
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 120px,
      rgba(255,255,255,0.02) 120px,
      rgba(255,255,255,0.02) 121px
    );
  pointer-events: none;
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,101,10,0.18) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  pointer-events: none;
}

.hero-glow2 {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(200,101,10,0.10) 0%, transparent 70%);
  bottom: -80px;
  left: -50px;
  pointer-events: none;
}

.hero-inner {
  max-width: 820px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(200,101,10,0.18);
  border: 1px solid rgba(200,101,10,0.40);
  color: var(--primary-light);
  padding: 7px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary-light);
  position: relative;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.78);
  margin-bottom: 44px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--primary);
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(200,101,10,0.45);
  border: 2px solid transparent;
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(200,101,10,0.60);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  padding: 14px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  border: 2px solid rgba(255,255,255,0.35);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary-light);
  background: rgba(200,101,10,0.12);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.hero-stat {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 14px 22px;
  text-align: center;
  min-width: 130px;
}

.hero-stat-num {
  font-size: 1.7rem;
  font-weight: 800;
  color: var(--primary-light);
  display: block;
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
  font-weight: 500;
}

/* ─── SECTION BASE ─── */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(200,101,10,0.10);
  color: var(--primary);
  padding: 5px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(1.7rem, 4vw, 2.5rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 580px;
  line-height: 1.7;
}

.text-center {
  text-align: center;
}

.text-center .section-desc {
  margin: 0 auto;
}

/* ─── SLUŽBY ─── */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 48px;
}

@media (min-width: 560px) {
  .sluzby-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 900px) {
  .sluzby-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.sluzba-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 32px 28px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  font-size: 2.4rem;
  margin-bottom: 18px;
  display: block;
  line-height: 1;
}

.sluzba-title {
  font-size: 1.12rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.sluzba-desc {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.65;
}

.sluzba-card-main {
  grid-column: 1 / -1;
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  border-color: rgba(200,101,10,0.30);
}

@media (min-width: 900px) {
  .sluzba-card-main {
    grid-column: span 1;
  }
}

.sluzba-card-main .sluzba-title {
  color: var(--white);
  font-size: 1.25rem;
}

.sluzba-card-main .sluzba-desc {
  color: rgba(255,255,255,0.70);
}

/* ─── PROČ MY ─── */
#proc-my {
  background: var(--white);
}

.benefity-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  margin-top: 48px;
}

@media (min-width: 768px) {
  .benefity-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.benefit-card {
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 36px 28px;
  border: 1px solid var(--border);
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
}

.benefit-icon-wrap {
  width: 68px;
  height: 68px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 22px;
  font-size: 1.9rem;
  box-shadow: 0 4px 18px rgba(200,101,10,0.30);
}

.benefit-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.benefit-desc {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ─── REFERENCE ─── */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, #2c1a06 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '"';
  position: absolute;
  font-size: 400px;
  color: rgba(200,101,10,0.05);
  font-family: Georgia, serif;
  top: -60px;
  left: -20px;
  line-height: 1;
  pointer-events: none;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-label {
  background: rgba(200,101,10,0.25);
  color: var(--primary-light);
}

#reference .section-desc {
  color: rgba(255,255,255,0.65);
}

.recenze-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 48px;
}

@media (min-width: 700px) {
  .recenze-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 1000px) {
  .recenze-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.recenze-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 28px 26px;
  transition: background 0.25s, transform 0.25s;
}

.recenze-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-4px);
}

.recenze-stars {
  color: #f5a623;
  font-size: 1.1rem;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.recenze-text {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.recenze-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.recenze-name {
  font-weight: 700;
  color: var(--white);
  font-size: 0.95rem;
}

.recenze-loc {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.50);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  margin-top: 48px;
  align-items: start;
}

@media (min-width: 900px) {
  .kontakt-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}

.kontakt-item:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
  box-shadow: 0 3px 14px rgba(200,101,10,0.28);
}

.kontakt-item-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--primary);
  margin-bottom: 4px;
}

.kontakt-item-val {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
}

.kontakt-item-val a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-item-val a:hover {
  color: var(--primary);
}

.kontakt-item-sub {
  font-size: 0.85rem;
  color: var(--text-light
