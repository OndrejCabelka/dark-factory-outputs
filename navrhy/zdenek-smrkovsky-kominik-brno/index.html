<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zdeněk Smrkovský – Kominík Brno</title>
  <meta name="description" content="Profesionální kominík v Brně a okolí. Čištění komínů, revize, vložkování. Rychlý servis, kvalita garantována, přijatelná cena.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3d3d3d;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #f8f5f4;
      --bg-card: #ffffff;
      --border: #e8e0df;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a08 0%, #2d1210 30%, #4a1c18 60%, #6b2822 100%);
      position: relative;
      padding: 80px 20px 90px;
      text-align: center;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--bg-light));
      pointer-events: none;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ffaa99;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #c5b5b4;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      margin-top: 52px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(192,57,43,0.25);
    }

    .benefit-body h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-body p {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROMO BANNER ===== */
    .promo-strip {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      padding: 48px 20px;
      text-align: center;
    }

    .promo-strip-inner {
      max-width: 700px;
      margin: 0 auto;
    }

    .promo-strip h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
    }

    .promo-strip p {
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      color: var(--primary);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      color: #f39c12;
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
    }

    .review-author-info span {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--dark);
      color: var(--white);
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: #aaa;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.3);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body strong {
      display: block;
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .contact-item-body a {
      color: var(--white);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary-light);
    }

    .contact-item-body p {
      color: #ccc;
      font-size: 1rem;
      line-height: 1.5;
    }

    .map-placeholder {
      background: var(--dark2);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #888;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
    }

    .map-placeholder-icon {
      font-size: 40px;
      position: relative;
    }

    .map-placeholder-text {
      position: relative;
      text-align: center;
      line-height: 1.5;
    }

    .map-placeholder a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 600;
    }

    .map-placeholder a:hover {
      text-decoration: underline;
    }

    .contact-hours {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 20px;
      margin-top: 8px;
    }

    .contact-hours h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.92rem;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .hours-row:last-child {
      border-bottom: none;
    }

    .hours-row span:first-child {
      color: #aaa;
    }
