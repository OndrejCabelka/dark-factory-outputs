<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podlahy Zetocha – Podlaháři Brno | +420 777 959 662</title>
<meta name="description" content="Profesionální pokládka podlah v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Zavolejte +420 777 959 662.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c47f17;
  --primary-dark: #a06610;
  --primary-light: #e8a030;
  --accent: #f5c842;
  --dark: #1a1208;
  --dark2: #2a1f0a;
  --dark3: #3a2c10;
  --text: #1a1208;
  --text-light: #5a4a28;
  --bg-light: #fdf8f0;
  --bg-card: #ffffff;
  --border: #e8d5a8;
  --white: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(196,127,23,0.12);
  --shadow-hover: 0 8px 40px rgba(196,127,23,0.22);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(196,127,23,0.3);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 1px;
  text-decoration: none;
}

.logo-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-name span {
  color: var(--accent);
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 2px 12px rgba(196,127,23,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(196,127,23,0.5);
}

.nav-cta-icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  background: linear-gradient(135deg, #1a1208 0%, #2e1c05 40%, #3d2508 70%, #1a1208 100%);
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 80px 20px;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(196,127,23,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(245,200,66,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(196,127,23,0.10) 0%, transparent 50%);
  pointer-events: none;
}

.hero-lines {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  opacity: 0.06;
}

.hero-lines::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 40px,
    rgba(196,127,23,1) 40px,
    rgba(196,127,23,1) 41px
  );
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 820px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,127,23,0.2);
  border: 1px solid rgba(196,127,23,0.5);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 24px;
  letter-spacing: -1px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 44px;
  line-height: 1.6;
  max-width: 620px;
  margin-left: auto;
  margin-right: auto;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-weight: 800;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: var(--radius);
  transition: all 0.25s ease;
  box-shadow: 0 4px 24px rgba(196,127,23,0.5);
  letter-spacing: -0.2px;
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(196,127,23,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
  justify-content: center;
  padding-top: 48px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 36px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
  background: rgba(196,127,23,0.1);
  padding: 4px 12px;
  border-radius: 100px;
  border: 1px solid rgba(196,127,23,0.2);
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 36px 28px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.service-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(196,127,23,0.3);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  font-size: 44px;
  margin-bottom: 20px;
  display: block;
  line-height: 1;
}

.service-card h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-tag {
  display: inline-block;
  margin-top: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  background: rgba(196,127,23,0.1);
  padding: 4px 10px;
  border-radius: 6px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(ellipse at 30% 50%, rgba(196,127,23,0.15) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(245,200,66,0.15);
  border-color: rgba(245,200,66,0.3);
  color: var(--accent);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-title span {
  color: var(--accent);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(196,127,23,0.25);
  border-radius: var(--radius);
  padding: 40px 32px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.benefit-card:hover {
  background: rgba(196,127,23,0.08);
  border-color: rgba(196,127,23,0.5);
  transform: translateY(-3px);
}

.benefit-card:hover::after {
  transform: scaleX(1);
}

.benefit-number {
  font-size: 56px;
  font-weight: 900;
  color: rgba(196,127,23,0.2);
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: -2px;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}

.benefit-card h3 {
  font-size: 21px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.62);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  position: relative;
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 28px;
  font-size: 80px;
  line-height: 1;
  color: var(--primary);
  opacity: 0.15;
  font-family: Georgia, serif;
  font-weight: 900;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(196,127,23,0.25);
}

.stars {
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.reviewer-location {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}

.review-verified {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #16a34a;
  background: #f0fdf4;
  padding: 2px 8px;
  border-radius: 100px;
  margin-top: 4px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 24px;
  background: var(--bg-light);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: all 0.25s ease;
}

.kontakt-item:hover {
  border-color: rgba(196,127,23,0.4);
  box-shadow: var(--shadow);
}

.kontakt-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.kontakt-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
}

.kontakt-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-value a:hover {
  color: var(--primary-dark);
}

.mapa-placeholder {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  border-radius: var(--radius);
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 40px;
  border: 1px solid rgba(196,127,23,0.3);
  position: relative;
  overflow: hidden;
}

.mapa-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle at 50% 50%, rgba(196,127,23,0.12) 0%, transparent 70%);
}

.mapa-icon
