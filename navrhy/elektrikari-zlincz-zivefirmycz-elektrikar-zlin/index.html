<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikáři Zlín – Profesionální elektroinstalace a revize</title>
  <meta name="description" content="Profesionální elektrikář ve Zlíně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 731 528 873.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C518;
      --primary-dark: #D4A800;
      --primary-light: #FFF3B0;
      --accent: #FF8C00;
      --dark: #0D0D1A;
      --dark-2: #141428;
      --dark-3: #1E1E38;
      --text: #1a1a2e;
      --text-light: #555570;
      --white: #ffffff;
      --gray-light: #f4f4f8;
      --gray-border: #e0e0ec;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-call-nav {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--dark) !important;
      font-weight: 700 !important;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px !important;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 2px 12px rgba(245,197,24,0.3);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,197,24,0.5) !important;
      color: var(--dark) !important;
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0D0D1A 0%, #1a1a3e 40%, #0f1f3d 70%, #0D0D1A 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(ellipse, rgba(245,197,24,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 60px at 50% 60px);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,197,24,0.15);
      border: 1px solid rgba(245,197,24,0.35);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(30px, 5.5vw, 62px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--dark);
      font-weight: 800;
      font-size: 16px;
      padding: 16px 34px;
      border-radius: var(--radius);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,197,24,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(245,197,24,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      padding: 16px 34px;
      border-radius: var(--radius);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      display: block;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SEKCE OBECNĚ ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary-dark);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary-light), #fff3c0);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 13.5px;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 8px;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 50%;
      left: -10%;
      transform: translateY(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(245,197,24,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    #proc-my .section-label {
      color: var(--primary);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(245,197,24,0.06);
      border-color: rgba(245,197,24,0.25);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(245,197,24,0.15);
      line-height: 1;
      margin-bottom: 16px;
      font-family: 'Inter', sans-serif;
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(245,197,24,0.2), rgba(255,140,0,0.15));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 18px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.58);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--gray-light);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1.5px solid var(--gray-border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 52px;
      line-height: 0.7;
      color: var(--primary);
      font-weight: 900;
      margin-bottom: 14px;
      display: block;
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-location {
      font-size: 12.5px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--gray-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary-light), #fff8c0);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-detail {
      padding-top: 2px;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value:hover {
      color: var(--primary-dark);
    }

    .contact-value-sub {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 400;
      margin-top: 2px;
    }

    .contact-cta-box {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
    }

    .contact-cta-box h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .contact-cta-box p {
      color: rgba(255,255,255,0.6);
      font-size: 14.5px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .contact-cta-box .btn-primary {
      width: 100%;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 17px;
      padding: 18px 24px;
    }

    .contact-cta-box .btn-secondary {
      width: 100%;
      justify-content: center;
      font-size: 15px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8e8f0
