<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér & Topenář Hradec Králové | 24/7 Havarijní služba</title>
  <meta name="description" content="Profesionální instalatér a topenář v Hradci Králové. Oprava potrubí, instalace koupelen, tepelná čerpadla, havárie 24/7. Volejte +420605512785">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #145ea8;
      --primary-light: #3b8fe0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #122236;
      --dark3: #1a3150;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f1f7ff;
      --bg-card: #ffffff;
      --border: #dbeafe;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(59,143,224,0.15);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #93c5fd;
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0d2444 40%, #1a3a6b 70%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,143,224,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(26,111,196,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(60% 100% at 50% 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59,143,224,0.15);
      border: 1px solid rgba(59,143,224,0.35);
      color: #93c5fd;
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(26px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: #60a5fa;
    }

    .hero-sub {
      font-size: clamp(15px, 2vw, 19px);
      color: #93c5fd;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(26,111,196,0.45);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(26,111,196,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      color: var(--white);
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: #60a5fa;
      line-height: 1;
      display: block;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #93c5fd;
      margin-top: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTIONS SHARED ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-light);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--bg-light), #dbeafe);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 14px;
      border: 1px solid #fde68a;
    }

    .service-badge.blue {
      background: #eff6ff;
      color: var(--primary-dark);
      border-color: #bfdbfe;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      background: var(--bg-light);
      border: 1px solid var(--border);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .benefit-icon-wrap {
      font-size: 36px;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.75;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(26,111,196,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(59,143,224,0.15);
      border-color: rgba(59,143,224,0.3);
      color: #93c5fd;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #93c5fd;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 30px 28px;
      backdrop-filter: blur(8px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-author-info span {
      font-size: 12px;
      color: #64748b;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-text a {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text p {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(59,143,224,0.2);
      box-shadow: var(--shadow);
      height: 100%;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(59,143,224,0.05) 40px, rgba(59,143,224,0.05) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(59,143,224,0.05) 40px, rgba(59,143,224,0.05) 41px);
    }

    .map-pin {
      font-size: 52px;
      position: relative;
      z-index: 2;
    }

    .map-text {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .map-text strong {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
    }

    .map-text span {
      font-size: 14px;
      color: #93c5fd;
    }

    .map-link {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center
