<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malířské a Lakýrnické Práce – Jiří Bajer | Plzeň</title>
  <meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Zavolejte: +420 774 282 455">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8820c;
      --primary-dark: #c46a08;
      --primary-light: #f5a442;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --bg-light: #fafafa;
      --bg-section: #f4f1ed;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,130,12,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-text strong {
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-logo-text span {
      color: var(--primary-light);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-nav-tel {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(232,130,12,0.4);
    }

    .btn-nav-tel:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,130,12,0.5);
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2744 100%);
    }

    .hero-bg-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
    }

    .hero-shape-1 {
      width: 600px;
      height: 600px;
      background: var(--primary);
      top: -200px;
      right: -150px;
    }

    .hero-shape-2 {
      width: 400px;
      height: 400px;
      background: var(--primary-light);
      bottom: -150px;
      left: -100px;
    }

    .hero-shape-3 {
      width: 200px;
      height: 200px;
      background: var(--white);
      top: 40%;
      left: 30%;
      opacity: 0.03;
    }

    .hero-paint-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,130,12,0.15);
      border: 1px solid rgba(232,130,12,0.3);
      color: var(--primary-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      color: var(--white);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 720px;
    }

    .hero-content h1 .highlight {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      color: rgba(255,255,255,0.75);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: 400;
      max-width: 560px;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(232,130,12,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(232,130,12,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 14px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      color: var(--white);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--primary-light);
    }

    .hero-stat-label {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* ── SEKCE OBECNĚ ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,130,12,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .section-subtitle {
      color: var(--text-light);
      font-size: 1.05rem;
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(232,130,12,0.12), rgba(245,164,66,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(232,130,12,0.2), rgba(245,164,66,0.15));
    }

    .sluzba-karta h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      color: var(--text-light);
      font-size: 0.93rem;
      line-height: 1.65;
    }

    .sluzba-more {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 14px;
      text-decoration: none;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      margin-top: 48px;
    }

    .benefit-item {
      display: flex;
      gap: 22px;
      align-items: flex-start;
      background: var(--bg-section);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-num {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: var(--white);
      flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(232,130,12,0.35);
    }

    .benefit-text h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      color: var(--text-light);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.04;
    }

    #reference .section-tag {
      background: rgba(232,130,12,0.2);
      color: var(--primary-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-subtitle {
      color: rgba(255,255,255,0.6);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 30px 26px;
      backdrop-filter: blur(4px);
      transition: background 0.2s, transform 0.2s;
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-3px);
    }

    .hvezdicky {
      color: #fbbf24;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .recenze-text {
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .recenze-info strong {
      color: var(--white);
      font-size: 0.95rem;
      display: block;
    }

    .recenze-info span {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--bg-section);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .kontakt-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(232,130,12,0.12), rgba(245,164,66,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-detail strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .kontakt-detail a {
      color: var(--dark);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .kontakt-detail a:hover {
      color: var(--primary);
    }

    .kontakt-detail p {
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
    }

    .mapa-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .mapa-inner {
      flex: 1;
      background: linear-gradient(135deg, #e8f4f8 0%, #d4e9f7 50%, #c8e0f0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
      min-height: 280px;
      position: relative;
      overflow: hidden;
    }
