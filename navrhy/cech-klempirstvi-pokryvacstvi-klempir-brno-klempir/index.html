<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ČECH KLEMPÍŘSTVÍ-POKRÝVAČSTVÍ | Klempíř Brno</title>
  <meta name="description" content="Profesionální klempíř v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte +420602791492">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2c3e50;
      --text-light: #5d6d7e;
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --bg-section: #f1f3f5;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      line-height: 1.2;
    }

    .logo-main {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #b0bec5;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-cta-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-cta-nav:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #8b0000 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(192,57,43,0.22) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(230,126,34,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.18);
      border: 1px solid rgba(192,57,43,0.4);
      color: #ff8a80;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(30px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: #b0c4de;
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: clamp(24px, 5vw, 64px);
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #78909c;
      font-weight: 500;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.1);
      align-self: stretch;
    }

    /* ===== SECTION COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 16px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 18px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      padding: 80px 20px;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--bg-light);
      border-radius: var(--radius);
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: linear-gradient(135deg, rgba(192,57,43,0.06), rgba(230,126,34,0.06));
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 80px 20px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(192,57,43,0.25);
      color: #ff8a80;
    }

    #reference .section-header p {
      color: #78909c;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.3s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      transform: translateY(-4px);
      border-color: rgba(192,57,43,0.3);
    }

    .review-stars {
      color: #ffd700;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      color: #cfd8dc;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: #78909c;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px;
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: all 0.25s;
    }

    .contact-item:hover {
      box-shadow: var(--shadow-hover);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .contact-item-text strong {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: var(--radius);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--white);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.04) 39px,
        rgba(255,255,255,0.04) 40px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        rgba(255,255,255,0.04) 39px,
        rgba(255,255,255,0.04) 40px
      );
    }

    .map-pin {
      font-size: 48px;
      position: relative;
      z-index: 1;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-text {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .map-text strong {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .map-text span {
      font-size: 13px;
      color: #78909c;
    }

    /* ===== CTA BANNER ===== */
    .cta-section {
      padding: 72px 20px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '🔩';
      position: absolute;
      font-size: 180px;
      opacity: 0.07;
      top: -20px;
      left: -20px;
      transform: rotate(-20deg);
    }

    .cta-section::after {
      content: '🏠';
      position: absolute;
      font-size: 160px;
      opacity: 0.07;
      bottom: -20px;
      right: -20px;
      transform: rotate(15deg);
    }

    .cta-section h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 900;
      color: var(--white);
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .cta-section p {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      color: var(--primary);
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 700;
