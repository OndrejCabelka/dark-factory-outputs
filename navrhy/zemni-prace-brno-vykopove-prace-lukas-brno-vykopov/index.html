<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zemní práce Brno | Výkopové práce Lukas Brno</title>
<meta name="description" content="Profesionální výkopové a zemní práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Zavolejte +420725908878.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E67E00;
  --primary-dark: #C06800;
  --primary-light: #FF9A2E;
  --dark: #1A1A1A;
  --dark2: #242424;
  --dark3: #2E2E2E;
  --text: #1A1A1A;
  --text-light: #555555;
  --white: #ffffff;
  --bg-light: #F8F5F0;
  --bg-card: #ffffff;
  --border: #E8E0D5;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(230,126,0,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,26,26,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(230,126,0,0.2);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-main {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-main span {
  color: var(--primary);
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 15px;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.nav-cta:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

.nav-cta .icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  background: linear-gradient(135deg, #1A1208 0%, #2C1F00 40%, #3D2B00 70%, #1A1208 100%);
  min-height: 92vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(230,126,0,0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(230,126,0,0.08) 0%, transparent 40%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(230,126,0,0.03) 40px,
      rgba(230,126,0,0.03) 41px
    );
  pointer-events: none;
}

.hero-excavator {
  position: absolute;
  right: -40px;
  bottom: 0;
  font-size: 320px;
  opacity: 0.04;
  pointer-events: none;
  line-height: 1;
  user-select: none;
}

.hero-content {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,126,0,0.15);
  border: 1px solid rgba(230,126,0,0.3);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

#hero h1 {
  font-size: clamp(30px, 5vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 580px;
  margin-bottom: 36px;
  line-height: 1.6;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(230,126,0,0.4);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(230,126,0,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 28px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  margin-top: 4px;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(230,126,0,0.1);
  color: var(--primary-dark);
  padding: 5px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(230,126,0,0.2);
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 96px 20px;
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(230,126,0,0.3);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(230,126,0,0.12), rgba(230,126,0,0.05));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  border: 1.5px solid rgba(230,126,0,0.15);
  transition: all 0.3s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(230,126,0,0.2), rgba(230,126,0,0.1));
  transform: scale(1.05);
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 96px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 10% 50%, rgba(230,126,0,0.08) 0%, transparent 50%),
    radial-gradient(circle at 90% 50%, rgba(230,126,0,0.05) 0%, transparent 50%);
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  top: -1px;
  left: 24px;
  right: 24px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(230,126,0,0.3);
  transform: translateY(-4px);
}

.benefit-card:hover::after {
  opacity: 1;
}

.benefit-number {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.benefit-icon {
  font-size: 38px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 21px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-text {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 20px;
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(230,126,0,0.2);
}

.review-stars {
  color: var(--primary);
  font-size: 18px;
  letter-spacing: 2px;
}

.review-quote {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.75;
  font-style: italic;
  position: relative;
  padding-left: 16px;
  border-left: 3px solid var(--primary);
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: auto;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.review-location {
  font-size: 13px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 96px 20px;
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  max-width: 1200px;
  margin: 0 auto;
}

@media (min-width: 900px) {
  .kontakt-grid {
    grid-template-columns: 1fr 1fr;
    align-items: start;
  }
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  background: var(--bg-light);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  transition: all 0.25s;
}

.kontakt-item:hover {
  border-color: rgba(230,126,0,0.3);
  box-shadow: 0 4px 20px rgba(230,126,0,0.08);
}

.kontakt-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-item-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-dark);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.kontakt-item-value {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.kontakt-item-value a {
  color: var(--primary-dark);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-item-value a:hover {
  color: var(--primary);
}

.kontakt-item-sub {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 3px;
}

.map-placeholder {
  background: var(--bg-light);
  border-radius: var(--radius-lg);
  border: 2px dashed var(--border);
  height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text-light);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(230,126,0,0.05) 30px, rgba(230,126,0,0.05) 31px),
    repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(230,126,0,0.05) 30px, rgba(230,126,0,0.05) 31px);
}

.map-icon {
  font-size: 52px;
  position: relative;
}

.map-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-light);
  position: relative;
}

.map-sub {
  font-size: 13px;
  color: rgba(100,100,100,0.7);
  position: relative;
}

.cta-banner {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: flex-start;
}

@media (min-width: 600px) {
  .cta-banner {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
}

.cta-banner-text h3 {
  font-size: 22px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
}

.cta-banner-text p {
  font-size: 15px;
  color: rgba(255,255,255,0.8);
}

.cta-banner-btn {
  display: inline-flex;
