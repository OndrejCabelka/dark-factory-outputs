<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EURO VÝTAHY SERVIS – Servis a opravy výtahů Praha</title>
  <meta name="description" content="Profesionální servis výtahů v Praze a okolí. Rychlý zásah, kvalita garantována, přijatelné ceny. Volejte +420601587669">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a56db;
      --primary-dark: #1241a8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --light: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --white: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text .brand-main {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .logo-text .brand-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-nav:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .logo-text .brand-main {
        font-size: 13px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a6e 40%, #1a56db 100%);
      position: relative;
      overflow: hidden;
      padding: 100px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 80%, rgba(245,158,11,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,158,11,0.2);
      border: 1px solid rgba(245,158,11,0.4);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: 17px;
      color: rgba(255,255,255,0.78);
      margin-bottom: 36px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--dark);
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.4);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,158,11,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 26px;
      font-weight: 900;
      color: var(--white);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .hero-card-float {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      width: 100%;
      max-width: 360px;
    }

    .hero-card-icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(59,130,246,0.5));
    }

    .hero-card-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
    }

    .hero-card-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hero-card-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    .hero-card-list li span.check {
      width: 20px;
      height: 20px;
      background: rgba(34,197,94,0.2);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }

    .float-badge {
      position: absolute;
      background: var(--white);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .float-badge-1 {
      top: -20px;
      right: -20px;
    }

    .float-badge-2 {
      bottom: -20px;
      left: -20px;
    }

    .float-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }

      .hero-cta {
        justify-content: center;
      }

      .hero-stats {
        justify-content: center;
      }

      .hero-visual {
        order: -1;
      }

      .float-badge-1, .float-badge-2 {
        display: none;
      }
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,86,219,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-sub {
      margin: 0 auto;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(26,86,219,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .service-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .why-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .why-icon-wrap {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(26,86,219,0.3);
    }

    .why-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .why-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .why-highlight {
      display: inline-block;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a6e 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(245,158,11,0.2);
      color: var(--accent);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.11);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .review-stars span {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #3b82f6, #1a56db); }
    .avatar-2 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .avatar-3 { background: linear-gradient(135deg, #f59e0b, #d97706); }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-role {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      padding: 20px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-
