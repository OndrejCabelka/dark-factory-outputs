<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Martin Ebert Liberec | Výroba nábytku na míru</title>
  <meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky, vestavěné skříně, dřevěné podlahy, schody, dveře a okna na míru.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C4875A;
      --accent: #D4A853;
      --accent-light: #F0C87A;
      --dark: #1A1208;
      --dark-2: #2C1F0E;
      --dark-3: #3D2B16;
      --text: #F5EDE3;
      --text-muted: #B8A090;
      --white: #FFFFFF;
      --light-bg: #FAF6F1;
      --card-bg: #FFFFFF;
      --border: #E8D5C0;
      --shadow: 0 4px 24px rgba(139,94,60,0.12);
      --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #2C1F0E;
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid var(--dark-3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(139,94,60,0.4);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(139,94,60,0.5);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(160deg, #1A1208 0%, #2C1F0E 40%, #3D2B16 70%, #4A3020 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      min-height: 85vh;
      display: flex;
      align-items: center;
    }

    .hero-wood-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 80px,
          rgba(139,94,60,0.04) 80px,
          rgba(139,94,60,0.04) 81px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 120px,
          rgba(212,168,83,0.03) 120px,
          rgba(212,168,83,0.03) 121px
        );
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139,94,60,0.25) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    .hero-glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212,168,83,0.15) 0%, transparent 70%);
      bottom: -100px;
      left: -50px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--accent-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1.7;
      font-weight: 400;
      max-width: 480px;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 28px rgba(139,94,60,0.45);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(139,94,60,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(212,168,83,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      padding-top: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      transform: rotate(-3deg);
    }

    .hero-mini-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .hero-mini-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
    }

    .hero-mini-card:nth-child(2) {
      margin-top: 24px;
    }

    .hero-mini-card:nth-child(4) {
      margin-top: 24px;
    }

    .mini-icon {
      font-size: 28px;
    }

    .mini-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }

    .mini-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ===== SECTION HEADERS ===== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(139,94,60,0.1);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark-2);
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: #7A6050;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 100px 20px;
      background: var(--light-bg);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(139,94,60,0.1), rgba(212,168,83,0.15));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.08) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark-2);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: #7A6050;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .service-features {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #5A4030;
      font-weight: 500;
    }

    .feature-check {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      flex-shrink: 0;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 100px 20px;
      background: var(--dark-2);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '🪵';
      position: absolute;
      font-size: 300px;
      opacity: 0.04;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-tag {
      background: rgba(212,168,83,0.15);
      color: var(--accent-light);
    }

    #proc-my .section-desc {
      color: var(--text-muted);
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: all 0.35s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(212,168,83,0.25);
      transform: translateY(-6px);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-icon-lg {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.75;
    }

    /* ===== REVIEWS ===== */
    #reference {
      padding: 100px 20px;
      background: var(--light-bg);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 28px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 80px;
      color: rgba(139,94,60,0.1);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .review-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .stars {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: #5A4030;
      line-height: 1.8;
      margin-bottom: 24px;
      font-style: italic;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .reviewer-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .reviewer-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .reviewer-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--dark-2);
    }

    .reviewer-detail {
      font-size: 13px;
      color: #9A7A60;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      padding: 100px 20
