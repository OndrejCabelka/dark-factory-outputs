<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAP – Klempířské a pokrývačské práce Opava</title>
<meta name="description" content="Profesionální pokrývač v Opavě a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte +420 724 054 630.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c0392b;
  --primary-dark: #96281b;
  --primary-light: #e74c3c;
  --accent: #e67e22;
  --dark: #1a1a1a;
  --dark2: #2c2c2c;
  --dark3: #3d3d3d;
  --light: #f8f8f8;
  --white: #ffffff;
  --text: #333333;
  --text-muted: #666666;
  --border: #e0e0e0;
  --shadow: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
  --radius: 12px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===================== BANNER ===================== */
#proposal-banner a {
  text-decoration: underline;
  margin: 0 4px;
}

/* ===================== HEADER ===================== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--dark);
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: #aaaaaa;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

nav a.nav-link {
  color: #cccccc;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  white-space: nowrap;
}

nav a.nav-link:hover {
  color: var(--white);
  background: rgba(255,255,255,0.08);
}

.btn-header {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 50px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 4px 14px rgba(192,57,43,0.40);
  flex-shrink: 0;
}

.btn-header:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(192,57,43,0.55);
  opacity: 0.95;
}

/* ===================== HERO ===================== */
#hero {
  background: linear-gradient(135deg, #1a0a0a 0%, #2d0f0f 30%, #1a1a2e 70%, #0f0f1a 100%);
  position: relative;
  overflow: hidden;
  padding: 90px 20px 80px;
  min-height: 90vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(192,57,43,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 20% 70%, rgba(230,126,34,0.10) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(192,57,43,0.12) 0%, transparent 65%);
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(192,57,43,0.20);
  border: 1px solid rgba(192,57,43,0.40);
  color: #ff8a7a;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(30px, 4.5vw, 54px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 22px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: #c0c0c0;
  margin-bottom: 36px;
  line-height: 1.65;
  max-width: 520px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 30px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(192,57,43,0.45);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(192,57,43,0.60);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.20);
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 15px 30px;
  border-radius: 50px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.40);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-size: 32px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  background: linear-gradient(135deg, #ff8a7a, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-stat-label {
  font-size: 13px;
  color: #888888;
  margin-top: 4px;
  font-weight: 500;
}

.hero-visual {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.hero-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  padding: 22px 24px;
  backdrop-filter: blur(12px);
  transition: transform 0.3s, background 0.3s;
}

.hero-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateX(6px);
}

.hero-card-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.hero-card-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.hero-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 3px;
}

.hero-card-desc {
  font-size: 13px;
  color: #999999;
}

/* ===================== SECTION COMMON ===================== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-block;
  background: rgba(192,57,43,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 16px;
  border: 1px solid rgba(192,57,43,0.20);
}

.section-title {
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

section {
  padding: 90px 0;
}

/* ===================== SLUZBY ===================== */
#sluzby {
  background: var(--light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(192,57,43,0.20);
}

.sluzba-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 24px;
  transition: transform 0.3s;
}

.sluzba-card:hover .sluzba-icon {
  transform: scale(1.08);
}

.sluzba-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.sluzba-desc {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

.sluzba-more {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 20px;
  transition: gap 0.2s;
}

.sluzba-more:hover {
  gap: 10px;
}

/* ===================== PROC MY ===================== */
#proc-my {
  background: var(--white);
}

.proc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.proc-item {
  display: flex;
  gap: 22px;
  padding: 32px;
  background: var(--light);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
}

.proc-item:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.proc-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  box-shadow: 0 6px 20px rgba(192,57,43,0.30);
}

.proc-content {}

.proc-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.proc-desc {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ===================== CTA BAND ===================== */
#cta-band {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary), #c0392b);
  padding: 70px 0;
}

.cta-band-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  padding: 0 20px;
}

.cta-band-title {
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1.2;
}

.cta-band-sub {
  font-size: 17px;
  color: rgba(255,255,255,0.82);
  margin-bottom: 36px;
  line-height: 1.6;
}

.cta-band-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-white {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--white);
  color: var(--primary);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 32px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15);
}

.btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.25);
}

.btn-outline-white {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  border: 2px solid rgba(255,255,255,0.60);
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 15px 32px;
  border-radius: 50px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-outline-white:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.90);
  transform: translateY(-2px);
}

/* ===================== REFERENCE ===================== */
#reference {
  background: var(--light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 48px;
  line-height: 0.8;
  color: var(--primary);
  opacity: 0.25;
  font-family: Georgia, serif;
  margin-bottom: 16px;
  display: block;
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.star {
  color: #f39c12;
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.70;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-weight: 700;
  font-size: 17px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size:
