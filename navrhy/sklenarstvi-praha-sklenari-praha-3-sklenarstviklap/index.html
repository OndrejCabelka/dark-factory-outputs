<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklenářství Praha – Sklenáři Praha 3 | sklenarstviklapka.cz</title>
  <meta name="description" content="Profesionální sklenářství v Praze. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte 777 046 421.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-light: #e0f2fe;
      --accent: #38bdf8;
      --dark: #0f172a;
      --dark2: #1e293b;
      --dark3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-light: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(14,165,233,0.10);
      --shadow-hover: 0 8px 32px rgba(14,165,233,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text strong {
      font-size: 15px;
      font-weight: 800;
      color: var(--dark);
      white-space: nowrap;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      box-shadow: 0 4px 14px rgba(14,165,233,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), #0369a1);
      box-shadow: 0 6px 20px rgba(14,165,233,0.4);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-1px);
    }

    .btn-white {
      background: var(--white);
      color: var(--primary-dark);
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .btn-white:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn-white-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.7);
    }

    .btn-white-outline:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--white);
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-text span {
        display: none;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0f172a 0%, #0c2340 40%, #0a3a5c 70%, #0284c7 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -5%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(14,165,233,0.2);
      border: 1px solid rgba(14,165,233,0.4);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.8);
      max-width: 620px;
      margin: 0 auto 40px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-buttons .btn {
      padding: 14px 28px;
      font-size: 15px;
      border-radius: 12px;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat span {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .section-sub {
      font-size: 16px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--gray-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary-light), #bae6fd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      border-radius: 16px;
      padding: 36px 30px;
      border: 1px solid #bae6fd;
      transition: all 0.3s ease;
      position: relative;
    }

    .benefit-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      color: rgba(14,165,233,0.15);
      line-height: 1;
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: 'Inter', sans-serif;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-karta h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-karta p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(14,165,233,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(14,165,233,0.2);
      color: var(--accent);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: rgba(255,255,255,0.6);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      border-radius: 16px;
      padding: 32px 28px;
      transition: all 0.3s ease;
      position: relative;
    }

    .recenze-karta:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(14,165,233,0.15);
    }

    .recenze-quote {
      font-size: 40px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .autor-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .autor-info span {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    .hvezdy {
      color: #f59e0b;
      font-size: 14px;
      margin-bottom: 6px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .kontakt-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary-light), #bae6fd);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .kontakt-item-text a {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var(--primary);
    }

    .kontakt-item-text p {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px solid var(--border);
      position: relative;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(14,165,233,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .mapa-pin {
      font-size: 48px;
      position: relative;
      z-index: 2;
      animation: pulse-pin 2s ease-in-out infinite;
    }

    @keyframes pulse-pin {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .mapa-placeholder p {
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      font-size: 16px;
      position: relative;
      z-index: 2;
    }

    .mapa-placeholder small {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      position: relative;
      z-index: 2;
    }

    .mapa-placeholder a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 2;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .mapa-placeholder a:hover {
      background: var(--primary-dark);
      transform:
