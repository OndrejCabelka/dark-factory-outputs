<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesař Praha – Krovové konstrukce, Altány, Pergoly, Dřevostavby</title>
<meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Zavolejte 723 880 770.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c97b2f;
  --primary-dark: #a05e1a;
  --primary-light: #e8a050;
  --accent: #d4a017;
  --dark: #1a1209;
  --dark-2: #2a1e0e;
  --dark-3: #3a2c18;
  --text: #1a1209;
  --text-light: #6b5a3e;
  --text-muted: #9c8567;
  --white: #ffffff;
  --bg-light: #faf7f2;
  --bg-section: #f5f0e8;
  --border: #e8dcc8;
  --shadow: 0 4px 24px rgba(139, 90, 30, 0.12);
  --shadow-hover: 0 8px 40px rgba(139, 90, 30, 0.22);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 18, 9, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201, 123, 47, 0.2);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 2px 12px rgba(201, 123, 47, 0.35);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(201, 123, 47, 0.5);
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background:
    linear-gradient(160deg, rgba(20, 12, 4, 0.92) 0%, rgba(42, 28, 12, 0.85) 50%, rgba(90, 55, 15, 0.80) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(201, 123, 47, 0.03) 40px,
      rgba(201, 123, 47, 0.03) 80px
    );
  background-color: #1a1005;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201, 123, 47, 0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(212, 160, 23, 0.08) 0%, transparent 60%);
  pointer-events: none;
}

.hero-wood-lines {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 18px,
    rgba(201, 123, 47, 1) 18px,
    rgba(201, 123, 47, 1) 19px
  );
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
  margin: 0 auto;
  padding: 60px 20px 80px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201, 123, 47, 0.15);
  border: 1px solid rgba(201, 123, 47, 0.35);
  color: var(--primary-light);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
}

.hero h1 {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 580px;
  margin: 0 auto 40px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-ctas {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.25s ease;
  box-shadow: 0 4px 24px rgba(201, 123, 47, 0.4);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(201, 123, 47, 0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.07);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 40px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary-light);
  letter-spacing: -1px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}

.hero-scroll {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.35);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.scroll-arrow {
  width: 28px;
  height: 28px;
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(6px); }
}

/* ===== SEKCE OBECNÉ ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 900;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 16px;
}

.section-title em {
  font-style: normal;
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.sluzba-karta:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(201, 123, 47, 0.3);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(201, 123, 47, 0.12), rgba(212, 160, 23, 0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.sluzba-karta:hover .sluzba-icon {
  background: linear-gradient(135deg, rgba(201, 123, 47, 0.2), rgba(212, 160, 23, 0.15));
  transform: scale(1.08);
}

.sluzba-karta h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.sluzba-karta p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.sluzba-tag {
  display: inline-block;
  margin-top: 18px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  background: rgba(201, 123, 47, 0.08);
  padding: 4px 10px;
  border-radius: 50px;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(ellipse 60% 50% at 80% 50%, rgba(201, 123, 47, 0.08) 0%, transparent 70%);
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-label {
  color: var(--primary-light);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 2;
}

.benefit-karta {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201, 123, 47, 0.15);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  transition: all 0.3s ease;
}

.benefit-karta:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(201, 123, 47, 0.3);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(201, 123, 47, 0.2);
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: -2px;
}

.benefit-icon-wrap {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}

.benefit-karta h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-karta p {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg-section);
}

.reference-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.hvezdicky {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
  font-size: 18px;
}

.recenze-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.recenze-text::before {
  content: '"';
  font-size: 48px;
  color: var(--primary);
  opacity: 0.25;
  line-height: 0.5;
  display: block;
  margin-bottom: 8px;
  font-style: normal;
  font-family: Georgia, serif;
}

.recenzent {
  display: flex;
  align-items: center;
  gap: 12px;
}

.recenzent-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.recenzent-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.recenzent-info span {
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }
}

.kontakt-info h3 {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 28px;
  letter-spacing: -0.5px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 28px;
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(201, 123, 47, 0.1), rgba(212, 160, 23, 0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-item-text strong {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-text a {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none
