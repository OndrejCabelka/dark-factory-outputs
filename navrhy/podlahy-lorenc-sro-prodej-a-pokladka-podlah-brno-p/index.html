<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podlahy Lorenc, s.r.o. | Prodej a pokládka podlah | Brno</title>
  <meta name="description" content="Profesionální pokládka a prodej podlah v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420604543547">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-light: #e8a020;
      --primary-dark: #a06808;
      --dark: #1a1208;
      --dark2: #2c1e0a;
      --dark3: #3d2c10;
      --text: #1a1208;
      --text-light: #5c4a2a;
      --white: #ffffff;
      --bg-light: #fdf8f0;
      --bg-card: #fffbf4;
      --border: #e8d9b8;
      --shadow: 0 4px 24px rgba(200,134,10,0.10);
      --shadow-hover: 0 8px 40px rgba(200,134,10,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner a {
      text-decoration: underline;
      margin: 0 4px;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 18, 8, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,134,10,0.25);
      padding: 0 20px;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(200,134,10,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,134,10,0.50);
    }

    .nav-cta-icon {
      font-size: 16px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1a1208 0%, #2c1e0a 40%, #3d2c10 70%, #1a1208 100%);
      position: relative;
      overflow: hidden;
      padding: 100px 20px 90px;
      min-height: 92vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(200,134,10,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 15% 80%, rgba(200,134,10,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.6) 40px,
          rgba(255,255,255,0.6) 41px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.6) 40px,
          rgba(255,255,255,0.6) 41px
        );
      pointer-events: none;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 56px;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,134,10,0.18);
      border: 1px solid rgba(200,134,10,0.40);
      color: var(--primary-light);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      width: fit-content;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 60px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), #f5c842);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 28px rgba(200,134,10,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(200,134,10,0.60);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }

    .hero-visual {
      display: none;
    }

    .hero-visual-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,134,10,0.25);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(8px);
    }

    .floor-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 1;
    }

    .floor-plank {
      border-radius: 2px;
    }

    .floor-plank:nth-child(odd) { background: #8B6340; }
    .floor-plank:nth-child(even) { background: #7A5530; }
    .floor-plank:nth-child(3n) { background: #9C7350; }
    .floor-plank:nth-child(5n) { background: #6B4820; }
    .floor-plank:nth-child(7n) { background: #A8804C; }

    /* ── SECTION COMMON ── */
    section {
      padding: 90px 20px;
    }

    .section-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(200,134,10,0.12);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
      border: 1px solid rgba(200,134,10,0.25);
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: all 0.3s ease;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200,134,10,0.35);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,134,10,0.15), rgba(232,160,32,0.10));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(200,134,10,0.20);
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 22px;
      align-items: flex-start;
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 30px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .benefit-card:hover {
      transform: translateX(6px);
      border-color: rgba(200,134,10,0.35);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(200,134,10,0.35);
    }

    .benefit-content {}

    .benefit-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── REVIEWS ── */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(200,134,10,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(200,134,10,0.18);
      color: var(--primary-light);
      border-color: rgba(200,134,10,0.35);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.60);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,134,10,0.22);
      border-radius: var(--radius);
      padding: 32px;
      transition: all 0.3s ease;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(200,134,10,0.45);
      transform: translateY(-4px);
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.80);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }

    .review-location {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      border-color: rgba(200,134,10,0.35);
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .contact-item-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }

    .contact-item-value a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary);
    }

    .contact-item-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .map-placeholder-inner {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 2px;
      position: absolute;
      inset: 0;
      opacity: 0.08;
    }

    .map-placeholder-inner div {
      background: var(--primary);
    }
