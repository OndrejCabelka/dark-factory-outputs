<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahradník Praha – Profesionální zahradnické služby</title>
<meta name="description" content="Profesionální zahradník v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy a zahradní úpravy.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --green-dark: #1a4a2e;
  --green-primary: #2d7a4f;
  --green-mid: #3a9c63;
  --green-light: #52c47a;
  --green-pale: #e8f5ee;
  --green-accent: #7ed4a0;
  --white: #ffffff;
  --gray-50: #f8faf9;
  --gray-100: #f0f4f2;
  --gray-200: #dce8e1;
  --gray-600: #4a6358;
  --gray-700: #334d42;
  --gray-900: #1a2e24;
  --shadow-sm: 0 2px 8px rgba(26,74,46,0.08);
  --shadow-md: 0 4px 20px rgba(26,74,46,0.12);
  --shadow-lg: 0 8px 40px rgba(26,74,46,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--gray-700);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ===================== BANNER ===================== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===================== HEADER ===================== */
header {
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 900;
  border-bottom: 1px solid var(--gray-200);
  box-shadow: var(--shadow-sm);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-weight: 700;
  font-size: 16px;
  color: var(--green-dark);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  color: var(--green-primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

nav {
  display: flex;
  align-items: center;
  gap: 24px;
}

nav a {
  text-decoration: none;
  color: var(--gray-700);
  font-weight: 500;
  font-size: 14px;
  transition: color 0.2s;
  white-space: nowrap;
}

nav a:hover {
  color: var(--green-primary);
}

.nav-links {
  display: none;
}

.cta-phone {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-mid));
  color: white !important;
  padding: 10px 18px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(45,122,79,0.3);
  white-space: nowrap;
  flex-shrink: 0;
}

.cta-phone:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(45,122,79,0.4);
}

/* ===================== HERO ===================== */
#hero {
  background: linear-gradient(160deg, #0d2b1a 0%, #1a4a2e 30%, #1e5c35 60%, #0f3320 100%);
  min-height: 90vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 60% at 80% 20%, rgba(82,196,122,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 10% 80%, rgba(45,122,79,0.2) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, rgba(13,43,26,0.4));
  pointer-events: none;
}

.hero-leaf {
  position: absolute;
  font-size: 200px;
  opacity: 0.04;
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

.hero-leaf-1 {
  top: -30px;
  right: -40px;
  font-size: 280px;
  transform: rotate(20deg);
}

.hero-leaf-2 {
  bottom: 20px;
  left: -60px;
  font-size: 240px;
  transform: rotate(-15deg);
  opacity: 0.03;
}

.hero-dots {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 30px 30px;
  pointer-events: none;
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(82,196,122,0.15);
  border: 1px solid rgba(82,196,122,0.3);
  color: var(--green-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
  text-transform: uppercase;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--green-light);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--green-light), var(--green-mid));
  color: white;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 30px rgba(82,196,122,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(82,196,122,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  color: white;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(5px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: center;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: var(--green-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
  margin-top: 4px;
}

.hero-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ===================== SECTION SHARED ===================== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  color: var(--green-primary);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--gray-900);
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.section-subtitle {
  font-size: 17px;
  color: var(--gray-600);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

.section-header.centered {
  text-align: center;
}

.section-header.centered .section-subtitle {
  margin: 0 auto;
}

/* ===================== SERVICES ===================== */
#sluzby {
  background: var(--gray-50);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green-primary), var(--green-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: var(--green-accent);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--green-pale), #d0eddb);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.service-card:hover .service-icon {
  transform: scale(1.08) rotate(-3deg);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 15px;
  color: var(--gray-600);
  line-height: 1.65;
}

.service-card .service-tag {
  display: inline-block;
  margin-top: 16px;
  padding: 4px 12px;
  background: var(--green-pale);
  color: var(--green-primary);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

/* ===================== PROC MY ===================== */
#proc-my {
  background: linear-gradient(160deg, var(--green-dark) 0%, #1e5c35 50%, var(--green-dark) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 25px 25px;
  pointer-events: none;
}

#proc-my .section-label {
  color: var(--green-accent);
}

#proc-my .section-title {
  color: white;
}

#proc-my .section-subtitle {
  color: rgba(255,255,255,0.65);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  backdrop-filter: blur(5px);
}

.benefit-card:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(82,196,122,0.35);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 48px;
  font-weight: 800;
  color: rgba(82,196,122,0.2);
  line-height: 1;
  margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: white;
  margin-bottom: 10px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
}

/* ===================== REFERENCE ===================== */
#reference {
  background: var(--gray-50);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.review-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 28px;
  font-size: 80px;
  color: var(--green-pale);
  font-family: Georgia, serif;
  line-height: 1;
  font-weight: 700;
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.star {
  color: #f5a623;
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--gray-700);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
  position: relative;
  z-index: 1;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  flex-shrink: 0;
  color: white;
}

.avatar-green {
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
}

.avatar-teal {
  background: linear-gradient(135deg, #1a7a5e, #2db88a);
}

.avatar-olive {
  background: linear-gradient(135deg, #5a7a2a, #8ab04a);
}

.reviewer-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--gray-900);
}

.reviewer-info span {
  font-size: 13px;
  color: var(--gray-600);
}

.review-verified {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--green-pale);
  color: var(--green-primary);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
}

/* ===================== KONTAKT ===================== */
#kontakt {
  background: white;
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  background: var(--gray-50);
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  border-color: var(--green-accent);
  box-shadow: var(--shadow-sm);
}

.contact-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--green-pale), #d0eddb);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-text strong {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--green-primary);
  margin-bottom: 4px;
}

.contact-item-text a {
  color: var(--gray-900);
  text-decoration: none;
  font-size: 17px;
  font-weight: 600;
  transition: color 0.2s;
}

.contact-item-text a:hover {
  color: var(--green-primary);
}

.contact-item-text p {
