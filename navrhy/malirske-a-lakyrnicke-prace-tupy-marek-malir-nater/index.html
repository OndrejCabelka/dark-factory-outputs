<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malířské a Lakýrnické Práce Tupý Marek – Plzeň</title>
  <meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Zavolejte: +420 377 431 191">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8a020;
      --primary-dark: #c4851a;
      --primary-light: #f5c05a;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #6b7280;
      --white: #ffffff;
      --bg-light: #fdf9f2;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,160,32,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232,160,32,0.15);
      padding: 0 20px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(232,160,32,0.3);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,160,32,0.4);
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,160,32,0.15);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary);
      display: inline;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 19px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(232,160,32,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(232,160,32,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }

    /* ── DIVIDER WAVE ── */
    .wave-divider {
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }

    .wave-divider svg {
      display: block;
      width: 100%;
    }

    /* ── SECTIONS ── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,160,32,0.1);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.35s ease;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .benefit-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.25);
      transform: translateY(-3px);
    }

    .benefit-num {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .benefit-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── REVIEWS ── */
    #reference {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(232,160,32,0.2);
      color: var(--primary-light);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: all 0.35s ease;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(232,160,32,0.25);
      transform: translateY(-4px);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: var(--primary);
      font-style: normal;
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
      font-weight: 800;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
      margin-bottom: 2px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .contact-item:hover {
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,160,32,0.2);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.06));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .map-placeholder-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(232,160,32,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,160,32,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-pin {
      font-size: 48px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      position: relative;
      z-index: 1;
    }

    .map-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 32px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }

    .footer-meta {
      font-size: 13px;
      line-height: 1.7;
    }

    .footer-meta span {
      margin: 0 8px;
      opacity: 0.4;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .logo-text { display
