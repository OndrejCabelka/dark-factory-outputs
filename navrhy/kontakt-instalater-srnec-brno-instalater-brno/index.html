<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instalatér Srnec Brno | Opravy, koupelny, topení, havárie 24/7</title>
<meta name="description" content="Profesionální instalatér v Brně a okolí. Opravy potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420 603 773 119.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #1358a0;
  --primary-light: #2d85e0;
  --accent: #f59e0b;
  --dark: #0d1b2e;
  --dark-mid: #112240;
  --dark-card: #16294a;
  --text-light: #e8f0fe;
  --text-muted: #8eacc9;
  --white: #ffffff;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.13);
  --shadow-hover: 0 8px 36px rgba(26,111,196,0.22);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #f5f8ff;
  color: #1a2a3a;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-nav-tel {
  background: var(--primary);
  color: var(--white) !important;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 700 !important;
  font-size: 14px !important;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.2s, transform 0.15s !important;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-nav-tel:hover {
  background: var(--primary-light) !important;
  transform: translateY(-1px);
  color: var(--white) !important;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0d1b2e 0%, #112240 40%, #1a3a6e 100%);
  position: relative;
  overflow: hidden;
  padding: 90px 20px 80px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(26,111,196,0.18) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -60px;
  width: 360px;
  height: 360px;
  background: radial-gradient(circle, rgba(26,111,196,0.12) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,111,196,0.2);
  border: 1px solid rgba(26,111,196,0.4);
  color: #7eb8ff;
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge span {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  letter-spacing: -1px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

#hero h1 .highlight {
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 18px rgba(26,111,196,0.4);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(26,111,196,0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid rgba(255,255,255,0.2);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, border-color 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
  position: relative;
  z-index: 2;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ===== SECTIONS COMMON ===== */
.section {
  padding: 80px 20px;
}

.section-alt {
  background: var(--white);
}

.section-dark {
  background: var(--dark);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-title {
  text-align: center;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: #0d1b2e;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
  line-height: 1.25;
}

.section-title-white {
  color: var(--white);
}

.section-desc {
  text-align: center;
  color: #5a7a9a;
  max-width: 560px;
  margin: 0 auto 52px;
  font-size: 16px;
  line-height: 1.7;
}

.section-desc-white {
  color: var(--text-muted);
}

/* ===== SLUZBY ===== */
#sluzby {
  background: #f0f5ff;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.22s, box-shadow 0.22s;
  border: 1.5px solid #e8f0fe;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--primary);
  transform: scaleX(0);
  transition: transform 0.22s;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #e8f3ff, #d0e8ff);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: #5a7a9a;
  line-height: 1.65;
}

.service-tag {
  display: inline-block;
  margin-top: 14px;
  background: #e8f3ff;
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.service-tag.urgent {
  background: #fff3e0;
  color: #e67e00;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.benefit-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
  padding: 32px;
  border-radius: var(--radius);
  background: #f8fbff;
  border: 1.5px solid #deeaff;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.benefit-item:hover {
  border-color: var(--primary);
  box-shadow: 0 6px 24px rgba(26,111,196,0.12);
}

.benefit-num {
  width: 50px;
  height: 50px;
  background: var(--primary);
  color: var(--white);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  flex-shrink: 0;
}

.benefit-content h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
}

.benefit-content p {
  font-size: 14px;
  color: #5a7a9a;
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, #0d1b2e 0%, #112240 100%);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: var(--text-muted);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: background 0.22s, transform 0.22s;
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-4px);
}

.review-stars {
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: #b8d0f0;
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--white);
  font-size: 16px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.review-location {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: #f0f5ff;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid #deeaff;
  transition: box-shadow 0.2s;
}

.kontakt-item:hover {
  box-shadow: 0 4px 18px rgba(26,111,196,0.1);
}

.kontakt-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.kontakt-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
}

.kontakt-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-value a:hover {
  color: var(--primary-light);
}

.kontakt-note {
  font-size: 12px;
  color: #5a7a9a;
  margin-top: 2px;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid #deeaff;
  overflow: hidden;
  height: 100%;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: #5a7a9a;
}

.map-placeholder-inner {
  width: 100%;
  height: 100%;
  min-height: 340px;
  background: linear-gradient(135deg, #e8f3ff 0%, #d0e8ff 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
}

.map-placeholder-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 30px, rgba(26,111,196,0.05) 30px, rgba(26,111,196,0.05) 31px
  ), repeating-linear-gradient(
    90deg, transparent, transparent 30px, rgba(26,111,196,0.05) 30px, rgba(26,111,196,0.05) 31px
  );
}

.map-pin {
  width: 56px;
  height: 56px;
  background: var(--primary);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 4px 16px rgba(26,111,196,0.4);
  position: relative;
}

.map-pin::after {
  content: '';
  width: 24px;
  height: 24px;
  background: var(--white);
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.map-text {
  font-weight: 700;
  color: var(--primary);
  font-size: 15px;
  position: relative;
  z-index: 1;
}

.map-text-sub {
  font-size: 13px;
  color: #5a7a9a;
  position: relative;
  z-index: 1;
}

/* URGENCY BAR */
.urgency-bar {
  background: linear-gradient(135deg, var(--primary
