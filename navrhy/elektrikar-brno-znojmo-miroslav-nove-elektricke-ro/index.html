<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář Brno, Znojmo, Miroslav | Nové elektrické rozvody</title>
  <meta name="description" content="Profesionální elektrikář v Brně a okolí. Elektroinstalace, revize, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420774321190">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5A800;
      --primary-dark: #D48F00;
      --primary-light: #FFD060;
      --dark: #0D0F14;
      --dark2: #161A23;
      --dark3: #1E2330;
      --text: #E8EAF0;
      --text-muted: #9AA0B4;
      --white: #FFFFFF;
      --card-bg: #1A1F2E;
      --border: rgba(245,168,0,0.15);
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13,15,20,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(245,168,0,0.35);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-cta-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(245,168,0,0.4);
    }

    .btn-cta-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(245,168,0,0.55);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #080A10 0%, #0D1020 40%, #141830 70%, #0A0C16 100%);
    }

    .hero-bg-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(245,168,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      right: -5%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(245,168,0,0.07) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-lightning {
      position: absolute;
      top: 0;
      right: 0;
      width: 45%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.08;
      font-size: clamp(200px, 25vw, 380px);
      line-height: 1;
      user-select: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--white);
      margin-bottom: 22px;
      max-width: 750px;
    }

    .hero-content h1 span {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,168,0,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,168,0,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 30px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,168,0,0.08);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── SEKCE OBECNĚ ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 52px;
      line-height: 1.7;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 520px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      border-color: rgba(245,168,0,0.45);
      box-shadow: 0 12px 40px rgba(245,168,0,0.12);
    }

    .service-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(245,168,0,0.18), rgba(245,168,0,0.06));
      border: 1px solid rgba(245,168,0,0.25);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .service-card h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
      flex: 1;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 4px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .benefit-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(245,168,0,0.12);
      line-height: 1;
      position: absolute;
      top: 20px;
      right: 24px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 32px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      border-color: rgba(245,168,0,0.3);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
      flex: 1;
    }

    .review-text::before {
      content: '"';
      color: var(--primary);
      font-size: 32px;
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
      font-style: normal;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--dark);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }

    @media (min-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: border-color 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(245,168,0,0.35);
    }

    .contact-item-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value:hover {
      color: var(--primary);
    }

    .contact-map {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .map-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,168,0,0.04) 39px, rgba(245,168,0,0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,168,0,0.04) 39px, rgba(245,168,0,0.04) 40px);
    }

    .map-icon {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .map-sub {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .map-btn {
      display: inline-flex;
      align-items:
