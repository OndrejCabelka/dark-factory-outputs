<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akva - Fiting HK | Instalatér Hradec Králové</title>
  <meta name="description" content="Profesionální instalatérské služby v Hradci Králové a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420 777 742 438.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fb5;
      --primary-dark: #0d4f8a;
      --primary-light: #2d8fd4;
      --accent: #f0a500;
      --accent-dark: #d4900a;
      --dark: #0d1b2e;
      --dark-2: #162033;
      --dark-3: #1e2d42;
      --text: #2c3e50;
      --text-light: #6b7c93;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-section: #eef4fb;
      --border: #d0e0ef;
      --shadow: 0 4px 24px rgba(26,111,181,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,181,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .logo-sub {
      color: var(--primary-light);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-nav-call {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav-call:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(26,111,181,0.4) !important;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0d2244 40%, #0d3a6e 70%, #1a5499 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 100px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,181,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(45,143,212,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(26,111,181,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(45,143,212,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,111,181,0.25);
      border: 1px solid rgba(45,143,212,0.4);
      color: #7ec8f0;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }

    #hero h1 {
      color: var(--white);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      color: rgba(255,255,255,0.75);
      font-size: clamp(16px, 2.5vw, 20px);
      max-width: 600px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,111,181,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26,111,181,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      display: block;
      color: var(--white);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-number span {
      color: var(--accent);
    }

    .stat-label {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
    }

    .hero-divider {
      width: 2px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,111,181,0.1);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 16px;
      line-height: 1.25;
      letter-spacing: -0.3px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 17px;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,181,0.25);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(26,111,181,0.12), rgba(45,143,212,0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .service-badge {
      display: inline-block;
      margin-top: 18px;
      background: rgba(26,111,181,0.08);
      color: var(--primary);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .service-badge.urgent {
      background: rgba(220,38,38,0.08);
      color: #dc2626;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .why-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .why-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .why-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .why-content h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .why-content p {
      color: var(--text-light);
      font-size: 14.5px;
      line-height: 1.65;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, #0d1b2e 0%, #0d2244 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(26,111,181,0.2) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(26,111,181,0.25);
      color: #7ec8f0;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }

    .review-stars {
      color: var(--accent);
      font-size: 20px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    .review-text {
      color: rgba(255,255,255,0.82);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      color: var(--primary-light);
      font-size: 40px;
      line-height: 1;
      display: block;
      margin-bottom: 6px;
      font-style: normal;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .author-info span {
      display: block;
    }

    .author-name {
      color: var(--white);
      font-weight: 700;
      font-size: 15px;
    }

    .author-location {
      color: rgba(255,255,255,0.45);
      font-size: 12.5px;
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .contact-item-text a,
    .contact-item-text p {
      font-size: 16px;
      color: var(--dark);
      font-weight: 600;
    }

    .contact-item-text a {
      color: var(--primary);
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text p.sub {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 400;
      margin-top: 2px;
    }

    .contact-cta-box {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      margin-top: 4px;
    }

    .contact-cta-box h4 {
      color: var(--white);
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .contact-cta-box p {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
