<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Zoubek – Zednické práce Olomouc</title>
  <meta name="description" content="Profesionální zednické práce v Olomouci a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte +420733216844.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #D97706;
      --primary-dark: #B45309;
      --primary-light: #FCD34D;
      --dark: #1C1A17;
      --dark-2: #27231C;
      --dark-3: #3A3328;
      --text: #1C1A17;
      --text-light: #6B6355;
      --white: #FFFFFF;
      --bg-light: #FAFAF7;
      --bg-card: #FFFFFF;
      --border: #E8E0D0;
      --shadow: 0 4px 24px rgba(28,26,23,0.10);
      --shadow-hover: 0 8px 36px rgba(217,119,6,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-light);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: scale(1.03);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1C1A17 0%, #2E2519 40%, #3A2D18 70%, #1C1A17 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(217,119,6,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(217,119,6,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(217,119,6,0.15);
      border: 1px solid rgba(217,119,6,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(30px, 6vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.13;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: #BDB0A0;
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(217,119,6,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(217,119,6,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(217,119,6,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .hero-stat-label {
      display: block;
      font-size: 12px;
      color: #9A8E80;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SEKCE OBECNĚ ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(217,119,6,0.10);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1.18;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.6;
    }

    .section-head {
      margin-bottom: 50px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 26px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary);
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(217,119,6,0.12), rgba(217,119,6,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1.5px solid rgba(217,119,6,0.15);
    }

    .sluzba-card h3 {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 16px;
      background: rgba(217,119,6,0.08);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--dark);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #9A8E80;
    }

    #proc-my .section-label {
      background: rgba(217,119,6,0.18);
      color: var(--primary-light);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 50px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(217,119,6,0.07);
      border-color: rgba(217,119,6,0.35);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 48px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 14px;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.4px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #9A8E80;
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .recenze-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 30px 26px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 15px;
      color: #4A4035;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .recenze-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .recenze-name {
      font-weight: 700;
      color: var(--text);
      font-size: 15px;
    }

    .recenze-location {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: linear-gradient(135deg, #2E2519 0%, #1C1A17 100%);
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: #9A8E80;
    }

    #kontakt .section-label {
      background: rgba(217,119,6,0.18);
      color: var(--primary-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-top: 50px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 22px 20px;
      transition: background 0.2s, border-color 0.2s;
    }

    .kontakt-item:hover {
      background: rgba(217,119,6,0.07);
      border-color: rgba(217,119,6,0.3);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: rgba(217,119,6,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-body {}

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
    }

    .kontakt-item-value a {
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary-light);
    }

    .kontakt-item-sub {
      font-size: 13px;
      color: #7A7060;
      margin-top: 2px;
    }

    .mapa-placeholder {
      background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(217,119,6,0.3);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      gap: 12px;
      color: #6B6355;
    }

    .mapa-placeholder-icon {
      font-size: 48px;
      opacity: 0.7;
    }

    .mapa-placeholder-text {
      font-size: 15px;
      font-weight: 600;
      color: #7A7060;
    }

    .mapa-placeholder-sub {
      font-size: 13px;
      color: #5A5248;
      text-align: center;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark-2);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 30px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .footer-logo-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-copy {
      font-size: 13px;
      color: #5A5248;
      text-align: center;
    }

    .footer-ico {
      font-size: 13px;
      color: #5A5248;
    }

    /* ===== RESPONSIVITA ===== */
    @media (max-width: 768px) {
      .nav-inner {
        height: 60px;
      }

      .logo-sub {
        display: none;
      }

      section {
        padding: 60px 16px;
      }

      #hero {
        padding: 60px 16px 56px;
      }

      .hero-stats {
        gap: 24px;
      }

      .hero-divider {
        display: none;
      }

      .kontakt-grid {
        grid-template-columns: 1fr;
      }

      .mapa-placeholder {
        min-height: 220px;
