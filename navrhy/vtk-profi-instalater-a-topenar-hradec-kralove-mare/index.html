<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTK-profi | Instalatér a topenář Hradec Králové – Marek Dušek</title>
  <meta name="description" content="Profesionální instalatér a topenář v Hradci Králové. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte Marka Duška.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1565C0;
      --primary-light: #1976D2;
      --primary-dark: #0D47A1;
      --accent: #F59E0B;
      --accent-dark: #D97706;
      --dark: #0A1628;
      --dark-2: #112240;
      --dark-3: #1a2f4a;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --white: #ffffff;
      --surface: #f8fafc;
      --surface-2: #f1f5f9;
      --border: #e2e8f0;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --transition: 0.25s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ========== HEADER / NAV ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(21,101,192,0.3);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(21,101,192,0.35);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(21,101,192,0.45);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* ========== HERO ========== */
    #hero {
      position: relative;
      background: linear-gradient(145deg, var(--dark) 0%, var(--dark-2) 40%, #0d3a6e 70%, #1565C0 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(21,101,192,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(245,158,11,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .hero-deco {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(21,101,192,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-deco-2 {
      position: absolute;
      left: -100px;
      bottom: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.35);
      color: var(--accent);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    #hero h1 {
      font-size: clamp(30px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.78);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--dark);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 800;
      font-size: 16px;
      transition: all var(--transition);
      box-shadow: 0 6px 28px rgba(245,158,11,0.4);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(245,158,11,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all var(--transition);
      border: 1.5px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      min-width: 120px;
      padding: 22px 20px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .stat-item:last-child {
      border-right: none;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
      display: block;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* ========== SECTIONS COMMON ========== */
    .section-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: #EFF6FF;
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
      border: 1px solid #BFDBFE;
    }

    .section-title {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ========== SERVICES ========== */
    #sluzby {
      background: var(--surface);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: #BFDBFE;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #EFF6FF, #DBEAFE);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: all var(--transition);
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.05);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: #EFF6FF;
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #BFDBFE;
    }

    .service-tag.urgent {
      background: #FFF7ED;
      color: #C2410C;
      border-color: #FED7AA;
    }

    /* ========== WHY US ========== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--surface) 0%, #EFF6FF 100%);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      border: 1px solid #DBEAFE;
      transition: all var(--transition);
      text-align: center;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(21,101,192,0.12);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(21,101,192,0.3);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ========== REVIEWS ========== */
    #reference {
      background: linear-gradient(135deg, var(--dark-2) 0%, var(--dark-3) 50%, #0d3a6e 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
      background-size: 40px 40px;
    }

    #reference .section-tag {
      background: rgba(245,158,11,0.15);
      color: var(--accent);
      border-color: rgba(245,158,11,0.3);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      backdrop-filter: blur(12px);
      transition: all var(--transition);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.2);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .avatar-blue { background: linear-gradient(135deg, #3B82F6, #1D4ED8); color: white; }
    .avatar-green { background: linear-gradient(135deg, #10B981, #059669); color: white; }
    .avatar-orange { background: linear-gradient(135deg, #F59E0B, #D97706); color: white; }

    .author-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
    }

    .author-info span {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* ========== CONTACT ========== */
    #kontakt {
      background: var(--surface);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 18px;
      transition: all var(--transition);
    }

    .contact-card:hover {
      transform: translateX(6px);
      border-color: #BFDBFE;
      box-shadow: var(--shadow-lg);
    }

    .contact-card-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-
