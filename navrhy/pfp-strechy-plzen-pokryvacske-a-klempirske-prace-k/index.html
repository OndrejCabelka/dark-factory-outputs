<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PFP střechy Plzeň – Pokrývačské a klempířské práce</title>
  <meta name="description" content="Profesionální klempíř a pokrývač v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna a opravy. Volejte +420377420574.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #145a9e;
      --primary-light: #2d8fe8;
      --accent: #e8a020;
      --accent-dark: #c8880a;
      --dark: #0f1923;
      --dark2: #1a2633;
      --dark3: #243347;
      --text: #1e2d3d;
      --text-light: #4a6075;
      --text-muted: #7a90a0;
      --white: #ffffff;
      --bg-light: #f4f8fb;
      --bg-card: #ffffff;
      --border: #dde8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 8px;
      align-items: center;
    }

    .nav-links a {
      color: #b0c4d8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .btn-tel {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 50px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(232,160,32,0.35);
    }

    .btn-tel:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,160,32,0.50);
    }

    .btn-tel .tel-icon {
      font-size: 15px;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 19px;
      }
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(155deg, #0a1520 0%, #0f2035 30%, #0d2a48 60%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 50%, rgba(26,111,196,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 30%, rgba(45,143,232,0.12) 0%, transparent 55%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(26,111,196,0.04));
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        repeating-linear-gradient(45deg, var(--white) 0, var(--white) 1px, transparent 0, transparent 50%);
      background-size: 30px 30px;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(45,143,232,0.3);
      color: #7ec8f5;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 22px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: clamp(28px, 6vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.18;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #8fb8d8;
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.5;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(232,160,32,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(232,160,32,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px 40px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: #6a9abf;
      font-weight: 500;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      align-self: center;
      display: none;
    }

    @media (min-width: 600px) {
      .hero-divider {
        display: block;
      }
    }

    /* ─── SECTION COMMONS ─── */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 50px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 540px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 30px 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #e8f2fc, #c8dff5);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .service-card .service-tag {
      display: inline-block;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: #e8f2fc;
      padding: 4px 10px;
      border-radius: 50px;
    }

    /* FEATURED CARD */
    .service-card.featured {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: transparent;
      color: white;
    }

    .service-card.featured::before {
      opacity: 0;
    }

    .service-card.featured .service-icon {
      background: rgba(255,255,255,0.15);
    }

    .service-card.featured h3 {
      color: white;
    }

    .service-card.featured p {
      color: rgba(255,255,255,0.80);
    }

    .service-card.featured .service-tag {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .service-card.featured:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(26,111,196,0.35);
    }

    /* ─── WHY US ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 680px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      text-align: center;
      padding: 36px 24px;
      border-radius: var(--radius-lg);
      background: var(--bg-light);
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(26,111,196,0.25);
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ─── REFERENCES ─── */
    #reference {
      background: linear-gradient(135deg, #0f1923 0%, #1a2f47 50%, #0f2035 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 80%, rgba(26,111,196,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 90% 20%, rgba(45,143,232,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #reference .section-label {
      color: #7ec8f5;
    }

    #reference .section-title {
      color: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 720px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-lg);
      padding: 28px 26px;
      backdrop-filter: blur(8px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.09);
    }

    .stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: #6a9abf;
    }

    /* ─── CONTACT ─── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 860px) {
      .contact-layout {
        grid-template-columns: 1fr 1.1fr;
        align-items: start;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 22px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      display:
