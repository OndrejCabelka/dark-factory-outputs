<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podlahy Brno | Profesionální pokládka podlah</title>
  <meta name="description" content="Profesionální podlahář v Brně a okolí. Pokládka podlah, rychlý servis, kvalita garantována. Volejte 602 578 657.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c17f3a;
      --primary-dark: #a06527;
      --primary-light: #e8a86a;
      --dark: #1a1209;
      --dark-2: #2c1f0e;
      --dark-3: #3d2e18;
      --text: #1a1209;
      --text-light: #6b5c44;
      --white: #ffffff;
      --bg-light: #faf6f0;
      --bg-warm: #f5ede0;
      --border: #e8d9c4;
      --shadow: 0 4px 24px rgba(193,127,58,0.13);
      --shadow-hover: 0 8px 40px rgba(193,127,58,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ========== HEADER ========== */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 900;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700 !important;
      font-size: 14px !important;
      transition: all 0.2s !important;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(193,127,58,0.35);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(193,127,58,0.45) !important;
      color: var(--white) !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* ========== HERO ========== */
    #hero {
      background:
        linear-gradient(160deg, rgba(26,18,9,0.88) 0%, rgba(44,31,14,0.82) 50%, rgba(160,101,39,0.75) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(193,127,58,0.04) 0px,
          rgba(193,127,58,0.04) 2px,
          transparent 2px,
          transparent 20px
        );
      background-color: var(--dark-2);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 50%, rgba(193,127,58,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(160,101,39,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🔨';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 280px;
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-content {
      color: var(--white);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(193,127,58,0.2);
      border: 1px solid rgba(193,127,58,0.4);
      color: var(--primary-light);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
    }

    .hero-h1 {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      color: var(--white);
    }

    .hero-h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.8);
      margin-bottom: 36px;
      line-height: 1.6;
      font-weight: 400;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(193,127,58,0.45);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(193,127,58,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-top: 4px;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
    }

    .hero-card:hover {
      background: rgba(255,255,255,0.11);
      transform: translateX(-4px);
    }

    .hero-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .hero-card-text h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 3px;
    }

    .hero-card-text p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* ========== SECTIONS COMMON ========== */
    .section {
      padding: 90px 20px;
    }

    .section-bg {
      background: var(--bg-light);
    }

    .section-dark {
      background: var(--dark);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(193,127,58,0.12);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-h2 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.15;
      letter-spacing: -0.8px;
      margin-bottom: 14px;
    }

    .section-h2 span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ========== SLUZBY ========== */
    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sluzba-karta:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(193,127,58,0.3);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(193,127,58,0.15), rgba(193,127,58,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-karta ul {
      list-style: none;
      margin-top: 14px;
    }

    .sluzba-karta ul li {
      font-size: 13px;
      color: var(--text-light);
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sluzba-karta ul li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ========== PROC MY ========== */
    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      margin-bottom: 60px;
    }

    .proc-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      text-align: center;
      position: relative;
    }

    .proc-karta:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }

    .proc-num {
      position: absolute;
      top: -14px;
      left: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    .proc-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .proc-karta h3 {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .proc-karta p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .proc-cta-banner {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      text-align: center;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .proc-cta-banner h3 {
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 800;
      margin-bottom: 4px;
    }

    .proc-cta-banner p {
      font-size: 16px;
      opacity: 0.85;
      max-width: 460px;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary-dark);
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    /* ========== REFERENCE ========== */
    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: all 0.3s;
      position: relative;
    }

    .recenze-karta:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: rgba(193,127,58,0.25);
    }

    .recenze-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 0.8;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      opacity: 0.5;
    }

    .recenze-hvezdy {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .hvezda {
      color: #f59e0b;
      font-size: 18px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .autor-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .autor-info span {
      font-size: 13px
