<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topenáři - Instalatéři Ostrava | Profesionální topenářské práce</title>
  <meta name="description" content="Profesionální topenáři a instalatéři v Ostravě. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420 602 769 225">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fd4;
      --primary-dark: #1255a8;
      --primary-light: #3d8fe8;
      --accent: #f97316;
      --accent-dark: #ea6c0a;
      --dark: #0d1b2e;
      --dark-2: #132338;
      --dark-3: #1c3352;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --shadow: 0 4px 24px rgba(26, 111, 212, 0.10);
      --shadow-lg: 0 8px 40px rgba(26, 111, 212, 0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      transition: all 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(249, 115, 22, 0.5);
    }

    .nav-cta-icon {
      font-size: 18px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 40%, var(--dark-3) 70%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(26, 111, 212, 0.18) 0%, transparent 70%);
      border-radius: 50%;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.10) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 111, 212, 0.2);
      border: 1px solid rgba(26, 111, 212, 0.4);
      color: #93c5fd;
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge::before {
      content: '🏆';
      font-size: 15px;
    }

    #hero h1 {
      font-size: clamp(30px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94a3b8;
      margin-bottom: 44px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-sub strong {
      color: #cbd5e1;
      font-weight: 600;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 17px;
      transition: all 0.2s ease;
      box-shadow: 0 6px 28px rgba(249, 115, 22, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(249, 115, 22, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 17px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    .hero-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      max-width: 620px;
      margin: 0 auto 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26, 111, 212, 0.1);
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--gray-50);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(26, 111, 212, 0.1), rgba(26, 111, 212, 0.05));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: transform 0.3s ease;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 18px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: rgba(26, 111, 212, 0.08);
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26, 111, 212, 0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    #proc-my .section-tag {
      background: rgba(26, 111, 212, 0.2);
      color: #93c5fd;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: #94a3b8;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: all 0.3s ease;
      position: relative;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(26, 111, 212, 0.4);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(26, 111, 212, 0.2);
      line-height: 1;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
    }

    .benefit-highlight {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--gray-50);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      transition: all 0.3s ease;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .review-stars {
      color: #f59e0b;
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      font-style: italic;
      margin-bottom: 24px;
      position: relative;
    }

    .review-text::before {
      content: '"';
      font-size: 60px;
      color: rgba(26, 111, 212, 0.12);
      position: absolute;
      top: -20px;
      left: -10px;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid var(--gray-200);
    }

    .review-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .avatar-2 { background: linear-gradient(135deg, #059669, #047857); }
    .avatar-3 { background: linear-gradient(135deg, #7c3aed, #6d28d9); }

    .review-name {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .review-location {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--white);
    }

    .contact-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .contact-info > p {
      font-size: 16px;
      color: var(--text-light);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 24px;
      background: var(--gray-50);
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      transition: all 0.2s ease;
    }

    .contact-item:hover {
      border-color: var(--primary);
      background: rgba(26, 111, 212, 0.03);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-content {}

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .contact-item-value a:hover {
      color: var(--primary-dark);
    }

    .contact-cta-btn {
