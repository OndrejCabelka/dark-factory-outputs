<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zednictví Lukáš – Profesionální zedník v Přerově</title>
  <meta name="description" content="Zednictví Lukáš – profesionální zednické práce, rekonstrukce bytů, betonářské práce, přístavby a omítky v Přerově a okolí.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8870a;
      --primary-dark: #a06a05;
      --primary-light: #f0a832;
      --dark: #1a1209;
      --dark2: #2b1f0a;
      --text: #2d2010;
      --text-light: #6b5533;
      --white: #ffffff;
      --bg-light: #fdf8f0;
      --bg-card: #ffffff;
      --border: #e8d5b0;
      --shadow: 0 4px 24px rgba(200,135,10,0.10);
      --shadow-hover: 0 8px 36px rgba(200,135,10,0.22);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-light);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 100;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 99;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }

    nav {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      font-size: 26px;
      line-height: 1;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-nav {
      background: var(--primary);
      color: var(--white) !important;
      padding: 9px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      transition: background 0.2s, transform 0.15s !important;
      white-space: nowrap;
    }

    .btn-nav:hover {
      background: var(--primary-dark) !important;
      color: var(--white) !important;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(135deg, rgba(26,18,9,0.93) 0%, rgba(43,31,10,0.88) 60%, rgba(160,106,5,0.72) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(200,135,10,0.04) 0px,
          rgba(200,135,10,0.04) 2px,
          transparent 2px,
          transparent 16px
        );
      background-color: var(--dark);
      min-height: 88vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(200,135,10,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(200,135,10,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,135,10,0.18);
      border: 1px solid rgba(200,135,10,0.40);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      font-size: 16px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.18;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,135,10,0.40);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,135,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.30);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200,135,10,0.12);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== SEKCE OBECNĚ ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1140px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.22;
      letter-spacing: -0.3px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      margin-bottom: 48px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.22s;
    }

    .sluzba-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
      display: block;
      line-height: 1;
    }

    .sluzba-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-desc {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(200,135,10,0.03) 0px,
        rgba(200,135,10,0.03) 1px,
        transparent 1px,
        transparent 20px
      );
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,135,10,0.20);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: background 0.22s, border-color 0.22s, transform 0.22s;
    }

    .benefit-card:hover {
      background: rgba(200,135,10,0.10);
      border-color: rgba(200,135,10,0.50);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 58px;
      height: 58px;
      background: rgba(200,135,10,0.18);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
      border: 1px solid rgba(200,135,10,0.30);
    }

    .benefit-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-desc {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.60);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: #faf4e8;
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 22px;
    }

    .recenze-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      transition: transform 0.22s, box-shadow 0.22s;
      position: relative;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-hvezdy {
      color: var(--primary);
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .recenze-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .recenze-text::before {
      content: '"';
      font-size: 2.5rem;
      color: var(--primary-light);
      opacity: 0.5;
      font-style: normal;
      line-height: 0;
      vertical-align: -20px;
      margin-right: 4px;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .recenze-mesto {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: rgba(200,135,10,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      border: 1px solid rgba(200,135,10,0.20);
    }

    .kontakt-item-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .kontakt-item-value a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, #e8d5a0 0%, #d4b96a 100%);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 40px);
    }

    .mapa-pin {
      font-size: 3rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
      position: relative;
      z-index: 1;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .mapa-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      position: relative;
      z-index: 1;
    }

    .mapa-sub {
      font-size: 0.85rem;
      color: rgba(26,18,9,0.65);
      position: relative;
      z-index: 1;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.55);
      padding: 36px 20px;
    }

    .footer-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .footer-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
