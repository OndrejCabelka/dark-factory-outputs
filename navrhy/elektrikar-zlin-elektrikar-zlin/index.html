<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elektrikář Zlín – Profesionální elektroinstalace a revize</title>
  <meta name="description" content="Profesionální elektrikář ve Zlíně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika. Volejte 777 021 467." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5B800;
      --primary-dark: #D9A200;
      --primary-light: #FFD84D;
      --dark: #0D0D0D;
      --dark-2: #141414;
      --dark-3: #1E1E1E;
      --dark-4: #2A2A2A;
      --text: #F0F0F0;
      --text-muted: #A0A0A0;
      --white: #FFFFFF;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.18);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.28);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── BANNER ─── */
    #proposal-banner a:hover {
      text-decoration: underline;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13,13,13,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,184,0,0.15);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-city {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 0 0 0 rgba(245,184,0,0.4);
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,184,0,0.35);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: radial-gradient(ellipse at 60% 40%, #1a1400 0%, #0D0D0D 60%),
                  linear-gradient(135deg, #0D0D0D 0%, #1a1200 50%, #0D0D0D 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 100px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,184,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,184,0,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,184,0,0.12);
      border: 1px solid rgba(245,184,0,0.3);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 62px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1.5px;
      color: var(--white);
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-sub strong {
      color: var(--text);
      font-weight: 600;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,184,0,0.3);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,184,0,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(245,184,0,0.05);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.15;
    }

    .section-desc {
      margin-top: 14px;
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--dark-2);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      border-color: rgba(245,184,0,0.2);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(245,184,0,0.08);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,184,0,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .sluzba-card:hover .card-icon {
      background: rgba(245,184,0,0.18);
    }

    .card-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .card-link:hover {
      gap: 10px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--dark);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 36px 30px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .benefit-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark-2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 30px 28px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stars {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 22px;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: var(--dark);
      flex-shrink: 0;
    }

    .reviewer-info {
      display: flex;
      flex-direction: column;
    }

    .reviewer-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--white);
    }

    .reviewer-city {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info h3 {
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .contact-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,184,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }

    .contact-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-light);
    }

    .map-placeholder {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }

    .map-placeholder .map-icon {
      font-size: 48px;
      margin-bottom: 6px;
    }

    .map-placeholder strong {
      color: var(--text);
      font-size: 17px;
    }

    .cta-block {
      margin-top: 36px;
      background: linear-gradient(135deg, rgba(245,184,0,0.1), rgba(245,184,0,0.04));
      border: 1px solid rgba(245,184,0,0.2);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }

    .cta-block p {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .cta-block strong {
      color: var(--text);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark-2);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 36px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .footer-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-right {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
    }

    .footer-right a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer-right a:hover {
      text-decoration: underline;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .navbar {
        height: auto;
        padding: 12px 16px;
      }

      .nav-cta {
        font-size: 13px;
        padding: 9px 16px;
      }

      .logo-name {
        font-size: 15px;
      }

      #hero {
        padding: 60px 16px 70px;
      }

      .hero-stats {
        gap: 24px;
      }

      .stat-num {
        font-size: 26px;
      }

      .kontakt-wrap {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .footer-right {
        text-align: left;
      }

      section {
        padding: 60px 16px;
      }
    }

    @media (max-width: 480px) {
      .hero-btns {
        flex-direction: column;
        align-items: center;
      }

      .btn-primary,
      .btn-secondary {
        width:
