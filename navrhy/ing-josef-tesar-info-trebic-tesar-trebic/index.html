<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ing. Josef Tesař – Tesařské práce Třebíč</title>
<meta name="description" content="Profesionální tesař v Třebíči a okolí. Krovové konstrukce, altány, pergoly, dřevostavby. Zavolejte +420 737 542 437.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c47a2b;
  --primary-dark: #a0611a;
  --primary-light: #e8a44a;
  --wood-dark: #3d2008;
  --wood-mid: #6b3a1f;
  --wood-light: #f5e6d3;
  --dark: #1a1208;
  --dark2: #2a1c0e;
  --text: #2d1f0e;
  --text-light: #6b5c4a;
  --white: #ffffff;
  --gray-light: #f9f4ef;
  --gray: #e8ddd0;
  --shadow: 0 4px 24px rgba(61,32,8,0.13);
  --shadow-hover: 0 8px 40px rgba(61,32,8,0.22);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--white);
  border-bottom: 1px solid var(--gray);
  position: sticky;
  top: 0;
  z-index: 900;
  box-shadow: 0 2px 12px rgba(61,32,8,0.08);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--wood-dark);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.25s ease;
  box-shadow: 0 3px 12px rgba(196,122,43,0.35);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  box-shadow: 0 6px 20px rgba(196,122,43,0.45);
  transform: translateY(-1px);
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(160deg, rgba(26,18,8,0.93) 0%, rgba(61,32,8,0.85) 60%, rgba(107,58,31,0.80) 100%),
    repeating-linear-gradient(
      105deg,
      transparent,
      transparent 40px,
      rgba(196,122,43,0.04) 40px,
      rgba(196,122,43,0.04) 80px
    ),
    linear-gradient(180deg, #2a1c0e 0%, #3d2008 100%);
  min-height: 100svh;
  display: flex;
  align-items: center;
  padding: 100px 20px 60px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(196,122,43,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -60px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(196,122,43,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,122,43,0.2);
  border: 1px solid rgba(196,122,43,0.4);
  color: var(--primary-light);
  padding: 7px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
  backdrop-filter: blur(4px);
}

#hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(245,230,211,0.85);
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.25s ease;
  box-shadow: 0 5px 20px rgba(196,122,43,0.5);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(196,122,43,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: all 0.25s ease;
  backdrop-filter: blur(6px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 0;
  justify-content: center;
  flex-wrap: wrap;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 40px;
}

.hero-stat {
  padding: 10px 32px;
  border-right: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}

.hero-stat:last-child {
  border-right: none;
}

.stat-num {
  display: block;
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 12px;
  color: rgba(245,230,211,0.65);
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 54px;
}

.section-tag {
  display: inline-block;
  background: var(--wood-light);
  color: var(--primary-dark);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid var(--gray);
}

.section-header h2 {
  font-size: clamp(1.7rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--wood-dark);
  margin-bottom: 14px;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.section-header p {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 22px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 26px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.service-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-5px);
  border-color: var(--primary-light);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--wood-light), #eedcc6);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid var(--gray);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--wood-dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.9rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  background: var(--gray-light);
  border-radius: var(--radius);
  padding: 28px 24px;
  border: 1px solid var(--gray);
  transition: all 0.3s ease;
}

.benefit-card:hover {
  border-color: var(--primary-light);
  box-shadow: var(--shadow);
  transform: translateY(-3px);
}

.benefit-icon-wrap {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(196,122,43,0.3);
}

.benefit-text h3 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--wood-dark);
  margin-bottom: 7px;
}

.benefit-text p {
  font-size: 0.88rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--dark2);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '„';
  position: absolute;
  top: -20px;
  left: -10px;
  font-size: 300px;
  color: rgba(196,122,43,0.06);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(196,122,43,0.2);
  color: var(--primary-light);
  border-color: rgba(196,122,43,0.3);
}

#reference .section-header p {
  color: rgba(245,230,211,0.65);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 30px 26px;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(196,122,43,0.4);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}

.review-stars {
  color: var(--primary-light);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.92rem;
  color: rgba(245,230,211,0.85);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  color: var(--primary-light);
  font-size: 1.3rem;
  font-style: normal;
}

.review-text::after {
  content: '"';
  color: var(--primary-light);
  font-size: 1.3rem;
  font-style: normal;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 16px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--white);
}

.review-location {
  font-size: 0.78rem;
  color: rgba(245,230,211,0.5);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--gray-light);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: start;
}

.contact-info-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray);
}

.contact-info-box h3 {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--wood-dark);
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--gray);
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--gray-light);
}

.contact-item:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.contact-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--wood-light), #eedcc6);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid var(--gray);
}

.contact-item-text {
  flex: 1;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 1rem;
  font-weight: 600;
  color: var(--wood-dark);
}

.contact-item-value a {
  color: var(--primary-dark);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary);
}

.contact-item-value.address {
  font-weight: 400;
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.55;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray);
}

.map-inner {
  position: relative;
  height: 340px;
  background:
    linear-gradient(135deg, var(--wood-light) 25%, #e8d5bc 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.map-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(196,122,43,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,122,43,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}
