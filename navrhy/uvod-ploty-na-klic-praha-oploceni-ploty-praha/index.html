<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ploty na klíč Praha | Profesionální oplocení</title>
<meta name="description" content="Profesionální montáž plotů v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 723 558 207.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2E7D32;
  --primary-dark: #1B5E20;
  --primary-light: #4CAF50;
  --accent: #FF6F00;
  --accent-light: #FFA000;
  --dark: #1a1a1a;
  --dark2: #2c2c2c;
  --text: #333;
  --text-light: #666;
  --white: #ffffff;
  --bg-light: #f5f9f5;
  --border: #e0e0e0;
  --shadow: 0 4px 20px rgba(0,0,0,0.1);
  --shadow-hover: 0 8px 32px rgba(46,125,50,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── NAVBAR ─── */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--primary-light);
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--primary-dark);
  white-space: nowrap;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--text-light);
  font-weight: 500;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(46,125,50,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(46,125,50,0.45);
}

/* ─── HERO ─── */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background:
    linear-gradient(160deg, rgba(10,30,12,0.92) 0%, rgba(27,94,32,0.88) 50%, rgba(10,30,12,0.95) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(46,125,50,0.07) 0px,
      rgba(46,125,50,0.07) 2px,
      transparent 2px,
      transparent 40px
    );
  background-color: #0a1e0c;
  overflow: hidden;
}

.hero-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.08;
}

.hero-shape-1 {
  width: 600px;
  height: 600px;
  background: var(--primary-light);
  top: -200px;
  right: -200px;
}

.hero-shape-2 {
  width: 400px;
  height: 400px;
  background: var(--accent);
  bottom: -150px;
  left: -100px;
}

.hero-fence {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  display: flex;
  align-items: flex-end;
  opacity: 0.15;
  overflow: hidden;
}

.hero-fence-inner {
  display: flex;
  gap: 6px;
  align-items: flex-end;
  width: 100%;
  padding: 0 20px;
}

.fence-post {
  background: var(--primary-light);
  flex: 1;
  min-width: 12px;
  max-width: 18px;
  height: 70px;
  border-radius: 3px 3px 0 0;
}

.fence-post.tall {
  height: 90px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 120px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(76,175,80,0.2);
  border: 1px solid rgba(76,175,80,0.4);
  color: #a5d6a7;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-badge span {
  width: 8px;
  height: 8px;
  background: var(--primary-light);
  border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 8px var(--primary-light);
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 24px;
  max-width: 760px;
  letter-spacing: -0.5px;
}

#hero h1 em {
  font-style: normal;
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(1rem, 2.2vw, 1.25rem);
  color: rgba(255,255,255,0.78);
  margin-bottom: 40px;
  max-width: 560px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(76,175,80,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(76,175,80,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  display: block;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ─── SECTION BASE ─── */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-block;
  background: rgba(46,125,50,0.1);
  color: var(--primary);
  padding: 5px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(1.7rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.section-header p {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ─── SLUZBY ─── */
#sluzby {
  padding: 96px 0;
  background: var(--white);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(76,175,80,0.3);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(46,125,50,0.12), rgba(76,175,80,0.08));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.2s;
}

.service-card:hover .service-icon {
  transform: scale(1.1);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ─── PROC MY ─── */
#proc-my {
  padding: 96px 0;
  background: linear-gradient(160deg, #0a1e0c 0%, #1B5E20 60%, #0d2610 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    rgba(76,175,80,0.04) 0px,
    rgba(76,175,80,0.04) 1px,
    transparent 1px,
    transparent 36px
  );
}

#proc-my .section-label {
  background: rgba(76,175,80,0.2);
  color: #a5d6a7;
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.65);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 2;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  backdrop-filter: blur(8px);
  transition: background 0.25s, transform 0.25s;
  text-align: center;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-4px);
}

.benefit-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 24px;
  box-shadow: 0 8px 24px rgba(46,125,50,0.4);
}

.benefit-card h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  padding: 96px 0;
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 52px;
  line-height: 1;
  color: var(--primary-light);
  font-family: Georgia, serif;
  margin-bottom: 8px;
  opacity: 0.4;
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.review-stars span {
  color: #FFC107;
  font-size: 16px;
}

.review-text {
  font-size: 0.96rem;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.review-author-info strong {
  display: block;
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--dark);
}

.review-author-info span {
  font-size: 0.82rem;
  color: var(--text-light);
}

/* ─── KONTAKT ─── */
#kontakt {
  padding: 96px 0;
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-box {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 24px;
  transition: box-shadow 0.2s;
}

.contact-box:hover {
  box-shadow: var(--shadow);
}

.contact-box-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-box-content h4 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}

.contact-box-content a {
  color: var(--primary-dark);
  text-decoration: none;
  font-size: 1.15rem;
  font-weight: 700;
  transition: color 0.2s;
  display: block;
}

.contact-box-content a:hover {
  color: var(--primary-light);
}

.contact-box-content p {
  font-size: 1rem;
  color: var(--dark);
  font-weight: 600;
}

.contact-box-content small {
  display: block;
  font-size: 0.83rem;
  color: var(--text-light);
  margin-top: 3px;
}

.map-placeholder {
  background: linear-gradient(160deg, #e8f5e9, #c8e6c9);
  border-radius: var(--radius-lg);
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px dashed rgba(46,125,50,0.25);
  gap: 14px;
  padding: 40px;
  text-align: center;
}

.map-placeholder-icon {
  font-size: 52px;
  opacity: 0.5;
}

.map-placeholder h4 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary-dark);
}

.map-placeholder p {
  font-size: 0.9rem;
  color: var(--text-light);
}

.map-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary);
  color:
