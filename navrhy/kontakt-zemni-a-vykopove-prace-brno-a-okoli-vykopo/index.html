<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zemní a výkopové práce Brno | Kontakt</title>
  <meta name="description" content="Profesionální zemní a výkopové práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 774 322 785.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e67e00;
      --primary-dark: #c46a00;
      --primary-light: #f59e2e;
      --dark: #1a1208;
      --dark-2: #2d2010;
      --dark-3: #3d2e18;
      --text: #1a1208;
      --text-light: #6b5a3e;
      --text-muted: #9c7d52;
      --white: #ffffff;
      --off-white: #fdf8f2;
      --border: #e8d5b7;
      --card-bg: #ffffff;
      --shadow: 0 4px 24px rgba(230, 126, 0, 0.10);
      --shadow-hover: 0 8px 40px rgba(230, 126, 0, 0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--off-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 68px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(230, 126, 0, 0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(230, 126, 0, 0.5);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a1208 0%, #2d1f0a 30%, #3d2c10 60%, #1a1208 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(230, 126, 0, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 46, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 30px,
          rgba(230, 126, 0, 0.03) 30px,
          rgba(230, 126, 0, 0.03) 31px
        );
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(230, 126, 0, 0.15);
      border: 1px solid rgba(230, 126, 0, 0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero-inner h1 {
      font-size: clamp(28px, 5.5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }

    .hero-inner h1 span {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.55;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 25px rgba(230, 126, 0, 0.45);
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(230, 126, 0, 0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: clamp(24px, 5vw, 60px);
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      color: var(--primary-light);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(230, 126, 0, 0.12);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--white);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(230, 126, 0, 0.25);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(230, 126, 0, 0.12), rgba(245, 158, 46, 0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
      border: 1px solid rgba(230, 126, 0, 0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: linear-gradient(135deg, #1a1208 0%, #2d2010 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(230, 126, 0, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-tag {
      background: rgba(230, 126, 0, 0.25);
      color: var(--primary-light);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.60);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: all 0.3s ease;
      position: relative;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(230, 126, 0, 0.3);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 64px;
      font-weight: 900;
      color: rgba(230, 126, 0, 0.15);
      line-height: 1;
      position: absolute;
      top: 20px;
      right: 28px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.60);
      line-height: 1.65;
    }

    .benefit-highlight {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--off-white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 52px;
      color: rgba(230, 126, 0, 0.15);
      line-height: 0.8;
      font-family: Georgia, serif;
      margin-bottom: 16px;
      display: block;
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--primary);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .author-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #e67e00, #f59e2e); }
    .avatar-2 { background: linear-gradient(135deg, #2d7d3a, #4caf50); }
    .avatar-3 { background: linear-gradient(135deg, #1565c0, #42a5f5); }

    .author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .author-info span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 24px;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .kontakt-item:hover {
      border-color: rgba(230, 126, 0, 0.35);
      box-shadow: var(--shadow);
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(230, 126, 0, 0.12), rgba(245, 158, 46, 0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1px solid rgba(230, 126, 0, 0.15);
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .kontakt-item-text span {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
    }

    .kontakt-item-text .phone-num {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #f0e8d5 0%, #e8dcc5 100%);
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 100%;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(230,126,0,0.05) 30px, rgba(230,126,0,0.05) 31px),
