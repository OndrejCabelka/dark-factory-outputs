<!DOCTYPE html>
<html lang="cs">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fba;
      --primary-dark: #155a9a;
      --primary-light: #2d89d8;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark-2: #1a2d42;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --border: #e2eaf4;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;

      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {

      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {

      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);

      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;

      box-shadow: 0 6px 20px rgba(26,111,186,0.5);

    }

    #hero::before {
      content: '';

      top: -60px;
      right: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(26,111,186,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
