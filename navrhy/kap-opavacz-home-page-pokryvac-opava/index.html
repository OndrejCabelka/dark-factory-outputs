<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAP-OPAVA.cz – Profesionální pokrývač v Opavě</title>
  <meta name="description" content="Profesionální pokrývač v Opavě a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte +420724293600.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3d3d3d;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #f8f8f8;
      --bg-section: #f2f2f2;
      --border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 0.7rem;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--white);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .btn-header {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.875rem !important;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-header:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 30%, #1a1a2e 70%, #0f0f1a 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 20px,
          rgba(255,255,255,0.5) 20px,
          rgba(255,255,255,0.5) 22px
        );
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.4);
      color: #f5a9a0;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #bbb;
      max-width: 600px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 2rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      display: block;
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.1);
      align-self: stretch;
    }

    /* ===== SEKCE SPOLEČNÉ ===== */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 14px;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 8px;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      margin-top: 8px;
    }

    .benefit-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 36px 28px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-num {
      font-size: 3rem;
      font-weight: 900;
      color: rgba(192,57,43,0.15);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(192,57,43,0.3);
      color: #f5a9a0;
    }

    #reference .section-desc {
      color: #aaa;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--dark2);
      border-radius: var(--radius);
      padding: 28px;
      border: 1px solid var(--dark3);
      transition: transform 0.25s, border-color 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      border-color: rgba(192,57,43,0.4);
    }

    .review-quote {
      font-size: 2.5rem;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 0.92rem;
      color: #ccc;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .review-stars {
      color: #f1c40f;
      font-size: 0.9rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 0.95rem;
    }

    .review-location {
      font-size: 0.78rem;
      color: #888;
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-section);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .kontakt-item:hover {
      box-shadow: var(--shadow);
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .kontakt-item-content {
      flex: 1;
    }

    .kontakt-item-label {
      font-size: 0.75rem;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
    }

    .kontakt-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary-dark);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .map-inner {
      height: 300px;
      background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #888;
      position: relative;
      overflow: hidden;
    }

    .map-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(200,200,200,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,200,200,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .map-icon {
      font-size: 3rem;
      position: relative;
      z-index: 1;
    }

    .map-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
      position: relative;
      z-index: 1;
    }

    .map-sublabel {
      font-size: 0.85rem;
      color: #888;
      position: relative;
      z-index: 1;
    }

    .map-cta-bar {
      padding: 14px 20px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .map-cta-bar span {
      color: #bbb;
      font-size: 0.85rem;
    }

    .map-cta-btn {
      background: var(--primary);
