<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatérství Hřeben – Liberec | Instalatér 24/7</title>
  <meta name="description" content="Profesionální instalatér v Liberci a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420607634813">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fb5;
      --primary-dark: #0f4f8a;
      --primary-light: #2e8ee0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #112233;
      --text: #1e2a38;
      --text-light: #5a6a7e;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-card: #ffffff;
      --border: #dde6f0;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(26,111,181,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,181,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ── BANNER ── */
    #proposal-banner a:hover {
      text-decoration: underline;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .navbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(26,111,181,0.35);
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,111,181,0.45);
    }

    .nav-cta .phone-icon {
      font-size: 15px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #071524 0%, #0d2540 40%, #0f3460 70%, #1a5a9e 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(26,111,181,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(15,79,138,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🔧';
      position: absolute;
      right: -20px;
      bottom: -30px;
      font-size: 320px;
      opacity: 0.04;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .hero-inner {
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(240,165,0,0.15);
      border: 1px solid rgba(240,165,0,0.35);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.2px;
    }

    .hero-badge span {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      max-width: 720px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      max-width: 540px;
      margin-bottom: 36px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(26,111,181,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(26,111,181,0.55);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.25s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-num em {
      font-style: normal;
      color: var(--accent);
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      font-weight: 400;
    }

    /* ── SECTION COMMON ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(26,111,181,0.1);
      color: var(--primary);
      border: 1px solid rgba(26,111,181,0.2);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 50px;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      cursor: default;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,181,0.25);
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,111,181,0.12), rgba(26,111,181,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      border: 1px solid rgba(26,111,181,0.12);
    }

    .sluzba-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .sluzba-card p {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 14px;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(26,111,181,0.08);
      padding: 3px 10px;
      border-radius: 50px;
      letter-spacing: 0.3px;
    }

    .sluzba-card.featured {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-color: transparent;
      color: white;
    }

    .sluzba-card.featured h3 {
      color: white;
    }

    .sluzba-card.featured p {
      color: rgba(255,255,255,0.8);
    }

    .sluzba-card.featured .sluzba-icon {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.2);
    }

    .sluzba-card.featured .sluzba-tag {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit {
      padding: 34px 30px;
      border-radius: var(--radius);
      background: var(--bg-light);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .benefit:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .benefit-num {
      font-size: 3rem;
      font-weight: 900;
      color: rgba(26,111,181,0.12);
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 2.2rem;
      margin-bottom: 14px;
      display: block;
    }

    .benefit h3 {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .benefit p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      background: linear-gradient(135deg, #0d2540 0%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '"';
      position: absolute;
      right: 5%;
      top: -40px;
      font-size: 300px;
      color: rgba(255,255,255,0.03);
      font-family: Georgia, serif;
      line-height: 1;
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(240,165,0,0.15);
      color: var(--accent);
      border-color: rgba(240,165,0,0.3);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.3s ease;
      backdrop-filter: blur(6px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-4px);
    }

    .review-stars {
      color: var(--accent);
      font-size: 17px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .av1 { background: linear-gradient(135deg, #1a6fb5, #2e8ee0); }
    .av2 { background: linear-gradient(135deg, #0f5c6e, #1a8fa8); }
    .av3 { background: linear-gradient(135deg, #6e2a0f, #b54a1a); }

    .review-info strong {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      color: white;
    }

    .review-info span {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kontakt-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      padding: 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    a.kontakt-card:hover {
      border-color: rgba(26,111,181,0.3);
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-ico {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
    }

    .kontakt-card-body strong {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-card-body span {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .kontakt-card-body p {
      font-size: 0.88rem;
      color: var(--text-light);
      margin-top: 2px;
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e8f0fe, #dde8f5);
      border-radius: var(--radius);
      border: 2px dashed rgba(26,111,181,0.25);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--primary);
    }

    .mapa-placeholder .map-icon {
      font-size: 46px;
      opacity: 0
