<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOMINÍK Brno s.r.o. – Profesionální kominické služby v Brně</title>
  <meta name="description" content="Profesionální kominické služby v Brně a okolí. Čištění komínů, revize, opravy. Rychlý servis, garantovaná kvalita, přijatelné ceny.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3d3d3d;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #f9f6f4;
      --bg-card: #ffffff;
      --border: #e8e0dc;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #aaa;
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s !important;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
    }

    .nav-desktop {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    @media (max-width: 768px) {
      .nav-desktop {
        display: none;
      }
      .logo-sub {
        display: none;
      }
      .logo-name {
        font-size: 15px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a08 0%, #2d1410 30%, #4a1c16 60%, #1a0a08 100%);
      position: relative;
      padding: 90px 20px 80px;
      overflow: hidden;
      min-height: 88vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(192,57,43,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '🏠';
      position: absolute;
      right: -40px;
      bottom: -20px;
      font-size: 320px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.4);
      color: #f8b4a8;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 19px);
      color: #c8bab7;
      margin-bottom: 36px;
      max-width: 500px;
      line-height: 1.65;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 28px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: #9a8a87;
      margin-top: 2px;
    }

    .hero-card-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-info-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: background 0.2s;
    }

    .hero-info-card:hover {
      background: rgba(255,255,255,0.09);
    }

    .hero-info-icon {
      width: 52px;
      height: 52px;
      background: rgba(192,57,43,0.25);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .hero-info-title {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
      margin-bottom: 2px;
    }

    .hero-info-desc {
      color: #9a8a87;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      .hero-card-wrap {
        display: none;
      }
      #hero {
        min-height: auto;
        padding: 70px 20px 60px;
      }
    }

    /* ===== SECTION COMMONS ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.08);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.8px;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.7;
      margin-bottom: 50px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.10));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-card .service-tag {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .benefit-card {
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 36px 32px;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }

    .benefit-num {
      position: absolute;
      top: 28px;
      right: 28px;
      font-size: 52px;
      font-weight: 900;
      color: rgba(192,57,43,0.08);
      line-height: 1;
    }

    .benefit-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(192,57,43,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #999;
    }

    #reference .section-label {
      background: rgba(192,57,43,0.25);
      color: #f8b4a8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: background 0.25s, transform 0.25s;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-4px);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: #f39c12;
      font-size: 17px;
    }

    .review-text {
      color: #ccc;
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 24px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 17px;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-loc {
      font-size: 13px;
      color: #777;
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 26px;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    a.contact-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.15);
      border-color: rgba(192,57,43,0.2);
    }

    .contact-item-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 700;
      color:
