<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obkladač Brno – Jan Adler | Profesionální pokládka obkladů a dlažby</title>
  <meta name="description" content="Profesionální obkladač v Brně a okolí. Pokládka obkladů, dlažby, koupelny na klíč, terasy, epoxidové spárování a hydroizolace. Volejte: +420 776 025 298">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-light: #e8a020;
      --primary-dark: #a06808;
      --dark: #1a1410;
      --dark-2: #231c14;
      --dark-3: #2e2418;
      --text: #f5f0e8;
      --text-muted: #b8a98a;
      --white: #ffffff;
      --card-bg: #f9f6f0;
      --card-border: #ede5d0;
      --section-alt: #faf7f2;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(200,134,10,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #2d2416;
      background: #fff;
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner a:hover {
      text-decoration: underline;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 20, 16, 0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(200,134,10,0.2);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 12px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 9px 18px;
      border-radius: 8px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .header-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .header-cta .icon {
      font-size: 15px;
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(135deg, rgba(26,20,16,0.92) 0%, rgba(45,30,12,0.85) 60%, rgba(160,104,8,0.75) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(200,134,10,0.04) 0px,
          rgba(200,134,10,0.04) 2px,
          transparent 2px,
          transparent 14px
        );
      background-color: #1a1410;
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,134,10,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,134,10,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,134,10,0.15);
      border: 1px solid rgba(200,134,10,0.35);
      color: var(--primary-light);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-inner h1 {
      font-size: clamp(28px, 5.5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-inner h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 30px;
      border-radius: var(--radius);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,134,10,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,134,10,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 13px 28px;
      border-radius: var(--radius);
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200,134,10,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(200,134,10,0.1);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: #1a1410;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 16px;
      color: #6b5a3e;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--section-alt);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200,134,10,0.3);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      font-size: 42px;
      margin-bottom: 16px;
      display: block;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1410;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 14px;
      color: #6b5a3e;
      line-height: 1.65;
    }

    /* ─── WHY US ─── */
    #proc-my {
      background: var(--dark);
      color: var(--text);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: var(--text-muted);
    }

    #proc-my .section-tag {
      background: rgba(200,134,10,0.2);
      color: var(--primary-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: var(--dark-2);
      border: 1px solid rgba(200,134,10,0.15);
      border-radius: var(--radius);
      padding: 36px 28px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
    }

    .benefit-card:hover {
      border-color: rgba(200,134,10,0.45);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 48px;
      font-weight: 800;
      color: rgba(200,134,10,0.2);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 14px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ─── REFERENCES ─── */
    #reference {
      background: var(--section-alt);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--white);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #3d2f1e;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(200,134,10,0.2);
      line-height: 0;
      vertical-align: -14px;
      margin-right: 4px;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #1a1410;
    }

    .reviewer-info span {
      font-size: 12px;
      color: #9a8060;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1410;
      margin-bottom: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 22px;
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: rgba(200,134,10,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9a8060;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .kontakt-item-text a,
    .kontakt-item-text span {
      font-size: 16px;
      color: #1a1410;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #f0e8d8 0%, #e8dcc8 100%);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8a7050;
      font-size: 15px;
      font-weight: 500;
    }

    .map-placeholder .map-icon {
      font-size: 52px;
    }

    .map-placeholder .map-city {
      font-size: 20px;
      font-weight: 700;
      color: #5a3e20;
    }

    .cta-strip {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
      border-radius: var(--radius);
      padding: 36px 32px;
      margin-top: 40px;
      text-align: center;
    }

    .cta-strip h3 {
      font-size: 22px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
    }

    .cta-strip p {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      margin-bottom: 20px;
    }

    .cta-strip .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 26px;
      border-radius: 8px;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .cta-strip .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark);
      color: var(--text-muted);
      padding: 36px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin: 16px 0;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--primary-light);
    }

    .footer-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 20px 0;
    }

    .footer-copy {
      font-size: 12px;
      color: #6b5a3e;
      line-height: 1.8;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      .header-cta span.cta-text {
        display: none;
      }

      .hero-stats .stat-divider {
        display: none;
