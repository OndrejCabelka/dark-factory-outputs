<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedník Vladimír Janda – Přerov | Zednické a rekonstrukční práce</title>
<meta name="description" content="Profesionální zednické práce, rekonstrukce bytů, omítky a betonářské práce v Přerově a okolí. Volejte +420 603 201 166.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #D97706;
  --primary-dark: #B45309;
  --primary-light: #FCD34D;
  --dark: #1C1917;
  --dark2: #292524;
  --dark3: #44403C;
  --text: #1C1917;
  --text-light: #78716C;
  --white: #FFFFFF;
  --bg-light: #FAFAF9;
  --bg-section: #F5F5F4;
  --border: #E7E5E4;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── HEADER ─── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  color: var(--white);
  font-weight: 800;
  font-size: 15px;
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.logo-sub {
  color: var(--primary-light);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(217,119,6,0.35);
}

.header-cta:hover {
  background: linear-gradient(135deg, var(--primary-dark), #92400e);
  box-shadow: 0 6px 24px rgba(217,119,6,0.5);
  transform: translateY(-1px);
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, #1C1917 0%, #292524 40%, #3D2506 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 80% 50%, rgba(217,119,6,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 10% 80%, rgba(217,119,6,0.07) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  top: -60px;
  right: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(217,119,6,0.15) 0%, transparent 65%);
  pointer-events: none;
}

.hero-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(217,119,6,0.18);
  border: 1px solid rgba(217,119,6,0.35);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  color: var(--white);
  font-size: clamp(32px, 5vw, 58px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
}

#hero h1 span {
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  color: #D6D3D1;
  font-size: clamp(16px, 2.5vw, 20px);
  font-weight: 400;
  line-height: 1.6;
  margin-bottom: 40px;
  max-width: 620px;
  margin-left: auto;
  margin-right: auto;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s;
  box-shadow: 0 6px 24px rgba(217,119,6,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(217,119,6,0.55);
  background: linear-gradient(135deg, #E58009, var(--primary-dark));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 14px 32px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
}

.stat {
  text-align: center;
}

.stat-number {
  display: block;
  color: var(--primary-light);
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.stat-label {
  color: #A8A29E;
  font-size: 13px;
  font-weight: 500;
}

/* ─── SECTIONS COMMON ─── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-block;
  background: rgba(217,119,6,0.1);
  color: var(--primary-dark);
  padding: 4px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.section-desc {
  color: var(--text-light);
  font-size: 17px;
  max-width: 580px;
  line-height: 1.7;
}

/* ─── SERVICES ─── */
#sluzby {
  background: var(--bg-light);
}

.services-header {
  text-align: center;
  margin-bottom: 54px;
}

.services-header .section-desc {
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.service-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-5px);
  border-color: rgba(217,119,6,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(217,119,6,0.12), rgba(217,119,6,0.06));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.1) rotate(-5deg);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}

.service-card p {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.65;
}

/* ─── WHY US ─── */
#proc-my {
  background: var(--dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(217,119,6,0.08) 0%, transparent 65%);
  pointer-events: none;
}

.why-header {
  margin-bottom: 54px;
}

.why-header .section-tag {
  background: rgba(217,119,6,0.2);
  color: var(--primary-light);
}

.why-header .section-title {
  color: var(--white);
}

.why-header .section-desc {
  color: #A8A29E;
}

.why-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.why-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  transition: all 0.25s;
}

.why-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(217,119,6,0.3);
  transform: translateY(-3px);
}

.why-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  font-size: 20px;
  font-weight: 900;
  color: white;
  margin-bottom: 22px;
}

.why-card h3 {
  font-size: 21px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.why-card p {
  color: #A8A29E;
  font-size: 15px;
  line-height: 1.7;
}

.why-icon-big {
  font-size: 28px;
}

/* ─── REVIEWS ─── */
#reference {
  background: var(--bg-section);
}

.reviews-header {
  text-align: center;
  margin-bottom: 54px;
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.25s;
}

.review-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
  font-size: 18px;
}

.review-text {
  color: var(--text);
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 22px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  font-weight: 900;
  color: var(--primary);
  line-height: 0;
  vertical-align: -12px;
  margin-right: 4px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 16px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

.review-location {
  font-size: 13px;
  color: var(--text-light);
}

/* ─── CONTACT ─── */
#kontakt {
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}

.contact-info-col h2 {
  font-size: clamp(26px, 3.5vw, 38px);
  font-weight: 800;
  letter-spacing: -0.8px;
  margin-bottom: 14px;
  line-height: 1.15;
}

.contact-info-col .section-desc {
  margin-bottom: 40px;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
}

.contact-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, rgba(217,119,6,0.12), rgba(217,119,6,0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.contact-item-value a {
  color: var(--primary-dark);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border-radius: var(--radius-lg);
  height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #A8A29E;
  font-size: 15px;
  gap: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 39px, rgba(255,255,255,0.03) 40px);
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-text strong {
  display: block;
  color: var(--white);
  font-size: 18px;
  margin-bottom: 6px;
}

/* ─── FOOTER ─── */
footer {
  background: var(--dark);
  color: #A8A29E;
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
  justify-content: space-between;
}

.footer-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.footer-brand-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.footer-brand-name {
  color: var(--white);
  font-weight: 700;
  font-size: 15px;
}

.footer-meta {
  font-size: 13px;
  text-align: right;
  line-height: 1.8;
}

.footer-meta span {
  display: block;
}

@media (max-width: 900px) {
  .contact-grid {
