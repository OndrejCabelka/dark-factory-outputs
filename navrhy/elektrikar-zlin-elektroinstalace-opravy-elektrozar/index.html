<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář Zlín – Elektroinstalace, Revize, Fotovoltaika</title>
  <meta name="description" content="Profesionální elektrikář ve Zlíně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 739 627 720.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C400;
      --primary-dark: #d4a800;
      --primary-light: #fff3b0;
      --dark: #0f1117;
      --dark2: #1a1d2e;
      --dark3: #23273a;
      --text: #e8eaf0;
      --text-muted: #9ba3b8;
      --white: #ffffff;
      --card-bg: #1e2235;
      --border: #2e3350;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
      --shadow-hover: 0 8px 40px rgba(245,196,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.65;
      font-size: 16px;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: rgba(15, 17, 23, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: 50px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,196,0,0.35);
    }

    .nav-cta span {
      font-size: 17px;
    }

    /* ===== HERO ===== */
    #hero {
      background:
        radial-gradient(ellipse at 70% 50%, rgba(245,196,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 80%, rgba(245,196,0,0.07) 0%, transparent 50%),
        linear-gradient(160deg, #0a0c14 0%, #12162a 40%, #0f1420 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px 80px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(245,196,0,0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(245,196,0,0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    /* Lightning bolt decoration */
    #hero::after {
      content: '⚡';
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      font-size: clamp(120px, 20vw, 280px);
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,196,0,0.12);
      border: 1px solid rgba(245,196,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero-inner h1 {
      font-size: clamp(32px, 5.5vw, 68px);
      font-weight: 900;
      line-height: 1.1;
      color: var(--white);
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 820px;
    }

    .hero-inner h1 .highlight {
      color: var(--primary);
      position: relative;
    }

    .hero-inner h1 .highlight::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary);
      opacity: 0.3;
      border-radius: 2px;
    }

    .hero-sub {
      font-size: clamp(17px, 2.2vw, 22px);
      color: var(--text-muted);
      max-width: 600px;
      margin-bottom: 44px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      font-size: 17px;
      padding: 16px 32px;
      border-radius: 50px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(245,196,0,0.25);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,196,0,0.4);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 17px;
      padding: 15px 32px;
      border-radius: 50px;
      border: 2px solid var(--border);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== SECTIONS ===== */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 46px);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 56px;
      line-height: 1.65;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,196,0,0.3);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: rgba(245,196,0,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
      transition: background 0.3s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,196,0,0.2);
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-card .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      margin-top: 20px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 10px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      transition: all 0.3s;
    }

    .benefit-card:hover {
      border-color: rgba(245,196,0,0.25);
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, rgba(245,196,0,0.15), rgba(245,196,0,0.05));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      border: 1px solid rgba(245,196,0,0.2);
    }

    .benefit-content h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .benefit-content p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      position: relative;
      transition: all 0.3s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,196,0,0.2);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      opacity: 0.4;
      line-height: 1;
      margin-bottom: 16px;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 16px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 28px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
      border-top: 1px solid var(--border);
      padding-top: 22px;
    }

    .author-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      flex-shrink: 0;
    }

    .author-info {
      display: flex;
      flex-direction: column;
    }

    .author-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .author-loc {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px 28px;
      transition: all 0.3s;
    }

    .kontakt-item:hover {
      border-color: rgba(245,196,0,0.3);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: rgba(245,196,0,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kontakt-item-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kontakt-item-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    a.kontakt-item-value:hover {
      color: var(--primary);
    }

    .kontakt-item-note {
      font-size: 13px;
      color: var(--text-muted);
    }

    .map-placeholder {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(245,196,0,0.05) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(245,196,0,0.03) 40px, rgba(245,196,0,0.03) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(245,196,0,0.03) 40px, rgba(245,196,0,0.03) 41px);
    }

    .map-icon {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .map-badge {
      background: rgba(245,196,0,0.12);
      border: 1px solid rgba(245,196,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      position: relative;
      z-index: 1;
    }

    /* ===== CTA BANNER ===== */
    .cta-section {
      background: linear-gradient(135deg, #1a1d0a 0%, #1e2008 40%, #0f1117 100%);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 80px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      inset
