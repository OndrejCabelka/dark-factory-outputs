<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařství Praha – Renovace chatek, terasy, krovové konstrukce</title>
<meta name="description" content="Profesionální tesař v Praze – krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Volejte 774 808 687.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #C8742A;
  --primary-dark: #A85E1E;
  --primary-light: #E8944A;
  --dark: #1A1208;
  --dark-2: #2C1F0E;
  --dark-3: #3D2B14;
  --text: #1A1208;
  --text-muted: #6B5B45;
  --bg: #FDFAF6;
  --bg-warm: #F5EDE0;
  --white: #FFFFFF;
  --border: #E8D8C0;
  --shadow: 0 4px 24px rgba(26,18,8,0.12);
  --shadow-hover: 0 8px 40px rgba(200,116,42,0.22);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== NAVBAR ========== */
header {
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid rgba(200,116,42,0.2);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
  align-items: center;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.btn-phone {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: -0.2px;
}

.btn-phone:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(200,116,42,0.4);
}

/* ========== HERO ========== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  background:
    linear-gradient(160deg, rgba(26,18,8,0.93) 0%, rgba(44,31,14,0.88) 40%, rgba(61,43,20,0.82) 100%),
    radial-gradient(ellipse at 70% 50%, rgba(200,116,42,0.35) 0%, transparent 60%),
    linear-gradient(180deg, #2C1F0E 0%, #1A1208 100%);
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-pattern {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(200,116,42,0.03) 40px,
      rgba(200,116,42,0.03) 80px
    );
  pointer-events: none;
}

.hero-wood-accent {
  position: absolute;
  right: -100px;
  top: 50%;
  transform: translateY(-50%);
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(200,116,42,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.hero-content {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,116,42,0.15);
  border: 1px solid rgba(200,116,42,0.35);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
  max-width: 700px;
}

.hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), #F5C842);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 550px;
  margin-bottom: 36px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 28px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(200,116,42,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(200,116,42,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 15px 28px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  transition: all 0.25s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px 40px;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-number {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary-light);
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* ========== SEKCE ZÁHLAVÍ ========== */
.section-header {
  text-align: center;
  margin-bottom: 50px;
}

.section-tag {
  display: inline-block;
  background: rgba(200,116,42,0.12);
  color: var(--primary);
  border: 1px solid rgba(200,116,42,0.25);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-title.white {
  color: var(--white);
}

.section-sub {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

.section-sub.white {
  color: rgba(255,255,255,0.7);
}

/* ========== SEKCE OBECNĚ ========== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ========== SLUŽBY ========== */
#sluzby {
  background: var(--bg);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.service-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,116,42,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(200,116,42,0.12), rgba(232,148,74,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 18px;
  border: 1px solid rgba(200,116,42,0.15);
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  margin-top: 16px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ========== PROČ MY ========== */
#proc-my {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,116,42,0.1) 0%, transparent 70%);
  pointer-events: none;
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.benefit-card:hover {
  background: rgba(200,116,42,0.08);
  border-color: rgba(200,116,42,0.2);
  transform: translateY(-3px);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(200,116,42,0.2);
  position: absolute;
  top: 14px;
  right: 20px;
  letter-spacing: -2px;
  line-height: 1;
  font-family: 'Inter', sans-serif;
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-desc {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}

/* ========== REFERENCE ========== */
#reference {
  background: var(--bg-warm);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 48px;
  color: var(--primary-light);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
  opacity: 0.4;
}

.review-stars {
  color: #F5C842;
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.avatar-1 { background: linear-gradient(135deg, #C8742A, #E8944A); }
.avatar-2 { background: linear-gradient(135deg, #5B8C5A, #7AAD79); }
.avatar-3 { background: linear-gradient(135deg, #4A6FA5, #6B8FC7); }

.author-info {
  display: flex;
  flex-direction: column;
}

.author-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.author-location {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--bg);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 30px;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px 24px;
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(26,18,8,0.06);
  transition: all 0.3s;
}

.contact-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: rgba(200,116,42,0.2);
}

.contact-item a {
  text-decoration: none;
  color: inherit;
}

.contact-icon-wrap {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(200,116,42,0.12), rgba(232,148,74,0.08));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(200,116,42,0.15);
}

.contact-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.contact-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.contact-value a {
  color: var(--primary);
}

.map-placeholder {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  background: linear-gradient(160deg, var(--dark-2), var(--dark-3));
  min-height: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
}

.map-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,116,42,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,116,42,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
}

.map-text {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  font-weight: 500;
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 20px;
}

.map-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient
