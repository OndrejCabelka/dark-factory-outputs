<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILINGER – Klempířství, pokrývačství, hydroizolace Brno</title>
  <meta name="description" content="Profesionální klempíř v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte +420775151232.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #C0392B;
      --primary-dark: #962d22;
      --primary-light: #e74c3c;
      --accent: #E67E22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --white: #ffffff;
      --text: #1f2937;
      --text-light: #4b5563;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      padding: 0 24px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(192,57,43,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(192,57,43,0.5);
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
      min-height: 88vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding: 60px 24px;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(192,57,43,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(230,126,34,0.10) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(15,52,96,0.6) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #fca5a5;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      width: fit-content;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #94a3b8;
      max-width: 600px;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 24px rgba(192,57,43,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.18);
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
      margin-top: 2px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.1);
      align-self: stretch;
    }

    .hero-visual {
      display: none;
    }

    .hero-card-float {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card-title {
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .service-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--white);
      font-size: 14px;
      font-weight: 500;
    }

    .service-item-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, rgba(192,57,43,0.3), rgba(230,126,34,0.2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* ── SECTIONS COMMON ── */
    section {
      padding: 80px 24px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      border: 1px solid rgba(192,57,43,0.2);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .section-desc {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid transparent;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      cursor: default;
    }

    .service-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .service-card-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card-tag {
      display: inline-block;
      margin-top: 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(192,57,43,0.08);
      padding: 3px 10px;
      border-radius: 100px;
    }

    /* ── WHY US ── */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
    }

    #proc-my .section-tag {
      background: rgba(192,57,43,0.25);
      color: #fca5a5;
      border-color: rgba(192,57,43,0.35);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #94a3b8;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(192,57,43,0.4);
      transform: translateY(-3px);
    }

    .benefit-num {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .benefit-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
    }

    .benefit-card p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.65;
    }

    .benefit-icon-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }

    .benefit-icon-line span {
      font-size: 16px;
    }

    /* ── REVIEWS ── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: var(--gray-light);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      border: 1.5px solid transparent;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      border-color: rgba(192,57,43,0.25);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .review-quote {
      font-size: 48px;
      line-height: 0.8;
      color: var(--primary);
      opacity: 0.25;
      font-family: Georgia, serif;
      position: absolute;
      top: 16px;
      right: 20px;
    }

    .stars {
      color: #f59e0b;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .review-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 18px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .review-author-info span {
      font-size: 12px;
      color: var(--gray);
    }

    .review-verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #16a34a;
      font-weight: 600;
      margin-top: 4px;
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--gray-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .contact-info-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .contact-info-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #f1f5f9;
    }

    .contact-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .contact-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary-dark);
    }

    .contact-item-sub {
      font-size: 12px;
      color: var(--gray);
      margin-top: 2px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
      border-radius: var(--radius);
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      overflow: hidden;
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255
