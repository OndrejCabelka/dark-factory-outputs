<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUJTRUHLAR.CZ – Výroba nábytku na míru Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky, vestavěné skříně, dřevěné podlahy, schody, dveře a okna na míru.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4428;
      --primary-light: #C4874F;
      --accent: #D4A853;
      --accent-light: #F0C97A;
      --dark: #1A1108;
      --dark-2: #2C1C0E;
      --dark-3: #3D2B18;
      --text: #1A1108;
      --text-muted: #7A6555;
      --bg: #FDFAF6;
      --bg-warm: #F5EDE0;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139, 94, 60, 0.12);
      --shadow-lg: 0 12px 48px rgba(139, 94, 60, 0.2);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .nav-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    .nav-logo-sub {
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 4px 12px rgba(139,94,60,0.4);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139,94,60,0.5) !important;
      color: var(--white) !important;
    }

    .nav-mobile-cta {
      display: none;
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(160deg, rgba(26,17,8,0.92) 0%, rgba(44,28,14,0.85) 50%, rgba(61,43,24,0.90) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(139,94,60,0.04) 40px,
          rgba(139,94,60,0.04) 80px
        );
      background-color: var(--dark);
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -50px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(139,94,60,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.35);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.03em;
    }

    .hero-content h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.18;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .hero-content h1 span {
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(139,94,60,0.5);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(139,94,60,0.65);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      background: rgba(212,168,83,0.08);
      color: var(--accent-light);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 44px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .stat {
      text-align: left;
    }

    .stat-number {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-family: 'Playfair Display', serif;
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hero-visual {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-card-stack {
      position: relative;
      width: 100%;
      max-width: 420px;
    }

    .hero-main-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 36px;
      text-align: center;
    }

    .hero-wood-icon {
      font-size: 72px;
      display: block;
      margin-bottom: 16px;
      filter: drop-shadow(0 8px 20px rgba(212,168,83,0.3));
    }

    .hero-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-card-sub {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
    }

    .hero-service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
      justify-content: center;
    }

    .service-tag {
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.25);
      color: var(--accent-light);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .section-desc {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--bg-warm), #EDD9C0);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08) rotate(2deg);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 60px,
        rgba(139,94,60,0.03) 60px,
        rgba(139,94,60,0.03) 120px
      );
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-label {
      color: var(--accent);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.3s, border-color 0.3s;
    }

    .benefit-card:hover {
      background: rgba(212,168,83,0.06);
      border-color: rgba(212,168,83,0.25);
    }

    .benefit-number {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 800;
      color: rgba(212,168,83,0.2);
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      color: rgba(255,255,255,0.55);
      font-size: 0.93rem;
      line-height: 1.7;
    }

    /* ===== REFERENCES ===== */
    #reference {
      background: var(--bg-warm);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.06);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .author-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.07);
      transition: transform 0.2s;
    }

    .contact-item:hover {
      transform: translateX(4px);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--bg-warm), #EDD9C0);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-detail strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-detail a {
      color: var(--primary);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 700;
      transition: color 0.2s;
    }

    .contact-detail a:hover {
      color: var(--primary-light);
