<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servis oken a dveří Brno | Profesionální výměna oken</title>
  <meta name="description" content="Profesionální výměna a servis oken a dveří v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Zavolejte +420775490621">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4d8a;
      --primary-light: #3a8fd4;
      --accent: #f0a500;
      --dark: #0d1b2e;
      --dark-2: #152236;
      --dark-3: #1e3150;
      --text: #2c3e50;
      --text-light: #6b7c93;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --bg-card: #ffffff;
      --border: #e2ecf6;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER ===================== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text span:first-child {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-text span:last-child {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-phone {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 9px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .btn-phone:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
    }

    .btn-phone .phone-icon {
      font-size: 15px;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===================== HERO ===================== */
    #hero {
      background: linear-gradient(135deg, #0d1b2e 0%, #0f3460 40%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      min-height: 85vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(240,165,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240,165,0,0.15);
      border: 1px solid rgba(240,165,0,0.35);
      color: #f0c040;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 .highlight {
      color: var(--accent);
      position: relative;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.75);
      max-width: 540px;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #f5b800);
      color: #1a1a1a;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(240,165,0,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(240,165,0,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat .stat-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    .hero-stat .stat-num span {
      color: var(--accent);
    }

    .hero-visual {
      display: none;
      justify-content: center;
      align-items: center;
    }

    .hero-window-graphic {
      position: relative;
      width: 320px;
      height: 380px;
    }

    .window-frame {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .window-cross-h {
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.2);
      transform: translateY(-50%);
    }

    .window-cross-v {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 3px;
      background: rgba(255,255,255,0.2);
      transform: translateX(-50%);
    }

    .window-shine {
      position: absolute;
      top: 10%; left: 8%;
      width: 40%;
      height: 35%;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 6px;
    }

    .window-handle {
      position: absolute;
      right: 28%;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 30px;
      background: var(--accent);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(240,165,0,0.4);
    }

    .window-badge-graphic {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), #f5b800);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(240,165,0,0.4);
    }

    .floating-card {
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .floating-card.fc-1 {
      bottom: 24px;
      left: -30px;
    }

    .floating-card.fc-2 {
      top: 60px;
      right: -36px;
    }

    .fc-icon {
      font-size: 20px;
    }

    .fc-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .fc-text span {
      font-size: 11px;
      color: var(--text-light);
    }

    @media (min-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr 1fr;
      }
      .hero-visual {
        display: flex;
      }
    }

    /* ===================== SECTIONS SHARED ===================== */
    .section-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-eyebrow {
      display: inline-block;
      background: rgba(26,111,196,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,196,0.15);
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ===================== SLUŽBY ===================== */
    #sluzby {
      padding: 88px 0;
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 580px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .sluzby-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(26,111,196,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 1.5px solid rgba(26,111,196,0.12);
      transition: background 0.3s;
    }

    .sluzba-card:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(26,111,196,0.18), rgba(26,111,196,0.1));
    }

    .sluzba-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
      flex: 1;
    }

    .sluzba-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: rgba(26,111,196,0.07);
      padding: 4px 10px;
      border-radius: 50px;
      align-self: flex-start;
    }

    /* ===================== PROČ MY ===================== */
    #proc-my {
      padding: 88px 0;
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .proc-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .proc-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      padding: 36px 28px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .proc-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .proc-number {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .proc-icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 6px 20px rgba(26,111,196,0.25);
    }

    .proc-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
    }

    .proc-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .proc-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .proc-card ul li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }

    .proc-card ul li::before {
      content: '✓';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: rgba(26,111,196,0.1);
      border-radius: 50%;
      font-size: 11px;
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
    }

    #reference {
      padding: 88px 0;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial
