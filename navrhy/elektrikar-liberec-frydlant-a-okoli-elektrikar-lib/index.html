<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální elektrikář v Liberci, Frýdlantě a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika. Volejte +420775216764">
<title>Elektrikář Liberec & Frýdlant | Profesionální elektrikářské práce</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #d4a800;
  --primary-light: #fff3b0;
  --dark: #0d1117;
  --dark-2: #161b22;
  --dark-3: #21262d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --white: #ffffff;
  --accent: #1f6feb;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.18);
  --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== NAVBAR ========== */
header {
  background: rgba(13,17,23,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(245,197,24,0.15);
  position: sticky;
  top: 0;
  z-index: 999;
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-main {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--dark);
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-cta:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(245,197,24,0.35);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
  background: rgba(245,197,24,0.08);
}

@media (max-width: 768px) {
  .nav-links {
    display: none;
  }
  .logo-main {
    font-size: 13px;
  }
  .nav-cta {
    font-size: 13px;
    padding: 9px 14px;
  }
}

/* ========== HERO ========== */
#hero {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(245,197,24,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(31,111,235,0.10) 0%, transparent 50%),
    linear-gradient(160deg, #0d1117 0%, #0f1923 50%, #111820 100%);
  min-height: 90vh;
  display: flex;
  align-items: center;
  padding: 80px 20px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(245,197,24,0.06) 1px, transparent 0);
  background-size: 40px 40px;
  pointer-events: none;
}

#hero::after {
  content: '⚡';
  position: absolute;
  right: -20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: clamp(180px, 30vw, 380px);
  opacity: 0.04;
  pointer-events: none;
  line-height: 1;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,197,24,0.12);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 100px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 68px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1.5px;
  color: var(--white);
  margin-bottom: 24px;
  max-width: 800px;
}

#hero h1 .highlight {
  color: var(--primary);
  position: relative;
  display: inline-block;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-ctas {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--primary);
  color: var(--dark);
  font-weight: 700;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(245,197,24,0.3);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(245,197,24,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: var(--radius);
  text-decoration: none;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.25s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(245,197,24,0.06);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -0.5px;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 2px;
}

/* ========== SECTIONS COMMON ========== */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  letter-spacing: -0.8px;
  color: var(--white);
  margin-bottom: 16px;
  line-height: 1.15;
}

.section-title .accent {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.7;
}

/* ========== SERVICES ========== */
#sluzby {
  background: var(--dark-2);
}

.services-header {
  margin-bottom: 48px;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.service-card {
  background: var(--dark-3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  cursor: default;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
  border-radius: 3px 3px 0 0;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,197,24,0.2);
  background: #252c35;
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 52px;
  height: 52px;
  background: rgba(245,197,24,0.12);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
  transition: background 0.3s, transform 0.3s;
}

.service-card:hover .service-icon {
  background: rgba(245,197,24,0.2);
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ========== WHY US ========== */
#proc-my {
  background: var(--dark);
}

.why-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.why-card {
  background: var(--dark-2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.why-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s;
}

.why-card:hover {
  transform: translateY(-5px);
  border-color: rgba(245,197,24,0.18);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.why-card:hover::after {
  transform: scaleX(1);
}

.why-num {
  font-size: 42px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 6px;
  display: block;
}

.why-emoji {
  font-size: 40px;
  margin-bottom: 16px;
  display: block;
}

.why-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.why-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ========== REVIEWS ========== */
#reference {
  background: var(--dark-2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 48px;
}

.review-card {
  background: var(--dark-3);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 28px 26px;
  transition: all 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: rgba(245,197,24,0.15);
}

.review-quote {
  font-size: 36px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 12px;
  font-family: Georgia, serif;
  opacity: 0.7;
}

.review-stars {
  color: var(--primary);
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
  opacity: 0.9;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

.review-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.reviews-summary {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.rating-big {
  font-size: 52px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -2px;
}

.rating-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.rating-stars-big {
  color: var(--primary);
  font-size: 22px;
  letter-spacing: 3px;
}

.rating-label {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== CONTACT ========== */
#kontakt {
  background: var(--dark);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-top: 48px;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-card {
  background: var(--dark-2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: all 0.25s;
}

.contact-card:hover {
  border-color: rgba(245,197,24,0.2);
  background: var(--dark-3);
}

.contact-card-icon {
  width: 46px;
  height: 46px;
  background: rgba(245,197,24,0.12);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-card-content h4 {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.contact-card-content a,
.contact-card-content p {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
  text-decoration: none;
  line-height: 1.4;
}

.contact-card-content a {
  transition: color 0.2s;
}

.contact-card-content a:hover {
  color: var(--primary);
}

.contact-card-content .contact-note {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
  display: block;
}

.contact-hours {
  background: var(--dark-2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 24px;
}

.contact-hours h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 14px;
}

.hours-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px
