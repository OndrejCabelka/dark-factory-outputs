<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stavební a zednické práce Olomouc – Robert Šlotíř</title>
  <meta name="description" content="Profesionální zednické práce, rekonstrukce bytů, omítky a přístavby v Olomouci a okolí. Robert Šlotíř – spolehlivý zedník s letitou praxí.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #D97706;
      --primary-dark: #B45309;
      --primary-light: #FCD34D;
      --dark: #1C1A17;
      --dark-2: #2D2A24;
      --dark-3: #3D3A30;
      --text: #1C1A17;
      --text-muted: #6B6860;
      --light: #F9F6F0;
      --white: #FFFFFF;
      --border: #E8E2D9;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(28, 26, 23, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-main {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta-icon {
      font-size: 15px;
    }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #1C1A17 0%, #2D2520 40%, #3D2E1A 70%, #1C1A17 100%);
      padding: 80px 20px 90px;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(217,119,6,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(217,119,6,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🧱';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 220px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(217,119,6,0.18);
      border: 1px solid rgba(217,119,6,0.35);
      color: var(--primary-light);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 18px);
      color: rgba(255,255,255,0.70);
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(217,119,6,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(217,119,6,0.5);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-outline:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.07);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 52px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.50);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
    }

    /* ─── SEKCE SPOLEČNÉ ─── */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 900;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 540px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(217,119,6,0.25);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      font-size: 40px;
      margin-bottom: 18px;
      display: block;
      line-height: 1;
    }

    .sluzba-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .proc-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 32px;
      border-radius: var(--radius);
      background: var(--light);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .proc-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .proc-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(217,119,6,0.35);
    }

    .proc-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .proc-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark);
    }

    #reference .section-label {
      color: var(--primary-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .review-card {
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 28px;
      transition: border-color 0.25s, transform 0.25s;
    }

    .review-card:hover {
      border-color: rgba(217,119,6,0.30);
      transform: translateY(-4px);
    }

    .review-stars {
      font-size: 16px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 14px;
      color: rgba(255,255,255,0.72);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-loc {
      font-size: 12px;
      color: rgba(255,255,255,0.40);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 760px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .kontakt-box-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 24px;
      letter-spacing: -0.4px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .kontakt-item:last-child {
      margin-bottom: 0;
    }

    .kontakt-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(217,119,6,0.10);
      border: 1px solid rgba(217,119,6,0.20);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .kontakt-item-val {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .kontakt-item-val a {
      color: var(--primary-dark);
      transition: color 0.2s;
    }

    .kontakt-item-val a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      border-radius: var(--radius);
      overflow: hidden;
      height: 260px;
      background: linear-gradient(135deg, #E8E2D9, #D5CEC4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid var(--border);
      font-size: 40px;
      color: var(--text-muted);
      margin-top: 20px;
      box-shadow: var(--shadow);
    }

    .mapa-placeholder span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .kontakt-cta-wrap {
      margin-top: 28px;
    }

    .btn-kontakt {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      padding: 14px 26px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(217,119,6,0.35);
      margin-bottom: 12px;
    }

    .btn-kontakt:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-kontakt-outline {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--primary-dark);
      padding: 13px 26px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      border: 2px solid var(--primary);
      transition: background 0.2s, transform 0.15s, color 0.2s;
      width: 100%;
      justify-content: center;
    }

    .btn-kontakt-outline:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark);
      padding: 36px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
    }

    .footer-logo span {
      color: var(--primary);
    }

    .footer-info {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      line-height: 1.7;
      text-align: right;
    }

    @media (max-width: 600px) {
      .footer-info {
        text-align: left;
      }
    }

    /* ─── RESPONSIVITA ─── */
    @media (max-width: 600px) {
      section {
        padding: 56px 16px;
      }

      #hero {
        padding: 60px 16px 70px;
      }

      .hero-stats {
        gap: 20px;
      }

      .stat-num {
        font-size: 22px;
      }

      .navbar {
        padding: 0 16px;
      }

      .logo-main {
        font-size: 13px;
      }

      .nav-cta {
        padding: 9px 14px;
        font-size: 13px;
      }

      .kontakt-box {
        padding: 24px 20px;
      }

      .hero-btns {
        flex-direction: column;
        align-items: center;
      }

      .btn-primary, .btn-outline {
        width
