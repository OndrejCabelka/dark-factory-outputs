<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklenářství Praha s.r.o. – Profesionální sklenář v Praze</title>
  <meta name="description" content="Sklenářství Praha s.r.o. – profesionální sklenářské práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte 777 046 022.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-light: #38bdf8;
      --accent: #e0f2fe;
      --dark: #0c1a2e;
      --dark2: #112240;
      --dark3: #1e3a5f;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-bg: #f0f9ff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(14,165,233,0.10);
      --shadow-hover: 0 8px 40px rgba(14,165,233,0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }
    #proposal-banner a {
      color: white;
      font-weight: bold;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(14,165,233,0.15);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(14,165,233,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(14,165,233,0.45);
    }

    .nav-cta span.icon {
      font-size: 16px;
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #0c1a2e 0%, #0f2745 40%, #0e3460 70%, #0a2550 100%);
      padding: 90px 20px 100px;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(14,165,233,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-glass {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .glass-shard {
      position: absolute;
      opacity: 0.06;
      border: 2px solid var(--primary-light);
    }

    .glass-shard-1 {
      width: 200px;
      height: 200px;
      top: 10%;
      right: 8%;
      transform: rotate(25deg);
      border-radius: 4px;
    }

    .glass-shard-2 {
      width: 120px;
      height: 180px;
      top: 55%;
      right: 18%;
      transform: rotate(-15deg);
      border-radius: 4px;
    }

    .glass-shard-3 {
      width: 80px;
      height: 80px;
      top: 25%;
      right: 22%;
      transform: rotate(45deg);
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(14,165,233,0.15);
      border: 1px solid rgba(14,165,233,0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.03em;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary-light), #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #94a3b8;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(14,165,233,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(14,165,233,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.6);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    /* ── SEKCE OBECNĚ ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 50px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin-left: auto;
      margin-right: auto;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--gray-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--accent), #bae6fd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      background: var(--accent);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 14px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--gray-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(14,165,233,0.3);
    }

    .benefit-content h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-content p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── RECENZE ── */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(14,165,233,0.15);
      color: var(--primary-light);
    }

    #reference .section-desc {
      color: #94a3b8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.08);
    }

    .review-stars {
      color: #fbbf24;
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 0.95rem;
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 600;
      color: var(--white);
      font-size: 0.95rem;
    }

    .review-info {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 2px;
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--gray-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-info-card h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item:last-child {
      margin-bottom: 0;
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-content label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-content a,
    .contact-item-content span {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      display: block;
    }

    .contact-item-content a:hover {
      color: var(--primary);
    }

    .contact-item-content .sub {
      font-size: 0.82rem;
      color: var(--text-light);
      font-weight: 400;
      margin-top: 2px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark2) 0%, var(--dark3) 100%);
      border-radius: var(--radius);
      overflow: hidden;
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: var(--shadow);
    }

    .map-pin {
      font-size: 48px;
      margin-bottom: 16px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-placeholder h4 {
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
      padding: 0 20px;
    }

    .map-placeholder p {
      color: #94a3b8;
      font-size: 0.9rem;
      text-align: center;
      padding: 0 20px;
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.06) 1px, transparent 1px);
      background-
