<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krátký Jiří – Klempířství a Pokrývačství | České Budějovice</title>
  <meta name="description" content="Profesionální pokrývač v Českých Budějovicích a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte 732 826 338.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2d3436;
      --text-light: #636e72;
      --white: #ffffff;
      --light-bg: #f8f9fa;
      --border: #e0e0e0;
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
      --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta .icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a0a 0%, #2c1010 30%, #8b1a1a 65%, #c0392b 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, rgba(192,57,43,0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.04;
      background-image: repeating-linear-gradient(
        45deg,
        #fff 0px,
        #fff 2px,
        transparent 2px,
        transparent 30px
      );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      backdrop-filter: blur(4px);
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.82);
      margin-bottom: 36px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.5);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--white);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 52px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.2);
      align-self: stretch;
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    .section-header.centered {
      text-align: center;
    }

    .section-header.centered .section-sub {
      margin: 0 auto;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--light-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.1);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .benefit-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(192,57,43,0.3);
    }

    .benefit-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .benefit-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, #1a0a0a 0%, #2c1010 40%, #8b1a1a 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(230,126,34,0.1) 0%, transparent 60%);
    }

    #reference .section-label {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px 24px;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.2s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.11);
      transform: translateY(-4px);
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--light-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
    }

    .contact-value:hover {
      color: var(--primary);
    }

    .contact-value-small {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed var(--border);
      position: relative;
    }

    .map-placeholder-inner {
      text-align: center;
    }

    .map-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .map-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-light);
    }

    .map-city {
      font-size: 13px;
      color: var(--border);
      margin-top: 4px;
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      transition: background 0.2s;
    }

    .map-btn:hover {
      background: var(--primary-dark);
    }

    /* ===== CTA STRIP ===== */
    .cta-strip {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      padding: 48px 20px;
      text-align: center;
    }

    .cta-strip h2 {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
    }

    .cta-strip p {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 28px;
    }

    .cta-strip-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: var(--primary);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .btn-outline-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.6);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-outline-white:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
      transform: translateY(-2px);
    }

    /* ===== FOOTER ===== */
    footer {
      background:
