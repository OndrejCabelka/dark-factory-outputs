<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pletivový plot Praha – Profesionální oplocení</title>
  <meta name="description" content="Profesionální montáž pletivových plotů v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte +420723558207." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2e7d32;
      --primary-dark: #1b5e20;
      --primary-light: #43a047;
      --primary-xlight: #e8f5e9;
      --accent: #ff8f00;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --gray: #6b7280;
      --gray-light: #f4f6f4;
      --white: #ffffff;
      --text: #1f2937;
      --text-light: #4b5563;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(0,0,0,0.16);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAV ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: var(--white);
      border-bottom: 2px solid var(--primary-xlight);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--gray);
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(46,125,50,0.35);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(46,125,50,0.45);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0d2b0e 0%, #1b5e20 40%, #2e7d32 70%, #388e3c 100%);
      color: var(--white);
      padding: 90px 20px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,143,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Decorative fence pattern */
    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px,
        var(--accent) 18px,
        transparent 18px,
        transparent 28px
      );
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: #a5d6a7;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    #hero h1 span {
      color: #a5d6a7;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.85);
      max-width: 580px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.5;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 20px rgba(255,143,0,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,143,0,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(5px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 52px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 800;
      color: #a5d6a7;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--primary-xlight);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 50px;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border-top: 4px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary-xlight), #c8e6c9);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--gray-light);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: box-shadow 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      min-width: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 12px rgba(46,125,50,0.25);
    }

    .benefit-content h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 0.7;
      margin-bottom: 16px;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-location {
      font-size: 12px;
      color: var(--gray);
    }

    .stars {
      color: var(--accent);
      font-size: 15px;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--dark);
      color: var(--white);
    }

    #kontakt .section-label {
      background: rgba(255,255,255,0.1);
      color: #a5d6a7;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-title span {
      color: #a5d6a7;
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s;
    }

    .contact-item:hover {
      background: rgba(255,255,255,0.09);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .contact-item-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
    }

    .contact-item-value a {
      color: #a5d6a7;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--white);
    }

    /* Map placeholder */
    .map-placeholder {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      border: 2px dashed rgba(255,255,255,0.15);
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-align: center;
    }

    .map-placeholder-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    .cta-box {
      margin-top: 32px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }

    .cta-box p {
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      margin-bottom: 16px;
    }

    .cta-box a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary-dark);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    .cta-box a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    /* ─── FOOTER ─── */
    footer {
      background: #111;
      color: rgba(255,255,255,0.5);
      padding: 28px 20px;
      text-align: center;
      font-size: 13px;
      border-top: 3px solid var(--primary-dark);
    }

    footer .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    footer span {
      color: rgba(255,255,255,0.3);
    }

    footer .footer-brand {
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }

    footer .footer-sep {
      margin: 0 6px;
      color: rgba(255,255,255,0.2);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      section {
        padding: 60px 16px;
      }

      .contact-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .hero-stats {
        gap: 20px;
      }

      nav {
        padding: 0 14px;
      }

      .logo-sub {
        display: none;
      }

      .nav-cta {
        padding: 9px 16px;
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .logo-name {
        font-size: 15px;
      }

      .btn-primary, .btn-secondary {
        padding: 13px 24px;
        font-size: 15px
