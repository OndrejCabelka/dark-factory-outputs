<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivan Černý – Truhlář Chomutov</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #8B5E3C;
  --primary-dark: #6B4423;
  --primary-light: #C4956A;
  --accent: #D4A853;
  --dark: #1A1209;
  --dark2: #2A1F10;
  --dark3: #3A2D1A;
  --text: #1A1209;
  --text-light: #6B5744;
  --white: #FFFFFF;
  --bg-light: #FAF6F0;
  --bg-cream: #F5EFE6;
  --shadow: 0 4px 24px rgba(139,94,60,0.13);
  --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== HEADER ========== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
  line-height: 1.1;
}

.logo-subtitle {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

.btn-call-nav {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(196,149,106,0.3);
}

.btn-call-nav:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(139,94,60,0.4);
}

/* ========== HERO ========== */
#hero {
  background: linear-gradient(135deg, #1A1209 0%, #2A1810 30%, #3D2510 60%, #2A1F14 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,94,60,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(212,168,83,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.hero-texture {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.5) 2px,
    rgba(255,255,255,0.5) 3px
  ),
  repeating-linear-gradient(
    90deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.3) 20px,
    rgba(255,255,255,0.3) 21px
  );
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(212,168,83,0.15);
  border: 1px solid rgba(212,168,83,0.35);
  color: var(--accent);
  padding: 6px 16px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 28px;
  text-transform: uppercase;
}

#hero h1 {
  font-size: clamp(28px, 6vw, 56px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  max-width: 580px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-ctas {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  transition: all 0.25s;
  border: 2px solid rgba(196,149,106,0.3);
  box-shadow: 0 4px 24px rgba(139,94,60,0.35);
  width: 100%;
  max-width: 280px;
  justify-content: center;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(139,94,60,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  transition: all 0.25s;
  border: 2px solid rgba(255,255,255,0.2);
  width: 100%;
  max-width: 280px;
  justify-content: center;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  margin-top: 60px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 40px;
}

.stat-item {
  text-align: center;
}

.stat-num {
  display: block;
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  margin-top: 4px;
  display: block;
}

/* ========== SEKCE OBECNĚ ========== */
section {
  padding: 70px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 50px;
}

.section-tag {
  display: inline-block;
  background: var(--bg-cream);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 5px 14px;
  border-radius: 30px;
  margin-bottom: 14px;
  border: 1px solid rgba(139,94,60,0.15);
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  color: var(--text-light);
  font-size: 16px;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ========== SLUZBY ========== */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.sluzba-karta {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid rgba(139,94,60,0.08);
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: var(--radius) var(--radius) 0 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.sluzba-karta:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(139,94,60,0.2);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--bg-cream), #EDE0D0);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  border: 1px solid rgba(139,94,60,0.12);
}

.sluzba-karta h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.2;
}

.sluzba-karta p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
  flex: 1;
}

.sluzba-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 4px;
  transition: gap 0.2s, color 0.2s;
}

.sluzba-link:hover {
  gap: 8px;
  color: var(--primary-dark);
}

/* ========== PROC MY ========== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(139,94,60,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-tag {
  background: rgba(212,168,83,0.15);
  color: var(--accent);
  border-color: rgba(212,168,83,0.25);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.6);
}

.benefity-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  position: relative;
  z-index: 1;
}

.benefit-karta {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  padding: 36px 32px;
  transition: all 0.3s;
  text-align: center;
}

.benefit-karta:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(212,168,83,0.3);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, rgba(139,94,60,0.3), rgba(212,168,83,0.2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  border: 1px solid rgba(212,168,83,0.2);
}

.benefit-karta h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-karta p {
  font-size: 15px;
  color: rgba(255,255,255,0.62);
  line-height: 1.65;
}

/* ========== REFERENCE ========== */
#reference {
  background: var(--bg-light);
}

.recenze-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

.recenze-karta {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,94,60,0.08);
  transition: all 0.3s;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.quote-icon {
  font-size: 40px;
  line-height: 1;
  color: var(--primary-light);
  opacity: 0.5;
  margin-bottom: 12px;
  display: block;
}

.hvezdy {
  color: #F5A623;
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 14px;
  display: block;
}

.recenze-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.autor-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.autor-info {
  display: flex;
  flex-direction: column;
}

.autor-jmeno {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
  line-height: 1.2;
}

.autor-misto {
  font-size: 13px;
  color: var(--text-light);
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--dark2);
}

#kontakt .section-header h2 {
  color: var(--white);
}

#kontakt .section-tag {
  background: rgba(212,168,83,0.15);
  color: var(--accent);
  border-color: rgba(212,168,83,0.25);
}

#kontakt .section-header p {
  color: rgba(255,255,255,0.6);
}

.kontakt-wrapper {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.kontakt-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  padding: 22px 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: all 0.2s;
  text-decoration: none;
}

a.kontakt-item:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(212,168,83,0.35);
  transform: translateX(4px);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(139,94,60,0.4), rgba(212,168,83,0.25));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(212,168,83,0.2);
}

.kontakt-item-text {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.ki-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
}

.ki-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
}

.ki-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
}

.mapa-placeholder {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius);
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px 20px;
  text-align: center;
}

.mapa-icon {
  font-size: 52px;
  opacity: 0.6;
}

.mapa-placeholder h4 {
  color: var(--white);
  font-size: 18px;
  font-weight: 600;
}

.mapa-placeholder p {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
}

/* ========== FOOTER ========== */
footer {
  background: var(--dark);
  padding: 32px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
}
