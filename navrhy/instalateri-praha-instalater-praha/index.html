<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatéři Praha – Profesionální instalatérské služby</title>
  <meta name="description" content="Profesionální instalatér v Praze a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 608 698 484.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1565C0;
      --primary-dark: #0D47A1;
      --primary-light: #1976D2;
      --accent: #F59E0B;
      --accent-dark: #D97706;
      --dark: #0A1628;
      --dark2: #0F2040;
      --text: #1E293B;
      --text-light: #64748B;
      --text-muted: #94A3B8;
      --white: #FFFFFF;
      --light-bg: #F0F7FF;
      --light-bg2: #EFF6FF;
      --border: #DBEAFE;
      --shadow: 0 4px 24px rgba(21, 101, 192, 0.12);
      --shadow-hover: 0 8px 40px rgba(21, 101, 192, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAV ─── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(21, 101, 192, 0.08);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-call-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(21, 101, 192, 0.35);
      white-space: nowrap;
    }

    .btn-call-nav:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(21, 101, 192, 0.45);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(145deg, #071525 0%, #0D2744 35%, #0A3060 65%, #0D47A1 100%);
      color: var(--white);
      padding: 90px 20px 80px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(21, 101, 192, 0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.35);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(30px, 6vw, 58px);
      font-weight: 900;
      line-height: 1.12;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #60A5FA, #93C5FD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.82);
      margin-bottom: 40px;
      line-height: 1.6;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--dark);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.4);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(245, 158, 11, 0.55);
      background: linear-gradient(135deg, #FBBF24, var(--accent));
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .hero-stat {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 14px 22px;
      text-align: center;
      backdrop-filter: blur(6px);
      min-width: 110px;
    }

    .hero-stat-num {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      display: block;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── SEKCE OBECNÉ ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 54px;
    }

    .section-tag {
      display: inline-block;
      background: var(--light-bg2);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--light-bg);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      border-radius: 4px 4px 0 0;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(21, 101, 192, 0.2);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--light-bg2), #DBEAFE);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .sluzba-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: var(--light-bg2);
      padding: 5px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      display: flex;
      gap: 20px;
      padding: 30px;
      border-radius: var(--radius-lg);
      border: 2px solid var(--border);
      background: var(--white);
      transition: all 0.3s ease;
      align-items: flex-start;
    }

    .benefit-karta:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(21, 101, 192, 0.3);
    }

    .benefit-text h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(175deg, #0A1628 0%, #0D2744 50%, #112240 100%);
      color: var(--white);
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent);
      border-color: rgba(245, 158, 11, 0.3);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.65);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 30px 28px;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-4px);
    }

    .hvezdicky {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .recenze-karta p {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenzent {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenzent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      font-style: normal;
    }

    .recenzent-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .recenzent-info span {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--light-bg);
    }

    .kontakt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px 26px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: all 0.3s ease;
    }

    .kontakt-karta:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-ikona {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
    }

    .kontakt-detail strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }

    .kontakt-detail a {
      color: var(--primary-dark);
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      display: block;
      transition: color 0.2s;
      letter-spacing: -0.3px;
    }

    .kontakt-detail a:hover {
      color: var(--primary-light);
    }

    .kontakt-detail p {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }

    .kontakt-detail small {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-top: 3px;
    }

    .mapa-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden
