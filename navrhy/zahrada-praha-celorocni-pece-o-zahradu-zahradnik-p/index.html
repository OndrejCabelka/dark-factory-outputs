<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahrada Praha – Celoroční péče o zahradu | Profesionální zahradník</title>
<meta name="description" content="Profesionální zahradník v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy. Zavolejte: +420 725 291 915">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --green-primary: #2d7a3a;
  --green-light: #4caf50;
  --green-bright: #66bb6a;
  --green-dark: #1b5e20;
  --green-accent: #a5d6a7;
  --bg-dark: #0f1f0f;
  --bg-darker: #0a150a;
  --text-dark: #1a2e1a;
  --text-gray: #5a6b5a;
  --text-light: #f0f7f0;
  --white: #ffffff;
  --card-bg: #ffffff;
  --section-alt: #f4fbf4;
  --border: #d4e8d4;
  --shadow: 0 4px 24px rgba(45,122,58,0.10);
  --shadow-hover: 0 8px 40px rgba(45,122,58,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text-dark);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* =================== BANNER =================== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* =================== NAVBAR =================== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(15, 31, 15, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(102,187,106,0.15);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--green-light), var(--green-bright));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-main {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--green-accent);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 4px 16px rgba(76,175,80,0.30);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--green-light), var(--green-bright));
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(76,175,80,0.40);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--green-bright);
}

/* =================== HERO =================== */
#hero {
  background:
    linear-gradient(
      165deg,
      rgba(10,20,10,0.92) 0%,
      rgba(20,50,20,0.85) 40%,
      rgba(30,80,30,0.80) 70%,
      rgba(15,35,15,0.93) 100%
    ),
    radial-gradient(ellipse at 70% 50%, rgba(76,175,80,0.25) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(27,94,32,0.35) 0%, transparent 50%);
  background-color: var(--bg-dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

.hero-decoration {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-circle-1 {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(76,175,80,0.08) 0%, transparent 70%);
  top: -200px;
  right: -100px;
}

.hero-circle-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(27,94,32,0.15) 0%, transparent 70%);
  bottom: -100px;
  left: 5%;
}

.hero-leaves {
  position: absolute;
  font-size: 180px;
  opacity: 0.04;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  line-height: 1;
}

.hero-content {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(76,175,80,0.15);
  border: 1px solid rgba(76,175,80,0.30);
  color: var(--green-accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 24px;
  letter-spacing: -1px;
  max-width: 750px;
}

#hero h1 .accent {
  color: var(--green-bright);
  position: relative;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.65;
  font-weight: 400;
}

.hero-ctas {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 28px rgba(76,175,80,0.35);
  border: 2px solid transparent;
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--green-light), var(--green-bright));
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(76,175,80,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.30);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.60);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 800;
  color: var(--green-bright);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
}

/* =================== SECTION COMMON =================== */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(76,175,80,0.10);
  color: var(--green-primary);
  border: 1px solid rgba(76,175,80,0.20);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text-dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-gray);
  max-width: 580px;
  margin: 0 auto;
  line-height: 1.7;
}

/* =================== SLUZBY =================== */
#sluzby {
  background: var(--section-alt);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green-primary), var(--green-bright));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--green-accent);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(76,175,80,0.12), rgba(76,175,80,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(76,175,80,0.15);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-gray);
  line-height: 1.7;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--green-primary);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 20px;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* =================== PROC MY =================== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.benefit-card {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 40px 36px;
  background: var(--section-alt);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
}

.benefit-card:hover {
  background: var(--white);
  box-shadow: var(--shadow-hover);
  border-color: var(--green-accent);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 52px;
  font-weight: 800;
  color: rgba(76,175,80,0.15);
  line-height: 1;
  position: absolute;
  top: 24px;
  right: 28px;
  letter-spacing: -2px;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 20px;
}

.benefit-card h3 {
  font-size: 21px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-gray);
  line-height: 1.75;
}

/* =================== REFERENCE =================== */
#reference {
  background: linear-gradient(160deg, var(--bg-dark) 0%, #0d2b0d 50%, var(--bg-darker) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(76,175,80,0.06) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-header p {
  color: rgba(255,255,255,0.55);
}

#reference .section-label {
  background: rgba(76,175,80,0.15);
  color: var(--green-accent);
  border-color: rgba(76,175,80,0.25);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(76,175,80,0.15);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.review-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(76,175,80,0.30);
  transform: translateY(-4px);
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.80;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info {
  display: flex;
  flex-direction: column;
}

.author-name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.author-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* =================== KONTAKT =================== */
#kontakt {
  background: var(--section-alt);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info h3 {
  font-size: 28px;
  font-weight: 800;
  color: var(--text-dark);
  margin-bottom: 12px;
  letter-spacing: -0.4px;
}

.contact-info > p {
  color: var(--text-gray);
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 36px;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 36px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s;
}

.contact-item:hover {
  transform: translateX(4px);
}

.contact-item-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, rgba(76,175,80,0.12), rgba(76,175,80,0.06));
  border: 1px solid rgba(76,175,80,0.20);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-text {
  display: flex;
  flex-direction: column;
}

.contact-item-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-gray);
  font-weight: 600;
  margin-bottom: 3px;
}

.contact-item-value {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-dark);
}

a.contact-item .contact-item-value {
  color: var(--green-primary);
}

.cta-section {
  background: linear-gradient(135deg, var(--green-primary), var(--green-light));
  border-radius: var(--radius-lg);
  padding: 32px;
  margin-top: 36px;
}

.cta-section p {
  color: rgba(255,255,255,0.85);
  font-size
