<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vodař Ostrava – Voda, Plyn, Topení | Profesionální topenář</title>
<meta name="description" content="Profesionální instalatér a topenář v Ostravě a okolí. Voda, plyn, topení – rychlý servis, kvalita garantována, přijatelná cena. Volejte 607 215 904.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fba;
  --primary-dark: #124f87;
  --primary-light: #2d8de0;
  --accent: #f97316;
  --dark: #0d1b2a;
  --dark2: #1a2e42;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f0f7ff;
  --bg-section: #f8fafc;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(26,111,186,0.10);
  --shadow-hover: 0 8px 32px rgba(26,111,186,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===================== BANNER ===================== */
#proposal-banner {
  background: linear-gradient(135deg, #FF4D00, #ff7c47);
  color: white;
  text-align: center;
  padding: 12px 20px;
  font-size: 13px;
  font-family: system-ui;
  position: relative;
  z-index: 1000;
}

#proposal-banner a {
  color: white;
  font-weight: bold;
}

/* ===================== HEADER ===================== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: #cbd5e1;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-call {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(26,111,186,0.4);
}

.btn-call:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  box-shadow: 0 4px 20px rgba(26,111,186,0.5);
  transform: translateY(-1px);
}

/* ===================== HERO ===================== */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f2e4a 40%, #1a4a78 75%, #1a6fba 100%);
  position: relative;
  padding: 100px 24px 90px;
  overflow: hidden;
  min-height: 90vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 70% 30%, rgba(26,111,186,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 10% 80%, rgba(45,141,224,0.15) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, rgba(13,27,42,0.1));
  pointer-events: none;
}

.hero-grid {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,111,186,0.25);
  border: 1px solid rgba(45,141,224,0.4);
  color: #7dd3fc;
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  backdrop-filter: blur(10px);
}

#hero h1 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(135deg, #60b8ff, #93d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(15px, 2vw, 18px);
  color: #94a3b8;
  margin-bottom: 36px;
  line-height: 1.7;
  max-width: 480px;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 44px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 4px 20px rgba(26,111,186,0.45);
  transition: all 0.25s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(26,111,186,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  backdrop-filter: blur(10px);
  transition: all 0.25s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-lg);
  padding: 32px;
  backdrop-filter: blur(20px);
  width: 100%;
  max-width: 340px;
}

.hero-card-title {
  color: #7dd3fc;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 20px;
}

.hero-service-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.hero-service-item:last-of-type {
  border-bottom: none;
}

.hero-service-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.icon-blue { background: rgba(26,111,186,0.3); }
.icon-teal { background: rgba(20,184,166,0.3); }
.icon-orange { background: rgba(249,115,22,0.3); }
.icon-green { background: rgba(34,197,94,0.3); }

.hero-service-text {
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
}

.hero-service-desc {
  color: #64748b;
  font-size: 12px;
  margin-top: 2px;
}

.hero-contact-card {
  margin-top: 24px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  transition: all 0.2s;
}

.hero-contact-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,111,186,0.5);
}

.hero-contact-icon {
  font-size: 24px;
}

.hero-contact-label {
  color: rgba(255,255,255,0.75);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.hero-contact-num {
  color: white;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.5px;
}

/* ===================== SECTIONS ===================== */
section {
  padding: 90px 24px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-light);
  color: var(--primary);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  border: 1px solid rgba(26,111,186,0.15);
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 52px;
}

.section-header.centered {
  text-align: center;
}

.section-header.centered .section-desc {
  margin: 0 auto;
}

/* ===================== SLUŽBY ===================== */
#sluzby {
  background: var(--bg-section);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,186,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon-wrap {
  width: 62px;
  height: 62px;
  background: var(--bg-light);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: all 0.3s;
}

.service-card:hover .service-icon-wrap {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
}

.service-card-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-tag {
  display: inline-block;
  margin-top: 16px;
  background: var(--bg-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
}

/* ===================== PROČ MY ===================== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 700px 500px at 80% 50%, rgba(26,111,186,0.15) 0%, transparent 70%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(26,111,186,0.2);
  border-color: rgba(26,111,186,0.3);
  color: #7dd3fc;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: #64748b;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 2;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(26,111,186,0.3);
  transform: translateY(-4px);
}

.benefit-card:hover::after {
  transform: scaleX(1);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(26,111,186,0.3);
  line-height: 1;
  margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 18px;
}

.benefit-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-text {
  font-size: 15px;
  color: #64748b;
  line-height: 1.7;
}

.benefit-highlight {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  color: #7dd3fc;
  font-size: 13px;
  font-weight: 600;
}

/* ===================== REFERENCE ===================== */
#reference {
  background: var(--bg-section);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  opacity: 0.3;
  font-family: Georgia, serif;
}

.stars {
  color: #f59e0b;
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
  flex-shrink: 0;
}

.reviewer-name {
  font-
