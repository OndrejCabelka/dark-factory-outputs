<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ČEČRLE - STŘECHA | Klempíř Teplice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --accent: #f59e0b;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f8fafc;
  --bg-card: #ffffff;
  --border: #e2e8f0;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-hover: 0 8px 40px rgba(37,99,235,0.15);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* UTILITY */
.container {
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-label {
  display: inline-block;
  background: rgba(37,99,235,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-subtitle {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
}

/* HEADER */
header {
  position: fixed;
  top: 40px;
  left: 0;
  right: 0;
  z-index: 999;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  max-width: 1140px;
  margin: 0 auto;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  line-height: 1.2;
}

.logo-main {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-header {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 22px;
  border-radius: 8px;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.btn-header:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

@media (max-width: 768px) {
  .nav-links {
    display: none;
  }
  .logo-main {
    font-size: 1rem;
  }
  header {
    top: 44px;
  }
}

@media (max-width: 480px) {
  header {
    top: 52px;
  }
}

/* HERO */
#hero {
  min-height: 100vh;
  background:
    linear-gradient(155deg, rgba(15,23,42,0.97) 0%, rgba(30,41,59,0.92) 45%, rgba(37,99,235,0.25) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 80px
    );
  background-color: var(--dark);
  display: flex;
  align-items: center;
  padding: 140px 20px 80px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 1140px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.3);
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-perex {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.7);
  margin-bottom: 36px;
  max-width: 480px;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-size: 1rem;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: 10px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(37,99,235,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(37,99,235,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: var(--white);
  text-decoration: none;
  font-size: 1rem;
  font-weight: 600;
  padding: 14px 28px;
  border-radius: 10px;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: left;
}

.hero-stat-num {
  display: block;
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.hero-visual {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.hero-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  backdrop-filter: blur(8px);
  transition: background 0.3s;
}

.hero-card:hover {
  background: rgba(255,255,255,0.1);
}

.hero-card-icon {
  width: 48px;
  height: 48px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

.hero-card-text strong {
  display: block;
  color: var(--white);
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 2px;
}

.hero-card-text span {
  color: rgba(255,255,255,0.55);
  font-size: 0.82rem;
}

@media (max-width: 900px) {
  .hero-inner {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  .hero-visual {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 600px) {
  #hero {
    padding: 130px 20px 70px;
  }
  .hero-visual {
    grid-template-columns: 1fr;
  }
  .hero-stats {
    gap: 24px;
  }
}

/* SERVICES */
#sluzby {
  padding: 100px 20px;
  background: var(--bg-light);
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(37,99,235,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(59,130,246,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.service-card:hover .service-icon {
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* WHY US */
#proc-my {
  padding: 100px 20px;
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
  margin-top: 56px;
}

.benefit-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 28px;
  border-radius: var(--radius);
  background: var(--bg-light);
  border: 1px solid var(--border);
  transition: all 0.3s;
}

.benefit-item:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}

.benefit-num {
  width: 52px;
  height: 52px;
  min-width: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  font-weight: 800;
}

.benefit-content h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
}

.benefit-content p {
  font-size: 0.91rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* REVIEWS */
#reference {
  padding: 100px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 20% 50%, rgba(37,99,235,0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 50%, rgba(245,158,11,0.06) 0%, transparent 50%);
  pointer-events: none;
}

#reference .section-label {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-subtitle {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  margin-top: 56px;
  position: relative;
  z-index: 2;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s;
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-3px);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  font-size: 1rem;
}

.review-text {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.75);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 2rem;
  color: var(--primary-light);
  font-style: normal;
  line-height: 0;
  vertical-align: -0.4em;
  margin-right: 4px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--white);
  font-size: 0.95rem;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 0.95rem;
}

.review-location {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.45);
}

/* CONTACT */
#kontakt {
  padding: 100px 20px;
  background: var(--bg-light);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-top: 56px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  text-decoration: none;
  transition: all 0.2s;
}

.contact-item:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
  border-color: rgba(37,99,235,0.25);
}

.contact-icon {
  width: 48px;
  height: 48px;
  min-width: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: var(--white);
}

.contact-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-value {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--dark);
}

.contact-map {
  background: var(--dark2);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 1px solid var(--dark3);
  position: relative;
}

.map-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(37,99,235,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(37,99,235,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-pin {
  font-size: 3rem;
  position: relative;
  z-index: 2;
  animation: pin-bounce 2s ease-in-out infinite;
}

@keyframes pin-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.map-label {
  position: relative;
  z-index: 2;
  color: var(--white);
  font-weight:
