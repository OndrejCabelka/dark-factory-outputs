<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klempířské práce - LÖW - střechy | Plzeň</title>
<meta name="description" content="Profesionální klempíř v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte 602 163 578.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6eb5;
  --primary-dark: #124f87;
  --primary-light: #2a84d4;
  --accent: #e8a020;
  --accent-dark: #c4841a;
  --dark: #0d1f35;
  --dark2: #132840;
  --dark3: #1c3a56;
  --text: #1a2a3a;
  --text-light: #4a6080;
  --white: #ffffff;
  --off-white: #f4f8fc;
  --border: #d0e0f0;
  --shadow: 0 4px 24px rgba(26,110,181,0.10);
  --shadow-lg: 0 8px 40px rgba(26,110,181,0.16);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-text .brand {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-text .tagline {
  font-size: 11px;
  color: #8aa8c8;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

nav a {
  color: #b0c8e0;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}

nav a:hover {
  color: var(--white);
  background: rgba(255,255,255,0.08);
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  padding: 9px 18px !important;
  border-radius: 8px;
  font-weight: 600 !important;
  font-size: 14px !important;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s !important;
  box-shadow: 0 2px 10px rgba(26,110,181,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 18px rgba(26,110,181,0.5) !important;
  background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
}

.nav-hide {
  display: none;
}

@media (min-width: 768px) {
  .nav-hide {
    display: flex;
  }
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0a1a2e 0%, #0d2240 30%, #1a3a60 60%, #0e2845 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 800px 600px at 20% 50%, rgba(26,110,181,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 80% 30%, rgba(232,160,32,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 400px 300px at 60% 80%, rgba(42,132,212,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--white));
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,160,32,0.15);
  border: 1px solid rgba(232,160,32,0.35);
  color: #f0bc50;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
  position: relative;
  z-index: 1;
}

.hero-content {
  max-width: 760px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 54px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 19px);
  color: #9dc0e0;
  max-width: 560px;
  margin: 0 auto 36px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 4px 20px rgba(26,110,181,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(26,110,181,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid rgba(255,255,255,0.18);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: clamp(24px, 5vw, 60px);
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
  padding-bottom: 30px;
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 900;
  color: var(--white);
  line-height: 1;
  display: block;
}

.stat-num span {
  color: var(--accent);
}

.stat-label {
  font-size: 13px;
  color: #7aa0c0;
  margin-top: 4px;
  display: block;
}

/* ===== SECTIONS GENERAL ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-block;
  background: rgba(26,110,181,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 12px;
}

.section-sub {
  font-size: 16px;
  color: var(--text-light);
  max-width: 520px;
  line-height: 1.6;
}

.section-header {
  margin-bottom: 48px;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--off-white);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 560px) {
  .services-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1.5px solid transparent;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(26,110,181,0.15);
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(26,110,181,0.12), rgba(26,110,181,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1.5px solid rgba(26,110,181,0.12);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-card .service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 16px;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 8px;
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--white);
}

.why-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 768px) {
  .why-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.why-card {
  padding: 36px 28px;
  border-radius: var(--radius-lg);
  background: var(--off-white);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.why-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.25s;
}

.why-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(26,110,181,0.2);
}

.why-card:hover::before {
  opacity: 1;
}

.why-icon {
  font-size: 36px;
  margin-bottom: 18px;
  display: block;
}

.why-card h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.why-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REVIEWS ===== */
#reference {
  background: linear-gradient(135deg, #0d1f35 0%, #132840 50%, #1a3050 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 700px 500px at 30% 50%, rgba(26,110,181,0.12) 0%, transparent 70%),
              radial-gradient(ellipse 500px 400px at 75% 50%, rgba(232,160,32,0.07) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-tag {
  background: rgba(255,255,255,0.10);
  color: #9dc0e0;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-sub {
  color: #7aa0c0;
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  position: relative;
  z-index: 1;
}

@media (min-width: 768px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 30px 24px;
  transition: background 0.25s, transform 0.25s;
  backdrop-filter: blur(4px);
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-4px);
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.review-stars span {
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: #c0d8f0;
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  font-weight: 700;
  color: white;
}

.author-info .name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.author-info .location {
  font-size: 12px;
  color: #6a90b0;
  margin-top: 2px;
}

/* ===== CONTACT ===== */
#kontakt {
  background: var(--off-white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

@media (min-width: 900px) {
  .contact-grid {
    grid-template-columns: 1fr 1fr;
    align-items: start;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  color: inherit;
}

.contact-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.contact-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(26,110,181,0.12), rgba(26,110,181,0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1.5px solid rgba(26,110,181,0.12);
}

.contact-detail .label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.contact-detail .value {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.contact-detail .value.phone {
  color: var(--primary);
  font-size: 20px;
}

.map-placeholder {
  background: linear-gradient(135deg, #0d2240, #1a3a60);
  border-radius: var(--radius-lg);
  overflow: hidden;
  height: 360px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
  border: 2px solid rgba(26,110,181,0.2);
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle 200px at 50% 50%, rgba(26,110,181,0.2), transparent),

    repeating-linear-gradient(
