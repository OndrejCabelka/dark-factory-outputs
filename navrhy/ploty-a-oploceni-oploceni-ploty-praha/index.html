<!DOCTYPE html>
<html lang="cs">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2E7D32;
      --primary-light: #4CAF50;
      --primary-dark: #1B5E20;
      --accent: #FF8F00;
      --accent-light: #FFB300;
      --dark: #1a1a1a;
      --dark-2: #232323;
      --dark-3: #2d2d2d;
      --text: #333;
      --text-light: #666;
      --text-muted: #999;
      --white: #ffffff;
      --gray-light: #f5f7f5;
      --gray-border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      color: var(--white);
      font-weight: 800;
      font-size: 17px;
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      color: var(--primary-light);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-phone {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(46,125,50,0.35);
    }

    .btn-phone:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(46,125,50,0.5);
    }

    .btn-phone-icon {
      font-size: 16px;
    }

        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(46,125,50,0.06) 40px,
          rgba(46,125,50,0.06) 80px
        );
      background-color: #0d1f0e;
      min-height: 88vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(76,175,80,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;

      height: 400px;
      background: radial-gradient(circle, rgba(255,143,0,0.08) 0%, transparent 70%);

      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      color: var(--white);
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
      max-width: 780px;
    }

    #hero h1 span {
      color: var(--primary-light);
      position: relative;
    }

    .hero-sub {
      color: rgba(255,255,255,0.75);
      font-size: clamp(16px, 2vw, 20px);
      max-width: 580px;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.65;
    }

      flex-wrap: wrap;

    }

    .btn-secondary {

      font-size: 16px;

    .btn-secondary:hover {

    .service-card::before {

      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(46,125,50,0.15);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(46,125,50,0.1), rgba(76,175,80,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: all 0.3s;

      line-height: 1.65;
    }

    #reference .section-tag {

    .review-stars {

    .contact-item-value {

      color: var(--dark);

    .contact-item-value a:hover {
