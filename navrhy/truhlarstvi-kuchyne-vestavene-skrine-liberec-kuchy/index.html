<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Liberec – Kuchyně, Skříně, Podlahy na míru</title>
  <meta name="description" content="Profesionální truhlář v Liberci – kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Volejte +420 605 723 032.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C48A5C;
      --accent: #D4A04A;
      --accent-light: #F0C97A;
      --dark: #1A1208;
      --dark-2: #2C1E0F;
      --dark-3: #3D2B14;
      --text-dark: #1A1208;
      --text-mid: #4A3520;
      --text-light: #7A6050;
      --white: #FFFFFF;
      --off-white: #FAF7F2;
      --light-bg: #F5EFE6;
      --border: #E8DDD0;
      --shadow: 0 4px 24px rgba(139,94,60,0.10);
      --shadow-hover: 0 8px 36px rgba(139,94,60,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26,18,8,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,94,60,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-main {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s !important;
      white-space: nowrap;
      border: 1px solid rgba(212,160,74,0.4);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,94,60,0.4) !important;
      color: var(--white) !important;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
      background: linear-gradient(160deg, #1A1208 0%, #2C1E0F 40%, #3D2B14 70%, #4A3218 100%);
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(139,94,60,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(212,160,74,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(212,160,74,0.8) 40px, rgba(212,160,74,0.8) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(212,160,74,0.8) 40px, rgba(212,160,74,0.8) 41px);
      pointer-events: none;
    }

    .hero-wood-accent {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(139,94,60,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,160,74,0.15);
      border: 1px solid rgba(212,160,74,0.35);
      color: var(--accent-light);
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
      max-width: 750px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(255,255,255,0.68);
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.55;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid rgba(212,160,74,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.1px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139,94,60,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.2s, background 0.2s;
      letter-spacing: 0.1px;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
      letter-spacing: -1px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      margin-top: 3px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--light-bg);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--off-white);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.25);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--light-bg), #EDE4D8);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .sluzba-link:hover {
      gap: 10px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .proc-item {
      display: flex;
      gap: 20px;
      padding: 28px;
      background: var(--light-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .proc-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .proc-icon {
      width: 52px;
      height: 52px;
      min-width: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .proc-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .proc-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ===== CTA BANNER ===== */
    .cta-banner {
      background: linear-gradient(135deg, var(--dark-2) 0%, var(--dark-3) 50%, var(--primary-dark) 100%);
      padding: 64px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(212,160,74,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .cta-banner h2 {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 14px;
      position: relative;
      letter-spacing: -0.8px;
    }

    .cta-banner p {
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      margin-bottom: 32px;
      position: relative;
    }

    .cta-banner-btns {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      position: relative;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--off-white);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-hvezdy {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
      font-size: 17px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .recenze-mesto {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--light-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }

    .kontakt-item:hover {
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .kontakt-item-text h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-text a,
    .kontakt-item-text p {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var
