<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatéři Praha a okolí | Opravy, Instalace, Havárie 24/7</title>
  <meta name="description" content="Profesionální instalatér v Praze a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 770 616 161.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #135599;
      --primary-light: #2d8de0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #132338;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    nav {
      display: none;
      gap: 28px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--primary);
    }

    .btn-header {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(26,111,196,0.3);
    }

    .btn-header:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(26,111,196,0.4);
    }

    /* HERO */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #132338 40%, #1a3a5c 70%, #1a6fc4 100%);
      padding: 80px 20px 100px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(240,165,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(240,165,0,0.15);
      border: 1px solid rgba(240,165,0,0.3);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #4da6ff, #7cc4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #e09400);
      color: var(--dark);
      text-decoration: none;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 800;
      transition: all 0.25s;
      box-shadow: 0 4px 24px rgba(240,165,0,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(240,165,0,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      display: block;
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
    }

    /* SECTION COMMON */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* SLUZBY */
    #sluzby {
      background: var(--bg-section);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .sluzba-ikona {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: var(--bg-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .sluzba-karta:hover .sluzba-ikona {
      transform: scale(1.08);
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--bg-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
    }

    .urgentni {
      border-color: rgba(240,165,0,0.35);
    }

    .urgentni .sluzba-ikona {
      background: rgba(240,165,0,0.12);
    }

    .urgentni::before {
      background: linear-gradient(90deg, var(--accent), #ffca44);
    }

    .urgentni .sluzba-tag {
      background: rgba(240,165,0,0.12);
      color: #c07800;
    }

    /* PROC MY */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .benefit-karta {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--bg-section);
      border-radius: var(--radius);
      padding: 28px;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .benefit-karta:hover {
      border-color: rgba(26,111,196,0.25);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .benefit-cislo {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: var(--white);
      flex-shrink: 0;
    }

    .benefit-obsah h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-obsah p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* REFERENCE */
    #reference {
      background: linear-gradient(135deg, #0d1b2a, #132338);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 80% 20%, rgba(26,111,196,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(26,111,196,0.2);
      color: #7cc4ff;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 28px;
      position: relative;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(26,111,196,0.35);
      transform: translateY(-3px);
    }

    .hvezdicky {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .recenzent {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenzent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .recenzent-jmeno {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .recenzent-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* KONTAKT */
    #kontakt {
      background: var(--bg-section);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kontakt-polozka {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px;
      border: 1px solid var(--border);
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
    }

    a.kontakt-polozka:hover {
      border-color: rgba(26,111,196,0.3);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .kontakt-ikona {
      width: 48px;
      height: 48px;
      background: var(--bg-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-hodnota {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .kontakt-hodnota.primary {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

    .mapa-bg {
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(rgba(26,111,196,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,196,0.04) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .mapa-pin {
      position: relative;
      z-index: 1;
      font-size: 48px;
    }

    .mapa-text {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .mapa-text strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .mapa-text span {
      font-size: 13px;
      color: var(--text-light);
    }

    .mapa-oblasti {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 0 20px;
    }

    .oblast-tag {
      background: var(--bg-light);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* CTA BANNER */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      padding: 60px 20px;
      text-align: center;
