<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sádrokartonáři Praha – Profesionální montáž sádrokartonu</title>
<meta name="description" content="Profesionální montáž sádrokartonu v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte nám ještě dnes!">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8a020;
  --primary-dark: #c4841a;
  --primary-light: #f5c060;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --white: #ffffff;
  --bg-light: #f8f7f4;
  --bg-section: #fafaf8;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ===== NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-main {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 400;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(232,160,32,0.35);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(232,160,32,0.45);
}

.nav-cta .phone-icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a50 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 60% 40%, rgba(232,160,32,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(232,160,32,0.07) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(232,160,32,0.15);
  border: 1px solid rgba(232,160,32,0.3);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 54px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.78);
  margin-bottom: 42px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s ease;
  box-shadow: 0 6px 24px rgba(232,160,32,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(232,160,32,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: all 0.2s ease;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-number {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
}

/* ===== SECTION COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: rgba(232,160,32,0.12);
  color: var(--primary-dark);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.65;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 90px 20px;
  background: var(--bg-light);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: var(--card-shadow);
  transition: all 0.3s ease;
  border: 2px solid transparent;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.14);
  border-color: rgba(232,160,32,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 90px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(232,160,32,0.08) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-tag {
  background: rgba(232,160,32,0.2);
  color: var(--primary-light);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 40px 32px;
  transition: all 0.3s ease;
  text-align: center;
}

.benefit-card:hover {
  background: rgba(232,160,32,0.08);
  border-color: rgba(232,160,32,0.3);
  transform: translateY(-4px);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 8px;
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 16px;
  display: block;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 90px 20px;
  background: var(--bg-section);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--card-shadow);
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 80px;
  color: rgba(232,160,32,0.1);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}

.stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 90px 20px;
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 28px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--bg-light);
  border-radius: var(--radius);
  transition: all 0.2s ease;
}

.kontakt-item:hover {
  background: rgba(232,160,32,0.08);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-text strong {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-text a {
  color: var(--dark);
  text-decoration: none;
  font-size: 17px;
  font-weight: 600;
  transition: color 0.2s;
}

.kontakt-item-text a:hover {
  color: var(--primary);
}

.kontakt-item-text p {
  color: var(--dark);
  font-size: 16px;
  font-weight: 500;
}

.mapa-placeholder {
  background: linear-gradient(135deg, var(--bg-light), #ede9e0);
  border-radius: var(--radius);
  height: 100%;
  min-height: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border: 2px dashed rgba(232,160,32,0.3);
  position: relative;
  overflow: hidden;
}

.mapa-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 40px,
    rgba(232,160,32,0.04) 40px,
    rgba(232,160,32,0.04) 41px
  ),
  repeating-linear-gradient(
    90deg,
    transparent,
    transparent 40px,
    rgba(232,160,32,0.04) 40px,
    rgba(232,160,32,0.04) 41px
  );
}

.mapa-content {
  text-align: center;
  position: relative;
  z-index: 1;
}

.mapa-pin {
  font-size: 54px;
  margin-bottom: 10px;
  display: block;
}

.mapa-placeholder h4 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 6px;
}

.mapa-placeholder p {
  font-size: 14px;
  color: var(--text-light);
}

/* ===== CTA BANNER ===== */
.cta-banner {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  padding: 60px 20px;
  text-align: center;
}

.cta-banner h2 {
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.cta-banner p {
  font-size: 17px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 32px;
}

.cta-banner .btn-white {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  color: var(--primary-dark);
  text-decoration: none;
  padding: 16px 36px;
  border-radius: var(--radius);
  font-weight: 800;
  font-size: 17px;
  transition: all 0.2s ease;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15);
}

.cta-banner .btn-white:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0
