<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sádrokartonáři Praha | Profesionální sádrokarton</title>
  <meta name="description" content="Profesionální sádrokartonářské práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte nám!">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e67e22;
      --primary-dark: #ca6f1e;
      --primary-light: #f39c12;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --white: #ffffff;
      --light-bg: #f8f9fa;
      --light-bg-2: #eef2f7;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
      --card-shadow-hover: 0 8px 40px rgba(230,126,34,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      color: var(--white);
      font-weight: 800;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      color: var(--primary);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(230,126,34,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(230,126,34,0.5);
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
      position: relative;
      padding: 80px 20px 90px;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(230,126,34,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(243,156,18,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(230,126,34,0.15);
      border: 1px solid rgba(230,126,34,0.3);
      color: var(--primary-light);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge::before {
      content: '🔨';
      font-size: 16px;
    }

    #hero h1 {
      color: var(--white);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      color: rgba(255,255,255,0.75);
      font-size: clamp(16px, 2.5vw, 20px);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 30px rgba(230,126,34,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(230,126,34,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      color: var(--white);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-num em {
      font-style: normal;
      color: var(--primary-light);
    }

    .hero-stat-label {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
    }

    .hero-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(230,126,34,0.1);
      color: var(--primary-dark);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
      line-height: 1.25;
    }

    .section-desc {
      color: var(--text-light);
      font-size: 17px;
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 50px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--light-bg);
    }

    .sluzby-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .sluzby-header .section-desc {
      margin: 0 auto;
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--card-shadow-hover);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(230,126,34,0.12), rgba(243,156,18,0.08));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      color: var(--text-light);
      font-size: 15px;
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-my-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .proc-my-text .section-desc {
      margin-bottom: 0;
    }

    .benefity-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .benefit-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding: 22px 24px;
      background: var(--light-bg);
      border-radius: var(--radius);
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .benefit-item:hover {
      background: var(--white);
      border-color: rgba(230,126,34,0.2);
      box-shadow: 0 4px 20px rgba(230,126,34,0.1);
      transform: translateX(5px);
    }

    .benefit-num {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
    }

    .benefit-content h4 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .proc-my-visual {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-3) 100%);
      border-radius: var(--radius-lg);
      padding: 50px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .proc-my-visual::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -30%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(230,126,34,0.2) 0%, transparent 70%);
    }

    .proc-visual-icon {
      font-size: 64px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .proc-visual-text {
      color: var(--white);
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .proc-visual-sub {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }

    .proc-visual-divider {
      width: 50px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      margin: 20px auto;
      border-radius: 2px;
    }

    .proc-visual-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 30px;
      position: relative;
      z-index: 1;
    }

    .proc-visual-stat {
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 18px 12px;
    }

    .proc-visual-stat-num {
      color: var(--primary-light);
      font-size: 26px;
      font-weight: 900;
      display: block;
    }

    .proc-visual-stat-label {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      margin-top: 4px;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(180deg, var(--light-bg) 0%, var(--light-bg-2) 100%);
    }

    .reference-header {
      text-align: center;
    }

    .reference-header .section-desc {
      margin: 0 auto 50px;
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      position: relative;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .recenze-karta:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .recenze-hvezdy {
      color: #f39c12;
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .recenze-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
      position: relative;
    }

    .recenze-text::before {
      content: '"';
      font-size: 60px;
      color: rgba(230,126,34,0.1);
      font-style: normal;
      position: absolute;
      top: -10px;
      left: -8px;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .recenze-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #e67e22, #f39c12); }
    .avatar-2 { background: linear-gradient(135deg, #2980b9, #3498db); }
    .avatar-3 { background: linear-gradient(135deg, #27ae60, #2ecc71); }

    .recenze-jmeno {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .recenze-info {
      color: var(--text-light);
      font-size: 13px;
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--dark);
      padding: 80px 20px;
    }

    .kontakt-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .kontakt-header .section-title {
      color: var(--white);
    }

    .kontakt-header .section-desc {
      color: rgba(255,255,255,0.6);
      margin: 0 auto;
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding: 24px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .kontakt-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(230,126,34,0.3);
    }

    .kontakt-item a {
      color: inherit;
      text-decoration: none;
    }

    .kontakt-item a:hover {
