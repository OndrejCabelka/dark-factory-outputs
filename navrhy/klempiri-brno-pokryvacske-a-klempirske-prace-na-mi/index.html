<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klempíři Brno | Pokrývačské a klempířské práce na míru</title>
  <meta name="description" content="Profesionální klempířské a pokrývačské práce v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte 737 989 136.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563EB;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --dark-3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --white: #ffffff;
      --bg-light: #f8fafc;
      --bg-section: #f1f5f9;
      --border: #e2e8f0;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.16);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-call-header {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }

    .btn-call-header:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.45);
    }

    /* HERO */
    #hero {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 40%, #0c1a2e 70%, #162040 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      min-height: 620px;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(37,99,235,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(245,158,11,0.10) 0%, transparent 55%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.015) 40px,
          rgba(255,255,255,0.015) 41px
        );
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.35);
      color: #93c5fd;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: #3b82f6;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-content h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero-content h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(15px, 2vw, 18px);
      color: rgba(255,255,255,0.7);
      margin-bottom: 36px;
      max-width: 540px;
      line-height: 1.7;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      box-shadow: 0 8px 24px rgba(37,99,235,0.4);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #3b82f6, var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(37,99,235,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }

    .hero-visual {
      display: none;
      justify-content: center;
      align-items: center;
    }

    .hero-card-mockup {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(12px);
      max-width: 320px;
      width: 100%;
    }

    .hero-card-mockup-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .hero-card-mockup h3 {
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-card-mockup p {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.6;
    }

    .mockup-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 20px 0;
    }

    .mockup-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .mockup-row:last-child {
      margin-bottom: 0;
    }

    .mockup-label {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    .mockup-value {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }

    .mockup-badge {
      background: rgba(34,197,94,0.2);
      color: #86efac;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* SECTIONS */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 12px;
    }

    .section-eyebrow::before,
    .section-eyebrow::after {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* SLUZBY */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon-wrap {
      width: 58px;
      height: 58px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(245,158,11,0.08));
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .sluzba-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sluzba-features li {
      font-size: 13px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sluzba-features li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 12px;
      width: 18px;
      height: 18px;
      background: rgba(37,99,235,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* PROC MY */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .benefit-karta {
      background: linear-gradient(135deg, var(--bg-light), var(--white));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      text-align: center;
      transition: all 0.3s;
      position: relative;
    }

    .benefit-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: rgba(37,99,235,0.2);
    }

    .benefit-icon-big {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 22px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    }

    .benefit-karta h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.2px;
    }

    .benefit-karta p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .benefit-num {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 48px;
      font-weight: 900;
      color: rgba(37,99,235,0.06);
      line-height: 1;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    /* REFERENCE */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(37,99,235,0.08) 0%, transparent 70%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-eyebrow {
      color: var(--accent);
    }

    #reference .section-eyebrow::before,
    #reference .section-eyebrow::after {
      background: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 30px;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-4px);
    }

    .hvezdicky {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .hvezdicky span {
      color: var(--accent);
      font-size: 18px;
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      line-height: 1.75;
      margin-bottom: 22px
