<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bratonss - Střechy Na Klíč | Pokrývač Frýdek-Místek</title>
<meta name="description" content="Profesionální pokrývač ve Frýdku-Místku. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Střechy na klíč. Zavolejte +420558639575">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c0392b;
  --primary-dark: #922b21;
  --primary-light: #e74c3c;
  --accent: #e67e22;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text-dark: #1e1e1e;
  --text-mid: #444;
  --text-light: #777;
  --bg-light: #f8f8f6;
  --bg-card: #ffffff;
  --white: #ffffff;
  --border: #e5e5e5;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text-dark);
  background: var(--bg-light);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ─── HEADER / NAV ─── */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,26,46,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 20px;
}

.nav-inner {
  max-width: 1160px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(192,57,43,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(192,57,43,0.5);
}

.nav-cta-icon {
  font-size: 16px;
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #2d1515 75%, #3d1a0a 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 100px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(192,57,43,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(230,126,34,0.15) 0%, transparent 60%);
  pointer-events: none;
}

.hero-roof-deco {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  overflow: hidden;
  line-height: 0;
}

.hero-roof-deco svg {
  width: 100%;
  height: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(192,57,43,0.2);
  border: 1px solid rgba(192,57,43,0.4);
  color: #f5a88a;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
}

#hero h1 {
  font-size: clamp(28px, 5.5vw, 54px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(90deg, #e74c3c, #e67e22);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 18px);
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin: 0 auto 36px;
  line-height: 1.7;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(192,57,43,0.45);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(192,57,43,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 14px 30px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(6px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  justify-content: center;
  margin-top: 52px;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-stat-divider {
  width: 1px;
  background: rgba(255,255,255,0.15);
  align-self: stretch;
}

/* ─── SECTION COMMON ─── */
section {
  padding: 72px 20px;
}

.container {
  max-width: 1160px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--text-dark);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  max-width: 520px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 48px;
}

.section-header.centered {
  text-align: center;
}

.section-header.centered .section-desc {
  margin: 0 auto;
}

/* ─── SERVICES ─── */
#sluzby {
  background: var(--white);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 32px 24px;
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(192,57,43,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  transition: background 0.25s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(192,57,43,0.18), rgba(230,126,34,0.18));
}

.service-card h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 8px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─── PROC MY ─── */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, #2d1515 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 50% 60% at 100% 50%, rgba(192,57,43,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-title,
#proc-my .section-label {
  color: var(--white);
}

#proc-my .section-label {
  color: #f5a88a;
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(192,57,43,0.35);
  transform: translateY(-4px);
}

.benefit-number {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: var(--radius-sm);
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 18px;
}

.benefit-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.benefit-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
}

.benefit-icon-big {
  font-size: 28px;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}

.review-quote {
  font-size: 48px;
  line-height: 1;
  color: var(--primary);
  opacity: 0.15;
  font-family: Georgia, serif;
  margin-bottom: -10px;
  display: block;
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
}

.star {
  color: #f39c12;
  font-size: 16px;
}

.review-text {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, #c0392b, #e74c3c); }
.av2 { background: linear-gradient(135deg, #1a6b3a, #27ae60); }
.av3 { background: linear-gradient(135deg, #1a3a6b, #2980b9); }

.author-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dark);
}

.author-info span {
  font-size: 12px;
  color: var(--text-light);
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.contact-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-content strong {
  display: block;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.contact-item-content a {
  color: var(--primary);
  text-decoration: none;
  font-size: 18px;
  font-weight: 700;
  transition: color 0.2s;
}

.contact-item-content a:hover {
  color: var(--primary-dark);
}

.contact-item-content p {
  font-size: 15px;
  color: var(--text-dark);
  line-height: 1.5;
}

.map-placeholder {
  background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1.5px solid var(--border);
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(192,57,43,0.04), rgba(230,126,34,0.06));
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

.map-text {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-text strong {
  display: block;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 4px;
}

.map-text span {
  font-size: 13px;
  color: var(--text-light);
}

.map-grid-lines {
  position: absolute;
  inset: 0;
  opacity: 0.3;
}

.cta-box {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: var(--radius);
  padding: 36px 32px;
  color: var(--white);
  margin-top: 32px;
}

.cta-box h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 10px;
}

.cta-box p {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 20px
