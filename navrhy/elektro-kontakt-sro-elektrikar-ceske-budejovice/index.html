<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELEKTRO-kontakt s.r.o. – Elektrikář České Budějovice</title>
  <meta name="description" content="Profesionální elektrikář v Českých Budějovicích a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #f5c800;
      --primary-dark: #d4a900;
      --primary-light: #fff3b0;
      --dark: #0f1117;
      --dark-2: #181c26;
      --dark-3: #1e2330;
      --text: #e8eaf0;
      --text-muted: #9aa0b4;
      --white: #ffffff;
      --card-bg: #1e2330;
      --border: rgba(245,200,0,0.15);
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ── BANNER ── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(15,17,23,0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-cta-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-cta-nav:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--dark-2);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(245,200,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 10% 80%, rgba(245,200,0,0.06) 0%, transparent 50%),
        linear-gradient(160deg, #0f1117 0%, #181c26 50%, #0f1117 100%);
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,200,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,200,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 60px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,200,0,0.12);
      border: 1px solid rgba(245,200,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 20px;
      max-width: 780px;
    }

    .hero-content h1 span {
      color: var(--primary);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 700;
      font-size: 16px;
      padding: 15px 28px;
      border-radius: 10px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,200,0,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(245,200,0,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.06);
      color: var(--white);
      font-weight: 600;
      font-size: 16px;
      padding: 15px 28px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      transition: background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.11);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .hero-visual {
      display: none;
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 380px;
    }

    @media (min-width: 1024px) {
      .hero-visual {
        display: block;
      }
    }

    .hero-card-float {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }

    .hero-card-float-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(245,200,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .hero-card-float-text strong {
      display: block;
      color: var(--white);
      font-weight: 700;
      font-size: 15px;
    }

    .hero-card-float-text span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── SEKCE OBECNĚ ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.5rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--dark-2);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .sluzby-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .sluzba-karta {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(245,200,0,0.15);
      border-color: rgba(245,200,0,0.35);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: rgba(245,200,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: background 0.25s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: rgba(245,200,0,0.18);
    }

    .sluzba-karta h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .sluzba-karta .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .sluzba-karta:hover .sluzba-link {
      gap: 10px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--dark);
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .proc-my-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-karta {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-karta:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 36px rgba(245,200,0,0.12);
    }

    .benefit-number {
      font-size: 3rem;
      font-weight: 900;
      color: var(--primary);
      opacity: 0.25;
      line-height: 1;
      margin-bottom: 12px;
    }

    .benefit-icon-big {
      font-size: 44px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-karta h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-karta p {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--dark-2);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .reference-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .recenze-karta {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(245,200,0,0.1);
    }

    .hvezdicky {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .recenze-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.72;
      font-style: italic;
      margin-bottom: 20px;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(245,200,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      border: 2px solid rgba(245,200,0,0.2);
    }

    .autor-info strong {
      display: block;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
    }

    .autor-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: border-color 0.2s;
    }

    .kontakt-item:hover {
      border-color: rgba(245,200,0,0.35);
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,200,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .kontakt-item-text a,
    .kontakt-item-text span {
      font-size: 1.05rem;
      color: var(--white);
      font-weight: 600;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 15px;
    }

    .mapa-placeholder .mapa-emoji {
      font-size: 52px;
    }

    .mapa-placeholder strong {
      color: var(--white);
      font-size: 17px;
    }

    .mapa-placeholder p {
      font-size: 13px;
      text-align: center;
      max-width: 220px;
      line-height: 1.6;
    }

    /* ── CTA BANNER ── */
    .cta-banner {
      background: linear-gradient(135deg, rgba(245,200,0,0.12) 0%, rgba(245,200,0,0.04) 100%);
      border: 1px solid rgba(245,200,0,0.2);
      border-radius: var(--radius);
      padding: 48px 36px;
      text-align: center;
      margin-top:
