<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Znojmo 24/7 — Rychlý příjezd do 60 minut</title>
  <meta name="description" content="Profesionální instalatér ve Znojmě a okolí. Dostupný 24/7, příjezd do 60 minut. Oprava potrubí, instalace koupelen, výměna bojlerů, ústřední topení.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f8f;
      --primary-light: #2e86de;
      --accent: #f5a623;
      --accent-dark: #d4890d;
      --dark: #0d1b2a;
      --dark2: #1a2e45;
      --dark3: #243b55;
      --text: #2d3748;
      --text-light: #718096;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f7fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-phone-label {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      display: none;
    }

    .btn-nav-call {
      background: var(--accent);
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-nav-call:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .nav-badge {
      background: #22c55e;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 40%, var(--dark3) 70%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 60%;
      height: 200%;
      background: radial-gradient(ellipse, rgba(26,111,196,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 50%;
      height: 150%;
      background: radial-gradient(ellipse, rgba(245,166,35,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.4);
      color: #7ec8ff;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 30px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-green 1.5s infinite;
    }

    #hero h1 {
      font-size: clamp(26px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 42px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 50px;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,166,35,0.35);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,166,35,0.45);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: var(--radius);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      display: block;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      margin-top: 4px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SEKCE OBECNĚ ===== */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,196,0.15);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.25s;
      transform-origin: left;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-5px);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: var(--bg-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: var(--bg-light);
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      background: rgba(26,111,196,0.15);
      border-radius: 50%;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(13,27,42,0.25);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 14px;
      opacity: 0.9;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--white);
    }

    .benefit-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.7);
      line-height: 1.65;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 18px;
      display: block;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 30px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.7;
      margin-bottom: 16px;
      opacity: 0.3;
      font-family: Georgia, serif;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-stars {
      color: var(--accent);
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
    }

    .review-verified {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #22c55e;
      font-weight: 600;
      margin-top: 4px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      color: var(--white);
    }

    #kontakt .section-label {
      background: rgba(26,111,196,0.3);
      color: #7ec8ff;
      border-color: rgba(26,111,196,0.4);
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px;
      background: rgba(255,255,255,0.06);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.2s;
    }

    .kontakt-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.45);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value:hover {
      color: var(--accent);
    }

    .kontakt-item-note {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }

    .map-placeholder {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .map-header {
      background: rgba(26,111,196,0.4);
      padding: 16px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 30px;
      text-
