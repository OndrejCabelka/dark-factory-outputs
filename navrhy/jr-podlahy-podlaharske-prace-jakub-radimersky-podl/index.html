<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JR Podlahy – Podlahářské práce Jakub Radiměřský | Brno</title>
  <meta name="description" content="Profesionální podlahář v Brně a okolí. Pokládka podlah, laminát, vinyl, dřevo. Rychlý servis, kvalita garantována. Volejte 707 094 176.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a06a05;
      --primary-light: #f0a825;
      --accent: #e8960f;
      --dark: #1a1410;
      --dark-2: #2a1f14;
      --dark-3: #3a2c1c;
      --text: #1e1810;
      --text-light: #5c4a30;
      --text-muted: #8a7560;
      --white: #ffffff;
      --bg-light: #faf7f2;
      --bg-section: #f5f0e8;
      --border: #e8ddc8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(200,134,10,0.4);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(200,134,10,0.6);
    }

    .nav-cta span {
      font-size: 17px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1410 0%, #2e1f0a 40%, #3d2810 70%, #1a1410 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(200,134,10,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(200,134,10,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .hero-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          45deg,
          var(--primary-light) 0px,
          var(--primary-light) 1px,
          transparent 1px,
          transparent 40px
        ),
        repeating-linear-gradient(
          -45deg,
          var(--primary-light) 0px,
          var(--primary-light) 1px,
          transparent 1px,
          transparent 40px
        );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,134,10,0.2);
      border: 1px solid rgba(200,134,10,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--primary-light), #ffd06a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.75);
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,134,10,0.5);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(200,134,10,0.7);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200,134,10,0.15);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .hero-stat-label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(240,168,37,0.12));
      color: var(--primary);
      border: 1px solid rgba(200,134,10,0.25);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .section-title em {
      font-style: normal;
      color: var(--primary);
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 48px;
    }

    .section-head.center {
      text-align: center;
    }

    .section-head.center .section-desc {
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(240,168,37,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,134,10,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 28px;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
    }

    .benefit-card:hover {
      background: rgba(200,134,10,0.12);
      border-color: rgba(200,134,10,0.35);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 48px;
      font-weight: 900;
      color: var(--primary);
      opacity: 0.4;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
    }

    .benefit-icon {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 0.5;
      margin-bottom: 12px;
      display: block;
      opacity: 0.5;
    }

    .review-stars {
      color: var(--primary-light);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-city {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      transition: border-color 0.2s, background 0.2s;
    }

    .contact-item:hover {
      border-color: var(--primary);
      background: rgba(200,134,10,0.04);
    }

    .contact-item-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      border-radius: var(--radius);
      overflow: hidden;
      height: 320px;
      background: linear-gradient(135deg, #e8ddc8, #d4c4a0);
      border: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .map-placeholder-icon {
      font-size: 52px;
      opacity: 0.5;
    }

    .map-placeholder-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .map-placeholder-sub {
      font-size: 14px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ===== CTA BAND ===== */
    .cta-band {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
      padding: 60px 20px;
      text-align: center;
    }

    .cta-band h2 {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 800;
      color
