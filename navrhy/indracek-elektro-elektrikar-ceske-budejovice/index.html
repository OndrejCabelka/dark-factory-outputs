<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indráček elektro – Elektrikář České Budějovice</title>
  <meta name="description" content="Profesionální elektrikář v Českých Budějovicích a okolí. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte +420737744447">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5A800;
      --primary-dark: #D48C00;
      --primary-light: #FFD166;
      --dark: #0F1117;
      --dark-2: #1A1D27;
      --dark-3: #252836;
      --text-light: #E8EAF0;
      --text-muted: #9CA3AF;
      --white: #FFFFFF;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.18);
      --shadow-hover: 0 8px 40px rgba(245,168,0,0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      background: linear-gradient(135deg,#FF4D00,#ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
      position: relative;
      z-index: 1000;
    }
    #proposal-banner a {
      color: white;
      font-weight: bold;
    }

    /* ── HEADER / NAV ── */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(15,17,23,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,168,0,0.15);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(245,168,0,0.35);
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,168,0,0.5);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px 60px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,168,0,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(245,168,0,0.08) 0%, transparent 60%),
        linear-gradient(180deg, #0A0C12 0%, #0F1117 50%, #0A0C12 100%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 70% 60% at center, black 30%, transparent 75%);
    }

    .hero-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,168,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.3);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: -1px;
      color: var(--white);
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,168,0,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,168,0,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.18);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(245,168,0,0.1);
      border-color: rgba(245,168,0,0.5);
      color: var(--primary);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SECTION SHARED ── */
    section {
      padding: 90px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(245,168,0,0.12);
      border: 1px solid rgba(245,168,0,0.25);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.18;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 520px;
      margin-bottom: 52px;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--dark-2);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 600px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .sluzby-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .karta {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .karta:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,168,0,0.25);
    }

    .karta:hover::before {
      opacity: 1;
    }

    .karta-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,168,0,0.12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .karta:hover .karta-icon {
      background: rgba(245,168,0,0.22);
    }

    .karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .karta p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .karta-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-top: 18px;
      transition: gap 0.2s;
    }

    .karta-link:hover {
      gap: 9px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--dark);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .proc-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit {
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .benefit:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,168,0,0.2);
    }

    .benefit-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, rgba(245,168,0,0.15), rgba(245,168,0,0.05));
      border: 1.5px solid rgba(245,168,0,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 22px;
    }

    .benefit h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--dark-2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: transform 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      transform: translateY(-3px);
      border-color: rgba(245,168,0,0.2);
    }

    .stars {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: var(--dark);
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      font-size: 15px;
      color: var(--white);
      font-weight: 600;
    }

    .author-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 900px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: start;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 22px;
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }

    .kontakt-item:hover {
      border-color: rgba(245,168,0,0.25);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: rgba(245,168,0,0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .kontakt-item-text a,
    .kontakt-item-text span {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      overflow: hidden;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .mapa-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,168,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,168,0,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .mapa-pin {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .mapa-pin-dot {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size:
