<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sever Kamil Vaněk – Malíř natěřač Ústí nad Labem</title>
<meta name="description" content="Profesionální malíř natěřač v Ústí nad Labem. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Volejte 704 090 077.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8792a;
  --primary-dark: #c45e15;
  --primary-light: #f5a05a;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --white: #ffffff;
  --bg-light: #f8f6f3;
  --bg-card: #ffffff;
  --border: #e8e0d8;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-hover: 0 8px 40px rgba(232,121,42,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg-light);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: rgba(26, 26, 46, 0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}

.nav-links a:hover {
  color: var(--white);
  background: rgba(255,255,255,0.08);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-call-nav {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 9px 18px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(232,121,42,0.3);
}

.btn-call-nav:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(232,121,42,0.45);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #1c2a45 70%, #2a1810 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(232,121,42,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(232,121,42,0.10) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--bg-light);
  clip-path: ellipse(55% 100% at 50% 100%);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(232,121,42,0.18);
  border: 1px solid rgba(232,121,42,0.35);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
}

.hero-content h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.18;
  margin-bottom: 22px;
  letter-spacing: -0.5px;
}

.hero-content h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2.2vw, 20px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 40px;
  font-weight: 400;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.55;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  transition: transform 0.22s, box-shadow 0.22s;
  box-shadow: 0 4px 20px rgba(232,121,42,0.4);
  letter-spacing: 0.3px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(232,121,42,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  transition: background 0.22s, border-color 0.22s, transform 0.22s;
  backdrop-filter: blur(6px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  display: block;
  font-size: 30px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* ===== SECTION COMMON ===== */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(24px, 3.5vw, 40px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 14px;
  line-height: 1.22;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.65;
  margin-bottom: 50px;
}

.section-header-center {
  text-align: center;
}

.section-header-center .section-desc {
  margin-left: auto;
  margin-right: auto;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,121,42,0.2);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(232,121,42,0.12), rgba(232,121,42,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: background 0.25s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(232,121,42,0.22), rgba(232,121,42,0.12));
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14.5px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(232,121,42,0.1) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-label {
  color: var(--primary-light);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.55);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  position: relative;
  overflow: hidden;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(232,121,42,0.3);
  transform: translateY(-4px);
}

.benefit-num {
  font-size: 52px;
  font-weight: 800;
  color: rgba(232,121,42,0.15);
  position: absolute;
  top: 16px;
  right: 22px;
  line-height: 1;
  font-family: 'Inter', system-ui;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 18px;
  display: block;
}

.benefit-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 14.5px;
  color: rgba(255,255,255,0.58);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.1);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.star {
  color: #f5a623;
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.68;
  margin-bottom: 22px;
  font-style: italic;
  position: relative;
}

.review-text::before {
  content: '"';
  font-size: 60px;
  color: rgba(232,121,42,0.12);
  font-family: Georgia, serif;
  line-height: 0;
  position: absolute;
  top: 18px;
  left: -8px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.review-author-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
}

.review-author-info span {
  font-size: 13px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 28px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
}

.contact-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(232,121,42,0.12), rgba(232,121,42,0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-item-text strong {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.contact-item-text a {
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-text a:hover {
  color: var(--primary-dark);
}

.contact-item-text p {
  font-size: 16px;
  color: var(--text);
  font-weight: 500;
}

.kontakt-map {
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.map-placeholder {
  background: linear-gradient(135deg, #e8f0fe, #f0e8fe);
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border-radius: var(--radius-lg);
  border: 2px dashed rgba(100,100,200,0.2);
}

.map-placeholder-icon {
  font-size: 48px;
}

.map-placeholder p {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark3);
}

.map-placeholder span {
  font-size: 14px;
  color: var(--text-light);
}

.cta-box {
  margin-top: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  text-align: center;
}

.cta-box p {
  color: rgba(255,255,255,0.85);
  font-size: 15px;
  margin-bottom: 16px;
}

.cta-box h3 {
  color: var(--white);
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
}

.btn-white {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  color: var(--primary-dark);
  text-decoration: none;
  padding: 13px 26px;
  border-radius: 50px;
  font-size
