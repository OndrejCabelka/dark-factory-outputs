<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařství Praha – Krovové konstrukce, Střechy, Dřevostavby</title>
<meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, opravy krovů, dřevěné altány, pergoly a dřevostavby. Volejte 774 637 945.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8860a;
  --primary-dark: #a06a05;
  --primary-light: #e9a82e;
  --dark: #1a1208;
  --dark2: #2c1f08;
  --dark3: #3d2d10;
  --text: #1a1208;
  --text-light: #5a4a2a;
  --bg: #fdfaf4;
  --bg2: #f5edd8;
  --white: #ffffff;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
  --radius: 14px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.35);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-text span:first-child {
  font-size: 17px;
  font-weight: 800;
  color: var(--primary-light);
  letter-spacing: -0.3px;
}

.logo-text span:last-child {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.btn-nav {
  background: var(--primary);
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700 !important;
  font-size: 14px !important;
  text-decoration: none;
  transition: background 0.2s, transform 0.1s !important;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-nav:hover {
  background: var(--primary-dark) !important;
  transform: translateY(-1px);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
}

/* ===== HERO ===== */
#hero {
  background:
    linear-gradient(160deg, rgba(15,8,2,0.91) 0%, rgba(40,22,3,0.82) 50%, rgba(15,8,2,0.93) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(200,134,10,0.04) 0px,
      rgba(200,134,10,0.04) 2px,
      transparent 2px,
      transparent 12px
    );
  background-color: #1a1208;
  min-height: 92vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -120px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(200,134,10,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 380px;
  height: 380px;
  background: radial-gradient(circle, rgba(200,134,10,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  width: 100%;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,134,10,0.18);
  border: 1px solid rgba(200,134,10,0.35);
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

h1 {
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

h1 .highlight {
  color: var(--primary-light);
  position: relative;
  display: inline-block;
}

.hero-sub {
  font-size: clamp(1rem, 2vw, 1.18rem);
  color: rgba(255,255,255,0.72);
  margin-bottom: 36px;
  max-width: 520px;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 44px;
}

.btn-primary {
  background: var(--primary);
  color: var(--white);
  padding: 15px 30px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(200,134,10,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(200,134,10,0.45);
}

.btn-secondary {
  background: transparent;
  color: var(--white);
  padding: 15px 30px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary-light);
  background: rgba(200,134,10,0.10);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-visual {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-card-visual {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(200,134,10,0.25);
  border-radius: 20px;
  padding: 36px;
  backdrop-filter: blur(10px);
  width: 100%;
  max-width: 380px;
}

.visual-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(200,134,10,0.2);
}

.visual-icon-big {
  font-size: 48px;
  line-height: 1;
}

.visual-header-text h3 {
  color: var(--white);
  font-size: 18px;
  font-weight: 700;
}

.visual-header-text p {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}

.visual-items {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.visual-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(200,134,10,0.10);
  border-radius: 10px;
  border: 1px solid rgba(200,134,10,0.15);
}

.visual-item-icon {
  font-size: 20px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(200,134,10,0.2);
  border-radius: 8px;
  flex-shrink: 0;
}

.visual-item-text {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 88px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
  background: rgba(200,134,10,0.10);
  padding: 6px 14px;
  border-radius: 50px;
  margin-bottom: 16px;
  border: 1px solid rgba(200,134,10,0.2);
}

.section-title {
  font-size: clamp(1.8rem, 3.5vw, 2.7rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-title .accent {
  color: var(--primary);
}

.section-sub {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 580px;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--white);
}

.sluzby-header {
  text-align: center;
  margin-bottom: 56px;
}

.sluzby-header .section-sub {
  margin: 0 auto;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 36px 30px;
  border: 1px solid rgba(200,134,10,0.12);
  box-shadow: var(--card-shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-karta:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(200,134,10,0.18);
  border-color: rgba(200,134,10,0.3);
}

.sluzba-karta:hover::before {
  transform: scaleX(1);
}

.karta-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(200,134,10,0.15), rgba(200,134,10,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  border: 1px solid rgba(200,134,10,0.2);
}

.karta-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.karta-text {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

.karta-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s;
}

.karta-link:hover {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,134,10,0.08) 0%, transparent 65%);
  pointer-events: none;
}

.proc-my-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: center;
}

.proc-my-left .section-title {
  color: var(--white);
}

.proc-my-left .section-sub {
  color: rgba(255,255,255,0.55);
}

.proc-my-cta {
  margin-top: 32px;
}

.benefity-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.benefit {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 26px;
  background: rgba(255,255,255,0.04);
  border-radius: var(--radius);
  border: 1px solid rgba(200,134,10,0.15);
  transition: background 0.25s, border-color 0.25s, transform 0.2s;
}

.benefit:hover {
  background: rgba(200,134,10,0.08);
  border-color: rgba(200,134,10,0.3);
  transform: translateX(4px);
}

.benefit-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(200,134,10,0.35);
}

.benefit-text h3 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.benefit-text p {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg2);
}

.reference-header {
  text-align: center;
  margin-bottom: 52px;
}

.reference-header .section-sub {
  margin: 0 auto;
}

.recenze-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--card-shadow);
  border: 1px solid rgba(200,134,10,0.10);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 36px rgba(200,134,10,0.15);
}

.recenze-quote {
  font-size: 48px;
  line-height: 0.8;
  color: var(--primary-light);
  opacity: 0.4;
  font-family: Georgia, serif;
  margin-bottom: 14px;
}

.recenze-hvezdy {
  display: flex;
  gap: 4px;
  margin-bottom: 14px;
}

.hvezda {
  color: var(--primary-light);
  font-size: 18px;
}

.recenze-text {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-top: 18px;
  border-top: 1px solid rgba(200,134,10,0.12);
}

.autor-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}

.autor-info strong {
  display: block;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
}

.autor-info span {
  font-size: 12px;
  color: var(--text-light);
}

.recenze-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(200,134,10,0.12);
  border: 1px solid rgba(200,134,10,0.2);
  color: var(--primary);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
