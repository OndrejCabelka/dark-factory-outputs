<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podlahy Brno – Profesionální pokládka a rekonstrukce podlah</title>
  <meta name="description" content="Profesionální pokládka a rekonstrukce podlah v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte +420608888715">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-light: #e8a020;
      --primary-dark: #a06808;
      --dark: #1a1208;
      --dark-2: #2a1e0e;
      --dark-3: #3a2a14;
      --text: #2c1f0a;
      --text-light: #6b5a3e;
      --text-muted: #9a8570;
      --white: #ffffff;
      --off-white: #fdf8f0;
      --card-bg: #fffdf8;
      --border: #e8dcc8;
      --shadow: rgba(200, 134, 10, 0.15);
      --shadow-dark: rgba(26, 18, 8, 0.2);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--off-white);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ========== NAVBAR ========== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(200,134,10,0.3);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,134,10,0.4);
    }

    .nav-phone-icon {
      font-size: 16px;
    }

    /* ========== HERO ========== */
    #hero {
      background: linear-gradient(135deg, #1a1208 0%, #2e1c06 30%, #4a2e0a 60%, #3a2408 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(200,134,10,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(232,160,32,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(160,104,8,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
    }

    .hero-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03;
      background-image: 
        repeating-linear-gradient(
          45deg,
          #c8860a 0px,
          #c8860a 2px,
          transparent 2px,
          transparent 20px
        ),
        repeating-linear-gradient(
          -45deg,
          #c8860a 0px,
          #c8860a 2px,
          transparent 2px,
          transparent 20px
        );
      pointer-events: none;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,134,10,0.2);
      border: 1px solid rgba(200,134,10,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), #f0c060);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(200,134,10,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(200,134,10,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary-light);
      display: block;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* ========== SECTION SHARED ========== */
    .section-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,134,10,0.1);
      border: 1px solid rgba(200,134,10,0.25);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ========== SERVICES ========== */
    #sluzby {
      padding: 80px 20px;
      background: var(--off-white);
    }

    .sluzby-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.35s ease;
      transform-origin: left;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px var(--shadow-dark);
      border-color: rgba(200,134,10,0.3);
    }

    .sluzba-card:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(232,160,32,0.18));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    .sluzba-card:hover .sluzba-icon {
      transform: scale(1.1);
    }

    .sluzba-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ========== PROC MY ========== */
    #proc-my {
      padding: 80px 20px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,134,10,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .proc-my-container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #proc-my .section-tag {
      background: rgba(200,134,10,0.2);
      border-color: rgba(200,134,10,0.4);
      color: var(--primary-light);
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,134,10,0.2);
      border-radius: 20px;
      padding: 36px 32px;
      transition: all 0.35s ease;
    }

    .benefit-card:hover {
      background: rgba(200,134,10,0.08);
      border-color: rgba(200,134,10,0.4);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(200,134,10,0.2);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .benefit-emoji {
      font-size: 36px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ========== REFERENCE ========== */
    #reference {
      padding: 80px 20px;
      background: var(--off-white);
    }

    .reference-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .recenze-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      transition: all 0.35s ease;
      position: relative;
    }

    .recenze-card::before {
      content: '"';
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 80px;
      font-weight: 900;
      color: rgba(200,134,10,0.1);
      line-height: 1;
      font-family: Georgia, serif;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px var(--shadow);
      border-color: rgba(200,134,10,0.25);
    }

    .stars {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .author-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .author-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ========== KONTAKT ========== */
    #kontakt {
      padding: 80px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #kontakt::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 0% 100%, rgba(200,134,10,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 0%, rgba(200,134,10,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .kontakt-container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #kontakt .section-tag {
      background: rgba(200,134,10,0.2);
      border-color: rgba(200,134,10,0.4);
      color: var(--primary-light);
    }

    #kontakt .section-header h2 {
      color: var(--white);
    }

    #kontakt .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,134,10,0.2);
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .kontakt-item:hover {
      background: rgba(200,134,10,0.08);
      border-color: rgba(200,134,10,0.4);
    }

    .kontakt-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(200,134,10,0.2), rgba(232,160,32,0.25));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink
