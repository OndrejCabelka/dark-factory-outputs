<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vladimír Jírů, S.r.o. – Tepelné Izolace & Pokrývač | České Budějovice</title>
  <meta name="description" content="Profesionální pokrývač v Českých Budějovicích. Pokládka střešní krytiny, opravy střech, tepelná izolace, střechy na klíč, vikýře. Volejte +420387330371.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2c2c2c;
      --text-light: #5a5a5a;
      --text-muted: #888;
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --bg-warm: #fdf6f0;
      --border: #e8e8e8;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER ===================== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 4px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }

    .btn-call-header {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(192,57,43,0.35);
    }

    .btn-call-header:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.45);
    }

    .btn-call-header .phone-icon {
      font-size: 16px;
    }

    /* ===================== HERO ===================== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(192,57,43,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(230,126,34,0.10) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(192,57,43,0.08) 0%, transparent 40%);
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-roof-silhouette {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-roof-silhouette svg {
      width: 100%;
      height: 100%;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 80px 24px 200px;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.35);
      color: #ff8a80;
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      background: #ff6b6b;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #ff6b6b, #ffa07a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.70);
      font-weight: 400;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 6px 25px rgba(192,57,43,0.4);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-number span {
      color: #ff8a80;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===================== SECTIONS COMMON ===================== */
    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.65;
    }

    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    /* ===================== SLUZBY ===================== */
    #sluzby {
      padding: 100px 24px;
      background: var(--bg-light);
    }

    .sluzby-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.15);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: all 0.3s;
    }

    .sluzba-karta:hover .sluzba-icon-wrap {
      background: linear-gradient(135deg, rgba(192,57,43,0.18), rgba(230,126,34,0.18));
      transform: scale(1.05);
    }

    .sluzba-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .sluzba-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .sluzba-link:hover {
      gap: 10px;
    }

    /* ===================== PROC MY ===================== */
    #proc-my {
      padding: 100px 24px;
      background: var(--white);
    }

    .proc-my-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-karta {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .benefit-karta::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .benefit-karta:hover {
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,100,100,0.7);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 18px;
    }

    .benefit-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-title {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .benefit-text {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.65;
    }

    .benefit-karta-accent {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    /* ===================== REFERENCE ===================== */
    #reference {
      padding: 100px 24px;
      background: var(--bg-warm);
    }

    .reference-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .recenze-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      transition: all 0.3s;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-uvozovky {
      font-size: 60px;
      line-height: 1;
      color: rgba(192,57,43,0.12);
      font-family: Georgia, serif;
      margin-bottom: -16px;
      display: block;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-footer {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .recenze-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
    }

    .recenze-lokace {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .recenze-hvezdicky {
      margin-left: auto;
      font-size: 16px;
      letter-spacing: 1px;
    }

    /* ===================== KONTAKT ===================== */
    #kontakt {
      padding: 100px 24px;
      background: var(--dark);
      color: var(--white);
    }

    .kontakt-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.6);
    }

    #kontakt .section-tag {
      background: rgba(192,57,43,0.2);
      color: #ff8a80;
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding
