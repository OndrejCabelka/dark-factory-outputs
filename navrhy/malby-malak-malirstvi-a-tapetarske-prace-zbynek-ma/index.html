<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malby Malák – Malíř natěrač Ústí nad Labem | Zbyněk Malák</title>
  <meta name="description" content="Profesionální malíř natěrač v Ústí nad Labem a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Volejte +420 702 883 037.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8640a;
      --primary-dark: #c4520a;
      --primary-light: #f5813a;
      --accent: #f0a040;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --bg-light: #fafafa;
      --bg-section: #f5f5f0;
      --white: #ffffff;
      --border: #e8e8e8;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(232,100,10,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== PROPOSAL BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      border-bottom: 3px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(232,100,10,0.30);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(232,100,10,0.40);
    }

    .nav-cta span {
      font-size: 17px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,100,10,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(240,160,64,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,100,10,0.20);
      border: 1px solid rgba(232,100,10,0.40);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.80);
      max-width: 580px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 6px 28px rgba(232,100,10,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(232,100,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.30);
      color: var(--white);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-top: 52px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .hero-stat-label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.60);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      margin-top: 2px;
    }

    .hero-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,100,10,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,100,10,0.12), rgba(240,160,64,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-list {
      list-style: none;
      margin-top: 14px;
    }

    .service-list li {
      font-size: 14px;
      color: var(--text-light);
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-list li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--bg-section);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(232,100,10,0.30);
    }

    .benefit-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCES ===== */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(232,100,10,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(232,100,10,0.25);
      color: var(--accent);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      backdrop-filter: blur(12px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.11);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: var(--primary);
      line-height: 0.5;
      display: block;
      margin-bottom: 10px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .reviewer-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .reviewer-location {
      font-size: 13px;
      color: rgba(255,255,255,0.50);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-section);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info-block {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .contact-item:first-child {
      padding-top: 0;
    }

    .contact-icon-wrap {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(232,100,10,0.12), rgba(240,160,64,0.10));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .contact-value-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      height: 100%;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .map-inner {
      flex: 1;
      background: linear-gradient(145deg, #e8edf5 0%, #dce4f0 50%, #cdd8ed 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
      text-align: center;
    }

    .map-pin {
      font-size: 52px;
      filter: drop-shadow(0 4px 12px rgba(232,100,10,0.35));
    }

    .map-city {
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .map-address {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .map-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 50px;
      font-size
