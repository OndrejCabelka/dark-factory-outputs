<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zednické práce Přerov | Profesionální zedník</title>
<meta name="description" content="Profesionální zednické práce v Přerově a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte 603 518 002.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8730a;
  --primary-dark: #a05a06;
  --primary-light: #e8891e;
  --dark: #1a1410;
  --dark2: #2a1f14;
  --dark3: #3a2a1a;
  --text: #1a1410;
  --text-muted: #6b5a4a;
  --white: #ffffff;
  --light-bg: #fdf8f3;
  --light-bg2: #f5ede2;
  --border: #e8d8c8;
  --shadow: 0 4px 24px rgba(200,115,10,0.12);
  --shadow-lg: 0 8px 40px rgba(200,115,10,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 20, 16, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(200,115,10,0.2);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(200,115,10,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(200,115,10,0.5);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #0f0a06 0%, #1e1208 30%, #2d1a08 60%, #1a0f04 100%);
  overflow: hidden;
  padding: 80px 20px;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(200,115,10,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(232,137,30,0.08) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(160,90,6,0.1) 0%, transparent 45%);
  pointer-events: none;
}

.hero-grid-pattern {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,115,10,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,115,10,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-brick-accent {
  position: absolute;
  right: -80px;
  top: 50%;
  transform: translateY(-50%);
  width: 420px;
  height: 420px;
  opacity: 0.04;
  pointer-events: none;
  font-size: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,115,10,0.15);
  border: 1px solid rgba(200,115,10,0.3);
  color: var(--primary-light);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  margin-bottom: 28px;
}

.hero-badge span {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: var(--primary-light);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.hero h1 {
  font-size: clamp(2.2rem, 5.5vw, 4rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
  max-width: 800px;
}

.hero h1 .highlight {
  background: linear-gradient(135deg, var(--primary-light), #f5a940);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1.05rem, 2.2vw, 1.25rem);
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.65;
  font-weight: 400;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(200,115,10,0.45);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(200,115,10,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
  letter-spacing: -1px;
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.hero-stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.12);
  align-self: center;
}

/* ===== SECTION COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(200,115,10,0.1);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 14px;
  border: 1px solid rgba(200,115,10,0.2);
}

.section-title {
  font-size: clamp(1.7rem, 3.5vw, 2.5rem);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 96px 20px;
  background: var(--light-bg);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,115,10,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(200,115,10,0.3);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(200,115,10,0.12), rgba(232,137,30,0.18));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(200,115,10,0.2);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 0.925rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.service-card .service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-weight: 600;
  font-size: 13px;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 96px 20px;
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--light-bg);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  border: 1.5px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.benefit-number {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 5rem;
  font-weight: 900;
  color: rgba(200,115,10,0.07);
  line-height: 1;
  letter-spacing: -3px;
}

.benefit-icon {
  font-size: 2.5rem;
  margin-bottom: 18px;
  display: block;
}

.benefit-card h3 {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 0.95rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.benefit-highlight {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin-top: 16px;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 20px;
  background: linear-gradient(135deg, #1a1410 0%, #2d1a08 50%, #1a1410 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 10% 50%, rgba(200,115,10,0.08) 0%, transparent 50%),
    radial-gradient(circle at 90% 50%, rgba(200,115,10,0.06) 0%, transparent 50%);
  pointer-events: none;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(200,115,10,0.2);
  color: var(--primary-light);
  border-color: rgba(200,115,10,0.3);
}

#reference .section-desc {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 2;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  backdrop-filter: blur(4px);
  transition: transform 0.3s, background 0.3s;
}

.review-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.08);
  border-color: rgba(200,115,10,0.3);
}

.review-stars {
  color: #fbbf24;
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.975rem;
  color: rgba(255,255,255,0.78);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 2rem;
  color: var(--primary);
  line-height: 0;
  vertical-align: -14px;
  margin-right: 4px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
  flex-shrink: 0;
}

.review-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 14px;
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 96px 20px;
  background: var(--light-bg);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-title {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.contact-desc {
  font-size: 1rem;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 8px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px 22px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  border-color: rgba(200,115,10,0.3);
  box-shadow: var(--shadow);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(200,115,10,0.12), rgba(232,137,30,0.18));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  border: 1px solid rgba(200,115,10,0.2);
}

.contact-item-content {
  display: flex;
  flex-
