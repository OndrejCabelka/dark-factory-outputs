<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výtahy VOTO s.r.o. | Servis výtahů Praha</title>
  <meta name="description" content="Profesionální servis výtahů v Praze a okolí. Rychlý zásah, kvalita garantována, přijatelné ceny. Volejte +420257323482">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f91;
      --primary-light: #2d8de8;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark-2: #132336;
      --dark-3: #1c3150;
      --text-light: #e8f0f8;
      --text-muted: #8aacc8;
      --white: #ffffff;
      --gray-light: #f4f7fb;
      --gray-mid: #d1e0f0;
      --shadow: 0 4px 24px rgba(15, 79, 145, 0.13);
      --shadow-hover: 0 8px 40px rgba(15, 79, 145, 0.22);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: var(--dark);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ───── BANNER ───── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ───── HEADER / NAV ───── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid rgba(45, 141, 232, 0.2);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px !important;
      font-weight: 700 !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 4px 15px rgba(26, 111, 196, 0.4);
      white-space: nowrap;
    }

    .btn-nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 111, 196, 0.5) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-logo-name {
        font-size: 14px;
      }
      .nav-logo-sub {
        font-size: 10px;
      }
    }

    /* ───── HERO ───── */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0f3260 40%, #1a5fa0 75%, #0d2a50 100%);
      position: relative;
      overflow: hidden;
      padding: 100px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(45,141,232,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26, 111, 196, 0.25);
      border: 1px solid rgba(45, 141, 232, 0.35);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-light);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      opacity: 0.9;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 25px rgba(26, 111, 196, 0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(26, 111, 196, 0.6);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 40px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ───── SECTION COMMON ───── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26, 111, 196, 0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: #5a7a99;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ───── SLUZBY ───── */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26, 111, 196, 0.08);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26, 111, 196, 0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(45,141,232,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: #6b8aab;
      line-height: 1.65;
    }

    /* ───── PROC MY ───── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0d1b2a 0%, #132336 50%, #0f3260 100%);
      opacity: 0.8;
    }

    #proc-my .container {
      position: relative;
      z-index: 2;
    }

    #proc-my .section-tag {
      background: rgba(45, 141, 232, 0.15);
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: var(--text-muted);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(45, 141, 232, 0.15);
      border-radius: var(--radius);
      padding: 38px 30px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(26, 111, 196, 0.1);
      border-color: rgba(45, 141, 232, 0.35);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 44px;
      font-weight: 900;
      color: rgba(45, 141, 232, 0.25);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .benefit-icon {
      font-size: 32px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ───── REFERENCE ───── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--gray-light);
      border-radius: var(--radius);
      padding: 34px 28px;
      border: 1px solid var(--gray-mid);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      opacity: 0.35;
      font-weight: 900;
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #4a6580;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-author-info span {
      font-size: 12px;
      color: #8aacc8;
    }

    /* ───── KONTAKT ───── */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,111,196,0.08);
      display: flex;
      align-items: flex-start;
      gap: 18px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(45,141,232,0.15));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-body strong {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .kontakt-item-body a,
    .kontakt-item-body p {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      transition: color 0.2s;
      line-height: 1.5;
    }

    .kontakt-item-body a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(26,111,196,0.08);
      height: 100%;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
    }

    .mapa-inner {
      background: linear-gradient(135deg, #e8f0fb, #d0e4f5);
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      text-align: center;
      min-height: 350px;
    }

    .mapa-pin {
      font-size: 52px;
      filter: drop-shadow(0 4px 10px rgba(26,111,196,0.3));
