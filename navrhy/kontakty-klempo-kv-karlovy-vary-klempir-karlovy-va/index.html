<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #1358a0;
  --primary-light: #2d84e0;
  --accent: #f0a500;
  --dark: #0d1b2a;
  --dark-secondary: #132233;
  --text: #1a2332;
  --text-light: #4a5568;
  --text-muted: #718096;
  --white: #ffffff;
  --bg-light: #f5f8fc;
  --bg-card: #ffffff;
  --border: #e2e8f0;
  --shadow: 0 4px 20px rgba(26,111,196,0.10);
  --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {

}

body {

a {

}

img {

/* BANNER */

}

}

  bottom: 0; left: 0; right: 0;

}

.btn-secondary:hover {

.hero-stat {

}

.hero-stat-label {

}

}

section {

.container {

}

.section-title {

  font-size: 1.05rem;

/* SERVICES */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,196,0.2);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(26,111,196,0.18));

  align-items: center;

  font-size: 1.8rem;

.service-card p {

}

.service-tag {

  font-weight: 600;

  border-radius: 50px;
}
