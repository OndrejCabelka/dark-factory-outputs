<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Praha – Topenář – Plynař Praha a okolí</title>
  <meta name="description" content="Profesionální instalatér, topenář a plynař v Praze a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420774486617.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fba;
      --primary-dark: #145896;
      --primary-light: #2d8de0;
      --accent: #f59e0b;
      --dark: #0d1b2e;
      --dark-2: #132236;
      --dark-3: #1c3352;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26, 111, 186, 0.10);
      --shadow-hover: 0 8px 40px rgba(26, 111, 186, 0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text span:first-child {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-text span:last-child {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(26, 111, 186, 0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 111, 186, 0.5);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #0d1b2e 0%, #0f2845 40%, #1a4a7a 80%, #1e5a8e 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 60%;
      height: 200%;
      background: radial-gradient(ellipse, rgba(26, 111, 186, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -40%;
      right: -10%;
      width: 50%;
      height: 150%;
      background: radial-gradient(ellipse, rgba(45, 141, 224, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26, 111, 186, 0.2);
      border: 1px solid rgba(45, 141, 224, 0.4);
      color: #7ec8f5;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .hero-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #5eb8ff, #90d5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(15px, 2.5vw, 19px);
      color: #a8c8e8;
      max-width: 580px;
      margin: 0 auto 36px;
      position: relative;
      z-index: 1;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      position: relative;
      z-index: 1;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(26, 111, 186, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(26, 111, 186, 0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 13px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #7aadce;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ── SECTIONS COMMON ── */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-tag {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 12px;
      border: 1px solid rgba(26, 111, 186, 0.15);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-subtitle {
      font-size: 16px;
      color: var(--text-light);
      max-width: 540px;
    }

    /* ── SLUZBY ── */
    #sluzby {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .sluzby-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .sluzby-header .section-subtitle {
      margin: 0 auto;
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26, 111, 186, 0.2);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--bg-light), #dbeafe);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: var(--bg-light);
      padding: 3px 10px;
      border-radius: 50px;
    }

    .sluzba-karta.featured {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: transparent;
      color: white;
    }

    .sluzba-karta.featured h3,
    .sluzba-karta.featured p {
      color: rgba(255,255,255,0.95);
    }

    .sluzba-karta.featured p {
      color: rgba(255,255,255,0.75);
    }

    .sluzba-karta.featured .sluzba-icon {
      background: rgba(255,255,255,0.15);
    }

    .sluzba-karta.featured .sluzba-tag {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .sluzba-karta.featured:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--dark-3));
    }

    /* ── PROC MY ── */
    #proc-my {
      padding: 80px 20px;
      background: var(--white);
    }

    .proc-my-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .proc-my-left .section-title {
      margin-bottom: 20px;
    }

    .proc-my-left .section-subtitle {
      margin-bottom: 30px;
    }

    .proc-my-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      text-decoration: none;
      padding: 13px 26px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 18px rgba(26,111,186,0.35);
    }

    .proc-my-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(26,111,186,0.5);
    }

    .benefity-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .benefit-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 22px 24px;
      border: 1px solid rgba(26, 111, 186, 0.08);
      transition: all 0.3s ease;
    }

    .benefit-item:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow);
      border-color: rgba(26, 111, 186, 0.2);
    }

    .benefit-icon-wrap {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .benefit-text h4 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ── REFERENCE ── */
    #reference {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .reference-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .reference-header .section-subtitle {
      margin: 0 auto;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 30px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0.3;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: var(--accent);
      font-size: 17px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-author-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    .google-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 11px;
      color: var(--text-light);
      background: var(--bg-light);
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }

    /* ── KONTAKT ── */
    #kontakt {
      padding: 80px 20px;
      background: var(--dark);
    }

    .kontakt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: start;
    }

    .kontakt-left .section-tag {
      background: rgba(26, 111, 186, 0.15);
      color: #7ec8f5;
      border-color: rgba(45, 141, 224, 0.3);
    }

    .kontakt-left .section-title {
      color: var(--white);
      margin-bottom: 16px;
    }

    .kontakt-left .section-subtitle {
      color: #a8c8e8;
      margin-bottom: 36px;
    }

    .kontakt-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kontakt-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,
