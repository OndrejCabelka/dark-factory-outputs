<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství a podlahářství Marek Koutný – Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4423;
      --primary-light: #C4895A;
      --accent: #D4A05A;
      --accent-light: #F0C880;
      --dark: #1A1209;
      --dark-2: #2C1F10;
      --dark-3: #3D2B18;
      --text: #2C1F10;
      --text-light: #6B5744;
      --text-muted: #9C8070;
      --white: #FFFFFF;
      --bg-light: #FAF6F1;
      --bg-card: #FFFFFF;
      --border: #E8D5C0;
      --shadow: 0 4px 24px rgba(139,94,60,0.10);
      --shadow-hover: 0 8px 40px rgba(139,94,60,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: rgba(26, 18, 9, 0.97);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 1px solid rgba(212,160,90,0.2);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s !important;
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid rgba(212,160,90,0.3);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,94,60,0.4);
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(135deg, rgba(26,18,9,0.92) 0%, rgba(44,31,16,0.85) 40%, rgba(61,43,24,0.78) 100%),
        url("data:image/svg+xml,%3Csvg width='800' height='600' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='800' height='600' fill='%23654321'/%3E%3Crect x='0' y='0' width='800' height='8' fill='%23543210' opacity='0.4'/%3E%3Crect x='0' y='16' width='800' height='4' fill='%23765432' opacity='0.3'/%3E%3Crect x='0' y='28' width='800' height='6' fill='%23543210' opacity='0.35'/%3E%3Crect x='0' y='42' width='800' height='3' fill='%23876543' opacity='0.25'/%3E%3Crect x='0' y='53' width='800' height='7' fill='%23543210' opacity='0.4'/%3E%3Crect x='0' y='68' width='800' height='5' fill='%23654321' opacity='0.3'/%3E%3Crect x='0' y='81' width='800' height='9' fill='%23432100' opacity='0.45'/%3E%3Crect x='0' y='98' width='800' height='4' fill='%23765432' opacity='0.3'/%3E%3Crect x='0' y='110' width='800' height='6' fill='%23543210' opacity='0.35'/%3E%3C/svg%3E") center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,94,60,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,160,90,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-wood-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 18px,
          rgba(139,94,60,0.06) 18px,
          rgba(139,94,60,0.06) 20px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(212,160,90,0.03) 60px,
          rgba(212,160,90,0.03) 62px
        );
      pointer-events: none;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,160,90,0.15);
      border: 1px solid rgba(212,160,90,0.3);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 68px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 780px;
    }

    #hero h1 .highlight {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-cta-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(139,94,60,0.35);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,94,60,0.5);
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ===== SECTION SHARED ===== */
    section {
      padding: 80px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(139,94,60,0.12), rgba(212,160,90,0.12));
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
      border: 1px solid rgba(139,94,60,0.15);
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--white);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      border-radius: 3px 3px 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.2);
      background: var(--white);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,94,60,0.1), rgba(212,160,90,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 24px;
      border: 1px solid rgba(139,94,60,0.12);
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
      color: var(--primary-dark);
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(139,94,60,0.04) 28px,
          rgba(139,94,60,0.04) 30px
        );
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-tag {
      background: rgba(212,160,90,0.15);
      color: var(--accent);
      border-color: rgba(212,160,90,0.2);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,160,90,0.12);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(212,160,90,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(212,160,90,0.25);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(212,160,90,0.2);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.2);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 20px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15.5px;
      color: var(--text-light);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-text::before {
      content: '\201E';
      font-size: 48px;
      color: var(--border);
      line-height: 0;
      vertical-align: -20px;
      margin-right: 4px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .reviewer-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size:
