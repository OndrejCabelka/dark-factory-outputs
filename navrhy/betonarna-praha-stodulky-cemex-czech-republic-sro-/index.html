<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betonárna Praha - Stodůlky | Cemex Czech Republic, s.r.o.</title>
  <meta name="description" content="Profesionální betonář v Praze a okolí. Cemex Czech Republic, s.r.o. - kvalitní beton, rychlý servis, přijatelné ceny.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E65C00;
      --primary-dark: #bf4a00;
      --primary-light: #ff7a2e;
      --secondary: #1a1a2e;
      --secondary-light: #16213e;
      --accent: #f0a500;
      --text-dark: #1a1a2e;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --bg-light: #f8f7f4;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== PROPOSAL BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .nav-logo-main {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .nav-logo-sub {
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nav-logo-accent {
      color: var(--primary-light);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700 !important;
      font-size: 0.875rem !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 4px 15px rgba(230, 92, 0, 0.4);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(230, 92, 0, 0.5) !important;
    }

    .nav-menu-hidden {
      display: none;
    }

    /* ===== HERO SECTION ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(10, 10, 20, 0.92) 0%, rgba(26, 26, 46, 0.88) 50%, rgba(50, 25, 0, 0.85) 100%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      background-size: cover;
      background-color: #0d0d1a;
      overflow: hidden;
    }

    .hero-bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(230, 92, 0, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(240, 165, 0, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-concrete-texture {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.5) 2px, rgba(255,255,255,0.5) 3px),
        repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(255,255,255,0.3) 20px, rgba(255,255,255,0.3) 21px);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(230, 92, 0, 0.15);
      border: 1px solid rgba(230, 92, 0, 0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      max-width: 800px;
    }

    .hero-h1-accent {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 44px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(230, 92, 0, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(230, 92, 0, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      text-align: left;
    }

    .hero-stat-number {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .hero-stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTION SHARED STYLES ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SLUŽBY SECTION ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(230, 92, 0, 0.2);
    }

    .sluzba-card:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(230, 92, 0, 0.1), rgba(255, 122, 46, 0.15));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 24px;
      transition: transform 0.25s;
    }

    .sluzba-card:hover .sluzba-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .sluzba-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .sluzba-desc {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 18px;
      background: rgba(230, 92, 0, 0.08);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ===== PROČ MY SECTION ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      padding: 32px;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .benefit-number {
      min-width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--white);
      box-shadow: 0 4px 16px rgba(230, 92, 0, 0.35);
      flex-shrink: 0;
    }

    .benefit-content {}

    .benefit-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .benefit-desc {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== REFERENCE SECTION ===== */
    #reference {
      background: linear-gradient(135deg, var(--secondary) 0%, #0d1117 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 50%, rgba(230, 92, 0, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 90% 80%, rgba(240, 165, 0, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      color: var(--primary-light);
    }

    #reference .section-label::before {
      background: var(--primary-light);
    }

    #reference .section-subtitle {
      color: rgba(255,255,255,0.55);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(8px);
      transition: transform 0.25s, background 0.25s, border-color 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(230, 92, 0, 0.3);
    }

    .review-quote {
      font-size: 3rem;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
      opacity: 0.7;
    }

    .review-text {
      font-size: 0.97rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-stars {
      color: var(--accent);
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-name {
      font-weight: 700;
      color: var(--white);
      font-size: 0.95rem;
    }

    .review-author-role {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ===== KONTAKT SECTION ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .kontakt-info {
      display:
