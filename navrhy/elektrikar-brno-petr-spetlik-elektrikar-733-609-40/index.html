<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář Brno – Petr Špetlík | 733 609 407</title>
  <meta name="description" content="Profesionální elektrikář v Brně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 733 609 407.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C400;
      --primary-dark: #d4a900;
      --primary-light: #fff8d6;
      --dark: #0d0f14;
      --dark-2: #151820;
      --dark-3: #1e2230;
      --dark-4: #252a3a;
      --text: #e8eaf0;
      --text-muted: #9aa0b8;
      --white: #ffffff;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.18);
      --shadow-hover: 0 8px 40px rgba(245,196,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      background: linear-gradient(135deg,#FF4D00,#ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,15,20,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,196,0,0.12);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(245,196,0,0.4);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      background: linear-gradient(135deg, #0d0f14 0%, #1a1f0a 40%, #1e2200 70%, #2a2d00 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(245,196,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, var(--dark));
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,196,0,0.12);
      border: 1px solid rgba(245,196,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
      letter-spacing: 0.4px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    #hero h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      font-weight: 800;
      font-size: 16px;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245,196,0,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(245,196,0,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      padding: 15px 32px;
      border-radius: var(--radius);
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,196,0,0.07);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SECTIONS SHARED ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(245,196,0,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    .section-header.centered {
      text-align: center;
    }

    .section-header.centered .section-desc {
      margin: 0 auto;
    }

    /* ── SLUZBY ── */
    #sluzby {
      background: var(--dark-2);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 560px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .sluzby-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .sluzby-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .sluzba-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .sluzba-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,196,0,0.25);
    }

    .sluzba-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(245,196,0,0.15), rgba(245,196,0,0.05));
      border: 1px solid rgba(245,196,0,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .sluzba-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .sluzba-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── PROC MY ── */
    #proc-my {
      background: var(--dark);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      margin-top: 48px;
    }

    @media (min-width: 768px) {
      .benefity-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--dark-3), var(--dark-4));
      border: 1px solid rgba(245,196,0,0.1);
      border-radius: var(--radius);
      padding: 36px 28px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 36px rgba(245,196,0,0.12);
    }

    .benefit-icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--dark-2);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .reference-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 0.925rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s;
    }

    .kontakt-item:hover {
      border-color: rgba(245,196,0,0.2);
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,196,0,0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
    }

    .kontakt-item-value a {
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
    }

    .mapa-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .mapa-pin {
      font-size: 48px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(245,196,0,0.5));
    }

    .mapa-label {
      position: relative;
      z-index: 1;
      font-size: 0.925rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
    }

    .mapa-label span {
      color: var(--primary);
    }

    /* ── CTA BANNER ── */
    .cta-section {
      background: linear-gradient(135deg, #1a1c00, #2a2e00, #1a1c00);
      border-top: 1px solid rgba(245,196,0,0.15);
      border-bottom: 1px solid rgba(245,196,0,0.15);
      padding: 60px 20px;
      text-align: center;
    }

    .cta-section h2 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .cta-section p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark-2);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(
