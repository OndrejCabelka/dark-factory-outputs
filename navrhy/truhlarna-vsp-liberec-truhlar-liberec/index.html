<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlárna VŠP Liberec – Kuchyňské linky, vestavěné skříně, podlahy</title>
  <meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C4956A;
      --accent: #D4A853;
      --dark: #1A1108;
      --dark2: #2C1F0F;
      --dark3: #3D2B15;
      --text: #1A1108;
      --text-light: #6B5744;
      --white: #FFFFFF;
      --bg-light: #FDF8F3;
      --bg-section: #F5EDE3;
      --border: #E8D5C0;
      --shadow: 0 4px 24px rgba(139,94,60,0.12);
      --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(26, 17, 8, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-call-nav:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,94,60,0.4);
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: 
        linear-gradient(135deg, rgba(26,17,8,0.96) 0%, rgba(44,31,15,0.92) 40%, rgba(61,43,21,0.88) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(139,94,60,0.04) 40px,
          rgba(139,94,60,0.04) 80px
        );
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(139,94,60,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(212,168,83,0.1) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(139,94,60,0.08) 0%, transparent 35%);
      pointer-events: none;
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.5) 0px,
        transparent 2px,
        transparent 60px,
        rgba(255,255,255,0.3) 62px,
        transparent 64px,
        transparent 120px
      );
      pointer-events: none;
    }

    .hero-container {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 720px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 40px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      border: 2px solid transparent;
      box-shadow: 0 4px 20px rgba(139,94,60,0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,94,60,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 400;
    }

    .hero-scroll {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent);
    }

    /* ── SECTION GENERAL ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .section-label::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(26px, 3.5vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,94,60,0.1), rgba(212,168,83,0.1));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(139,94,60,0.15);
    }

    .service-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .service-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .service-features li {
      font-size: 14px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-features li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      width: 18px;
      height: 18px;
      background: rgba(139,94,60,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── PROC MY ── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 10% 50%, rgba(139,94,60,0.12) 0%, transparent 50%),
        radial-gradient(circle at 90% 30%, rgba(212,168,83,0.07) 0%, transparent 40%);
      pointer-events: none;
    }

    #proc-my .section-label {
      color: var(--accent);
    }

    #proc-my .section-label::before {
      background: var(--accent);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(139,94,60,0.05), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(139,94,60,0.3);
      transform: translateY(-4px);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      color: rgba(212,168,83,0.15);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.4px;
    }

    .benefit-text {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      position: absolute;
      top: 24px;
      right: 28px;
      font-size: 64px;
      line-height: 1;
      color: rgba(139,94,60,0.08);
      font-family: Georgia, serif;
      font-weight: 700;
    }

    .review-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .author-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info {}

    .author-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .author-location {
      font-size: 13px;
      color: var(--text-light);
    }

    .review-verified {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #28a745;
      font-weight: 500;
      margin-top: 4px;
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap:
