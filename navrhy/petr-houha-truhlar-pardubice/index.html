<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petr Houha – Truhlář Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2D0E;
      --accent: #D4A055;
      --accent-light: #E8C07A;
      --dark: #1A0F0A;
      --dark-2: #2C1A10;
      --dark-3: #3D2415;
      --text: #1A0F0A;
      --text-light: #5C4033;
      --text-muted: #8B6A5A;
      --bg: #FDFAF7;
      --bg-2: #F5EDE4;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139, 69, 19, 0.12);
      --shadow-hover: 0 8px 40px rgba(139, 69, 19, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 15, 10, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 160, 85, 0.2);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(212, 160, 85, 0.3);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(212, 160, 85, 0.45);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(160deg, #1A0F0A 0%, #2C1A10 35%, #3D2415 60%, #1A0F0A 100%);
      padding: 80px 20px;
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 30px,
          rgba(212, 160, 85, 0.8) 30px,
          rgba(212, 160, 85, 0.8) 31px
        );
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 69, 19, 0.25) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 160, 85, 0.12) 0%, transparent 70%);
      top: 20%;
      right: 10%;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 800px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 160, 85, 0.15);
      border: 1px solid rgba(212, 160, 85, 0.35);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 5.5vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 44px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.25s, box-shadow 0.25s;
      box-shadow: 0 6px 28px rgba(212, 160, 85, 0.38);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(212, 160, 85, 0.52);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.45);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 64px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      margin-top: 4px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(139, 69, 19, 0.12), rgba(212, 160, 85, 0.12));
      border: 1px solid rgba(139, 69, 19, 0.2);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -1px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139, 69, 19, 0.07);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139, 69, 19, 0.18);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(212, 160, 85, 0.15), rgba(139, 69, 19, 0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
      border: 1px solid rgba(212, 160, 85, 0.2);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--bg-2);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 38px 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139, 69, 19, 0.07);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(139, 69, 19, 0.25);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      background: rgba(212, 160, 85, 0.15);
      border-color: rgba(212, 160, 85, 0.3);
      color: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .ref-bg {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        rgba(212, 160, 85, 0.8) 40px,
        rgba(212, 160, 85, 0.8) 41px
      );
      pointer-events: none;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 160, 85, 0.18);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      backdrop-filter: blur(8px);
      transition: transform 0.3s, background 0.3s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.08);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px 26px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139, 69, 19, 0.07);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .kontakt-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, rgba(212, 160, 85, 0.15), rgba(139, 69, 19, 0.1));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1px solid rgba(212, 160, 85, 0.2);
    }

    .kontakt-detail {
      flex: 1;
    }

    .kontakt-detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 3px;
    }

    .kontakt-detail-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .kontakt-detail-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-detail-value a:hover {
      color: var(--accent);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid rgba(139, 69, 19, 0.07);
      overflow: hidden;
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(135deg, #F5EDE4, #EDE0D0);
      position: relative;
    }

    .map-placeholder-icon {
      font-size: 52px;
    }

    .map
