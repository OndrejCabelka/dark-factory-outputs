<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektro IN Zlín – Profesionální elektrikář</title>
  <meta name="description" content="Profesionální elektrikář ve Zlíně. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte +420 775 356 885.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C300;
      --primary-dark: #D4A900;
      --primary-light: #FFF3A3;
      --dark: #0D0F1A;
      --dark2: #141728;
      --dark3: #1E2235;
      --text: #E8EAED;
      --text-muted: #9BA3B2;
      --white: #ffffff;
      --card-bg: #1A1D2E;
      --border: rgba(245,195,0,0.15);
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-hover: 0 8px 40px rgba(245,195,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner a:hover {
      opacity: 0.85;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 15, 26, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-nav {
      background: var(--primary);
      color: var(--dark) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s !important;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--dark) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background:
        radial-gradient(ellipse at 70% 50%, rgba(245,195,0,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(245,195,0,0.07) 0%, transparent 50%),
        linear-gradient(160deg, #0D0F1A 0%, #141728 50%, #0D0F1A 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,195,0,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    #hero::after {
      content: '⚡';
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      font-size: 280px;
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,195,0,0.1);
      border: 1px solid rgba(245,195,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 750px;
    }

    #hero h1 .highlight {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--dark);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,195,0,0.3);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,195,0,0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,195,0,0.07);
      transform: translateY(-2px);
      color: var(--primary);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ===== SECTIONS COMMON ===== */
    .section {
      padding: 96px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      margin-bottom: 12px;
      display: block;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      margin-bottom: 16px;
      line-height: 1.15;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 56px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,195,0,0.3);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,195,0,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,195,0,0.18);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-number {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(245,195,0,0.08);
      border: 2px solid rgba(245,195,0,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===== REFERENCES ===== */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .review-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      opacity: 0.6;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--primary);
      font-size: 16px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--dark);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-wrapper {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, transform 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(245,195,0,0.3);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: rgba(245,195,0,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body {
      display: flex;
      flex-direction: column;
    }

    .contact-item-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
    }

    .contact-item-value:hover {
      color: var(--primary);
    }

    .contact-item-value.muted {
      font-weight: 500;
      font-size: 15px;
      color: var(--text);
    }

    .map-placeholder {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      height: 100%;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,195,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,195,0,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .map-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
    }

    .map-pin {
      font-size: 52px;
      margin-bottom: 12px;
      display: block;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-content h4 {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
    }

    .map-content p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .btn-map {
      background: var(--primary);
      color: var(--dark);
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-map:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ===== CTA BAND ===== */
    .cta-band {
      background: linear-gradient(135deg, rgba(245,195,0,0.12) 0%, rgba(245,195,0,0.05) 100%);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var
