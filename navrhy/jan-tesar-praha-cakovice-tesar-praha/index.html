<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jan Tesař – Profesionální tesař Praha a okolí</title>
  <meta name="description" content="Profesionální tesařské práce v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Zavolejte: 777 885 110">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c47a2b;
      --primary-dark: #a0601a;
      --primary-light: #e8973e;
      --dark: #1a1008;
      --dark2: #2c1f0e;
      --dark3: #3d2c14;
      --text: #1a1008;
      --text-light: #6b5a44;
      --text-lighter: #9c8870;
      --white: #ffffff;
      --bg-light: #fdf8f2;
      --bg-card: #ffffff;
      --border: #e8ddd0;
      --shadow: 0 4px 24px rgba(196, 122, 43, 0.10);
      --shadow-hover: 0 8px 40px rgba(196, 122, 43, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 16, 8, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(196, 122, 43, 0.25);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      line-height: 1.2;
    }

    .nav-logo-sub {
      font-size: 0.7rem;
      color: var(--primary-light);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: 0.03em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 0.875rem !important;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s !important;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(26,16,8,0.93) 0%, rgba(60,35,10,0.88) 50%, rgba(26,16,8,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 60px,
          rgba(196,122,43,0.04) 60px,
          rgba(196,122,43,0.04) 61px
        );
      background-color: #1a1008;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(196,122,43,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(228,152,62,0.1) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(160,96,26,0.12) 0%, transparent 45%);
      pointer-events: none;
    }

    .hero-wood-lines {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 18px,
        rgba(196,122,43,1) 18px,
        rgba(196,122,43,1) 20px
      );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 20px 60px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(196,122,43,0.2);
      border: 1px solid rgba(196,122,43,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), #f0b865);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      max-width: 600px;
      margin: 0 auto 40px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(196,122,43,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(196,122,43,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: linear-gradient(135deg, rgba(196,122,43,0.15), rgba(232,151,62,0.1));
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      border: 1px solid rgba(196,122,43,0.2);
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(196,122,43,0.3);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(196,122,43,0.12), rgba(232,151,62,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(196,122,43,0.15);
    }

    .service-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      background: rgba(196,122,43,0.1);
      color: var(--primary-dark);
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 14px;
      letter-spacing: 0.03em;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .benefits-visual {
      position: relative;
      background: linear-gradient(145deg, var(--dark), var(--dark2));
      border-radius: var(--radius-lg);
      padding: 48px 36px;
      overflow: hidden;
    }

    .benefits-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(196,122,43,0.2) 0%, transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(160,96,26,0.15) 0%, transparent 50%);
    }

    .benefits-visual-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .benefits-big-icon {
      font-size: 72px;
      margin-bottom: 20px;
      display: block;
    }

    .benefits-visual-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
    }

    .benefits-visual-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }

    .benefits-visual-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 28px;
    }

    .bv-stat {
      background: rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .bv-stat-num {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .bv-stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      font-weight: 500;
    }

    .benefits-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .benefit-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-num {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(196,122,43,0.3);
    }

    .benefit-content {}

    .benefit-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .benefit-text {
      font-size: 0.9rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 3rem;
      color: var(--primary-light);
      line-height: 0.8;
      font-family: Georgia, serif;
      margin-bottom: 14px;
      opacity: 0.6;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .review-stars span {
      color: #f59e0b;
      font-size: 1.1rem;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #c47a2b, #e8973e); }
    .review-avatar.a2 { background: linear-gradient(135deg, #2b6cc4, #3e8ee8); }
    .review-avatar.a3 { background: linear-gradient(135deg, #2bc47a, #3ee897); }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .review-location {
      font-size: 0.8rem;
      color: var(--text-lighter);
      margin-top: 2px;
    }

    .review-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(196,122,43,0.1);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* ===== KONTAKT ===== */
    #kontakt
