<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<title>BauZaunex – Mobilní oplocení Praha | Výrobce stavebních plotů</title>
<meta name="description" content="BauZaunex – profesionální výrobce a pronájem mobilního oplocení v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #f59e0b;
  --primary-dark: #d97706;
  --primary-light: #fcd34d;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --gray-light: #f8fafc;
  --gray: #e2e8f0;
  --success: #22c55e;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  padding: 11px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(245,158,11,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(245,158,11,0.5);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.nav-cta span.icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #292524 70%, #1c1917 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 560px;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -100px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 65%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -80px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(245,158,11,0.07) 0%, transparent 65%);
  pointer-events: none;
}

.hero-grid {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.35);
  color: var(--primary);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-content h1 {
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 18px;
  color: #94a3b8;
  margin-bottom: 36px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 25px rgba(245,158,11,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 35px rgba(245,158,11,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.07);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.25s ease;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-3px);
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.stat-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  backdrop-filter: blur(4px);
  transition: all 0.3s ease;
}

.stat-card:hover {
  background: rgba(245,158,11,0.1);
  border-color: rgba(245,158,11,0.3);
  transform: translateY(-4px);
}

.stat-icon {
  font-size: 32px;
  margin-bottom: 10px;
  display: block;
}

.stat-number {
  font-size: 26px;
  font-weight: 900;
  color: var(--primary);
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size: 13px;
  color: #94a3b8;
  font-weight: 500;
}

/* ===== SECTION COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
  color: var(--primary-dark);
  border: 1px solid rgba(245,158,11,0.25);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(24px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.3px;
  margin-bottom: 16px;
  line-height: 1.2;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 90px 20px;
  background: var(--gray-light);
}

.sluzby-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.sluzba-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(245,158,11,0.2);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 62px;
  height: 62px;
  background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 22px;
  transition: transform 0.3s ease;
}

.sluzba-card:hover .sluzba-icon {
  transform: scale(1.1) rotate(-5deg);
}

.sluzba-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.sluzba-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 90px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;

  bottom: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(245,158,11,0.07) 0%, transparent 60%);

}

  color: var(--white);
}

#proc-my .section-desc {
  color: #94a3b8;
}

}

.proc-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

  position: relative;
  z-index: 2;
}

.proc-card {
  background: rgba(255,255,255,0.04);

.proc-num {
  font-size: 52px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));

  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 18px;
  opacity: 0.6;
}

.proc-icon {
  font-size: 36px;
  margin-bottom: 18px;
  display: block;
}

.proc-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.proc-text {
  font-size: 15px;
  color: #94a3b8;
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 90px 20px;
  background: var(--gray-light);
}

.reference-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray);
  transition: all 0.3s ease;
  position: relative;
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 26px;
  font-size: 80px;
  color: var(--primary);
  opacity: 0.12;
  font-family: Georgia, serif;
  line-height: 1;
}

.review-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
}

.stars {
  color: var(--primary);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 14px;
}

.reviewer-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;

  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  color: var(--dark);
  font-size: 15px;
}

.reviewer-role {
  font-size: 13px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 90px 20px;
  background: var(--white);
}

}

  color: var(--text-light);
  font-size: 16px;
  margin-bottom: 32px;
  line-height: 1.65;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--gray-light);
  border-radius: var(--radius);
  border: 1px solid var(--gray);
  transition: all 0.25s ease;
}

.kontakt-item:hover {
  border-color: rgba(245,158,11,0.3);
  background: rgba(245,158,11,0.04);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;

  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-body strong {
  display: block;

.kontakt-item-body a,

.kontakt-item-body a:hover {

  background: linear-gradient(135deg, #1e293b, #0f172a);

  0%, 100% { transform: translateY(0); }

}

.map-title {
  font-size: 20px;

}

}
