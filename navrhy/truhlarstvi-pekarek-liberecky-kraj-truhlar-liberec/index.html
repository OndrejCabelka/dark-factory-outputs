<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Pekárek | Liberec a okolí</title>
  <meta name="description" content="Profesionální truhlářství v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C4956A;
      --accent: #D4A96A;
      --accent-light: #F0D5A8;
      --dark: #1A1008;
      --dark-2: #2C1A0E;
      --dark-3: #3D2610;
      --text: #1A1008;
      --text-light: #6B5744;
      --white: #FFFFFF;
      --bg-light: #FDF8F3;
      --bg-section: #F5EDE3;
      --shadow: 0 4px 24px rgba(139,94,60,0.12);
      --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 16, 8, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 169, 106, 0.2);
      padding: 0 20px;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-weight: 700;
      font-size: 17px;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s !important;
      box-shadow: 0 2px 12px rgba(139,94,60,0.4);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139,94,60,0.55) !important;
      background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
      color: var(--white) !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: 0.3s;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1A0D05 0%, #2E1608 35%, #4A2210 60%, #3D1E0C 100%);
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image: 
        repeating-linear-gradient(45deg, #C4956A 0, #C4956A 1px, transparent 0, transparent 50%);
      background-size: 40px 40px;
    }

    .hero-circle-1 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,94,60,0.25) 0%, transparent 70%);
      top: -100px;
      right: -100px;
    }

    .hero-circle-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,169,106,0.12) 0%, transparent 70%);
      bottom: -80px;
      left: 10%;
    }

    .hero-wood-accent {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 45%;
      background: linear-gradient(135deg, transparent 0%, rgba(139,94,60,0.08) 50%, rgba(212,169,106,0.05) 100%);
      clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 24px 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 60px;
      width: 100%;
    }

    .hero-left {
      max-width: 600px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,169,106,0.15);
      border: 1px solid rgba(212,169,106,0.3);
      border-radius: 50px;
      padding: 6px 16px;
      margin-bottom: 28px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 40px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(139,94,60,0.5);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(139,94,60,0.65);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(212,169,106,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .hero-right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-visual {
      position: relative;
      width: 100%;
      max-width: 420px;
    }

    .hero-card-main {
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(212,169,106,0.2);
      border-radius: var(--radius-lg);
      padding: 36px;
      backdrop-filter: blur(10px);
      position: relative;
    }

    .hero-card-main::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(212,169,106,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .hc-icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
    }

    .hc-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .hc-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .hc-services {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hc-service-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    .hc-service-item::before {
      content: '✓';
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .hero-floating-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      border-radius: 50%;
      width: 90px;
      height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(212,169,106,0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .hfb-num {
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      line-height: 1;
    }

    .hfb-text {
      font-size: 9px;
      font-weight: 700;
      color: var(--dark);
      text-align: center;
      line-height: 1.2;
      text-transform: uppercase;
    }

    /* ===== SEKCE — společné ===== */
    section {
      padding: 90px 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
      position: relative;
      padding-left: 24px;
    }

    .section-label::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 2px;
      background: var(--primary);
    }

    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      cursor: default;
      border: 1px solid rgba(139,94,60,0.07);
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--bg-section), var(--accent-light));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: transform 0.3s, background 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
      background: linear-gradient(135deg, var(--accent-light), var(--primary-light));
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(45deg, rgba(212,169,106,0.03) 0, rgba(212,169,106,0.03) 1px, transparent 0, transparent 50%);
      background-size: 40px 40px;
    }

    #proc-my .section-label {
      color: var(--accent);
    }

    #proc-my .section-label::before {
      background: var(--accent);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,169,106,0.15);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(212,169,106,0.35);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 56px;
      font-weight: 900;
      color: rgba(212,169,106,0.12);
      line-height: 1;
      margin-bottom: 4px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
