<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklenářství Praha 6 | Tomáš Vávra – Sklenář za rozumné ceny</title>
  <meta name="description" content="Profesionální sklenář v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte 777 299 958.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-deeper: #075985;
      --accent: #38bdf8;
      --dark: #0c1a2e;
      --dark2: #112240;
      --dark3: #1e3a5f;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f9ff;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(14,165,233,0.10);
      --shadow-hover: 0 8px 40px rgba(14,165,233,0.22);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: scale(1.04);
    }

    .nav-cta-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0c1a2e 0%, #0a2540 40%, #0d3461 70%, #0ea5e9 100%);
      min-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px 80px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 30%, rgba(14,165,233,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(56,189,248,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪟';
      position: absolute;
      font-size: 340px;
      opacity: 0.04;
      right: -40px;
      bottom: -60px;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 780px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(14,165,233,0.18);
      border: 1px solid rgba(14,165,233,0.35);
      color: var(--accent);
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.78);
      max-width: 580px;
      margin: 0 auto 42px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 34px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 30px rgba(14,165,233,0.45);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(14,165,233,0.55);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 16px 34px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.07);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      margin-top: 56px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.22s, box-shadow 0.22s;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .sluzba-karta h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
    }

    .sluzba-karta p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary-dark);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 11px;
      font-weight: 600;
      margin-top: auto;
      letter-spacing: 0.3px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .proc-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--white);
    }

    .proc-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 24px rgba(14,165,233,0.12);
    }

    .proc-icon-wrap {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .proc-item h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .proc-item p {
      font-size: 0.91rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, #0c1a2e 0%, #0a2540 60%, #0d3461 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      color: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: background 0.22s, border-color 0.22s, transform 0.22s;
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(14,165,233,0.45);
      transform: translateY(-4px);
    }

    .recenze-hvezdy {
      color: #fbbf24;
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 0.97rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--white);
    }

    .recenze-mesto {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--white);
      padding: 20px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .kontakt-item:hover {
      border-color: var(--primary);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
    }

    .kontakt-item-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      border-radius: var(--radius);
      border: 2px dashed var(--primary);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--primary-dark);
    }

    .mapa-icon {
      font-size: 52px;
    }

    .mapa-text {
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
    }

    .mapa-sub {
      font-size: 0.85rem;
      color: var(--text-light);
      text-align: center;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.65);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .footer-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-logo span {
      color: var(--accent);
    }

    .footer-info {
      font-size: 12.5px;
      line-height: 1.8;
      text-align: center;
    }

    .footer-copy {
      font-size: 12px;
      text-align: right;
    }

    /* ===== DIVIDER ===== */
    .wave-divider {
      width: 100%;
      overflow: hidden;
      line-height: 0;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      .navbar {
        padding: 0 14px;
        height: 60px;
      }

      .logo-name {
        font-size: 14px;
      }

      .nav-cta {
        padding: 8px 14px;
        font-size: 13px;
      }

      #hero {
        padding: 60px 16px 60px;
        min-height: auto;
      }

      section {
        padding: 64px 16px;
      }

      .hero-stats {
        gap: 20px;
      }

      .hero-stat-num {
        font-size: 1.6rem;
      }

      .sluzby-grid {
        grid-template-columns: 1fr;
      }

      .proc-grid {
        grid-template-columns: 1fr;
      }

      .recenze-grid {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
      }

      .footer-copy {
        text-align: center;
      }
    }

    @media (min-width: 601px) and (max-width: 900px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ===== UTILITY ===== */
    .text-accent {
      color: var(--primary);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }

    .kontakt-cta-bar {
      background: linear-gradient(135deg, var(--primary), var(--primary-deeper));
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
      margin-top: 0;
    }

    .kontakt-cta-bar h3 {
      color: var(--white);
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .kontakt-cta-bar p {
      color: rgba(255,255,255,0.8);
      font-
