<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nejlepší Instalatér v Brně | Spolehlivý instalatér Brno a okolí</title>
  <meta name="description" content="Hledáte spolehlivého instalatéra v Brně? Nabízíme opravy potrubí, instalace koupelen, výměnu bojlerů, havárie 24/7 a ústřední topení. Volejte +420721177097." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fdb;
      --primary-dark: #1358b5;
      --primary-light: #3b8af0;
      --accent: #f0a500;
      --dark: #0d1b2e;
      --dark2: #112240;
      --dark3: #1a2f4a;
      --text: #2d3748;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26, 111, 219, 0.12);
      --shadow-hover: 0 8px 40px rgba(26, 111, 219, 0.22);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ──────────────────────────────────────────
       NAVBAR
    ────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 27, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      color: var(--white);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      color: var(--primary-light);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.78);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-nav-call {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(26, 111, 219, 0.35);
    }

    .btn-nav-call:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 111, 219, 0.45);
    }

    .btn-nav-call .phone-icon {
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-logo-name {
        font-size: 13px;
      }
      .btn-nav-call {
        padding: 9px 14px;
        font-size: 13px;
      }
    }

    /* ──────────────────────────────────────────
       HERO
    ────────────────────────────────────────── */
    #hero {
      background:
        linear-gradient(160deg, rgba(13,27,46,0.92) 0%, rgba(17,34,64,0.88) 50%, rgba(10,30,60,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(26,111,219,0.04) 0px,
          rgba(26,111,219,0.04) 2px,
          transparent 2px,
          transparent 40px
        );
      background-color: var(--dark);
      min-height: 92vh;
      display: flex;
      align-items: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(26,111,219,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -150px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59,138,240,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 111, 219, 0.2);
      border: 1px solid rgba(26, 111, 219, 0.4);
      color: var(--primary-light);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      font-size: 15px;
    }

    #hero h1 {
      font-size: clamp(2rem, 4.5vw, 3.4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 .highlight {
      background: linear-gradient(90deg, var(--primary-light), #7db8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      line-height: 1.65;
      max-width: 520px;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(26, 111, 219, 0.4);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26, 111, 219, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      padding: 16px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.25s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-card-big {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(8px);
    }

    .hero-card-title {
      color: var(--white);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hero-service-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero-service-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
    }

    .hero-service-list li .check {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .urgent-badge {
      margin-top: 20px;
      background: rgba(240, 165, 0, 0.15);
      border: 1px solid rgba(240, 165, 0, 0.35);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .urgent-badge-text {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .urgent-badge-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      .hero-right {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .hero-cta {
        flex-direction: column;
      }
      .btn-primary, .btn-secondary {
        justify-content: center;
      }
    }

    /* ──────────────────────────────────────────
       SECTIONS COMMON
    ────────────────────────────────────────── */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-light);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      border: 1px solid rgba(26, 111, 219, 0.2);
    }

    .section-title {
      font-size: clamp(1.7rem, 3.5vw, 2.6rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ──────────────────────────────────────────
       SERVICES
    ────────────────────────────────────────── */
    #sluzby {
      padding: 96px 20px;
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,219,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--bg-light), #dbeafe);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag-urgent {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #fff7e6;
      color: #c87700;
      border: 1px solid #ffd88a;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }

    /* ──────────────────────────────────────────
       WHY US
    ────────────────────────────────────────── */
    #proc-my {
      padding: 96px 20px;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      padding: 32px;
      background: var(--bg-section);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: var(--bg-light);
      border-color: rgba(26,111,219,0.25);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .benefit-body h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-body p {
      font-size: 14.5px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* ──────────────────────────────────────────
       REVIEWS
    ────────────────────────────────────────── */
    #reference {
      padding: 96px 20px;
      background: linear-gradient(160deg, var(--dark2) 0%, var(--dark) 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(26,111,219,0.2);
      color: var(--primary-light);
      border-color: rgba(26,111,219,0.3);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 32px;
      transition: all 0.3s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(26,111,219,0.4);
      transform: translateY(-4px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    .review-text {
      color: rgba(255,255,255,0.82);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg
