<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Pardubice – Profesionální truhlář | +420 774 684 647</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Volejte +420 774 684 647.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E00;
      --accent: #D4A017;
      --accent-light: #F0C040;
      --dark: #1A0F00;
      --dark-2: #2C1A00;
      --dark-3: #3D2400;
      --text: #F5ECD7;
      --text-muted: #C8B89A;
      --white: #FFFFFF;
      --card-bg: #FFFFFF;
      --section-bg: #FAF6F0;
      --border: #E8DCC8;
      --shadow: 0 4px 24px rgba(139,69,19,0.13);
      --shadow-hover: 0 8px 36px rgba(139,69,19,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: #2C1A00;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── HEADER / NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 10px rgba(139,69,19,0.4);
    }

    .btn-nav:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,69,19,0.5);
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(160deg, #1A0F00 0%, #2C1A00 35%, #3D2400 60%, #5C3010 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,160,23,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 80% at 10% 50%, rgba(139,69,19,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 90% 50%, rgba(92,46,0,0.3) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(26,15,0,0.3));
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212,160,23,0.15);
      border: 1px solid rgba(212,160,23,0.3);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      margin-bottom: 36px;
      font-weight: 400;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.5);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,69,19,0.6);
      filter: brightness(1.1);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.1);
      align-self: center;
    }

    /* ── SECTIONS COMMON ── */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(212,160,23,0.1));
      color: var(--primary);
      border: 1px solid rgba(139,69,19,0.2);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.3px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: #6B5240;
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--section-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(212,160,23,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      border: 1px solid rgba(139,69,19,0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: #6B5240;
      line-height: 1.6;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 8px;
      color: var(--accent);
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';

      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(212,160,23,0.06) 0%, transparent 70%);

    #proc-my .section-tag {
      background: rgba(212,160,23,0.1);
      color: var(--accent);
      border-color: rgba(212,160,23,0.2);

    #proc-my .section-title {

    #proc-my .section-desc {

    .benefits-grid {

      grid-template-columns: 1fr;

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .benefit-card:hover {
      background: rgba(212,160,23,0.07);
      border-color: rgba(212,160,23,0.2);
      transform: translateY(-4px);
    }

    .benefit-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(212,160,23,0.3);
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--section-bg);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 48px;
      color: rgba(139,69,19,0.12);
      line-height: 1;
      font-family: Georgia, serif;
    }

    .stars {

      margin-bottom: 14px;

    .star {

    }

    .review-text {

    .reviewer {

    .reviewer-avatar {
      width: 44px;
      height: 44px;

      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .reviewer-info span {
      font-size: 12px;
      color: #8B7060;
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-card {
      background: var(--section-bg);
      border-radius: var(--radius-lg);
      padding: 24px 22px;
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: all 0.25s;
    }

    .contact-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .contact-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-card-body strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #8B7060;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .contact-card-body a {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;

    .contact-card-body a:hover {
      color: var(--accent);
    }

    .contact-card-body p {
      font-size: 15px;
      color: #4A3020;
      line-height: 1.5;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #2C1A00, #3D2400);
      border-radius: var(--radius-lg);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      border: 1px solid var(--border);
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(212,160,23,0.08) 0%, transparent 70%);
    }

    .map-placeholder-icon {
      font-size: 48px;
      position: relative;
    }

    .map-placeholder h4 {
      font-
