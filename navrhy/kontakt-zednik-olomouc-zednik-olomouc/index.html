<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedník Olomouc | Profesionální zednické práce a rekonstrukce</title>
<meta name="description" content="Profesionální zednické práce v Olomouci a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte 607 877 574.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8500a;
  --primary-dark: #a03e07;
  --primary-light: #e8621a;
  --accent: #f4a332;
  --dark: #1a1208;
  --dark2: #2c1f0e;
  --dark3: #3d2c14;
  --text: #1e1409;
  --text-muted: #6b5740;
  --light: #fdf8f3;
  --white: #ffffff;
  --border: #e8d9c8;
  --card-bg: #ffffff;
  --shadow: 0 4px 24px rgba(200, 80, 10, 0.10);
  --shadow-hover: 0 8px 40px rgba(200, 80, 10, 0.18);
  --radius: 12px;
  --radius-lg: 20px;
  --transition: 0.25s ease;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--light);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2px;
  transition: all var(--transition);
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(200, 80, 10, 0.35);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(200, 80, 10, 0.45);
}

.nav-cta span.icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(145deg, #1a1208 0%, #2e1a08 35%, #3d2408 60%, #1a1208 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 80%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(200, 80, 10, 0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: -10%;
  width: 60%;
  height: 150%;
  background: radial-gradient(ellipse, rgba(244, 163, 50, 0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(200, 80, 10, 0.18);
  border: 1px solid rgba(200, 80, 10, 0.35);
  color: var(--accent);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
}

#hero h1 {
  font-size: clamp(28px, 5.5vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(15px, 2.2vw, 19px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 38px;
  font-weight: 400;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 700;
  transition: all var(--transition);
  box-shadow: 0 6px 24px rgba(200, 80, 10, 0.40);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(200, 80, 10, 0.50);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.22);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  transition: all var(--transition);
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.40);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: clamp(26px, 4vw, 36px);
  font-weight: 900;
  color: var(--white);
  line-height: 1;
  letter-spacing: -0.5px;
}

.stat-num span {
  color: var(--accent);
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.50);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 4px;
  font-weight: 500;
}

/* ===== SECTION BASE ===== */
section {
  padding: 72px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 50px;
}

.section-tag {
  display: inline-block;
  background: rgba(200, 80, 10, 0.10);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 14px;
  border: 1px solid rgba(200, 80, 10, 0.15);
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--white);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  cursor: default;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  transform: scaleX(0);
  transition: transform var(--transition);
  transform-origin: left;
}

.sluzba-karta:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(200, 80, 10, 0.20);
}

.sluzba-karta:hover::before {
  transform: scaleX(1);
}

.karta-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(200,80,10,0.12), rgba(244,163,50,0.12));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all var(--transition);
}

.sluzba-karta:hover .karta-icon {
  background: linear-gradient(135deg, rgba(200,80,10,0.20), rgba(244,163,50,0.20));
  transform: scale(1.08);
}

.karta-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.karta-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== PROC MY ===== */
#proc-my {
  background: linear-gradient(160deg, #1a1208 0%, #2e1a08 50%, #1a1208 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(200,80,10,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-tag {
  background: rgba(244, 163, 50, 0.15);
  color: var(--accent);
  border-color: rgba(244, 163, 50, 0.25);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.55);
}

.benefity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 1;
}

.benefit-karta {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  text-align: center;
  transition: all var(--transition);
  backdrop-filter: blur(10px);
}

.benefit-karta:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(200, 80, 10, 0.35);
  transform: translateY(-4px);
}

.benefit-icon {
  width: 68px;
  height: 68px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 20px rgba(200, 80, 10, 0.35);
  transition: all var(--transition);
}

.benefit-karta:hover .benefit-icon {
  transform: scale(1.08) rotate(-3deg);
}

.benefit-title {
  font-size: 19px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-text {
  font-size: 14px;
  color: rgba(255,255,255,0.60);
  line-height: 1.75;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--light);
}

.recenze-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  transition: all var(--transition);
  position: relative;
}

.recenze-karta:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
  border-color: rgba(200, 80, 10, 0.18);
}

.hvezdicky {
  color: var(--accent);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.recenze-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-text::before {
  content: '"';
  font-size: 40px;
  color: rgba(200, 80, 10, 0.15);
  font-family: Georgia, serif;
  line-height: 0;
  vertical-align: -14px;
  margin-right: 2px;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.autor-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
.av2 { background: linear-gradient(135deg, #0a7c5c, #0fa87a); }
.av3 { background: linear-gradient(135deg, #1a4fa0, #2b6fd9); }

.autor-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.autor-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
    gap: 32px;
  }
}

.kontakt-info h3 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.kontakt-info p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 28px;
  line-height: 1.7;
}

.kontakt-polozka {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
}

.kontakt-polozka:last-child {
  border-bottom: none;
}

.k-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(200,80,10,0.12), rgba(244,163,50,0.12));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.k-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}

.k-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.k-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color var(--transition);
}

.k-value a:hover {
  color: var(--primary-dark);
}

.mapa-placeholder {
  background: linear-gradient(160deg, #e8d9c8 0%, #d4c3ae 100%);
  border-radius: var(--radius-lg);
  height: 100%;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 2px dashed rgba(200, 80, 10, 0.20);
  text-align: center;
  padding: 24px;
}

.mapa-placeholder .map-icon {
  font-size: 52px;
  opacity: 0.6;
}

.mapa-placeholder p {
  font-size: 15px;
  font-weight: 700;
  color
