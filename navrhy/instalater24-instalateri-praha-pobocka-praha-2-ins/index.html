<!DOCTYPE html>

<head>

  <title>Instalater24 – Instalatéři Praha 2 | Oprava, Montáž, Havárie 24/7</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1565C0;
      --primary-light: #1976D2;
      --primary-dark: #0D47A1;
      --accent: #FF6F00;
      --accent-light: #FFA000;
      --white: #ffffff;

      --text-dark: #0f1b2d;
      --text-mid: #2d3a4a;
      --text-muted: #6b7a90;
      --border: #e2e8f0;
      --shadow-sm: 0 2px 8px rgba(21, 101, 192, 0.08);
      --shadow-md: 0 8px 32px rgba(21, 101, 192, 0.13);
      --shadow-lg: 0 16px 48px rgba(21, 101, 192, 0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {

      color: var(--text-dark);

    /* ===== BANNER ===== */
    #proposal-banner {

    }

      text-decoration: none;
    }

    .logo-icon {

      height: 44px;

      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--light-gray);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));

    .sluzba-karta::before {

      top: 0;

      opacity: 0;
      transition: opacity 0.25s;

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(21, 101, 192, 0.2);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--light-bg), #dbeafe);
      border-radius: 14px;

      font-size: 26px;
      margin-bottom: 20px;
      transition: transform 0.25s;

    .sluzba-karta:hover .sluzba-icon {
      transform: scale(1.1);
    }

    .sluzba-karta h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;

    .sluzba-tag {

    /* ===== PROC MY ===== */
