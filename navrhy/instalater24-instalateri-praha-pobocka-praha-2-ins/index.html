<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalater24 – Instalatér Praha 2 | +420 228 229 508</title>
  <meta name="description" content="Profesionální instalatér v Praze a okolí. Oprava vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420 228 229 508.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f8f;
      --primary-light: #3b8de0;
      --accent: #f59e0b;
      --dark: #0d1b2a;
      --dark-2: #1a2f45;
      --dark-3: #243b55;
      --text: #1e293b;
      --text-muted: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-gray: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(26,111,196,0.4);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.5);
    }

    .nav-cta span {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(160deg, #0d1b2a 0%, #0f3460 45%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,141,224,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(26,111,196,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '🔧';
      position: absolute;
      font-size: 320px;
      opacity: 0.04;
      right: -40px;
      top: 50%;
      transform: translateY(-50%) rotate(-15deg);
      pointer-events: none;
      user-select: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.4);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, #60b3ff, #a8d8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #f97316);
      color: var(--dark);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 28px rgba(245,158,11,0.45);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(245,158,11,0.55);
      filter: brightness(1.05);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s ease;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .hero-stat {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 10px 22px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .hero-stat-icon {
      font-size: 15px;
    }

    /* ===== SECTION BASE ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,196,0.15);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-gray);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--bg-light), rgba(59,141,224,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
      border: 1px solid rgba(26,111,196,0.12);
      transition: all 0.3s ease;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.08);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 18px;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 60%, var(--dark-3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,111,196,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-label {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      border-color: rgba(255,255,255,0.12);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(59,141,224,0.4);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-light), #a8d8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 52px;
      color: var(--primary);
      opacity: 0.15;
      line-height: 0.6;
      font-family: Georgia, serif;
      margin-bottom: 10px;
    }

    .review-stars {
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .review-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.72;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 24px;
      background: var(--bg-gray);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .contact-item:hover {
      border-color: rgba(26,111,196,0.3);
      background: var(--bg-light);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-item-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .map-placeholder {
      background: linear-gradient(160deg, var(--dark-2), var(--dark-3));
      border-radius: var(--radius);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 49px,
          rgba(255,255,255,0.025) 49px,
          rgba(255,255,255,0.025) 50px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 49px,
          rgba(255,255,255,0.025) 49px,
          rgba(255,255,255,0.025) 50px
        );
