<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klempířství Brno | Oplechování, Okapy, Střešní práce</title>
<meta name="description" content="Profesionální klempíř v Brně a okolí. Oplechování střech, okapy, svody, vikýře, střešní okna. Volejte +420 739 450 846.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e07b00;
  --primary-dark: #b86200;
  --primary-light: #f5a623;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --bg-light: #f8f8f5;
  --bg-card: #ffffff;
  --border: #e5e5e5;
  --white: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* =========================================
   BANNER
   ========================================= */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* =========================================
   HEADER / NAVBAR
   ========================================= */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  white-space: nowrap;
}

.logo-sub {
  color: var(--primary-light);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(224, 123, 0, 0.4);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(224, 123, 0, 0.5);
}

/* =========================================
   HERO
   ========================================= */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a3a5c 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(224,123,0,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(224,123,0,0.2);
  border: 1px solid rgba(224,123,0,0.4);
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-inner {
  max-width: 760px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 54px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 19px);
  color: rgba(255,255,255,0.78);
  margin-bottom: 36px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 6px 24px rgba(224,123,0,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(224,123,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.3);
  color: var(--white);
  text-decoration: none;
  padding: 13px 32px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-top: 4px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* =========================================
   SEKCE OBECNĚ
   ========================================= */
section {
  padding: 70px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(224,123,0,0.12);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 580px;
  line-height: 1.65;
}

.section-head {
  margin-bottom: 48px;
}

/* =========================================
   SLUŽBY
   ========================================= */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(224,123,0,0.25);
}

.service-card:hover::after {
  transform: scaleX(1);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(224,123,0,0.15), rgba(245,166,35,0.1));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* =========================================
   PROČ MY
   ========================================= */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(224,123,0,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(245,166,35,0.2);
  color: var(--primary-light);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 2;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: background 0.25s, transform 0.25s, border-color 0.25s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(224,123,0,0.4);
  transform: translateY(-4px);
}

.benefit-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  box-shadow: 0 6px 20px rgba(224,123,0,0.35);
}

.benefit-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.benefit-card p {
  font-size: 14px;
  color: rgba(255,255,255,0.65);
  line-height: 1.7;
}

/* =========================================
   REFERENCE
   ========================================= */
#reference {
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 30px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 80px;
  line-height: 1;
  color: rgba(224,123,0,0.12);
  font-family: Georgia, serif;
  font-weight: 900;
}

.stars {
  color: var(--primary-light);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--dark);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-light);
}

/* =========================================
   KONTAKT
   ========================================= */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 768px) {
  .kontakt-grid {
    grid-template-columns: 1fr;
    gap: 32px;
  }
}

.kontakt-info h2 {
  font-size: clamp(22px, 3.5vw, 34px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 16px;
}

.kontakt-info p {
  color: var(--text-light);
  margin-bottom: 32px;
  line-height: 1.65;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: var(--bg-light);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.kontakt-item:hover {
  border-color: rgba(224,123,0,0.35);
  box-shadow: 0 4px 16px rgba(224,123,0,0.1);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(224,123,0,0.3);
}

.kontakt-item-text strong {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.kontakt-item-text a,
.kontakt-item-text span {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  text-decoration: none;
  display: block;
}

.kontakt-item-text a:hover {
  color: var(--primary);
}

.map-placeholder {
  background: linear-gradient(135deg, #e8e8e8, #d5d5d5);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  height: 100%;
  min-height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px dashed var(--border);
}

.map-inner {
  text-align: center;
  padding: 32px;
}

.map-inner .map-emoji {
  font-size: 52px;
  margin-bottom: 16px;
  display: block;
}

.map-inner p {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 6px;
}

.map-inner span {
  font-size: 14px;
  color: var(--text-light);
}

.map-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 11px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 4px 16px rgba(224,123,0,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}

.map-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(224,123,0,0.45);
}

/* =========================================
   FOOTER
   ========================================= */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.55);
  padding: 36px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.footer-logo {
  display: flex;
  align
