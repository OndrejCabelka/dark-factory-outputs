<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karel Pálek – Klempíř Plzeň</title>
  <meta name="description" content="Profesionální klempířské práce v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna. Volejte +420733653609.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark2: #1e293b;
      --dark3: #334155;
      --light: #f8fafc;
      --gray: #64748b;
      --gray-light: #e2e8f0;
      --white: #ffffff;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(15,23,42,0.10);
      --shadow-hover: 0 8px 40px rgba(37,99,235,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--dark);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner a {
      text-decoration: underline;
    }

    /* ─── NAVBAR ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15,23,42,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(37,99,235,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(37,99,235,0.45);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e3a8a 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 70% 50%, rgba(37,99,235,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(245,158,11,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, var(--white), transparent);
      pointer-events: none;
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 120px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.4);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94a3b8;
      max-width: 620px;
      margin: 0 auto 44px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(37,99,235,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 56px;
      padding-top: 48px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ─── SEKCE ─── */
    section {
      padding: 88px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(37,99,235,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--dark);
    }

    .section-desc {
      font-size: 17px;
      color: var(--gray);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-light);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(37,99,235,0.15);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(59,130,246,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--light);
      border-radius: var(--radius);
      padding: 32px;
      border: 1px solid var(--gray-light);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    }

    .benefit-content h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-content p {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    #reference .section-tag {
      background: rgba(37,99,235,0.25);
      color: #93c5fd;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #94a3b8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 32px;
      backdrop-filter: blur(12px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }

    .review-stars {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .author-location {
      font-size: 13px;
      color: #64748b;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--gray-light);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(59,130,246,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-dark);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-light);
      box-shadow: var(--shadow);
      overflow: hidden;
      height: 100%;
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .map-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      padding: 20px 24px;
      color: var(--white);
    }

    .map-header h3 {
      font-size: 16px;
      font-weight: 700;
    }

    .map-header p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .map-body {
      flex: 1;
      background:
        linear-gradient(rgba(37,99,235,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      background-color: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 32px;
    }

    .map-pin {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
      position: relative;
    }

    .map-pin::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transform: rotate(45deg);
    }

    .map-city {
      font-size: 22px;
      font-weight:
