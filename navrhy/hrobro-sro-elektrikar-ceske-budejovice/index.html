<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hrobro s.r.o. – Profesionální elektrikář České Budějovice</title>
  <meta name="description" content="Profesionální elektrikář v Českých Budějovicích a okolí. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte +420605056505">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C518;
      --primary-dark: #d4a800;
      --primary-light: #fff3b0;
      --dark: #0d0f14;
      --dark2: #151820;
      --dark3: #1e2130;
      --dark4: #252a3a;
      --text: #e8eaf0;
      --text-muted: #9aa0b8;
      --white: #ffffff;
      --card-bg: #1a1e2e;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAV ─── */
    header {
      background: rgba(13, 15, 20, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245,197,24,0.15);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0a0c12 0%, #111520 40%, #1a1500 70%, #2a2000 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,197,24,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.3);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.15;
      color: var(--white);
      max-width: 800px;
      margin: 0 auto 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(245,197,24,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,197,24,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,197,24,0.1);
      border: 1px solid rgba(245,197,24,0.2);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 50px;
      line-height: 1.7;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,197,24,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,197,24,0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,197,24,0.2);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--dark3), var(--dark4));
      border: 1px solid rgba(245,197,24,0.1);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: all 0.3s;
    }

    .benefit-card:hover {
      border-color: rgba(245,197,24,0.3);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 900;
      color: rgba(245,197,24,0.15);
      line-height: 1;
      margin-bottom: 16px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .benefit-icon-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .benefit-icon {
      font-size: 28px;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .review-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,197,24,0.15);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--primary);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(245,197,24,0.2);
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      background: var(--primary);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .reviewer-info span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--dark);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.3s;
      text-decoration: none;
    }

    .contact-item:hover {
      border-color: rgba(245,197,24,0.2);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: rgba(245,197,24,0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-body span,
    .contact-item-body a {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
    }

    .contact-item-body a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-pin {
      font-size: 48px;
      position: relative;
    }

    .map-placeholder p {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      position: relative;
    }

    .map-placeholder small {
      font-size: 13px;
      color: var(--text-muted);
      position: relative;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark2);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 36px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 34px;
      height: 34px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .footer-logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
    }

    .footer-info {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .footer-copy {
      font-size: 13px;
      color: var(--text-muted);
      text-align: right;
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border-radius: 2px;
      margin-bottom: 40px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      nav {
        padding: 0 14px;
      }

      .logo-sub {
        display: none;
      }

      .logo-name {
        font-size: 17px;
      }

      .nav-cta {
        padding: 9px 14px;
        font-size: 13px;
      }

      #hero {
        padding: 60px 16px 70px;
      }

      .hero-stats {
        gap: 24px;
      }

      section {
        padding: 60px 16px;
      }

      .services-grid {
        grid-template-columns: 1fr;
      }

      .benefits-grid {
        grid-template-columns: 1fr;
      }

      .reviews-grid {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-
