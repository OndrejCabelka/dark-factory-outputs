<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klempíř Plzeň | Profesionální klempířství a pokrývačství</title>
  <meta name="description" content="Profesionální klempíř v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte 776 387 539.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3d3d3d;
      --text: #2d2d2d;
      --text-light: #6b6b6b;
      --white: #ffffff;
      --gray-bg: #f7f7f7;
      --gray-light: #ececec;
      --border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text strong {
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .logo-text span {
      color: #aaa;
      font-size: 12px;
      font-weight: 400;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--white);
    }

    .nav-links {
      display: none;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
    }

    .btn-cta-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-cta-header:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.4);
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(160deg, rgba(20,10,10,0.92) 0%, rgba(140,30,20,0.80) 50%, rgba(20,10,10,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.015) 40px,
          rgba(255,255,255,0.015) 80px
        );
      background-color: #1c0a08;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(192,57,43,0.20) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(230,126,34,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 80px;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    @media (min-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr 1fr;
        padding: 120px 20px 100px;
      }
    }

    .hero-content {
      max-width: 620px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #f1948a;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-content h1 span {
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-content p {
      font-size: 1.15rem;
      color: #c8c8c8;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 40px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.50);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat strong {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 0.82rem;
      color: #999;
      margin-top: 2px;
    }

    .hero-visual {
      display: none;
    }

    @media (min-width: 900px) {
      .hero-visual {
        display: flex;
        justify-content: center;
        align-items: center;
      }
    }

    .hero-card-float {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(10px);
      max-width: 340px;
      width: 100%;
    }

    .hero-card-title {
      color: var(--white);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-check-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .service-check-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ccc;
      font-size: 0.95rem;
    }

    .check-icon {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ─── SEKCE OBECNÉ ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.10);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.7rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      line-height: 1.25;
    }

    .section-sub {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--gray-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 520px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .services-grid .card:last-child:nth-child(3n+1) {
        grid-column: 2;
      }
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.10));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 680px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-item {
      text-align: center;
      padding: 40px 24px;
      border-radius: var(--radius-lg);
      background: var(--gray-bg);
      border: 1px solid var(--gray-light);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(192,57,43,0.25);
    }

    .benefit-item h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-item p {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(192,57,43,0.12) 0%, transparent 60%),
        radial-gradient(circle at 80% 50%, rgba(230,126,34,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: #aaa;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 680px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(6px);
      transition: transform 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      border-color: rgba(192,57,43,0.4);
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
      font-size: 18px;
    }

    .review-text {
      color: #ccc;
      font-size: 0.93rem;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      color: var(--white);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .author-info span {
      color: #777;
      font-size: 0.82rem;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--gray-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 40px;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8
