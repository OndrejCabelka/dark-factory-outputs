<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profi Zahradníci Praha – Komplexní zahradnické služby</title>
  <meta name="description" content="Profesionální zahradník v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy. Volejte 776 611 925.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2e7d32;
      --primary-light: #4caf50;
      --primary-dark: #1b5e20;
      --primary-soft: #e8f5e9;
      --accent: #8bc34a;
      --accent-warm: #f9a825;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --text: #1c1c1c;
      --text-muted: #5a6475;
      --white: #ffffff;
      --bg-light: #f7faf7;
      --border: #d8e8d8;
      --shadow: 0 4px 24px rgba(46,125,50,0.10);
      --shadow-hover: 0 8px 36px rgba(46,125,50,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── NAVBAR ─── */
    header {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .navbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary-dark);
      white-space: nowrap;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      white-space: nowrap;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      transition: all 0.25s ease;
      box-shadow: 0 3px 12px rgba(46,125,50,0.30);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46,125,50,0.40);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .nav-cta .phone-icon {
      font-size: 16px;
      animation: ring 2.5s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(-12deg); }
      20% { transform: rotate(12deg); }
      30% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      50% { transform: rotate(0deg); }
    }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background:
        linear-gradient(160deg,
          rgba(14, 40, 14, 0.91) 0%,
          rgba(27, 70, 27, 0.85) 40%,
          rgba(46, 100, 46, 0.80) 100%),
        url('https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=1600&q=80') center/cover no-repeat;
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(139,195,74,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(46,125,50,0.20) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      max-width: 1180px;
      margin: 0 auto;
      padding: 80px 20px 60px;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(139,195,74,0.18);
      border: 1px solid rgba(139,195,74,0.35);
      color: #b5e04a;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.03em;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 66px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.13;
      margin-bottom: 22px;
      max-width: 760px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.82);
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(76,175,80,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(76,175,80,0.55);
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.12);
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: all 0.25s ease;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.65);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      font-weight: 400;
    }

    /* ─── SEKCE: SPOLEČNÉ ─── */
    .section {
      padding: 90px 20px;
    }

    .section-inner {
      max-width: 1180px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.65;
      margin-bottom: 48px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(76,175,80,0.25);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary-soft), #c8e6c9);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
      transition: all 0.3s ease;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.08);
    }

    .sluzba-nazev {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-popis {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      transition: gap 0.2s ease;
    }

    .sluzba-karta:hover .sluzba-link {
      gap: 10px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .proc-my-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 50px;
    }

    @media (min-width: 900px) {
      .proc-my-wrap {
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 80px;
      }
    }

    .proc-my-visual {
      background: linear-gradient(145deg, var(--primary-dark), var(--primary));
      border-radius: 24px;
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      overflow: hidden;
    }

    .proc-my-visual::after {
      content: '🌿';
      position: absolute;
      right: -10px;
      bottom: -20px;
      font-size: 120px;
      opacity: 0.12;
    }

    .visual-number {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .visual-num-val {
      font-size: 48px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .visual-num-label {
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      max-width: 140px;
      line-height: 1.3;
    }

    .visual-divider {
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    .benefity-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .benefit-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary-soft), #c8e6c9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--bg-light);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
    }

    .recenze-karta:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .recenze-karta::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 22px;
      font-size: 80px;
      color: var(--primary-soft);
      font-family: Georgia, serif;
      line-height: 1;
      font-weight: 700;
    }

    .hvezdicka {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .hvezdicka span {
      color: var(--accent-warm);
      font-size: 18px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 22px;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .autor-info-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
    }

    .autor-info-loc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
        gap: 50px;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-radek {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--bg-light);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: all 0.25s ease;
    }

    .kontakt-radek:hover {
      background: var(--primary-soft);
      border-color: rgba(76,175,80,0.30);
    }

    .kontakt-radek a {
      color: var(--primary);
      font-weight: 700;
    }

    .kontakt-radek a:hover {
      color: var(--primary-dark);
    }

    .kontakt-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-detail h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .kontakt-detail p, .kontakt-detail a {
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
    }

    .mapa-placeholder {
      background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
      border-radius: var(--radius);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px dashed rgba(46,125,50,0.25);
      padding: 40px 20px;
      text-align: center;
    }

    .mapa-placeholder .map-pin {
      font-size: 56px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform:
