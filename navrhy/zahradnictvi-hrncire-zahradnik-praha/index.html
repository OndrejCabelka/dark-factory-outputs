<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zahradnictví Hrnčíře – Profesionální zahradník Praha</title>
<meta name="description" content="Profesionální zahradnické služby v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy. Volejte +420732152153">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --green-dark: #1a4d2e;
  --green-mid: #2d7a4f;
  --green-light: #4caf7d;
  --green-pale: #e8f5ee;
  --green-accent: #5dbf85;
  --text-dark: #1a1a2e;
  --text-mid: #4a5568;
  --text-light: #718096;
  --white: #ffffff;
  --bg-light: #f8fdf9;
  --shadow: 0 4px 24px rgba(26,77,46,0.10);
  --shadow-hover: 0 8px 36px rgba(26,77,46,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text-dark);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── BANNER ─────────────────────────────────────────── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ── NAVBAR ─────────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(26,77,46,0.08);
  box-shadow: 0 2px 16px rgba(26,77,46,0.07);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: -0.3px;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--green-mid);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-mid);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--green-mid);
}

.btn-nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--green-mid), var(--green-light));
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600 !important;
  font-size: 14px !important;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(45,122,79,0.3);
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(45,122,79,0.4);
}

@media (max-width: 768px) {
  .nav-links {
    display: none;
  }
  .nav-logo-sub {
    display: none;
  }
  .nav-logo-name {
    font-size: 15px;
  }
}

/* ── HERO ───────────────────────────────────────────── */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background:
    linear-gradient(160deg, rgba(10,38,20,0.92) 0%, rgba(26,77,46,0.85) 50%, rgba(45,122,79,0.80) 100%),
    radial-gradient(ellipse at 70% 50%, rgba(76,175,125,0.3) 0%, transparent 60%);
  background-color: var(--green-dark);
}

.hero-bg-decor {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.hero-circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(76,175,125,0.08);
}

.hero-circle-1 {
  width: 600px;
  height: 600px;
  top: -200px;
  right: -150px;
}

.hero-circle-2 {
  width: 400px;
  height: 400px;
  bottom: -100px;
  left: -100px;
  background: rgba(93,191,133,0.06);
}

.hero-circle-3 {
  width: 200px;
  height: 200px;
  top: 30%;
  right: 20%;
  background: rgba(76,175,125,0.05);
}

.hero-leaf {
  position: absolute;
  font-size: 120px;
  opacity: 0.04;
  user-select: none;
}

.hero-leaf-1 { top: 10%; left: 5%; font-size: 180px; }
.hero-leaf-2 { bottom: 10%; right: 8%; font-size: 140px; }
.hero-leaf-3 { top: 50%; left: 45%; font-size: 90px; }

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 60px;
  position: relative;
  z-index: 2;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(76,175,125,0.2);
  border: 1px solid rgba(76,175,125,0.35);
  color: #9ee8bc;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #6ddbaa;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

.hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
  max-width: 740px;
}

.hero h1 span {
  color: var(--green-accent);
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.78);
  max-width: 560px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-ctas {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--green-light), var(--green-accent));
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  text-decoration: none;
  transition: transform 0.25s, box-shadow 0.25s;
  box-shadow: 0 6px 24px rgba(76,175,125,0.4);
  letter-spacing: -0.2px;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(76,175,125,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  color: var(--white);
  padding: 14px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  text-decoration: none;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--green-accent);
  line-height: 1;
  letter-spacing: -1px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
  margin-top: 4px;
}

/* ── SERVICES ───────────────────────────────────────── */
#sluzby {
  background: var(--bg-light);
  padding: 100px 20px;
}

.section-header {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 60px;
}

.section-tag {
  display: inline-block;
  background: var(--green-pale);
  color: var(--green-mid);
  padding: 5px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text-dark);
  line-height: 1.2;
  letter-spacing: -0.8px;
  margin-bottom: 14px;
}

.section-desc {
  color: var(--text-light);
  font-size: 17px;
  line-height: 1.7;
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(26,77,46,0.06);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--green-mid), var(--green-accent));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon-wrap {
  width: 64px;
  height: 64px;
  background: var(--green-pale);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 22px;
  transition: background 0.3s, transform 0.3s;
}

.service-card:hover .service-icon-wrap {
  background: linear-gradient(135deg, var(--green-mid), var(--green-light));
  transform: scale(1.08);
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-text {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--green-mid);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ── WHY US ─────────────────────────────────────────── */
#proc-my {
  padding: 100px 20px;
  background: var(--white);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(232,245,238,0.7) 0%, transparent 60%);
  pointer-events: none;
}

.whyus-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.whyus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
  margin-top: 60px;
}

.benefit-card {
  display: flex;
  gap: 22px;
  align-items: flex-start;
  padding: 32px 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-light);
  border: 1px solid rgba(26,77,46,0.07);
  transition: transform 0.3s, box-shadow 0.3s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.benefit-body {}

.benefit-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.benefit-text {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.65;
}

/* ── REVIEWS ────────────────────────────────────────── */
#reference {
  background: var(--green-dark);
  padding: 100px 20px;
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 70%, rgba(76,175,125,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(76,175,125,0.2);
  color: #9ee8bc;
}

#reference .section-desc {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 1;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: background 0.3s, transform 0.3s;
  backdrop-filter: blur(6px);
}

.review-card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-4px);
}

.review-stars {
  color: #f5c842;
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  color: rgba(255,255,255,0.82);
  font-size: 15px;
  line-height: 1.72;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--green-mid), var(--green-accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.review-location {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  margin-top: 2px;
}

/* ── CONTACT ────────────────────────────────────────── */
#kontakt {
  padding: 100px 20px;
  background: var(--bg-light);
}

.contact-inner {
  max-width: 1100px;
  margin: 0 auto;
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  margin-top: 60px;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 24px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid rgba(26,77,46,0.06);
  transition: transform 0.2s;
}

.contact-item:hover {
  transform: translateX(4px);
}

.contact-item-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--green-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--green-mid);
  margin-bottom: 5px;
}
