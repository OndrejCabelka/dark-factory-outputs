<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klempířství Brno – Dalibor Grufík | Pokrývačství, Tesařství</title>
  <meta name="description" content="Profesionální klempíř v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte: +420 723 303 957">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e07b00;
      --primary-dark: #b56200;
      --primary-light: #f5a030;
      --dark: #1a1a2e;
      --darker: #0f0f1a;
      --dark-card: #22223a;
      --gray: #6b7280;
      --light-gray: #f3f4f6;
      --white: #ffffff;
      --text: #1f2937;
      --text-light: #4b5563;
      --accent: #c0392b;
      --steel: #4a6fa5;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(15, 15, 26, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 24px;
    }

    .nav-links a {
      color: #d1d5db;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(224, 123, 0, 0.35);
    }

    .btn-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(224, 123, 0, 0.5);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #1e2a40 70%, #0f1820 100%);
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      background-image:
        repeating-linear-gradient(45deg, #e07b00 0, #e07b00 1px, transparent 0, transparent 50%),
        repeating-linear-gradient(-45deg, #e07b00 0, #e07b00 1px, transparent 0, transparent 50%);
      background-size: 30px 30px;
    }

    .hero-gradient-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(224, 123, 0, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(74, 111, 165, 0.1) 0%, transparent 50%);
    }

    .hero-roof {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      overflow: hidden;
    }

    .hero-roof svg {
      width: 100%;
      height: 100%;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 140px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(224, 123, 0, 0.15);
      border: 1px solid rgba(224, 123, 0, 0.4);
      color: var(--primary-light);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 68px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 21px);
      color: #9ca3af;
      margin-bottom: 36px;
      max-width: 600px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-sub strong {
      color: #d1d5db;
      font-weight: 600;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 6px 25px rgba(224, 123, 0, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(224, 123, 0, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.07);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
      font-weight: 500;
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(224, 123, 0, 0.08);
      border: 1px solid rgba(224, 123, 0, 0.2);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.65;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--light-gray);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 600px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 992px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      transition: all 0.3s ease;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.13);
      border-color: rgba(224, 123, 0, 0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(224, 123, 0, 0.12), rgba(224, 123, 0, 0.05));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-card-featured {
      background: linear-gradient(135deg, var(--dark), var(--dark-card));
      border-color: rgba(224, 123, 0, 0.3);
    }

    .service-card-featured h3 {
      color: var(--white);
    }

    .service-card-featured p {
      color: #9ca3af;
    }

    .service-card-featured .service-icon {
      background: linear-gradient(135deg, rgba(224, 123, 0, 0.25), rgba(224, 123, 0, 0.1));
    }

    .service-card-featured::before {
      transform: scaleX(1);
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 123, 0, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      padding: 36px 30px;
      border-radius: 16px;
      background: var(--light-gray);
      border: 1.5px solid transparent;
      transition: all 0.3s;
      text-align: left;
    }

    .benefit-card:hover {
      border-color: rgba(224, 123, 0, 0.25);
      background: var(--white);
      box-shadow: 0 12px 36px rgba(0,0,0,0.09);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 13px;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(224, 123, 0, 0.3);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(45deg, #e07b00 0, #e07b00 1px, transparent 0, transparent 40px);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: #9ca3af;
    }

    #reference .section-tag {
      background: rgba(224, 123, 0, 0.15);
      border-color: rgba(224, 123, 0, 0.35);
      color: var(--primary-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 30px;
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(224, 123, 0, 0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .review-stars {
      color: var(--primary-light);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #d1d5db;
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .review-loc {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .quote-icon {
      position: absolute;
      top: 18px;
      right: 22px;
      font-size: 42px;
      color: rgba(224, 123, 0, 0.12);
      line-height: 1;
      font-family: Georgia, serif;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--light-gray);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    @media (min-width: 900px) {
      .contact-layout {
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: start;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
