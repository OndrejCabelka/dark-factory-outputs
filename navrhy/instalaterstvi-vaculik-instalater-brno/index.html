<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatérství Vaculík – Profesionální instalatér v Brně</title>
  <meta name="description" content="Profesionální instalatér v Brně a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420608975908">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fbd;
      --primary-dark: #135299;
      --primary-light: #2d87d8;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #112236;
      --text: #1e2d3d;
      --text-light: #5a7184;
      --white: #ffffff;
      --bg-light: #f4f8fd;
      --border: #dce8f4;
      --shadow: 0 4px 24px rgba(26,111,189,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,189,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--white);
      box-shadow: 0 2px 16px rgba(26,111,189,0.08);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-weight: 800;
      font-size: 17px;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(26,111,189,0.30);
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      box-shadow: 0 6px 22px rgba(26,111,189,0.40);
      transform: translateY(-1px);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #112a45 40%, #1a4a7a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,189,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(45,135,216,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,189,0.25);
      border: 1px solid rgba(45,135,216,0.40);
      color: #7ec8f5;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .hero-title {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 18px;
      max-width: 720px;
    }

    .hero-title span {
      color: #4db6f0;
    }

    .hero-subtitle {
      font-size: clamp(15px, 2vw, 18px);
      color: #a8c8e8;
      margin-bottom: 38px;
      max-width: 560px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(26,111,189,0.45);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      box-shadow: 0 8px 30px rgba(26,111,189,0.55);
      transform: translateY(-2px);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.18);
      transition: all 0.25s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.30);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-number {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #7aa8cc;
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* ─── SECTIONS COMMON ─── */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,189,0.08);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 540px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 520px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.28s ease;
      cursor: default;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-5px);
      border-color: rgba(26,111,189,0.20);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,111,189,0.10), rgba(45,135,216,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: all 0.28s ease;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.05);
    }

    .service-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
    }

    .service-link:hover {
      gap: 8px;
    }

    .service-card.featured {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: transparent;
      color: white;
    }

    .service-card.featured .service-icon {
      background: rgba(255,255,255,0.15);
    }

    .service-card.featured .service-name {
      color: var(--white);
    }

    .service-card.featured .service-text {
      color: rgba(255,255,255,0.80);
    }

    .service-card.featured .service-link {
      color: rgba(255,255,255,0.90);
    }

    .service-badge {
      display: inline-block;
      background: var(--accent);
      color: var(--dark);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      padding: 36px 30px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: var(--bg-light);
      text-align: center;
      transition: all 0.25s ease;
    }

    .benefit-card:hover {
      border-color: var(--primary);
      box-shadow: 0 6px 28px rgba(26,111,189,0.10);
      transform: translateY(-3px);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 20px rgba(26,111,189,0.25);
    }

    .benefit-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 600px) {
      .reviews-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border-radius: 16px;
      padding: 28px 26px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s ease;
      position: relative;
    }

    .review-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 22px;
      font-size: 72px;
      color: rgba(26,111,189,0.08);
      font-weight: 900;
      line-height: 1;
    }

    .stars {
      color: var(--accent);
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .author-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--dark);
    }

    .author-meta {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr 1.3fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--bg-light);
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: all 0.22s ease;
    }

    .contact-item:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 18px rgba(26,111,189,0.09);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body h4 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-body a,
    .contact-item-body p {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8f0f8, #d0e4f4);
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 340px;
      gap: 14px;
      padding: 40px;
      text-align: center;
    }

    .map-pin {
      font-size: 52px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-placeholder h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .map-placeholder p {
      font-size: 14px;
      color: var(--text-light);
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.22s ease;
      margin-top: 4px;
    }

    .map-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    /* ─── CTA BANNER
