<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambitherm s.r.o. – Profesionální instalatér Znojmo</title>
<meta name="description" content="Profesionální instalatérské služby ve Znojmě a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, ústřední topení. Havárie 24/7.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #0f4f96;
  --primary-light: #3a8fd4;
  --accent: #f0a500;
  --dark: #0d1b2e;
  --dark2: #12243a;
  --text: #1a2636;
  --text-light: #5a6a7e;
  --white: #ffffff;
  --bg-light: #f4f8fd;
  --bg-card: #ffffff;
  --border: #e1eaf5;
  --shadow: 0 4px 24px rgba(26,111,196,0.10);
  --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== UTILITY ===== */
.container {
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-label {
  display: inline-block;
  background: rgba(26,111,196,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 100px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  margin-bottom: 12px;
}

.section-sub {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 540px;
  margin: 0 auto 48px;
  line-height: 1.7;
}

section {
  padding: 80px 0;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(26,111,196,0.07);
}

nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  max-width: 1160px;
  margin: 0 auto;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.3px;
}

.logo-tagline {
  font-size: 0.7rem;
  color: var(--text-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 11px 22px;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 700;
  white-space: nowrap;
  transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
  box-shadow: 0 4px 16px rgba(26,111,196,0.30);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(26,111,196,0.40);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.nav-cta .phone-icon {
  font-size: 16px;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.18s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0a1628 0%, #0d2045 40%, #0f3060 70%, #1a4a80 100%);
  min-height: 90vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 100px 0 80px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(26,111,196,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(15,79,150,0.30) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, rgba(10,22,40,0.3));
  pointer-events: none;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.90);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 100px;
  margin-bottom: 24px;
  backdrop-filter: blur(8px);
  letter-spacing: 0.5px;
}

.badge-dot {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

#hero h1 {
  font-size: clamp(1.9rem, 5.5vw, 3.2rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(90deg, #60b3ff, #a8d8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.75);
  margin-bottom: 36px;
  line-height: 1.75;
  max-width: 520px;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--accent), #e09400);
  color: var(--dark);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 100px;
  font-size: 1rem;
  font-weight: 800;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 6px 24px rgba(240,165,0,0.40);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 36px rgba(240,165,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.10);
  border: 2px solid rgba(255,255,255,0.30);
  color: var(--white);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 100px;
  font-size: 1rem;
  font-weight: 600;
  transition: background 0.18s, border-color 0.18s, transform 0.18s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-number {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.stat-label {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.stat-divider {
  width: 1px;
  background: rgba(255,255,255,0.20);
  align-self: stretch;
}

.hero-visual {
  display: none;
}

/* ===== EMERGENCY BAND ===== */
.emergency-band {
  background: linear-gradient(90deg, var(--accent), #e09400);
  padding: 0;
}

.emergency-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px 24px;
  padding: 16px 20px;
  max-width: 1160px;
  margin: 0 auto;
}

.emergency-inner span {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--dark);
}

.emergency-inner a {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--dark);
  color: var(--white);
  text-decoration: none;
  padding: 9px 20px;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 700;
  transition: background 0.18s, transform 0.18s;
}

.emergency-inner a:hover {
  background: var(--dark2);
  transform: translateY(-1px);
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--bg-light);
}

#sluzby .header-center {
  text-align: center;
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.22s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,196,0.20);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.service-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.3;
}

.service-card p {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.65;
}

.service-card.highlight {
  background: linear-gradient(135deg, #0d2045, #1a4a80);
  border-color: rgba(26,111,196,0.30);
}

.service-card.highlight h3 {
  color: var(--white);
}

.service-card.highlight p {
  color: rgba(255,255,255,0.70);
}

.service-card.highlight .service-icon {
  background: rgba(255,255,255,0.12);
}

.service-tag {
  display: inline-block;
  background: rgba(240,165,0,0.15);
  color: #b07800;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 100px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  align-self: flex-start;
}

.service-card.highlight .service-tag {
  background: rgba(240,165,0,0.25);
  color: var(--accent);
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--white);
}

#proc-my .header-center {
  text-align: center;
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
}

.benefit-card {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 28px;
  border: 1px solid var(--border);
  transition: transform 0.20s, box-shadow 0.20s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.benefit-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  box-shadow: 0 6px 20px rgba(26,111,196,0.30);
}

.benefit-content h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
  line-height: 1.3;
}

.benefit-content p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCES ===== */
#reference {
  background: var(--bg-light);
}

#reference .header-center {
  text-align: center;
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.20s, box-shadow 0.20s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 72px;
  line-height: 1;
  color: rgba(26,111,196,0.10);
  font-family: Georgia, serif;
  font-weight: 700;
}

.stars {
  font-size: 1.1rem;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.97rem;
  color: var(--text);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 20px;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: white;
  font-weight: 700;
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--dark);
}

.reviewer-info span {
  font-size: 0.8rem;
  color: var(--text-light);
}

/* ===== CONTACT ===== */
#kontakt {
  background: linear-gradient(135deg, #0a1628 0%, #0d2045 50%, #0f3060 100%);
  position: relative;
  overflow: hidden;
}

#kontakt::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 50% 70% at 80% 50%, rgba(26,111,196,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#kontakt .header-center {
  text-align: center;
  position: relative;
  z-index: 1;
}

#kontakt .section-label {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.85);
}

#kontakt .section-title {
  color: var(--white);
}

#kontakt .section-sub {
  color: rgba(255,255,255,0.65);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 28px;
  position: relative;
  z-index: 1;
}

.contact-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius);
  padding: 28px;
  backdrop-filter: blur(12px);
  transition: background 0.20s, transform 0.20s;
}

.contact-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateY(-3px);
}

.contact-card-icon {
  font-size: 28px;
  margin-bottom: 14px;
}

.contact-card h3 {
  font-size: 0.82rem;
  font-weight: 700;
