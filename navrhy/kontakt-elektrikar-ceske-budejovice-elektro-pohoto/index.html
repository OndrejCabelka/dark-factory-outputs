<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrikář České Budějovice – Elektro pohotovost | +420 605 739 188</title>
<meta name="description" content="Profesionální elektrikář v Českých Budějovicích. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Elektro pohotovost 24/7.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C300;
  --primary-dark: #D4A800;
  --primary-light: #FFD740;
  --dark: #0D0F14;
  --dark2: #161A23;
  --dark3: #1E2330;
  --text: #E8EAF0;
  --text-muted: #9AA0B4;
  --white: #ffffff;
  --card-bg: #1A1E2E;
  --border: rgba(245,195,0,0.15);
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========================
   BANNER
======================== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========================
   HEADER / NAVBAR
======================== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(13, 15, 20, 0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(245,195,0,0.3);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(245,195,0,0.45);
}

.nav-cta .pulse {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--dark);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

/* ========================
   HERO
======================== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  overflow: hidden;
  background: 
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,195,0,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,195,0,0.06) 0%, transparent 60%),
    linear-gradient(180deg, #0D0F14 0%, #111420 60%, #0D0F14 100%);
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(245,195,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,195,0,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,195,0,0.12);
  border: 1px solid rgba(245,195,0,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
  margin: 0 auto;
}

.hero-content h1 {
  font-size: clamp(30px, 6vw, 62px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--white);
  letter-spacing: -1.5px;
  margin-bottom: 24px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 580px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 800;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(245,195,0,0.4);
  letter-spacing: -0.2px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(245,195,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  border: 2px solid rgba(255,255,255,0.2);
  transition: border-color 0.2s, background 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  background: rgba(245,195,0,0.07);
  color: var(--primary);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 32px;
}

.stat-item {
  text-align: center;
}

.stat-number {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -1px;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-scroll {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--primary), transparent);
  animation: scrollLine 2s ease-in-out infinite;
}

@keyframes scrollLine {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ========================
   SECTION COMMONS
======================== */
section {
  padding: 90px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-label::before {
  content: '';
  display: block;
  width: 20px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 540px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ========================
   SLUZBY
======================== */
#sluzby {
  background: var(--dark2);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.4), 0 0 0 1px rgba(245,195,0,0.2);
  border-color: rgba(245,195,0,0.3);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.card-icon {
  width: 58px;
  height: 58px;
  background: rgba(245,195,0,0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
  border: 1px solid rgba(245,195,0,0.2);
  transition: background 0.25s;
}

.sluzba-card:hover .card-icon {
  background: rgba(245,195,0,0.18);
}

.card-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.card-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  margin-top: 18px;
  text-decoration: none;
  letter-spacing: 0.2px;
  transition: gap 0.2s;
}

.card-link:hover {
  gap: 8px;
}

/* ========================
   PROC MY
======================== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(245,195,0,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.proc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 32px;
  margin-top: 56px;
}

.proc-card {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 36px 32px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: transform 0.25s, box-shadow 0.25s;
}

.proc-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.proc-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(245,195,0,0.15);
  line-height: 1;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
}

.proc-icon-wrap {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.proc-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.4px;
}

.proc-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ========================
   REFERENCE
======================== */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  position: relative;
  transition: transform 0.25s, box-shadow 0.25s;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.3);
}

.review-quote {
  font-size: 52px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
  opacity: 0.7;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
}

.author-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.author-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.stars {
  color: var(--primary);
  font-size: 13px;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

/* ========================
   KONTAKT
======================== */
#kontakt {
  background: var(--dark);
}

.kontakt-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 24px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s;
}

.kontakt-item:hover {
  border-color: rgba(245,195,0,0.3);
}

.kontakt-icon {
  width: 48px;
  height: 48px;
  background: rgba(245,195,0,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(245,195,0,0.2);
}

.kontakt-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  margin-bottom: 4px;
}

.kontakt-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
}

.kontakt-value a {
  color: var(--primary);
  text-decoration: none;
}

.kontakt-value a:hover {
  text-decoration: underline;
}

.kontakt-map {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  height: 100%;
  min-height: 380px;
  display: flex;
  flex-direction: column;
}

.map-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: 
    linear-gradient(135deg, #1A1E2E 0%, #161A23 100%);
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(245,195,0,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,195,0,0.05) 1px, transparent 1px);
  background-size: 30px 30px;
