<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #b8860b;
  --primary-light: #d4a017;
  --primary-dark: #8b6508;
  --secondary: #1a2332;
  --dark: #0d1520;
  --dark2: #111c2d;
  --text: #e8eaf0;
  --text-muted: #9aa3b0;
  --white: #ffffff;
  --card-bg: #162030;
  --border: rgba(184,134,11,0.2);
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.5);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── BANNER ── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ── NAVBAR ── */
header {
  background: rgba(13, 21, 32, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 999;
  width: 100%;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(184,134,11,0.4);
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

nav {
  display: none;
  gap: 28px;
}

nav a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
  white-space: nowrap;
}

nav a:hover {
  color: var(--primary-light);
}

.btn-call-nav {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(184,134,11,0.35);
  flex-shrink: 0;
}

.btn-call-nav:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(184,134,11,0.5);
}

/* ── HERO ── */
#hero {
  position: relative;

    radial-gradient(ellipse at 70% 50%, rgba(184,134,11,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 10% 80%, rgba(184,134,11,0.08) 0%, transparent 50%),

}

.hero-pattern {
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(184,134,11,0.03) 40px,
      rgba(184,134,11,0.03) 41px
    );
  pointer-events: none;
}

.hero-shape {
  position: absolute;
  top: -80px;
  right: -80px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(184,134,11,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-shape2 {
  position: absolute;
  bottom: -100px;
  left: -50px;

  height: 400px;
  background: radial-gradient(circle, rgba(184,134,11,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.hero-content {

  padding: 80px 20px 60px;

}

.hero-badge {

  align-items: center;
  gap: 8px;
  background: rgba(184,134,11,0.15);
  border: 1px solid rgba(184,134,11,0.3);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-content h1 {
  font-size: clamp(28px, 6vw, 62px);
  font-weight: 900;
  line-height: 1.12;
  color: var(--white);
  margin-bottom: 22px;
  letter-spacing: -1px;
  max-width: 780px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 580px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(184,134,11,0.4);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(184,134,11,0.55);
  background: linear-gradient(135deg, #e8a820, var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.25s;
  white-space: nowrap;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--primary-light);
  color: var(--primary-light);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ── SECTIONS ── */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 54px;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(184,134,11,0.12);
  border: 1px solid rgba(184,134,11,0.25);
  color: var(--primary-light);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.65;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ── SERVICES ── */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 22px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(184,134,11,0.4);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(184,134,11,0.2), rgba(184,134,11,0.08));
  border: 1px solid rgba(184,134,11,0.25);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: all 0.3s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(184,134,11,0.35), rgba(184,134,11,0.15));
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

.service-card .service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  margin-top: 16px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ── PROC MY ── */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(184,134,11,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  border-color: rgba(184,134,11,0.35);
}

.benefit-number {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.7;
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, rgba(184,134,11,0.15), rgba(184,134,11,0.05));
  border: 1.5px solid rgba(184,134,11,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 22px;
  transition: all 0.3s;
}

.benefit-card:hover .benefit-icon-wrap {
  background: linear-gradient(135deg, rgba(184,134,11,0.3), rgba(184,134,11,0.1));
  transform: scale(1.1) rotate(5deg);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ── REFERENCE ── */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 22px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 30px;
  transition: all 0.3s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(184,134,11,0.35);
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.star {
  font-size: 18px;
  color: var(--primary-light);
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: var(--primary);
  opacity: 0.4;
  line-height: 0;
  vertical-align: -14px;
  margin-right: 4px;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;

  border-radius: 50%;

  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: var(--white);

}

.reviewer-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* ── KONTAKT ── */
#kontakt {
  background: var(--dark);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
}

  display: flex;
  flex-direction: column;

}

  display: flex;

  width: 46px;

.contact-item-text a,
.contact-item-text span {

.contact-item-text a:hover {

}

.contact-item-text .addr-small {
  font-size: 14px;
  font-weight: 400;

}

.map-placeholder {

  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 15px;
  position: relative;
  overflow
