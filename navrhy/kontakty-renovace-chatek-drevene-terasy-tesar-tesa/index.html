<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesař Praha – Krovové konstrukce, Altány, Pergoly, Dřevostavby</title>
<meta name="description" content="Profesionální tesář v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů, dřevostavby. Volejte 774 808 687.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #8B4513;
  --primary-light: #A0522D;
  --primary-dark: #5C2E0A;
  --accent: #D4A054;
  --accent-light: #E8C07A;
  --dark: #1A1008;
  --dark2: #2C1A0A;
  --text: #2D1B0E;
  --text-light: #6B4C35;
  --white: #FFFFFF;
  --bg-light: #FAF6F2;
  --bg-section: #F5EDE4;
  --border: #E8D5C4;
  --shadow: rgba(139,69,19,0.15);
  --shadow-dark: rgba(28,10,0,0.25);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,16,8,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212,160,84,0.2);
  padding: 0 20px;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  font-size: 28px;
  line-height: 1;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
}

.nav-logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(139,69,19,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(139,69,19,0.5);
}

.nav-cta-icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(160deg, #1A0A02 0%, #2C1505 30%, #3D1F08 60%, #1A0A02 100%);
}

.hero-texture {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(212,160,84,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(92,46,10,0.3) 0%, transparent 50%);
  pointer-events: none;
}

.hero-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 60px,
    rgba(255,255,255,0.5) 60px,
    rgba(255,255,255,0.5) 61px
  ),
  repeating-linear-gradient(
    0deg,
    transparent,
    transparent 60px,
    rgba(255,255,255,0.5) 60px,
    rgba(255,255,255,0.5) 61px
  );
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 24px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212,160,84,0.15);
  border: 1px solid rgba(212,160,84,0.35);
  color: var(--accent-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  font-weight: 400;
  max-width: 580px;
  margin: 0 auto 36px;
  line-height: 1.65;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.25s;
  box-shadow: 0 8px 30px rgba(139,69,19,0.5);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(139,69,19,0.65);
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.22);
  transition: all 0.25s;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  display: block;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 4px;
  display: block;
}

.hero-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ===== SECTION COMMON ===== */
section {
  padding: 80px 24px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-tag::before {
  content: '';
  display: block;
  width: 20px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--bg-light);
}

.sluzby-header {
  margin-bottom: 52px;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.sluzby-karta {
  background: var(--white);
  border-radius: 20px;
  padding: 32px 28px;
  box-shadow: 0 4px 24px var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.sluzby-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.3s;
}

.sluzby-karta:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px var(--shadow-dark);
  border-color: rgba(139,69,19,0.2);
}

.sluzby-karta:hover::before {
  opacity: 1;
}

.karta-icon {
  font-size: 44px;
  margin-bottom: 18px;
  display: block;
  line-height: 1;
}

.karta-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.karta-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
  margin-bottom: 20px;
}

.karta-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  transition: gap 0.2s;
}

.karta-link:hover {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.proc-my-inner {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  align-items: center;
}

.proc-my-header {
  margin-bottom: 4px;
}

.benefity-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 24px;
  background: var(--bg-section);
  border-radius: 16px;
  border: 1px solid var(--border);
  transition: all 0.25s;
}

.benefit-item:hover {
  background: linear-gradient(135deg, rgba(139,69,19,0.06), rgba(212,160,84,0.08));
  border-color: rgba(139,69,19,0.25);
  transform: translateX(4px);
}

.benefit-icon-wrap {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(139,69,19,0.3);
}

.benefit-text h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.2px;
}

.benefit-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

.proc-my-visual {
  background: linear-gradient(160deg, var(--dark2), var(--primary-dark));
  border-radius: 24px;
  padding: 40px 32px;
  color: var(--white);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.proc-my-visual::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(212,160,84,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.visual-emoji {
  font-size: 64px;
  display: block;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.visual-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.visual-desc {
  font-size: 15px;
  opacity: 0.75;
  line-height: 1.65;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.visual-tel {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 14px 24px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: 700;
  transition: all 0.25s;
  position: relative;
  z-index: 1;
  letter-spacing: 0.5px;
}

.visual-tel:hover {
  background: rgba(255,255,255,0.2);
  border-color: var(--accent);
  transform: scale(1.03);
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--bg-section);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '"';
  position: absolute;
  top: -20px;
  left: 20px;
  font-size: 200px;
  color: rgba(139,69,19,0.06);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}

.reference-header {
  margin-bottom: 48px;
}

.recenze-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.recenze-karta {
  background: var(--white);
  border-radius: 20px;
  padding: 30px 26px;
  box-shadow: 0 4px 20px var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px var(--shadow-dark);
}

.recenze-hvezdy {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.hvezda {
  font-size: 18px;
  color: var(--accent);
}

.recenze-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.autor-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.autor-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

.autor-info span {
  font-size: 13px;
  color: var(--text-light);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--dark);
  color: var(--white);
  position: relative;
  overflow: hidden;
}

#kontakt::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 10% 50%, rgba(139,69,19,0.2) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 20%, rgba(212,160,84,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.kontakt-inner {
  position: relative;
  z-index: 1;
}

.kontakt-header {
  margin-bottom: 52px;
}

.kontakt-header .section-title {
  color: var(--white);
}

.kontakt-header .section-desc {
  color: rgba(255,255,255,0.65);
}

.kontakt-header .section-tag {
  color: var(--accent);
}

.kontakt-header .section-tag::before {
  background: var(--accent);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

.kontakt-info-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.kontakt-item {
  display: flex;
  gap: 16px;
  align-items
