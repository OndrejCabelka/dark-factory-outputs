<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profiplast – Montáže, výměny a servis oken a dveří | Brno</title>
  <meta name="description" content="Profesionální výměna oken a dveří v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte +420545214647">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #135099;
      --primary-light: #2d8de8;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #112236;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-light: #f1f5f9;
      --gray: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      color: var(--white);
    }

    .logo-text strong {
      display: block;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-text span {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-cta .icon {
      font-size: 16px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #112e4f 50%, #1a4a7a 100%);
      min-height: 88vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(240,165,0,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.45);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

      width: 7px;
      height: 7px;
      background: #22d3ee;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: #94a3b8;
      margin-bottom: 42px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-sub strong {
      color: #cbd5e1;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 54px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,111,196,0.40);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26,111,196,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.20);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.40);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .hero-stat {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 14px 22px;
      text-align: center;
      min-width: 120px;
    }

    .hero-stat strong {
      display: block;
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
    }

    .hero-stat span {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    /* ─── SECTIONS SHARED ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(26,111,196,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-sub {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--gray-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.22s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      border: 1.5px solid transparent;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.25s;
      transform-origin: left;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.12);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .karta-ikona {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;

    .karta-titul {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .karta-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .proc-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .proc-ikona {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 6px 20px rgba(26,111,196,0.30);
      flex-shrink: 0;

    .proc-titul {

      font-weight: 700;
      color: var(--text);
    }

    .proc-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.75;
    }

    /* ─── REFERENCE ─── */
    #reference {

    .recenze-grid {

    .recenze-karta {

    .recenze-karta:hover {

    .recenze-text {

      color: #cbd5e1;
      line-height: 1.75;
      margin-bottom: 22px;

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;

    .autor-avatar {

      height: 44px;

    .autor-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .autor-info span {
      font-size: 12px;
      color: #64748b;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-polozka {
      display: flex;
      align-items: flex-start;

    .kontakt-polozka:hover {

    .kontakt-ikona-wrap {
      width: 48px;

    .mapa-placeholder {
      background: var(--white);

    .mapa-hlavicka {
      background: linear-gradient(135deg, var(--dark), var(--dark2));

      display: flex;
      align-items: center;
      gap: 10px;

    .mapa-hlavicka span {
      color: var(--white);
      font-size: 14px;
      font-weight: 600;

    .mapa-telo {
      flex: 1;
      background: linear-gradient(135deg, #e8f0fe 0%, #d0e8f8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 32px;
      text-align: center;

    .mapa-telo::before {

    .mapa-pin {
      position: relative;
      z-index: 2;

      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }

    .mapa-nazev {
      position: relative;
      z-index: 2;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .mapa-adresa {
      position: relative;
      z-index: 2;
      font-size: 14px;
      color: var(--text-light);
    }

      transition: color 0.2s, background 0.2s;

    .footer-links a:hover {
