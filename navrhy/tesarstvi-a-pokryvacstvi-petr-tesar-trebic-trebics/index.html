<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařství a pokrývačství Petr Tesař – Třebíč a okolí</title>
<meta name="description" content="Profesionální tesař v Třebíči – krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Zavolejte 605 770 833.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #8B4513;
  --primary-light: #A0522D;
  --primary-dark: #5C2E0A;
  --accent: #D4842A;
  --accent-light: #F0A550;
  --dark: #1A0F08;
  --dark2: #2C1A0E;
  --text: #2C1A0E;
  --text-light: #6B4C35;
  --bg: #FAF6F2;
  --bg2: #F3EBE3;
  --white: #FFFFFF;
  --shadow: 0 4px 24px rgba(139,69,19,0.12);
  --shadow-hover: 0 8px 36px rgba(139,69,19,0.22);
  --radius: 12px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
}

/* ── NAVBAR ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(26,15,8,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--primary);
  padding: 0 20px;
}

.nav-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--accent-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--accent);
  color: var(--white);
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.2s;
  white-space: nowrap;
}

.nav-cta:hover {
  background: var(--accent-light);
  transform: scale(1.03);
}

/* ── HERO ── */
#hero {
  background:
    linear-gradient(160deg, rgba(26,15,8,0.88) 0%, rgba(92,46,10,0.82) 60%, rgba(44,26,14,0.93) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(139,69,19,0.08) 0px,
      rgba(139,69,19,0.08) 2px,
      transparent 2px,
      transparent 20px
    ),
    repeating-linear-gradient(
      -45deg,
      rgba(212,132,42,0.05) 0px,
      rgba(212,132,42,0.05) 2px,
      transparent 2px,
      transparent 20px
    );
  background-color: var(--dark);
  min-height: 100svh;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px 60px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,132,42,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -60px; left: -60px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,69,19,0.2) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 780px;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(212,132,42,0.18);
  border: 1px solid rgba(212,132,42,0.4);
  color: var(--accent-light);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

#hero h1 {
  font-size: clamp(32px, 5.5vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--accent-light);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.78);
  margin-bottom: 40px;
  font-weight: 400;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.55;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 16px 32px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(212,132,42,0.4);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(212,132,42,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.35);
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 30px;
  border-radius: 50px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 56px;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--accent-light);
  line-height: 1;
  display: block;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
  margin-top: 4px;
  display: block;
}

/* ── SECTIONS COMMON ── */
section { padding: 80px 20px; }

.section-header {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(139,69,19,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
  border: 1px solid rgba(139,69,19,0.2);
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ── SERVICES ── */
#sluzby { background: var(--bg); }

.services-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 36px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,69,19,0.08);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(212,132,42,0.3);
}

.service-icon {
  font-size: 48px;
  margin-bottom: 18px;
  display: block;
  line-height: 1;
}

.service-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

.service-card::after {
  content: '';
  display: block;
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--primary));
  border-radius: 2px;
  margin: 16px auto 0;
  transition: width 0.25s;
}

.service-card:hover::after {
  width: 70px;
}

/* ── PROČ MY ── */
#proc-my {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '🪵';
  font-size: 260px;
  position: absolute;
  right: -30px;
  top: 50%;
  transform: translateY(-50%) rotate(-15deg);
  opacity: 0.04;
  pointer-events: none;
}

#proc-my .section-tag {
  background: rgba(212,132,42,0.15);
  color: var(--accent-light);
  border-color: rgba(212,132,42,0.25);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.65);
}

.benefits-grid {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(212,132,42,0.4);
  transform: translateY(-4px);
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.benefit-text {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}

/* ── REFERENCE ── */
#reference { background: var(--bg2); }

.reviews-grid {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,69,19,0.07);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-card::before {
  content: '"';
  font-size: 80px;
  font-family: Georgia, serif;
  color: var(--accent-light);
  opacity: 0.25;
  position: absolute;
  top: 10px;
  left: 20px;
  line-height: 1;
}

.stars {
  color: var(--accent);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 14px;
  display: block;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
  position: relative;
  z-index: 1;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--primary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--white);
  font-weight: 700;
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.reviewer-loc {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 1px;
}

/* ── KONTAKT ── */
#kontakt {
  background: var(--bg);
}

.kontakt-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 22px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,69,19,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}

.kontakt-item:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-hover);
}

.kontakt-icon {
  font-size: 28px;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(212,132,42,0.15), rgba(139,69,19,0.1));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.kontakt-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.kontakt-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
}

.kontakt-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-value a:hover {
  color: var(--accent);
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,69,19,0.08);
  height: 100%;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(212,132,42,0.06) 25%, transparent 25%) -20px 0,
    linear-gradient(225deg, rgba(212,132,42,0.06) 25%, transparent 25%) -20px 0,
    linear-gradient(315deg, rgba(212,132,42,0.06) 25%, transparent 25%),
    linear-gradient(45deg,  rgba(212,132,42,0.06) 25%, transparent 25%);
  background-size: 40px 40px;
  background-color: var(--bg2);
}

.map-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-pin {
  font-size: 52px;
  display: block;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 12px rgba(139,69,19,0.3));
}

.map-city {
  font-size: 22px;
  font-weight: 800;
  color: var(--dark);
}

.map-region {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 4px;
}

.map-note {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 16px;
  padding: 8px 18px;
  background: rgba(139,69,19,0.08);
  border-radius: 50px;
}

/* ── FOOTER ── */
footer {
  background: var(--dark);
  border-top: 2px solid var(--primary-dark);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.footer-logo .logo-name { font-size: 16px; }

.footer-copy {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  text-align: center;
}

.footer-ico {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  text-align: right;
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  section { padding: 60px 16px; }

  .kontakt-inner {
    grid-template-columns: 1fr;
  }

  .hero-stats {
    gap: 24px;
  }

  .stat-num { font-size: 26px; }

  .nav-cta span.nav-label { display: none; }

  .logo-sub { display: none; }

  .map-placeholder { min-height: 220px; }
