<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiří Schejbal – Instalatér a topenář Liberec | Havárie 24/7</title>
  <meta name="description" content="Profesionální instalatér a topenář v Liberci. Oprava poruch, instalace koupelen, výměna bojlerů, ústřední topení. Pohotovost 24/7.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f8f;
      --primary-light: #3a8fd4;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --dark: #0d1b2e;
      --dark-secondary: #1a2d45;
      --text: #1e293b;
      --text-light: #64748b;
      --text-muted: #94a3b8;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 40px rgba(0,0,0,0.12);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13, 27, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--primary-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,111,196,0.45);
    }

    .nav-cta .icon {
      font-size: 17px;
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0d2248 40%, #0f3460 70%, #1a5492 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(26,111,196,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 60%, rgba(15,78,143,0.22) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }

    /* Decorative circles */
    .hero-circle-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 1px solid rgba(26,111,196,0.12);
      top: -150px;
      right: -150px;
      pointer-events: none;
    }

    .hero-circle-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(26,111,196,0.1);
      bottom: -100px;
      left: -80px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.4);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-perex {
      font-size: clamp(16px, 2.2vw, 19px);
      color: #94b8d8;
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(26,111,196,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      display: block;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: #7ea8c8;
      margin-top: 4px;
      font-weight: 400;
    }

    /* ─── SECTIONS ─── */
    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      margin-top: 14px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.65;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      padding: 90px 20px;
      background: var(--gray-50);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      transition: transform 0.28s, box-shadow 0.28s, border-color 0.28s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
      border-color: rgba(26,111,196,0.2);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(26,111,196,0.1);
      transition: background 0.3s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, rgba(26,111,196,0.2), rgba(26,111,196,0.1));
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: rgba(26,111,196,0.08);
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 0.3px;
    }

    /* Emergency card */
    .service-card.emergency {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-secondary) 100%);
      border-color: rgba(245,158,11,0.3);
    }

    .service-card.emergency::before {
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    }

    .service-card.emergency .service-icon {
      background: rgba(245,158,11,0.15);
      border-color: rgba(245,158,11,0.2);
    }

    .service-card.emergency h3 {
      color: var(--white);
    }

    .service-card.emergency p {
      color: #94a3b8;
    }

    .service-card.emergency .service-tag {
      color: var(--accent);
      background: rgba(245,158,11,0.12);
    }

    /* ─── PROC MY ─── */
    #proc-my {
      padding: 90px 20px;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 32px;
      background: var(--gray-50);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-number {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      box-shadow: 0 6px 16px rgba(26,111,196,0.3);
    }

    .benefit-body h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .benefit-body p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      padding: 90px 20px;
      background: linear-gradient(180deg, var(--gray-50) 0%, var(--white) 100%);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 20px;
      right: 28px;
      font-size: 80px;
      line-height: 1;
      color: rgba(26,111,196,0.1);
      font-family: Georgia, serif;
      font-weight: 700;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      padding: 90px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #kontakt::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 80% 50%, rgba(26,111,196,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-label {
      color: var(--primary-light);
    }

    #kontakt .section-sub {
      color: #94a3b8;
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .kontakt-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: background 0.25s, border-color 0.25s;
    }

    .kontakt-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(26,111,196,0.4);
    }

    .kontakt-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      background: rgba(26,111,196,0.2);
      border: 1px solid rgba(26,111,196,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary-light);
      margin-bottom: 6px;
    }
