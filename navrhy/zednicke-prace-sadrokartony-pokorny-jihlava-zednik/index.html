<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zednické práce – Sádrokartony Pokorný Jihlava</title>
  <meta name="description" content="Profesionální zednické práce, rekonstrukce bytů, omítky a betonářské práce v Jihlavě a okolí. Volejte 737 341 631.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e05c00;
      --primary-dark: #b84a00;
      --primary-light: #ff7a2b;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #f8f6f2;
      --bg-card: #ffffff;
      --border: #e8e4de;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(224,92,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ========== NAVBAR ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(224,92,0,0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(224,92,0,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(224,92,0,0.50);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 17px;
      }
    }

    /* ========== HERO ========== */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background:
        linear-gradient(135deg,
          rgba(10, 10, 20, 0.92) 0%,
          rgba(15, 52, 96, 0.85) 40%,
          rgba(180, 60, 0, 0.75) 100%);
      background-color: #0d1b2a;
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(224,92,0,0.03) 0px,
          rgba(224,92,0,0.03) 1px,
          transparent 1px,
          transparent 60px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 1px,
          transparent 60px
        );
      pointer-events: none;
    }

    .hero-accent {
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(224,92,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-accent2 {
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(15,52,96,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 60px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(224,92,0,0.15);
      border: 1px solid rgba(224,92,0,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 750px;
    }

    .hero-content h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      margin-bottom: 40px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(224,92,0,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(224,92,0,0.60);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ========== SECTIONS GENERAL ========== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(224,92,0,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-subtitle {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 560px;
      margin-bottom: 52px;
      line-height: 1.65;
    }

    /* ========== SERVICES ========== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 560px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(224,92,0,0.25);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(224,92,0,0.1), rgba(224,92,0,0.2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 9px;
    }

    /* ========== WHY US ========== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 36px 28px;
      border: 1px solid var(--border);
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(224,92,0,0.30);
    }

    .benefit-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ========== REVIEWS ========== */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 60%, #1a1010 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(224,92,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(224,92,0,0.2);
      color: var(--primary-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-subtitle {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 28px 24px;
      backdrop-filter: blur(8px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.09);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: #ffc947;
      font-size: 18px;
    }

    .review-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.70;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 2.5rem;
      color: var(--primary);
      line-height: 0;
      vertical-align: -0.6rem;
      margin-right: 4px;
      font-style: normal;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
    }

    .author-location {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
    }

    /* ========== CONTACT ========== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .contact-info-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-info-card h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      border-bottom: none;
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(224,92,0,0.1), rgba(224,92,0,0.18));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-text {
      display: flex;
      flex-direction: column;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border-radius: var(--radius);
      min-height: 320px;
      display: flex;
      flex-direction: column;
