<!DOCTYPE html>

<head>

  <title>Tesařství Biskup, s.r.o. – Profesionální tesař Praha a okolí</title>
  <meta name="description" content="Tesařství Biskup – krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Praha a okolí. Volejte +420603537690">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-dark: #6B3410;
      --primary-light: #A0522D;
      --accent: #D2691E;
      --accent-bright: #CD853F;
      --dark: #1a1008;
      --dark-card: #2a1a0e;
      --text-dark: #1a1008;
      --text-muted: #6b5a4e;
      --text-light: #f5ede6;
      --white: #ffffff;
      --bg-light: #fdf8f4;
      --bg-section: #f7f0e8;
      --border: #e8d9cc;
      --shadow: 0 4px 24px rgba(139,69,19,0.10);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(26,16,8,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,69,19,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--accent-bright);
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-bright);
    }

    .btn-nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(139,69,19,0.35);
    }

    .btn-nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,69,19,0.45);

    .nav-mobile-hide {
      display: none;
    }

    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(139,69,19,0.04) 60px,
          rgba(139,69,19,0.04) 61px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(139,69,19,0.04) 60px,
          rgba(139,69,19,0.04) 61px
        );
      pointer-events: none;
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        175deg,
        transparent 0px,
        transparent 40px,
        rgba(100,50,10,0.08) 40px,
        rgba(100,50,10,0.08) 42px,
        transparent 42px,
        transparent 90px,
        rgba(80,40,8,0.06) 90px,
        rgba(80,40,8,0.06) 92px
      );
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139,69,19,0.25);
      border: 1px solid rgba(205,133,63,0.4);
      color: var(--accent-bright);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--accent-bright);
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      max-width: 700px;
    }

    #hero h1 .highlight {
      background: linear-gradient(135deg, var(--accent-bright), #f4a460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.80);
      max-width: 540px;
      margin-bottom: 40px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.45);
      letter-spacing: -0.01em;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,69,19,0.55);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.30);
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.50);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent-bright);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.60);
      margin-top: 4px;
      font-weight: 400;
    }

    .hero-scroll {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.40);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .hero-scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.40), transparent);
      animation: scroll-line 2s infinite;
    }

    @keyframes scroll-line {
      0% { transform: scaleY(0); transform-origin: top; }
      50% { transform: scaleY(1); transform-origin: top; }
      51% { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding: 5px 14px;
      background: rgba(139,69,19,0.08);
      border-radius: 50px;
      border: 1px solid rgba(139,69,19,0.15);
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);

      color: var(--text-dark);
      letter-spacing: -0.03em;

      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    .text-center {
      text-align: center;
    }

    .text-center .section-desc {
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent-bright));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.20);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,69,19,0.10), rgba(205,133,63,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
      border: 1px solid rgba(139,69,19,0.12);
      transition: all 0.3s;
    }

    .sluzba-card:hover .sluzba-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      transform: scale(1.08) rotate(-2deg);
    }

    .sluzba-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .sluzba-card p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .sluzba-card .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-top: 18px;
      transition: gap 0.2s;
    }

    .sluzba-card .sluzba-link:hover {
      gap: 10px;
    }

      content: '';

      height: 400px;
      background: radial-gradient(circle, rgba(139,69,19,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(205,133,63,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.60);

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;

      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);

      overflow: hidden;

    .benefit-card::after {

      inset: 0;

    .benefit-icon-wrap {

    }

      font-size: 0.92rem;
      color: rgba(255,255,255,0.58);

    #reference {
      background: var(--bg-section);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;

    .reference-card {
