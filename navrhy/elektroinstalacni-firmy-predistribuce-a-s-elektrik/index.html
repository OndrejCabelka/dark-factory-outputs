<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektroinstalační firma Praha | PREdistribuce, a. s.</title>
<meta name="description" content="Profesionální elektrikář v Praze a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte 739 592 909.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C400;
  --primary-dark: #d4a800;
  --primary-light: #ffe566;
  --dark: #0d0f14;
  --dark-2: #161a23;
  --dark-3: #1e2330;
  --text: #e8eaf0;
  --text-muted: #9aa0b4;
  --white: #ffffff;
  --card-bg: #1a1f2e;
  --border: #2a3045;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --shadow-hover: 0 8px 40px rgba(245,196,0,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

/* ===================== NAVBAR ===================== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(13,15,20,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: all 0.3s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(245,196,0,0.3);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(245,196,0,0.45);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.nav-cta span {
  font-size: 16px;
}

/* ===================== HERO ===================== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0d0f14 0%, #111520 40%, #1a1500 80%, #0d0f14 100%);
  padding: 80px 20px;
}

.hero-bg-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%, rgba(245,196,0,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 80% 70%, rgba(245,196,0,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 860px;
  margin: 0 auto;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,196,0,0.1);
  border: 1px solid rgba(245,196,0,0.25);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 66px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
}

#hero h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 580px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-sub strong {
  color: var(--text);
  font-weight: 600;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 800;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: 50px;
  transition: all 0.3s ease;
  box-shadow: 0 6px 28px rgba(245,196,0,0.35);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 40px rgba(245,196,0,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  padding: 15px 32px;
  border-radius: 50px;
  border: 2px solid var(--border);
  transition: all 0.3s ease;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(245,196,0,0.06);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
  padding-top: 40px;
  border-top: 1px solid var(--border);
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 30px;
  font-weight: 900;
  color: var(--primary);
  display: block;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 5px;
  display: block;
}

/* ===================== SECTIONS COMMON ===================== */
section {
  padding: 90px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  background: rgba(245,196,0,0.08);
  border: 1px solid rgba(245,196,0,0.2);
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  line-height: 1.7;
}

/* ===================== SLUZBY ===================== */
#sluzby {
  background: var(--dark-2);
}

.sluzby-header {
  margin-bottom: 52px;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s ease;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,196,0,0.25);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon-wrap {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(245,196,0,0.15), rgba(245,196,0,0.05));
  border: 1px solid rgba(245,196,0,0.2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all 0.35s ease;
}

.sluzba-card:hover .sluzba-icon-wrap {
  background: linear-gradient(135deg, rgba(245,196,0,0.25), rgba(245,196,0,0.1));
  transform: scale(1.08);
}

.sluzba-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.sluzba-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

.sluzba-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.25s;
}

.sluzba-card:hover .sluzba-link {
  gap: 10px;
}

/* ===================== PROC MY ===================== */
#proc-my {
  background: var(--dark);
}

.proc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 28px;
  margin-top: 52px;
}

.proc-card {
  background: linear-gradient(135deg, var(--dark-3), var(--card-bg));
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: all 0.35s ease;
}

.proc-card:hover {
  border-color: rgba(245,196,0,0.3);
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.proc-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(245,196,0,0.12);
  line-height: 1;
  margin-bottom: -8px;
}

.proc-icon {
  font-size: 32px;
}

.proc-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.4px;
}

.proc-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.75;
}

/* ===================== REFERENCE ===================== */
#reference {
  background: var(--dark-2);
}

.ref-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  margin-top: 52px;
}

.ref-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  position: relative;
  transition: all 0.35s ease;
}

.ref-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,196,0,0.2);
}

.ref-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  font-weight: 900;
  margin-bottom: 16px;
  opacity: 0.5;
}

.ref-stars {
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.ref-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.ref-author {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.ref-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
}

.ref-name {
  font-weight: 700;
  color: var(--white);
  font-size: 14px;
}

.ref-location {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===================== KONTAKT ===================== */
#kontakt {
  background: var(--dark);
}

.kontakt-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  margin-top: 52px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.kontakt-item:hover {
  border-color: rgba(245,196,0,0.3);
  transform: translateX(6px);
  box-shadow: var(--shadow-hover);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(245,196,0,0.15), rgba(245,196,0,0.05));
  border: 1px solid rgba(245,196,0,0.2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-item-text {
  flex: 1;
}

.kontakt-item-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 4px;
}

.kontakt-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
}

.kontakt-item-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.mapa-placeholder {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  height: 100%;
  min-height: 380px;
  background: var(--card-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
}

.mapa-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, rgba(245,196,0,0.03) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,196,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,196,0,0.04) 40px);
  border-radius: var(--radius-lg);
}

.mapa-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.mapa-pin {
  font-size: 48px;
  display: block;
  margin-bottom: 12px;
}

.mapa-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.mapa-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.mapa-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: all 0.3s ease;
}

.mapa-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(245,196,0,0.35);
}

/* ===================== FOOTER ===================== */
footer {
  background:
