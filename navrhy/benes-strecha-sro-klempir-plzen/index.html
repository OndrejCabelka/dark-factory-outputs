<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beneš-střecha S.r.o. – Profesionální klempíř Plzeň</title>
  <meta name="description" content="Beneš-střecha S.r.o. – profesionální klempířské práce v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna a opravy. Volejte +420603862118." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3a3a3a;
      --text: #222222;
      --text-muted: #666666;
      --text-light: #999999;
      --white: #ffffff;
      --bg-light: #f8f7f6;
      --bg-section: #f2f1ef;
      --border: #e0ddd8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ===========================
       BANNER
    =========================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===========================
       HEADER / NAVBAR
    =========================== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: var(--dark);
      border-bottom: 2px solid var(--primary);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 4px;
      align-items: center;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white) !important;
      padding: 9px 18px !important;
      border-radius: 8px !important;
      font-weight: 700 !important;
      font-size: 14px !important;
      transition: background 0.2s, transform 0.15s !important;
    }

    .nav-cta:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-sub {
        display: none;
      }
    }

    /* ===========================
       HERO
    =========================== */
    #hero {
      background: linear-gradient(135deg, #1a0a08 0%, #2d1410 30%, #3d1a14 60%, #1f1008 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(192,57,43,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.5);
      color: #f5a592;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #c8c0bc;
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: var(--radius);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: var(--radius);
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-num span {
      color: var(--primary-light);
    }

    .hero-stat-label {
      font-size: 12px;
      color: #9a9096;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* ===========================
       SECTION COMMON
    =========================== */
    section {
      padding: 72px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===========================
       SERVICES
    =========================== */
    #sluzby {
      background: var(--white);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(192,57,43,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(230,126,34,0.15));
    }

    .service-card h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===========================
       WHY US
    =========================== */
    #proc-my {
      background: var(--bg-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.13);
    }

    .benefit-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 52px;
      font-weight: 900;
      color: rgba(192,57,43,0.07);
      line-height: 1;
      letter-spacing: -2px;
      pointer-events: none;
      user-select: none;
    }

    .benefit-icon {
      font-size: 32px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===========================
       REVIEWS
    =========================== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 10% 50%, rgba(192,57,43,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 90% 50%, rgba(192,57,43,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      color: #f5a592;
    }

    #reference .section-label::before {
      background: #f5a592;
    }

    #reference .section-desc {
      color: #9a9096;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(192,57,43,0.4);
      transform: translateY(-3px);
    }

    .review-stars {
      color: #f5c518;
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #c8c0bc;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(192,57,43,0.4);
      font-style: normal;
      line-height: 0;
      vertical-align: -16px;
      margin-right: 4px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: #7a7076;
      margin-top: 2px;
    }

    /* ===========================
       CONTACT
    =========================== */
    #kontakt {
      background: var(--bg-section);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-layout {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }

    .contact-info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary-light);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8e4e0, #d8d4cf);
      border-radius: var(--radius-lg);
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 500;
      border: 2px dashed var(--border);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(200,195,190,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,195,190,0.5) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .map-placeholder-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .map-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .map-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: var
