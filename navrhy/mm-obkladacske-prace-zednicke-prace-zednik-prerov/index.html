<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M&M Obkladačské Práce, Zednické Práce – Přerov</title>
  <meta name="description" content="Profesionální zednické a obkladačské práce v Přerově a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte +420723649507">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8410a;
      --primary-dark: #a33208;
      --primary-light: #e8611e;
      --accent: #f0a500;
      --dark: #1a1210;
      --dark2: #2a1f1a;
      --dark3: #3d2e26;
      --text: #2d1f18;
      --text-light: #7a6058;
      --white: #ffffff;
      --bg-light: #fdf8f5;
      --bg-section: #f5ede7;
      --border: #e8d5cb;
      --shadow: 0 4px 24px rgba(200,65,10,0.10);
      --shadow-lg: 0 8px 48px rgba(200,65,10,0.16);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #b89a8e;
      font-weight: 400;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(200,65,10,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(200,65,10,0.50);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: #d4b8b0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 18px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 40%, #4a2416 70%, #1a0f0a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 100px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(200,65,10,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(240,165,0,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(200,65,10,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.5) 28px, rgba(255,255,255,0.5) 30px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(255,255,255,0.5) 28px, rgba(255,255,255,0.5) 30px);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,65,10,0.25);
      border: 1px solid rgba(200,65,10,0.4);
      color: #ffb38a;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #c8a89e;
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 28px rgba(200,65,10,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(200,65,10,0.60);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 64px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-number span {
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 13px;
      color: #9a7066;
      margin-top: 4px;
      font-weight: 500;
    }

    /* ===== SECTION SHARED ===== */
    .section {
      padding: 80px 20px;
    }

    .section-alt {
      background: var(--bg-section);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(200,65,10,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 50px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SLUZBY ===== */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 560px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .services-grid .card:nth-child(4),
      .services-grid .card:nth-child(5) {
        grid-column: span 1;
      }
      .services-grid.five-cards {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(200,65,10,0.20);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,65,10,0.12), rgba(240,165,0,0.10));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: transform 0.25s;
    }

    .card:hover .card-icon {
      transform: scale(1.1);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .card-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .card-list {
      list-style: none;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-list li {
      font-size: 14px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-list li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ===== PROC MY ===== */
    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 28px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }

    .benefit-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 24px rgba(200,65,10,0.30);
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .benefit-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .review-quote {
      font-size: 40px;
      line-height: 1;
      color: var(--primary);
      opacity: 0.3;
      margin-bottom: 8px;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--dark);
    }

    #kontakt .section-tag {
      background: rgba(200,65,10,0.20);
      color: #ff9a6a;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: #9a7a70;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 48px;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: background 0.2s, border-color 0.2s;
    }

    .contact-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(200,65,10,0.30);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-content {}

    .contact-item-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7a5a50;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }

    .contact-item-value a {
      color: #ff9a6a;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--accent);
    }

    .contact-item-sub {
      font-size: 13px;
      color: #7a5a50;
      margin-top: 2px;
    }

    .map-placeholder {
      background: rgba(255,255,255
