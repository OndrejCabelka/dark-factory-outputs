<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montáž oken Brno | PKSokna.cz – Profesionální výměna oken</title>
<meta name="description" content="Profesionální montáž a výměna oken v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 725 443 900.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #0f4f91;
  --primary-light: #2b89e8;
  --accent: #f0a500;
  --dark: #0d1b2a;
  --dark-2: #112236;
  --dark-3: #1a3450;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-hover: 0 12px 40px rgba(26,111,196,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== HEADER ========== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(26,111,196,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(26,111,196,0.5);
}

/* ========== HERO ========== */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #112236 40%, #0f3460 70%, #1a4a7a 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 100px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(26,111,196,0.2);
  border: 1px solid rgba(43,137,232,0.4);
  color: #7ec8ff;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  max-width: 780px;
  margin-left: auto;
  margin-right: auto;
  position: relative;
  z-index: 1;
}

#hero h1 span {
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: #94b8d8;
  max-width: 600px;
  margin: 0 auto 40px;
  font-weight: 400;
  position: relative;
  z-index: 1;
}

.hero-btns {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 8px 25px rgba(26,111,196,0.5);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 35px rgba(26,111,196,0.6);
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: clamp(24px, 5vw, 60px);
  margin-top: 64px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.hero-stat {
  text-align: center;
}

.hero-stat-number {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: #94b8d8;
  margin-top: 4px;
  font-weight: 500;
}

/* ========== SECTIONS COMMON ========== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(26,111,196,0.1);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.2;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ========== SLUZBY ========== */
#sluzby {
  background: var(--gray-100);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid var(--gray-200);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.service-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,196,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(26,111,196,0.1), rgba(43,137,232,0.15));
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: all 0.3s ease;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
}

.service-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ========== PROC MY ========== */
#proc-my {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(26,111,196,0.05) 0%, transparent 60%);
  pointer-events: none;
}

#proc-my .section-label {
  background: rgba(43,137,232,0.15);
  color: #7ec8ff;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: #94b8d8;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.benefit-card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(26,111,196,0.3);
  transform: translateY(-6px);
}

.benefit-card:hover::after {
  transform: scaleX(1);
}

.benefit-number {
  font-size: 48px;
  font-weight: 900;
  color: rgba(26,111,196,0.25);
  line-height: 1;
  margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 16px;
}

.benefit-card h3 {
  font-size: 21px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: #94b8d8;
  line-height: 1.75;
}

/* ========== REFERENCE ========== */
#reference {
  background: var(--white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--gray-100);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  border: 1px solid var(--gray-200);
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,196,0.15);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
  opacity: 0.4;
}

.stars {
  color: var(--accent);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

.review-location {
  font-size: 12px;
  color: var(--text-light);
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--gray-100);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  padding: 24px;
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}

.contact-item:hover {
  transform: translateX(6px);
  border-color: rgba(26,111,196,0.2);
  box-shadow: var(--shadow-hover);
}

.contact-item-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-body h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-item-body a,
.contact-item-body p {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
  line-height: 1.4;
}

.contact-item-body a:hover {
  color: var(--primary);
}

.contact-item-body .contact-note {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-light);
  margin-top: 2px;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--gray-200);
  box-shadow: var(--shadow);
  height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.map-placeholder-inner {
  text-align: center;
  z-index: 1;
}

.map-placeholder-inner .map-icon {
  font-size: 56px;
  margin-bottom: 12px;
  display: block;
}

.map-placeholder-inner h4 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.map-placeholder-inner p {
  font-size: 14px;
  color: var(--text-light);
  max-width: 200px;
}

.map-grid-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(26,111,196,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,111,196,0.06) 1px, transparent 1px);
  background-size: 30px 30px;
}

.map-marker {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20px;
  height: 20px;
  background: var(--primary);
  border-radius: 50% 50% 50% 0;
  transform: translate(-50%, -50%) rotate(-45deg);
  box-shadow: 0 0 0 6px rgba(26,111,196,0.2);
}

/* ========== FOOTER ========== */
footer {
  background: var(--dark);
  padding: 40px 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-left .footer-logo-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
}

.
