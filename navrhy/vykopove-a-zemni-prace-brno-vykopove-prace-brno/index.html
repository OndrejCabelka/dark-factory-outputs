<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Výkopové a zemní práce Brno | Profesionální zemní práce</title>
  <meta name="description" content="Profesionální výkopové a zemní práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte +420604556889." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e07b00;
      --primary-dark: #b86200;
      --primary-light: #f5a623;
      --dark: #1a1209;
      --dark2: #2c1f0e;
      --dark3: #3d2d12;
      --text: #1e1e1e;
      --text-light: #5a5a5a;
      --bg-light: #fdf8f2;
      --bg-card: #ffffff;
      --border: #e8ddd0;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ========== HEADER / NAVBAR ========== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26, 18, 9, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(224, 123, 0, 0.25);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 2px 12px rgba(224,123,0,0.4);
    }

    .btn-call-nav:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ========== HERO ========== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(160deg, #1a1209 0%, #2c1f0e 40%, #3d2d12 70%, #1a1209 100%);
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          45deg,
          #e07b00 0px,
          #e07b00 1px,
          transparent 1px,
          transparent 60px
        ),
        repeating-linear-gradient(
          -45deg,
          #e07b00 0px,
          #e07b00 1px,
          transparent 1px,
          transparent 60px
        );
    }

    .hero-glow {
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(224,123,0,0.18) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 860px;
      margin: 0 auto;
      padding: 100px 24px 80px;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(224,123,0,0.15);
      border: 1px solid rgba(224,123,0,0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      font-size: 16px;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
    }

    #hero h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 580px;
      margin: 0 auto 40px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 24px rgba(224,123,0,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(224,123,0,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.3);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      display: block;
      letter-spacing: -1px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    .hero-stat-divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ========== SECTIONS COMMON ========== */
    section {
      padding: 96px 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(224,123,0,0.10);
      border: 1px solid rgba(224,123,0,0.25);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ========== SLUŽBY ========== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(224,123,0,0.35);
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(224,123,0,0.12), rgba(245,166,35,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      border: 1px solid rgba(224,123,0,0.2);
    }

    .sluzba-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
      flex-grow: 1;
    }

    .sluzba-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      margin-top: 4px;
    }

    /* ========== PROČ MY ========== */
    #proc-my {
      background: var(--white);
    }

    .proc-my-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }

    .proc-my-visual {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-hover);
    }

    .proc-my-visual-inner {
      text-align: center;
      padding: 48px 32px;
    }

    .proc-my-visual-emoji {
      font-size: 72px;
      display: block;
      margin-bottom: 16px;
    }

    .proc-my-visual-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }

    .proc-my-visual-accent {
      color: var(--primary-light);
    }

    .proc-my-badge {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border-radius: 12px;
      padding: 14px 18px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(224,123,0,0.45);
    }

    .proc-my-badge-num {
      font-size: 28px;
      font-weight: 900;
      display: block;
      line-height: 1;
    }

    .proc-my-badge-label {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.9;
      white-space: nowrap;
    }

    .benefits-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .benefit-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(224,123,0,0.3);
    }

    .benefit-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      letter-spacing: -0.3px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ========== REFERENCE ========== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
      flex-grow: 1;
    }

    .review-text::before {
      content: '"';
      font-size: 48px;
      line-height: 0.8;
      color: var(--primary-light);
      font-style: normal;
      font-weight: 900;
      display: block;
      margin-bottom: 8px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .review-author-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ========== KONTAKT ========== */
    #kontakt {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 60%, var(--dark3) 100%);
    }

    #kontakt .section-label {
      background: rgba(224,123,0,0.2);
      border-color: rgba(224,123,0,0.4);
      color: var(--primary-light);
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      transition: background 0.2s, border-color 0.2s;
    }

    .kontakt-item:hover {
      background: rgba(224,123,0,0.1);
      border-color: rgba(224,123,0,0.3);
    }

    .kontakt-item-icon {
      font-size: 24px;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kontakt-item-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item
