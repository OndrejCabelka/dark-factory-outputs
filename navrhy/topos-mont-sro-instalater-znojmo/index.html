<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topos - Mont, S.r.o. | Instalatér Znojmo</title>
<meta name="description" content="Profesionální instalatérské služby ve Znojmě a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #1358a0;
  --primary-light: #3d8fd6;
  --accent: #f59e0b;
  --dark: #0f1f35;
  --dark-mid: #162840;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f0f6ff;
  --border: #e2e8f0;
  --card-shadow: 0 4px 24px rgba(26,111,196,0.10);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ── BANNER ── */
#proposal-banner a {
  text-decoration: underline;
  margin: 0 4px;
}

/* ── HEADER ── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  color: var(--white);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.3px;
  line-height: 1.1;
}

.logo-tagline {
  color: #94a3b8;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.header-cta {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 24px;
}

.nav-links a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-phone {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(26,111,196,0.35);
}

.btn-phone:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(26,111,196,0.45);
}

/* ── HERO ── */
#hero {
  background: linear-gradient(135deg, #0a1628 0%, #0f2847 40%, #1a4a7a 75%, #1a6fc4 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
  border-radius: 50%;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -60px;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(26,111,196,0.25);
  border: 1px solid rgba(26,111,196,0.5);
  color: #93c5fd;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  position: relative;
  z-index: 2;
  letter-spacing: 0.3px;
}

.hero-inner {
  max-width: 760px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

#hero h1 {
  color: var(--white);
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--accent);
}

.hero-sub {
  color: #93c5fd;
  font-size: clamp(16px, 2.5vw, 20px);
  margin-bottom: 36px;
  font-weight: 400;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.55;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 48px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 24px rgba(26,111,196,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(26,111,196,0.55);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  color: var(--white);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.hero-stat {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 14px 22px;
  text-align: center;
  min-width: 120px;
}

.hero-stat strong {
  display: block;
  color: var(--accent);
  font-size: 22px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat span {
  color: #94a3b8;
  font-size: 12px;
  font-weight: 500;
}

/* ── SECTIONS COMMON ── */
section {
  padding: 72px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: var(--bg-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 12px;
  border: 1px solid rgba(26,111,196,0.15);
}

.section-title {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 12px;
  letter-spacing: -0.4px;
  line-height: 1.2;
}

.section-desc {
  color: var(--text-light);
  font-size: 17px;
  max-width: 540px;
  line-height: 1.65;
}

.section-header {
  margin-bottom: 48px;
}

/* ── SLUZBY ── */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.sluzba-card {
  background: var(--white);
  border-radius: 16px;
  padding: 28px 24px;
  box-shadow: var(--card-shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sluzba-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 36px rgba(26,111,196,0.18);
  border-color: rgba(26,111,196,0.3);
}

.sluzba-icon {
  width: 54px;
  height: 54px;
  background: linear-gradient(135deg, var(--bg-light), #dbeafe);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  border: 1px solid rgba(26,111,196,0.12);
}

.sluzba-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.2;
}

.sluzba-card p {
  color: var(--text-light);
  font-size: 14px;
  line-height: 1.6;
}

.sluzba-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #fef3c7;
  color: #92400e;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 50px;
  letter-spacing: 0.4px;
  width: fit-content;
  text-transform: uppercase;
}

.sluzba-badge.blue {
  background: #dbeafe;
  color: var(--primary-dark);
}

/* ── PROC MY ── */
#proc-my {
  background: var(--white);
}

.benefity-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  margin-top: 48px;
}

.benefit-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 28px;
  background: var(--bg-light);
  border-radius: 16px;
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(26,111,196,0.12);
}

.benefit-icon-wrap {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(26,111,196,0.3);
}

.benefit-text h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
}

.benefit-text p {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.65;
}

/* ── HAVÁRIE BANNER ── */
.havarije-banner {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border-radius: 20px;
  padding: 36px 28px;
  text-align: center;
  margin: 0 20px 72px;
  max-width: 1160px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 8px 32px rgba(239,68,68,0.3);
}

.havarije-banner h2 {
  color: var(--white);
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 800;
  margin-bottom: 10px;
}

.havarije-banner p {
  color: rgba(255,255,255,0.85);
  font-size: 16px;
  margin-bottom: 22px;
}

.btn-emergency {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  color: #dc2626;
  font-weight: 800;
  font-size: 17px;
  padding: 14px 28px;
  border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-emergency:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}

/* ── REFERENCE ── */
#reference {
  background: linear-gradient(135deg, #0f1f35 0%, #1a3a5c 100%);
  padding: 72px 20px;
}

#reference .section-label {
  background: rgba(255,255,255,0.08);
  color: #93c5fd;
  border-color: rgba(255,255,255,0.12);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: #94a3b8;
}

.recenze-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.recenze-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 28px 24px;
  transition: background 0.25s, transform 0.25s;
}

.recenze-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateY(-3px);
}

.recenze-stars {
  color: var(--accent);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.recenze-text {
  color: #cbd5e1;
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  color: var(--white);
  font-size: 15px;
  font-weight: 600;
}

.author-info span {
  color: #64748b;
  font-size: 13px;
}

/* ── KONTAKT ── */
#kontakt {
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.kontakt-card {
  background: var(--white);
  border-radius: 16px;
  padding: 28px 24px;
  border: 1px solid var(--border);
  box-shadow: var(--card-shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}

.kontakt-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(26,111,196,0.15);
}

.kontakt-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 16px;
  box-shadow: 0 4px 12px rgba(26,111,196,0.3);
}

.kontakt-card h3 {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 8px;
}

.kontakt-card a {
  color: var(--primary);
  text-decoration: none;
  font-size: 19px;
  font-weight: 700;
  transition: color 0.2s;
  display: block;
}

.kontakt-card a:hover {
  color: var(--primary-dark);
}

.kontakt-card p {
  color: var(--text);
  font-size: 16px;
  font-weight: 500;
  line-height: 1.5;
}

.mapa-placeholder {
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  border-radius: 16px;
  border: 2px dashed rgba(26,111,196,0.3);
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
}

.mapa-placeholder span {
  font-size: 36px;
}

.mapa-placeholder p {
  color: var(--primary-dark);
  font-weight: 600;
  font-size: 15px;
}

/* ── FOOTER ── */
footer {
  background: var(--dark);
  color: #94a3b8;
  padding: 40px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.footer-logo-name {
  color: var
