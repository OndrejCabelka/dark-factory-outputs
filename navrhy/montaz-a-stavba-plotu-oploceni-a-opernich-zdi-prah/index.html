<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montáž a stavba plotu Praha | Oplocení a opěrné zdi</title>
  <meta name="description" content="Profesionální montáž a stavba plotů, oplocení a opěrných zdí v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 736 621 549.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2E7D32;
      --primary-light: #43A047;
      --primary-dark: #1B5E20;
      --primary-accent: #66BB6A;
      --secondary: #F9A825;
      --dark: #1a1a1a;
      --dark-2: #242424;
      --dark-3: #2f2f2f;
      --light: #f8f9fa;
      --light-2: #eef2ee;
      --text-dark: #1a1a1a;
      --text-mid: #4a4a4a;
      --text-light: #ffffff;
      --text-muted: #aaaaaa;
      --border: #e0e0e0;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(46,125,50,0.18);
      --transition: 0.25s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: #fff;
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: #fff;
      border-bottom: 2px solid var(--primary);
      position: sticky;
      top: 0;
      z-index: 900;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--primary-dark);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-mid);
      font-weight: 400;
    }

    .header-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .btn-phone {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: 0 4px 14px rgba(46,125,50,0.3);
      white-space: nowrap;
    }

    .btn-phone:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      box-shadow: 0 6px 20px rgba(46,125,50,0.45);
      transform: translateY(-1px);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #0d2b0f 0%, #1B5E20 35%, #2E7D32 65%, #1a3a1c 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(102,187,106,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(249,168,37,0.07) 0%, transparent 60%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 60px,
          rgba(255,255,255,0.015) 60px,
          rgba(255,255,255,0.015) 62px
        );
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--secondary), var(--primary-accent), var(--secondary));
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #a5d6a7;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--secondary);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #c8e6c9;
      margin-bottom: 40px;
      font-weight: 400;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), #F57F17);
      color: #1a1a1a;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: 0 6px 24px rgba(249,168,37,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(249,168,37,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
      border: 2px solid rgba(255,255,255,0.35);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.6);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--secondary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #a5d6a7;
      font-weight: 500;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── SECTIONS GENERAL ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: var(--light-2);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-mid);
      max-width: 580px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      background: var(--light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 12px 12px 0 0;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-accent);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--light-2), #d4ebd4);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--light-2);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: #fff;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      border-radius: var(--radius);
      background: var(--light);
      transition: var(--transition);
    }

    .benefit-item:hover {
      background: var(--light-2);
      transform: translateX(4px);
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      min-width: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(46,125,50,0.25);
    }

    .benefit-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, var(--primary-dark) 0%, #1e4620 50%, var(--primary) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(102,187,106,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-label {
      background: rgba(255,255,255,0.15);
      color: #a5d6a7;
    }

    #reference .section-title {
      color: #fff;
    }

    #reference .section-subtitle {
      color: #c8e6c9;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: var(--transition);
      position: relative;
      backdrop-filter: blur(4px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.13);
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.3);
    }

    .review-stars {
      color: var(--secondary);
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #e8f5e9;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-quote {
      font-size: 60px;
      color: rgba(255,255,255,0.08);
      position: absolute;
      top: 16px;
      right: 20px;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
    }

    .review-author-info span {
      color: #a5d6a7;
      font-size: 12px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: #fff;
      padding: 22px 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }

    .contact-item:hover {
      box-shadow: var(--shadow-hover);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      min-width: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .contact-item-body strong {
      display: block;
      font-weight: 700;
      color: var(--text-dark);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-body a {
      color: var(--primary);
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: var(--transition);
    }

    .contact-item-body a:hover {
      color: var(--primary-dark);
    }

    .contact-item-body p {
      color: var(--text-mid);
      font-size: 15px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      border-radius: var(--radius);
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(102,187,106,0.2) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(249,168,37,0.1) 0%, transparent 50%);
    }

    .map-pin {
      font-size: 52px;
      margin-bottom: 16px;
      position: relative;
      z-index: 2;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-text {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .map-subtext {
      color: #c8e6c9;
      font-size: 13px;
      margin-top: 6px;
      position: relative;
      z-index: 2;
    }

    /* ─── CTA BANNER ─── */
    .cta-banner {
      background: linear-gradient(135deg, var(--secondary), #F57F17);
      padding: 60px 20px;
      text-align: center;
    }

    .cta-banner h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .cta-banner p {
      font-size: 17px;
      color: #3a2800;
      margin-bottom: 32px
