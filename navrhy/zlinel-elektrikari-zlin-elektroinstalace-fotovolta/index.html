<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ZLINEL - Profesionální elektrikář ve Zlíně. Elektroinstalace, fotovoltaika, revize elektro, hromosvod a rekonstrukce rozvodů na klíč.">
<title>ZLINEL – Elektrikáři Zlín | Elektroinstalace, Fotovoltaika</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5A800;
  --primary-dark: #d48e00;
  --primary-light: #ffd055;
  --dark: #0f0f0f;
  --dark2: #1a1a1a;
  --dark3: #242424;
  --text: #e8e8e8;
  --text-muted: #a0a0a0;
  --white: #ffffff;
  --card-bg: #1e1e1e;
  --border: rgba(245,168,0,0.15);
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img {
  max-width: 100%;
}

.container {
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ─── NAVBAR ─────────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(15,15,15,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  max-width: 1160px;
  margin: 0 auto;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
}

.logo-sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245,168,0,0.4);
}

/* ─── HERO ───────────────────────────────────────────── */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background: linear-gradient(135deg, #0a0a0a 0%, #111111 40%, #1a1200 100%);
  overflow: hidden;
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,168,0,0.18) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  pointer-events: none;
}

.hero-glow2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,168,0,0.08) 0%, transparent 70%);
  bottom: -80px;
  left: -80px;
  pointer-events: none;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  width: 100%;
  padding: 80px 20px 80px;
  max-width: 1160px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,168,0,0.12);
  border: 1px solid rgba(245,168,0,0.3);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.hero-badge span {
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

h1 {
  font-size: clamp(32px, 6vw, 66px);
  font-weight: 900;
  line-height: 1.08;
  color: var(--white);
  margin-bottom: 22px;
  letter-spacing: -2px;
}

h1 .accent {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 580px;
  margin-bottom: 40px;
  line-height: 1.5;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #0f0f0f;
  font-weight: 800;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(245,168,0,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  font-weight: 600;
  font-size: 16px;
  padding: 15px 30px;
  border-radius: 50px;
  border: 2px solid rgba(255,255,255,0.2);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  background: rgba(245,168,0,0.08);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
}

/* ─── SECTION HEADERS ────────────────────────────────── */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(245,168,0,0.12);
  border: 1px solid rgba(245,168,0,0.25);
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 800;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.section-title .accent {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ─── SERVICES ───────────────────────────────────────── */
#sluzby {
  padding: 100px 0;
  background: var(--dark);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 36px 30px;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 48px rgba(245,168,0,0.15);
  border-color: rgba(245,168,0,0.25);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: rgba(245,168,0,0.12);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: background 0.3s;
}

.service-card:hover .service-icon {
  background: rgba(245,168,0,0.2);
}

.service-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ─── WHY US ─────────────────────────────────────────── */
#proc-my {
  padding: 100px 0;
  background: linear-gradient(135deg, #111111 0%, #141009 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,168,0,0.07) 0%, transparent 70%);
  right: -200px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(245,168,0,0.12);
}

.benefit-number {
  position: absolute;
  top: -1px;
  right: 20px;
  font-size: 80px;
  font-weight: 900;
  color: rgba(245,168,0,0.06);
  line-height: 1;
  pointer-events: none;
}

.benefit-icon {
  font-size: 44px;
  margin-bottom: 18px;
  display: block;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ─── REVIEWS ────────────────────────────────────────── */
#reference {
  padding: 100px 0;
  background: var(--dark);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: transform 0.3s, box-shadow 0.3s;
}

.review-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow);
}

.review-stars {
  color: var(--primary);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: var(--primary);
  line-height: 0;
  vertical-align: -14px;
  margin-right: 4px;
  font-style: normal;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--dark);
  font-size: 16px;
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── CONTACT ────────────────────────────────────────── */
#kontakt {
  padding: 100px 0;
  background: linear-gradient(135deg, #111111 0%, #151005 100%);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

@media (max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

.contact-info h2 {
  font-size: clamp(26px, 4vw, 38px);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 16px;
  letter-spacing: -1px;
}

.contact-info p {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 36px;
  line-height: 1.65;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px 22px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  transition: border-color 0.2s, background 0.2s;
}

.contact-item:hover {
  border-color: rgba(245,168,0,0.3);
  background: rgba(245,168,0,0.04);
}

.contact-item-icon {
  width: 46px;
  height: 46px;
  background: rgba(245,168,0,0.12);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-text strong {
  display: block;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 3px;
  font-weight: 600;
}

.contact-item-text a,
.contact-item-text span {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
}

.contact-item-text a:hover {
  color: var(--primary);
}

.map-placeholder {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.07);
  height: 100%;
  min-height: 380px;
  background: rgba(255,255,255,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-muted);
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-icon {
  font-size: 52px;
  position: relative;
  z-index: 1;
}

.map-text {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-text strong {
  display: block;
  color: var(--white);
  font-size: 17px;
  margin-bottom: 4px;
}

.map-text span {
  font-size: 14px;
  color: var(--text-muted);
}

/* ─── FOOTER ─────────────────────────────────────────── */
footer {
  background: #090909;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 36px 20px;
}

.footer-inner {
  max-width: 1160px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.footer-logo-icon {
  width: 34px;
