<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství - tesařství Tlášek | Praha</title>
  <meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby. Volejte +420 737 543 649">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a06a06;
      --primary-light: #e8a020;
      --accent: #d4a017;
      --wood-dark: #3d2b1f;
      --wood-mid: #6b4226;
      --wood-light: #8b5e3c;
      --bg-dark: #1a1108;
      --bg-section: #f8f4ef;
      --text-dark: #1e1408;
      --text-mid: #4a3728;
      --text-light: #7a6555;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(61, 43, 31, 0.12);
      --shadow-hover: 0 8px 40px rgba(61, 43, 31, 0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 17, 8, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200, 134, 10, 0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .logo-main span {
      color: var(--primary-light);
    }

    .logo-sub {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.88rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(200, 134, 10, 0.4);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(200, 134, 10, 0.6);
    }

    .nav-cta .icon {
      font-size: 1rem;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(145deg, #0e0804 0%, #1e1008 30%, #2d1a0a 60%, #1a1005 100%);
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(200, 134, 10, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(107, 66, 38, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(200, 134, 10, 0.08) 0%, transparent 50%);
    }

    .hero-wood-texture {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 3px,
        rgba(200, 134, 10, 0.5) 3px,
        rgba(200, 134, 10, 0.5) 4px
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200, 134, 10, 0.15);
      border: 1px solid rgba(200, 134, 10, 0.35);
      color: var(--primary-light);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      width: fit-content;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      font-weight: 400;
      max-width: 540px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 6px 30px rgba(200, 134, 10, 0.5);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(200, 134, 10, 0.7);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      color: var(--primary-light);
      transform: translateY(-3px);
      background: rgba(200, 134, 10, 0.08);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      padding-top: 10px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SEKCE OBECNÉ ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(200, 134, 10, 0.1);
      color: var(--primary);
      border: 1px solid rgba(200, 134, 10, 0.25);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      transition: all 0.35s ease;
      border: 1px solid rgba(200, 134, 10, 0.08);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
      border-radius: 4px 4px 0 0;
    }

    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200, 134, 10, 0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 62px;
      height: 62px;
      background: linear-gradient(135deg, rgba(200, 134, 10, 0.12), rgba(200, 134, 10, 0.06));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.9rem;
      margin-bottom: 20px;
      border: 1px solid rgba(200, 134, 10, 0.15);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: linear-gradient(145deg, var(--wood-dark) 0%, #2a1a0d 50%, var(--wood-dark) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(200, 134, 10, 0.1) 0%, transparent 60%);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    #proc-my .section-tag {
      background: rgba(200, 134, 10, 0.2);
      color: var(--primary-light);
      border-color: rgba(200, 134, 10, 0.35);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      transition: all 0.35s ease;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(200, 134, 10, 0.4);
      transform: translateY(-5px);
    }

    .benefit-icon {
      font-size: 2.8rem;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(200, 134, 10, 0.08);
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 3rem;
      line-height: 1;
      color: var(--primary-light);
      opacity: 0.4;
      font-family: Georgia, serif;
      margin-bottom: 8px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-mid);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .review-location {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .stars {
      color: var(--primary-light);
      font-size: 1rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-info-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .kontakt-info-desc {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--bg-section);
      border-radius: var(--radius);
      border: 1px solid rgba(200, 134, 10, 0.1);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }

    .contact-item:hover {
      border-color: var(--primary);
      background: rgba(200, 134, 10, 0.05);
      transform: translateX(4px);
    }

    .contact-icon-wrap {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 3px;
    }

    .contact-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .contact-item:hover .contact-value {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(145deg, #e8e0d5, #d4c8b8);
      border-radius: var(--radius-lg);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(200, 134, 10, 0.3);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(200, 134, 10, 0.03),
        rgba(200, 134, 10, 0.03) 10px,
        transparent 10px,
        transparent 20px
      );
    }

    .map-icon {
      font-size: 3rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .map-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-mid);
    }

    .map-sub {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .map-badge {
      background: var(--primary);
      color: var(--white);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 700;
      position: relative;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--bg-dark);
      color
