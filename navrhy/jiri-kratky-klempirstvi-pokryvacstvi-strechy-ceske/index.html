<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiří Krátký – Klempířství & Pokrývačství | České Budějovice</title>
  <meta name="description" content="Profesionální pokrývač v Českých Budějovicích a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte +420 732 826 338.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark-2: #16213e;
      --dark-3: #0f3460;
      --gray-light: #f5f6fa;
      --gray-mid: #e8eaf0;
      --gray-text: #6c7a8a;
      --white: #ffffff;
      --text-dark: #1e2a38;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ─── HEADER / NAV ─── */
    header {
      background: var(--white);
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--gray-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-dark);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 3px 14px rgba(192,57,43,0.25);
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,0.35);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-name {
        font-size: 0.95rem;
      }
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #7b1a14 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.22) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
      backdrop-filter: blur(6px);
      letter-spacing: 0.5px;
    }

    #hero h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.18;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.22rem);
      color: rgba(255,255,255,0.75);
      max-width: 560px;
      margin: 0 auto 38px;
      font-weight: 400;
      line-height: 1.55;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 54px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.40);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.10);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
      color: var(--white);
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      display: block;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-top: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-wave {
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      line-height: 0;
    }

    /* ─── SEKCE OBECNĚ ─── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1160px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .section-desc {
      font-size: 1.02rem;
      color: var(--gray-text);
      max-width: 560px;
      line-height: 1.65;
    }

    .section-head {
      margin-bottom: 48px;
    }

    .section-head.centered {
      text-align: center;
    }

    .section-head.centered .section-desc {
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--gray-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border-bottom: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      margin-bottom: 18px;
    }

    .sluzba-karta h3 {
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 0.88rem;
      color: var(--gray-text);
      line-height: 1.6;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      margin-top: 8px;
    }

    .proc-karta {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px 24px;
      background: var(--gray-light);
      border-radius: var(--radius);
      transition: box-shadow 0.25s, transform 0.25s;
    }

    .proc-karta:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }

    .proc-icon-wrap {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .proc-text h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .proc-text p {
      font-size: 0.88rem;
      color: var(--gray-text);
      line-height: 1.6;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 70%, rgba(192,57,43,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-label {
      color: var(--accent);
    }

    #reference .section-title {
      color: var(--white);
    }

    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .ref-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 28px 24px;
      backdrop-filter: blur(8px);
      transition: background 0.25s, transform 0.25s;
    }

    .ref-karta:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-4px);
    }

    .ref-stars {
      color: #f39c12;
      font-size: 1rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .ref-text {
      font-size: 0.93rem;
      color: rgba(255,255,255,0.80);
      line-height: 1.65;
      margin-bottom: 20px;
      font-style: italic;
    }

    .ref-text::before {
      content: '"';
      font-size: 2.5rem;
      color: var(--primary);
      line-height: 0;
      vertical-align: -0.5rem;
      margin-right: 4px;
      font-style: normal;
    }

    .ref-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .ref-name {
      font-weight: 700;
      color: var(--white);
      font-size: 0.92rem;
    }

    .ref-location {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.50);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kontakt-radek {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .kontakt-radek:hover {
      transform: translateY(-2px);
    }

    .kontakt-ikona {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .kontakt-radek-text strong {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gray-text);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .kontakt-radek-text a,
    .kontakt-radek-text span {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      text-decoration: none;
    }

    .kontakt-radek-text a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: var(--radius);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      gap: 14px;
      box-shadow: var(--shadow);
      border: 2px dashed rgba(255,255,255,0.12);
    }

    .mapa-placeholder span:first-child {
      font-size: 2.8rem;
    }

    .mapa-placeholder strong {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      font-weight: 700;
    }

    .cta-box {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      margin-top: 18px;
      box-shadow: 0 6px 28px rgba(192,57,43,0.30);
    }

    .cta-box p {
      color: rgba(255,255,255,0.85);
      font-size: 0.92rem;
      margin-bottom: 14px;
    }

    .cta-box a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: var(--primary);
      font-weight: 800;
      font-size: 1.05rem;
      padding: 12px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 14px rgba(0,0,0,0.15);
    }

    .cta-box a:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 22px rgba(0,0,0,0.20);
    }

    /* ─── FOOTER ─── */
    footer {
      background: #0f0f1a;
      color: rgba(255,255,255,0.55);
      padding: 36px 20px;
      text-align: center;
      font-size: 0.83rem;
      line-height: 1.8;
    }

    footer strong {
      color: rgba(255,255,255,0.85);
    }
