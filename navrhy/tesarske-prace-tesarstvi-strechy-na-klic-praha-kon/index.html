<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařské práce Praha | Střechy na klíč | Krovové konstrukce</title>
<meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, altány, pergoly, opravy krovů a dřevostavby. Volejte 774 637 945.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c47a1e;
  --primary-dark: #a0621a;
  --primary-light: #e8953a;
  --accent: #8B4513;
  --dark: #1a1208;
  --dark2: #2d1f0a;
  --dark3: #3d2b10;
  --text: #1a1208;
  --text-light: #5a4a2a;
  --text-muted: #8a7a5a;
  --white: #ffffff;
  --off-white: #fdf8f0;
  --card-bg: #ffffff;
  --border: #e8d9c0;
  --shadow: 0 4px 24px rgba(196,122,30,0.10);
  --shadow-hover: 0 8px 40px rgba(196,122,30,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--off-white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(196,122,30,0.4);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(196,122,30,0.5);
}

.nav-cta .phone-icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1208 0%, #2d1f0a 30%, #3d2b10 60%, #1a1208 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(196,122,30,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 80% at 80% 100%, rgba(139,69,19,0.15) 0%, transparent 60%);
}

.hero-wood-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(196,122,30,0.8) 40px,
      rgba(196,122,30,0.8) 42px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(139,69,19,0.5) 80px,
      rgba(139,69,19,0.5) 81px
    );
}

.hero-container {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(196,122,30,0.15);
  border: 1px solid rgba(196,122,30,0.35);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 40px;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.55;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 25px rgba(196,122,30,0.45);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 35px rgba(196,122,30,0.55);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.25s ease;
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-divider {
  width: 1px;
  height: 50px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: rgba(196,122,30,0.12);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.65;
}

.section-header {
  margin-bottom: 56px;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--white);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--off-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
  background: var(--white);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(196,122,30,0.12), rgba(232,149,58,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  border: 1px solid rgba(196,122,30,0.15);
}

.service-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  margin-top: 16px;
  transition: gap 0.2s ease;
}

.service-link:hover {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(196,122,30,0.08) 0%, transparent 70%);
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

#proc-my .section-label {
  background: rgba(196,122,30,0.2);
  color: var(--primary-light);
}

.benefits-grid {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  text-align: center;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.benefit-card:hover {
  background: rgba(196,122,30,0.1);
  border-color: rgba(196,122,30,0.3);
  transform: translateY(-4px);
}

.benefit-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 25px rgba(196,122,30,0.35);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--off-white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
}

.stars {
  color: var(--primary);
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.author-info span {
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h2 {
  font-size: clamp(26px, 4vw, 36px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.kontakt-info p {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 32px;
  line-height: 1.65;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: var(--off-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-decoration: none;
  color: var(--text);
  transition: all 0.25s ease;
}

.contact-item:hover {
  border-color: var(--primary-light);
  background: rgba(196,122,30,0.04);
  transform: translateX(4px);
}

.contact-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(196,122,30,0.3);
}

.contact-item-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.contact-item-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.map-placeholder {
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  height: 100%;
  min-height: 360px;
  background: linear-gradient(135deg, #f5ede0 0%, #eedec8 50%, #e8d2b4 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(196,122,30,0.05),
      rgba(196,122,30,0.05) 1px,
      transparent 1px,
      transparent 30px
    ),
    repeating-linear-gradient(
      90deg,
      rgba(196,122,30,0.05),
      rgba(196,122,30,0.05) 1px,
      transparent 1px,
      transparent 30px
    );
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 4px 12px rgba(196,122,30,0.4));
}

.map-text {
  position: relative;
  z-index: 1;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
}

.map-sub {
  position: relative;
  z-index: 1;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  padding: 40px 20px;
}

.footer-container {
  max-width:
