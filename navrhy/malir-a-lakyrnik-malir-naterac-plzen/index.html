<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malíř a lakýrník Plzeň | Profesionální natěrač</title>
  <meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, sádrokarton. Zavolejte +420602142929">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8730a;
      --primary-dark: #c45e00;
      --primary-light: #f9a04b;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #fafaf8;
      --bg-section: #f4f1ec;
      --border: #e8e0d8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,115,10,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(232,115,10,0.3);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(232,115,10,0.4);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0f00 0%, #2d1800 30%, #3d2200 60%, #1a1200 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(232,115,10,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(249,160,75,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(232,115,10,0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border: 2px solid rgba(232,115,10,0.1);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,115,10,0.15);
      border: 1px solid rgba(232,115,10,0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      width: fit-content;
    }

    .hero-content h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .hero-content h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 19px);
      color: #c8b89a;
      margin-bottom: 36px;
      max-width: 560px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(232,115,10,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(232,115,10,0.5);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      font-weight: 400;
      margin-top: 3px;
    }

    .hero-visual {
      display: none;
    }

    /* ===== SECTION COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,115,10,0.10);
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
      line-height: 1.25;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
      padding: 80px 20px;
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,115,10,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(232,115,10,0.12), rgba(249,160,75,0.08));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
      padding: 80px 20px;
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .benefit-card {
      background: var(--bg-section);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      display: flex;
      gap: 22px;
      align-items: flex-start;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }

    .benefit-card:hover {
      background: var(--white);
      border-color: rgba(232,115,10,0.2);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .benefit-num {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .benefit-body h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-body p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--dark);
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '"';
      position: absolute;
      top: -20px;
      left: 30px;
      font-size: 300px;
      color: rgba(232,115,10,0.05);
      font-family: Georgia, serif;
      line-height: 1;
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: #aaa;
    }

    #reference .section-tag {
      background: rgba(232,115,10,0.15);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: all 0.3s ease;
    }

    .review-card:hover {
      background: rgba(232,115,10,0.08);
      border-color: rgba(232,115,10,0.25);
      transform: translateY(-3px);
    }

    .review-stars {
      color: #f5c518;
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #d4c8ba;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--white);
      font-size: 16px;
      flex-shrink: 0;
    }

    .review-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .review-info span {
      font-size: 12px;
      color: #888;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-section);
      padding: 80px 20px;
    }

    .contact-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .contact-info {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .contact-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(232,115,10,0.12), rgba(249,160,75,0.08));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-detail strong {
      display: block;
      font-size: 13px;
      color: var(--text-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }

    .contact-detail a,
    .contact-detail p {
      font-size: 16px;
      color: var(--dark);
      font-weight: 600;
      text-decoration: none;
      line-height: 1.5;
    }

    .contact-detail a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    .map-inner {
      flex: 1;
      background: linear-gradient(135deg, #e8e0d8 0%, #d4c8ba 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .map-pin-icon {
      font-size: 48px;
    }

    .map-inner h4 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .map-inner p {
      font-size: 14px;
      color: var(--text-light);
    }

    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      margin-top: 8px;
      transition: all 0.3s;
    }

    .map-btn:hover {
