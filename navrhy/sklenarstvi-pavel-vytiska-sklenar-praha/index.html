<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sklenářství Pavel Vytiska – Profesionální sklenář Praha</title>
  <meta name="description" content="Profesionální sklenářské práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelné ceny. Zavolejte +420603454557.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-light: #bae6fd;
      --accent: #38bdf8;
      --dark: #0c1a2e;
      --dark2: #102a45;
      --dark3: #163a5f;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-bg: #f0f7ff;
      --card-bg: #ffffff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(14,165,233,0.10);
      --shadow-hover: 0 8px 40px rgba(14,165,233,0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(12, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(14,165,233,0.18);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(14,165,233,0.40);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0c1a2e 0%, #0d2a4a 40%, #0e3a6a 70%, #0a2a50 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(14,165,233,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(14,165,233,0.18);
      border: 1px solid rgba(14,165,233,0.35);
      color: var(--accent);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.03em;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(14,165,233,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(14,165,233,0.55);
      background: linear-gradient(135deg, var(--accent), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.30);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 30px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.60);
      margin-top: 4px;
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      text-align: center;
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .section-desc {
      text-align: center;
      color: var(--text-light);
      font-size: 17px;
      max-width: 560px;
      margin: 0 auto 50px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--gray-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.28s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.28s ease;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(14,165,233,0.12), rgba(56,189,248,0.20));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      border-radius: var(--radius);
      background: var(--gray-bg);
      border: 1px solid rgba(14,165,233,0.10);
      transition: all 0.25s ease;
    }

    .benefit-card:hover {
      background: linear-gradient(135deg, rgba(14,165,233,0.06), rgba(56,189,248,0.08));
      border-color: rgba(14,165,233,0.25);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .benefit-body h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-body p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, #0c1a2e 0%, #0d2a4a 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      color: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.60);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(14,165,233,0.35);
      transform: translateY(-3px);
    }

    .review-stars {
      color: #fbbf24;
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.50);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--gray-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
    }

    .contact-item:hover {
      transform: translateX(4px);
      border-color: var(--primary);
      box-shadow: var(--shadow-hover);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-item-note {
      font-size: 13px;
      color: var(--text-light);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
      height: 100%;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    .map-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .map-title {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .map-visual {
      flex: 1;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 40%, #93c5fd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      padding: 30px;
      min-height: 220px;
      position: relative;
      overflow: hidden;
    }

    .map-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(14,165,233,0.05) 0px,
        rgba(14,165,233,0.05) 1px,
        transparent 1px,
        transparent 40px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(14,165,233,0.05) 0px,
        rgba(14,165,233,0.05) 1px,
        transparent 1px,
        transparent 40px
      );
    }

    .map-pin {
      font-size: 48px;
      filter: drop-shadow(0 4px 8px rgba(14,165,233,0.4));
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .map-text-sub {
      font-size: 13px;
      color: var(--text-light);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .footer-logo-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-center {
      text-align: center;
    }

    .footer-copy {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    .footer-ico {
      font-size: 12px;
      color: rgba(255,255,255,0.30);
