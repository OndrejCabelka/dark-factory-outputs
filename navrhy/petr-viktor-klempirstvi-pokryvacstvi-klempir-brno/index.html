<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petr Viktor – Klempířství & Pokrývačství Brno</title>
  <meta name="description" content="Profesionální klempíř a pokrývač v Brně a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte +420 777 233 882.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #b87333;
      --primary-dark: #8a5220;
      --primary-light: #d4954a;
      --accent: #e8a44a;
      --dark: #1a1a1a;
      --dark2: #232323;
      --dark3: #2d2d2d;
      --text: #1f1f1f;
      --text-light: #555;
      --white: #ffffff;
      --gray-light: #f7f5f2;
      --gray: #e8e4df;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(184,115,51,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 100;
    }

    /* ========== HEADER / NAVBAR ========== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 99;
      border-bottom: 2px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    nav a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .nav-hidden-mobile {
      display: none;
    }

    .cta-phone {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      font-weight: 700;
      font-size: 14px;
      padding: 9px 16px;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cta-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(184,115,51,0.45);
    }

    /* ========== HERO ========== */
    #hero {
      background: linear-gradient(135deg, #0f0f0f 0%, #1c1410 40%, #2a1a08 70%, #1a1208 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(184,115,51,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(232,164,74,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,1) 40px, rgba(255,255,255,1) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,1) 40px, rgba(255,255,255,1) 41px);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(184,115,51,0.18);
      border: 1px solid rgba(184,115,51,0.35);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1px;
      margin-bottom: 22px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: #bbb;
      font-weight: 400;
      margin-bottom: 38px;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(184,115,51,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(184,115,51,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.20);
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .stat-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 16px 24px;
      text-align: center;
      min-width: 130px;
      backdrop-filter: blur(4px);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ========== SECTIONS ========== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(184,115,51,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      border: 1px solid rgba(184,115,51,0.20);
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ========== SLUZBY ========== */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(184,115,51,0.12);
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(184,115,51,0.12), rgba(232,164,74,0.15));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ========== PROC MY ========== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(184,115,51,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: #999;
    }

    #proc-my .section-tag {
      background: rgba(184,115,51,0.20);
      border-color: rgba(184,115,51,0.30);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 34px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(184,115,51,0.30);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 40px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #aaa;
      line-height: 1.65;
    }

    /* ========== REFERENCE ========== */
    #reference {
      background: var(--gray-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 26px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid var(--gray);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      font-style: italic;
      flex: 1;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-city {
      font-size: 12px;
      color: #999;
    }

    /* ========== KONTAKT ========== */
    #kontakt {
      background: var(--white);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px 22px;
      background: var(--gray-light);
      border-radius: var(--radius);
      border: 1px solid var(--gray);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 12px rgba(184,115,51,0.10);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact-item-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
    }

    .contact-item-value:hover {
      color: var(--primary);
    }

    .contact-item-note {
      font-size: 13px;
      color: var(--text-light);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
      border-radius: var(--radius);
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px dashed rgba(184,115,51,0.30);
      color: #888;
      text-align: center;
      padding: 30px;
    }

    .map-icon {
      font-size: 48px;
    }

    .map-placeholder p {
      font-size: 15px;
      color: #777;
    }

    .map-placeholder strong {
      color: var(--accent);
      font-size: 17px;
      display: block;
      margin-bottom: 4px;
    }

    /* ========== WORKING HOURS ========== */
    .hours-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-light);
      padding: 4px 0;
      border-bottom: 1px solid var(--gray);
    }

    .hours-row span:last-child {
      font-weight: 600;
      color: var(--text);
    }

    /* ========== FOOTER ========== */
    footer {
      background: var(--dark);
      color: #999;
      padding: 0;
    }

    .footer-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 32px;
      display: grid;
      grid-template-columns: 2fr
