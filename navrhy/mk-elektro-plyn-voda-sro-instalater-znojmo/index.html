<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MK - elektro - plyn - voda s.r.o. | Instalatér Znojmo</title>
  <meta name="description" content="Profesionální instalatér ve Znojmě a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7, ústřední topení.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #135299;
      --primary-light: #3d8ee0;
      --accent: #f59e0b;
      --dark: #0d1b2a;
      --dark-2: #1a2d42;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-light: #f1f5f9;
      --gray-border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 32px rgba(26,111,196,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    .container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    #proposal-banner a {
      color: white;
      font-weight: bold;
      text-decoration: underline;
    }

    /* ===================== HEADER / NAVBAR ===================== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      max-width: 1140px;
      margin: 0 auto;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 18px;
      }
    }

    /* ===================== HERO ===================== */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0f2744 40%, #1a3a5c 70%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 20%, rgba(26,111,196,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(13,27,42,0.6) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.9);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 6vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.78);
      max-width: 560px;
      margin: 0 auto 36px;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 24px rgba(26,111,196,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(26,111,196,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      color: var(--white);
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px 40px;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
    }

    .hero-stat span {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    /* ===================== SERVICES ===================== */
    #sluzby {
      padding: 80px 20px;
      background: var(--white);
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,111,196,0.10);
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      max-width: 1140px;
      margin: 0 auto;
    }

    @media (min-width: 560px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border: 1.5px solid var(--gray-border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.3);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(61,142,224,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .service-card .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 8px;
    }

    /* Emergency card highlight */
    .service-card.emergency {
      background: linear-gradient(135deg, #0d1b2a, #1a3a5c);
      border-color: transparent;
    }

    .service-card.emergency h3,
    .service-card.emergency p {
      color: rgba(255,255,255,0.9);
    }

    .service-card.emergency p {
      color: rgba(255,255,255,0.65);
    }

    .service-card.emergency .service-icon {
      background: rgba(255,255,255,0.12);
    }

    .service-card.emergency .service-link {
      color: var(--accent);
    }

    .emergency-badge {
      display: inline-block;
      background: #ef4444;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===================== WHY US ===================== */
    #proc-my {
      padding: 80px 20px;
      background: var(--gray-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 26px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(26,111,196,0.25);
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===================== REVIEWS ===================== */
    #reference {
      padding: 80px 20px;
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border: 1.5px solid var(--gray-border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.25);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===================== CONTACT ===================== */
    #kontakt {
      padding: 80px 20px;
      background: var(--gray-light);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .contact-wrapper {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }

    .contact-info {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 30px;
      box-shadow: var(--shadow);
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .contact-item:last-child {
      margin-bottom: 0;
    }

    .contact-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(61,142,224,0.18));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .contact-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-value a {
      color: var(--primary);
      transition: color 0.2s;
    }

    .contact-value a:hover {
      color: var(--primary-dark);
    }

    .contact-value span {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }

    .map-inner {
      flex: 1;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 40%, #93c5fd 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
