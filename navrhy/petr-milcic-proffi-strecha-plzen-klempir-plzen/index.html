<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proffi Střecha Plzeň – Petr Milčic | Klempíř Plzeň</title>
  <meta name="description" content="Profesionální klempířské práce v Plzni a okolí. Oplechování střech, okapy, vikýře, střešní okna. Zavolejte Petru Milčicovi!">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #b8860b;
      --primary-light: #d4a017;
      --primary-dark: #8b6508;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #6b6b6b;
      --white: #ffffff;
      --bg-light: #f8f7f4;
      --bg-card: #ffffff;
      --border: #e8e4dc;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-main span {
      color: var(--primary-light);
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-cta svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(184,134,11,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,160,23,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(15,52,96,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary-light), var(--primary), var(--primary-light), transparent);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(184,134,11,0.2);
      border: 1px solid rgba(212,160,23,0.4);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
    }

    .hero-content {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      color: var(--primary-light);
      position: relative;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.80);
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(184,134,11,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(184,134,11,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
      min-height: 40px;
    }

    /* ===== SECTION SHARED ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(184,134,11,0.12);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 30px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .sluzba-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
      border-color: rgba(184,134,11,0.25);
    }

    .sluzba-card:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(184,134,11,0.12), rgba(212,160,23,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      border: 1px solid rgba(184,134,11,0.2);
    }

    .sluzba-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(184,134,11,0.1);
      color: var(--primary-dark);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      align-self: flex-start;
      margin-top: auto;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 100% 0%, rgba(184,134,11,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #proc-my .section-label {
      background: rgba(212,160,23,0.15);
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 30px 28px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(184,134,11,0.4);
      transform: translateY(-3px);
    }

    .benefit-card:hover::after {
      transform: scaleX(1);
    }

    .benefit-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(184,134,11,0.3);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--white);
    }

    .reference-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .review-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
    }

    .review-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: #f59e0b;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: var(--primary-light);
      line-height: 0;
      position: relative;
      top: 14px;
      margin-right: 4px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .reviewer-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    .review-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(34,197,94,0.1);
      color: #16a34a;
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }

    a.kontakt-item:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: rgba(184,134,11,0.3);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-body strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-item-body span {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .kontakt-item-body .kontakt-note {
      display: block;
      font-size: 12px;
      color: var(--text-light);
      font-weight: 400;
      margin-top: 2px;
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, var(--dark2), var(--dark3));
      border-radius: var(--radius);
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(184,134,11,0.15), transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(15,52,96,0.3), transparent 50%);
    }

    .mapa-icon {
      font-size: 52px;
      position: relative;
    }

    .mapa-text {
      text-align: center;
      position: relative;
    }

    .mapa-text strong {
      display: block;
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .mapa-text span {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    .mapa-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px
