<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kominictví Lenfeld – Profesionální kominík Brno</title>
  <meta name="description" content="Kominictví Lenfeld Brno – profesionální kominické práce, čištění komínů, revize, montáže. Rychlý servis, kvalita garantována. Tel: +420607987998">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #C0392B;
      --primary-dark: #922B21;
      --primary-light: #E74C3C;
      --accent: #E67E22;
      --accent-light: #F39C12;
      --dark: #1A1A1A;
      --dark-2: #2C2C2C;
      --dark-3: #3D3D3D;
      --gray: #6B7280;
      --gray-light: #D1D5DB;
      --light: #F9FAFB;
      --white: #FFFFFF;
      --text: #1F2937;
      --text-light: #4B5563;
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: var(--gray-light);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: #CBD5E1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: all 0.2s !important;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(192,57,43,0.35);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(192,57,43,0.45) !important;
      color: var(--white) !important;
    }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
    }

    /* ===== HERO ===== */
    #hero {
      background:
        linear-gradient(135deg, rgba(26,10,8,0.92) 0%, rgba(92,20,14,0.88) 40%, rgba(40,20,10,0.93) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 60px,
          rgba(192,57,43,0.04) 60px,
          rgba(192,57,43,0.04) 61px
        );
      background-color: #1A0A08;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(192,57,43,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(230,126,34,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #FF8A80;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
      letter-spacing: 0.3px;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-h1 {
      font-size: clamp(32px, 4.5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
    }

    .hero-h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 1.8vw, 20px);
      color: #CBD5E1;
      line-height: 1.6;
      font-weight: 400;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(192,57,43,0.4);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(192,57,43,0.55);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      padding: 15px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      padding-top: 8px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 26px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 380px;
    }

    .hero-card-icon {
      font-size: 64px;
      text-align: center;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 12px rgba(192,57,43,0.4));
    }

    .hero-card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 20px;
    }

    .hero-card-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero-card-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #CBD5E1;
      font-size: 14px;
      font-weight: 500;
    }

    .hero-card-list li::before {
      content: '✓';
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      border: 1px solid rgba(192,57,43,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 100px 20px;
      background: var(--light);
    }

    .sluzby-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .sluzba-karta:hover .sluzba-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }

    .sluzba-karta:hover .sluzba-icon {
      transform: scale(1.05);
    }

    .sluzba-nazev {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-popis {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 100px 20px;
      background: var(--white);
    }

    .proc-my-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 32px;
      background: var(--light);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: var(--white);
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 6px 18px rgba(192,57,43,0.3);
    }

    .benefit-text h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== CTA BANNER ===== */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
      padding: 80px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .cta-banner::before {
      content: '🔥';
      position: absolute;
      font-size: 300px;
      opacity: 0.04;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .cta-banner-inner {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .cta-banner h2 {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .cta-banner p {
      font-size: 17px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .cta-banner-btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary-dark);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.3);
    }

    .btn-outline-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.5);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-outline-white:hover {
      background: rgba(255,255,255,0.1);
      border-color: white;
      transform: translateY(-2px);
    }

    /* ===== RECENZE ===== */
    #reference {
      padding: 100px 20px;
      background: var(--dark);
    }

    .reference-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .reference-inner .section-title {
      color: var(--white);
    }

    .reference-inner .section-desc {
      color: #94A3B8;
    }

    .recenze-grid {
