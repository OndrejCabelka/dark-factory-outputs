<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesařství Miroslav Baxa – Profesionální tesař Praha</title>
<meta name="description" content="Tesařství Miroslav Baxa – profesionální tesařské práce v Praze a okolí. Krovové konstrukce, altány, pergoly, dřevostavby.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8860a;
  --primary-dark: #a06a05;
  --primary-light: #e8a832;
  --dark: #1a1208;
  --dark2: #2c1f0a;
  --dark3: #3d2d10;
  --text: #1a1208;
  --text-light: #5a4a2a;
  --text-muted: #8a7a5a;
  --white: #ffffff;
  --bg-light: #fdf8f0;
  --bg-card: #ffffff;
  --border: #e8dcc8;
  --shadow: 0 4px 24px rgba(200,134,10,0.10);
  --shadow-hover: 0 8px 36px rgba(200,134,10,0.20);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,18,8,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(200,134,10,0.2);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(200,134,10,0.3);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(200,134,10,0.4);
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background: linear-gradient(160deg, #1a1208 0%, #2c1f0a 40%, #3d2d10 70%, #1a1208 100%);
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: 
    repeating-linear-gradient(
      45deg,
      #c8860a 0px,
      #c8860a 1px,
      transparent 1px,
      transparent 60px
    ),
    repeating-linear-gradient(
      -45deg,
      #c8860a 0px,
      #c8860a 1px,
      transparent 1px,
      transparent 60px
    );
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,134,10,0.15) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(200,134,10,0.08) 0%, transparent 70%);
  bottom: -50px;
  left: -50px;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,134,10,0.15);
  border: 1px solid rgba(200,134,10,0.3);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
  max-width: 800px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.2vw, 20px);
  color: rgba(255,255,255,0.7);
  max-width: 580px;
  margin-bottom: 40px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 24px rgba(200,134,10,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(200,134,10,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.2);
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(200,134,10,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid rgba(200,134,10,0.2);
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 560px) {
  .sluzby-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .sluzby-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 1100px) {
  .sluzby-grid {
    grid-template-columns: repeat(3, 1fr);
  }
  .sluzby-grid .card:nth-child(1),
  .sluzby-grid .card:nth-child(2) {
    grid-column: span 1;
  }
}

.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
  cursor: default;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,134,10,0.3);
}

.card-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(232,168,50,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(200,134,10,0.15);
}

.card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.card-tag {
  display: inline-block;
  margin-top: 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  background: rgba(200,134,10,0.08);
  padding: 4px 10px;
  border-radius: 50px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefity-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

@media (min-width: 768px) {
  .benefity-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.benefit-card {
  text-align: center;
  padding: 40px 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-light);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,134,10,0.25);
}

.benefit-number {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: white;
  margin: 0 auto 20px;
  box-shadow: 0 6px 20px rgba(200,134,10,0.3);
}

.benefit-icon-alt {
  font-size: 28px;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(160deg, #1a1208 0%, #2c1f0a 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    45deg,
    rgba(200,134,10,0.03) 0px,
    rgba(200,134,10,0.03) 1px,
    transparent 1px,
    transparent 50px
  );
}

#reference .section-title {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(200,134,10,0.2);
  border-color: rgba(200,134,10,0.3);
}

#reference .section-desc {
  color: rgba(255,255,255,0.6);
}

.reference-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  position: relative;
  z-index: 2;
}

@media (min-width: 768px) {
  .reference-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(200,134,10,0.2);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(200,134,10,0.4);
  transform: translateY(-4px);
}

.stars {
  color: var(--primary-light);
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.75);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.author-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.author-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.author-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

@media (min-width: 900px) {
  .kontakt-grid {
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: all 0.25s ease;
}

.kontakt-item:hover {
  border-color: rgba(200,134,10,0.3);
  box-shadow: var(--shadow);
}

.kontakt-ico {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(232,168,50,0.06));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(200,134,10,0.12);
}

.kontakt-item-content {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.kontakt-item-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.kontakt-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
}

a.kontakt-item-value:hover {
  color: var(--primary);
}

.kontakt-item-sub {
  font-size: 13px;
  color: var(--text-muted);
}

.mapa-placeholder {

  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 4/3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
