<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radek John – Pokrývač České Budějovice</title>
  <meta name="description" content="Profesionální pokrývač Radek John v Českých Budějovicích. Pokládka krytiny, opravy střech, tepelná izolace, vikýře. Zavolejte +420605955392.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #962d22;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3a3a3a;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #f8f6f5;
      --bg-section: #fdf9f8;
      --border: #e8e0de;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: #aaa;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a08 0%, #2d1210 30%, #4a1c18 60%, #2c1a0e 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(192,57,43,0.1) 0%, transparent 40%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 20px,
          rgba(255,255,255,0.5) 20px,
          rgba(255,255,255,0.5) 22px
        );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 780px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.4);
      color: #f5a89e;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 19px);
      color: #c8b8b6;
      margin-bottom: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-number span {
      color: var(--primary-light);
    }

    .stat-label {
      font-size: 13px;
      color: #9a8a88;
      font-weight: 400;
    }

    /* ===== SECTIONS COMMON ===== */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      padding: 88px 0;
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 480px) {
      .sluzby-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .sluzby-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .sluzby-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .sluzby-grid .card:nth-child(4) {
        grid-column: 1;
      }
      .sluzby-grid .card:nth-child(5) {
        grid-column: 2;
      }
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.2);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(192,57,43,0.12);
    }

    .card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 88px 0;
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 680px) {
      .proc-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .proc-card {
      background: var(--bg-section);
      border-radius: var(--radius-lg);
      padding: 38px 30px;
      text-align: center;
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .proc-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.09);
    }

    .proc-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 18px rgba(192,57,43,0.3);
    }

    .proc-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .proc-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 88px 0;
      background: linear-gradient(180deg, #2a1208 0%, #1e0e06 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(192,57,43,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 30%, rgba(230,126,34,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.1);
      color: #f5a89e;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: #9a8a88;
    }

    .reference-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 680px) {
      .reference-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: background 0.25s, border-color 0.25s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(192,57,43,0.4);
    }

    .stars {
      color: #f5c518;
      font-size: 17px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #c8b8b6;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 36px;
      color: rgba(192,57,43,0.4);
      line-height: 0;
      vertical-align: -12px;
      margin-right: 2px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .reviewer-info span {
      font-size: 12px;
      color: #7a6a68;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 88px 0;
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text {
      flex: 1;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-text a {
      color: var(--primary);
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      transition: color 0.2s;
    }

    .kontakt-item-text a:hover {
      color: var(--primary-light);
    }

    .kontakt-item-text p {
      font-size: 16px;
      color: var(--dark);
      font-weight: 500;
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e8e0
