<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malíř pokojů Plzeň | Profesionální malování interiérů a fasád</title>
<meta name="description" content="Profesionální malíř natěrač v Plzni. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Zavolejte: 792 302 621">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8650a;
  --primary-dark: #c4530a;
  --primary-light: #f7874a;
  --accent: #f5a623;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #666;
  --white: #ffffff;
  --bg-light: #fdf6f0;
  --bg-section: #f9f4ef;
  --border: #e8ddd4;
  --shadow: 0 4px 24px rgba(232,101,10,0.12);
  --shadow-hover: 0 8px 40px rgba(232,101,10,0.22);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: fixed;
  top: 48px;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-title {
  font-size: 15px;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-call-nav {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.2s;
  box-shadow: 0 3px 12px rgba(232,101,10,0.35);
  white-space: nowrap;
}

.btn-call-nav:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(232,101,10,0.45);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

/* ===== HERO ===== */
#hero {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 160px 20px 80px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -150px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(232,101,10,0.18) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -100px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-paint-drops {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  overflow: hidden;
}

.paint-drop {
  position: absolute;
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  opacity: 0.06;
}

.paint-drop:nth-child(1) {
  width: 120px; height: 150px;
  background: var(--primary);
  top: 10%; right: 15%;
  transform: rotate(-15deg);
}

.paint-drop:nth-child(2) {
  width: 80px; height: 100px;
  background: var(--accent);
  top: 60%; right: 8%;
  transform: rotate(20deg);
}

.paint-drop:nth-child(3) {
  width: 60px; height: 80px;
  background: var(--primary-light);
  top: 30%; left: 5%;
  transform: rotate(-30deg);
}

.hero-content {
  max-width: 760px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,101,10,0.2);
  border: 1px solid rgba(232,101,10,0.4);
  color: var(--accent);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.18;
  margin-bottom: 22px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1rem, 2.5vw, 1.18rem);
  color: rgba(255,255,255,0.75);
  margin-bottom: 40px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.7;
}

.hero-cta {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.25s;
  box-shadow: 0 6px 24px rgba(232,101,10,0.45);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 36px rgba(232,101,10,0.55);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.1);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: all 0.25s;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 2rem;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-num span {
  color: var(--primary-light);
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ===== SEKCE OBECNĚ ===== */
section {
  padding: 90px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.7rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 16px;
  letter-spacing: -0.3px;
  line-height: 1.25;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 52px;
}

.section-header.center {
  text-align: center;
}

.section-header.center .section-desc {
  margin: 0 auto;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--bg-section);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,101,10,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(232,101,10,0.1), rgba(245,166,35,0.1));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: all 0.3s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(232,101,10,0.18), rgba(245,166,35,0.18));
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.65;
}

.service-card .service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  margin-top: 16px;
  text-decoration: none;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 9px;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--white);
}

.proc-my-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: linear-gradient(135deg, var(--bg-light), var(--white));
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  border: 1px solid var(--border);
  transition: all 0.3s;
  text-align: center;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,101,10,0.25);
}

.benefit-number {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin: 0 auto 20px;
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.7;
}

.benefit-icon-big {
  font-size: 36px;
  margin-bottom: 16px;
  display: block;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(232,101,10,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-label {
  color: var(--primary-light);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s;
  backdrop-filter: blur(8px);
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(232,101,10,0.35);
  transform: translateY(-4px);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.star {
  color: var(--accent);
  font-size: 18px;
}

.review-text {
  font-size: 0.97rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 2.5rem;
  color: var(--primary);
  line-height: 0;
  vertical-align: -0.6rem;
  margin-right: 4px;
  font-style: normal;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--bg-section);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h2 {
  font-size: clamp(1.5rem, 3vw, 2.1rem);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 14px;
}

.kontakt-info .lead {
  font-size: 1rem;
  color: var(--text-light);
  line-height: 1.7;
  margin-bottom: 36px;
}

.kontakt-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 36px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: all 0.25s;
  text-decoration: none;
}

.kontakt-item:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow);
  transform: translateX(4px);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(232,101,10,0.12), rgba(245,166,35,0.12));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-label {
  font-size: 11px;
  font-weight:
