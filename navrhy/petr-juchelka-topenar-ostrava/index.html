<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petr Juchelka – Topenář Ostrava</title>
  <meta name="description" content="Profesionální topenářské práce v Ostravě a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte Petr Juchelka.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e05c00;
      --primary-dark: #b84800;
      --primary-light: #ff7a2e;
      --accent: #ff9a5c;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #f8f6f3;
      --bg-card: #ffffff;
      --border: #e8e0d8;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(224,92,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(224,92,0,0.3);
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(224,92,0,0.45);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-name { font-size: 14px; }
      .nav-cta { padding: 9px 14px; font-size: 13px; }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a00 0%, #2d1200 30%, #3d1f00 60%, #1a0a00 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 70%;
      height: 180%;
      background: radial-gradient(ellipse, rgba(224,92,0,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 50%;
      height: 130%;
      background: radial-gradient(ellipse, rgba(255,122,46,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(224,92,0,0.2);
      border: 1px solid rgba(224,92,0,0.5);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.78);
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.55;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s ease;
      box-shadow: 0 6px 28px rgba(224,92,0,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(224,92,0,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      color: var(--white);
    }

    .hero-stat-num {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      align-self: center;
    }

    @media (max-width: 480px) {
      .hero-divider { display: none; }
      .hero-stats { gap: 24px; }
    }

    /* ===== SECTIONS GENERAL ===== */
    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(224,92,0,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .services-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(224,92,0,0.12), rgba(255,122,46,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(224,92,0,0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 80px 20px;
      background: var(--white);
    }

    .benefits-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .benefit-icon-wrap {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 6px 20px rgba(224,92,0,0.3);
    }

    .benefit-content h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REVIEWS ===== */
    #reference {
      padding: 80px 20px;
      background: linear-gradient(135deg, #1a0a00, #2d1200);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(255,154,92,0.2);
      color: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 28px 26px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
    }

    .review-stars {
      color: #ffd055;
      font-size: 17px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 14px;
    }

    .review-loc {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      padding: 80px 20px;
      background: var(--bg-light);
    }

    .contact-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .contact-wrapper {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-block {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.2s;
      text-decoration: none;
    }

    .contact-block:hover {
      box-shadow: var(--shadow-hover);
    }

    .contact-block-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-block-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      font-weight: 600;
      margin-bottom: 3px;
    }

    .contact-block-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-block a {
      text-decoration: none;
      color: inherit;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #d9cfc5, #c4b8aa);
      border-radius: var(--radius-lg);
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(224,92,0,0.3);
      box-shadow: var(--shadow);
    }

    .map-placeholder .map-icon {
      font-size: 42px;
    }

    .map-placeholder p {
      font-size: 14px;
      color: #6b5e52;
      font-weight: 600;
    }

    .map-placeholder span {
      font-size: 13px;
      color: #8a7a6e;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.6);
      padding: 36px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .footer-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .footer-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--accent);
