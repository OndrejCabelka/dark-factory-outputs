<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAXFOX Hradec Králové – Topenář • Instalatér • Plynař</title>
  <meta name="description" content="Profesionální instalatér, topenář a plynař v Hradci Králové. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420603271841.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0066cc;
      --primary-dark: #004fa3;
      --primary-light: #3389e0;
      --accent: #00aaff;
      --accent2: #f0a500;
      --dark: #0d1b2a;
      --dark2: #12243a;
      --text: #1a2a3a;
      --text-muted: #4a6070;
      --bg: #f4f8fb;
      --white: #ffffff;
      --card-bg: #ffffff;
      --border: #dce8f2;
      --shadow: 0 4px 24px rgba(0,102,204,0.10);
      --shadow-hover: 0 8px 36px rgba(0,102,204,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 16px;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 900;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      border-bottom: 3px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: flex;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
      background: rgba(0,102,204,0.07);
    }

    .btn-call-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,102,204,0.3);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,102,204,0.4);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    /* HERO */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #0a2a4a 40%, #0d3d6b 70%, #0a2a4a 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,170,255,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,102,204,0.15) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(0,102,204,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0,170,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,170,255,0.15);
      border: 1px solid rgba(0,170,255,0.3);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      width: 7px;
      height: 7px;
      background: #22cc55;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px #22cc55;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--accent), #66ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      margin-bottom: 36px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 6px 24px rgba(0,102,204,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,102,204,0.55);
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
    }

    .hero-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* SECTION COMMON */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 52px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(0,102,204,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto;
    }

    /* SLUZBY */
    #sluzby {
      background: var(--bg);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: var(--radius) var(--radius) 0 0;
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0,102,204,0.2);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(0,102,204,0.12), rgba(0,170,255,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.2s;
    }

    .sluzba-karta:hover .sluzba-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .sluzba-tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(0,102,204,0.08);
      padding: 4px 12px;
      border-radius: 50px;
    }

    .sluzba-karta.havarije {
      background: linear-gradient(135deg, #0d1b2a, #0a2a4a);
      border-color: rgba(0,170,255,0.2);
    }

    .sluzba-karta.havarije h3,
    .sluzba-karta.havarije p {
      color: var(--white);
    }

    .sluzba-karta.havarije p {
      color: rgba(255,255,255,0.7);
    }

    .sluzba-karta.havarije .sluzba-icon {
      background: rgba(0,170,255,0.2);
    }

    .sluzba-karta.havarije .sluzba-tag {
      background: rgba(0,170,255,0.2);
      color: var(--accent);
    }

    .sluzba-karta.havarije::before {
      background: linear-gradient(90deg, var(--accent), #66ccff);
    }

    /* PROC MY */
    #proc-my {
      background: linear-gradient(135deg, #0d1b2a 0%, #0a2a4a 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,170,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(0,170,255,0.15);
      color: var(--accent);
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
    }

    .benefit-karta:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(0,170,255,0.3);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 42px;
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 2px rgba(0,170,255,0.3);
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-karta h3 {
      font-size: 21px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-karta p {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
    }

    .benefit-highlight {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    /* REFERENCE */
    #reference {
      background: var(--white);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 30px 26px;
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0,102,204,0.2);
    }

    .quote-icon {
      font-size: 36px;
      color: var(--primary);
      opacity: 0.2;
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .recenze-hvezdy {
      color: #f0a500;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .recenze-karta p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 20px;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .autor-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .autor-info span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* KONTAKT */
    #kontakt {
      background: var(--bg);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: all 0.2s;
    }

    .kontakt-karta:hover {
