<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér - topenář Jiří Srb | Liberec</title>
  <meta name="description" content="Profesionální instalatér a topenář Jiří Srb v Liberci. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Zavolejte +420608296267.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fb5;
      --primary-dark: #1358a0;
      --primary-light: #2e88d4;
      --accent: #f0a500;
      --dark: #0d1f35;
      --dark2: #102844;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --border: #dce8f7;
      --card-shadow: 0 4px 24px rgba(26,111,181,0.10);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(26,111,181,0.08);
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,111,181,0.30);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(26,111,181,0.40);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 40%, #0e3060 70%, #1a5fa0 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(26,111,181,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(240,165,0,0.18);
      border: 1px solid rgba(240,165,0,0.35);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
    }

    .hero-content {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.80);
      margin-bottom: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent), #e09500);
      color: var(--dark);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(240,165,0,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(240,165,0,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.35);
      color: var(--white);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.60);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
    }

    .hero-stat span {
      font-size: 13px;
      color: rgba(255,255,255,0.60);
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.20);
      align-self: stretch;
    }

    /* ─── SECTIONS GENERAL ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin-bottom: 52px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(26,111,181,0.18);
      border-color: var(--primary);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--bg-light), #ddeeff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .sluzba-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-card .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      color: var(--primary);
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .sluzba-card .sluzba-link:hover {
      gap: 8px;
    }

    /* Havárie badge */
    .havarie-badge {
      display: inline-block;
      background: #ff4444;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .benefit-num {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .benefit-item h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .benefit-item p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.65);
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.10);
      color: var(--accent);
      border-color: rgba(255,255,255,0.15);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 30px 26px;
      backdrop-filter: blur(6px);
      transition: background 0.25s, transform 0.25s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-4px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .star {
      color: var(--accent);
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.70;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #1a6fb5, #2e88d4); }
    .avatar-2 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .avatar-3 { background: linear-gradient(135deg, #e74c3c, #c0392b); }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-city {
      font-size: 13px;
      color: rgba(255,255,255,0.50);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--bg-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(26,111,181,0.15);
    }

    .kontakt-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
    }

    .kontakt-value:hover {
      color: var(--primary);
    }

    .kontakt-value-small {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e8f0fe, #ddeeff);
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-light);
      font-size: 15px;
      font-weight: 500;
      padding: 30px;
      text-align: center;
    }

    .mapa-icon {
      font-size: 52px;
      opacity: 0.5;
    }

    .mapa-placeholder p {
      max-width: 240px;
      font-size: 14px;
      color: var(--text-light);
    }

    .urgency-banner {
      background: linear-gradient(135deg, #ff4444, #e63333);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
    }

    .urgency-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .urgency-text strong {
      display: block;
      color: white;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .urgency-text span {
      color: rgba(255,255,255,0.80);
      font-size: 14px;
    }

    .urgency-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      color: #e63333;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      margin-left: auto;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .urgency-btn:hover {
      transform: scale(1.05);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark);
      padding: 40px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-logo {
      font
