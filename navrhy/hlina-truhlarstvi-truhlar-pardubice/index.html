<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #8B5E3C;
  --primary-dark: #6B4423;
  --primary-light: #C4896A;
  --accent: #D4A054;
  --accent-light: #F0C878;
  --dark: #1A1208;
  --dark-2: #2C1E0F;
  --dark-3: #3D2B18;
  --text: #F5EFE6;
  --text-muted: #BCA98C;
  --white: #FFFFFF;
  --card-bg: #FDFAF6;
  --shadow: 0 4px 24px rgba(26,18,8,0.13);
  --shadow-lg: 0 8px 40px rgba(26,18,8,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {

  color: #2C1E0F;

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ─── HEADER / NAVBAR ─── */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,18,8,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212,160,84,0.2);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  font-size: 28px;
  line-height: 1;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {

  font-weight: 400;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-cta {

  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--primary-light));
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(212,160,84,0.4);
}

  -webkit-text-fill-color: transparent;

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);

  margin-bottom: 40px;

  line-height: 1.7;

.hero-cta-group {

  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--accent), #C8862A);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  padding: 16px 32px;

}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,160,84,0.5);

.btn-secondary {

  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: 50px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(6px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent-light);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;

/* ─── SECTION COMMON ─── */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-label::before {
  content: '';
  display: block;
  width: 24px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: #6B5040;
  max-width: 540px;
  line-height: 1.7;
}

/* ─── SLUZBY ─── */
#sluzby {
  background: #FBF7F3;
}

.sluzby-header {
  margin-bottom: 52px;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,94,60,0.08);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(139,94,60,0.2);
}

.sluzba-card:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, #FDF0E3, #F5E0C8);
  border-radius: 14px;

  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.sluzba-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.sluzba-card p {
  font-size: 14.5px;
  color: #7A5A42;
  line-height: 1.65;
}

.sluzba-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s;
}

.sluzba-link:hover {
  gap: 10px;
}

/* ─── PROC MY ─── */
#proc-my {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(212,160,84,0.08) 0%, transparent 60%);

}

.proc-my-top {
  display: flex;
  flex-direction: column;
  gap: 6px;

}

.proc-my-top .section-label {

}

}

.proc-my-top .section-title {

.proc-my-top .section-desc {

}

.benefity-grid {
  display: grid;

}

.benefit-card {
  background: rgba(255,255,255,0.05);

}

.benefit-card h3 {

}

.benefit-card p {

/* ─── REFERENCE ─── */

  background: #FBF7F3;

  margin-bottom: 48px;
}

  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));

}

.recenze-card {
  background: var(--white);
  border-radius: var(--radius-lg);

}
