<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér a topenář Brno | VV INSTAL — Rychlý servis</title>
  <meta name="description" content="Profesionální instalatér a topenář v Brně. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420776144811">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fb5;
      --primary-dark: #1458a0;
      --primary-light: #2c87d4;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark-2: #1b2d40;
      --dark-3: #243447;
      --text: #2d3a4a;
      --text-light: #6b7a8d;
      --white: #ffffff;
      --bg-light: #f4f7fb;
      --bg-section: #eef3f9;
      --border: #d6e3f0;
      --shadow: 0 4px 24px rgba(26,111,181,0.10);
      --shadow-lg: 0 8px 40px rgba(26,111,181,0.16);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 900;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 10px;
      color: #7fa8cc;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: #a8c4df;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-call-nav {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(26,111,181,0.4);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,181,0.5);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 40%, #1a6fb5 100%);
      min-height: 88vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(44,135,212,0.18) 0%, transparent 65%),
        radial-gradient(ellipse at 20% 80%, rgba(26,111,181,0.25) 0%, transparent 55%);
    }

    .hero-bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.5) 60px, rgba(255,255,255,0.5) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.5) 60px, rgba(255,255,255,0.5) 61px);
    }

    .hero-pipe-decoration {
      position: absolute;
      right: -80px;
      top: 50%;
      transform: translateY(-50%);
      width: 480px;
      height: 480px;
      border: 40px solid rgba(44,135,212,0.12);
      border-radius: 50%;
    }

    .hero-pipe-decoration::before {
      content: '';
      position: absolute;
      inset: 60px;
      border: 30px solid rgba(44,135,212,0.08);
      border-radius: 50%;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(240,165,0,0.15);
      border: 1px solid rgba(240,165,0,0.3);
      color: var(--accent);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.12;
      margin-bottom: 22px;
      letter-spacing: -1.5px;
      max-width: 680px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: #a8c8e8;
      max-width: 540px;
      margin-bottom: 40px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 56px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #f5ba30);
      color: var(--dark);
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(240,165,0,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(240,165,0,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      letter-spacing: -1px;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: #7fa8cc;
      margin-top: 4px;
      font-weight: 500;
    }

    /* ===== SECTION GENERAL ===== */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(26,111,181,0.1), rgba(44,135,212,0.15));
      color: var(--primary);
      padding: 5px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,181,0.2);
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 34px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(26,111,181,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 62px;
      height: 62px;
      background: linear-gradient(135deg, rgba(26,111,181,0.1), rgba(44,135,212,0.15));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.08);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--accent), #f5ba30);
      color: var(--dark);
      font-size: 10px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--bg-light), var(--bg-section));
      border-radius: var(--radius);
      padding: 38px 32px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-number {
      position: absolute;
      top: -10px;
      right: 20px;
      font-size: 80px;
      font-weight: 900;
      color: rgba(26,111,181,0.07);
      line-height: 1;
      letter-spacing: -3px;
    }

    .benefit-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(26,111,181,0.3);
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(26,111,181,0.15) 0%, transparent 65%);
    }

    #reference .section-header {
      position: relative;
      z-index: 2;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: #7fa8cc;
    }

    #reference .section-tag {
      background: rgba(240,165,0,0.15);
      color: var(--accent);
      border-color: rgba(240,165,0,0.25);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 32px 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #c8ddef;
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-author-loc {
      font-size: 12px;
      color: #7fa8cc;
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info-box {
      background: var(--white);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-info-box h3 {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 28px;
      letter-spacing: -0.4px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(26,111,181,0.1), rgba(44,135,212,0.15));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(26,111,181,0.15);
    }

    .contact-item-content {
      display: flex;
      flex-direction: column;
    }

    .contact-item-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 700
