<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Elektro – Profesionální elektrikář České Budějovice</title>
<meta name="description" content="Profesionální elektrikář v Českých Budějovicích. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420 777 160 432.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C400;
  --primary-dark: #d4a900;
  --primary-light: #fff3b0;
  --dark: #0f1117;
  --dark2: #181c27;
  --dark3: #232838;
  --text: #e8eaf0;
  --text-muted: #9aa0b4;
  --white: #ffffff;
  --card-bg: #1c2133;
  --radius: 14px;
  --shadow: 0 4px 32px rgba(0,0,0,0.28);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ======== BANNER ======== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ======== NAVBAR ======== */
header {
  background: rgba(15, 17, 23, 0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(245,196,0,0.15);
  position: sticky;
  top: 0;
  z-index: 1000;
  padding: 0 20px;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), #e6b800);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.nav-logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), #e6b800);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: 50px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 18px rgba(245,196,0,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(245,196,0,0.5);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* ======== HERO ======== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 60% 40%, rgba(245,196,0,0.13) 0%, transparent 70%),
    radial-gradient(ellipse 50% 80% at 10% 80%, rgba(245,196,0,0.07) 0%, transparent 60%),
    linear-gradient(160deg, #0a0d14 0%, #111623 40%, #0d1420 100%);
  z-index: 0;
}

.hero-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

.hero-glow {
  position: absolute;
  top: 10%;
  right: 5%;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(245,196,0,0.12) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 0;
  animation: pulse-glow 4s ease-in-out infinite alternate;
}

@keyframes pulse-glow {
  from { opacity: 0.6; transform: scale(1); }
  to { opacity: 1; transform: scale(1.1); }
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 60px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,196,0,0.12);
  border: 1px solid rgba(245,196,0,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.hero-h1 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--white);
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.hero-h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 36px;
  max-width: 500px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), #e6b800);
  color: var(--dark);
  text-decoration: none;
  font-weight: 800;
  font-size: 15px;
  padding: 15px 30px;
  border-radius: 50px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(245,196,0,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(245,196,0,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  padding: 15px 30px;
  border-radius: 50px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.11);
  border-color: rgba(245,196,0,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  margin-top: 48px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-num {
  font-size: 30px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
}

.hero-visual {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.hero-card-big {
  background: rgba(28,33,51,0.85);
  border: 1px solid rgba(245,196,0,0.15);
  border-radius: var(--radius);
  padding: 28px;
  backdrop-filter: blur(10px);
}

.hero-card-big-title {
  font-size: 13px;
  color: var(--primary);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 16px;
}

.hero-service-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.hero-service-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}

.hero-service-dot {
  width: 8px;
  height: 8px;
  background: var(--primary);
  border-radius: 50%;
  flex-shrink: 0;
}

.hero-card-small {
  background: linear-gradient(135deg, rgba(245,196,0,0.15), rgba(245,196,0,0.05));
  border: 1px solid rgba(245,196,0,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.hero-card-small-icon {
  font-size: 28px;
}

.hero-card-small-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.hero-card-small-sub {
  font-size: 13px;
  color: var(--text-muted);
}

/* ======== SEKCE NADPISY ======== */
.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}

.section-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 560px;
}

.section-header {
  margin-bottom: 50px;
}

.section-header.center {
  text-align: center;
}

.section-header.center .section-desc {
  margin: 0 auto;
}

/* ======== SERVICES ======== */
#sluzby {
  padding: 90px 20px;
  background: var(--dark2);
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 22px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 32px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  border-color: rgba(245,196,0,0.25);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon-wrap {
  width: 60px;
  height: 60px;
  background: rgba(245,196,0,0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: background 0.25s;
}

.service-card:hover .service-icon-wrap {
  background: rgba(245,196,0,0.2);
}

.service-name {
  font-size: 19px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ======== PROC MY ======== */
#proc-my {
  padding: 90px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(245,196,0,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.proc-my-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 44px rgba(0,0,0,0.35);
}

.benefit-number {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 64px;
  font-weight: 900;
  color: rgba(245,196,0,0.07);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 36px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 10px;
}

.benefit-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

.benefit-highlight {
  display: inline-block;
  background: rgba(245,196,0,0.12);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  padding: 4px 12px;
  border-radius: 50px;
  margin-top: 16px;
}

/* ======== REFERENCE ======== */
#reference {
  padding: 90px 20px;
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 22px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 32px;
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 44px rgba(0,0,0,0.35);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.star {
  color: var(--primary);
  font-size: 17px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-quote {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 56px;
  color: rgba(245,196,0,0.1);
  font-family: Georgia, serif;
  line-height: 1;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #e6b800);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
}

.reviewer-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.reviewer-location {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.review-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,196,0,0.1);
  border: 1px solid rgba(245,196,0,0.2);
  color: var(--primary);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 50px;
  margin-left: auto;
}

/* ======== KONTAKT ======== */
#kontakt {
  padding: 90px 20px;
  background: var(--dark);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius
