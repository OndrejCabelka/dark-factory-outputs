<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAPA beton a.s. – Profesionální betonář Praha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E87C1E;
  --primary-dark: #C4621A;
  --primary-light: #F5A05A;
  --dark: #1A1A1A;
  --dark-2: #2B2B2B;
  --dark-3: #3A3A3A;
  --gray: #6B7280;
  --light-gray: #F3F4F6;
  --white: #FFFFFF;
  --text: #1F2937;
  --text-light: #6B7280;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 32px rgba(232,124,30,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,26,26,0.97);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(232,124,30,0.15);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(232,124,30,0.35);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(232,124,30,0.45);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  background:
    linear-gradient(145deg, rgba(20,14,8,0.92) 0%, rgba(42,24,8,0.88) 50%, rgba(60,35,10,0.85) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(232,124,30,0.03) 2px,
      rgba(232,124,30,0.03) 4px
    );
  background-color: #1a0e05;
  overflow: hidden;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 70% 50%, rgba(232,124,30,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(180,90,10,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.hero-decor {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  width: 480px;
  height: 480px;
  border-radius: 50%;
  border: 60px solid rgba(232,124,30,0.06);
  pointer-events: none;
}

.hero-decor-2 {
  position: absolute;
  right: 80px;
  top: 50%;
  transform: translateY(-50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 3px solid rgba(232,124,30,0.10);
  pointer-events: none;
}

.hero-content {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(232,124,30,0.15);
  border: 1px solid rgba(232,124,30,0.30);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.hero-content h1 {
  font-size: clamp(32px, 5.5vw, 64px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 24px;
  max-width: 680px;
}

.hero-content h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 20px);
  color: rgba(255,255,255,0.72);
  max-width: 520px;
  margin-bottom: 40px;
  line-height: 1.65;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 30px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(232,124,30,0.40);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(232,124,30,0.55);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 30px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 16px;
  border: 1.5px solid rgba(255,255,255,0.22);
  transition: all 0.2s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.40);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 30px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -1px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* ===== SECTION OBECNÉ ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-block;
  background: rgba(232,124,30,0.10);
  color: var(--primary);
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 12px;
}

.section-sub {
  font-size: 17px;
  color: var(--text-light);
  max-width: 540px;
  line-height: 1.65;
}

.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-header .section-sub {
  margin: 0 auto;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--light-gray);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: all 0.25s;
  border: 1.5px solid transparent;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,124,30,0.15);
}

.sluzba-card:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(232,124,30,0.12), rgba(232,124,30,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: all 0.25s;
}

.sluzba-card:hover .sluzba-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
}

.sluzba-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.sluzba-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.proc-my-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: center;
}

.proc-my-visual {
  position: relative;
}

.proc-my-big-card {
  background: linear-gradient(145deg, var(--dark), var(--dark-2));
  border-radius: 20px;
  padding: 48px 40px;
  color: var(--white);
  position: relative;
  overflow: hidden;
}

.proc-my-big-card::after {
  content: '🏗️';
  position: absolute;
  bottom: -10px;
  right: 20px;
  font-size: 100px;
  opacity: 0.08;
  line-height: 1;
}

.proc-my-big-num {
  font-size: 72px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -3px;
  margin-bottom: 8px;
}

.proc-my-big-label {
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
}

.proc-my-big-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}

.proc-my-mini-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 14px;
}

.proc-my-mini {
  background: var(--light-gray);
  border-radius: 12px;
  padding: 20px 18px;
  text-align: center;
}

.proc-my-mini-num {
  font-size: 26px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -1px;
}

.proc-my-mini-label {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 500;
  margin-top: 2px;
}

.benefity-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.benefit-icon-wrap {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(232,124,30,0.30);
}

.benefit-content h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}

.benefit-content p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, #271508 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(232,124,30,0.08) 0%, transparent 60%);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-sub {
  color: rgba(255,255,255,0.55);
}

#reference .section-tag {
  background: rgba(232,124,30,0.20);
  color: var(--primary-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 32px 28px;
  backdrop-filter: blur(4px);
  transition: all 0.25s;
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(232,124,30,0.25);
  transform: translateY(-4px);
}

.review-stars {
  font-size: 16px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--light-gray);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  background: var(--white);
  border-radius: var(--radius);
  padding: 40px 36px;
  box-shadow: var(--shadow);
}

.kontakt-info h3 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 28px;
  letter-spacing: -0.4px;
}

.kontakt-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 18px 0;
  border-bottom: 1px solid var(--light-gray);
}

.kontakt-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.kontakt-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, rgba(232,124,30,0.12), rgba(232,124,30,0.06));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 4px;
}

.kontakt-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.kontakt-item-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-item-value a:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

.mapa-placeholder {
  background: linear-gradient(135deg, var(--dark), var(--dark-2));
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  position: relative;
  min-height: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.mapa-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,124,30,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,124,30,0.05) 1px, transparent 1px);
  background-size: 32px 32px;
}

.mapa-icon {
  font-size: 52px;
  position: relative;
}
