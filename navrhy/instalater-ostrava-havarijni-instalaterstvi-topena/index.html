<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instalatér Ostrava – Havarijní instalatérství, topenář, vodař</title>
<meta name="description" content="Profesionální instalatér a topenář v Ostravě. Havarijní servis 24/7, opravy topení, vody, odpadů. Volejte 704 395 355.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #0f4f8f;
  --primary-light: #2d8de8;
  --accent: #f97316;
  --accent-dark: #ea6000;
  --dark: #0d1b2a;
  --dark2: #112237;
  --dark3: #1a3350;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f0f6ff;
  --bg-section: #f8faff;
  --border: #dde8f5;
  --shadow: 0 4px 24px rgba(26,111,196,0.10);
  --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(13, 27, 42, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 0.2px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.25s ease;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(249,115,22,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(249,115,22,0.5);
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f3460 40%, #1a6fc4 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%, rgba(26,111,196,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 30%, rgba(45,141,232,0.20) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--white));
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(249,115,22,0.15);
  border: 1px solid rgba(249,115,22,0.4);
  color: #fbb86e;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  position: relative;
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
}

.hero-content h1 {
  font-size: clamp(28px, 6vw, 58px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  background: linear-gradient(90deg, #60aef7, #a8d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 18px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 36px;
  font-weight: 400;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.65;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.25s ease;
  box-shadow: 0 6px 24px rgba(249,115,22,0.45);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(249,115,22,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.10);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.25s ease;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.5);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.stat-number {
  font-size: 26px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
}

.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* ===== SECTIONS GENERAL ===== */
section {
  padding: 72px 20px;
}

.section-header {
  text-align: center;
  max-width: 640px;
  margin: 0 auto 52px;
}

.section-tag {
  display: inline-block;
  background: var(--bg-light);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.8px;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 16px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--bg-section);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 26px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.28s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.28s ease;
  transform-origin: left;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--bg-light), #dbeafe);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  transition: all 0.28s ease;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
}

.service-card h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  line-height: 1.3;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-container {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  background: var(--bg-light);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  border: 1px solid var(--border);
  transition: all 0.25s ease;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: var(--primary);
}

.benefit-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(26,111,196,0.25);
}

.benefit-text h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 7px;
}

.benefit-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 60%, var(--dark3) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 30% 50%, rgba(26,111,196,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(26,111,196,0.2);
  color: #7ec8f5;
  border-color: rgba(26,111,196,0.3);
}

#reference .section-header p {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 1;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 30px 26px;
  backdrop-filter: blur(8px);
  transition: all 0.28s ease;
}

.review-card:hover {
  background: rgba(255,255,255,0.09);
  border-color: rgba(26,111,196,0.4);
  transform: translateY(-4px);
}

.review-stars {
  color: #fbbf24;
  font-size: 16px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  font-style: italic;
  margin-bottom: 20px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--bg-section);
}

.kontakt-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 24px 22px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  gap: 16px;
  align-items: flex-start;
  transition: all 0.25s ease;
}

.kontakt-card:hover {
  border-color: var(--primary-light);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.kontakt-card-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-card-body h4 {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}

.kontakt-card-body a,
.kontakt-card-body p {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  text-decoration: none;
  line-height: 1.35;
  display: block;
}

.kontakt-card-body a {
  color: var(--primary);
  transition: color 0.2s;
}

.kontakt-card-body a:hover {
  color: var(--primary-dark);
}

.kontakt-card-body span {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 400;
  display: block;
  margin-top: 2px;
}

.map-placeholder {
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  border-radius: var(--radius-lg);
  height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border: 2px dashed #93c5fd;
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 500;
}

.map-placeholder-icon {
  font-size: 48px;
  opacity: 0.7;
}

.map-placeholder p {
  opacity: 0.75;
  text-align: center;
}

.cta-kontakt {
  margin-top: 8px;
}

.cta-kontakt a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(249,115,22,0.35);
  text-align: center;
}

.cta-kontakt a:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(249,115,22,0.5);
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.5);
  padding: 36px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display:
