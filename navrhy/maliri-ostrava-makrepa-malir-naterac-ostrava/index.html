<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malíři Ostrava – MAKREPA | Profesionální malíř natěrač</title>
  <meta name="description" content="Profesionální malíř natěrač v Ostravě a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád. Volejte +420608751721">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8a020;
      --primary-dark: #c4841a;
      --primary-light: #f5c55a;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --bg-light: #faf8f4;
      --bg-section: #f5f0e8;
      --border: #e8e0d0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(232,160,32,0.4);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,160,32,0.55);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a4a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 50%, rgba(232,160,32,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 30%, rgba(232,160,32,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,160,32,0.18);
      border: 1px solid rgba(232,160,32,0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .hero-content {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-content h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 19px);
      color: rgba(255,255,255,0.78);
      margin-bottom: 36px;
      font-weight: 400;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 6px 28px rgba(232,160,32,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(232,160,32,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      padding: 15px 32px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-light);
      display: block;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* ─── SECTION SHARED ─── */
    section {
      padding: 70px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(232,160,32,0.12);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 36px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
    }

    .section-head {
      margin-bottom: 48px;
    }

    /* ─── SLUZBY ─── */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,160,32,0.15), rgba(232,160,32,0.05));
      border: 2px solid rgba(232,160,32,0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROC MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: linear-gradient(135deg, var(--bg-section), #ede8de);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      border: 1px solid rgba(232,160,32,0.2);
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      font-size: 44px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 700px 400px at 50% 0%, rgba(232,160,32,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      background: rgba(232,160,32,0.2);
      color: var(--primary-light);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.11);
    }

    .review-stars {
      color: var(--primary);
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 14px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      padding: 20px 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-text a,
    .contact-item-text span {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .contact-item-text a {
      color: var(--primary-dark);
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8e4db, #ddd8cc);
      border-radius: var(--radius-lg);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(232,160,32,0.4);
      gap: 12px;
    }

    .map-placeholder-icon {
      font-size: 56px;
    }

    .map-placeholder p {
      font-size: 15px;
      color: var(--text-light);
      font-weight: 600;
    }

    .map-placeholder span {
      font-size: 13px;
      color: var(--text-light);
    }

    .btn-map {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      margin-top: 8px;
      transition: transform 0.2s;
    }

    .btn-map:hover {
      transform: translateY(-2px);
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark2);
      color: rgba(255,255,255,0.6);
      padding: 36px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .footer-logo-name {
      font-size: 15px;
      font-weight:
