<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSTALATÉR Machát Pavel – Brno a okolí</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6db5;
  --primary-dark: #0f4f8a;
  --primary-light: #2e88d4;
  --accent: #f5a623;
  --dark: #0d1b2a;
  --dark2: #132235;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --bg-light: #f0f6ff;
  --bg-card: #ffffff;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26,109,181,0.10);
  --shadow-hover: 0 8px 36px rgba(26,109,181,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== HEADER / NAVBAR ========== */
header {
  background: var(--white);
  box-shadow: 0 2px 16px rgba(26,109,181,0.08);
  position: sticky;
  top: 0;
  z-index: 999;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(26,109,181,0.30);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,109,181,0.40);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

/* ========== HERO ========== */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f3460 40%, #1a6db5 100%);
  position: relative;
  overflow: hidden;
  padding: 100px 20px 80px;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(26,109,181,0.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(245,166,35,0.10) 0%, transparent 50%);
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--white);
  clip-path: ellipse(55% 100% at 50% 100%);
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.20);
  color: var(--white);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  backdrop-filter: blur(10px);
}

.hero-badge span {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.3); }
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

#hero h1 em {
  font-style: normal;
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 18px);
  color: rgba(255,255,255,0.80);
  margin-bottom: 40px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: var(--dark);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(245,166,35,0.40);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(245,166,35,0.50);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.12);
  color: var(--white);
  text-decoration: none;
  padding: 14px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid rgba(255,255,255,0.30);
  transition: background 0.2s, transform 0.2s;
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.22);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 60px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
  color: var(--white);
}

.hero-stat strong {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

.hero-stat span {
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
}

/* ========== SECTIONS ========== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: var(--bg-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.5px;
}

.section-header p {
  margin-top: 12px;
  color: var(--text-light);
  font-size: 16px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

/* ========== SLUZBY ========== */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border-top: 3px solid transparent;
  cursor: default;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-top-color: var(--primary);
}

.service-icon {
  width: 56px;
  height: 56px;
  background: var(--bg-light);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
  transition: background 0.25s;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
}

.service-card h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

.service-badge {
  display: inline-block;
  background: #fef3c7;
  color: #b45309;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 50px;
  margin-top: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ========== PROC MY ========== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  display: flex;
  gap: 18px;
  padding: 28px 24px;
  border-radius: var(--radius);
  background: var(--bg-light);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon-wrap {
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.benefit-card h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 7px;
}

.benefit-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ========== REFERENCE ========== */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
}

#reference .section-header h2,
#reference .section-tag {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.80);
}

#reference .section-header p {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius);
  padding: 28px 24px;
  transition: background 0.25s, transform 0.25s;
}

.review-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateY(-4px);
}

.review-stars {
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.7;
  margin-bottom: 18px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 14px;
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--bg-light);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px 22px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none;
  color: inherit;
}

.contact-card:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-hover);
}

.contact-card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--bg-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-card-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  margin-bottom: 3px;
}

.contact-card-value {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
}

.contact-card-value.black {
  color: var(--dark);
}

.map-placeholder {
  background: linear-gradient(135deg, #1a3a5c, #1a6db5);
  border-radius: var(--radius);
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  gap: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.06) 0%, transparent 50%),
    radial-gradient(circle at 70% 70%, rgba(26,109,181,0.3) 0%, transparent 50%);
}

.map-pin {
  font-size: 48px;
  position: relative;
  z-index: 1;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.map-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
  position: relative;
  z-index: 1;
}

.map-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  position: relative;
  z-index: 1;
}

/* ========== FOOTER ========== */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.65);
  padding: 32px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.footer-brand {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.footer-text {
  font-size: 13px;
}

.footer-links {
  display: flex;
  gap: 20px;
  margin-top: 4px;
}

.footer-links a {
  color: rgba(255,255,255,0.50);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}

.footer-links a:hover {
  color: var(--primary-light);
}

/* ========== URGENCY STRIP ========== */
.urgency-strip {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: var(--white);
  text-align: center;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 600;
}

.urgency-strip a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 700;
}

.urgency-strip a:hover {
  text-decoration: underline;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .nav-links {
    display: none;
  }

  .hero-stats {
    gap: 24px;
  }

  .contact-grid {
    grid-template-columns: 1fr;
  }

  .map-placeholder {
    height: 220px;
  }

  section {
    padding: 56px 16px;
  }
}

@media (max-width: 480px) {
  .hero-btns {
    flex-direction: column;
    align-items: center;
  }

  .btn-primary, .btn-secondary {
    width: 100%;
    max-width: 280px;
    justify-content: center;
  }

  .hero-stats {
    gap: 16px;
  }

  .hero-stat strong {
    font-size: 22px;
  }
}
</style>
</head>
<body>

<!-- PROPOSAL BANNER -->
<div id="proposal-banner" style="background:linear-gradient(135deg,#FF4D00,#ff7c47);color:white;text-align:center;padding:12px 20px;font
