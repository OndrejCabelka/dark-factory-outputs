<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zakázkové truhlářství Liberec | Kuchyně, skříně, podlahy na míru</title>
<meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky, vestavěné skříně, dřevěné podlahy, schody, dveře a okna na míru.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #8B5E3C;
  --primary-dark: #6B4226;
  --primary-light: #C4956A;
  --accent: #D4A96A;
  --accent-light: #F0D5A8;
  --dark: #1A110A;
  --dark-2: #2C1A0E;
  --dark-3: #3D2510;
  --text: #2C1A0E;
  --text-light: #6B5547;
  --white: #FFFFFF;
  --bg-light: #FDF8F3;
  --bg-section: #F7F0E6;
  --shadow: 0 4px 24px rgba(139,94,60,0.10);
  --shadow-hover: 0 8px 40px rgba(139,94,60,0.20);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 17, 10, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212, 169, 106, 0.15);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: rgba(255,255,255,0.80);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-phone {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  padding: 10px 18px;
  border-radius: 8px;
  transition: all 0.2s;
  white-space: nowrap;
  border: 1px solid rgba(212,169,106,0.2);
}

.btn-phone:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(139,94,60,0.40);
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
  .logo-name {
    font-size: 18px;
  }
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  background: linear-gradient(145deg, #1A110A 0%, #2C1A0E 35%, #3D2510 60%, #2A1A08 100%);
  overflow: hidden;
  padding: 80px 20px 60px;
}

.hero-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(139,94,60,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(212,169,106,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(107,66,38,0.15) 0%, transparent 50%);
  pointer-events: none;
}

.hero-wood-lines {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background: repeating-linear-gradient(
    168deg,
    transparent,
    transparent 40px,
    rgba(212,169,106,1) 40px,
    rgba(212,169,106,1) 41px
  );
  pointer-events: none;
}

.hero-content {
  position: relative;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212,169,106,0.15);
  border: 1px solid rgba(212,169,106,0.30);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 100px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-content h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  max-width: 750px;
}

.hero-content h1 span {
  color: var(--accent);
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 19px);
  color: rgba(255,255,255,0.72);
  max-width: 540px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 32px;
  border-radius: var(--radius);
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(139,94,60,0.40);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(139,94,60,0.55);
  background: linear-gradient(135deg, #D4A96A, var(--primary-light));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 15px 32px;
  border-radius: var(--radius);
  border: 2px solid rgba(255,255,255,0.25);
  transition: all 0.25s;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  background: rgba(212,169,106,0.08);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  font-weight: 500;
}

.hero-scroll {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(212,169,106,0.5), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ===== SECTION COMMON ===== */
.section {
  padding: 80px 20px;
}

.section-alt {
  background: var(--bg-light);
}

.section-dark {
  background: var(--dark);
  color: var(--white);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 12px;
}

.section-tag::before {
  content: '';
  width: 20px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  line-height: 1.2;
  color: var(--dark);
  margin-bottom: 16px;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 540px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 56px;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--bg-section);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 520px) {
  .services-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 1100px) {
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid rgba(139,94,60,0.07);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(139,94,60,0.15);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--accent-light), rgba(212,169,106,0.25));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 22px;
  transition: transform 0.3s;
}

.service-card:hover .service-icon {
  transform: scale(1.08) rotate(-3deg);
}

.service-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 8px;
}

/* featured card */
.service-card.featured {
  background: linear-gradient(145deg, var(--dark), var(--dark-2));
  border-color: rgba(212,169,106,0.20);
}

.service-card.featured .service-name {
  color: var(--white);
}

.service-card.featured .service-desc {
  color: rgba(255,255,255,0.65);
}

.service-card.featured .service-icon {
  background: linear-gradient(135deg, rgba(212,169,106,0.25), rgba(139,94,60,0.35));
}

.service-card.featured .service-link {
  color: var(--accent);
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
  margin-top: 56px;
}

@media (min-width: 700px) {
  .benefits-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.benefit-card {
  text-align: center;
  padding: 40px 28px;
  border-radius: var(--radius-lg);
  background: var(--bg-light);
  border: 1px solid rgba(139,94,60,0.08);
  transition: all 0.3s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  background: var(--white);
}

.benefit-icon-wrap {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  margin: 0 auto 24px;
  box-shadow: 0 8px 24px rgba(139,94,60,0.25);
  transition: transform 0.3s;
}

.benefit-card:hover .benefit-icon-wrap {
  transform: scale(1.08);
}

.benefit-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.benefit-text {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(145deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(ellipse at 30% 70%, rgba(139,94,60,0.12) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(212,169,106,0.08) 0%, transparent 50%);
  pointer-events: none;
}

#reference .section-tag {
  color: var(--accent);
}

#reference .section-tag::before {
  background: var(--accent);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.60);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  position: relative;
}

@media (min-width: 700px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(212,169,106,0.12);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s;
  backdrop-filter: blur(4px);
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(212,169,106,0.25);
  transform: translateY(-4px);
}

.review-stars {
  color: var(--accent);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 18px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: var(--primary-light);
  line-height: 0;
  vertical-align: -16px;
  margin-right: 4px;
  opacity: 0.6;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-avatar.a1 { background: linear-gradient(135deg, #8B5E3C, #6B4226); }
.review-avatar.a2 { background: linear-gradient(135deg, #5C7A3E, #3D5C29); }
.review-avatar.a3 { background: linear-gradient(135deg, #3E5C7A, #29435C); }

.review-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--bg-section);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr
