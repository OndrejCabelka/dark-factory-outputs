<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Liberec | Kuchyňské linky, vestavěné skříně, podlahy</title>
  <meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Tel: 737 915 619">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E00;
      --accent: #D4A853;
      --accent-light: #F0C060;
      --dark: #1A0F08;
      --dark-2: #2C1A0E;
      --dark-3: #3D2414;
      --text: #1A0F08;
      --text-muted: #6B5A4E;
      --text-light: #9C8476;
      --bg: #FDFAF7;
      --bg-2: #F5EFE8;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139,69,19,0.12);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-call {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-call:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .btn-call .phone-icon {
      font-size: 16px;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
      .logo-name {
        font-size: 18px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1A0F08 0%, #2C1A0E 40%, #3D2414 70%, #5C2E00 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 100px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(139,69,19,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 30%, rgba(212,168,83,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      font-size: 300px;
      opacity: 0.04;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.2);
      border: 1px solid rgba(212,168,83,0.4);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-h1 {
      font-size: clamp(28px, 6vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    .hero-h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.7);
      max-width: 560px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,69,19,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      text-decoration: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.25);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .hero-stat {
      text-align: center;
      padding: 0 20px;
    }

    .hero-stat-number {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    /* ===== SECTIONS ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary);
      margin-bottom: 14px;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      display: block;
      width: 24px;
      height: 2px;
      background: var(--primary);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 520px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .service-card:nth-child(1),
      .service-card:nth-child(2) {
        grid-column: span 1;
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.08);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.15);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
      line-height: 1;
    }

    .service-name {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-desc {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-tag {
      display: inline-block;
      margin-top: 16px;
      background: var(--bg-2);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--bg-2);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(139,69,19,0.3);
    }

    .benefit-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .benefit-desc {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '"';
      position: absolute;
      font-size: 400px;
      color: rgba(255,255,255,0.02);
      top: -60px;
      left: -20px;
      font-family: Georgia, serif;
      line-height: 1;
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      color: var(--accent);
    }

    #reference .section-label::before,
    #reference .section-label::after {
      background: var(--accent);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 30px 26px;
      transition: background 0.25s, transform 0.25s;
    }

    .review-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .contact-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-card-body {}

    .contact-card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-card-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .contact-card-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-card-value a:hover {
      color: var(--primary-light);
    }

    .contact-card-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border-radius: var(--radius-lg);
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px dashed rgba(139,69,19,0.3);
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(139,69,19,0.15) 0%, transparent 70%);
    }
