<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklenářství Pudil – Profesionální sklenář Praha</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #0ea5e9;
  --primary-dark: #0284c7;
  --primary-light: #bae6fd;
  --accent: #38bdf8;
  --dark: #0f172a;
  --dark2: #1e293b;
  --dark3: #334155;
  --text: #1e293b;
  --text-light: #64748b;
  --white: #ffffff;
  --gray-light: #f1f5f9;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(14,165,233,0.10);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(15, 23, 42, 0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(14,165,233,0.15);
  padding: 0 20px;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(14,165,233,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(14,165,233,0.5);
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
}

.nav-links a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0f172a 0%, #0c2340 40%, #0a3a5c 70%, #0f2744 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 88vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(14,165,233,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(56,189,248,0.10) 0%, transparent 55%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(14,165,233,0.4), transparent);
}

/* Glass panel decoration */
.hero-glass-deco {
  position: absolute;
  top: 60px;
  right: -40px;
  width: 320px;
  height: 380px;
  background: linear-gradient(135deg, rgba(14,165,233,0.08), rgba(56,189,248,0.04));
  border: 1px solid rgba(14,165,233,0.15);
  border-radius: 20px;
  transform: rotate(15deg);
  pointer-events: none;
}

.hero-glass-deco2 {
  position: absolute;
  bottom: 40px;
  left: -60px;
  width: 240px;
  height: 280px;
  background: linear-gradient(135deg, rgba(56,189,248,0.06), rgba(14,165,233,0.03));
  border: 1px solid rgba(56,189,248,0.12);
  border-radius: 20px;
  transform: rotate(-12deg);
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(14,165,233,0.15);
  border: 1px solid rgba(14,165,233,0.3);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.12;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
  max-width: 720px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: #94a3b8;
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 4px 20px rgba(14,165,233,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(14,165,233,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.07);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  transition: background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.13);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat {
  text-align: left;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1;
}

.stat-num span {
  color: var(--accent);
}

.stat-label {
  font-size: 13px;
  color: #64748b;
  margin-top: 4px;
  font-weight: 500;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  margin-bottom: 16px;
  line-height: 1.15;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.65;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--gray-light);
}

.sluzby-header {
  text-align: center;
  margin-bottom: 56px;
}

.sluzby-header .section-desc {
  margin: 0 auto;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 560px) {
  .sluzby-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .sluzby-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  cursor: default;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 40px rgba(14,165,233,0.15);
  border-color: var(--primary-light);
}

.card-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(14,165,233,0.12), rgba(56,189,248,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(14,165,233,0.15);
}

.card-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.card-text {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.proc-layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  align-items: center;
}

@media (min-width: 900px) {
  .proc-layout {
    grid-template-columns: 1fr 1fr;
    gap: 80px;
  }
}

.proc-visual {
  background: linear-gradient(135deg, var(--dark) 0%, #0c2340 100%);
  border-radius: 20px;
  padding: 48px 40px;
  position: relative;
  overflow: hidden;
  order: -1;
}

@media (min-width: 900px) {
  .proc-visual {
    order: 0;
  }
}

.proc-visual::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(14,165,233,0.2) 0%, transparent 70%);
}

.proc-visual-icon {
  font-size: 72px;
  margin-bottom: 24px;
  display: block;
  position: relative;
  z-index: 1;
}

.proc-visual-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.proc-visual-sub {
  color: #64748b;
  font-size: 15px;
  line-height: 1.6;
  position: relative;
  z-index: 1;
}

.proc-badge-row {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.proc-badge {
  background: rgba(14,165,233,0.15);
  border: 1px solid rgba(14,165,233,0.25);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 100px;
}

.benefity-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.benefit-num {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-weight: 800;
  font-size: 17px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(14,165,233,0.35);
}

.benefit-content h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 6px;
}

.benefit-content p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--gray-light);
}

.ref-header {
  text-align: center;
  margin-bottom: 56px;
}

.ref-header .section-desc {
  margin: 0 auto;
}

.ref-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 700px) {
  .ref-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.ref-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.ref-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(14,165,233,0.12);
}

.stars {
  color: #f59e0b;
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.ref-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.ref-text::before {
  content: '"';
  font-size: 48px;
  color: var(--primary-light);
  line-height: 0;
  vertical-align: -18px;
  margin-right: 4px;
  font-style: normal;
}

.ref-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ref-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.ref-avatar.a1 { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
.ref-avatar.a2 { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
.ref-avatar.a3 { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }

.ref-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--dark);
}

.ref-loc {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#kontakt::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 65%);
  pointer-events: none;
}

.kontakt-header {
  text-align: center;
  margin-bottom: 56px;
}

.kontakt-header .section-title {
  color: var(--white);
}

.kontakt-header .section-desc {
  margin: 0 auto;
  color: #64748b;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 700px) {
  .kontakt-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.kontakt-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

.kontakt-card:hover {
  background: rgba(14,165,233,0.08);
  border-color: rgba(14,165,233,0.2);
  transform: translateY(-4px);
}

.kontakt-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(14,165,233,0.2), rgba(56,189,248,0.1));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin: 0 auto 20px;
  border: 1px solid rgba(14,165,233,0.2);
}

.kontakt-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.kontakt-card-val {
  font-size: 17px;
  font-weight: 600;
  color: var(--white);
}

.kontakt-card-val a {
  color: var(--white);
