<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální instalatér, topenář a plynař v Brně. Oprava vodovodního potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Zavolejte +420732643255.">
<title>Instalatér Brno | Topenář Brno | Plynař Brno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fc4;
  --primary-dark: #0f4f8f;
  --primary-light: #3a8fd4;
  --accent: #f0a500;
  --dark: #0d1b2a;
  --dark-mid: #1a2e42;
  --text: #2c3e50;
  --text-light: #5a6a7a;
  --bg-light: #f4f8fc;
  --white: #ffffff;
  --card-bg: #ffffff;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(26,111,196,0.10);
  --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--white);
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  position: sticky;
  top: 0;
  z-index: 999;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-main {
  font-size: 15px;
  font-weight: 800;
  color: var(--dark);
  line-height: 1.1;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(26,111,196,0.35);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,111,196,0.45);
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f3460 40%, #1a6fc4 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(26,111,196,0.25) 0%, transparent 70%);
  border-radius: 50%;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -100px;
  left: -60px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(240,165,0,0.15);
  border: 1px solid rgba(240,165,0,0.4);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 2;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

#hero h1 span {
  color: var(--accent);
}

.hero-sub {
  font-size: clamp(15px, 2.5vw, 19px);
  color: rgba(255,255,255,0.82);
  margin-bottom: 36px;
  font-weight: 400;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.65;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #e09400);
  color: #0d1b2a;
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 15px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(240,165,0,0.4);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(240,165,0,0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1.5px solid rgba(255,255,255,0.3);
  transition: transform 0.2s, background 0.2s;
}

.btn-secondary:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.18);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 56px;
  flex-wrap: wrap;
  position: relative;
  z-index: 2;
}

.stat-item {
  text-align: center;
}

.stat-number {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-eyebrow {
  display: inline-block;
  background: rgba(26,111,196,0.10);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

.section-header p {
  font-size: 16px;
  color: var(--text-light);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.65;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 90px 20px;
  background: var(--bg-light);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(26,111,196,0.07);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-card.emergency {
  background: linear-gradient(135deg, var(--dark), var(--dark-mid));
  border-color: transparent;
}

.service-card.emergency .service-icon {
  background: rgba(240,165,0,0.15);
}

.service-card.emergency h3 {
  color: var(--white);
}

.service-card.emergency p {
  color: rgba(255,255,255,0.65);
}

.service-card.emergency::before {
  background: linear-gradient(90deg, var(--accent), #ffcc44);
  opacity: 1;
}

.emergency-badge {
  display: inline-block;
  background: var(--accent);
  color: var(--dark);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 50px;
  margin-top: 12px;
  letter-spacing: 0.5px;
}

/* ===== WHY US ===== */
#proc-my {
  padding: 90px 20px;
  background: var(--white);
}

.benefits-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--bg-light);
  border-radius: var(--radius);
  padding: 38px 30px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
  border: 1px solid rgba(26,111,196,0.07);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.benefit-number {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 2px;
  text-transform: uppercase;
  background: rgba(26,111,196,0.1);
  padding: 4px 12px;
  border-radius: 50px;
}

.benefit-icon {
  font-size: 36px;
  line-height: 1;
}

.benefit-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.25;
}

.benefit-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ===== REVIEWS ===== */
#reference {
  padding: 90px 20px;
  background: linear-gradient(135deg, #0d1b2a, #0f3460);
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-eyebrow {
  background: rgba(240,165,0,0.15);
  color: var(--accent);
}

#reference .section-header p {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: transform 0.25s, background 0.25s;
}

.review-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.09);
}

.review-stars {
  color: var(--accent);
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-size: 16px;
  flex-shrink: 0;
}

.author-info strong {
  display: block;
  color: var(--white);
  font-size: 14px;
  font-weight: 700;
}

.author-info span {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

/* ===== CONTACT ===== */
#kontakt {
  padding: 90px 20px;
  background: var(--bg-light);
}

.contact-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.contact-item {
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px 26px;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(26,111,196,0.07);
  transition: transform 0.2s;
}

.contact-item:hover {
  transform: translateX(4px);
}

.contact-item-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.contact-item a {
  color: var(--dark);
  text-decoration: none;
  font-size: 17px;
  font-weight: 700;
  transition: color 0.2s;
  display: block;
}

.contact-item a:hover {
  color: var(--primary);
}

.contact-item p {
  font-size: 14px;
  color: var(--text-light);
  margin-top: 2px;
}

.contact-item address {
  font-style: normal;
  font-size: 15px;
  font-weight: 600;
  color: var(--dark);
}

.map-placeholder {
  background: linear-gradient(135deg, #e8f0fa, #d0e4f7);
  border-radius: var(--radius);
  height: 100%;
  min-height: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border: 2px dashed rgba(26,111,196,0.2);
  color: var(--primary);
  text-align: center;
  padding: 30px;
}

.map-icon {
  font-size: 52px;
}

.map-placeholder h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
}

.map-placeholder p {
  font-size: 13px;
  color: var(--text-light);
  max-width: 220px;
}

.map-badge {
  background: var(--primary);
  color: white;
  font-size: 12px;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 50px;
  letter-spacing: 0.5px;
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  padding: 40px 20px;
  color: rgba(255,255,255,0.55);
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.footer-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.footer-logo-text {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,0.75);
}

.footer-info {
  text-align: center;
  font-size: 12px;
  line-height: 1.8;
}

.footer-info a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-info a:hover {
  color: var(--primary-light);
}

.footer-right {
