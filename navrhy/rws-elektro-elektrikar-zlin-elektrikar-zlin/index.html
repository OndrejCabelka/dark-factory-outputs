<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RWS Elektro – profesionální elektrikář ve Zlíně a okolí. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte +420 777 021 467">
  <title>RWS Elektro – Elektrikář Zlín | +420 777 021 467</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C518;
      --primary-dark: #d4a800;
      --primary-light: #ffe566;
      --dark: #0d0f14;
      --dark2: #141820;
      --dark3: #1e2433;
      --dark4: #252c3d;
      --text-light: #f0f4ff;
      --text-muted: #9aa3b8;
      --white: #ffffff;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.18);
      --shadow-lg: 0 8px 48px rgba(0,0,0,0.28);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13, 15, 20, 0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(245, 197, 24, 0.15);
      padding: 0 20px;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(245, 197, 24, 0.35);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 28px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 16px rgba(245, 197, 24, 0.3);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(245, 197, 24, 0.45);
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-name {
        font-size: 15px;
      }
      .btn-call-nav {
        font-size: 13px;
        padding: 9px 16px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
      overflow: hidden;
      background: linear-gradient(160deg, #0d0f14 0%, #141820 40%, #1a1400 70%, #0d0f14 100%);
    }

    .hero-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(ellipse at center, rgba(245,197,24,0.10) 0%, rgba(245,197,24,0.03) 40%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-lightning {
      position: absolute;
      font-size: 200px;
      opacity: 0.03;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 860px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245, 197, 24, 0.12);
      border: 1px solid rgba(245, 197, 24, 0.3);
      color: var(--primary);
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 28px;
    }

    .hero-badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 68px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--white);
      margin-bottom: 22px;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 32px rgba(245, 197, 24, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(245, 197, 24, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.07);
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      display: block;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ===== SECTION COMMONS ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--white);
      line-height: 1.15;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 16px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--dark3);
      border: 1px solid rgba(245, 197, 24, 0.08);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 48px rgba(0,0,0,0.35);
      border-color: rgba(245, 197, 24, 0.22);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: rgba(245, 197, 24, 0.12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: rgba(245, 197, 24, 0.2);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .service-card-tag {
      display: inline-block;
      margin-top: 16px;
      background: rgba(245, 197, 24, 0.1);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 4px 12px;
      border-radius: 50px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, border-color 0.25s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      border-color: rgba(245, 197, 24, 0.2);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(245,197,24,0.18), rgba(245,197,24,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 7px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.25s, border-color 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      border-color: rgba(245, 197, 24, 0.18);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      opacity: 0.25;
      line-height: 1;
      font-family: Georgia, serif;
      position: absolute;
      top: 16px;
      right: 22px;
    }

    .review-stars {
      font-size: 16px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.72;
      margin-bottom: 22px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: var(--dark);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .review-loc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--dark);
    }

    .kontakt-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-wrapper {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }

    .kontakt-info h3 {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 28px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
    }

    .kontakt-icon {
      width: 48px;
      height: 48px;
      background: rgba(245, 197, 24, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
    }

    .kontakt-item-text {
      padding-top: 2px;
    }

    .kontakt-item-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 16px;
      color: var(--white);
      font-weight: 600;
    }

    .kontakt-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary-light);
    }

    .map-placeholder {
      background: var(--dark3);
      border: 1px solid rgba(245, 197, 24, 0.1);
      border-radius: var(--radius);
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 15px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-pin {
      font-size: 48px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      position: relative;
      z-index: 1;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .cta-strip {
      margin-top: 48px;
      background
