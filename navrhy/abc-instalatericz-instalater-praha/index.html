<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0066cc;
      --primary-dark: #0052a3;
      --primary-light: #3d8fe0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark-secondary: #1a2e42;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --light-bg: #f0f6ff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0,102,204,0.10);
      --shadow-hover: 0 8px 40px rgba(0,102,204,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;

    .nav-links a:hover {

      background: rgba(255,255,255,0.06);
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-phone {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(0,102,204,0.35);
    }

    .btn-phone:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,102,204,0.45);
    }

    .phone-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-dot 1.8s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
    }

    #hero {

      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,102,204,0.18) 0%, transparent 70%);
      border-radius: 50%;

    #hero::after {

      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(240,165,0,0.06) 0%, transparent 70%);
      border-radius: 50%;

      z-index: 2;
      width: 100%;

    .hero-badge {

      gap: 8px;
      background: rgba(0,102,204,0.2);
      border: 1px solid rgba(0,102,204,0.4);
      color: #7dd3fc;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 22px;
      letter-spacing: 0.3px;

    .hero-content h1 {

      font-weight: 800;

      line-height: 1.2;
      margin-bottom: 20px;

    .hero-content h1 span {
      color: var(--accent);

    .hero-subtitle {

      line-height: 1.7;
      font-weight: 400;
    }

    .hero-btns {

      gap: 14px;

    }

    .btn-primary {

      text-decoration: none;
      padding: 15px 28px;

      font-size: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 6px 24px rgba(0,102,204,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);

    }

    .btn-secondary {

    .btn-secondary:hover {

      border-color: rgba(255,255,255,0.4);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 28px;
      margin-top: 44px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: #64748b;
      margin-top: 3px;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .hero-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 20px 24px;
      backdrop-filter: blur(12px);
      transition: transform 0.3s;
    }

    .hero-card:hover {
      transform: translateX(6px);
    }

    .hero-card-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-card-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .icon-blue { background: rgba(0,102,204,0.25); }
    .icon-green { background: rgba(34,197,94,0.18); }
    .icon-orange { background: rgba(240,165,0,0.18); }
    .icon-red { background: rgba(239,68,68,0.18); }
    .icon-purple { background: rgba(139,92,246,0.18); }

    .hero-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .hero-card-desc {
      font-size: 13px;
      color: #64748b;
      margin-top: 2px;
    }

    .hero-badge-emergency {
      position: absolute;
      top: -12px;
      right: -12px;
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: white;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(220,38,38,0.45);
      animation: pulse-emergency 2s infinite;
    }

    @keyframes pulse-emergency {
      0%, 100% { box-shadow: 0 4px 14px rgba(220,38,38,0.45); }
      50% { box-shadow: 0 4px 24px rgba(220,38,38,0.7); }
    }

    /* ===== SECTION BASE ===== */
    section {
      padding: 90px 20px;
    }

    .section-label {
      display: inline-block;
      background: var(--light-bg);
      color: var(--primary);
      padding: 5px 16px;

      text-transform: uppercase;

    .section-title {
      font-size: clamp(1.7rem, 3vw, 2.6rem);

      color: var(--text);
      line-height: 1.25;
      letter-spacing: -0.3px;
      margin-bottom: 14px;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-light);

    .section-header {

    .container {

    .service-card::before {

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(0,102,204,0.15);

    .service-icon-wrap {
      width: 64px;

    }

    .service-card:hover .service-icon-wrap {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scale(1.1);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-badge {
      display: inline-block;
      background: rgba(220,38,38,0.1);
      color: #dc2626;
      padding: 3px 10px;
      border-radius: 50px;

      font-weight: 700;
      margin-top: 14px;

    .service-badge-blue {
      background: rgba(0,102,204,0.1);

    /* ===== WHY US ===== */
    #proc-my {

    .why-grid {

    .why-card {

    .why-card:hover {

      font-size: 36px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 20px rgba(0,102,204,0.3);

    }

    .why-card:hover .why-icon-bg {

    .why-card h3 {
      font-size: 21px;

      margin-bottom: 12px;

    .why-card p {

    .why-number {

      font-size: 52px;

      color: rgba(0,102,204,0.06);
      line-height: 1;
      pointer-events: none;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--dark);

      overflow: hidden;

    #reference::before {
      content: '';

    #reference .section-title {

    #reference .section-label {

    .review-card {

    .review-card:hover {

    .review-stars {

    .star {

    .review-text {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.75;

    .review-text::before {

    .review-author {
      display: flex;

    }

      width: 46px;
      height: 46px;
