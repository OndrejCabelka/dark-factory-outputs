  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E87C28;
      --primary-dark: #C4621A;
      --primary-light: #F5A05A;
      --dark: #1A1A1A;
      --dark-2: #2D2D2D;
      --dark-3: #3D3D3D;
      --text-light: #F5F5F5;
      --text-muted: #A0A0A0;
      --white: #FFFFFF;
      --gray-bg: #F7F4F0;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.10);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {

    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: var(--dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER / NAVBAR ===================== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;

    }

    .logo {

      align-items: center;

    }

    .logo-icon {
      width: 42px;
      height: 42px;

      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {

      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;

    .nav-links a {

      font-size: 14px;

    .nav-links a:hover {

      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-cta:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    /* ===================== HERO ===================== */
    #hero {

        linear-gradient(135deg, rgba(26,26,26,0.92) 0%, rgba(45,30,15,0.88) 50%, rgba(60,35,10,0.85) 100%),
        repeating-linear-gradient(
          45deg,
          transparent,

          rgba(232,124,40,0.04) 40px,
          rgba(232,124,40,0.04) 80px

      display: flex;

      justify-content: center;
      text-align: center;
      padding: 80px 20px 100px;

      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,124,40,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,124,40,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,124,40,0.2);

      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;

      color: var(--white);
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
    }

    .hero-content h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #CCCCCC;
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,124,40,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,124,40,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: #999;
      margin-top: 4px;
      font-weight: 500;
    }

    .hero-divider {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===================== SECTIONS COMMON ===================== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,124,40,0.12);
      color: var(--primary);

      border-radius: 50px;

      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .section-header h2 {

    .section-header p {
      font-size: 17px;
      color: #666;

    }

    section {
      padding: 96px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===================== SLUZBY ===================== */
    #sluzby {
      background: var(--gray-bg);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--card-shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.14);
    }

    .sluzba-ikona {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,124,40,0.15), rgba(232,124,40,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-karta p {
      font-size: 15px;
      color: #666;
      line-height: 1.65;
    }

    /* ===================== PROC MY ===================== */
    #proc-my {
      background: var(--dark);
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: #999;
    }

    #proc-my .section-tag {
      background: rgba(232,124,40,0.25);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-karta {
      background: var(--dark-2);
      border-radius: var(--radius);
      padding: 36px 32px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.25s, border-color 0.25s;
      position: relative;
    }

    .benefit-karta:hover {
      transform: translateY(-4px);
      border-color: rgba(232,124,40,0.3);
    }

    .benefit-num {
      font-size: 48px;

    .benefit-karta p {

    }

    .benefit-highlight {
      display: inline-flex;

      gap: 6px;

      color: var(--primary-light);

      font-size: 12px;
      font-weight: 600;

    /* ===================== REFERENCE ===================== */
    #reference {
      background: var(--white);
    }

    .reference-grid {
      display: grid;

      gap: 24px;
    }

    .recenze-karta {
      background: var(--gray-bg);
      border-radius: var(--radius);

    .recenze-jmeno {

    .recenze-lokace {

    .kontakt-item-text strong {

    .mapa-placeholder {
      background: linear-gradient(135deg, #2D2D2D, #1A1A1A);

      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;

      position: relative;
      overflow: hidden;

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(232,124,40,0.04) 30px, rgba(232,124,40,0.04) 31px),
        repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(232,124,40,0.04) 30px, rgba(232,124,40,0.04) 31px);
    }

    .mapa-icon {
      font-size: 52px;
      position: relative;

    }

    .mapa-text {
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
      position: relative;
      z-index: 1;

    .mapa-sub {
