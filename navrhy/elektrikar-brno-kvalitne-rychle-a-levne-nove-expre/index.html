<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrikář Brno | Profesionální elektroinstalace, revize a fotovoltaika</title>
<meta name="description" content="Profesionální elektrikář v Brně a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420776205549">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #d4a800;
  --primary-light: #fff3b0;
  --dark: #0f0f1a;
  --dark2: #1a1a2e;
  --dark3: #16213e;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --white: #ffffff;
  --card-bg: #ffffff;
  --section-bg: #f8f9fa;
  --border: #e5e7eb;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 2px solid var(--primary);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 8px;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
  background: rgba(245,197,24,0.08);
}

.btn-nav-call {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  padding: 10px 18px;
  border-radius: 8px;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(245,197,24,0.25);
}

.btn-nav-call:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(245,197,24,0.40);
}

.btn-nav-call .icon {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 70%, #0d1b3e 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: calc(100vh - 68px - 46px);
  display: flex;
  align-items: center;
}

.hero-bg-decor {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-bg-decor::before {
  content: '⚡';
  position: absolute;
  font-size: 420px;
  top: -60px;
  right: -60px;
  opacity: 0.04;
  line-height: 1;
  filter: blur(2px);
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  border-radius: 50%;
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
  bottom: -80px;
  left: 10%;
  border-radius: 50%;
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,197,24,0.12);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 22px;
  letter-spacing: -1.5px;
}

#hero h1 span {
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.75);
  max-width: 580px;
  margin-bottom: 40px;
  line-height: 1.55;
  font-weight: 400;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 800;
  font-size: 17px;
  padding: 15px 30px;
  border-radius: 10px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(245,197,24,0.35);
  letter-spacing: -0.2px;
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(245,197,24,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 17px;
  padding: 15px 30px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.25);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(245,197,24,0.07);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 36px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-num {
  font-size: 34px;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -1px;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 4px;
}

.hero-express-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, #ff4500, #ff6b35);
  color: white;
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 20px;
  animation: pulse-badge 2s infinite;
  letter-spacing: 0.2px;
}

@keyframes pulse-badge {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,69,0,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(255,69,0,0); }
}

/* ===== SECTION WRAPPER ===== */
.section-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 90px 0;
  background: var(--section-bg);
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: var(--primary);
  border-radius: 4px 0 0 4px;
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: var(--primary);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 62px;
  height: 62px;
  background: linear-gradient(135deg, var(--primary-light), #ffe066);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 22px;
  box-shadow: 0 4px 16px rgba(245,197,24,0.2);
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.08) rotate(-3deg);
}

.service-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.service-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.6;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary-dark);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ===== WHY US ===== */
#proc-my {
  padding: 90px 0;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-tag {
  background: rgba(245,197,24,0.15);
  color: var(--primary);
}

#proc-my .section-header p {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  text-align: center;
  transition: background 0.25s, border-color 0.25s, transform 0.25s;
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
  transition: width 0.3s;
}

.benefit-card:hover {
  background: rgba(245,197,24,0.05);
  border-color: rgba(245,197,24,0.25);
  transform: translateY(-5px);
}

.benefit-card:hover::after {
  width: 60%;
}

.benefit-icon {
  font-size: 48px;
  margin-bottom: 20px;
  display: block;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
}

/* ===== REVIEWS ===== */
#reference {
  padding: 90px 0;
  background: var(--section-bg);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}

.review-quote {
  font-size: 52px;
  line-height: 1;
  color: var(--primary);
  font-family: Georgia, serif;
  margin-bottom: 12px;
  display: block;
  opacity: 0.5;
}

.stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.star {
  color: var(--primary);
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--dark);
}

.review-location {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ===== CONTACT ===== */
#kontakt {
  padding: 90px 0;
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 36px;
}

.contact-info-block {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  background: var(--section-bg);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  border-color: var(--primary);
  box-shadow: 0 4px 20px rgba(245,197,24,0.10);
}

.contact-item-icon {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary-light), #ffe066);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.contact-item-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}

.contact-item-value {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
}

.contact-item-value a {
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
}

.contact-item-value a:hover {
  color: var(--primary-dark);
}

.map-placeholder {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: var(--radius-lg);
  min-height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border: 2px
