<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlář Chomutov | Kuchyňské linky, Vestavěné skříně, Schody</title>
  <meta name="description" content="Profesionální truhlář v Chomutově a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Zavolejte +420 474 331 196.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-dark: #6B3410;
      --primary-light: #A0522D;
      --accent: #D2691E;
      --accent-light: #F4A460;
      --warm: #FFF8F0;
      --dark: #1A0F0A;
      --dark2: #2C1A10;
      --dark3: #3D2415;
      --text: #2C1A10;
      --text-light: #6B4C3B;
      --text-muted: #9A7B6A;
      --white: #FFFFFF;
      --card-bg: #FFFFFF;
      --border: #E8D5C4;
      --shadow: 0 4px 24px rgba(139,69,19,0.12);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 1px solid var(--dark3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,69,19,0.4);
    }

    nav {
      display: none;
    }

    @media (min-width: 768px) {
      nav {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      nav a {
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
        transition: all 0.2s;
      }

      nav a:hover {
        color: var(--white);
        background: rgba(255,255,255,0.08);
      }
    }

    /* HERO */
    #hero {
      background: linear-gradient(160deg, #1A0F0A 0%, #2C1A10 40%, #3D2415 70%, #4A2D18 100%);
      position: relative;
      padding: 80px 20px 90px;
      overflow: hidden;
      min-height: 85vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(210,105,30,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(160,82,45,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 280px;
      opacity: 0.04;
      pointer-events: none;
      filter: blur(2px);
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {

      align-items: center;
      gap: 6px;
      background: rgba(139,69,19,0.3);
      border: 1px solid rgba(210,105,30,0.4);
      color: var(--accent-light);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .hero h1 {

      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 750px;
    }

    .hero h1 span {
      color: var(--accent-light);
    }

    .hero-perex {
      font-size: clamp(15px, 2vw, 18px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(139,69,19,0.5);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,69,19,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* SECTION COMMON */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-subtitle {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* SLUZBY */
    #sluzby {
      background: var(--warm);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 480px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .services-grid .service-card:nth-child(4) {
        grid-column: 1;
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.35s ease;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(139,69,19,0.1), rgba(210,105,30,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 18px;
      transition: transform 0.3s ease;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(3deg);
    }

    .service-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 8px;
    }

    /* PROC MY */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;

    @media (min-width: 768px) {

        grid-template-columns: repeat(3, 1fr);

    .benefit-card {
      text-align: center;
      padding: 40px 28px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--white);
      transition: all 0.35s ease;
      position: relative;
    }

    .benefit-card:hover {
      border-color: rgba(139,69,19,0.3);
      box-shadow: var(--shadow);
      transform: translateY(-4px);
    }

    .benefit-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 52px;
      font-weight: 900;
      color: rgba(139,69,19,0.06);
      line-height: 1;
      pointer-events: none;
    }

    .benefit-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(139,69,19,0.3);
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .benefit-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* REFERENCE */
    #reference {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(139,69,19,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(210,105,30,0.2);
      color: var(--accent-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-subtitle {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: all 0.35s ease;
      backdrop-filter: blur(8px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(210,105,30,0.3);
      transform: translateY(-4px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: #F4A460;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 48px;
      color: rgba(210,105,30,0.3);
      line-height: 0;
      vertical-align: -20px;
      margin-right: 4px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
    }

    .author-info span {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* KONTAKT */
    #kontakt {
      background: var(--warm);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 1000px) {
      .kontakt-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .kontakt-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .kontakt-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(139,69,19,0.12), rgba(210,105,30,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .kontakt-card h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .kontakt-card p, .kontakt-card a {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
      text-decoration: none;
    }

    .kontakt-card a {
      color: var(--primary);
      font-weight: 600;
      transition: color 0.2s;
    }

    .kontakt-card a:hover {
      color: var(--accent);
    }
