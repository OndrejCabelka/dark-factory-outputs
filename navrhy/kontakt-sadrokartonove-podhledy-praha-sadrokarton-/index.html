<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sádrokartonové podhledy Praha | Profesionální montáž</title>
<meta name="description" content="Profesionální sádrokartonové podhledy v Praze a okolí. Rychlý servis, garantovaná kvalita, přijatelné ceny. Volejte 608 686 989.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-light: #3b82f6;
  --accent: #f59e0b;
  --dark: #0f172a;
  --dark-2: #1e293b;
  --dark-3: #334155;
  --gray: #64748b;
  --gray-light: #e2e8f0;
  --white: #ffffff;
  --text: #1e293b;
  --text-light: #475569;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(37,99,235,0.18);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: #f8fafc;
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img { max-width: 100%; }

/* ───── BANNER ───── */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ───── HEADER ───── */
header {
  background: rgba(15,23,42,0.97);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  color: var(--white);
  font-weight: 700;
  font-size: 15px;
  line-height: 1.2;
}

.logo-sub {
  color: var(--gray);
  font-size: 11px;
  font-weight: 400;
}

.header-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(37,99,235,0.35);
}

.header-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(37,99,235,0.45);
}

/* ───── HERO ───── */
#hero {
  background:
    linear-gradient(135deg, rgba(15,23,42,0.92) 0%, rgba(30,58,138,0.88) 60%, rgba(15,23,42,0.95) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 80px
    );
  background-color: var(--dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
  top: -150px;
  right: -150px;
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,158,11,0.10) 0%, transparent 70%);
  bottom: -100px;
  left: -100px;
  pointer-events: none;
}

.hero-inner {
  max-width: 820px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(37,99,235,0.18);
  border: 1px solid rgba(59,130,246,0.35);
  color: #93c5fd;
  padding: 7px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge span { font-size: 16px; }

#hero h1 {
  color: var(--white);
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 22px;
  letter-spacing: -1px;
}

#hero h1 .highlight {
  background: linear-gradient(90deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  color: #94a3b8;
  font-size: clamp(16px, 2.5vw, 20px);
  max-width: 600px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.65;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(37,99,235,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.2);
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.13);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 60px;
  padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.stat {
  text-align: center;
}

.stat-number {
  color: var(--white);
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-number span {
  color: var(--accent);
}

.stat-label {
  color: #64748b;
  font-size: 13px;
  font-weight: 500;
}

/* ───── SECTION COMMON ───── */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: rgba(37,99,235,0.10);
  color: var(--primary);
  border: 1px solid rgba(37,99,235,0.2);
  padding: 5px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.15;
  letter-spacing: -0.5px;
}

.section-header p {
  color: var(--text-light);
  font-size: 17px;
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.65;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

section:not(#hero) {
  padding: 88px 0;
}

/* ───── SERVICES ───── */
#sluzby {
  background: var(--white);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
}

.service-card {
  background: #f8fafc;
  border: 1.5px solid var(--gray-light);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(37,99,235,0.25);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(37,99,235,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.1) rotate(-4deg);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-card p {
  color: var(--text-light);
  font-size: 14.5px;
  line-height: 1.65;
}

/* ───── PROC MY ───── */
#proc-my {
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 60px,
    rgba(255,255,255,0.012) 60px,
    rgba(255,255,255,0.012) 120px
  );
}

#proc-my .section-header h2 {
  color: var(--white);
}

#proc-my .section-header p {
  color: #94a3b8;
}

#proc-my .section-tag {
  background: rgba(245,158,11,0.18);
  color: #fbbf24;
  border-color: rgba(245,158,11,0.3);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  backdrop-filter: blur(8px);
  transition: transform 0.25s, background 0.25s, border-color 0.25s;
}

.benefit-card:hover {
  transform: translateY(-6px);
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.2);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 22px;
  box-shadow: 0 4px 20px rgba(37,99,235,0.35);
}

.benefit-card h3 {
  color: var(--white);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
}

.benefit-card p {
  color: #94a3b8;
  font-size: 15px;
  line-height: 1.65;
}

/* ───── REFERENCE ───── */
#reference {
  background: #f1f5f9;
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--gray-light);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 80px;
  color: rgba(37,99,235,0.08);
  font-family: Georgia, serif;
  line-height: 1;
  font-weight: 700;
}

.review-stars {
  color: var(--accent);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 16px;
}

.review-text {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 13px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.reviewer-name {
  font-weight: 700;
  color: var(--text);
  font-size: 15px;
}

.reviewer-info {
  color: var(--gray);
  font-size: 12.5px;
  margin-top: 1px;
}

/* ───── KONTAKT ───── */
#kontakt {
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
}

.kontakt-info > p {
  color: var(--text-light);
  margin-bottom: 36px;
  font-size: 16px;
  line-height: 1.65;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  padding: 20px;
  background: #f8fafc;
  border-radius: 10px;
  border: 1.5px solid var(--gray-light);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  border-color: rgba(37,99,235,0.3);
  box-shadow: 0 4px 16px rgba(37,99,235,0.08);
}

.contact-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(37,99,235,0.06));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-label {
  font-size: 12px;
  color: var(--gray);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.contact-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.contact-value a {
  color: var(--primary);
  transition: color 0.2s;
}

.contact-value a:hover {
  color: var(--primary-dark);
}

.map-placeholder {
  background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
  border-radius: var(--radius);
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  border: 2px dashed #94a3b8;
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(148,163,184,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.15) 1px, transparent 1px);
  background-size: 30px 30px;
}

.map-icon {
  font-size: 52px;
  position: relative;
  z-index: 1;
}

.map-text {
  font-size: 16px;
  font-weight: 600;
  color: #475569;
  position: relative;
  z-index: 1;
}

.map-sub {
  font-size: 13px;
  color: #64748b;
  position: relative;
  z-index: 1;
}

/* ───── FOOTER ───── */
footer {
  background: var(--dark);
  padding: 40px 20px;
  text-align: center;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.footer-logo-icon {
