<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Jiří Kirchhof – Liberec | Kuchyňské linky, vestavěné skříně, podlahy</title>
  <meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna. Volejte +420 604 124 414.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2D0A;
      --accent: #D4A054;
      --accent-light: #E8C07A;
      --dark: #1A0F07;
      --dark-mid: #2C1A0E;
      --dark-card: #241509;
      --text-light: #F5ECD7;
      --text-muted: #C4A882;
      --white: #FFFFFF;
      --gray-light: #F9F4EE;
      --gray-mid: #EDE0D0;
      --shadow: 0 4px 24px rgba(139,69,19,0.15);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.28);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: #2C1A0E;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ========== HEADER ========== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      transition: background 0.25s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-cta .phone-icon {
      font-size: 16px;
    }

    /* ========== HERO ========== */
    #hero {
      background: linear-gradient(135deg, #1A0F07 0%, #2C1A0E 40%, #4A2510 70%, #5C2D0A 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,160,84,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      font-size: 300px;
      opacity: 0.04;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      line-height: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212,160,84,0.15);
      border: 1px solid rgba(212,160,84,0.4);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(15px, 2vw, 19px);
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 14px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 15px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,69,19,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--accent-light);
      text-decoration: none;
      padding: 14px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 15px;
      border: 2px solid rgba(212,160,84,0.5);
      transition: all 0.25s;
    }

    .btn-secondary:hover {
      background: rgba(212,160,84,0.1);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin-top: 52px;
      flex-wrap: wrap;
    }

    .stat-item {
      text-align: center;
    }

    .stat-num {
      display: block;
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(212,160,84,0.2);
      align-self: stretch;
    }

    /* ========== SECTIONS COMMON ========== */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 16px;
      color: #6B4C2E;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    /* ========== SERVICES ========== */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 1px solid rgba(139,69,19,0.07);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
      line-height: 1;
    }

    .service-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 14px;
      color: #6B4C2E;
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 14px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 8px;
    }

    /* ========== WHY US ========== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(139,69,19,0.2) 0%, transparent 65%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(212,160,84,0.15);
      color: var(--accent);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: var(--text-muted);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,160,84,0.15);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: all 0.3s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(212,160,84,0.35);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.5;
      line-height: 1;
      margin-bottom: 12px;
    }

    .benefit-icon {
      font-size: 38px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ========== REFERENCES ========== */
    #reference {
      background: var(--gray-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      transition: all 0.3s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 52px;
      color: var(--accent);
      opacity: 0.2;
      line-height: 1;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: #F5A623;
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      color: #4A2C14;
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .review-location {
      font-size: 12px;
      color: #8B6045;
    }

    /* ========== CONTACT ========== */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px;
      background: var(--gray-light);
      border-radius: var(--radius);
      border: 1px solid rgba(139,69,19,0.1);
      transition: all 0.25s;
      text-decoration: none;
    }

    a.contact-item:hover {
      background: rgba(139,69,19,0.06);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .contact-icon {
      font-size: 26px;
      flex-shrink: 0;
      line-height: 1;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.3;
    }

    .contact-note {
      font-size: 12px;
      color: #8B6045;
      margin-top: 3px;
    }

    .contact-item-plain {
      text-decoration: none;
      color: inherit;
    }

    .map-placeholder {
      background: linear-gradient(135deg, #2C1A0E 0%, #4A2510 100%);
      border-radius: var(--radius-lg);
      height: 100%;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(212,160,84,0.2);
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(212,160,84,0.04) 40px, rgba(212,160,84,0.04) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(212,160,84,0.04) 40px, rgba(212,160,84,0.04) 41px);
    }

    .map-pin {
      font-size: 52px;
      position: relative;
      z-index: 1;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .map-city {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      position: relative;
      z-index: 1;
    }

    .map-addr {
      font-size: 13px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* ========== FOOTER ========== */
    footer {
      background: var(--dark);
      padding: 36px 20px;
      border-top: 2px solid var(--primary-dark);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-logo-sub {
      font-size: 11px;
      color: var(--accent);
    }

    .footer-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }

    .footer-info {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-info strong {
      color: var(--accent-light);
    }

    .footer-copy {
      font-size: 12px;
      color: #5C3D20;
    }

    .footer-copy a {
      color: var(--text-muted);
      text-decoration: none;
    }
