<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokrývač Frýdek-Místek | Tesařské, klempířské a pokrývačské práce</title>
  <meta name="description" content="Profesionální pokrývač ve Frýdek-Místku. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte +420603744364." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --gray: #6b7280;
      --gray-light: #f3f4f6;
      --white: #ffffff;
      --text: #1f2937;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 32px rgba(192,57,43,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== PROPOSAL BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-cta .icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 40%, #4a1a0a 70%, #1a0a0a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(192,57,43,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(230,126,34,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🏠';
      position: absolute;
      font-size: 320px;
      opacity: 0.04;
      right: -40px;
      bottom: -60px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.5);
      color: #f1948a;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #cbd5e1;
      margin-bottom: 40px;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      display: block;
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      margin-top: 4px;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(192,57,43,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--gray);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--gray-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1.5px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.12);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      font-size: 44px;
      margin-bottom: 18px;
      display: block;
    }

    .service-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 36px 28px;
      background: var(--gray-light);
      border-radius: var(--radius);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1.5px solid transparent;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: rgba(192,57,43,0.10);
    }

    .benefit-icon-wrap {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .benefit-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
    }

    .benefit-card p {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, #1a0a0a 0%, #2d1010 100%);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      background: rgba(192,57,43,0.3);
      color: #f1948a;
    }

    #reference .section-desc {
      color: #94a3b8;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: background 0.25s, transform 0.25s;
      backdrop-filter: blur(4px);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-4px);
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .review-location {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
        gap: 36px;
      }
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .kontakt-item:hover {
      transform: translateX(4px);
    }

    .kontakt-item-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .kontakt-item-body h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-body a,
    .kontakt-item-body p {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
    }

    .kontakt-item-body a:hover {
      color: var(--primary);
    }

    .kontakt-item-body span {
      display: block;
      font-size: 13px;
      color: var(--gray);
      font-weight: 400;
      margin-top: 2px;
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      height: 100%;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 2px dashed rgba(192,57,43,0.20);
      text-align: center;
      padding: 40px 30px;
    }

    .map-placeholder .map-icon {
      font-size: 56px;
    }

    .map-placeholder h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
    }

    .map-placeholder p {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.6;
    }

    .map-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 100px;
      margin-top: 4px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: #94a3b8;
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-logo span {
      color: var(--primary-light);
    }

    .footer-info {
      font-size: 13px;
      line-height: 1.7;
      text-align: right;
    }

    .footer-info a {
      color: var(--primary-light);
      text-decoration: none;
    }

    .footer-info a:hover {
      text-decoration: underline;
    }

    .footer-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 20px 0 16px;
    }

    .footer-copy {
      max-width: 1200px;
      margin: 0 auto;
      font-size: 12px;
      color: #4b5563;
      text-align: center;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      section {
        padding: 60px 16px;
      }

      .navbar {
        padding: 0 16px;
        height: 62px;
      }

      .logo-main {
        font-size: 14px;
      }

      .nav-cta {
        padding: 8px 14px;
        font-size: 13px;
      }

      #hero {
        padding: 60px 16px 70px;
      }

      .hero-stats {
        gap: 20px;
      }

      .hero-stat-num {
        font-size: 26px;
      }

      .btn-primary, .btn-secondary {
        padding: 13px 24px;
        font-size: 15px;
        width: 100%;
        justify-content: center;
      }

      .hero-buttons {
        flex-direction: column;
        align-items: stretch;
        max-width: 320px;
        margin: 0 auto;
      }

      .footer-info {
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: 1fr;
      }
      .benefits-grid {
        grid-template-columns: 1fr;
      }
      .reviews-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div id="proposal-banner" style="background:linear-gradient(135deg,#FF4D00,#ff7c47);color:white;text-align:
