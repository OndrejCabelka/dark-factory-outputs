<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servis Výtahů Praha & Liberec | Profesionální servis výtahů</title>
  <meta name="description" content="Profesionální servis výtahů v Praze a okolí. Rychlý zásah, kvalita garantována, přijatelná cena. Volejte 602 131 474.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #0f4f94;
      --primary-light: #3b8de0;
      --accent: #f0a500;
      --dark: #0d1b2e;
      --dark-mid: #162840;
      --dark-card: #1c2f47;
      --text-light: #e8f0fe;
      --text-muted: #8aafd4;
      --white: #ffffff;
      --gray-light: #f4f8ff;
      --gray-border: #e0eaf8;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.22);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--white);
      color: #1a2940;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== PROPOSAL BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13, 27, 46, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(26,111,196,0.25);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.5);
    }

    .btn-call-nav .phone-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(155deg, #0a1628 0%, #0d1f3c 35%, #0f2d5a 65%, #0a1a3a 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 100px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(26,111,196,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59,141,224,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(26,111,196,0.18);
      border: 1px solid rgba(26,111,196,0.35);
      color: #7ec4ff;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 100px;
      margin-bottom: 22px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      font-size: 15px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: #a8c8f0;
      font-weight: 400;
      margin-bottom: 36px;
      max-width: 560px;
      line-height: 1.55;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 30px;
      border-radius: var(--radius);
      box-shadow: 0 6px 28px rgba(26,111,196,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(26,111,196,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 30px;
      border-radius: var(--radius);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hero-stat-num {
      font-size: 30px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* ===== SECTION COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,111,196,0.10);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .section-header h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: #0d1b2e;
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: #5a7a99;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 90px 20px;
      background: var(--gray-light);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gray-border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(59,141,224,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: #0d1b2e;
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: #5a7a99;
      line-height: 1.6;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      padding: 90px 20px;
      background: linear-gradient(160deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(26,111,196,0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: #8aafd4;
    }

    #proc-my .section-tag {
      background: rgba(26,111,196,0.25);
      color: #7ec4ff;
    }

    .benefits-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(26,111,196,0.12);
      border-color: rgba(26,111,196,0.4);
      transform: translateY(-5px);
    }

    .benefit-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      margin: 0 auto 24px;
      box-shadow: 0 6px 24px rgba(26,111,196,0.4);
    }

    .benefit-icon-large {
      font-size: 44px;
      display: block;
      margin-bottom: 18px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: #8aafd4;
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      padding: 90px 20px;
      background: var(--white);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--gray-light);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      border: 1.5px solid var(--gray-border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      line-height: 1;
      color: var(--primary);
      opacity: 0.25;
      font-family: Georgia, serif;
      position: absolute;
      top: 16px;
      left: 26px;
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .review-text {
      font-size: 15px;
      color: #3a5070;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
      position: relative;
      z-index: 1;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #0d1b2e;
    }

    .review-author-info span {
      font-size: 13px;
      color: #7a9ab8;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      padding: 90px 20px;
      background: var(--gray-light);
    }

    .kontakt-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .kontakt-info {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 44px 36px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gray-border);
    }

    .kontakt-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: #0d1b2e;
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item:last-child {
      margin-bottom: 0;
    }

    .contact-icon-wrap {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(59,141,224,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #7a9ab8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .contact-item-body a {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary-dark);
    }

    .contact-item-body span {
      font-size: 15px;
      color: #3a5070;
    }

    .map-placeholder {
      background: linear-gradient(155deg, #0d1f3c, #162840);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      border: 1.5px solid rgba(26,111,196,0.25);
      box-shadow: var(--shadow);
      padding: 40px;
      text-align: center;
    }

    .map-placeholder .map
