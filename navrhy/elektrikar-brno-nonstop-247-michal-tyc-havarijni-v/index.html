<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektrikář Brno nonstop 24/7 – Michal Tyc | Havarijní výjezd</title>
  <meta name="description" content="Profesionální elektrikář v Brně a okolí. Havarijní výjezd 24/7. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte: +420 722 065 954">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #f5c518;
      --primary-dark: #d4a800;
      --primary-light: #ffe566;
      --dark: #0d0f14;
      --dark2: #151820;
      --dark3: #1e2230;
      --dark4: #252a3a;
      --text: #e8eaf0;
      --text-muted: #8b90a0;
      --white: #ffffff;
      --card-bg: #1a1e2e;
      --border: #2a3050;
      --radius: 12px;
      --radius-lg: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-hover: 0 8px 40px rgba(245,197,24,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(13, 15, 20, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-text strong {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-text span {
      font-size: 11px;
      color: var(--primary);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-badge {
      display: none;
      background: #1e2230;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #4ade80;
      font-weight: 600;
      align-items: center;
      gap: 6px;
    }

    .nav-badge::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse-green 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 800;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 10px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .nav-cta svg {
      width: 16px;
      height: 16px;
    }

    @media (min-width: 640px) {
      .nav-badge {
        display: flex;
      }
      .logo-text strong {
        font-size: 16px;
      }
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      align-items: center;
      padding: 80px 20px 60px;
      overflow: hidden;
      background: linear-gradient(135deg, #080a10 0%, #0d1020 40%, #111525 70%, #0a0c15 100%);
    }

    .hero-bg-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-bg-glow::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 65%);
      border-radius: 50%;
    }

    .hero-bg-glow::after {
      content: '';
      position: absolute;
      bottom: -10%;
      left: -15%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(245,197,24,0.07) 0%, transparent 65%);
      border-radius: 50%;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,197,24,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,197,24,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,197,24,0.12);
      border: 1px solid rgba(245,197,24,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 30px;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse-yellow 1.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-yellow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(32px, 7vw, 62px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--white);
      margin-bottom: 18px;
    }

    #hero h1 .highlight {
      color: var(--primary);
      position: relative;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.6;
      max-width: 520px;
      font-weight: 400;
    }

    .hero-sub strong {
      color: var(--text);
      font-weight: 600;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 40px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--dark);
      font-weight: 800;
      font-size: 16px;
      padding: 16px 28px;
      border-radius: 12px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,197,24,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,197,24,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--text);
      font-weight: 700;
      font-size: 16px;
      padding: 15px 28px;
      border-radius: 12px;
      border: 2px solid var(--border);
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat strong {
      font-size: 26px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
    }

    .hero-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 340px;
      width: 100%;
      box-shadow: var(--shadow);
    }

    .hero-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .hero-card-icon {
      width: 52px;
      height: 52px;
      background: rgba(245,197,24,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .hero-card-title {
      font-weight: 800;
      font-size: 16px;
      color: var(--white);
      line-height: 1.3;
    }

    .hero-card-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .hero-card-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-card-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
    }

    .hero-card-item::before {
      content: '✓';
      width: 22px;
      height: 22px;
      background: rgba(74,222,128,0.15);
      color: #4ade80;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .hero-card-footer {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .online-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #4ade80;
      font-weight: 600;
    }

    .online-dot::before {
      content: '';
      width: 9px;
      height: 9px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.25);
      animation: pulse-green 2s infinite;
    }

    .hero-card-phone {
      font-size: 13px;
      color: var(--primary);
      font-weight: 700;
    }

    @media (min-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr 380px;
      }

      .hero-visual {
        justify-content: flex-end;
      }
    }

    /* ===== SECTION COMMONS ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(245,197,24,0.1);
      border: 1px solid rgba(245,197,24,0.25);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .section-title .highlight {
      color: var(--primary);
    }

    .section-desc {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-head {
      margin-bottom: 48px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 540px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .services-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(245,197,24,0.35);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: rgba(245,197,24,0.12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: background 0.25s;
    }

    .service-card:hover .service-icon {
      background: rgba(245,197,24,0.22);
    }

    .service-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 4px;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 10px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 700px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .benefit-card:hover::before {
      transform: scaleX(1);
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .benefit-number {
      font-size: 52px;
      font-weight: 900;
      color: rgba(245,197,24,0.12);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .benefit-icon-wrap {
      width: 60px;
      height: 60px;
      background: rgba(245,197,24,0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 18px;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .benefit-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .reviews-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1000px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.25s, box-shadow
