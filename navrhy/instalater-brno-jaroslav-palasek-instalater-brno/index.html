<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Brno – Jaroslav Palásek | Oprava potrubí, koupelny, topení</title>
  <meta name="description" content="Profesionální instalatér v Brně a okolí. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 731 306 744.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #1358a0;
      --primary-light: #3d8fd6;
      --accent: #f59e0b;
      --dark: #0f1c2e;
      --dark-2: #162436;
      --dark-3: #1e3148;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26, 111, 196, 0.10);
      --shadow-card: 0 2px 16px rgba(15, 28, 46, 0.08);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: none;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-phone {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(26, 111, 196, 0.35);
    }

    .btn-phone:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 111, 196, 0.45);
    }

    .phone-icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0f2545 35%, #1a3a6b 70%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 70px 20px 80px;
      min-height: 90vh;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(26, 111, 196, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(245, 158, 11, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, rgba(10, 22, 40, 0.4));
      pointer-events: none;
    }

    .hero-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .shape-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(26, 111, 196, 0.15);
    }

    .shape-1 {
      width: 500px;
      height: 500px;
      top: -200px;
      right: -150px;
    }

    .shape-2 {
      width: 300px;
      height: 300px;
      bottom: -100px;
      left: -80px;
      border-color: rgba(245, 158, 11, 0.1);
    }

    .shape-pipe {
      position: absolute;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
    }

    .pipe-1 {
      width: 6px;
      height: 200px;
      top: 10%;
      right: 20%;
      transform: rotate(15deg);
    }

    .pipe-2 {
      width: 6px;
      height: 140px;
      top: 30%;
      right: 18%;
      transform: rotate(15deg);
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26, 111, 196, 0.2);
      border: 1px solid rgba(26, 111, 196, 0.4);
      color: #93c5fd;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .hero-badge-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    #hero h1 {
      font-size: clamp(30px, 6vw, 62px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: -1px;
      max-width: 750px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: #94a3b8;
      max-width: 600px;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .hero-subtitle strong {
      color: #cbd5e1;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      transition: all 0.25s;
      box-shadow: 0 8px 24px rgba(26, 111, 196, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(26, 111, 196, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--white);
      text-decoration: none;
      padding: 16px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.25s;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.1);
      align-self: stretch;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 90px 20px;
      background: var(--bg-section);
    }

    .section-header {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 56px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26, 111, 196, 0.08);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .section-subtitle {
      font-size: 16px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(26, 111, 196, 0.15);
      border-color: rgba(26, 111, 196, 0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card.emergency {
      background: linear-gradient(135deg, #fff7ed, #fff);
      border-color: #fed7aa;
    }

    .service-card.emergency::before {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
    }

    .service-card.emergency:hover {
      box-shadow: 0 16px 48px rgba(245, 158, 11, 0.15);
    }

    .service-icon-wrap {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(26, 111, 196, 0.1), rgba(26, 111, 196, 0.05));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .service-card.emergency .service-icon-wrap {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.05));
    }

    .service-card:hover .service-icon-wrap {
      transform: scale(1.1) rotate(5deg);
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
    }

    .service-card.emergency h3 {
      color: #92400e;
    }

    .service-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 90px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';

      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-tag {
      background: rgba(26, 111, 196, 0.2);
      color: #93c5fd;

    #proc-my .section-subtitle {
      color: #64748b;

    .benefit-card {

      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';

    .benefit-number {

    }

    .benefit-icon-row {
      display: flex;

      gap: 14px;

    .benefit-card h3 {
      font-size: 20px;

      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-card p {

      color: #64748b;

    #reference {
      padding: 90px 20px;
      background: var(--bg-light);
    }

    }

      background: var(--white);

    .review-stars {

    .review-text {

    .review-author {

    .review-avatar {
      width: 44px;

      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }
