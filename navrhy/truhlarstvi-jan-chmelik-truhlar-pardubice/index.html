<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truhlářství Jan Chmelík – Pardubice</title>
  <meta name="description" content="Profesionální truhlář v Pardubicích a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2D0A;
      --accent: #D4A853;
      --accent-light: #E8C57A;
      --dark: #1A0F07;
      --dark-2: #2C1A0E;
      --dark-3: #3D2314;
      --text-dark: #1A0F07;
      --text-mid: #5A3E2B;
      --text-light: #8C6A50;
      --bg-light: #FDF8F3;
      --bg-section: #F5EDE3;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139,69,19,0.12);
      --shadow-lg: 0 8px 40px rgba(139,69,19,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-dark);
      background: var(--bg-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(26, 15, 7, 0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,168,83,0.2);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-main {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .nav-logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s !important;
      white-space: nowrap;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,69,19,0.4);
      opacity: 0.95;
      color: var(--white) !important;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--dark);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(139,69,19,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(212,168,83,0.12) 0%, transparent 50%),
        linear-gradient(135deg, #1A0F07 0%, #2C1A0E 40%, #1A0F07 100%);
      z-index: 0;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(212,168,83,0.03) 40px,
          rgba(212,168,83,0.03) 41px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 40px,
          rgba(212,168,83,0.03) 40px,
          rgba(212,168,83,0.03) 41px
        );
      z-index: 0;
    }

    .hero-wood-accent {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(ellipse, rgba(139,69,19,0.25) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 80px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 64px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 720px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(255,255,255,0.7);
      margin-bottom: 48px;
      max-width: 540px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 64px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(139,69,19,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,69,19,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 4px;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* ===== SECTION COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(139,69,19,0.15);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      font-size: 42px;
      margin-bottom: 20px;
      display: block;
      line-height: 1;
    }

    .service-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .service-desc {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 0% 100%, rgba(139,69,19,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 0%, rgba(212,168,83,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(212,168,83,0.15);
      color: var(--accent);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-subtitle {
      color: rgba(255,255,255,0.55);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(139,69,19,0.15);
      border-color: rgba(212,168,83,0.25);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 52px;
      font-weight: 800;
      color: rgba(212,168,83,0.15);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 20px;
      display: block;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.3px;
    }

    .benefit-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.75;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--bg-section);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      position: relative;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .review-quote {
      font-size: 56px;
      color: var(--accent);
      line-height: 0.8;
      margin-bottom: 20px;
      font-family: Georgia, serif;
      opacity: 0.7;
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.8;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .review-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .review-location {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body {
      display: flex;
      flex-direction: column;
    }

    .contact-item-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    a.contact-item-value:hover {
      color: var(--primary);
    }

    .contact-item-note {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .map-placeholder {
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border-radius: var(--radius-lg);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(212,168,83,0.3);
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(139,69,19,0.1) 0%, transparent 70%);
    }

    .map-icon {
      font-size: 48px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      position: relative;
      z-index: 1;
    }

    .map-sub {
      font-size: 13px;
      color: rgba(255,255,255,0
