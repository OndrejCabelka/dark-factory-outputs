<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Střechy Babůrek | Pokrývač České Budějovice</title>
  <meta name="description" content="Profesionální pokrývač v Českých Budějovicích a okolí. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Volejte 606 687 493.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2c2c2c;
      --text-light: #666;
      --bg-light: #f8f9fa;
      --bg-section: #f1f3f5;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner a {
      text-decoration: underline;
    }

    /* ===== HEADER ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary-light);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-light);
      transform: scale(1.04);
    }

    .nav-cta .icon {
      font-size: 16px;
    }

    /* ===== HERO ===== */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(15,20,40,0.92) 0%, rgba(140,20,20,0.80) 60%, rgba(192,57,43,0.70) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 2px,
          transparent 2px,
          transparent 20px
        );
      background-color: #1a0a0a;
    }

    .hero-shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.07;
    }

    .hero-shape-1 {
      width: 600px;
      height: 600px;
      background: var(--primary);
      top: -200px;
      right: -150px;
    }

    .hero-shape-2 {
      width: 400px;
      height: 400px;
      background: var(--accent);
      bottom: -150px;
      left: -100px;
    }

    .hero-shape-3 {
      width: 300px;
      height: 300px;
      background: var(--white);
      top: 50%;
      left: 40%;
      transform: translate(-50%, -50%);
    }

    .hero-roof-deco {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--accent), var(--primary));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px 20px;
      max-width: 820px;
      margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      color: rgba(255,255,255,0.90);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .hero-badge span {
      font-size: 16px;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 58px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    #hero h1 .highlight {
      color: var(--primary-light);
      position: relative;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.82);
      margin-bottom: 44px;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 16px 34px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(192,57,43,0.40);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(192,57,43,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.45);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--white);
      background: rgba(255,255,255,0.10);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      color: var(--white);
    }

    .hero-stat-num {
      font-size: 34px;
      font-weight: 900;
      color: var(--primary-light);
      display: block;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.20);
      align-self: stretch;
      display: none;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid rgba(192,57,43,0.20);
    }

    .section-title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .section-title .accent {
      color: var(--primary);
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      font-size: 44px;
      margin-bottom: 20px;
      display: block;
      line-height: 1;
    }

    .sluzba-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-weight: 700;
      font-size: 14px;
      margin-top: 18px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .sluzba-link:hover {
      gap: 10px;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .proc-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      padding: 36px 28px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(0,0,0,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .proc-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .proc-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .proc-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--dark);
    }

    .proc-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '"';
      position: absolute;
      top: -40px;
      left: 20px;
      font-size: 300px;
      font-weight: 900;
      color: rgba(255,255,255,0.03);
      line-height: 1;
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.15);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-subtitle {
      color: rgba(255,255,255,0.65);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      transition: background 0.25s, transform 0.25s;
      backdrop-filter: blur(4px);
    }

    .recenze-card:hover {
      background: rgba(255,255,255,0.11);
      transform: translateY(-5px);
    }

    .recenze-stars {
      color: #f1c40f;
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.75;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .recenze-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .recenze-location {
      font-size: 13px;
      color: rgba(255,255,255,0.50);
      margin-top: 2px;
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--bg-section);
    }

    .kontakt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 22px 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.04);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-body {}

    .kontakt-item-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-item-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
    }

    .kontakt-item-value a {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-value a:hover {
      color: var(--primary-dark);
    }

    .kontakt-item-value small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-light);
      margin-top: 2px;
    }

    .mapa-placeholder {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--white);
    }

    .mapa-inner {
      height: 320px;
      background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #888;
      font-size: 16px;
      border-radius: var(--radius-lg);
      border: 2px dashed #ccc;
      padding: 20px;
      text-align: center;
    }

    .mapa-inner .mapa-emoji {
      font-size: 52px;
    }

    .mapa-inner strong {
      color: var(--dark);
      font-size: 17px;
    }

    .mapa-inner p {
      font-size: 14px;
      color: var(--text-light);
    }

    /* ===== CTA BANNER ===== */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%,
