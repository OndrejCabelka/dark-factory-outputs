<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavel Tesař – Profesionální tesařské práce v Praze</title>
<meta name="description" content="Profesionální tesař v Praze a okolí. Krovové konstrukce, dřevěné altány, pergoly, opravy krovů, dřevostavby. Zavolejte +420222320956">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c17a2b;
  --primary-dark: #9a5f1e;
  --primary-light: #e09840;
  --dark: #1a1208;
  --dark2: #2c1f0e;
  --dark3: #3d2b14;
  --text: #1a1208;
  --text-light: #6b5740;
  --white: #ffffff;
  --gray-light: #f8f4ef;
  --gray: #e8e0d4;
  --shadow: 0 4px 24px rgba(193,122,43,0.12);
  --shadow-hover: 0 8px 40px rgba(193,122,43,0.22);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* BANNER */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* NAVBAR */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(193,122,43,0.2);
  padding: 0 20px;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary-light);
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600 !important;
  font-size: 14px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s !important;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(193,122,43,0.4) !important;
  color: var(--white) !important;
}

/* HERO */
#hero {
  background: linear-gradient(135deg, #1a1208 0%, #2c1f0e 30%, #3d2b14 60%, #1a1208 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 80vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(193,122,43,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(224,152,64,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(193,122,43,0.08) 0%, transparent 40%);
}

#hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 80px,
      rgba(193,122,43,0.03) 80px,
      rgba(193,122,43,0.03) 81px
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 80px,
      rgba(193,122,43,0.03) 80px,
      rgba(193,122,43,0.03) 81px
    );
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(193,122,43,0.15);
  border: 1px solid rgba(193,122,43,0.35);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-content h1 {
  font-size: clamp(32px, 5vw, 54px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 18px);
  color: rgba(255,255,255,0.72);
  line-height: 1.65;
  margin-bottom: 36px;
  max-width: 500px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(193,122,43,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(193,122,43,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  border: 1.5px solid rgba(255,255,255,0.25);
  transition: background 0.2s, border-color 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.45);
}

.hero-stats {
  display: flex;
  gap: 24px;
  margin-top: 48px;
  padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-wood-graphic {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1;
  background: linear-gradient(135deg, rgba(193,122,43,0.08), rgba(193,122,43,0.04));
  border: 1px solid rgba(193,122,43,0.15);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.hero-wood-graphic::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(193,122,43,0.03) 20px,
    rgba(193,122,43,0.03) 21px
  );
}

.hero-icon-big {
  font-size: 120px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 8px 32px rgba(193,122,43,0.4));
}

.hero-floating {
  position: absolute;
  background: rgba(26,18,8,0.85);
  border: 1px solid rgba(193,122,43,0.2);
  border-radius: 12px;
  padding: 10px 16px;
  color: white;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(8px);
}

.hero-floating-1 {
  top: 20px;
  right: -10px;
}

.hero-floating-2 {
  bottom: 30px;
  left: -10px;
}

.hero-floating-dot {
  width: 8px;
  height: 8px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.8); }
}

/* SECTION COMMONS */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  max-width: 600px;
  margin: 0 auto 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(193,122,43,0.1);
  color: var(--primary);
  padding: 4px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  color: var(--text-light);
  font-size: 16px;
  line-height: 1.65;
}

/* SERVICES */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: 16px;
  padding: 32px 24px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border: 1px solid rgba(193,122,43,0.08);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(193,122,43,0.12), rgba(224,152,64,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.1);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* WHY US */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}

.benefit-card {
  text-align: center;
  padding: 40px 28px;
  border-radius: 16px;
  background: var(--gray-light);
  border: 1px solid var(--gray);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  box-shadow: 0 4px 20px rgba(193,122,43,0.3);
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

/* REVIEWS */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(193,122,43,0.08) 0%, transparent 70%);
}

#reference .section-header {
  position: relative;
  z-index: 1;
}

  background: rgba(193,122,43,0.2);

}

}

}

.reviews-grid {

}

.review-card {
  background: rgba(255,255,255,0.05);

}

}

.review-stars {
  color: var(--primary-light);

}

.review-text {
  color: rgba(255,255,255,0.82);
  font-size: 15px;
  line-height: 1.7;

}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);

  line-height: 1.2;
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

.contact-info > p {

.contact-item:hover {

.contact-item-label {
