<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Střechy Dobra – Pokrývač České Budějovice</title>
<meta name="description" content="Profesionální pokrývač v Českých Budějovicích. Pokládka střešní krytiny, opravy střech, tepelná izolace, vikýře. Zavolejte 776 582 986.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #C0392B;
  --primary-dark: #96281B;
  --primary-light: #E74C3C;
  --accent: #E67E22;
  --accent-light: #F39C12;
  --dark: #1A1A1A;
  --dark2: #2C2C2C;
  --dark3: #3D3D3D;
  --text: #333333;
  --text-light: #666666;
  --text-muted: #999999;
  --white: #FFFFFF;
  --bg-light: #F8F5F2;
  --bg-card: #FFFFFF;
  --border: #E8E0D8;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(192,57,43,0.18);
  --radius: 12px;
  --radius-lg: 20px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  font-size: 16px;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,26,26,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700 !important;
  font-size: 14px !important;
  text-decoration: none;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s !important;
  box-shadow: 0 4px 16px rgba(192,57,43,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(192,57,43,0.5) !important;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: 0.3s;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #1A0A08 0%, #2D1210 30%, #1C1008 60%, #0D0D0D 100%);
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(192,57,43,0.18) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(230,126,34,0.12) 0%, transparent 40%),
    radial-gradient(circle at 60% 80%, rgba(192,57,43,0.10) 0%, transparent 40%);
  pointer-events: none;
}

.hero-roof-graphic {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  width: 55%;
  max-width: 700px;
  opacity: 0.07;
  pointer-events: none;
}

.hero-roof-svg {
  width: 100%;
  height: auto;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(192,57,43,0.2);
  border: 1px solid rgba(192,57,43,0.4);
  color: #FF8A7A;
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  background: var(--primary-light);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(32px, 5vw, 62px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.12;
  letter-spacing: -1.5px;
  margin-bottom: 22px;
  max-width: 760px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2vw, 20px);
  color: rgba(255,255,255,0.70);
  max-width: 560px;
  margin-bottom: 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(192,57,43,0.45);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(192,57,43,0.6);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.20);
  color: var(--white);
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.50);
  margin-top: 4px;
  font-weight: 400;
}

.hero-stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.12);
  align-self: center;
}

/* ===== SECTIONS COMMON ===== */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(192,57,43,0.10);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== SLUZBY ===== */
#sluzby {
  padding: 96px 0;
  background: var(--bg-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(192,57,43,0.20);
}

.sluzba-card:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.10));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: transform 0.25s;
}

.sluzba-card:hover .sluzba-icon {
  transform: scale(1.08);
}

.sluzba-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.sluzba-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

.sluzba-features {
  margin-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sluzba-feature {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-light);
}

.sluzba-feature::before {
  content: '✓';
  color: var(--primary);
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 96px 0;
  background: var(--white);
}

.proc-my-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.benefit-card {
  text-align: center;
  padding: 44px 28px;
  border-radius: var(--radius-lg);
  position: relative;
  transition: transform 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
}

.benefit-number {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 64px;
  font-weight: 900;
  color: rgba(192,57,43,0.06);
  line-height: 1;
  letter-spacing: -2px;
}

.benefit-icon-wrap {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 24px;
  box-shadow: 0 8px 32px rgba(192,57,43,0.30);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover .benefit-icon-wrap {
  transform: scale(1.06) rotate(-3deg);
  box-shadow: 0 12px 40px rgba(192,57,43,0.40);
}

.benefit-card h3 {
  font-size: 21px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.75;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 0;
  background: linear-gradient(135deg, #1A0A08 0%, #2D1210 50%, #1C1008 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 10% 30%, rgba(192,57,43,0.15) 0%, transparent 50%),
    radial-gradient(circle at 90% 70%, rgba(230,126,34,0.10) 0%, transparent 40%);
  pointer-events: none;
}

#reference .section-tag {
  background: rgba(192,57,43,0.25);
  color: #FF9E94;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-header p {
  color: rgba(255,255,255,0.60);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 2;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  backdrop-filter: blur(10px);
  transition: transform 0.25s, background 0.25s;
}

.review-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.09);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 48px;
  color: rgba(192,57,43,0.40);
  font-style: normal;
  font-weight: 900;
  display: block;
  line-height: 0.8;
  margin-bottom: 12px;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 96px 0;
  background: var(--bg-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-title {
  font-size: clamp(26px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.kontakt-subtitle {
  font-size: 16px;
  color: var(--text-light);
  line-height: 1.7;
  margin-bottom: 12px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px 24px;
  background: var(--white);
  border-radius: var(--radius);
  border:
