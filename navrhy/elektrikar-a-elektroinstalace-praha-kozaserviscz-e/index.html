<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální elektrikář Praha – elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Kozaservis.cz | +420 777 024 012">
<title>Elektrikář Praha | Kozaservis.cz – Elektroinstalace, Revize, Fotovoltaika</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --yellow: #FFD600;
  --yellow-dark: #F5C200;
  --yellow-light: #FFF8CC;
  --dark: #0D0D0D;
  --dark2: #1A1A2E;
  --dark3: #16213E;
  --dark4: #0F3460;
  --gray: #6B7280;
  --gray-light: #F3F4F6;
  --white: #FFFFFF;
  --text: #1F2937;
  --text-light: #4B5563;
  --border: #E5E7EB;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.15);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== NAVBAR ===== */
header {
  background: rgba(13, 13, 13, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid rgba(255,214,0,0.15);
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--yellow);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--yellow);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.80);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--yellow);
}

.btn-nav {
  background: var(--yellow);
  color: var(--dark) !important;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700 !important;
  font-size: 14px !important;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.2s, transform 0.2s !important;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-nav:hover {
  background: var(--yellow-dark) !important;
  transform: translateY(-1px);
}

.nav-menu-toggle {
  display: none;
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #0D0D0D 0%, #1A1A2E 40%, #0F3460 100%);
  position: relative;
  overflow: hidden;
  padding: 90px 20px 80px;
  min-height: 92vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  top: -120px;
  right: -120px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,214,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(15,52,96,0.6) 0%, transparent 70%);
  pointer-events: none;
}

.hero-grid {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 60px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,214,0,0.12);
  border: 1px solid rgba(255,214,0,0.3);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 13px;
  color: var(--yellow);
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-content h1 {
  font-size: clamp(32px, 5vw, 54px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  color: var(--yellow);
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 36px;
  line-height: 1.65;
  max-width: 500px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.btn-primary {
  background: var(--yellow);
  color: var(--dark);
  padding: 15px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 15px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(255,214,0,0.35);
}

.btn-primary:hover {
  background: var(--yellow-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(255,214,0,0.45);
}

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  padding: 15px 28px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  transition: background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--yellow);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 4px;
}

.hero-visual {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.hero-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: background 0.3s, transform 0.3s;
}

.hero-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateX(-4px);
}

.hero-card-icon {
  width: 48px;
  height: 48px;
  background: rgba(255,214,0,0.15);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.hero-card-text strong {
  display: block;
  color: var(--white);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}

.hero-card-text span {
  color: rgba(255,255,255,0.55);
  font-size: 13px;
}

/* ===== SECTION COMMON ===== */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--yellow-light);
  border: 1px solid rgba(255,214,0,0.4);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 12px;
  color: #92700A;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.7px;
  margin-bottom: 12px;
  line-height: 1.2;
}

.section-header p {
  font-size: 17px;
  color: var(--text-light);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.65;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--gray-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.sluzba-karta {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--yellow), var(--yellow-dark));
  opacity: 0;
  transition: opacity 0.3s;
}

.sluzba-karta:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(255,214,0,0.4);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--yellow-light), rgba(255,214,0,0.25));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.sluzba-karta:hover .sluzba-icon {
  transform: scale(1.08) rotate(-3deg);
}

.sluzba-karta h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.sluzba-karta p {
  color: var(--text-light);
  font-size: 14.5px;
  line-height: 1.65;
  margin-bottom: 18px;
}

.sluzba-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sluzba-list li {
  font-size: 13.5px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sluzba-list li::before {
  content: '✓';
  color: var(--yellow-dark);
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  background: var(--yellow-light);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--white);
}

.benefity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.benefit-item {
  text-align: center;
  padding: 40px 28px;
  border-radius: var(--radius-lg);
  background: var(--gray-light);
  border: 1px solid var(--border);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.benefit-item:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}

.benefit-icon-wrap {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--dark2), var(--dark4));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 22px;
  box-shadow: 0 6px 24px rgba(15,52,96,0.3);
}

.benefit-item h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-item p {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.65;
}

.benefit-number {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 52px;
  font-weight: 900;
  color: rgba(255,214,0,0.12);
  line-height: 1;
  letter-spacing: -2px;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, var(--dark2) 0%, var(--dark3) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,214,0,0.07) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-header p {
  color: rgba(255,255,255,0.6);
}

#reference .section-tag {
  background: rgba(255,214,0,0.12);
  border-color: rgba(255,214,0,0.2);
  color: var(--yellow);
}

.recenze-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.recenze-karta {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 28px;
  transition: transform 0.3s, background 0.3s;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.09);
}

.hvezdy {
  color: var(--yellow);
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.recenze-text {
  color: rgba(255,255,255,0.82);
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.autor-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  color: var(--dark);
  flex-shrink: 0;
}

.autor-info strong {
  display: block;
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
}

.autor-info span {
  color: rgba(255,255,255,0.45);
  font-size: 12px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--gray-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h3 {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.kontakt-info > p {
  color: var(--text-light);
  margin-bottom: 32px;
  font-size: 15px;
  line-height: 1.65;
}

.kontakt-items {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
}

.kontakt-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}

.kontakt-item:hover {
  border-color: var(--yellow);
  transform: translateX(4px);
  box-shadow: var(--shadow);
}

.kontakt-item-icon {
  width: 44px;
  height: 44px;
  background: var(--yellow-light);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-text strong {
  display: block;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}

.kontakt-item-text
