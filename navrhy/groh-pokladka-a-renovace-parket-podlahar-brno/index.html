<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groh - Pokládka A Renovace Parket | Podlahář Brno</title>
  <meta name="description" content="Profesionální pokládka a renovace parket v Brně a okolí. Kvalitní práce, rychlý servis, přijatelné ceny. Volejte +420603818218">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a06a06;
      --primary-light: #e8a020;
      --primary-glow: rgba(200, 134, 10, 0.15);
      --dark: #1a1208;
      --dark2: #241a0c;
      --dark3: #2e2010;
      --text: #f5efe6;
      --text-muted: #c4b49a;
      --white: #ffffff;
      --card-bg: #ffffff;
      --section-bg: #f9f5ef;
      --section-bg2: #fff8ee;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #2a1f0e;
      background: #ffffff;
      line-height: 1.6;
    }

    /* ========== BANNER ========== */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
    }

    /* ========== HEADER ========== */
    header {
      background: var(--dark);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .navbar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(200, 134, 10, 0.35);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(200, 134, 10, 0.5);
    }

    /* ========== HERO ========== */
    #hero {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 40%, #3a2808 100%);
      padding: 80px 20px 90px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,134,10,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(200,134,10,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200, 134, 10, 0.15);
      border: 1px solid rgba(200, 134, 10, 0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(15px, 2.2vw, 18px);
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.65;
      position: relative;
      z-index: 1;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 25px rgba(200, 134, 10, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(200, 134, 10, 0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      border: 2px solid rgba(255,255,255,0.25);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200, 134, 10, 0.1);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary-light);
      display: block;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ========== SECTIONS COMMON ========== */
    .section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      color: #1a1208;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 16px;
      color: #6b5a40;
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 50px;
    }

    /* ========== SERVICES ========== */
    #sluzby {
      background: var(--section-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 20px rgba(42, 31, 14, 0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(200, 134, 10, 0.08);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(42, 31, 14, 0.13);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(232,160,32,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1208;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 14px;
      color: #6b5a40;
      line-height: 1.65;
    }

    /* ========== PROC MY ========== */
    #proc-my {
      background: var(--dark);
      padding: 80px 20px;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: var(--text-muted);
    }

    #proc-my .section-tag {
      color: var(--primary-light);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200, 134, 10, 0.15);
      border-radius: 16px;
      padding: 36px 30px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(200, 134, 10, 0.08);
      border-color: rgba(200, 134, 10, 0.4);
      transform: translateY(-4px);
    }

    .benefit-icon {
      font-size: 38px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ========== REFERENCE ========== */
    #reference {
      background: var(--section-bg2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: 16px;
      padding: 30px 28px;
      box-shadow: 0 2px 20px rgba(42, 31, 14, 0.07);
      border: 1px solid rgba(200, 134, 10, 0.08);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 35px rgba(42, 31, 14, 0.12);
    }

    .review-stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: #3d2e18;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: var(--primary-light);
      opacity: 0.4;
      line-height: 0;
      vertical-align: -14px;
      margin-right: 4px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 14px;
      color: #1a1208;
    }

    .review-location {
      font-size: 12px;
      color: #8a7055;
      margin-top: 2px;
    }

    /* ========== KONTAKT ========== */
    #kontakt {
      background: var(--dark2);
      padding: 80px 20px;
    }

    #kontakt .section-title {
      color: var(--white);
    }

    #kontakt .section-desc {
      color: var(--text-muted);
    }

    #kontakt .section-tag {
      color: var(--primary-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200, 134, 10, 0.12);
      border-radius: 14px;
      padding: 20px 22px;
      transition: background 0.2s, border-color 0.2s;
    }

    .kontakt-item:hover {
      background: rgba(200, 134, 10, 0.08);
      border-color: rgba(200, 134, 10, 0.3);
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-body h4 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-body a,
    .kontakt-item-body p {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-item-body a:hover {
      color: var(--primary-light);
    }

    .mapa-placeholder {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200, 134, 10, 0.15);
      border-radius: 16px;
      overflow: hidden;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 15px;
      text-align: center;
      padding: 30px;
    }

    .mapa-icon {
      font-size: 48px;
      opacity: 0.6;
    }

    .mapa-placeholder strong {
      color: var(--white);
      font-size: 17px;
    }

    /* ========== FOOTER ========== */
    footer {
      background: var(--dark);
      border-top: 1px solid rgba(200, 134, 10, 0.1);
      padding: 30px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .footer-logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-logo span {
      color: var(--primary-light);
    }

    .footer-info {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .footer-copy {
      font-size: 12px;
      color: #5a4830;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .navbar {
        gap: 10px;
      }

      .logo-sub {
        display: none;
      }

      .logo-name {
        font-size: 14px;
      }

      .nav-cta {
        padding: 9px 14px;
        font-size: 13px;
      }

      #hero {
        padding: 60px 20px 70px;
      }

      .hero-stats {
        gap: 24px;
        margin-top: 40px;
      }

      .kontakt-grid {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
      }

      .services-grid {
        grid-template-columns: 1fr 1fr;
      }

      .benefits-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .services-grid {
        grid-template-columns: 1fr;
      }

      .hero-btns {
        flex-direction:
