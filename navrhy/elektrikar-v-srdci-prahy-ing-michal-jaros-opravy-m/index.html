<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elektrikář Praha – Ing. Michal Jaroš | Opravy, montáže, revize</title>
<meta name="description" content="Profesionální elektrikář v Praze a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Ing. Michal Jaroš – rychle, spolehlivě, kvalitně.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5A800;
  --primary-dark: #D48F00;
  --primary-light: #FFD166;
  --dark: #0D0F14;
  --dark-2: #161A22;
  --dark-3: #1E2330;
  --dark-4: #252B3B;
  --text: #E8EAF0;
  --text-muted: #8B91A8;
  --white: #FFFFFF;
  --card-bg: #1A1F2E;
  --border: rgba(245, 168, 0, 0.15);
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --shadow-hover: 0 8px 40px rgba(245, 168, 0, 0.2);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img { max-width: 100%; }

.container {
  width: 100%;
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ========== BANNER ========== */
#proposal-banner {
  background: linear-gradient(135deg, #FF4D00, #ff7c47);
  color: white;
  text-align: center;
  padding: 12px 20px;
  font-size: 13px;
  font-family: system-ui;
  position: relative;
  z-index: 1000;
}

/* ========== HEADER / NAVBAR ========== */
header {
  position: sticky;
  top: 0;
  z-index: 900;
  background: rgba(13, 15, 20, 0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}

.navbar {
  max-width: 1160px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 2px 12px rgba(245, 168, 0, 0.35);
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--white);
  white-space: nowrap;
}

.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

.nav-links {
  display: none;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.22s ease;
  white-space: nowrap;
  font-family: inherit;
  border: none;
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  box-shadow: 0 2px 16px rgba(245, 168, 0, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(245, 168, 0, 0.45);
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
}

.btn-outline {
  background: transparent;
  color: var(--white);
  border: 2px solid rgba(255,255,255,0.25);
}

.btn-outline:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
}

.btn-lg {
  padding: 14px 28px;
  font-size: 16px;
  border-radius: var(--radius-sm);
}

.btn-phone {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 2px 12px rgba(245, 168, 0, 0.3);
  transition: all 0.22s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-phone:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 168, 0, 0.45);
}

/* ========== HERO ========== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #0A0C10 0%, #0F1520 40%, #1A1200 80%, #0D0F14 100%);
}

.hero-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.hero-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
}

.hero-glow-1 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(245,168,0,0.18) 0%, transparent 70%);
  top: -100px;
  right: -100px;
}

.hero-glow-2 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,168,0,0.08) 0%, transparent 70%);
  bottom: -50px;
  left: 10%;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 80px 20px;
  max-width: 900px;
  margin: 0 auto;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245, 168, 0, 0.12);
  border: 1px solid rgba(245, 168, 0, 0.3);
  color: var(--primary);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge-dot {
  width: 7px;
  height: 7px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 62px);
  font-weight: 900;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 22px;
  letter-spacing: -1px;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 36px;
  font-weight: 400;
  line-height: 1.6;
}

.hero-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 36px;
  margin-top: 56px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.hero-stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ========== SECTIONS ========== */
section {
  padding: 80px 0;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--primary);
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.7;
}

.text-center { text-align: center; }
.text-center .section-desc { margin: 0 auto; }

/* ========== SLUŽBY ========== */
#sluzby {
  background: var(--dark-2);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 48px;
}

.sluzba-karta {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.sluzba-karta:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245, 168, 0, 0.35);
}

.sluzba-karta:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: rgba(245, 168, 0, 0.1);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  border: 1px solid rgba(245, 168, 0, 0.15);
  transition: all 0.3s;
}

.sluzba-karta:hover .sluzba-icon {
  background: rgba(245, 168, 0, 0.18);
  transform: scale(1.08);
}

.sluzba-karta h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.sluzba-karta p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.sluzba-tag {
  display: inline-block;
  background: rgba(245,168,0,0.1);
  color: var(--primary);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 50px;
  margin-top: 14px;
  border: 1px solid rgba(245,168,0,0.2);
}

/* ========== PROČ MY ========== */
#proc-my {
  background: var(--dark);
}

.proc-my-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
  margin-top: 48px;
}

.proc-my-visual {
  background: var(--dark-3);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.proc-my-visual-icon {
  font-size: 72px;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 20px rgba(245,168,0,0.4));
}

.proc-my-visual-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.proc-my-visual-text {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

.proc-my-visual-glow {
  position: absolute;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(245,168,0,0.12) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.benefity-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 24px;
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: all 0.3s;
}

.benefit-item:hover {
  border-color: rgba(245,168,0,0.35);
  transform: translateX(6px);
  box-shadow: var(--shadow-hover);
}

.benefit-num {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(245,168,0,0.3);
}

.benefit-content h4 {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 6px;
}

.benefit-content p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

/* ========== RECENZE ========== */
#reference {
  background: var(--dark-2);
}

.recenze-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 48px;
}

.recenze-karta {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  transition: all 0.3s;
  position: relative;
}

.recenze-karta:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(245,168,0,0.3);
}

.recenze-hvezdy {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
  font-size: 16px;
}

.recenze-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.recenze-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  flex-shrink: 0;
}

.recenze-jmeno {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.recenze-info {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.recenze-quote {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 48px;
  color: rgba(245,168,0,0.12);
  font-family: Georgia, serif;
  line-height: 1;
  font-weight: 900;
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--dark);
}

.kontakt-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  gap: 40px;
  margin-top: 48px;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 22px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s;
}

.kontakt-item:hover {
  border-color: rgba(245,168,0,0.35);
  transform: translateX(4px);
}

.kontakt-item-icon {
  width: 48px;
  height: 48px;
  background: rgba(245,168,0,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(245,168,0,0.15);
}

.kontakt-item-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.kontakt-item-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
}

.kontakt-item-value a {
