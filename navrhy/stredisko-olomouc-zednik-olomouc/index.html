<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Středisko Olomouc – Profesionální zedník v Olomouci</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c0392b;
  --primary-dark: #96281b;
  --primary-light: #e74c3c;
  --accent: #e67e22;
  --dark: #1a1a1a;
  --dark2: #2c2c2c;
  --gray: #6b7280;
  --gray-light: #f4f4f4;
  --white: #ffffff;
  --text: #2d2d2d;
  --radius: 12px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26,26,26,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.1;
}

.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  letter-spacing: 0.5px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 15px rgba(192,57,43,0.4);
}

.nav-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(192,57,43,0.5);
}

/* ===== HERO ===== */
#hero {
  min-height: 92vh;
  background:
    linear-gradient(135deg, rgba(26,26,26,0.92) 0%, rgba(150,40,27,0.85) 60%, rgba(230,126,34,0.5) 100%),
    repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 20px
    ),
    linear-gradient(160deg, #1a1a1a 0%, #3d1a17 50%, #2c1810 100%);
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.hero-particles {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(230,126,34,0.4);
  border-radius: 50%;
}

.particle:nth-child(1) { top: 20%; left: 10%; width: 6px; height: 6px; }
.particle:nth-child(2) { top: 60%; left: 80%; width: 3px; height: 3px; }
.particle:nth-child(3) { top: 80%; left: 30%; width: 5px; height: 5px; }
.particle:nth-child(4) { top: 40%; left: 90%; width: 4px; height: 4px; }
.particle:nth-child(5) { top: 10%; left: 70%; width: 3px; height: 3px; }

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px;
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,126,34,0.2);
  border: 1px solid rgba(230,126,34,0.4);
  color: #f39c12;
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.hero-content h1 {
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2vw, 19px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 36px;
  font-weight: 400;
  max-width: 500px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 15px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 25px rgba(192,57,43,0.45);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(192,57,43,0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 28px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  border-color: var(--white);
  background: rgba(255,255,255,0.08);
  transform: translateY(-3px);
}

.hero-stats {
  display: flex;
  gap: 30px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-card {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 360px;
}

.hero-card-title {
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 20px;
}

.service-chip {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
  color: var(--white);
  font-size: 14px;
  font-weight: 500;
  transition: background 0.2s;
}

.service-chip:hover {
  background: rgba(192,57,43,0.2);
  border-color: rgba(192,57,43,0.3);
}

.chip-icon {
  font-size: 20px;
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ===== SEKCE OBECNĚ ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(192,57,43,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 16px;
  border: 1px solid rgba(192,57,43,0.2);
}

.section-title {
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 14px;
  line-height: 1.2;
  letter-spacing: -0.3px;
}

.section-desc {
  font-size: 17px;
  color: var(--gray);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.07);
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  transform: scaleX(0);
  transition: transform 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.13);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.card-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(192,57,43,0.12), rgba(230,126,34,0.12));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: background 0.3s;
}

.service-card:hover .card-icon {
  background: linear-gradient(135deg, rgba(192,57,43,0.2), rgba(230,126,34,0.2));
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.card-desc {
  font-size: 15px;
  color: var(--gray);
  line-height: 1.65;
}

.card-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  color: var(--primary);
  font-weight: 600;
  font-size: 14px;
  text-decoration: none;
  transition: gap 0.2s;
}

.card-link:hover {
  gap: 10px;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}

.benefit-card {
  display: flex;
  gap: 20px;
  padding: 28px;
  border-radius: var(--radius);
  border: 1px solid rgba(0,0,0,0.07);
  background: var(--white);
  box-shadow: 0 2px 15px rgba(0,0,0,0.05);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 35px rgba(0,0,0,0.1);
  border-color: rgba(192,57,43,0.2);
}

.benefit-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.benefit-content h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 8px;
}

.benefit-content p {
  font-size: 14px;
  color: var(--gray);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, #1a1a1a 0%, #2d1510 50%, #1a1a1a 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.6);
}

#reference .section-tag {
  background: rgba(230,126,34,0.2);
  color: #f39c12;
  border-color: rgba(230,126,34,0.3);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 1;
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: var(--radius);
  padding: 28px;
  transition: transform 0.25s, background 0.25s;
}

.review-card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.09);
}

.review-stars {
  color: #f39c12;
  font-size: 18px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.author-info h4 {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 2px;
}

.author-info span {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}

.quote-mark {
  font-size: 64px;
  color: rgba(192,57,43,0.3);
  line-height: 1;
  margin-bottom: -10px;
  font-family: Georgia, serif;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--gray-light);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.contact-info-block {
  background: var(--white);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.08);
}

.contact-info-block h3 {
  font-size: 24px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.contact-item:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.contact-icon {
  width: 46px;
  height: 46px;
