<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nátěry fasád Brno | Profesionální natěrač fasád</title>
<meta name="description" content="Profesionální nátěry fasád v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte +420703805843.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #E07B00;
  --primary-dark: #B86200;
  --primary-light: #F59E0B;
  --accent: #FCD34D;
  --dark: #1A1208;
  --dark2: #2D1F0A;
  --dark3: #3D2A0D;
  --text: #1C1410;
  --text-light: #6B5A45;
  --bg-light: #FFFBF5;
  --bg-section: #FFF7ED;
  --white: #FFFFFF;
  --border: #F3E0C8;
  --shadow: 0 4px 24px rgba(224,123,0,0.10);
  --shadow-hover: 0 8px 40px rgba(224,123,0,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg-light);
  line-height: 1.6;
  overflow-x: hidden;
}

/* BANNER */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* NAVBAR */
header {
  background: rgba(26, 18, 8, 0.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 999;
  border-bottom: 1px solid rgba(224,123,0,0.2);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
}

.nav-logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.nav-logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all 0.2s;
}

.nav-links a:hover {
  color: var(--white);
  background: rgba(224,123,0,0.15);
}

.nav-cta {
  background: linear-gradient(135deg, var(--primary), var(--primary-light)) !important;
  color: var(--white) !important;
  padding: 10px 20px !important;
  border-radius: var(--radius) !important;
  font-weight: 700 !important;
  font-size: 14px !important;
  transition: all 0.3s !important;
  white-space: nowrap;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(224,123,0,0.4) !important;
  background: none !important;
}

/* HERO */
#hero {
  background: linear-gradient(135deg, #1A1208 0%, #2D1F0A 30%, #3D2A0D 60%, #1A1208 100%);
  position: relative;
  overflow: hidden;
  padding: 80px 20px 90px;
  min-height: 85vh;
  display: flex;
  align-items: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 70% 60% at 80% 50%, rgba(224,123,0,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 20% 30%, rgba(245,158,11,0.10) 0%, transparent 60%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--bg-light));
  pointer-events: none;
}

.hero-pattern {
  position: absolute;
  inset: 0;
  background-image: 
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(224,123,0,0.025) 40px,
      rgba(224,123,0,0.025) 41px
    );
  pointer-events: none;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(224,123,0,0.15);
  border: 1px solid rgba(224,123,0,0.3);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 50px;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

.hero-content h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

.hero-content h1 span {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.75);
  margin-bottom: 36px;
  max-width: 540px;
  line-height: 1.7;
}

.hero-cta-group {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  transition: all 0.3s;
  box-shadow: 0 4px 24px rgba(224,123,0,0.35);
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 40px rgba(224,123,0,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  transition: all 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
  white-space: nowrap;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  margin-top: 44px;
  padding-top: 36px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-number {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

/* SECTIONS COMMON */
.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-label {
  display: inline-block;
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 1rem;
  color: var(--text-light);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.7;
}

/* SLUZBY */
#sluzby {
  padding: 96px 20px;
  background: var(--bg-light);
}

.sluzby-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
  border-color: rgba(224,123,0,0.2);
}

.sluzba-card:hover::before {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(224,123,0,0.12), rgba(245,158,11,0.08));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.sluzba-card:hover .sluzba-icon {
  transform: scale(1.08);
}

.sluzba-card h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.sluzba-card p {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.7;
}

/* PROC MY */
#proc-my {
  padding: 96px 20px;
  background: var(--bg-section);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(224,123,0,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.proc-my-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.proc-my-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  text-align: center;
  border: 1px solid var(--border);
}

.benefit-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}

.benefit-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  box-shadow: 0 6px 24px rgba(224,123,0,0.25);
}

.benefit-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.93rem;
  color: var(--text-light);
  line-height: 1.75;
}

/* REFERENCE */
#reference {
  padding: 96px 20px;
  background: var(--bg-light);
}

.reference-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.reference-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.recenze-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  transition: all 0.3s;
  position: relative;
}

.recenze-card::before {
  content: '"';
  position: absolute;
  top: 20px;
  right: 28px;
  font-size: 80px;
  color: rgba(224,123,0,0.08);
  font-family: Georgia, serif;
  line-height: 1;
  pointer-events: none;
}

.recenze-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-3px);
  border-color: rgba(224,123,0,0.2);
}

.recenze-hvezdy {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
}

.hvezda {
  color: var(--primary-light);
  font-size: 18px;
}

.recenze-text {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.8;
  margin-bottom: 24px;
  font-style: italic;
}

.recenze-autor {
  display: flex;
  align-items: center;
  gap: 12px;
}

.recenze-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.avatar-1 { background: linear-gradient(135deg, #E07B00, #F59E0B); }
.avatar-2 { background: linear-gradient(135deg, #B86200, #E07B00); }
.avatar-3 { background: linear-gradient(135deg, #F59E0B, #FCD34D); color: var(--dark); }

.recenze-autor-info strong {
  display: block;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--dark);
}

.recenze-autor-info span {
  font-size: 0.82rem;
  color: var(--text-light);
}

/* KONTAKT */
#kontakt {
  padding: 96px 20px;
  background: var(--bg-section);
}

.kontakt-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

.kontakt-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  box-shadow: var(--shadow);
}

.kontakt-card h3 {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.kontakt-item:last-child {
  border-bottom: none;
}

.kontakt-item-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, rgba(224,123,0,0.12), rgba(245,158,11,0.08));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.kontakt-item-content strong {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.kontakt-item-content a,
.kontakt-item-content span {
  font-size: 1rem;
  font-weight: 600;
  color: var(--dark);
  text-decoration: none;
  transition: color 0.2s;
}

.kontakt-item-content a:hover {
  color: var(--primary);
}

.mapa-placeholder {
  background: linear-gradient(135deg, #F3E0C8, #FDE5C5);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-light);
  font-size: 0.9rem;
  font-weight: 500;
}

.mapa-placeholder-icon {
  font-size: 40px;
  opacity: 0.6;
}

.kontakt-cta {
  background: linear-gradient(135deg, var(--dark), var(--dark2));
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  text-align: center;
  color: var(--white);
}

.kontakt-cta h3 {
  font-size: 1.5rem;
  font-weight: 800;
  margin-bottom: 12px;
}

.kontakt-cta p {
  color
