<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELPO – Elektro p. Svoboda | Elektrikář Liberec</title>
<meta name="description" content="Profesionální elektrikář v Liberci a okolí. Elektroinstalace, revize, hromosvod, fotovoltaika. Volejte +420 485 132 392">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #F5C400;
  --primary-dark: #D4A900;
  --primary-light: #FFF3B0;
  --dark: #0D1117;
  --dark2: #161B22;
  --dark3: #1F2937;
  --text: #E6EDF3;
  --text-muted: #8B949E;
  --white: #ffffff;
  --card-bg: #1C2333;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.65;
  font-size: 16px;
}

/* ── BANNER ── */
#proposal-banner a { text-decoration: underline; }

/* ── NAVBAR ── */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(245,196,0,0.15);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-main {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 10px 20px;
  border-radius: 8px;
  transition: background 0.2s, transform 0.15s;
  white-space: nowrap;
}

.nav-cta:hover { background: var(--primary-dark); transform: translateY(-1px); }

.nav-cta .icon { font-size: 1rem; }

/* ── HERO ── */
#hero {
  position: relative;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 20px;
  overflow: hidden;
  background:
    linear-gradient(160deg, rgba(13,17,23,0.97) 0%, rgba(22,27,34,0.92) 50%, rgba(13,17,23,0.97) 100%),
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(245,196,0,0.18) 0%, transparent 70%);
}

.hero-glow {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(245,196,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.hero-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 2;
  max-width: 820px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,196,0,0.12);
  border: 1px solid rgba(245,196,0,0.3);
  color: var(--primary);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

#hero h1 {
  font-size: clamp(2rem, 5.5vw, 3.6rem);
  font-weight: 800;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 22px;
  letter-spacing: -1px;
}

#hero h1 span {
  color: var(--primary);
  position: relative;
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 1rem;
  padding: 15px 30px;
  border-radius: var(--radius);
  transition: all 0.2s;
  box-shadow: 0 6px 24px rgba(245,196,0,0.35);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(245,196,0,0.45);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  padding: 15px 30px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.2s;
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: clamp(20px, 5vw, 60px);
  flex-wrap: wrap;
  padding-top: 40px;
  border-top: 1px solid rgba(255,255,255,0.07);
}

.stat {
  text-align: center;
}

.stat-num {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── SECTIONS COMMON ── */
section { padding: 90px 20px; }

.section-inner { max-width: 1200px; margin: 0 auto; }

.section-tag {
  display: inline-block;
  background: rgba(245,196,0,0.1);
  color: var(--primary);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid rgba(245,196,0,0.2);
}

.section-title {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 14px;
  line-height: 1.2;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.7;
}

.section-header { margin-bottom: 56px; }

/* ── SERVICES ── */
#sluzby { background: var(--dark2); }

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s;
}

.service-card:hover {
  border-color: rgba(245,196,0,0.25);
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.service-card:hover::before { transform: scaleX(1); }

.service-icon {
  width: 60px;
  height: 60px;
  background: rgba(245,196,0,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 22px;
  border: 1px solid rgba(245,196,0,0.15);
}

.service-card h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.service-card p {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.7;
}

.service-list {
  margin-top: 16px;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.service-list li {
  font-size: 0.85rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.service-list li::before {
  content: '✓';
  color: var(--primary);
  font-weight: 700;
  font-size: 0.8rem;
}

/* ── WHY US ── */
#proc-my { background: var(--dark); }

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
}

.benefit-card {
  background: linear-gradient(135deg, var(--dark2) 0%, var(--card-bg) 100%);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-4px);
  border-color: rgba(245,196,0,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.benefit-num {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(245,196,0,0.06);
  line-height: 1;
  pointer-events: none;
}

.benefit-icon {
  font-size: 2.8rem;
  margin-bottom: 20px;
  display: block;
}

.benefit-card h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ── REFERENCES ── */
#reference { background: var(--dark2); }

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 32px;
  transition: all 0.3s;
  position: relative;
}

.review-card:hover {
  border-color: rgba(245,196,0,0.2);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.review-quote {
  font-size: 3rem;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  opacity: 0.6;
  font-family: Georgia, serif;
}

.review-stars {
  color: var(--primary);
  font-size: 1rem;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.07);
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: var(--dark);
  font-size: 1rem;
  flex-shrink: 0;
}

.review-name {
  font-weight: 600;
  color: var(--white);
  font-size: 0.95rem;
}

.review-location {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* ── KONTAKT ── */
#kontakt { background: var(--dark); }

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

@media (max-width: 768px) {
  .contact-grid { grid-template-columns: 1fr; }
}

.contact-cards {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.contact-item {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  transition: border-color 0.2s, transform 0.2s;
}

.contact-item:hover {
  border-color: rgba(245,196,0,0.25);
  transform: translateX(4px);
}

.contact-icon-wrap {
  width: 48px;
  height: 48px;
  background: rgba(245,196,0,0.1);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
  border: 1px solid rgba(245,196,0,0.15);
}

.contact-label {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 5px;
  font-weight: 600;
}

.contact-value {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--white);
}

.contact-value a {
  color: var(--primary);
  text-decoration: none;
  transition: opacity 0.2s;
}

.contact-value a:hover { opacity: 0.8; text-decoration: underline; }

.contact-value .muted {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
}

/* ── MAP PLACEHOLDER ── */
.map-placeholder {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
}

.map-inner {
  background: var(--dark2);
  height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.map-inner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-pin {
  font-size: 3.5rem;
  position: relative;
  z-index: 2;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.map-text {
  position: relative;
  z-index: 2;
  text-align: center;
}

.map-text strong {
  display: block;
  color: var(--white);
  font-size: 1.1rem;
  margin-bottom: 4px;
}

.map-text span {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.map-cta {
  position: relative;
  z-index: 2;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--dark);
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
  padding: 11px 22px;
  border-radius: 8px;
  margin-top: 8px;
  transition: background 0.2s;
}

.map-cta:hover { background: var(--primary-dark); }

/* ── CTA BANNER ── */
.cta-banner {
  background: linear-gradient(135deg, #1a1a00 0%, #2a2000 50%, #1a1a00 100%);
  border-top: 1px solid rgba(245,196,0,0.15);
  border-bottom: 1px solid rgba(245,196,0,0.15);
  padding: 70px 20px;
  text-align: center;
}

.cta-banner-inner {
  max-width: 700px;
  margin: 0 auto;
}

.cta-banner h2 {
  font-size: clamp(1.7rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--white);
  margin-bottom: 14px;
  line-height: 1.2;
}

.cta-banner p {
  color: var(--text-muted);
  margin-bottom: 36px;
  font-size: 1.05rem;
}

.cta-banner .btn-primary {
  font-size: 1.1rem;
  padding: 18px 38px;
}

/* ── FOOTER ── */
footer {
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1200px;
