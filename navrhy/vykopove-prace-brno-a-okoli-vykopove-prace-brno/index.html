<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Výkopové práce Brno a okolí | Profesionální výkopové služby</title>
  <meta name="description" content="Profesionální výkopové práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 778 536 469.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E8890C;
      --primary-dark: #C4700A;
      --primary-light: #F5A836;
      --dark: #1A1A1A;
      --dark-2: #252525;
      --dark-3: #2F2F2F;
      --text: #333333;
      --text-light: #666666;
      --white: #FFFFFF;
      --light-bg: #F7F4F0;
      --card-bg: #FFFFFF;
      --border: #E5E0D8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,137,12,0.18);
      --radius: 14px;
      --radius-sm: 8px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ── NAVBAR ── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-text span:first-child {
      font-size: 14px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .nav-logo-text span:last-child {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 15px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-cta:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .nav-cta-icon {
      font-size: 16px;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #1A1008 0%, #2C1E06 30%, #3D2A08 60%, #1A1A1A 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 400px at 50% 0%, rgba(232,137,12,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 600px 600px at 80% 100%, rgba(232,137,12,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), var(--primary), transparent);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,137,12,0.15);
      border: 1px solid rgba(232,137,12,0.35);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    #hero h1 {
      font-size: clamp(28px, 5.5vw, 56px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--primary);
    }

    .hero-sub {
      font-size: clamp(15px, 2vw, 19px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(232,137,12,0.40);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,137,12,0.50);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.10);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: background 0.2s, transform 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.17);
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.45);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
      flex-shrink: 0;
    }

    /* ── SECTIONS SHARED ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(232,137,12,0.12);
      color: var(--primary-dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ── SERVICES ── */
    #sluzby {
      background: var(--light-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 36px 28px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,137,12,0.30);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(232,137,12,0.15), rgba(245,168,54,0.10));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      border: 1px solid rgba(232,137,12,0.20);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── WHY US ── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 700px 500px at 100% 50%, rgba(232,137,12,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-label {
      background: rgba(232,137,12,0.18);
      color: var(--primary-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.55);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(232,137,12,0.07);
      border-color: rgba(232,137,12,0.25);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 48px;
      font-weight: 900;
      color: rgba(232,137,12,0.20);
      line-height: 1;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    .benefit-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: var(--primary-light);
      font-weight: 600;
    }

    /* ── REVIEWS ── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--light-bg);
      border-radius: var(--radius);
      padding: 32px 28px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      opacity: 0.6;
    }

    .review-stars {
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 24px;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--dark);
      font-size: 15px;
    }

    .review-job {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ── CONTACT ── */
    #kontakt {
      background: var(--light-bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .contact-info h3 {
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(232,137,12,0.30);
      box-shadow: 0 4px 16px rgba(232,137,12,0.10);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-body {}

    .contact-item-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
    }

    .contact-item-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item-value a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,137,12,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,137,12,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-icon {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-light);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .map-sub {
      font-size: 13px;
      color: var(--text-light);
      opacity: 0.7;
      position: relative;
      z-index: 1;
    }

    .contact-big-cta {
      margin-top: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
    }

    .contact-big-cta p {
      color: rgba(255,255,255,0.80);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .contact-big-cta a {
      font-size: 30px;
      font-weight: 900;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.5px;
      transition: opacity 0.2s;
      display: block;
    }

    .contact-big-cta a:hover {
      opacity: 0.85;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
