<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malířství Plzeň | Malířské a natěračské práce bytů, domů i firem</title>
  <meta name="description" content="Profesionální malíř natěrač v Plzni a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, stropy a SDK. Volejte +420775209774">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #E8A020;
      --primary-dark: #c4841a;
      --primary-light: #f5c060;
      --dark: #1a1a2e;
      --darker: #0f0f1a;
      --text: #2d2d2d;
      --text-light: #666;
      --white: #ffffff;
      --gray-bg: #f8f7f4;
      --card-bg: #ffffff;
      --border: #e8e8e8;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAV ===== */
    header {
      background: var(--darker);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 400;
      line-height: 1.2;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(232, 160, 32, 0.3);
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(232, 160, 32, 0.5);
    }

    .nav-cta span {
      font-size: 18px;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1208 0%, #2d1f04 30%, #1a1a2e 70%, #0f0f20 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      min-height: 580px;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232, 160, 32, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232, 160, 32, 0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232, 160, 32, 0.15);
      border: 1px solid rgba(232, 160, 32, 0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 800px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--primary);
    }

    .hero-perex {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.75);
      max-width: 600px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 25px rgba(232, 160, 32, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(232, 160, 32, 0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 14px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 400;
    }

    /* ===== SEKCE OBECNÉ ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232, 160, 32, 0.12);
      color: var(--primary-dark);
      border: 1px solid rgba(232, 160, 32, 0.25);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--darker);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .section-sub {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      margin-bottom: 50px;
      line-height: 1.6;
    }

    /* ===== SLUŽBY ===== */
    #sluzby {
      background: var(--gray-bg);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      border-color: rgba(232, 160, 32, 0.3);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .karta-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(232, 160, 32, 0.12), rgba(245, 192, 96, 0.2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .karta-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--darker);
      margin-bottom: 10px;
    }

    .karta-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .karta-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: gap 0.2s ease;
    }

    .karta-link:hover {
      gap: 10px;
    }

    /* ===== PROČ MY ===== */
    #proc-my {
      background: var(--white);
    }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      margin-top: 10px;
    }

    .proc-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .proc-number {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .proc-content {}

    .proc-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--darker);
      margin-bottom: 8px;
    }

    .proc-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: linear-gradient(135deg, #1a1208 0%, #2d1f04 50%, #1a1a2e 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232, 160, 32, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    #reference .section-tag {
      background: rgba(232, 160, 32, 0.15);
      color: var(--primary-light);
      border-color: rgba(232, 160, 32, 0.25);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-sub {
      color: rgba(255,255,255,0.6);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px 26px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .recenze-karta:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-4px);
      border-color: rgba(232, 160, 32, 0.3);
    }

    .hvezdicky {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .hvezdicky span {
      font-size: 18px;
      color: var(--primary);
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      line-height: 1.7;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .autor-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .autor-info {}

    .autor-jmeno {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.3;
    }

    .autor-lokalita {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--gray-bg);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {}

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
      padding: 20px;
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .kontakt-item:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      border-color: rgba(232, 160, 32, 0.3);
    }

    .kontakt-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(232, 160, 32, 0.12), rgba(245, 192, 96, 0.2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-detail {}

    .kontakt-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--darker);
    }

    .kontakt-value a {
      color: var(--primary-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .kontakt-value a:hover {
      color: var(--primary);
    }

    .kontakt-value-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #e8e4dc, #f0ece4);
      border-radius: 16px;
      height: 100%;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(232, 160, 32, 0.3);
      position: relative;
      overflow: hidden;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(0deg, rgba(232, 160, 32, 0.04) 0px, rgba(232, 160, 32, 0.04) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, rgba(232, 160, 32, 0.04) 0px, rgba(232, 160, 32, 0.04) 1px, transparent 1px, transparent 40px);
    }

    .mapa-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .mapa-pin {
      font-size: 50px;
      display: block;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .mapa-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--darker);
    }

    .mapa-sub {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 6px;
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--darker);
      color: rgba(255,255,255,0.5);
      padding: 40px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap:
