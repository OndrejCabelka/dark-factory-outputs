<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUO plus – Zemní práce Brno | Kontejnerová doprava</title>
  <meta name="description" content="Profesionální výkopové práce, zemní práce a kontejnerová doprava v Brně a okolí. Rychlý servis, kvalita garantována, přijatelné ceny.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8820c;
      --primary-dark: #c46a08;
      --primary-light: #f5a84a;
      --dark: #1a1a1a;
      --dark2: #2b2b2b;
      --dark3: #3a3a3a;
      --text: #1f1f1f;
      --text-muted: #6b7280;
      --text-light: #9ca3af;
      --white: #ffffff;
      --gray-light: #f4f5f7;
      --gray-border: #e5e7eb;
      --hero-bg1: #1a120a;
      --hero-bg2: #2e1c0a;
      --hero-accent: #e8820c;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,130,12,0.18);
      --transition: 0.22s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(26, 18, 10, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232,130,12,0.15);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary-light);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: var(--radius);
      transition: all var(--transition);
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(232,130,12,0.30);
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,130,12,0.45);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1a120a 0%, #2e1c0a 40%, #1a1400 70%, #0f0f0f 100%);
      position: relative;
      overflow: hidden;
      padding: 100px 24px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,130,12,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(232,130,12,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--primary-light), var(--primary), transparent);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(232,130,12,0.15);
      border: 1px solid rgba(232,130,12,0.35);
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1.5px;
      margin-bottom: 22px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      background: linear-gradient(90deg, var(--primary-light), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #c5bfba;
      max-width: 600px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.65;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 60px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: var(--radius);
      transition: all var(--transition);
      box-shadow: 0 4px 24px rgba(232,130,12,0.40);
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(232,130,12,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 15px 32px;
      border-radius: var(--radius);
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: all var(--transition);
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      letter-spacing: -1px;
    }

    .hero-stat-label {
      font-size: 12px;
      font-weight: 500;
      color: #a09890;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }

    /* ─── SECTION COMMON ─── */
    section {
      padding: 90px 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(232,130,12,0.12);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      border: 1px solid rgba(232,130,12,0.2);
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--gray-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-border);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity var(--transition);
    }

    .sluzba-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,130,12,0.25);
    }

    .sluzba-card:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, rgba(232,130,12,0.15), rgba(232,130,12,0.05));
      border: 1.5px solid rgba(232,130,12,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: all var(--transition);
    }

    .sluzba-card:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(232,130,12,0.25), rgba(232,130,12,0.10));
      transform: scale(1.08);
    }

    .sluzba-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .sluzba-desc {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .sluzba-list {
      list-style: none;
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sluzba-list li {
      font-size: 0.875rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sluzba-list li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .proc-my-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 28px;
      margin-top: 0;
    }

    .benefit-card {
      background: linear-gradient(135deg, #fffaf5, #fff8f0);
      border: 1.5px solid rgba(232,130,12,0.15);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: all var(--transition);
      position: relative;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,130,12,0.35);
    }

    .benefit-num {
      font-size: 3rem;
      font-weight: 900;
      color: rgba(232,130,12,0.15);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -2px;
    }

    .benefit-icon {
      font-size: 2rem;
      margin-bottom: 14px;
      display: block;
    }

    .benefit-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .benefit-desc {
      font-size: 0.94rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, #1a120a 0%, #2a1a08 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(232,130,12,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(232,130,12,0.20);
      border-color: rgba(232,130,12,0.30);
      color: var(--primary-light);
    }

    #reference .section-desc {
      color: #a09890;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 30px 26px;
      backdrop-filter: blur(8px);
      transition: all var(--transition);
    }

    .review-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(232,130,12,0.25);
      transform: translateY(-3px);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .review-stars span {
      font-size: 18px;
      color: var(--primary-light);
    }

    .review-text {
      font-size: 0.95rem;
      color: #d4cdc8;
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 0.95rem;
    }

    .review-location {
      font-size: 0.8rem;
      color: #7d7470;
      margin-top: 1px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: all var(--transition);
    }

    .kontakt-item:hover {
      border-color: rgba(232,130,12,0.30);
      box-shadow: var(--shadow-hover);
      transform: translateX(3px);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(232,130,12,0.15), rgba(232,130,12,0.05));
      border: 1.5px solid rgba(232,130,12,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-body {
      flex: 1;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-val {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: color var(--transition);
    }

    .kontakt-item-val:hover {
      color: var(--primary);
    }

    a.kontakt-item-val {
      color: var(--primary-dark);
    }

    a.kontakt-item-val:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #2b1e10, #1e1408);
      border-radius: var(--radius);
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border: 2px dashed rgba(232,130,
