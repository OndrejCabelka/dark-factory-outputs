<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zedník Olomouc – Profesionální zednické práce</title>
  <meta name="description" content="Profesionální zednické práce v Olomouci a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte 604 511 190.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-dark: #a36a05;
      --primary-light: #f0a830;
      --dark: #1a1a1a;
      --dark2: #2a2520;
      --dark3: #3a3028;
      --text: #1a1a1a;
      --text-light: #6b6560;
      --white: #ffffff;
      --bg-light: #faf8f5;
      --bg-card: #ffffff;
      --border: #e8e0d5;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(200,134,10,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--dark2);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1208 0%, #2e2010 35%, #3d2b10 65%, #1a1208 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 80% 50%, rgba(200,134,10,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(200,134,10,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🧱';
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 260px;
      opacity: 0.05;
      pointer-events: none;
      line-height: 1;
    }

    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(200,134,10,0.20);
      border: 1px solid rgba(200,134,10,0.40);
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.78);
      max-width: 600px;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 17px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,134,10,0.40);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,134,10,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.10);
      border: 2px solid rgba(255,255,255,0.30);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 17px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.55);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 52px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat strong {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 13px;
      color: rgba(255,255,255,0.60);
      margin-top: 4px;
    }

    /* ===== SECTIONS GENERAL ===== */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      background: rgba(200,134,10,0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 14px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      margin-bottom: 48px;
      line-height: 1.65;
    }

    /* ===== SLUZBY ===== */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary-light);
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(240,168,48,0.18));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .sluzba-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== PROC MY ===== */
    #proc-my {
      background: var(--dark2);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 60% at 90% 50%, rgba(200,134,10,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-label {
      background: rgba(200,134,10,0.20);
      color: var(--primary-light);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 36px 30px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(200,134,10,0.10);
      border-color: rgba(200,134,10,0.35);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 44px;
      font-weight: 800;
      color: var(--primary);
      opacity: 0.50;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .benefit-card p {
      font-size: 15px;
      color: rgba(255,255,255,0.68);
      line-height: 1.65;
    }

    /* ===== REFERENCE ===== */
    #reference {
      background: var(--bg-light);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .stars {
      color: var(--primary);
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .recenze-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.70;
      margin-bottom: 22px;
      font-style: italic;
    }

    .recenze-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .author-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .author-info span {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ===== KONTAKT ===== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 24px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow-hover);
    }

    .kontakt-item-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .kontakt-item-text a,
    .kontakt-item-text span {
      font-size: 17px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
    }

    .kontakt-item-text a:hover {
      color: var(--primary);
    }

    .mapa-placeholder {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .mapa-placeholder iframe {
      width: 100%;
      height: 340px;
      border: none;
      display: block;
    }

    .mapa-placeholder .mapa-inner {
      background: linear-gradient(135deg, #2a2520, #3a3028);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .mapa-inner .mapa-icon {
      font-size: 56px;
    }

    .mapa-inner p {
      color: rgba(255,255,255,0.80);
      font-size: 16px;
      font-weight: 600;
    }

    .mapa-inner span {
      color: var(--primary-light);
      font-size: 14px;
    }

    /* ===== CTA BANNER ===== */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
      padding: 60px 20px;
      text-align: center;
    }

    .cta-banner h2 {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
    }

    .cta-banner p {
      font-size: 17px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 30px;
    }

    .cta-btn-white {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      color: var(--primary-dark);
      text-decoration: none;
      padding: 15px 34px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.20);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cta-btn-white:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 36px rgba(0,0,0,0.30);
    }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      padding: 40px 20px;
      text-align: center;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .footer-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--primary-light);
    }

    .footer-divider {
      height: 1px;
      background: rgba(255,255,255,0.08
