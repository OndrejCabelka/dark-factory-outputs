<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Říha Aleš – Klempíři Brno | Oplechování, okapy, střechy</title>
<meta name="description" content="Profesionální klempířské práce v Brně a okolí. Oplechování střech, okapy, svody, vikýře, střešní okna. Volejte 737 989 136.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fbd;
  --primary-dark: #1259a0;
  --primary-light: #2d87d8;
  --accent: #e8a020;
  --dark: #0d1b2a;
  --dark2: #142233;
  --dark3: #1c2e42;
  --text: #1a2535;
  --text-muted: #5a6a7e;
  --bg-light: #f4f8fd;
  --bg-card: #ffffff;
  --border: #dde8f4;
  --white: #ffffff;
  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 4px 24px rgba(26,111,189,0.10);
  --shadow-hover: 0 8px 36px rgba(26,111,189,0.18);
  --transition: all 0.28s cubic-bezier(.4,0,.2,1);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 900;
  background: rgba(13,27,42,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.01em;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  letter-spacing: 0.01em;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-nav-phone {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white) !important;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 600 !important;
  font-size: 14px !important;
  text-decoration: none;
  transition: var(--transition);
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(26,111,189,0.35);
}

.btn-nav-phone:hover {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  box-shadow: 0 4px 20px rgba(26,111,189,0.5);
  transform: translateY(-1px);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 88vh;
  background:
    linear-gradient(160deg, rgba(10,20,36,0.93) 0%, rgba(18,40,70,0.88) 50%, rgba(13,27,42,0.95) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(26,111,189,0.04) 40px,
      rgba(26,111,189,0.04) 80px
    );
  background-color: #0d1b2a;
  display: flex;
  align-items: center;
  padding: 80px 20px 80px;
  overflow: hidden;
}

.hero-shapes {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.hero-shape-1 {
  position: absolute;
  top: -120px;
  right: -120px;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(26,111,189,0.18) 0%, transparent 70%);
}

.hero-shape-2 {
  position: absolute;
  bottom: -80px;
  left: -80px;
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
}

.hero-lines {
  position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  background-image:
    linear-gradient(rgba(26,111,189,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,111,189,0.07) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,111,189,0.2);
  border: 1px solid rgba(26,111,189,0.4);
  color: #7ec4f8;
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.hero-badge-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7ec4f8;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(32px, 6vw, 60px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 24px;
  letter-spacing: -0.02em;
  max-width: 720px;
}

#hero h1 span {
  background: linear-gradient(135deg, #4faee8, #7ec4f8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  padding: 15px 32px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: var(--transition);
  box-shadow: 0 4px 24px rgba(26,111,189,0.45);
  letter-spacing: 0.01em;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(26,111,189,0.6);
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.22);
  color: var(--white);
  padding: 15px 32px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: var(--transition);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
}

.hero-stat-num span {
  color: var(--accent);
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

.hero-stat-divider {
  width: 1px;
  background: rgba(255,255,255,0.12);
  align-self: stretch;
}

/* ===== SECTIONS COMMON ===== */
.section-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,111,189,0.1);
  color: var(--primary);
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.section-title {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.6;
}

.section-header {
  margin-bottom: 56px;
}

/* ===== SERVICES ===== */
#sluzby {
  padding: 96px 20px;
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: var(--transition);
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,111,189,0.2);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(26,111,189,0.12), rgba(26,111,189,0.06));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 24px;
  transition: var(--transition);
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(26,111,189,0.2), rgba(26,111,189,0.1));
  transform: scale(1.05);
}

.service-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.service-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-card-tag {
  display: inline-block;
  margin-top: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ===== PROC MY ===== */
#proc-my {
  padding: 96px 20px;
  background: var(--dark);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(26,111,189,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,111,189,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

.proc-my-inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

#proc-my .section-tag {
  background: rgba(26,111,189,0.2);
  color: #7ec4f8;
}

#proc-my .section-title {
  color: var(--white);
}

#proc-my .section-desc {
  color: rgba(255,255,255,0.6);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, rgba(26,111,189,0.08), transparent);
  opacity: 0;
  transition: var(--transition);
}

.benefit-card:hover {
  border-color: rgba(26,111,189,0.35);
  background: rgba(255,255,255,0.06);
  transform: translateY(-4px);
}

.benefit-card:hover::after {
  opacity: 1;
}

.benefit-number {
  font-size: 48px;
  font-weight: 800;
  color: rgba(26,111,189,0.25);
  line-height: 1;
  margin-bottom: 20px;
  letter-spacing: -0.03em;
}

.benefit-icon-wrap {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 24px;
  box-shadow: 0 4px 20px rgba(26,111,189,0.4);
  position: relative;
  z-index: 1;
}

.benefit-card h3 {
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 14px;
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.benefit-card p {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  line-height: 1.65;
  position: relative;
  z-index: 1;
}

/* ===== REFERENCE ===== */
#reference {
  padding: 96px 20px;
  background: var(--bg-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.review-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: var(--transition);
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 48px;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
  opacity: 0.3;
  font-family: Georgia, serif;
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 18px;
}

.review-stars span {
  color: var(--accent);
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}

.review-city {
  font-size: 13px;
  color: var(--text-muted);
}

/* ===== KONTAKT ===== */
#kontakt {
  padding: 96px 20px;
  background: var(--white);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.kontakt-item {
  display: flex;
  align-items: flex
