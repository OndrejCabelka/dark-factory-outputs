<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servis výtahů Praha | Profesionální opravy a údržba</title>
  <meta name="description" content="Profesionální servis výtahů v Praze a okolí. Rychlý zásah, kvalita garantována, přijatelné ceny. Volejte +420602265662">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a56db;
      --primary-dark: #1341b0;
      --primary-light: #3b72f2;
      --accent: #f59e0b;
      --dark: #0f172a;
      --dark2: #1e293b;
      --dark3: #334155;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f1f5f9;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(26,86,219,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-light);
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 4px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }

    .nav-links a:hover {
      background: var(--bg-light);
      color: var(--primary);
    }

    .btn-call-header {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .btn-call-header:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-call-header span.icon {
      font-size: 15px;
    }

    /* HERO */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0f2355 40%, #1a3a7a 70%, #1a56db 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(59,114,242,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(26,86,219,0.2) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--white);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .hero-badge::before {
      content: '✓';
      background: var(--accent);
      color: var(--dark);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
    }

    .hero-inner {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px);
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      margin: 0 auto 36px;
      line-height: 1.55;
      font-weight: 400;
    }

    .hero-cta {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--dark);
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,158,11,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
      text-decoration: none;
      padding: 13px 26px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      padding-top: 20px;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* SECTIONS COMMON */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(26,86,219,0.08);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.6;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* SERVICES */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,86,219,0.2);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,86,219,0.1), rgba(59,114,242,0.15));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      letter-spacing: -0.2px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
      flex-grow: 1;
    }

    .service-tag {
      display: inline-block;
      background: rgba(26,86,219,0.08);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      align-self: flex-start;
    }

    /* WHY US */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .benefit-content h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }

    .benefit-content p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* REVIEWS */
    #reference {
      background: linear-gradient(135deg, #0f2355, #1a3a7a);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 80% at 0% 50%, rgba(59,114,242,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 80% at 100% 50%, rgba(26,86,219,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.15);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.25s, background 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.11);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.65;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(255,255,255,0.15);
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
      font-style: normal;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 14px;
    }

    .review-location {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .review-verified {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    /* CONTACT */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .contact-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .contact-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.2px;
    }

    .contact-card h3 span.cicon {
      font-size: 22px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .contact-item:last-child {
      border-bottom: none;
    }

    .contact-item-icon {
      width: 38px;
      height: 38px;
      background: rgba(26,86,219,0.08);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .contact-item-content label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 3px;
    }

    .contact-item-content a,
    .contact-item-content span {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
      display: block;
    }

    .contact-item-content a:hover {
      color: var(--primary);
    }

    .contact-item-content a.phone {
      color: var(--primary);
      font-size: 18px;
      font-weight: 800;
    }

    .contact-item-content a.phone:hover {
      color: var(--primary-dark);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8eef8, #d0dcef);
      border-radius: var(--radius);
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 2px dashed rgba(26,86,219,0.2);
      margin-top: 0;
    }

    .map-placeholder span.map-icon {
      font-size: 40px;
    }

    .map-placeholder p {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    .map-placeholder small {
      font-size: 12px;
      color: var(--text-light);
    }

    .cta-strip {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius:
