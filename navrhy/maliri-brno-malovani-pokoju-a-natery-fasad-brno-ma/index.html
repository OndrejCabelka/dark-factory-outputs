<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malíři Brno – Malování pokojů a nátěry fasád | Brno</title>
<meta name="description" content="Profesionální malíři a natěrači fasád v Brně. Rychlý servis, kvalita garantována, přijatelné ceny. Volejte 606 469 316.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e85d04;
  --primary-dark: #c44d00;
  --primary-light: #f48c42;
  --secondary: #ffd166;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --text: #2d2d2d;
  --text-light: #6b7280;
  --white: #ffffff;
  --bg-light: #fafafa;
  --bg-section: #f5f5f5;
  --border: #e5e7eb;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 40px rgba(232,93,4,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26, 26, 46, 0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.3px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 12px rgba(232,93,4,0.35);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(232,93,4,0.50);
}

.nav-cta span {
  font-size: 17px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
  overflow: hidden;
  padding: 80px 20px;
}

.hero-bg-shapes {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.hero-shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.07;
}

.hero-shape-1 {
  width: 600px;
  height: 600px;
  background: var(--primary);
  top: -200px;
  right: -150px;
}

.hero-shape-2 {
  width: 400px;
  height: 400px;
  background: var(--secondary);
  bottom: -150px;
  left: -100px;
}

.hero-shape-3 {
  width: 200px;
  height: 200px;
  background: var(--primary-light);
  top: 50%;
  left: 40%;
  opacity: 0.05;
}

.hero-paint-deco {
  position: absolute;
  top: 0;
  right: 0;
  width: 40%;
  height: 100%;
  background: linear-gradient(135deg, transparent 50%, rgba(232,93,4,0.06) 100%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,93,4,0.15);
  border: 1px solid rgba(232,93,4,0.4);
  color: var(--primary-light);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.hero-content h1 {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

.hero-content h1 .highlight {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 40px;
  line-height: 1.6;
  max-width: 580px;
  margin-left: auto;
  margin-right: auto;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 4px 24px rgba(232,93,4,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(232,93,4,0.60);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.10);
  border: 1.5px solid rgba(255,255,255,0.30);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  justify-content: center;
  flex-wrap: wrap;
}

.stat {
  text-align: center;
}

.stat-number {
  font-size: 32px;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
}

.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.35);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent);
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: linear-gradient(135deg, rgba(232,93,4,0.12), rgba(244,140,66,0.12));
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border: 1px solid rgba(232,93,4,0.20);
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.section-desc {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

.text-center {
  text-align: center;
}

.text-center .section-desc {
  margin-left: auto;
  margin-right: auto;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--bg-section);
}

.services-header {
  margin-bottom: 52px;
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 560px) {
  .services-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 900px) {
  .services-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  transition: transform 0.25s, box-shadow 0.25s;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, rgba(232,93,4,0.10), rgba(244,140,66,0.15));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  transition: transform 0.25s;
}

.service-card:hover .service-icon {
  transform: scale(1.08);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  line-height: 1.3;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--white);
}

.why-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  gap: 60px;
  align-items: center;
}

@media (min-width: 860px) {
  .why-wrapper {
    grid-template-columns: 1fr 1fr;
    gap: 80px;
  }
}

.why-visual {
  position: relative;
  display: flex;
  justify-content: center;
}

.why-visual-inner {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1;
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.20);
}

.why-visual-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 30% 30%, rgba(232,93,4,0.15) 0%, transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,209,102,0.08) 0%, transparent 60%);
}

.why-center-icon {
  font-size: 80px;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 4px 20px rgba(232,93,4,0.4));
}

.why-badge-float {
  position: absolute;
  background: var(--white);
  border-radius: var(--radius);
  padding: 12px 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 3;
}

.why-badge-float.top-right {
  top: 24px;
  right: -10px;
}

.why-badge-float.bottom-left {
  bottom: 24px;
  left: -10px;
}

.why-badge-icon {
  font-size: 22px;
}

.why-badge-text {
  font-size: 12px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.2;
}

.why-badge-sub {
  font-size: 11px;
  color: var(--text-light);
  font-weight: 500;
}

.benefits-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin-top: 36px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.benefit-num {
  width: 46px;
  height: 46px;
  min-width: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  font-size: 18px;
  font-weight: 800;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.benefit-text h4 {
  font-size: 17px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 4px;
}

.benefit-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== REVIEWS ===== */
#reference {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
  padding: 80px 20px;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.60);
}

#reference .section-label {
  background: rgba(232,93,4,0.20);
  border-color: rgba(232,93,4,0.35);
  color: var(--primary-light);
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  margin-top: 52px;
}

@media (min-width: 700px) {
  .reviews-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 1000px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  transition: background 0.25s, transform 0.25s;
}

.review-card:hover {
  background: rgba(255,255,255,0.10);
  transform: translateY(-4px);
}

.review-stars {
  color: var(--secondary);
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.80);
  line-height: 1.70;
  margin-bottom: 22px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
  line-height: 1.2;
}

.review-location {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 500;
}

/* ===== CONTACT ===== */
#kontakt {
  background: var(--bg-section);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
}

@media (min-width: 860px) {
  .contact-wrapper {
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: start;
  }
}

.contact-info-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.contact-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 28px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}

.contact-item:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.contact-item-icon {
  width: 50px;
  height: 50px;
  min-width: 50px;
  background: linear-gradient(135deg
