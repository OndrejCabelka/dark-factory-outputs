<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokrývačství Duda | Krytiny-střechy.cz – Opava</title>
  <meta name="description" content="Profesionální pokrývač v Opavě a okolí. Pokládka krytiny, opravy střech, tepelná izolace, vikýře. Volejte 608 342 893.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #962d22;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2c2c2c;
      --text-light: #666;
      --white: #ffffff;
      --gray-bg: #f8f8f8;
      --gray-light: #ececec;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(192,57,43,0.18);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      background: var(--white);
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .logo-main {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--text-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    .nav-cta {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 0.9rem !important;
      transition: background 0.2s, transform 0.15s !important;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .logo-main {
        font-size: 1rem;
      }
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #8B1A1A 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,126,34,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .hero-roof-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
      filter: drop-shadow(0 4px 16px rgba(192,57,43,0.5));
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.25);
      border: 1px solid rgba(192,57,43,0.5);
      color: #ffb3ab;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 18px;
      position: relative;
      letter-spacing: -0.5px;
    }

    #hero h1 span {
      color: #ff8a75;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.80);
      max-width: 600px;
      margin: 0 auto 36px;
      font-weight: 400;
      position: relative;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      margin-bottom: 48px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: #ff8a75;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    .hero-stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      align-self: stretch;
    }

    @media (max-width: 480px) {
      .hero-stat-divider { display: none; }
    }

    /* ===== SECTION COMMON ===== */
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-tag {
      display: inline-block;
      background: rgba(192,57,43,0.1);
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .section-header p {
      color: var(--text-light);
      font-size: 1rem;
      max-width: 540px;
      margin: 0 auto;
    }

    .section-divider {
      width: 56px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
      margin: 14px auto 0;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 80px 20px;
      background: var(--gray-bg);
    }

    .services-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 26px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.1);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.08));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 18px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 80px 20px;
      background: var(--white);
    }

    .benefits-wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding: 28px;
      background: var(--gray-bg);
      border-radius: var(--radius);
      border: 1px solid var(--gray-light);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon-wrap {
      width: 52px;
      height: 52px;
      min-width: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 16px rgba(192,57,43,0.3);
    }

    .benefit-body h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 7px;
    }

    .benefit-body p {
      font-size: 0.88rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REVIEWS ===== */
    #reference {
      padding: 80px 20px;
      background: linear-gradient(135deg, var(--dark) 0%, #2c1810 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(192,57,43,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.1);
      color: #ffb3ab;
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      position: relative;
    }

    .review-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 30px 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, background 0.2s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.1);
    }

    .review-stars {
      color: #f39c12;
      font-size: 1.1rem;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      color: rgba(255,255,255,0.82);
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .av1 { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .av2 { background: linear-gradient(135deg, #2980b9, #3498db); }
    .av3 { background: linear-gradient(135deg, #27ae60, #2ecc71); }

    .review-author-info strong {
      display: block;
      color: var(--white);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .review-author-info span {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
    }

    /* ===== CONTACT ===== */
    #kontakt {
      padding: 80px 20px;
      background: var(--gray-bg);
    }

    .contact-wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-wrap {
        grid-template-columns: 1fr;
      }
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }

    .contact-item:hover {
      transform: translateY(-3px);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .contact-item-body strong {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-body a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      transition: color 0.2s;
    }

    .contact-item-body a:hover {
      color: var(--primary-dark);
    }

    .contact-item-body p {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
    }

    .contact-map {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--gray-light);
    }

    .map-placeholder {
      height: 280px;
      background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #999;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.03) 0, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 40px);
    }

    .map-icon {
      font-size: 3rem;
      position: relative;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .map-text {
      font-size: 0.85rem;
      color: #888;
