<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sádrokartony Praha | Profesionální sádrokartonové práce</title>
<meta name="description" content="Profesionální sádrokartonové práce v Praze a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Zavolejte +420776490000.">
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #e8a020;
  --primary-dark: #c8861a;
  --primary-light: #f5c060;
  --dark: #1a1a2e;
  --dark2: #16213e;
  --dark3: #0f3460;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --white: #ffffff;
  --text: #1f2937;
  --text-light: #4b5563;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover: 0 8px 36px rgba(232,160,32,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img {
  max-width: 100%;
  display: block;
}

.container {
  width: 100%;
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 9999;
}

/* ===== HEADER / NAVBAR ===== */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  max-width: 1140px;
  margin: 0 auto;
  gap: 16px;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 28px;
  align-items: center;
}

.nav-links a {
  color: #d1d5db;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-tel {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 50px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(232,160,32,0.3);
  white-space: nowrap;
}

.btn-tel:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  box-shadow: 0 4px 20px rgba(232,160,32,0.45);
  transform: translateY(-1px);
}

.btn-tel span {
  font-size: 16px;
}

@media (min-width: 768px) {
  .nav-links {
    display: flex;
  }
}

/* ===== HERO ===== */
#hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a50 100%);
  position: relative;
  padding: 80px 20px 90px;
  overflow: hidden;
  text-align: center;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(232,160,32,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(232,160,32,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(232,160,32,0.15);
  border: 1px solid rgba(232,160,32,0.35);
  color: var(--primary-light);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.03em;
}

#hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 20px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
}

#hero h1 em {
  font-style: normal;
  color: var(--primary);
}

.hero-sub {
  font-size: clamp(16px, 2.5vw, 20px);
  color: #a8b4c8;
  max-width: 600px;
  margin: 0 auto 38px;
  line-height: 1.6;
  font-weight: 400;
}

.hero-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  margin-bottom: 50px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--white);
  font-size: 16px;
  font-weight: 700;
  padding: 14px 30px;
  border-radius: 50px;
  box-shadow: 0 4px 20px rgba(232,160,32,0.4);
  transition: all 0.25s;
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  box-shadow: 0 6px 28px rgba(232,160,32,0.55);
  transform: translateY(-2px);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  font-size: 16px;
  font-weight: 600;
  padding: 14px 30px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.25s;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px 50px;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 40px;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 4px;
  font-weight: 500;
}

/* ===== SECTIONS GENERAL ===== */
section {
  padding: 70px 0;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--primary);
  margin-bottom: 10px;
}

.section-title {
  font-size: clamp(24px, 3.5vw, 38px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-subtitle {
  font-size: 16px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.65;
}

.section-header {
  margin-bottom: 48px;
}

.section-header.center {
  text-align: center;
}

.section-header.center .section-subtitle {
  margin: 0 auto;
}

/* ===== SLUŽBY ===== */
#sluzby {
  background: var(--gray-light);
}

.sluzby-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

@media (min-width: 480px) {
  .sluzby-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 900px) {
  .sluzby-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

.sluzba-karta {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  border: 1.5px solid transparent;
  position: relative;
  overflow: hidden;
}

.sluzba-karta::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}

.sluzba-karta:hover {
  box-shadow: var(--shadow-hover);
  border-color: rgba(232,160,32,0.2);
  transform: translateY(-5px);
}

.sluzba-karta:hover::after {
  transform: scaleX(1);
}

.sluzba-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.2));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
}

.sluzba-karta h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.3;
}

.sluzba-karta p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== PROČ MY ===== */
#proc-my {
  background: var(--white);
}

.proc-my-inner {
  display: grid;
  grid-template-columns: 1fr;
  gap: 50px;
  align-items: center;
}

@media (min-width: 860px) {
  .proc-my-inner {
    grid-template-columns: 1fr 1fr;
  }
}

.proc-my-visual {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark3) 100%);
  border-radius: var(--radius);
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  box-shadow: 0 12px 40px rgba(15,52,96,0.25);
}

.proc-stat-box {
  background: rgba(255,255,255,0.07);
  border-radius: var(--radius-sm);
  padding: 20px 22px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 18px;
}

.proc-stat-icon {
  font-size: 30px;
  flex-shrink: 0;
}

.proc-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.proc-stat-desc {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 3px;
}

.benefity-list {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.benefit-item {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.benefit-icon-wrap {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(232,160,32,0.3);
}

.benefit-text h4 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.benefit-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

/* ===== REFERENCE ===== */
#reference {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  padding: 80px 0;
}

#reference .section-title {
  color: var(--white);
}

#reference .section-label {
  color: var(--primary-light);
}

#reference .section-subtitle {
  color: #a8b4c8;
}

.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 22px;
}

@media (min-width: 640px) {
  .reviews-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 960px) {
  .reviews-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.review-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 30px 26px;
  transition: all 0.3s;
  backdrop-filter: blur(6px);
}

.review-card:hover {
  background: rgba(255,255,255,0.10);
  border-color: rgba(232,160,32,0.3);
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.review-stars {
  color: var(--primary);
  font-size: 17px;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

.review-text {
  font-size: 15px;
  color: #d1d5db;
  line-height: 1.7;
  margin-bottom: 22px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 40px;
  color: var(--primary);
  line-height: 0;
  vertical-align: -14px;
  margin-right: 4px;
  font-style: normal;
  font-weight: 800;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 15px;
}

.review-location {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 2px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--gray-light);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 30px;
}

@media (min-width: 860px) {
  .kontakt-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow);
  border: 1.5px solid transparent;
  transition: all 0.2s;
}

.kontakt-item:hover {
  border-color: rgba(232,160,32,0.25);
  box-shadow: var(--shadow-hover);
}

.kontakt-item-icon {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(232,160,32,0.3);
}

.kontakt-item-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--primary);
  margin-bottom: 4px;
}

.kontakt-item-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.kontakt-item-val a {
  color: var(--text);
  transition: color 0.2s;
}

.kontakt-item-val a:hover {
  color: var(--primary);
}

.kontakt-item-sub {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}

.mapa-placeholder {
  background: linear-gradient(135deg, var(--dark), var(--dark3));
  border-radius: var(--radius);
  min-height: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.mapa-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(circle at 30% 60%, rgba(232,160,32,0.08) 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, rgba(232,160,32,0.06) 0%, transparent 40%);
}

.mapa-icon {
  font-size: 50px;
  position: relative;
}

.mapa-text {
  color: #94a3b8;
  font-size: 15px
