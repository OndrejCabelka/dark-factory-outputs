<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Střechy Glogar – Pokrývačské práce Frýdek-Místek</title>
  <meta name="description" content="Profesionální pokrývač ve Frýdek-Místku. Pokládka střešní krytiny, opravy střech, tepelná izolace, ploché střechy. Zavolejte +420 603 374 824.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c0392b;
      --primary-dark: #96281b;
      --primary-light: #e74c3c;
      --accent: #e67e22;
      --dark: #1a1a1a;
      --dark2: #2c2c2c;
      --dark3: #3a3a3a;
      --text: #333333;
      --text-light: #666666;
      --white: #ffffff;
      --bg-light: #f8f8f8;
      --bg-section: #f2f2f2;
      --border: #e0e0e0;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 36px rgba(0,0,0,0.16);
      --radius: 12px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      color: var(--white);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      color: #aaa;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    nav {
      display: none;
      gap: 28px;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--white);
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(192,57,43,0.4);
    }

    .header-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(192,57,43,0.5);
    }

    /* HERO */
    #hero {
      background: linear-gradient(160deg, #1a1a1a 0%, #2d1a0e 40%, #3a1a0a 70%, #1a0a0a 100%);
      position: relative;
      overflow: hidden;
      padding: 80px 20px 90px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 50% 120%, rgba(192,57,43,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 80% 20%, rgba(230,126,34,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      color: #f5a58a;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      color: var(--white);
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
      position: relative;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      color: #c0b0a8;
      font-size: clamp(15px, 2.5vw, 20px);
      max-width: 640px;
      margin: 0 auto 36px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 52px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(192,57,43,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
      position: relative;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      color: var(--white);
      font-size: 30px;
      font-weight: 900;
      display: block;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-stat-label {
      color: #999;
      font-size: 13px;
      font-weight: 500;
      margin-top: 4px;
      display: block;
    }

    .hero-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      align-self: center;
    }

    /* SECTION COMMON */
    .section-label {
      display: inline-block;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      color: var(--text-light);
      font-size: 16px;
      max-width: 580px;
      line-height: 1.7;
    }

    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-header .section-desc {
      margin: 0 auto;
    }

    /* SLUZBY */
    #sluzby {
      padding: 88px 20px;
      background: var(--bg-light);
    }

    .sluzby-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      cursor: default;
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(192,57,43,0.25);
    }

    .sluzba-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(192,57,43,0.1), rgba(230,126,34,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
      transition: background 0.25s;
    }

    .sluzba-card:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(192,57,43,0.18), rgba(230,126,34,0.18));
    }

    .sluzba-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .sluzba-card p {
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.65;
    }

    .sluzba-card .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      margin-top: 14px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .sluzba-card:hover .sluzba-link {
      gap: 8px;
    }

    /* PROC MY */
    #proc-my {
      padding: 88px 20px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 700px 500px at 50% 100%, rgba(192,57,43,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: #aaa;
    }

    .benefity-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 36px 28px;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, border-color 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(192,57,43,0.35);
    }

    .benefit-number {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 64px;
      font-weight: 900;
      color: rgba(255,255,255,0.04);
      line-height: 1;
      font-family: inherit;
      user-select: none;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 18px;
      display: block;
    }

    .benefit-card h3 {
      color: var(--white);
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .benefit-card p {
      color: #aaa;
      font-size: 14px;
      line-height: 1.7;
    }

    /* REFERENCE */
    #reference {
      padding: 88px 20px;
      background: var(--bg-section);
    }

    .reference-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 56px;
      color: rgba(192,57,43,0.10);
      line-height: 1;
      font-family: Georgia, serif;
      user-select: none;
    }

    .review-stars {
      color: #f5a623;
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 22px;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .reviewer-info span {
      font-size: 12px;
      color: var(--text-light);
    }

    /* KONTAKT */
    #kontakt {
      padding: 88px 20px;
      background: var(--white);
    }

    .kontakt-wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 22px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .kontakt-item:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 12px rgba(192,57,43,0.12);
    }

    .kontakt-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .kontakt-item-text strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .kontakt-item-text span {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
    }

    .mapa-placeholder {
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      border-radius: var(--radius);
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 2px dashed rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 400px 300px at 50% 50%, rgba(192,57,43,0.12) 0%, transparent 70%);
    }

    .mapa-pin {
      font-size: 48px;
      position: relative;
    }

    .mapa-text {
      color: #888;
      font-size: 14px;
      text-align: center;
      position: relative;
    }

    .mapa-text strong {
      display: block;
      color: #ccc;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    /* FOOTER */
    footer {
      background: #111;
      padding: 48px 20px 32px;
      border-top: 3px solid var(--primary);
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-top {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 36px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .footer-brand {
      max-width: 320px;
    }

    .footer-brand .logo-name {
      font-size: 20px;
      display: block;
      margin-bottom: 6px;
    }

    .footer-brand p {
      color: #
