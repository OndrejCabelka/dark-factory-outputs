<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malířské a natěračské práce – Bernacký Roman | Ostrava</title>
  <meta name="description" content="Profesionální malíř natěrač v Ostravě a okolí. Malování interiérů, fasádní nátěry, tapetování, zateplení fasád, SDK stropy. Volejte +420 604 247 137.">
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8710a;
      --primary-dark: #c45d07;
      --primary-light: #f5a052;
      --accent: #f5c842;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --text: #2d2d2d;
      --text-light: #666;
      --text-muted: #999;
      --white: #ffffff;
      --bg-light: #f9f7f4;
      --bg-warm: #fff8f0;
      --border: #e8e0d8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,113,10,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ============================
       NAVBAR
    ============================ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(232,113,10,0.4);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .navbar-cta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-nav-tel {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s ease;
      box-shadow: 0 2px 12px rgba(232,113,10,0.35);
      white-space: nowrap;
    }

    .btn-nav-tel:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(232,113,10,0.5);
    }

    .btn-nav-tel .icon {
      font-size: 16px;
    }

    /* ============================
       HERO
    ============================ */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a2a1a 100%);
    }

    .hero-bg-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
    }

    .hero-shape-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
      top: -200px;
      right: -150px;
    }

    .hero-shape-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      opacity: 0.08;
    }

    .hero-shape-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #e8710a 0%, transparent 70%);
      top: 50%;
      left: 10%;
      opacity: 0.06;
    }

    .hero-paint-drip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary-light), var(--primary));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      padding: 60px 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,113,10,0.15);
      border: 1px solid rgba(232,113,10,0.35);
      color: var(--primary-light);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.6rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      letter-spacing: -1px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.22rem);
      color: rgba(255,255,255,0.75);
      max-width: 620px;
      margin: 0 auto 42px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 16px 34px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s ease;
      box-shadow: 0 4px 24px rgba(232,113,10,0.45);
      letter-spacing: 0.2px;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(232,113,10,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 14px 32px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      display: block;
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* ============================
       SECTION SHARED
    ============================ */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(232,113,10,0.12), rgba(245,168,82,0.12));
      color: var(--primary);
      border: 1px solid rgba(232,113,10,0.2);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .section-header h2 {
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ============================
       SLUZBY
    ============================ */
    #sluzby {
      background: var(--bg-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .sluzba-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .sluzba-card:hover::before {
      transform: scaleX(1);
    }

    .sluzba-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,113,10,0.2);
    }

    .sluzba-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(232,113,10,0.12), rgba(245,168,82,0.12));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
      transition: all 0.3s ease;
    }

    .sluzba-card:hover .sluzba-icon {
      background: linear-gradient(135deg, rgba(232,113,10,0.2), rgba(245,168,82,0.2));
      transform: scale(1.08);
    }

    .sluzba-card h3 {
      font-size: 1.18rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .sluzba-card p {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .sluzba-card .sluzba-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 600;
      margin-top: 18px;
      text-decoration: none;
      transition: gap 0.2s ease;
    }

    .sluzba-card .sluzba-link:hover {
      gap: 10px;
    }

    /* ============================
       PROC MY
    ============================ */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(232,113,10,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-header h2 {
      color: var(--white);
    }

    #proc-my .section-header p {
      color: rgba(255,255,255,0.6);
    }

    #proc-my .section-tag {
      background: rgba(232,113,10,0.2);
      border-color: rgba(232,113,10,0.3);
      color: var(--primary-light);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .benefit-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,113,10,0.06), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: var(--radius-lg);
    }

    .benefit-card:hover::after {
      opacity: 1;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      border-color: rgba(232,113,10,0.25);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    }

    .benefit-icon-wrap {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 24px;
      box-shadow: 0 4px 20px rgba(232,113,10,0.35);
      position: relative;
      z-index: 1;
    }

    .benefit-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .benefit-card p {
      font-size: 0.93rem;
      color: rgba(255,255,255,0.62);
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    /* ============================
       REFERENCE
    ============================ */
    #reference {
      background: var(--bg-warm);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .recenze-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      position: relative;
    }

    .recenze-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .recenze-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 12px;
      font-family: Georgia, serif;
      opacity: 0.5;
    }

    .recenze-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .recenze-text {
      font-size: 0.96rem;
      color: var(--text);
      line-height: 1.72;
      margin-bottom: 24px;
      font-style: italic;
    }

    .recenze-author {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .recenze-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }

    .recenze-author-info strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--dark);
    }

    .recenze-author-info span {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* ============================
       KONTAKT
    ============================ */
    #kontakt {
      background: var(--white);
    }

    .kontakt-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info h3 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .kontakt-info > p {
      color: var(--text-light);
