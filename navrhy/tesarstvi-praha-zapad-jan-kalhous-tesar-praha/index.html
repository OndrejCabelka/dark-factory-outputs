<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesařství Praha-západ – Jan Kalhous | Profesionální tesař</title>
  <meta name="description" content="Profesionální tesař Jan Kalhous – krovové konstrukce, dřevěné altány, pergoly, opravy krovů a dřevostavby v Praze a okolí.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-dark: #6B3410;
      --primary-light: #A0522D;
      --accent: #D2691E;
      --accent-light: #F4A460;
      --warm: #DEB887;
      --dark: #1a1208;
      --dark2: #2a1f0e;
      --dark3: #3d2e1a;
      --text: #1a1208;
      --text-muted: #6b5c4a;
      --text-light: #a89484;
      --bg: #fdfaf6;
      --bg2: #f5efe6;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(139,69,19,0.10);
      --shadow-hover: 0 8px 40px rgba(139,69,19,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== NAVBAR ===== */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 26px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,69,19,0.4);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent-light);
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(160deg, #1a1208 0%, #2d1c0a 35%, #3d2610 65%, #1f1409 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      min-height: 600px;
      display: flex;
      align-items: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(139,69,19,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(210,105,30,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      right: -20px;
      bottom: -40px;
      font-size: 320px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-wood-pattern {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(139,69,19,0.03) 60px,
        rgba(139,69,19,0.03) 61px
      );
      pointer-events: none;
    }

    .hero-container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(210,105,30,0.2);
      border: 1px solid rgba(210,105,30,0.35);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 6vw, 60px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -1px;
      max-width: 700px;
    }

    #hero h1 span {
      background: linear-gradient(135deg, var(--accent-light), var(--warm));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 2.5vw, 20px);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 40px;
      line-height: 1.7;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(139,69,19,0.35);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,69,19,0.45);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      border: 1.5px solid rgba(255,255,255,0.25);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat-num span {
      color: var(--accent-light);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }

    .hero-divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.12);
      align-self: center;
    }

    /* ===== SECTIONS COMMON ===== */
    section {
      padding: 80px 20px;
    }

    .section-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 540px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary), var(--accent));
      border-radius: 4px 0 0 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,69,19,0.15);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 20px;
      display: block;
    }

    .service-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }

    .service-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ===== WHY US ===== */
    #proc-my {
      background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 50%, var(--dark3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 60% at 90% 50%, rgba(139,69,19,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    #proc-my .section-tag {
      background: rgba(210,105,30,0.2);
      color: var(--accent-light);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 1;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: all 0.3s ease;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(210,105,30,0.3);
      transform: translateY(-4px);
    }

    .benefit-icon-wrap {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(139,69,19,0.3), rgba(210,105,30,0.2));
      border: 1px solid rgba(210,105,30,0.25);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 22px;
    }

    .benefit-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ===== REVIEWS ===== */
    #reference {
      background: var(--bg2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      transition: all 0.3s ease;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-card::before {
      content: '"';
      position: absolute;
      top: 16px;
      right: 24px;
      font-size: 80px;
      color: rgba(139,69,19,0.08);
      font-family: Georgia, serif;
      line-height: 1;
      font-weight: 700;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .review-stars span {
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .avatar-1 { background: linear-gradient(135deg, #8B4513, #D2691E); }
    .avatar-2 { background: linear-gradient(135deg, #556B2F, #8FBC8F); }
    .avatar-3 { background: linear-gradient(135deg, #4A6FA5, #6B93C4); }

    .review-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ===== CONTACT ===== */
    #kontakt {
      background: var(--bg);
    }

    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,69,19,0.07);
      transition: all 0.25s ease;
      text-decoration: none;
      color: inherit;
    }

    .contact-item:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: rgba(139,69,19,0.15);
    }

    .contact-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(139,69,19,0.12), rgba(210,105,30,0.08));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    a.contact-item .contact-item-value {
      color: var(--primary);
    }

    .contact-item-note {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 3px;
    }

    .map-placeholder {
      background: linear-gradient(160deg, var(--dark2), var(--dark3));
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 2px solid rgba(139,69,19,0.2);
      position: relative;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle 120px at 50% 50%, rgba(210,105,30,0.15) 0%, transparent 70%);
    }

    .map-pin {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-text {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }

    .map-text strong {
      color: var(--white);
      font
