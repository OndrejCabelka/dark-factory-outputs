<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert Brand – Truhlář Liberec</title>
  <meta name="description" content="Profesionální truhlář v Liberci. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B5E3C;
      --primary-dark: #6B4226;
      --primary-light: #C4956A;
      --accent: #D4A853;
      --dark: #1A1208;
      --dark-2: #2C1F0E;
      --dark-3: #3D2B14;
      --text: #1A1208;
      --text-light: #6B5744;
      --bg: #FAF7F2;
      --bg-2: #F2EBE0;
      --white: #FFFFFF;
      --shadow: 0 4px 24px rgba(139,94,60,0.12);
      --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    #proposal-banner {
      background: linear-gradient(135deg, #FF4D00, #ff7c47);
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 13px;
      font-family: system-ui;
      position: relative;
      z-index: 1000;
    }

    #proposal-banner a {
      color: white;
      font-weight: bold;
    }

    /* ── NAVBAR ── */
    header {
      background: rgba(26,18,8,0.97);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 1px solid rgba(196,149,106,0.15);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .nav-logo-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.01em;
    }

    .nav-logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--primary-light);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .nav-links {
      display: none;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,94,60,0.4);
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    /* ── HERO ── */
    #hero {
      background:
        linear-gradient(135deg, rgba(26,18,8,0.92) 0%, rgba(44,31,14,0.88) 50%, rgba(61,43,20,0.85) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(139,94,60,0.06) 0px,
          rgba(139,94,60,0.06) 1px,
          transparent 1px,
          transparent 40px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(196,149,106,0.04) 0px,
          rgba(196,149,106,0.04) 1px,
          transparent 1px,
          transparent 40px
        );
      background-color: var(--dark);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero-grain {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139,94,60,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,168,83,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(139,94,60,0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    .hero-wood-accent {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,94,60,0.12) 0%, transparent 70%);
      border: 1px solid rgba(196,149,106,0.1);
    }

    .hero-wood-accent-2 {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
      border: 1px solid rgba(212,168,83,0.08);
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.3);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      max-width: 700px;
      letter-spacing: -0.02em;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      margin-bottom: 36px;
      font-weight: 400;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(139,94,60,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,94,60,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.18);
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
      border-color: rgba(212,168,83,0.4);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── SECTION SHARED ── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .section-tag::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .section-subtitle {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 52px;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 540px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 900px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.08);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(139,94,60,0.18);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(139,94,60,0.12), rgba(212,168,83,0.1));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(139,94,60,0.1);
    }

    .service-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-desc {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 8px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 50%, rgba(139,94,60,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 30%, rgba(212,168,83,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-subtitle {
      color: rgba(255,255,255,0.6);
    }

    #proc-my .section-tag {
      color: var(--accent);
    }

    #proc-my .section-tag::before {
      background: var(--accent);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .benefits-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(196,149,106,0.12);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(212,168,83,0.25);
      transform: translateY(-4px);
    }

    .benefit-number {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .benefit-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .benefit-desc {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--bg-2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .reviews-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 2.5rem;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .review-text {
      font-size: 0.95rem;
      color: var(--text-light);
      line-height: 1.72;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }

    .review-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .review-role {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 900px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 48px;
      }
    }

    .contact-info-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(139,94,60,0.08);
    }

    .contact-info-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .contact-item:last-child {
      margin-
