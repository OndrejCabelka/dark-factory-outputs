<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mlčúch – Zemní a výkopové práce Brno</title>
  <meta name="description" content="Profesionální zemní a výkopové práce v Brně a okolí. Rychlý servis, kvalita garantována, přijatelná cena. Volejte 731 573 883.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #e8820c;
      --primary-dark: #c4660a;
      --primary-light: #f5a03a;
      --dark: #1a1a1a;
      --dark2: #252525;
      --dark3: #2e2e2e;
      --text: #1e1e1e;
      --text-light: #555;
      --white: #ffffff;
      --bg-light: #f7f4f0;
      --bg-card: #ffffff;
      --border: #e8e2d9;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(232,130,12,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===================== BANNER ===================== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===================== HEADER ===================== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(26,26,26,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 4px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    .btn-call-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 50px;
      white-space: nowrap;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(232,130,12,0.35);
    }

    .btn-call-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,130,12,0.5);
    }

    .btn-call-nav .phone-icon {
      font-size: 16px;
    }

    /* ===================== HERO ===================== */
    #hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #151210;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(232,130,12,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(180,90,5,0.12) 0%, transparent 60%),
        linear-gradient(160deg, #1a1208 0%, #151210 40%, #0e0e0e 100%);
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,130,12,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,130,12,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-dirt-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hero-dirt-shapes::before {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -60px;
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(100,65,20,0.25) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-dirt-shapes::after {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,130,12,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,130,12,0.12);
      border: 1px solid rgba(232,130,12,0.3);
      color: var(--primary-light);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 50px;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .hero-badge span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 68px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 24px;
      max-width: 820px;
    }

    #hero h1 em {
      font-style: normal;
      color: var(--primary);
      position: relative;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.2vw, 20px);
      color: rgba(255,255,255,0.65);
      max-width: 560px;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.6;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(232,130,12,0.4);
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(232,130,12,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 15px 30px;
      border-radius: 50px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 30px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -1px;
    }

    .hero-stat-num span {
      color: var(--primary);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      font-weight: 500;
    }

    /* ===================== SECTION COMMON ===================== */
    section {
      padding: 80px 24px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 44px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-title em {
      font-style: normal;
      color: var(--primary);
    }

    .section-desc {
      font-size: 16px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ===================== SERVICES ===================== */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(232,130,12,0.25);
    }

    .service-card:hover::after {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(232,130,12,0.12), rgba(232,130,12,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      border: 1px solid rgba(232,130,12,0.15);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===================== PROC MY ===================== */
    #proc-my {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232,130,12,0.06) 0%, transparent 70%);
    }

    #proc-my .section-title {
      color: var(--white);
    }

    #proc-my .section-desc {
      color: rgba(255,255,255,0.5);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .benefit-card {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(232,130,12,0.25);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 64px;
      font-weight: 900;
      color: rgba(232,130,12,0.1);
      position: absolute;
      top: 16px;
      right: 24px;
      line-height: 1;
      letter-spacing: -3px;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }

    .benefit-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .benefit-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    /* ===================== REFERENCE ===================== */
    #reference {
      background: var(--bg-light);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary);
      line-height: 0.8;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      opacity: 0.6;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: #f5a03a;
      font-size: 18px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .review-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .review-location {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 1px;
    }

    /* ===================== KONTAKT ===================== */
    #kontakt {
      background: var(--white);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      background: var(--bg-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .kontakt-item:hover {
      border-color: rgba(232,130,12,0.3);
      box-shadow: 0 4px 20px rgba(232,130,12,0.08);
    }

    .kontakt-item-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-body {
      flex: 1;
    }

    .kontakt-item-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .kontakt-item-value
