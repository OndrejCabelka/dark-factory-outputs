<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální elektrikář v Liberci a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů. Volejte +420731175735">
<title>Elektrikář Liberec – ELSERVIS.LBC | Elektroinstalace a další</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #F5C518;
  --primary-dark: #d4a800;
  --primary-light: #fff3b0;
  --dark: #0d0f14;
  --dark2: #151820;
  --dark3: #1e2230;
  --dark4: #252a3a;
  --text: #e8eaf0;
  --text-muted: #9aa0b8;
  --white: #ffffff;
  --card-bg: #1a1e2e;
  --border: rgba(245,197,24,0.15);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
}

img {
  max-width: 100%;
}

.container {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(13,15,20,0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0;
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  max-width: 1200px;
  margin: 0 auto;
  gap: 12px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 15px rgba(245,197,24,0.3);
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 10px;
  font-weight: 500;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 700;
  font-size: 14px;
  padding: 10px 20px;
  border-radius: var(--radius);
  transition: all 0.2s ease;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(245,197,24,0.25);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(245,197,24,0.4);
  background: linear-gradient(135deg, #ffd700, var(--primary));
}

.nav-cta span {
  font-size: 16px;
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: var(--dark2);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 50%, rgba(245,197,24,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 80% at 10% 20%, rgba(245,197,24,0.05) 0%, transparent 50%),
    linear-gradient(135deg, #0a0c12 0%, #13172a 50%, #0d0f1a 100%);
  z-index: 0;
}

.hero-grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(245,197,24,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,197,24,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

.hero-glow {
  position: absolute;
  top: 20%;
  right: 10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(245,197,24,0.12) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 0;
  animation: pulse-glow 4s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

.hero-content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px 60px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,197,24,0.1);
  border: 1px solid rgba(245,197,24,0.3);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge::before {
  content: '⚡';
  font-size: 14px;
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 900;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 20px;
  letter-spacing: -1px;
  max-width: 700px;
}

#hero h1 .highlight {
  background: linear-gradient(135deg, var(--primary), #ffed4e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--text-muted);
  max-width: 560px;
  margin-bottom: 36px;
  font-weight: 400;
  line-height: 1.7;
}

.hero-sub strong {
  color: var(--text);
  font-weight: 600;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: var(--dark);
  font-weight: 700;
  font-size: 16px;
  padding: 15px 30px;
  border-radius: var(--radius);
  transition: all 0.25s ease;
  box-shadow: 0 6px 20px rgba(245,197,24,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(245,197,24,0.5);
  background: linear-gradient(135deg, #ffd700, var(--primary));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--white);
  font-weight: 600;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: var(--radius);
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.4);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  margin-top: 4px;
}

/* ===== SECTION COMMON ===== */
section {
  padding: 80px 0;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(245,197,24,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 14px;
  border: 1px solid rgba(245,197,24,0.2);
}

.section-title {
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 800;
  color: var(--white);
  line-height: 1.25;
  letter-spacing: -0.5px;
  margin-bottom: 14px;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ===== SLUZBY ===== */
#sluzby {
  background: var(--dark2);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.service-card {
  background: var(--card-bg);
  border: 1px solid rgba(245,197,24,0.1);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), transparent);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  border-color: rgba(245,197,24,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(245,197,24,0.1);
  background: #1f243a;
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(245,197,24,0.05));
  border: 1px solid rgba(245,197,24,0.2);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: all 0.3s ease;
}

.service-card:hover .service-icon {
  background: linear-gradient(135deg, rgba(245,197,24,0.25), rgba(245,197,24,0.1));
  transform: scale(1.05);
}

.service-name {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  margin-top: 18px;
  transition: gap 0.2s;
}

.service-card:hover .service-link {
  gap: 10px;
}

/* ===== PROC MY ===== */
#proc-my {
  background: var(--dark);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
}

.benefit-card {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-4px);
  border-color: rgba(245,197,24,0.2);
  box-shadow: var(--shadow);
}

.benefit-number {
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(245,197,24,0.12);
  line-height: 1;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}

.benefit-icon {
  font-size: 42px;
  margin-bottom: 18px;
  display: block;
}

.benefit-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-text {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== REFERENCE ===== */
#reference {
  background: var(--dark2);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 22px;
}

.review-card {
  background: var(--dark4);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: all 0.3s ease;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  border-color: rgba(245,197,24,0.15);
  box-shadow: 0 16px 40px rgba(0,0,0,0.3);
}

.review-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 16px;
  font-size: 18px;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.75;
  margin-bottom: 22px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 2.5rem;
  color: var(--primary);
  line-height: 0;
  vertical-align: -0.5em;
  margin-right: 2px;
  font-style: normal;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 12px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  flex-shrink: 0;
}

.review-name {
  font-weight: 700;
  color: var(--white);
  font-size: 0.95rem;
}

.review-location {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.review-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(245,197,24,0.1);
  color: var(--primary);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 50px;
  margin-top: 6px;
}

/* ===== KONTAKT ===== */
#kontakt {
  background: var(--dark);
}

.kontakt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-card {
  background: var(--card-bg);
  border: 1px solid rgba(245,197,24,0.1);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  align-items: flex-start;
  gap: 18px;
  transition: all 0.3s ease;
}

.kontakt-card:hover {
  border-color: rgba(245,197,24,0.25);
  background: #1f243a;
  transform: translateX(4px);
}

.kontakt-card-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(245,197,24,0.05));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(245,197,24,0.15);
}

.kontakt-card-content {
  flex: 1;
}

.kontakt-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 5px;
}

.kontakt-value {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--white);
}

.kontakt-value a {
  color: var(--white);
  transition: color 0.2s;
}

.kontakt-value a:hover {
  color: var(--primary);
}

.kontakt-note {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 3px;
}

.map-placeholder {
  background: var(--card-bg);
  border: 1px solid rgba(245,197,24,0.1);
  border-radius: var(--radius-lg);
  height: 100%;
  min-height: 350px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 40px;
  position: relative;
  overflow: hidden;
}

.map-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-icon {
  font-size: 56px;
  position: relative;
  z-index: 1;
}

.map-title {
