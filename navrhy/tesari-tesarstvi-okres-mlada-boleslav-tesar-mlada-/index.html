<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesaři – Tesařství okres Mladá Boleslav</title>
  <meta name="description" content="Profesionální tesař v Mladá Boleslav a okolí. Krovové konstrukce, altány, pergoly, dřevostavby. Zavolejte nyní!">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #8B4513;
      --primary-light: #A0522D;
      --primary-dark: #5C2E0A;
      --accent: #D4813A;
      --accent-light: #E8A85F;
      --dark: #1A0F08;
      --dark2: #2C1A0E;
      --text: #2d1a0e;
      --text-light: #6b4c36;
      --white: #ffffff;
      --gray-light: #f8f4f0;
      --gray: #e8ddd6;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 9999;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      font-size: 28px;
      line-height: 1;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--accent-light);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .header-cta {
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-cta:hover {
      background: var(--accent-light);
      transform: scale(1.04);
    }

    /* ─── HERO ─── */
    #hero {
      background: linear-gradient(135deg, #1A0F08 0%, #3D1F0A 40%, #5C2E0A 70%, #8B4513 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,129,58,0.15) 0%, transparent 50%);
    }

    #hero::after {
      content: '🪵';
      position: absolute;
      right: -40px;
      bottom: -40px;
      font-size: 420px;
      opacity: 0.04;
      pointer-events: none;
      line-height: 1;
    }

    .hero-wood-pattern {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 60px,
          rgba(255,255,255,0.015) 60px,
          rgba(255,255,255,0.015) 61px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 80px,
          rgba(255,255,255,0.01) 80px,
          rgba(255,255,255,0.01) 81px
        );
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 80px;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,129,58,0.2);
      border: 1px solid rgba(212,129,58,0.4);
      color: var(--accent-light);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      width: fit-content;
    }

    #hero h1 {
      font-size: clamp(30px, 5vw, 58px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 20px;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(255,255,255,0.8);
      max-width: 560px;
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(212,129,58,0.4);
    }

    .btn-primary:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212,129,58,0.5);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-num {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    /* ─── SEKCE OBECNĚ ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(139,69,19,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 580px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--gray-light);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 2px 16px rgba(139,69,19,0.08);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(139,69,19,0.08);
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(139,69,19,0.15);
    }

    .sluzba-karta:hover::before {
      transform: scaleX(1);
    }

    .sluzba-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .sluzba-karta h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit {
      background: var(--gray-light);
      border-radius: 16px;
      padding: 36px 30px;
      border: 1px solid var(--gray);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .benefit:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(139,69,19,0.1);
    }

    .benefit-num {
      font-size: 56px;
      font-weight: 800;
      color: rgba(139,69,19,0.08);
      position: absolute;
      top: 16px;
      right: 20px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .benefit-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .benefit h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .benefit p {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
    }

    #reference .section-tag {
      background: rgba(212,129,58,0.2);
      color: var(--accent-light);
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.65);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      transition: transform 0.25s, background 0.25s;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.09);
    }

    .hvezdy {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 14px;
    }

    .recenze-text {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.75;
      margin-bottom: 20px;
      font-style: italic;
    }

    .recenze-autor {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .recenze-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .recenze-jmeno {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .recenze-loc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--gray-light);
    }

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    .kontakt-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .kontakt-item {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(139,69,19,0.07);
      border: 1px solid var(--gray);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .kontakt-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(139,69,19,0.12);
    }

    .kontakt-icon-wrap {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .kontakt-item-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .kontakt-label {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kontakt-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .mapa-placeholder {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(139,69,19,0.08);
      border: 1px solid var(--gray);
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-light);
      position: relative;
    }

    .mapa-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(248,244,240,0.97), rgba(248,244,240,0.97)),
        repeating-linear-gradient(0deg, #e8ddd6 0, #e8ddd6 1px, transparent 0, transparent 50%),
        repeating-linear-gradient(90deg, #e8ddd6 0, #e8ddd6 1px, transparent 0, transparent 50%);
      background-size: auto, 40px 40px, 40px 40px;
    }

    .mapa-content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .mapa-pin {
      font-size: 52px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .mapa-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .mapa-sub {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ─── CTA BANNER ─── */
    .cta-banner {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--accent));
      padding: 70px 20px;
      text-align: center;
    }

    .cta-banner-inner {
      max-width: 700px;
      margin: 0 auto;
    }

    .cta-banner h2 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .cta-banner p {
      font-size: 17px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
      line-height: 1.65;
    }

    .cta-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-white {
      background: var(--white);
      color: var(--primary-dark);
      text-decoration: none;
      padding: 15px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }

    .btn-outline-white {
      background: transparent;
      color: var(--white);
      text-decoration: none;
      padding: 15px 32px;
