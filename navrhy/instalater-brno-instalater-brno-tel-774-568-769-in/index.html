<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatér Brno – Rychlá a spolehlivá instalatérská služba</title>
  <meta name="description" content="Profesionální instalatér v Brně a okolí. Opravy, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte 737 827 304.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #1358a0;
      --primary-light: #2d8de8;
      --accent: #f59e0b;
      --dark: #0f1e2e;
      --dark2: #162840;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f0f6ff;
      --bg-section: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 40px rgba(26,111,196,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== BANNER ===== */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ===== HEADER / NAVBAR ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15, 30, 46, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 20px;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .nav-logo-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s !important;
      box-shadow: 0 4px 16px rgba(26,111,196,0.35);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(26,111,196,0.5) !important;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: 0.3s;
    }

    /* ===== HERO ===== */
    #hero {
      background: linear-gradient(160deg, #0a1628 0%, #0f2444 40%, #1a3a6e 75%, #1a6fc4 100%);
      padding: 90px 20px 80px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(26,111,196,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(45,141,232,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(240,246,255,0.04));
      pointer-events: none;
    }

    .hero-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.4);
      color: #7ec8f7;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 22px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(28px, 4.5vw, 52px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.12;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }

    .hero-content h1 span {
      color: #5db8f0;
    }

    .hero-subtitle {
      font-size: clamp(15px, 1.8vw, 18px);
      color: rgba(255,255,255,0.72);
      margin-bottom: 36px;
      line-height: 1.7;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 44px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 30px rgba(26,111,196,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(26,111,196,0.6);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      padding: 15px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(6px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      font-weight: 500;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, background 0.3s;
    }

    .hero-card:hover {
      transform: translateX(-5px);
      background: rgba(255,255,255,0.10);
    }

    .hero-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .hero-card-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .hero-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .hero-card-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      padding-left: 52px;
    }

    .hero-emergency {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.08));
      border: 1px solid rgba(245,158,11,0.4);
    }

    .hero-emergency .hero-card-icon {
      background: linear-gradient(135deg, #d97706, #f59e0b);
    }

    .hero-emergency .hero-card-title {
      color: #fbbf24;
    }

    /* ===== SECTION GENERAL ===== */
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-tag {
      display: inline-block;
      background: var(--bg-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      border: 1px solid rgba(26,111,196,0.15);
    }

    .section-header h2 {
      font-size: clamp(24px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-header p {
      font-size: 17px;
      color: var(--text-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== SERVICES ===== */
    #sluzby {
      padding: 90px 0;
      background: var(--bg-section);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #e8f4ff, #dbeeff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
      margin-bottom: 18px;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    .service-card.emergency-card {
      background: linear-gradient(135deg, #0f1e2e, #1a3355);
      border-color: rgba(245,158,11,0.3);
    }

    .service-card.emergency-card::before {
      background: linear-gradient(90deg, #d97706, #f59e0b);
      opacity: 1;
    }

    .service-card.emergency-card .service-icon {
      background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.1));
    }

    .service-card.emergency-card h3 {
      color: var(--white);
    }

    .service-card.emergency-card p {
      color: rgba(255,255,255,0.65);
    }

    .service-card.emergency-card .service-link {
      color: #fbbf24;
    }

    .emergency-badge {
      display: inline-block;
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 50px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ===== WHY US ===== */
    #proc-my {
      padding: 90px 0;
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: var(--bg-light);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(26,111,196,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .benefit-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(26,111,196,0.3);
    }

    .benefit-body h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .benefit-body p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ===== REFERENCES ===== */
    #reference {
      padding: 90px 0;
      background: linear-gradient(160deg, #0f1e2e 0%, #1a3355 60%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 70% at 90% 50%, rgba(26,111,196,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    #reference .section-tag {
      background: rgba(255,255,255,0.1);
      color: #7ec8f7;
      border-color: rgba(255,255,255,0.1);
    }

    #reference .section-header h2 {
      color: var(--white);
    }

    #reference .section-header p {
      color: rgba(255,255,255,0.6);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .review-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s, background 0.3s;
    }

    .review-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.11);
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 14px;
    }

    .review-stars span {
      color: #fbbf24;
      font-size: 16px;
    }

    .review-text {
      font-size: 15px;
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: rgba(26,111,196,0.6);
      line-height: 0;
