<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6db5;
  --primary-dark: #124f87;
  --primary-light: #2d86d4;
  --accent: #f59e0b;
  --dark: #0f1c2e;
  --dark2: #162235;
  --dark3: #1e3a5f;
  --text: #1e293b;
  --text-muted: #64748b;
  --white: #ffffff;
  --light-bg: #f0f7ff;
  --card-bg: #ffffff;
  --border: #e2eaf4;
  --shadow: 0 4px 24px rgba(26,109,181,0.10);
  --shadow-hover: 0 8px 36px rgba(26,109,181,0.18);
  --radius: 14px;
  --radius-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner a:hover {
  text-decoration: underline;
}

/* ─── HEADER ─── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: var(--primary);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.logo-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 400;
  letter-spacing: 0.3px;
}

nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

nav a.nav-link {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s;
}

nav a.nav-link:hover {
  color: var(--white);
  background: rgba(255,255,255,0.07);
}

.btn-header {
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 2px 12px rgba(26,109,181,0.35);
}

.btn-header:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: 0 4px 18px rgba(26,109,181,0.45);
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, #0a1628 0%, #0f2744 40%, #1a4a7a 75%, #1e5c9a 100%);
  padding: 80px 20px 90px;
  position: relative;
  overflow: hidden;
}

#hero::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -120px;

  height: 480px;
  background: radial-gradient(circle, rgba(26,109,181,0.25) 0%, transparent 70%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -80px;
  width: 360px;
  height: 360px;
  background: radial-gradient(circle, rgba(45,134,212,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  max-width: 820px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(26,109,181,0.25);
  border: 1px solid rgba(45,134,212,0.4);
  color: #7ec8f7;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
  letter-spacing: 0.3px;
}

.hero-badge span {
  width: 8px;

  color: var(--white);
  line-height: 1.15;
  letter-spacing: -1.5px;
  margin-bottom: 20px;
}

#hero h1 em {
  font-style: normal;
  color: #5bb8f5;
}

.hero-sub {

  font-weight: 400;
  line-height: 1.6;
}

.hero-cta {

  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 32px;
  border-radius: 50px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  box-shadow: 0 4px 20px rgba(26,109,181,0.45);
}

.btn-primary:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(26,109,181,0.55);
}

.btn-secondary {
  background: transparent;
  color: var(--white);
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  padding: 14px 30px;
  border-radius: 50px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 9px;
}

.btn-secondary:hover {
  border-color: rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.08);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
  line-height: 1;
  display: block;
}

.hero-stat-num em {
  color: var(--accent);
  font-style: normal;
}

.hero-stat-label {
  font-size: 12px;
  color: #7a9abb;
  font-weight: 500;
  margin-top: 4px;
  display: block;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.12);
  align-self: center;
}

/* ─── SECTION SHARED ─── */
.section-header {
  text-align: center;
  margin-bottom: 52px;
}

.section-tag {
  display: inline-block;
  background: var(--light-bg);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.section-header h2 {
  font-size: clamp(24px, 4vw, 38px);
  font-weight: 800;
  color: var(--dark);
  letter-spacing: -0.8px;
  line-height: 1.2;
  margin-bottom: 14px;
}

.section-header p {
  font-size: 17px;
  color: var(--text-muted);
  max-width: 520px;
  margin: 0 auto;
}

/* ─── SLUZBY ─── */
#sluzby {
  padding: 80px 20px;
  background: var(--light-bg);
}

.sluzby-grid {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.sluzba-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative;
  overflow: hidden;
}

.sluzba-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.25s;
}

.sluzba-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(26,109,181,0.2);
}

.sluzba-card:hover::before {
  opacity: 1;
}

.sluzba-icon {
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 20px;
  box-shadow: 0 4px 14px rgba(26,109,181,0.3);
  transition: transform 0.25s;
}

.sluzba-card:hover .sluzba-icon {
  transform: scale(1.08);
}

.sluzba-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
  letter-spacing: -0.3px;
}

.sluzba-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.65;
}

.sluzba-card.highlight {
  background: linear-gradient(135deg, #0f2744, #1a4a7a);
  border-color: transparent;
  color: white;
}

.sluzba-card.highlight h3 {
  color: var(--white);
}

.sluzba-card.highlight p {
  color: #94b8d8;
}

.sluzba-card.highlight .sluzba-icon {
  background: rgba(255,255,255,0.15);
  box-shadow: 0 4px 14px rgba(0,0,0,0.2);
}

.havarie-badge {
  display: inline-block;
  background: #ef4444;
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 50px;
  margin-top: 12px;
  letter-spacing: 0.5px;
}

/* ─── PROC MY ─── */
#proc-my {
  padding: 80px 20px;
  background: var(--white);
}

.proc-my-inner {
  max-width: 1100px;

  gap: 32px;

.benefit-card {
  text-align: center;
  padding: 40px 28px;
  border-radius: var(--radius);
  background: var(--light-bg);
  border: 1px solid var(--border);
  transition: transform 0.25s, box-shadow 0.25s;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.benefit-icon-wrap {
  width: 72px;
  height: 72px;
  margin: 0 auto 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  box-shadow: 0 6px 20px rgba(26,109,181,0.3);
}

.benefit-card h3 {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.benefit-card p {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* ─── REFERENCE ─── */
#reference {
  padding: 80px 20px;
  background: linear-gradient(135deg, #0a1628, #0f2744);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(26,109,181,0.15) 0%, transparent 70%);
  pointer-events: none;
}

#reference .section-header h2 {
  color: var(--white);
}

#reference .section-tag {
  background: rgba(26,109,181,0.25);
  color: #7ec8f7;
}

#reference .section-header p {
  color: #7a9abb;
}

.reference-grid {

}

.recenze-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);

}

.recenze-card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-4px);
}

.hvezdicky {
  color: var(--accent);

}

.recenze-card p {

  line-height: 1.7;
  margin-bottom: 22px;

}

.recenze-autor {

}

}

.autor-lokalita {

  color: #7a9abb;
}

  padding: 80px 20px;
  background: var(--light-bg);
}

.kontakt-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.kontakt-info h2 {
  font-size: clamp(24px, 3.5vw, 34px);

  color: var(--dark);

  margin-bottom: 12px;
}

.kontakt-info > p {
  font-size: 16px;

}

  display: flex;

.kontakt-item-icon {

.kontakt-item-text {

.kontakt-item-label {

.kontakt-item-value {

}

.kontakt-item-sub {
  font-size: 13px;

}

  flex-direction: column;
