<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instalatérství Filip Měšťák – Praha a okolí</title>
  <meta name="description" content="Profesionální instalatér v Praze. Oprava potrubí, instalace koupelen, výměna bojlerů, havárie 24/7. Volejte +420604981943">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fdb;
      --primary-dark: #1558b0;
      --primary-light: #3b8af0;
      --accent: #f59e0b;
      --dark: #0d1b2e;
      --dark-2: #112240;
      --dark-3: #1a2f4a;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --gray-bg: #f0f6ff;
      --border: #e2eaf5;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(26, 111, 219, 0.10);
      --shadow-hover: 0 8px 40px rgba(26, 111, 219, 0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
    }

    /* ── BANNER ── */
    #proposal-banner a:hover {
      text-decoration: underline;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      white-space: nowrap;
    }

    .logo-sub {
      font-size: 11px;
      color: #7da8d8;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: #a8c4e0;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .btn-cta-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 14px !important;
      text-decoration: none !important;
      transition: background 0.2s, transform 0.15s !important;
      white-space: nowrap;
    }

    .btn-cta-nav:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, #0a1628 0%, #0d2044 40%, #0f2d5e 70%, #1a3f7a 100%);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 50%, rgba(26,111,219,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 80%, rgba(15,45,94,0.5) 0%, transparent 50%);
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,111,219,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,219,0.06) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .hero-pipe {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 320px;
      opacity: 0.04;
      line-height: 1;
      user-select: none;
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,111,219,0.2);
      border: 1px solid rgba(26,111,219,0.4);
      color: #7ec8ff;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    #hero h1 {
      font-size: clamp(32px, 5.5vw, 62px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 22px;
      max-width: 800px;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-sub {
      font-size: clamp(16px, 2.2vw, 20px);
      color: #a8c4e0;
      max-width: 580px;
      margin-bottom: 40px;
      line-height: 1.65;
      font-weight: 400;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 56px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--primary);
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(26,111,219,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(26,111,219,0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--white);
      padding: 15px 30px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .stat-number span {
      color: var(--accent);
    }

    .stat-label {
      font-size: 13px;
      color: #7da8d8;
      margin-top: 4px;
      font-weight: 500;
    }

    .stat-divider {
      width: 1px;
      background: rgba(255,255,255,0.12);
      align-self: stretch;
    }

    /* ── SEKCE OBECNĚ ── */
    section {
      padding: 80px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 600px;
      margin-bottom: 52px;
      line-height: 1.7;
    }

    .section-header-center {
      text-align: center;
    }

    .section-header-center .section-desc {
      margin-left: auto;
      margin-right: auto;
    }

    /* ── SLUŽBY ── */
    #sluzby {
      background: var(--gray-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: var(--radius) var(--radius) 0 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,219,0.2);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #e8f1fd, #d0e4fb);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      transition: transform 0.25s;
    }

    .service-card:hover .service-icon {
      transform: scale(1.1) rotate(-3deg);
    }

    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ── PROČ MY ── */
    #proc-my {
      background: var(--white);
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      margin-top: 0;
    }

    .benefit-card {
      display: flex;
      gap: 20px;
      padding: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.25s;
      background: var(--white);
    }

    .benefit-card:hover {
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,219,0.2);
      transform: translateY(-3px);
    }

    .benefit-icon-wrap {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .benefit-text h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ── HAVÁRIE BANNER ── */
    .emergency-banner {
      background: linear-gradient(135deg, #0d2044, #1a3f7a);
      border-radius: 16px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 60px;
      position: relative;
      overflow: hidden;
    }

    .emergency-banner::before {
      content: '⚡';
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 120px;
      opacity: 0.05;
      line-height: 1;
    }

    .emergency-text h3 {
      font-size: 24px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
    }

    .emergency-text p {
      font-size: 15px;
      color: #a8c4e0;
    }

    .btn-emergency {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #1a1a00;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(245,158,11,0.35);
    }

    .btn-emergency:hover {
      background: #fbbf24;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(245,158,11,0.45);
    }

    /* ── REFERENCE ── */
    #reference {
      background: var(--gray-bg);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 48px;
      color: var(--primary-light);
      line-height: 1;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      opacity: 0.4;
    }

    .review-stars {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .star {
      color: var(--accent);
      font-size: 16px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .av-blue { background: linear-gradient(135deg, #1a6fdb, #3b8af0); }
    .av-teal { background: linear-gradient(135deg, #0d9488, #14b8a6); }
    .av-purple { background: linear-gradient(135deg, #7c3aed, #a78bfa); }

    .author-info .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
    }

    .author-info .location {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ── KONTAKT ── */
    #kontakt {
      background: var(--white);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .contact-info-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--gray-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(26,111,219,0.25);
      box-shadow: 0 4px 16px rgba(26,111,219,0.08);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-info .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .contact-item-info a,
    .contact-item-info span {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark);
      text-decoration: none;
    }

    .contact-item-info a:hover {
      color: var(--primary);
    }

    .map-placeholder {
      background: linear-gradient(135deg, #e8f1fd, #d0e4fb);
      border-radius: var(--radius);
      height: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(26,111,219,0.25);
      text-align: center;
      padding: 32px;
    }

    .map-placeholder .map-icon {
      font-size: 56px;
      margin-bottom:
