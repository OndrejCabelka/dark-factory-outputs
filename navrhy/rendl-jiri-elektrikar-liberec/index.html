<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rendl Jiří – Elektrikář Liberec</title>
  <meta name="description" content="Profesionální elektrikář v Liberci a okolí. Elektroinstalace, revize elektro, hromosvod, fotovoltaika, rekonstrukce rozvodů.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #F5C400;
      --primary-dark: #D4A800;
      --primary-light: #FFD740;
      --dark: #0F1117;
      --dark2: #1A1D2E;
      --dark3: #252840;
      --text: #E8E9F0;
      --text-muted: #9A9DB5;
      --white: #ffffff;
      --card-bg: #1E2138;
      --border: rgba(245,196,0,0.15);
      --shadow: 0 4px 24px rgba(0,0,0,0.35);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER / NAVBAR ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(15, 17, 23, 0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 18px rgba(245,196,0,0.35);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(245,196,0,0.3);
    }

    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(245,196,0,0.45);
    }

    /* ─── HERO ─── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0b10 0%, #12151f 40%, #1a1500 100%);
    }

    .hero-bg-glow {
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(ellipse, rgba(245,196,0,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-bg-glow2 {
      position: absolute;
      bottom: -10%;
      right: -15%;
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(245,196,0,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,196,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 860px;
      padding: 60px 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,196,0,0.12);
      border: 1px solid rgba(245,196,0,0.3);
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 50px;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    .hero-content h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1.5px;
      color: var(--white);
      margin-bottom: 22px;
    }

    .hero-content h1 span {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--dark);
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(245,196,0,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(245,196,0,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      color: var(--white);
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 16px 32px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      background: rgba(245,196,0,0.07);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 56px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      display: block;
      font-size: 32px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ─── SECTION COMMON ─── */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: rgba(245,196,0,0.1);
      border: 1px solid rgba(245,196,0,0.25);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 560px;
      margin-bottom: 52px;
      line-height: 1.65;
    }

    /* ─── SERVICES ─── */
    #sluzby {
      background: var(--dark2);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(245,196,0,0.2);
      border-color: rgba(245,196,0,0.3);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, rgba(245,196,0,0.18), rgba(245,196,0,0.06));
      border: 1px solid rgba(245,196,0,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 22px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .service-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-link:hover {
      gap: 10px;
    }

    /* ─── WHY US ─── */
    #proc-my {
      background: var(--dark);
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      margin-top: 0;
    }

    .why-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 30px;
      text-align: center;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .why-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.4);
    }

    .why-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 22px;
      box-shadow: 0 6px 24px rgba(245,196,0,0.35);
    }

    .why-card h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }

    .why-card p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ─── REVIEWS ─── */
    #reference {
      background: var(--dark2);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .review-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px 26px;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.4);
    }

    .stars {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .review-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-text::before {
      content: '"';
      font-size: 40px;
      color: var(--primary);
      line-height: 0;
      vertical-align: -12px;
      margin-right: 4px;
      font-style: normal;
    }

    .reviewer {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .reviewer-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      flex-shrink: 0;
    }

    .reviewer-info strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    .reviewer-info span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── CONTACT ─── */
    #kontakt {
      background: var(--dark);
    }

    .contact-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: start;
    }

    .contact-info h2 {
      font-size: clamp(26px, 3.5vw, 38px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .contact-info p {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.65;
    }

    .contact-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.2s;
    }

    .contact-item:hover {
      border-color: rgba(245,196,0,0.4);
      transform: translateX(4px);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, rgba(245,196,0,0.18), rgba(245,196,0,0.06));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-body strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .contact-item-body span {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
    }

    .contact-item-body a {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .contact-item-body a:hover {
      text-decoration: underline;
    }

    .map-placeholder {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text-muted);
      font-size: 16px;
      position: relative;
      overflow: hidden;
    }

    .map-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(245,196,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.03) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .map-icon {
      font-size: 52px;
      position: relative;
      z-index: 1;
    }

    .map-placeholder p {
      position: relative;
      z-index: 1;
      font-weight: 600;
      color: var(--text);
    }

    .map-placeholder span {
      position: relative;
      z-index: 1;
      font-size: 14px;
    }

    /* ─── FOOTER ─── */
    footer {
      background: var(--dark2);
      border-top: 1px solid var(--border);
      padding: 32px 20px;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(
