<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #1458a0;

      --dark: #0d1b2e;

    html {

    body {

      line-height: 1.6;
      -webkit-font-smoothing: antialiased;

    a {

    }

    img { max-width: 100%; }

    .container {

    /* ===================== BANNER ===================== */

      font-family: system-ui;

    #proposal-banner a {
