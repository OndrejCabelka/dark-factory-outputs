<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedník Olomouc – Profesionální zednické práce | +420 585 228 437</title>
<meta name="description" content="Profesionální zednické práce v Olomouci a okolí. Rekonstrukce bytů, omítky, betonářské práce, přístavby. Volejte +420 585 228 437.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #c8861a;
  --primary-dark: #a06810;
  --primary-light: #e8a830;
  --dark: #1a1410;
  --dark2: #2c2018;
  --dark3: #3d2e1e;
  --text: #1a1410;
  --text-light: #5a4a38;
  --white: #ffffff;
  --gray: #f5f0eb;
  --gray2: #e8ddd0;
  --shadow: 0 4px 24px rgba(26,20,10,0.13);
  --shadow-hover: 0 8px 40px rgba(200,134,26,0.22);
  --radius: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner a {
  text-decoration: underline;
}

/* ─── NAVBAR ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(26,20,10,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--primary);
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 11px;
  color: var(--primary-light);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 14px;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 2px 12px rgba(200,134,26,0.4);
}

.nav-cta:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(200,134,26,0.6);
}

/* ─── HERO ─── */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1008 0%, #2c1e08 30%, #3d2a0a 60%, #1a1410 100%);
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(
      45deg,
      var(--primary) 0,
      var(--primary) 1px,
      transparent 0,
      transparent 50%
    );
  background-size: 20px 20px;
}

.hero-glow {
  position: absolute;
  top: -100px;
  right: -100px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,134,26,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.hero-glow2 {
  position: absolute;
  bottom: -150px;
  left: -150px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(200,134,26,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 0 auto;
  padding: 80px 20px;
  width: 100%;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,134,26,0.15);
  border: 1px solid rgba(200,134,26,0.4);
  color: var(--primary-light);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

#hero h1 {
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -1px;
  max-width: 800px;
}

#hero h1 span {
  color: var(--primary-light);
}

.hero-sub {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  color: rgba(255,255,255,0.75);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  transition: all 0.25s ease;
  box-shadow: 0 4px 24px rgba(200,134,26,0.5);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(200,134,26,0.7);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 15px 30px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  transition: all 0.25s ease;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.stat {
  display: flex;
  flex-direction: column;
}

.stat-num {
  font-size: 2rem;
  font-weight: 900;
  color: var(--primary-light);
  line-height: 1;
}

.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
}

/* ─── SECTIONS COMMON ─── */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-label {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.7rem, 3.5vw, 2.5rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
}

.section-title.light {
  color: var(--white);
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.7;
}

/* ─── SLUŽBY ─── */
#sluzby {
  background: var(--gray);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(200,134,26,0.15);
}

.service-card:hover::before {
  transform: scaleX(1);
}

.service-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, rgba(200,134,26,0.12), rgba(232,168,48,0.18));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.service-card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
}

.service-card p {
  font-size: 0.92rem;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-weight: 600;
  font-size: 0.88rem;
  text-decoration: none;
  margin-top: 16px;
  transition: gap 0.2s;
}

.service-link:hover {
  gap: 10px;
}

/* ─── PROC MY ─── */
#proc-my {
  background: linear-gradient(135deg, #1a1008 0%, #2c1e08 50%, #1a1410 100%);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: repeating-linear-gradient(
    45deg,
    var(--primary) 0, var(--primary) 1px,
    transparent 0, transparent 50%
  );
  background-size: 20px 20px;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  margin-top: 48px;
  position: relative;
  z-index: 1;
}

.benefit-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,134,26,0.2);
  border-radius: var(--radius);
  padding: 36px 28px;
  transition: all 0.3s ease;
}

.benefit-card:hover {
  background: rgba(200,134,26,0.08);
  border-color: rgba(200,134,26,0.5);
  transform: translateY(-4px);
}

.benefit-num {
  font-size: 3rem;
  font-weight: 900;
  color: rgba(200,134,26,0.25);
  line-height: 1;
  margin-bottom: 12px;
}

.benefit-icon {
  font-size: 2.2rem;
  margin-bottom: 16px;
}

.benefit-card h3 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 12px;
}

.benefit-card p {
  font-size: 0.93rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.7;
}

/* ─── REFERENCE ─── */
#reference {
  background: var(--white);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.review-card {
  background: var(--gray);
  border-radius: var(--radius);
  padding: 32px 28px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  position: relative;
  border: 1px solid var(--gray2);
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.review-quote {
  font-size: 3rem;
  color: var(--primary);
  line-height: 0.8;
  margin-bottom: 16px;
  font-family: Georgia, serif;
}

.review-text {
  font-size: 0.95rem;
  color: var(--text-light);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.av1 { background: linear-gradient(135deg, #c8861a, #e8a830); }
.av2 { background: linear-gradient(135deg, #8B5E3C, #c8861a); }
.av3 { background: linear-gradient(135deg, #5C3A1E, #8B5E3C); }

.review-name {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
}

.review-location {
  font-size: 0.82rem;
  color: var(--text-light);
}

.stars {
  color: var(--primary);
  font-size: 1rem;
  margin-bottom: 4px;
}

/* ─── KONTAKT ─── */
#kontakt {
  background: var(--gray);
}

.kontakt-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-top: 48px;
  align-items: start;
}

.kontakt-info {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.kontakt-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  background: var(--white);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
  text-decoration: none;
  border: 1px solid transparent;
}

.kontakt-item:hover {
  border-color: rgba(200,134,26,0.3);
  box-shadow: var(--shadow-hover);
  transform: translateX(4px);
}

.kontakt-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.kontakt-detail strong {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.kontakt-detail span {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
}

.kontakt-detail a {
  color: var(--text);
  text-decoration: none;
}

.map-placeholder {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  height: 380px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  border: 2px dashed var(--gray2);
  position: relative;
}

.map-bg {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(200,134,26,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,134,26,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

.map-content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.map-pin {
  font-size: 3rem;
  margin-bottom: 12px;
}

.map-content h4 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.map-content p {
  font-size: 0.9rem;
  color: var(--text-light);
}

.map-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 14px;
  margin-top: 16px;
  transition: all 0.2s;
}

.map-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(200,134,26,0.4);
}

/* ─── FOOTER ─── */
footer {
  background: var(--dark);
  color: rgba(255,255,255,0.6);
  padding: 40px 20px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.footer-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.footer-logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.footer-logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}

.
