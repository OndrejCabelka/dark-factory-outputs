<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profesionální zahradník Praha | Návrhy, realizace a údržby zahrad</title>
<meta name="description" content="Profesionální zahradnické služby v Praze a okolí. Zakládání zahrad, sekání trávy, výsadba rostlin, závlahové systémy. Volejte +420797807507">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #2d7a3a;
  --primary-light: #3d9e4e;
  --primary-dark: #1e5429;
  --accent: #7ec850;
  --accent-light: #a8e07a;
  --dark: #0f1a10;
  --dark-2: #1a2b1c;
  --dark-3: #243d27;
  --text: #1a2b1c;
  --text-light: #4a6b4e;
  --text-muted: #6b8a70;
  --white: #ffffff;
  --gray-light: #f4f8f4;
  --gray-border: #e0ebe0;
  --shadow: 0 4px 24px rgba(45,122,58,0.10);
  --shadow-hover: 0 8px 40px rgba(45,122,58,0.18);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== BANNER ===== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ===== HEADER / NAVBAR ===== */
header {
  position: sticky;
  top: 0;
  z-index: 900;
  background: rgba(15, 26, 16, 0.97);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(126,200,80,0.15);
  padding: 0 20px;
}

.navbar {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.logo-text {
  display: flex;
  flex-direction: column;
}

.logo-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

.logo-sub {
  font-size: 11px;
  color: var(--accent-light);
  font-weight: 400;
  line-height: 1.2;
}

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.3s ease;
  box-shadow: 0 2px 12px rgba(45,122,58,0.3);
}

.nav-cta:hover {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  box-shadow: 0 4px 20px rgba(45,122,58,0.45);
  transform: translateY(-1px);
}

/* ===== HERO ===== */
#hero {
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #0a1a0b 0%, #0f2e12 30%, #143d18 55%, #0f2e12 80%, #0a1a0b 100%);
  overflow: hidden;
  padding: 80px 20px;
}

.hero-bg-pattern {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(45,122,58,0.25) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(126,200,80,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(45,122,58,0.18) 0%, transparent 50%);
  pointer-events: none;
}

.hero-decoration {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.06;
}

.hero-decoration-1 {
  width: 600px;
  height: 600px;
  background: var(--accent);
  top: -200px;
  right: -150px;
}

.hero-decoration-2 {
  width: 400px;
  height: 400px;
  background: var(--primary);
  bottom: -100px;
  left: -100px;
  opacity: 0.1;
}

.hero-decoration-3 {
  width: 200px;
  height: 200px;
  background: var(--accent-light);
  top: 30%;
  left: 5%;
  opacity: 0.05;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 820px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(126,200,80,0.15);
  border: 1px solid rgba(126,200,80,0.3);
  color: var(--accent-light);
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

.hero h1 {
  font-size: clamp(32px, 5.5vw, 64px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 22px;
  letter-spacing: -0.02em;
}

.hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.2vw, 20px);
  color: rgba(255,255,255,0.72);
  margin-bottom: 40px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 400;
  line-height: 1.55;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 52px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.3s ease;
  box-shadow: 0 4px 24px rgba(45,122,58,0.45);
  letter-spacing: -0.01em;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(45,122,58,0.55);
  background: linear-gradient(135deg, var(--primary-light), var(--accent-light));
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: rgba(255,255,255,0.08);
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.2);
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.35);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.hero-stat {
  text-align: center;
}

.hero-stat-number {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.hero-scroll-hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  letter-spacing: 0.05em;
  z-index: 2;
}

.scroll-arrow {
  width: 20px;
  height: 20px;
  border-right: 2px solid rgba(255,255,255,0.3);
  border-bottom: 2px solid rgba(255,255,255,0.3);
  transform: rotate(45deg);
  margin-top: 4px;
}

/* ===== SECTIONS COMMON ===== */
section {
  padding: 80px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(45,122,58,0.1);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  border: 1px solid rgba(45,122,58,0.15);
}

.section-title {
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.02em;
}

.section-subtitle {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ===== SERVICES ===== */
#sluzby {
  background: var(--gray-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-border);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.35s ease;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(45,122,58,0.2);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 62px;
  height: 62px;
  background: linear-gradient(135deg, rgba(45,122,58,0.1), rgba(126,200,80,0.15));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 22px;
  transition: transform 0.35s ease;
  border: 1px solid rgba(45,122,58,0.1);
}

.service-card:hover .service-icon {
  transform: scale(1.08) rotate(-3deg);
}

.service-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}

.service-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  margin-top: 18px;
  transition: gap 0.2s ease;
}

.service-link:hover {
  gap: 10px;
}

/* ===== WHY US ===== */
#proc-my {
  background: var(--white);
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.benefit-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  border: 1.5px solid var(--gray-border);
  position: relative;
  transition: all 0.35s ease;
  overflow: hidden;
}

.benefit-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(45,122,58,0.04), rgba(126,200,80,0.06));
  opacity: 0;
  transition: opacity 0.35s ease;
  border-radius: var(--radius-lg);
}

.benefit-card:hover {
  transform: translateY(-4px);
  border-color: rgba(45,122,58,0.25);
  box-shadow: var(--shadow-hover);
}

.benefit-card:hover::after {
  opacity: 1;
}

.benefit-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}

.benefit-icon {
  font-size: 40px;
  margin-bottom: 18px;
  display: block;
  position: relative;
  z-index: 1;
}

.benefit-title {
  font-size: 21px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.benefit-desc {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.65;
  position: relative;
  z-index: 1;
}

/* ===== REFERENCES ===== */
#reference {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 50%, var(--dark-3) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 10% 50%, rgba(45,122,58,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 90% 30%, rgba(126,200,80,0.10) 0%, transparent 50%);
  pointer-events: none;
}

#reference .section-tag {
  background: rgba(126,200,80,0.15);
  color: var(--accent-light);
  border-color: rgba(126,200,80,0.2);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-subtitle {
  color: rgba(255,255,255,0.6);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  position: relative;
  z-index: 2;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  backdrop-filter: blur(8px);
  transition: all 0.35s ease;
}

.review-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(126,200,80,0.25);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.review-stars {
  color: #fbbf24;
  font-size: 18px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  margin-bottom: 24px;
  font-style: italic;
}

.review-text::before {
  content: '"';
  font-size: 48px;
  color: rgba(126,200,80,0.3);
  display: block;
  line-height: 0.5;
  margin-bottom: 16px;
  font-style: normal;
  font-weight: 700;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
}

.avatar-1 { background: linear-gradient(135deg, #2d7a3a, #7ec850); }
.avatar-2 { background: linear-gradient(135deg, #1e5429, #3d9e4e); }
.avatar-3 { background: linear-gradient(135deg, #3d9e4e, #a8e07a); }

.review-author-info {}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
}

/* ===== CONTACT ===== */
#kontakt {
  background: var(--gray-light);
}

.contact-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info h3 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.contact-info > p {
  color: var(--text-light);
  font-size: 16px;
  margin-bottom: 36px;
  line-height: 1.6;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 22px 24px;
  background: var(--white
