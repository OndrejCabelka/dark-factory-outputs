<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Profesionální topenář, vodař a plynař v Ostravě a okolí. VPT Sikora a syn – rychlý servis, kvalita garantována, přijatelná cena.">
<title>Topenář, Vodař, Plynař Ostrava | VPT Sikora a syn</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #1a6fb5;
  --primary-dark: #0f4f8a;
  --primary-light: #2d8fd4;
  --accent: #e8a020;
  --accent-dark: #c98010;
  --dark: #0d1b2a;
  --dark2: #132233;
  --dark3: #1c3044;
  --text: #1a2332;
  --text-light: #4a5568;
  --text-muted: #718096;
  --white: #ffffff;
  --gray-50: #f7fafc;
  --gray-100: #edf2f7;
  --gray-200: #e2e8f0;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
  --radius: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ─── BANNER ─── */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ─── HEADER / NAVBAR ─── */
header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 999;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 1px;
  text-decoration: none;
}

.logo-main {
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.logo-sub {
  font-size: 11px;
  font-weight: 500;
  color: var(--primary-light);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: rgba(255,255,255,0.75);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--white);
}

.btn-call-nav {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: var(--white);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  transition: background 0.2s, transform 0.2s;
  box-shadow: 0 2px 12px rgba(26,111,181,0.4);
}

.btn-call-nav:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

.btn-call-nav .icon {
  font-size: 16px;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: 0.3s;
}

/* ─── HERO ─── */
#hero {
  background: linear-gradient(135deg, #0d1b2a 0%, #0f3460 40%, #1a6fb5 80%, #0e4d8a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 80px 20px;
}

#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 40%, rgba(26,111,181,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(232,160,32,0.12) 0%, transparent 50%);
  pointer-events: none;
}

#hero::after {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(26,111,181,0.2);
  pointer-events: none;
}

.hero-grid {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(232,160,32,0.15);
  border: 1px solid rgba(232,160,32,0.35);
  color: var(--accent);
  padding: 7px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
}

.hero-badge .dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}

.hero-content h1 {
  font-size: clamp(30px, 4.5vw, 54px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 20px;
}

.hero-content h1 span {
  color: var(--accent);
  position: relative;
}

.hero-sub {
  font-size: clamp(16px, 2vw, 19px);
  color: rgba(255,255,255,0.78);
  line-height: 1.6;
  margin-bottom: 36px;
  font-weight: 400;
  max-width: 500px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--accent);
  color: var(--dark);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 800;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(232,160,32,0.4);
  letter-spacing: -0.2px;
}

.btn-primary:hover {
  background: #f5b030;
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(232,160,32,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  transition: all 0.25s;
  border: 2px solid rgba(255,255,255,0.35);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-num {
  font-size: 28px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1;
}

.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.hero-visual {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

.hero-card-big {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  width: 100%;
  max-width: 340px;
  text-align: center;
}

.hero-icon-wrap {
  width: 90px;
  height: 90px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(26,111,181,0.5);
}

.hero-card-big h3 {
  color: var(--white);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.hero-card-big p {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  line-height: 1.5;
}

.hero-mini-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
}

.mini-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  padding: 16px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.mini-card .mini-icon {
  font-size: 22px;
  flex-shrink: 0;
}

.mini-card span {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  line-height: 1.3;
}

/* ─── SECTION COMMONS ─── */
section {
  padding: 80px 20px;
}

.section-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.section-tag {
  display: inline-block;
  background: rgba(26,111,181,0.1);
  color: var(--primary);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.section-title {
  font-size: clamp(26px, 3.5vw, 40px);
  font-weight: 900;
  color: var(--text);
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}

.section-sub {
  font-size: 17px;
  color: var(--text-light);
  max-width: 560px;
  line-height: 1.65;
  margin-bottom: 48px;
}

/* ─── SERVICES ─── */
#sluzby {
  background: var(--gray-50);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 24px;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(26,111,181,0.2);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(26,111,181,0.1), rgba(26,111,181,0.18));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.service-card:hover .service-icon {
  transform: scale(1.1) rotate(-3deg);
}

.service-card h3 {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.2px;
}

.service-card p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
  margin-bottom: 16px;
}

.service-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.service-list li {
  font-size: 13px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 8px;
}

.service-list li::before {
  content: '✓';
  color: var(--primary);
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  background: rgba(26,111,181,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── WHY US ─── */
#proc-my {
  background: var(--white);
}

.why-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
  margin-top: 48px;
}

.why-card {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 28px;
  background: var(--gray-50);
  border-radius: var(--radius-lg);
  border: 1px solid var(--gray-200);
  transition: all 0.25s;
}

.why-card:hover {
  background: var(--white);
  box-shadow: var(--shadow-md);
  transform: translateY(-3px);
}

.why-num {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: var(--white);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(26,111,181,0.35);
}

.why-text h3 {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.why-text p {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.6;
}

/* ─── PROMO BANNER ─── */
.promo-band {
  background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 50%, #0f3460 100%);
  padding: 60px 20px;
}

.promo-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  flex-wrap: wrap;
}

.promo-text h2 {
  font-size: clamp(22px, 3vw, 34px);
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}

.promo-text p {
  font-size: 16px;
  color: rgba(255,255,255,0.7);
}

/* ─── REVIEWS ─── */
#reference {
  background: var(--gray-50);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.review-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  transition: all 0.25s;
  position: relative;
}

.review-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 72px;
  font-weight: 900;
  color: rgba(26,111,181,0.08);
  line-height: 1;
  font-family: Georgia, serif;
}

.stars {
  display: flex;
  gap: 3px;
  margin-bottom: 14px;
}

.star {
  color: var(--accent);
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}

.reviewer {
  display: flex;
  align-items: center;
  gap: 12px;
}

.reviewer-avatar {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-size: 16px;
  font-weight: 800;
  flex-shrink: 0;
}

.reviewer-info strong {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.reviewer-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── CONTACT ─── */
#kontakt {
  background: var(--white);
}

.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-items {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 32px;
}

.contact-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
