<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truhlářství Reliens Liberec | Kuchyňské linky, skříně, podlahy</title>
<meta name="description" content="Profesionální truhlář v Liberci a okolí. Kuchyňské linky na míru, vestavěné skříně, dřevěné podlahy, schody, dveře a okna.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #8B5E3C;
  --primary-dark: #6B4423;
  --primary-light: #C4864A;
  --accent: #D4A853;
  --accent-light: #F0C878;
  --dark: #1A1208;
  --dark-2: #2C1F0E;
  --dark-3: #3D2B14;
  --text: #2C1F0E;
  --text-light: #6B5744;
  --white: #FFFFFF;
  --bg-light: #FAF6F0;
  --bg-section: #F5EDE0;
  --shadow: 0 4px 24px rgba(139,94,60,0.12);
  --shadow-hover: 0 8px 40px rgba(139,94,60,0.22);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ========== BANNER ========== */
#proposal-banner {
  position: relative;
  z-index: 1000;
}

/* ========== HEADER / NAVBAR ========== */
header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: rgba(26,18,8,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212,168,83,0.2);
  padding: 0 20px;
}

nav {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
  gap: 16px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo-icon {
  font-size: 28px;
  line-height: 1;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.01em;
}

.nav-logo-sub {
  font-size: 11px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--accent);
}

.btn-nav {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  color: var(--dark) !important;
  font-weight: 700 !important;
  font-size: 14px !important;
  padding: 10px 20px;
  border-radius: 8px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  white-space: nowrap;
  box-shadow: 0 2px 12px rgba(212,168,83,0.3);
}

.btn-nav:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(212,168,83,0.45);
  opacity: 0.92;
}

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--white);
  border-radius: 2px;
}

/* ========== HERO ========== */
#hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  align-items: center;
  background:
    linear-gradient(160deg, rgba(26,18,8,0.92) 0%, rgba(60,35,15,0.85) 50%, rgba(26,18,8,0.95) 100%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(139,94,60,0.04) 40px,
      rgba(139,94,60,0.04) 80px
    );
  background-color: #1A1208;
  overflow: hidden;
  padding: 100px 20px 80px;
}

.hero-wood-texture {
  position: absolute;
  inset: 0;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 3px,
      rgba(212,168,83,0.5) 3px,
      rgba(212,168,83,0.5) 4px,
      transparent 4px,
      transparent 20px,
      rgba(139,94,60,0.3) 20px,
      rgba(139,94,60,0.3) 21px,
      transparent 21px,
      transparent 60px
    );
  pointer-events: none;
}

.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,134,74,0.15) 0%, transparent 70%);
  top: -100px;
  right: -100px;
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
  bottom: -50px;
  left: 10%;
  pointer-events: none;
}

.hero-content {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212,168,83,0.15);
  border: 1px solid rgba(212,168,83,0.35);
  color: var(--accent-light);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: 0.03em;
}

.hero-badge::before {
  content: '';
  display: block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#hero h1 {
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 800;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

#hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(16px, 2.5vw, 20px);
  color: rgba(255,255,255,0.72);
  max-width: 560px;
  margin-bottom: 40px;
  line-height: 1.65;
  font-weight: 400;
}

.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%);
  color: var(--dark);
  font-weight: 700;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(212,168,83,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(212,168,83,0.5);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white);
  font-weight: 600;
  font-size: 16px;
  padding: 16px 32px;
  border-radius: var(--radius);
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  backdrop-filter: blur(8px);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.45);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
}

.hero-stat-num {
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.hero-stat-label {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
  margin-top: 4px;
}

.hero-divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  align-self: center;
}

/* ========== SEKCE OBECNĚ ========== */
section {
  padding: 80px 20px;
}

.section-header {
  text-align: center;
  margin-bottom: 56px;
}

.section-tag {
  display: inline-block;
  background: rgba(139,94,60,0.1);
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 14px;
  border: 1px solid rgba(139,94,60,0.2);
}

.section-title {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.section-title span {
  color: var(--primary);
}

.section-desc {
  font-size: 16px;
  color: var(--text-light);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ========== SLUŽBY ========== */
#sluzby {
  background: var(--bg-light);
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.service-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  box-shadow: var(--shadow);
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid rgba(139,94,60,0.08);
  position: relative;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.3s;
}

.service-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
}

.service-card:hover::before {
  opacity: 1;
}

.service-icon {
  font-size: 44px;
  margin-bottom: 20px;
  display: block;
  line-height: 1;
}

.service-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 10px;
}

.service-desc {
  font-size: 14px;
  color: var(--text-light);
  line-height: 1.65;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: gap 0.2s, color 0.2s;
}

.service-link:hover {
  gap: 10px;
  color: var(--primary-dark);
}

/* ========== PROČ MY ========== */
#proc-my {
  background: var(--white);
  position: relative;
  overflow: hidden;
}

#proc-my::before {
  content: '🪵';
  position: absolute;
  font-size: 280px;
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.04;
  pointer-events: none;
  line-height: 1;
}

.benefits-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
  max-width: 1200px;
  margin: 0 auto;
}

.benefit-card {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 40px 32px;
  background: var(--bg-light);
  border-radius: var(--radius-lg);
  border: 1px solid rgba(139,94,60,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}

.benefit-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.benefit-number {
  position: absolute;
  top: 24px;
  right: 28px;
  font-size: 64px;
  font-weight: 800;
  color: rgba(139,94,60,0.07);
  line-height: 1;
  pointer-events: none;
}

.benefit-icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 16px rgba(139,94,60,0.25);
}

.benefit-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--dark);
}

.benefit-text {
  font-size: 15px;
  color: var(--text-light);
  line-height: 1.7;
}

/* ========== REFERENCE ========== */
#reference {
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark-2) 100%);
  position: relative;
  overflow: hidden;
}

#reference::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 60px,
    rgba(212,168,83,0.02) 60px,
    rgba(212,168,83,0.02) 61px
  );
  pointer-events: none;
}

#reference .section-tag {
  background: rgba(212,168,83,0.15);
  color: var(--accent-light);
  border-color: rgba(212,168,83,0.3);
}

#reference .section-title {
  color: var(--white);
}

#reference .section-desc {
  color: rgba(255,255,255,0.55);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-lg);
  padding: 36px 30px;
  transition: transform 0.3s, background 0.3s;
  position: relative;
}

.review-card::before {
  content: '"';
  position: absolute;
  top: 16px;
  right: 24px;
  font-size: 80px;
  color: rgba(212,168,83,0.15);
  font-family: Georgia, serif;
  line-height: 1;
}

.review-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.08);
}

.review-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.review-stars span {
  font-size: 18px;
}

.review-text {
  font-size: 15px;
  color: rgba(255,255,255,0.82);
  line-height: 1.75;
  margin-bottom: 24px;
  font-style: italic;
}

.review-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.review-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.review-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
}

.review-location {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
}

/* ========== KONTAKT ========== */
#kontakt {
  background: var(--bg-section);
  position: relative;
}

.contact-grid {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

.contact-info {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 24px;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid rgba(139,94,60,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}

.contact-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.contact-icon-wrap {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shr
