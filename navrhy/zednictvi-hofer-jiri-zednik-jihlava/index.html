<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zednictví Hofer Jiří – Profesionální zedník Jihlava</title>
  <meta name="description" content="Profesionální zednické práce, rekonstrukce bytů, omítky a betonářské práce v Jihlavě a okolí. Volejte +420736401135.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8871a;
      --primary-dark: #a36a10;
      --primary-light: #f0a83a;
      --dark: #1a1208;
      --dark2: #2d200a;
      --dark3: #3d2e10;
      --text: #1a1208;
      --text-light: #6b5a3a;
      --white: #ffffff;
      --bg-light: #fdf8f1;
      --bg-section: #fff9f0;
      --border: #e8d9c0;
      --shadow: 0 4px 24px rgba(200,135,26,0.10);
      --shadow-hover: 0 8px 36px rgba(200,135,26,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner a:hover {
      text-decoration: underline;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26, 18, 8, 0.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200,135,26,0.25);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(200,135,26,0.35);
    }

    .header-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,135,26,0.45);
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(160deg, rgba(26,18,8,0.92) 0%, rgba(61,46,16,0.88) 50%, rgba(26,18,8,0.95) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(200,135,26,0.04) 0px,
          rgba(200,135,26,0.04) 2px,
          transparent 2px,
          transparent 20px
        );
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,135,26,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,135,26,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,135,26,0.18);
      border: 1px solid rgba(200,135,26,0.35);
      color: var(--primary-light);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 28px;

      color: var(--white);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 22px;

    #hero h1 span {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

      font-size: clamp(1rem, 2vw, 1.2rem);

      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 20px rgba(200,135,26,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,135,26,0.55);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: var(--white);
      text-decoration: none;
      padding: 15px 30px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;

      justify-content: center;
      flex-wrap: wrap;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ─── SEKCE OBECNĚ ─── */
    section {
      padding: 80px 20px;
    }

    .section-inner {
      max-width: 1140px;
      margin: 0 auto;
    }

    .section-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(200,135,26,0.12), rgba(240,168,58,0.12));

    .section-title {

    .section-header {
      margin-bottom: 48px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--bg-section);
    }

    .sluzby-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .sluzba-karta {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sluzba-karta::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .sluzba-karta:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200,135,26,0.3);
    }

    .sluzba-karta:hover::before {
      opacity: 1;
    }

    .sluzba-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(200,135,26,0.12), rgba(240,168,58,0.12));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .sluzba-karta h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .sluzba-karta p {
      font-size: 0.93rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: var(--white);
    }

    .benefity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .benefit {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 52px;
      height: 52px;

    .benefit-body h3 {

      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .benefit-body p {
      font-size: 0.92rem;
      color: var(--text-light);
      line-height: 1.65;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--dark);
      position: relative;
      overflow: hidden;
    }

    #reference::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        -45deg,
        rgba(200,135,26,0.02) 0px,
        rgba(200,135,26,0.02) 2px,
        transparent 2px,
        transparent 24px
      );
      pointer-events: none;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-tag {
      background: rgba(200,135,26,0.15);
      border-color: rgba(200,135,26,0.3);
      color: var(--primary-light);
    }

    #reference .section-desc {
      color: rgba(255,255,255,0.6);
    }

    .recenze-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .recenze-karta {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,135,26,0.2);
      border-radius: var(--radius-lg);
      padding: 30px 26px;
      transition: transform 0.25s, background 0.25s;
      position: relative;
    }

    .recenze-karta:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }

    .hvezdy {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .hvezda {
      color: var(--primary-light);
      font-size: 18px;

    .recenze-text {
      font-size: 0.97rem;

    }

    .recenze-autor {
      display: flex;

    }

    .autor-avatar {
      width: 44px;
      height: 44px;

      font-size: 16px;
      color: var(--white);

    }

    .autor-info strong {

      font-weight: 700;
    }

    .autor-info span {

      color: rgba(255,255,255,0.45);
    }

    /* ─── KONTAKT ─── */

    .kontakt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 720px) {
      .kontakt-grid {
        grid-template-columns: 1fr;
      }
    }

    .kontakt-info-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: var(--shadow);
    }

    .kontakt-info-box h3 {
      font-size: 1.3rem;
      font-weight: 700;

      margin-bottom: 24px;

    .kontakt-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 22px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .kontakt-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .kontakt-item-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, rgba(200,135,26,0.12), rgba(240,168,58,0.12));

    .kontakt-item-body strong {

    .kontakt-item-body a {

    .kontakt-item-body span {

      box-shadow: var(--shadow);

    }
