<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opravy oken a dveří Praha | Výměna těsnění | +420 723 079 731</title>
  <meta name="description" content="Profesionální opravy oken a dveří v Praze. Výměna těsnění, seřízení kování, rychlý servis. Zavolejte +420 723 079 731.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a6fc4;
      --primary-dark: #145499;
      --primary-light: #2d85e0;
      --accent: #f0a500;
      --dark: #0d1b2a;
      --dark2: #132338;
      --text: #1e293b;
      --text-light: #64748b;
      --white: #ffffff;
      --bg-light: #f1f5f9;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(26,111,196,0.10);
      --shadow-hover: 0 8px 36px rgba(26,111,196,0.18);
      --radius: 14px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* BANNER */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* HEADER / NAVBAR */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-text strong {
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .nav-logo-text span {
      color: var(--primary-light);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 14px !important;
      transition: background 0.2s, transform 0.15s !important;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-cta:hover {
      background: var(--primary-dark) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-logo-text strong {
        font-size: 13px;
      }
    }

    /* HERO */
    #hero {
      background: linear-gradient(135deg, #0d1b2a 0%, #132338 40%, #1a3a5c 70%, #1a6fc4 100%);
      position: relative;
      overflow: hidden;
      padding: 90px 20px 80px;
      text-align: center;
    }

    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(26,111,196,0.25) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(45,133,224,0.15) 0%, transparent 50%),
        radial-gradient(circle at 60% 80%, rgba(240,165,0,0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.3);
      border: 1px solid rgba(26,111,196,0.5);
      color: #7dc3ff;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      position: relative;
    }

    #hero h1 {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 20px;
      position: relative;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #hero h1 span {
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: clamp(15px, 2.5vw, 20px);
      color: #94a3b8;
      margin-bottom: 40px;
      position: relative;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      position: relative;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(26,111,196,0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26,111,196,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--white);
      padding: 15px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      margin-top: 56px;
      position: relative;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      display: block;
      font-size: 30px;
      font-weight: 800;
      color: var(--white);
      line-height: 1;
    }

    .hero-stat span {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
    }

    /* SECTION COMMON */
    section {
      padding: 72px 20px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,111,196,0.1);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .section-title span {
      color: var(--primary);
    }

    .section-desc {
      font-size: 17px;
      color: var(--text-light);
      max-width: 560px;
      line-height: 1.7;
    }

    .section-header {
      margin-bottom: 48px;
    }

    .section-header.center {
      text-align: center;
    }

    .section-header.center .section-desc {
      margin: 0 auto;
    }

    /* SERVICES */
    #sluzby {
      background: var(--bg-light);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(26,111,196,0.2);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(26,111,196,0.12), rgba(26,111,196,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .service-card p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.65;
    }

    .service-list {
      list-style: none;
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .service-list li {
      font-size: 13px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .service-list li::before {
      content: '✓';
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* WHY US */
    #proc-my {
      background: var(--white);
    }

    .benefits-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: center;
    }

    @media (max-width: 768px) {
      .benefits-wrapper {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }

    .benefits-visual {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 50%, #1a3a5c 100%);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .benefits-visual::before {
      content: '🪟';
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 90px;
      opacity: 0.15;
    }

    .benefits-visual-title {
      color: var(--white);
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .benefits-visual-sub {
      color: #64748b;
      font-size: 15px;
    }

    .benefits-visual-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(26,111,196,0.25);
      border: 1px solid rgba(26,111,196,0.4);
      color: #7dc3ff;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      width: fit-content;
    }

    .benefits-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .benefit-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 22px;
      background: var(--bg-light);
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .benefit-item:hover {
      transform: translateX(4px);
      box-shadow: var(--shadow);
    }

    .benefit-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .benefit-text h4 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }

    .benefit-text p {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* REVIEWS */
    #reference {
      background: var(--dark);
      padding: 72px 20px;
    }

    #reference .section-title {
      color: var(--white);
    }

    #reference .section-label {
      background: rgba(26,111,196,0.2);
      color: #7dc3ff;
    }

    #reference .section-desc {
      color: #64748b;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .review-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 28px;
      transition: transform 0.2s, background 0.2s, border-color 0.2s;
    }

    .review-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.07);
      border-color: rgba(26,111,196,0.3);
    }

    .review-stars {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .review-text {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .review-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .review-avatar.a1 { background: linear-gradient(135deg, #1a6fc4, #2d85e0); color: white; }
    .review-avatar.a2 { background: linear-gradient(135deg, #0f766e, #14b8a6); color: white; }
    .review-avatar.a3 { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: white; }

    .review-name {
      font-weight: 700;
      color: var(--white);
      font-size: 15px;
    }

    .review-location {
      font-size: 12px;
      color: #475569;
    }

    /* CONTACT */
    #kontakt {
      background: var(--bg-light);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .contact-info-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      background: var(--white);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .contact-item:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .contact-item-icon {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .contact-item-text strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .contact-item-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      font-size: 17px;
      transition: color 0.2s;
    }

    .contact-item-text a:hover {
      color: var(--primary-dark);
    }

    .contact-item-text span {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }

    .contact-cta-box {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 14px;
      padding: 32px;
      color: white;
      margin-top: 6px;
    }

    .contact-cta-box h3 {
      font-size: 21px;
      font-
