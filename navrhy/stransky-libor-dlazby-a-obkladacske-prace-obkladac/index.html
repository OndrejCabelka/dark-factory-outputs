<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stránský Libor – Dlažby a Obkládačské Práce | Brno</title>
  <meta name="description" content="Profesionální pokládka obkladů a dlažby v Brně a okolí. Koupelny na klíč, terasy, epoxidové spárování, hydroizolace. Zavolejte: +420 546 212 897">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #c8860a;
      --primary-light: #e09d1a;
      --primary-dark: #a06a05;
      --dark: #1a1208;
      --dark2: #2a1f0e;
      --dark3: #3a2c18;
      --text: #f5f0e8;
      --text-muted: #c8b99a;
      --white: #ffffff;
      --card-bg: #ffffff;
      --section-bg: #f8f4ee;
      --section-dark: #1e160a;
      --border: #e8dcc8;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 40px rgba(200,134,10,0.18);
      --radius: 12px;
      --radius-lg: 20px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: #2a1f0e;
      line-height: 1.6;
      font-size: 16px;
    }

    /* ─── BANNER ─── */
    #proposal-banner {
      position: relative;
      z-index: 1000;
    }

    /* ─── HEADER ─── */
    header {
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 900;
      border-bottom: 2px solid var(--primary);
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .logo-main {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--primary-light);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary-light);
    }

    .btn-nav {
      background: var(--primary);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700 !important;
      font-size: 0.88rem !important;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-nav:hover {
      background: var(--primary-light) !important;
      transform: translateY(-1px);
      color: var(--white) !important;
    }

    /* ─── HERO ─── */
    #hero {
      background:
        linear-gradient(135deg, rgba(20,12,2,0.92) 0%, rgba(40,25,5,0.88) 50%, rgba(160,100,0,0.55) 100%),
        repeating-linear-gradient(
          45deg,
          rgba(200,134,10,0.04) 0px,
          rgba(200,134,10,0.04) 2px,
          transparent 2px,
          transparent 20px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(200,134,10,0.04) 0px,
          rgba(200,134,10,0.04) 2px,
          transparent 2px,
          transparent 20px
        );
      background-color: var(--dark);
      min-height: 92vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px;
    }

    .hero-pattern {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,134,10,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,134,10,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,134,10,0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    .hero-glow2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,134,10,0.10) 0%, transparent 70%);
      bottom: -80px;
      left: -80px;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,134,10,0.15);
      border: 1px solid rgba(200,134,10,0.4);
      color: var(--primary-light);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      width: fit-content;
    }

    #hero h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    #hero h1 span {
      color: var(--primary-light);
    }

    .hero-subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.65;
      max-width: 520px;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,134,10,0.35);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,134,10,0.45);
    }

    .btn-secondary {
      background: transparent;
      color: var(--white);
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid rgba(255,255,255,0.3);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--primary-light);
      background: rgba(200,134,10,0.1);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-light);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .hero-visual {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    .hero-card-visual {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200,134,10,0.25);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .visual-title {
      color: var(--primary-light);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .visual-services {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .visual-service-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 500;
    }

    .visual-icon {
      width: 36px;
      height: 36px;
      background: rgba(200,134,10,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .visual-check {
      margin-left: auto;
      color: var(--primary-light);
      font-size: 1rem;
    }

    .hero-contact-card {
      background: var(--primary);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .contact-icon-hero {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .contact-card-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-card-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .contact-card-number {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
    }

    .contact-card-number:hover {
      text-decoration: underline;
    }

    /* ─── SECTION SHARED ─── */
    section {
      padding: 90px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 800;
      color: #1a1208;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .section-title.light {
      color: var(--white);
    }

    .section-desc {
      font-size: 1.05rem;
      color: #6b5a3e;
      max-width: 560px;
      line-height: 1.7;
    }

    .section-desc.light {
      color: var(--text-muted);
    }

    .section-header {
      margin-bottom: 56px;
    }

    /* ─── SLUŽBY ─── */
    #sluzby {
      background: var(--section-bg);
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .service-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
      gap: 16px;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      transform: scaleX(0);
      transition: transform 0.3s;
      transform-origin: left;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(200,134,10,0.3);
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(200,134,10,0.12), rgba(200,134,10,0.06));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 1px solid rgba(200,134,10,0.2);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1208;
      line-height: 1.3;
    }

    .service-card p {
      font-size: 0.92rem;
      color: #6b5a3e;
      line-height: 1.65;
    }

    .service-link {
      margin-top: auto;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .service-card:hover .service-link {
      gap: 10px;
    }

    /* ─── PROČ MY ─── */
    #proc-my {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 60%, var(--dark3) 100%);
      position: relative;
      overflow: hidden;
    }

    #proc-my::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,134,10,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,134,10,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .benefits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      position: relative;
      z-index: 2;
    }

    .benefit-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,134,10,0.2);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      transition: background 0.25s, border-color 0.25s, transform 0.25s;
      backdrop-filter: blur(4px);
    }

    .benefit-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(200,134,10,0.5);
      transform: translateY(-4px);
    }

    .benefit-num {
      font-size: 3.5rem;
      font-weight: 900;
      color: rgba(200,134,10,0.2);
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -0.04em;
    }

    .benefit-icon {
      font-size: 2.2rem;
      margin-bottom: 16px;
    }

    .benefit-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .benefit-card p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ─── REFERENCE ─── */
    #reference {
      background: var(--white);
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }

    .review-card {
      background: var(--section-bg);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
    }

    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .review-quote {
      font-size: 3rem;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 16px;
      font-family: Georgia, serif;
    }

    .review-stars {
      color: var(--primary);
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 0.95rem;
      color: #4a3820;
      line-height: 1.75;
      margin-bottom: 24px;
      font-style: italic;
    }

    .review-author {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .review-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      color: white;
      font-weight: 700;
    }

    .review-name {
      font-weight: 700;
      color: #1a1208;
      font-size: 0.95rem;
    }

    .review-location {
      font-size: 0.8rem;
      color: #8b7355;
      margin-top: 2px;
    }

    /* ─── KONTAKT ─── */
    #kontakt {
      background: var(--section-bg);
    }

    .contact-grid {
      display
